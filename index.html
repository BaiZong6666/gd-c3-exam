": "28m", "D": "50m"}, "answer": "D", "type": "single", "category": "脚手架与模板工程"}, {"id": 1431, "question": "扣件式钢管脚手架的立杆，除顶层顶部外必须采用（\n）。\nA.对接\nB.搭接\nC.十字连接\nD.滑动连接", "options": {"A": "对接", "B": "搭接", "C": "十字连接", "D": "滑动连接"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 1432, "question": "单、双排脚手架应配合施工进度搭设。一次搭设高度不应超过\n相邻连墙件以上（\n）。\nA.1 步\nB.2 步\nC.3 步\nD.4 步\n\n=== 第477页 ===", "options": {"A": "1 步", "B": "2 步", "C": "3 步", "D": "4 步 === 第477页 ==="}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 1433, "question": "连墙件应靠近主节点设置，偏离主节点的距离不应大于（\n）。\nA.100mm\nB.150mm\nC.200mm\nD.300mm", "options": {"A": "100mm", "B": "150mm", "C": "200mm", "D": "300mm"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1434, "question": "扣件式钢管脚手架，剪刀撑的两根斜杆与（\n）或相近的小横\n杆相连。\nA.立杆\nB.大横杆\nC.扫地杆\nD.扫天杆", "options": {"A": "立杆", "B": "大横杆", "C": "扫地杆", "D": "扫天杆"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 1435, "question": "脚手架应每隔两层且高度不超过10 米设水平防护，水平防护必\n须延至（\n）。\nA.内排横杆\nB.建筑物边缘\nC.内排立杆\nD.外排立杆", "options": {"A": "内排横杆", "B": "建筑物边缘", "C": "内排立杆", "D": "外排立杆"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 1436, "question": "落地式脚手架应设置纵横向扫地杆。横向扫地杆应采用直角扣\n\n=== 第478页 ===\n件固定在紧靠纵向扫地杆（\n）的立杆上。\nA.下方\nB.上方\nC.前方\nD.上下均可", "options": {"A": "下方", "B": "上方", "C": "前方", "D": "上下均可"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 1437, "question": "落地式脚手架在使用前应按规范要求进行验收，并挂（\n）。\nA.警示牌\nB.验收牌\nC.消防牌\nD.灭火器", "options": {"A": "警示牌", "B": "验收牌", "C": "消防牌", "D": "灭火器"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 1438, "question": "悬挑脚手架钢梁截面尺寸应经设计计算确定，采用工字钢截面\n高度不应小于（\n）。\nA.140mm\nB.160mm\nC.180mm\nD.200mm", "options": {"A": "140mm", "B": "160mm", "C": "180mm", "D": "200mm"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 1439, "question": "悬挑脚手架搭设前应做好（\n）。\nA.安全技术交底\nB.动员\n\n=== 第479页 ===\nC.宣传\nD.验收", "options": {"A": "安全技术交底", "B": "动员 === 第479页 ===", "C": "宣传", "D": "验收"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 1440, "question": "高处作业吊篮安装前，必须对有关技术和操作人员进行（\n）。\nA.安全技术交底\nB.签订风险自负责任状\nC.体检\nD.统一制服", "options": {"A": "安全技术交底", "B": "签订风险自负责任状", "C": "体检", "D": "统一制服"}, "answer": "A", "type": "single", "category": "高处作业"}, {"id": 1441, "question": "高处作业吊篮升降必须使用独立保险绳，绳径不小于（\n）。\nA.11mm\nB.12mm\nC.12.5mm\nD.14mm", "options": {"A": "11mm", "B": "12mm", "C": "12.5mm", "D": "14mm"}, "answer": "C", "type": "single", "category": "高处作业"}, {"id": 1442, "question": "高处作业吊篮应根据平台内的人员数配备独立的坠落防护安全\n绳。安全绳应固定在（\n）或专用预埋环上。\nA.吊篮支腿上\nB.吊篮横梁上\nC.吊篮配重上\nD.建筑主体结构上", "options": {"A": "吊篮支腿上", "B": "吊篮横梁上", "C": "吊篮配重上", "D": "建筑主体结构上"}, "answer": "D", "type": "single", "category": "高处作业"}, {"id": 1443, "question": "相邻2 台吊篮不得在竖向存在不等高施工，造成（\n）。\nA.交叉作业\nB.平行作业\nC.上下作业\nD.流水作业", "options": {"A": "交叉作业", "B": "平行作业", "C": "上下作业", "D": "流水作业"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1444, "question": "移动式操作平台的施工荷载不应超过（\n）KN/m²。\nA.0.5\nB.0.8\nC.1.0\nD.1.5", "options": {"A": "0.5", "B": "0.8", "C": "1.0", "D": "1.5"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1445, "question": "移动式操作平台工作使用状态时，四周应加设（\n）固定。\nA.扫地杆\nB.扫天杆\nC.立杆\nD.抛撑", "options": {"A": "扫地杆", "B": "扫天杆", "C": "立杆", "D": "抛撑"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1446, "question": "落地式操作平台的临边应设置防护栏杆，并在操作平台明显位\n置设置（\n）。\nA.限载牌\nB.宣传牌\n\n=== 第481页 ===\nC.消防牌\nD.企业标识", "options": {"A": "限载牌", "B": "宣传牌 === 第481页 ===", "C": "消防牌", "D": "企业标识"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 1447, "question": "落地式操作平台应从底层第一步水平杆起逐层设置连墙件，且\n连墙件间隔不应大于（\n），并应设置水平剪刀撑。\nA.1m\nB.2m\nC.3m\nD.4m", "options": {"A": "1m", "B": "2m", "C": "3m", "D": "4m"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1448, "question": "悬挑式操作平台主挑梁型号不得小于（\n）槽钢。\nA.14#\nB.16#\nC.18#\nD.20#", "options": {"A": "14#", "B": "16#", "C": "18#", "D": "20#"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1449, "question": "悬挑式操作平台钢丝绳直径应根据计算确定且直径不小于\n（\n）。\nA.14mm\nB.16mm\nC.18mm\nD.20mm\n\n=== 第482页 ===", "options": {"A": "14mm", "B": "16mm", "C": "18mm", "D": "20mm === 第482页 ==="}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1450, "question": "悬挑式操作平台锚固端用预埋直径（\n）U 型环，不宜埋设在\n结构悬挑部位。\nA.16\nB.18\nC.20\nD.24", "options": {"A": "16", "B": "18", "C": "20", "D": "24"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1451, "question": "悬挑式操作平台应挂设（\n），每次安装后均应进行验收，并\n做好记录。\nA.灭火器\nB.宣传标语\nC.环保标识牌\nD.限载标识牌", "options": {"A": "灭火器", "B": "宣传标语", "C": "环保标识牌", "D": "限载标识牌"}, "answer": "D", "type": "single", "category": "消防安全"}, {"id": 1452, "question": "基坑施工中，利用混凝土水平支撑作为人行通道，必须设置\n（\n）。\nA.防护措施\nB.灭火器\nC.宣传标语\nD.环保标识", "options": {"A": "防护措施", "B": "灭火器", "C": "宣传标语", "D": "环保标识"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 1453, "question": "地下连续墙的导墙养护期间，严禁（\n）在附近行走、停置或\n作业。\nA.小型机械\nB.重型机械\nC.人员\nD.手推车", "options": {"A": "小型机械", "B": "重型机械", "C": "人员", "D": "手推车"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1454, "question": "排水沟的深度和宽度应根据（\n）确定。\nA.领导要求\nB.基坑排水量\nC.宣传需要\nD.项目规模", "options": {"A": "领导要求", "B": "基坑排水量", "C": "宣传需要", "D": "项目规模"}, "answer": "B", "type": "single", "category": "基坑工程"}, {"id": 1455, "question": "基坑坑边严禁（\n）通行。\nA.人员\nB.小型机具\nC.重型车辆\nD.手推车", "options": {"A": "人员", "B": "小型机具", "C": "重型车辆", "D": "手推车"}, "answer": "C", "type": "single", "category": "基坑工程"}, {"id": 1456, "question": "基坑水平和竖向位移监测点应沿基坑周边布置，间距不宜大于\n（\n），每边监测点数目不应少于3 个。\nA.5m\n\n=== 第484页 ===\nB.10m\nC.15m\nD.20m", "options": {"A": "5m === 第484页 ===", "B": "10m", "C": "15m", "D": "20m"}, "answer": "D", "type": "single", "category": "基坑工程"}, {"id": 1457, "question": "当基础底板厚度小于（\n）时，经过计算满足要求的可采用钢\n筋做立柱支架。\nA.1000mm\nB.1200mm\nC.1500mm\nD.1800mm", "options": {"A": "1000mm", "B": "1200mm", "C": "1500mm", "D": "1800mm"}, "answer": "D", "type": "single", "category": "脚手架与模板工程"}, {"id": 1458, "question": "当基础底板厚度大于（\n）时，钢筋支架应采用型钢焊制。\nA.1000mm\nB.1200mm\nC.1500mm\nD.1800mm", "options": {"A": "1000mm", "B": "1200mm", "C": "1500mm", "D": "1800mm"}, "answer": "D", "type": "single", "category": "脚手架与模板工程"}, {"id": 1459, "question": "人工挖孔桩混凝土护壁的厚度不应小于（\n），且混凝土强度\n等级不应低于桩身混凝土强度等级（需振捣密实）。\nA.50mm\nB.100mm\nC.120mm\n\n=== 第485页 ===\nD.150mm", "options": {"A": "50mm", "B": "100mm", "C": "120mm === 第485页 ===", "D": "150mm"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1460, "question": "人工挖孔桩混凝土护壁每节高度应根据岩土层条件确定，且不\n宜大于（\n）。\nA.500mm\nB.800mm\nC.1000mm\nD.1500mm", "options": {"A": "500mm", "B": "800mm", "C": "1000mm", "D": "1500mm"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1461, "question": "人工挖孔桩施工中，挖出的土石方应及时运离孔口，不得堆放\n在孔口周边（\n）范围内。\nA.1m\nB.1.2m\nC.1.5m\nD.2m", "options": {"A": "1m", "B": "1.2m", "C": "1.5m", "D": "2m"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1462, "question": "人工挖孔桩施工中，孔口四周必须设置（\n）。\nA.防护栏杆\nB.宣传标语\nC.灭火器\nD.消防水带", "options": {"A": "防护栏杆", "B": "宣传标语", "C": "灭火器", "D": "消防水带"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 1463, "question": "在联合调试中，停送电必须是（\n），且应分区、分段逐步送\n电。\nA.一人指挥\nB.两人指挥\nC.联合指挥\nD.多人分区指挥", "options": {"A": "一人指挥", "B": "两人指挥", "C": "联合指挥", "D": "多人分区指挥"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1464, "question": "人工拆除作业时，应从（\n）逐层拆除，并应分段进行，不得\n垂直交叉作业。\nA.从上至下\nB.从下至上\nC.从中间到两边\nD.从两边到中间", "options": {"A": "从上至下", "B": "从下至上", "C": "从中间到两边", "D": "从两边到中间"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1465, "question": "机械拆除作业时，应从上至下逐层拆除，并应分段进行：应（\n）。\nA.先拆除非承重结构，再拆除承重结构\nB.先拆除承重结构，再拆除非承重结构\nC.先拆除中间结构，再拆除两边结构\nD.先拆除两边结构，再拆除中间结构", "options": {"A": "先拆除非承重结构，再拆除承重结构", "B": "先拆除承重结构，再拆除非承重结构", "C": "先拆除中间结构，再拆除两边结构", "D": "先拆除两边结构，再拆除中间结构"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1466, "question": "市政工程施工现场应设置明显的（\n），便于车辆、行人等安\n全通行。\n\n=== 第487页 ===\nA.宣传标语牌\nB.企业标识牌\nC.灭火器材\nD.交通标识牌", "options": {"A": "宣传标语牌", "B": "企业标识牌", "C": "灭火器材", "D": "交通标识牌"}, "answer": "D", "type": "single", "category": "消防安全"}, {"id": 1467, "question": "市政工程占道施工作业区前方每隔（\n）设一道交通标志牌。\nA.20m\nB.50m\nC.100m\nD.150m", "options": {"A": "20m", "B": "50m", "C": "100m", "D": "150m"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1468, "question": "市政工程占道施工区间前后各设置（\n）道标志牌及相应的反\n光锥。\nA.一\nB.二\nC.三\nD.四", "options": {"A": "一", "B": "二", "C": "三", "D": "四"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1469, "question": "占道打围区域，围挡需连续设置，处于交通路段的围挡顶部需\n安装警示红灯，警示红灯间距应不大于（\n）。\nA.20m\nB.50m\n\n=== 第488页 ===\nC.100m\nD.150m", "options": {"A": "20m", "B": "50m === 第488页 ===", "C": "100m", "D": "150m"}, "answer": "A", "type": "single", "category": "文明施工"}, {"id": 1470, "question": "道路施工围挡底部设置排水孔，排水孔的间距应不大于（\n）。\nA.3m\nB.4m\nC.5m\nD.6m", "options": {"A": "3m", "B": "4m", "C": "5m", "D": "6m"}, "answer": "D", "type": "single", "category": "文明施工"}, {"id": 1471, "question": "道路施工中，清除的树木、丛草严禁（\n），以防止引起火灾。\nA.放火焚烧\nB.汽车转运\nC.转卖\nD.掩埋", "options": {"A": "放火焚烧", "B": "汽车转运", "C": "转卖", "D": "掩埋"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 1472, "question": "道路施工中，滑坡地段的开挖，应从滑坡体（\n）自上而下进\n行。\nA.两侧向中部\nB.中部向两侧\nC.一侧向另一侧\nD.以上方式都可以", "options": {"A": "两侧向中部", "B": "中部向两侧", "C": "一侧向另一侧", "D": "以上方式都可以"}, "answer": "A", "type": "single", "category": "基坑工程"}, {"id": 1473, "question": "围堰内应设置作业人员上下通道，通道数量不得少于（\n）处。\nA.1\nB.2\nC.3\nD.4", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1474, "question": "生产经营单位委托工程技术人员提供安全生产管理服务的，保\n证安全生产的责任仍由（\n）。\nA.责任人负责\nB.本单位负责\nC.主管负责\nD.销售经理负责", "options": {"A": "责任人负责", "B": "本单位负责", "C": "主管负责", "D": "销售经理负责"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1475, "question": "工程监理单位与被监理工程的施工承包单位以及建筑材料、建\n筑构配件和设备供应单位有隶属关系或者其他利害关系的，（\n）承\n担该项建设工程的监理业务。\nA.在特殊情况下可以\nB.在建设主管部门许可下\nC.可以\nD.不得", "options": {"A": "在特殊情况下可以", "B": "在建设主管部门许可下", "C": "可以", "D": "不得"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1476, "question": "（\n）工程监理单位允许其他单位或者个人以本单位的名义承\n\n=== 第490页 ===\n担工程监理业务。\nA.在某些特殊情况下\nB.根据需要可以\nC.在建设主管部门许可的情况下\nD.禁止", "options": {"A": "在某些特殊情况下", "B": "根据需要可以", "C": "在建设主管部门许可的情况下", "D": "禁止"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1477, "question": "涉及建筑主体和承重结构变动的装修工程，建设单位应当在施\n工前委托原设计单位或者具有相应资质等级的设计单位提出设计方\n案；没有设计方案的（\n）。\nA.在某些部门许可下可以施工\nB.在质量监督部门监督下可以施工\nC.不得施工\nD.不确定", "options": {"A": "在某些部门许可下可以施工", "B": "在质量监督部门监督下可以施工", "C": "不得施工", "D": "不确定"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1478, "question": "安全检查等级划分为（\n）几个等级。\nA.优良、良好、合格、不合格\nB.优秀、良好、合格、不合格\nC.优良、合格、不合格\nD.优良、良好、中、合格、不合格", "options": {"A": "优良、良好、合格、不合格", "B": "优秀、良好、合格、不合格", "C": "优良、合格、不合格", "D": "优良、良好、中、合格、不合格"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1479, "question": "某施工单位固定资产600 万，从业人员1000 人。根据《中华人\n民共和国安全生产法》规定，下述做法正确的是（\n）。\n\n=== 第491页 ===\nA.应当建立应急救援组织\nB.可不建立应急救援组织，但应指定兼职应急救援人员\nC.可不建立应急救援组织，也可不指定兼职应急救援人员\nD.可不建立应急救援组织，但配备必要的应急救援器材设备", "options": {"A": "应当建立应急救援组织", "B": "可不建立应急救援组织，但应指定兼职应急救援人员", "C": "可不建立应急救援组织，也可不指定兼职应急救援人员", "D": "可不建立应急救援组织，但配备必要的应急救援器材设备"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 1480, "question": "临时宿舍的简易楼层高应控制在（\n）以内。\nA.一层\nB.二层\nC.三层\nD.四层", "options": {"A": "一层", "B": "二层", "C": "三层", "D": "四层"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1481, "question": "按照贮存物品的火灾危险性分类，可燃物体属于（\n）。\nA.甲\nB.丙\nC.乙\nD.丁", "options": {"A": "甲", "B": "丙", "C": "乙", "D": "丁"}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 1482, "question": "（\n）应当采取多种形式，加强对有关安全生产的法律、法规\n和安全生产知识的宣传，提高职工的安全生产意识。\nA.国务院有关部门\nB.国务院和地方各级人民执法部门\nC.县级以上人民政府\n\n=== 第492页 ===\nD.各级人民政府及其有关部门", "options": {"A": "国务院有关部门", "B": "国务院和地方各级人民执法部门", "C": "县级以上人民政府 === 第492页 ===", "D": "各级人民政府及其有关部门"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 1483, "question": "得了矽肺病的人主要是吸入了（\n）。\nA.硅酸盐\nB.二氧化硅粉尘\nC.金属尘\nD.混合性粉尘", "options": {"A": "硅酸盐", "B": "二氧化硅粉尘", "C": "金属尘", "D": "混合性粉尘"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1484, "question": "（\n）是指国务院有关主管部门对没有国家标准而又需要在全\n国某个行业范围内统一的技术要求所制定的技术规范。\nA.规范性文件\nB.强制性标准\nC.行业标准\nD.规章", "options": {"A": "规范性文件", "B": "强制性标准", "C": "行业标准", "D": "规章"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 1485, "question": "以下不属于建筑施工过程中“五大伤害事故”的是：（\n）。\nA.高处坠落\nB.机械伤害\nC.坍塌\nD.起重伤害", "options": {"A": "高处坠落", "B": "机械伤害", "C": "坍塌", "D": "起重伤害"}, "answer": "D", "type": "single", "category": "高处作业"}, {"id": 1486, "question": "违反相关规定，建筑施工企业接受转让安全生产许可证的，没\n\n=== 第493页 ===\n收违法所得，处（\n）的罚款；构成犯罪的，依法追究刑事责任。\nA.1 万元以上5 万元以下\nB.5 万元以上10 万元以下\nC.10 万元以上50 万元以下\nD.20 万元以上50 万元以下", "options": {"A": "1 万元以上5 万元以下", "B": "5 万元以上10 万元以下", "C": "10 万元以上50 万元以下", "D": "20 万元以上50 万元以下"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 1487, "question": "违法行为涉嫌犯罪的，行政机关应当及时将案件移送（\n）机\n关，依法追究刑事责任。\nA.公安\nB.检察\nC.司法\nD.上级", "options": {"A": "公安", "B": "检察", "C": "司法", "D": "上级"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1488, "question": "违法行为构成犯罪，人民法院判处拘役或者有期徒刑时，行政\n机关已经给予当事人行政拘留的，应当依法（\n）相应刑期。\nA.免除\nB.折抵\nC.减少\nD.扣除", "options": {"A": "免除", "B": "折抵", "C": "减少", "D": "扣除"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1489, "question": "危险性较大的分部分项工程施工时，应当安排（\n）现场监督。\nA.安全负责人\n\n=== 第494页 ===\nB.专职安全生产管理人员\nC.施工员\nD.栋号长", "options": {"A": "安全负责人 === 第494页 ===", "B": "专职安全生产管理人员", "C": "施工员", "D": "栋号长"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1490, "question": "事故发生地（\n）根据事故的情况，对涉嫌犯罪的，应当依法\n立案侦查，采取强制措施和侦查措施。\nA.人民政府\nB.人民法院\nC.公安机关\nD.安全生产监督管理部门", "options": {"A": "人民政府", "B": "人民法院", "C": "公安机关", "D": "安全生产监督管理部门"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 1491, "question": "施工现场安全由（\n）负责。\nA.建设单位\nB.监理单位\nC.建筑施工企业\nD.项目管理单位", "options": {"A": "建设单位", "B": "监理单位", "C": "建筑施工企业", "D": "项目管理单位"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1492, "question": "施工单位应当在施工现场入口处、施工起重机械、临时用电设\n施、脚手架、出入通道口、楼梯口等危险部位，设置明显的（\n）。\nA.安全提示标志\nB.安全警示标志\nC.安全指示标志\n\n=== 第495页 ===\nD.安全宣传标志", "options": {"A": "安全提示标志", "B": "安全警示标志", "C": "安全指示标志 === 第495页 ===", "D": "安全宣传标志"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 1493, "question": "（\n）场所的照明，电源电压不得大于24V。\nA.潮湿\nB.易触及带电体\nC.锅炉\nD.人防工程", "options": {"A": "潮湿", "B": "易触及带电体", "C": "锅炉", "D": "人防工程"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1494, "question": "如果使用双层或多层平台，应在上层底板设置出入口并在两平\n台底板之间设置可以安全通过的爬梯，两底板之间的最小高度应不小\n于（\n）m。\nA.0.5\nB.1.0\nC.1.5\nD.2.0", "options": {"A": "0.5", "B": "1.0", "C": "1.5", "D": "2.0"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1495, "question": "根据高处作业吊篮GB/T19155-2017，悬吊座椅椅座宽度应不小\n于（\n）mm。\nA.350\nB.400\nC.450\nD.500\n\n=== 第496页 ===", "options": {"A": "350", "B": "400", "C": "450", "D": "500 === 第496页 ==="}, "answer": "C", "type": "single", "category": "高处作业"}, {"id": 1496, "question": "当起升机构承载1.25 倍的极限工作载荷、平台按额定速度运行\n时，主制动器应能在（\n）mm 的距离内制动住平台。\nA.90\nB.100\nC.110\nD.120", "options": {"A": "90", "B": "100", "C": "110", "D": "120"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1497, "question": "当起升机构静态承载1.5 倍的极限工作载荷达（\n）min，主制\n动器应无滑移或蠕动现象。\nA.10\nB.15\nC.20\nD.25", "options": {"A": "10", "B": "15", "C": "20", "D": "25"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1498, "question": "手动起升机构应具有防止非控制运动或下降的措施，非控制运\n动指大于1/4 转的曲柄转动或大于（\n）°的手柄转动。\nA.8\nB.10\nC.15\nD.18", "options": {"A": "8", "B": "10", "C": "15", "D": "18"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1499, "question": "超载检测装置应在达到起升机构的（\n）倍极限工作载荷时或\n之前触发。\nA.1.1\nB.1.15\nC.1.2\nD.1.25", "options": {"A": "1.1", "B": "1.15", "C": "1.2", "D": "1.25"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1500, "question": "手动夹钳式起升机构应安装一装置以限制施加在操纵杆上的作\n用力，该装置的设置不能起升大于（\n）倍的极限工作载荷。\nA.1.2\nB.1.5\nC.2.0\nD.2.5", "options": {"A": "1.2", "B": "1.5", "C": "2.0", "D": "2.5"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1501, "question": "对于起升速度小于（\n）m/min 的动力夹钳式起升机构，其可\n靠性试验工作循环次数与手动夹钳式起升机构工作循环次数相同。\nA.1.0\nB.1.5\nC.2.0\nD.2.5", "options": {"A": "1.0", "B": "1.5", "C": "2.0", "D": "2.5"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1502, "question": "滑轮边缘与保护元件（例：挡绳杆、封板）之间的间隙应不大\n\n=== 第498页 ===\n于钢丝绳直径的（\n）倍。\nA.0.1\nB.0.2\nC.0.3\nD.0.4", "options": {"A": "0.1", "B": "0.2", "C": "0.3", "D": "0.4"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1503, "question": "绳槽的深度应不小于钢丝绳直径的（\n）倍。\nA.1.1\nB.1.2\nC.1.3\nD.1.4", "options": {"A": "1.1", "B": "1.2", "C": "1.3", "D": "1.4"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1504, "question": "钢丝绳进出滑轮相对中心线的最大偏角应小于或等于（\n）°。\nA.2\nB.3\nC.4\nD.5", "options": {"A": "2", "B": "3", "C": "4", "D": "5"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1505, "question": "针对手柄操作起升机构，起升极限工作载荷时，施加在手柄端\n部上的最大作用力应不大于（\n）N。\nA.300\nB.400\n\n=== 第499页 ===\nC.500\nD.600", "options": {"A": "300", "B": "400 === 第499页 ===", "C": "500", "D": "600"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1506, "question": "起升机构应能起升和下降范围的极限工作载荷为（\n）。\nA.100%～225%\nB.110%～235%\nC.125%～250%\nD.150%～275%", "options": {"A": "100%～225%", "B": "110%～235%", "C": "125%～250%", "D": "150%～275%"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1507, "question": "起升机构在承载（\n）倍的极限工作载荷时电动机应停转。\nA.1.5\nB.2.0\nC.2.5\nD.3.0", "options": {"A": "1.5", "B": "2.0", "C": "2.5", "D": "3.0"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1508, "question": "安装于悬挂装置上的两个独立驱动的起升机构，应使平台在无\n动力下降时，任何情况下纵向倾斜角度应不大于（\n）°。\nA.12\nB.13\nC.14\nD.15", "options": {"A": "12", "B": "13", "C": "14", "D": "15"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1509, "question": "当竖向洞口短边边长小于（\n）时，应采取封堵措施；当垂直\n洞口短边边长大于或等于（\n）时，应在临空一侧设置高度不小于\n1．2m 的防护栏杆，并应采用密目式安全立网或工具式栏板封闭，设\n置挡脚板。\nA.200mm；200mm\nB.300mm；300mm\nC.400mm；400mm\nD.500mm；500mm", "options": {"A": "200mm；200mm", "B": "300mm；300mm", "C": "400mm；400mm", "D": "500mm；500mm"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1510, "question": "从事特种设备生产的单位，单位名称或者单位地址变更的，应\n当自变更之日起（\n）内提出申请，由原发证部门办理变更手续。\nA.10 日\nB.15 日\nC.30 日\nD.60 日", "options": {"A": "10 日", "B": "15 日", "C": "30 日", "D": "60 日"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 1511, "question": "特种设备安装、改造、修理竣工后，施工单位应当在验收后（\n）\n内将有关技术资料移交给所有权人或者其委托的使用管理人。\nA.10 日\nB.15 日\nC.30 日\nD.60 日\n\n=== 第501页 ===", "options": {"A": "10 日", "B": "15 日", "C": "30 日", "D": "60 日 === 第501页 ==="}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 1512, "question": "启用已办理停用手续的特种设备，应当办理启用手续；启用已\n停用（\n）以上或者已超过原检验有效期的特种设备，还应当向特\n种设备检验机构申请检验。\nA.一个月\nB.三个月\nC.半年\nD.一年", "options": {"A": "一个月", "B": "三个月", "C": "半年", "D": "一年"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 1513, "question": "以下关于夯土机械说法错误的是？（\n）\nA.夯土机械的电源线应采用橡皮绝缘橡皮护套铜芯软电缆\nB.使用过程应有专人调整电缆，电缆长度不宜超过100m\nC.使用夯土机械应按规定穿戴绝缘用品\nD.电缆不应缠绕、扭结和被夯土机械跨越", "options": {"A": "夯土机械的电源线应采用橡皮绝缘橡皮护套铜芯软电缆", "B": "使用过程应有专人调整电缆，电缆长度不宜超过100m", "C": "使用夯土机械应按规定穿戴绝缘用品", "D": "电缆不应缠绕、扭结和被夯土机械跨越"}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 1514, "question": "以下关于焊接机械说法错误的是？（\n）\nA.电焊机应放置在防雨、干燥和通风良好的地方\nB.电焊机一次侧的电源电缆应绝缘良好，其长度宜为10m 左右\nC.焊接现场不得有易燃、易爆物品\nD.电焊机的外壳应可靠接地，不得串联接地", "options": {"A": "电焊机应放置在防雨、干燥和通风良好的地方", "B": "电焊机一次侧的电源电缆应绝缘良好，其长度宜为10m 左右", "C": "焊接现场不得有易燃、易爆物品", "D": "电焊机的外壳应可靠接地，不得串联接地"}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 1515, "question": "以下关于柴油发电机组说法错误的是？（\n）\n\n=== 第502页 ===\nA.移动式柴油发电机组应处于水平状态，放置稳固\nB.排烟管道应伸出室外，且严禁在室内存放储油桶\nC.柴油发电机的额定电压可以高于外电线路电源电压等级\nD.柴油发电机组的安装环境应选择靠近负荷中心", "options": {"A": "移动式柴油发电机组应处于水平状态，放置稳固", "B": "排烟管道应伸出室外，且严禁在室内存放储油桶", "C": "柴油发电机的额定电压可以高于外电线路电源电压等级", "D": "柴油发电机组的安装环境应选择靠近负荷中心"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1516, "question": "以下关于柴油发电机组说法错误的是：（\n）？\nA.柴油机及发电机的主要参数应达到使用说明书规定的指标，输出功\n率不得高于额定功率的85%\nB.机组运行不应有异响、剧烈振动、超温\nC.柴油机曲轴箱内机油量宜在机油尺上下刻度中间稍上位置\nD.各种仪表应齐全和灵敏可靠，数据指示应准确", "options": {"A": "柴油机及发电机的主要参数应达到使用说明书规定的指标，输出功 率不得高于额定功率的85%", "B": "机组运行不应有异响、剧烈振动、超温", "C": "柴油机曲轴箱内机油量宜在机油尺上下刻度中间稍上位置", "D": "各种仪表应齐全和灵敏可靠，数据指示应准确"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 1517, "question": "下列关于柴油发电机组说法错误的是？（\n）\nA.室外使用的柴油发电机组应搭设防护棚\nB.排烟管道应伸出室外，且严禁在室内存放储油桶\nC.当两台及以上发电机组并列运行时，可不装设同步装置\nD.柴油发电机组的安装应避开污染源的下风侧和易积水的地方", "options": {"A": "室外使用的柴油发电机组应搭设防护棚", "B": "排烟管道应伸出室外，且严禁在室内存放储油桶", "C": "当两台及以上发电机组并列运行时，可不装设同步装置", "D": "柴油发电机组的安装应避开污染源的下风侧和易积水的地方"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1518, "question": "以下关于柴油发电机组说法错误的是（\n）。\nA.柴油机曲轴箱内机油量宜在机油尺上下刻度最上位置\nB.当水温超过规定值时，节温装置应能自动打开\nC.风扇皮带松紧应适度\n\n=== 第503页 ===\nD.柴油机启动、加速性能应良好，怠速应平稳", "options": {"A": "柴油机曲轴箱内机油量宜在机油尺上下刻度最上位置", "B": "当水温超过规定值时，节温装置应能自动打开", "C": "风扇皮带松紧应适度 === 第503页 ===", "D": "柴油机启动、加速性能应良好，怠速应平稳"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 1519, "question": "以下关于柴油发电机冷却系统说法错误的是？（\n）\nA.冷却装置齐全可靠，运转时不得泄漏\nB.冷却系统的水质应经软化处理\nC.排水温度无特殊要求\nD.冷却系统的水质应经常更换并保持洁净", "options": {"A": "冷却装置齐全可靠，运转时不得泄漏", "B": "冷却系统的水质应经软化处理", "C": "排水温度无特殊要求", "D": "冷却系统的水质应经常更换并保持洁净"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1520, "question": "以下关于空气压缩机说法错误的是？（\n）\nA.排气量、工作压力参数均应达到额定指标\nB.管路敷设应合理、固定可靠\nC.进排气阀不应漏气，不得有严重积炭和积灰\nD.承受压力的储气罐罐体出厂时应附带合格证明，后期无需进行检测", "options": {"A": "排气量、工作压力参数均应达到额定指标", "B": "管路敷设应合理、固定可靠", "C": "进排气阀不应漏气，不得有严重积炭和积灰", "D": "承受压力的储气罐罐体出厂时应附带合格证明，后期无需进行检测"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1521, "question": "下列关于空气压缩机说法错误的是？（\n）\nA.各安全阀动作应灵敏可靠\nB.空气压缩机的电机温升应符合使用说明书的规定\nC.自动调节器调节功能应良好\nD.压力表应灵敏可靠，计测应正确即可，无需定期检测", "options": {"A": "各安全阀动作应灵敏可靠", "B": "空气压缩机的电机温升应符合使用说明书的规定", "C": "自动调节器调节功能应良好", "D": "压力表应灵敏可靠，计测应正确即可，无需定期检测"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 1522, "question": "受检单位对检验结果有异议的，可以在收到检验报告之日起\n（\n）日内，以书面形式向检验机构提出。检验机构应当在收到书\n\n=== 第504页 ===\n面异议之日起十五日内对受检单位提出的异议予以书面答复。\nA.5\nB.10\nC.15\nD.30", "options": {"A": "5", "B": "10", "C": "15", "D": "30"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1523, "question": "以下关于履带式单斗液压挖掘机制动及安全装置说法错误的\n是？（\n）\nA.先导控制开关杆工作应可靠有效\nB.当行走踏板处于自由状态、行走操纵杆处于中立位置时，行走制动\n器应自动处于行进状态\nC.当放开多路换向阀操纵杆后，操纵杆应自动更换位置，挖掘机的工\n作功能应能停止\nD.行走踏板、行走操纵杆工作时不应有异响", "options": {"A": "先导控制开关杆工作应可靠有效", "B": "当行走踏板处于自由状态、行走操纵杆处于中立位置时，行走制动 器应自动处于行进状态", "C": "当放开多路换向阀操纵杆后，操纵杆应自动更换位置，挖掘机的工 作功能应能停止", "D": "行走踏板、行走操纵杆工作时不应有异响"}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 1524, "question": "以下关于光轮压路机说法错误的是？（\n）\nA.主离合器接合应平稳、分离彻底，传递动力应有效\nB.变速器挡位应准确、定位可靠，不应有跳挡现象\nC.差速连锁装置无法克服单一后轮打滑\nD.侧传动运转应平稳，不应有冲击，齿轮润滑应良好", "options": {"A": "主离合器接合应平稳、分离彻底，传递动力应有效", "B": "变速器挡位应准确、定位可靠，不应有跳挡现象", "C": "差速连锁装置无法克服单一后轮打滑", "D": "侧传动运转应平稳，不应有冲击，齿轮润滑应良好"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1525, "question": "轮胎驱动振动压路机轮胎有下列现象之一时，可不进行更换：\n\n=== 第505页 ===\n（\n）。\nA.胎体帘线层有环形破裂及整圈分离\nB.胎面花纹已磨平\nC.胎侧有细微裂纹\nD.胎圈钢丝断裂", "options": {"A": "胎体帘线层有环形破裂及整圈分离", "B": "胎面花纹已磨平", "C": "胎侧有细微裂纹", "D": "胎圈钢丝断裂"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1526, "question": "以下关于轮胎压路机轮胎工作装置说法错误的是：（\n）。\nA.轮胎气压应符合使用说明书规定\nB.轮胎螺栓和螺母应完整齐全、紧固\nC.前轮机械摇摆悬挂装置应能保持机架水平，轮胎负荷应保持前重后\n轻\nD.刮泥板应符合使用要求，支架不应有变形和裂纹；刮泥板固定螺栓\n应紧固", "options": {"A": "轮胎气压应符合使用说明书规定", "B": "轮胎螺栓和螺母应完整齐全、紧固", "C": "前轮机械摇摆悬挂装置应能保持机架水平，轮胎负荷应保持前重后 轻", "D": "刮泥板应符合使用要求，支架不应有变形和裂纹；刮泥板固定螺栓 应紧固"}, "answer": "C", "type": "single", "category": "脚手架与模板工程"}, {"id": 1527, "question": "以下关于轮胎压路机轮胎洒水系统说法错误的是：（\n）。\nA.水泵及水泵离合器应完好\nB.水路应畅通，水管及喷头不应有堵塞\nC.水管及附件等应齐全\nD.冬季停止使用时，为保证能随时启用，系统内应保留部分积水", "options": {"A": "水泵及水泵离合器应完好", "B": "水路应畅通，水管及喷头不应有堵塞", "C": "水管及附件等应齐全", "D": "冬季停止使用时，为保证能随时启用，系统内应保留部分积水"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1528, "question": "以下关于平地机工作装置说法错误的是：（\n）。\nA.牵引架、回转圈、摆架等不应有变形、裂纹\n\n=== 第506页 ===\nB.铲刀应能升降、倾斜、侧移、引出和180°回转，回转应平稳，不\n应有阻滞\nC.回转驱动装置工作应平稳，不应有异响；齿轮油油面应达到油位检\n查孔标线\nD.刀片磨损不应超限，固定螺栓应紧固", "options": {"A": "牵引架、回转圈、摆架等不应有变形、裂纹 === 第506页 ===", "B": "铲刀应能升降、倾斜、侧移、引出和180°回转，回转应平稳，不 应有阻滞", "C": "回转驱动装置工作应平稳，不应有异响；齿轮油油面应达到油位检 查孔标线", "D": "刀片磨损不应超限，固定螺栓应紧固"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1529, "question": "关于流动式起重机检查评定的规定，下列说法错误的是？（\n）\nA.起重吊装作业前应编制专项施工方案\nB.专项施工方案应进行审核、审批\nC.超过一定规模的起重吊装及起重机械安装和拆卸工程，其专项施工\n方案应组织专家论证\nD.专项施工方案实施前，应在施工现场对班组进行口头交底", "options": {"A": "起重吊装作业前应编制专项施工方案", "B": "专项施工方案应进行审核、审批", "C": "超过一定规模的起重吊装及起重机械安装和拆卸工程，其专项施工 方案应组织专家论证", "D": "专项施工方案实施前，应在施工现场对班组进行口头交底"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 1530, "question": "关于流动式起重机检查评定的规定，以下说法错误的是？（\n）\nA.起重吊装作业前应编制专项施工方案\nB.专项施工方案应进行审核、审批\nC.超过一定规模的起重吊装工程应编制专项施工方案，须进行评审，\n无需进行专家论证\nD.专项施工方案实施前，应进行安全技术交底，并应有文字记录", "options": {"A": "起重吊装作业前应编制专项施工方案", "B": "专项施工方案应进行审核、审批", "C": "超过一定规模的起重吊装工程应编制专项施工方案，须进行评审， 无需进行专家论证", "D": "专项施工方案实施前，应进行安全技术交底，并应有文字记录"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 1531, "question": "关于流动式起重机使用的规定，以下说法错误的是？（\n）\nA.构件码放高度应满足防倾覆要求\n\n=== 第507页 ===\nB.操作平台面应满铺脚手板，并应固定牢固\nC.起重机回转未停稳时，不得反向动作\nD.起重机在满负荷或接近满负荷时，应及时缓慢降落臂架减小负载", "options": {"A": "构件码放高度应满足防倾覆要求 === 第507页 ===", "B": "操作平台面应满铺脚手板，并应固定牢固", "C": "起重机回转未停稳时，不得反向动作", "D": "起重机在满负荷或接近满负荷时，应及时缓慢降落臂架减小负载"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 1532, "question": "《建筑施工机械与设备钢筋加工机械安全要求》规定，钢筋加\n工机械的操作人员培训内容至少应包括以下哪几个方面？（\n）\nA.钢筋加工机械的工作原理及组成\nB.钢筋加工机械的检测项目及检测标准\nC.钢筋加工机械的液压原理及组成\nD.钢筋加工机械的安全防护装置的正确安装、调试、操作和维护", "options": {"A": "钢筋加工机械的工作原理及组成", "B": "钢筋加工机械的检测项目及检测标准", "C": "钢筋加工机械的液压原理及组成", "D": "钢筋加工机械的安全防护装置的正确安装、调试、操作和维护"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 1533, "question": "气瓶使用的规定，以下说法错误的是？（\n）\nA.气瓶使用时应安装减压器，乙炔瓶应安装回火防止器，并应灵敏可\n靠\nB.同时使用两种气体作业时，不同气瓶均应安装单向阀\nC.乙炔瓶与氧气瓶之间的距离不得少于10m，气瓶与明火之间的距离\n不得小于15m\nD.气瓶应设置防振圈、防护帽，并应分类存放", "options": {"A": "气瓶使用时应安装减压器，乙炔瓶应安装回火防止器，并应灵敏可 靠", "B": "同时使用两种气体作业时，不同气瓶均应安装单向阀", "C": "乙炔瓶与氧气瓶之间的距离不得少于10m，气瓶与明火之间的距离 不得小于15m", "D": "气瓶应设置防振圈、防护帽，并应分类存放"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 1534, "question": "采用多台千斤顶联合顶升时，应选用同一型号的千斤顶，并应\n保持同步，每个的额定起重量不得小于所分担重量的（\n）倍。\nA.1\n\n=== 第508页 ===\nB.1.2\nC.1.6\nD.1.8", "options": {"A": "1 === 第508页 ===", "B": "1.2", "C": "1.6", "D": "1.8"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 1535, "question": "电动葫芦在额定载荷制动时，下滑制动量不应大于（\n）mm。\nA.60\nB.70\nC.80\nD.90", "options": {"A": "60", "B": "70", "C": "80", "D": "90"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1536, "question": "滑轮组的上下定、动滑轮之间安全距离不应小于（\n）m。\nA.1\nB.1.5\nC.2\nD.2.5", "options": {"A": "1", "B": "1.5", "C": "2", "D": "2.5"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1537, "question": "起重机制动器的制动鼓表面磨损达到2.0mm 或制动带磨损超过\n原厚度（\n）%时，应予更换。\nA.40\nB.50\nC.60\nD.70\n\n=== 第509页 ===", "options": {"A": "40", "B": "50", "C": "60", "D": "70 === 第509页 ==="}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 1538, "question": "钢丝绳在卷筒上应逐圈靠紧，排列整齐，严禁互相错叠、离缝\n和挤压。钢丝绳缠满后，卷筒凸缘应高出2 倍及以上钢丝绳直径，钢\n丝绳全部放出时，钢丝绳在卷筒上保留的安全圈不应少于（\n）圈。\nA.4\nB.5\nC.6\nD.7", "options": {"A": "4", "B": "5", "C": "6", "D": "7"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1539, "question": "屋架、薄腹梁等重心较高的构件，应直立放置，除设支承垫木\n外，应在其两侧设置支撑使其稳定，支撑不得少于（\n）道。\nA.1\nB.2\nC.3\nD.4", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 1540, "question": "绑扎应平稳、牢固，绑扎钢丝绳与物体间的水平夹角应为：构\n件起吊时不得小于（\n）；构件扶直时不得小于60°。\nA.30°\nB.45°\nC.60°\nD.90°\n\n=== 第510页 ===", "options": {"A": "30°", "B": "45°", "C": "60°", "D": "90° === 第510页 ==="}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1541, "question": "履带吊行走链条不应有偏磨、损伤；上部履带挠度应在（\n）\n之间。\nA.30mm～50mm\nB.40mm～60mm\nC.50mm～70mm\nD.70mm～90mm", "options": {"A": "30mm～50mm", "B": "40mm～60mm", "C": "50mm～70mm", "D": "70mm～90mm"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1542, "question": "起重机的行驶跑偏量不应大于（\n）cm。\nA.10\nB.15\nC.20\nD.25", "options": {"A": "10", "B": "15", "C": "20", "D": "25"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 1543, "question": "司机室在门窗关闭的状态下，司机耳旁噪声不应大于（\n）dB。\nA.75\nB.80\nC.85\nD.90", "options": {"A": "75", "B": "80", "C": "85", "D": "90"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1544, "question": "汽车起重机作业前，必须保证所有轮胎离地，且车架上安装的\n回转支承平面倾斜度不应大于（\n）%。\n\n=== 第511页 ===\nA.0.5\nB.1\nC.1.5\nD.2", "options": {"A": "0.5", "B": "1", "C": "1.5", "D": "2"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 1545, "question": "汽车起重机中的液压系统中应设有防止过载和液压冲击的安全\n装置；安全溢流阀的调整压力不得大于系统额定工作压力的（\n）%；\n系统额定工作压力不得大于液压泵的额定压力。\nA.100\nB.110\nC.120\nD.150", "options": {"A": "100", "B": "110", "C": "120", "D": "150"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 1546, "question": "两台塔机之间的最小架设距离应处于低位的塔机起重臂端部与\n另一台塔机塔身之间至少有（\n）m 的距离；处于高位塔机的最低\n位置的部件与低位塔机中处于最高位置部件之间的垂直距离不应小\n于（\n）m。\nA.1；2\nB.2；2\nC.2；1\nD.2；3", "options": {"A": "1；2", "B": "2；2", "C": "2；1", "D": "2；3"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 1547, "question": "塔式起重机轨距允许误差不应大于公称值的（\n），其绝对值\n不应大于6mm。\nA.1/500\nB.1/1000\nC.1/1500\nD.1/2000", "options": {"A": "1/500", "B": "1/1000", "C": "1/1500", "D": "1/2000"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 1548, "question": "钢轨接头间隙不应大于4mm；与另一侧钢轨接头的错开距离不\n应小于（\n）m；接头处两轨顶高差不应大于2mm。\nA.1\nB.1.5\nC.2\nD.2.5", "options": {"A": "1", "B": "1.5", "C": "2", "D": "2.5"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1549, "question": "塔机安装后，轨道顶面纵横方向上的倾斜度，对上回转的塔机\n不应大于（\n）；对下回转的塔机不应大于5／1000；在轨道全程中，\n轨道顶面任意两点的高差应小于100mm。\nA.1/1000\nB.2/1000\nC.3/1000\nD.5/1000", "options": {"A": "1/1000", "B": "2/1000", "C": "3/1000", "D": "5/1000"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1550, "question": "对塔式起重机金属结构、轨道及所有电气设备的金属外壳、金\n属管线和安全照明的变压器低压侧等应可靠接地，接地电阻不应大于\n（\n）Ω；重复接地电阻不应大于10Ω。\nA.1\nB.4\nC.10\nD.100", "options": {"A": "1", "B": "4", "C": "10", "D": "100"}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 1551, "question": "起重机主梁、端梁、平衡梁（支腿）、小车架不应有可见裂纹和\n塑性变形；当腐蚀超过原厚度的（\n）%时，应予报废。\nA.10\nB.15\nC.20\nD.30", "options": {"A": "10", "B": "15", "C": "20", "D": "30"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 1552, "question": "桥式起重机运行机构扫轨器应完好，扫轨板底面与轨顶间隙宜\n为（\n）。\nA.5mm～10mm\nB.10mm～15mm\nC.15mm～20mm\nD.25mm～30mm", "options": {"A": "5mm～10mm", "B": "10mm～15mm", "C": "15mm～20mm", "D": "25mm～30mm"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 1553, "question": "网架整体吊装时，应保证各吊点起升及下降的同步性。相邻两\n拨杆间或相邻两吊点组的合力点间的相对高差，不得大于其距离的1\n／400 和（\n）mm，亦可通过验算确定。\nA.100\nB.200\nC.300\nD.400", "options": {"A": "100", "B": "200", "C": "300", "D": "400"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 1554, "question": "房屋建筑工程施工的安全管理检查评定时，下列选项中不是施\n工升降机检查评定的保证项目的是（\n）。\nA.电气安全\nB.安全装置\nC.限位装置\nD.滑轮与对重", "options": {"A": "电气安全", "B": "安全装置", "C": "限位装置", "D": "滑轮与对重"}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 1555, "question": "当电压为1kV 以下时，塔式起重机和输电线路之间的安全距离\n沿水平方向为（\n）m。\nA.4\nB.1\nC.1.5\nD.2", "options": {"A": "4", "B": "1", "C": "1.5", "D": "2"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 1556, "question": "安装高度超过（\n）m 的物料提升机应必须使用附墙架。\nA.25\nB.30\nC.35\nD.40", "options": {"A": "25", "B": "30", "C": "35", "D": "40"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1557, "question": "为确保塔式起重机的电气安全，接地桩应采用镀锌钢管或角钢，\n打入地下深度应不小于（\n）m。\nA.1\nB.1.5\nC.2\nD.2.5", "options": {"A": "1", "B": "1.5", "C": "2", "D": "2.5"}, "answer": "D", "type": "single", "category": "用电安全"}, {"id": 1558, "question": "固定式配电箱、开关箱的中心点与地面垂直距离应为（\n）m。\nA.1.0～1.2\nB.1.2～1.4\nC.1.4～1.6\nD.1.6～1.8", "options": {"A": "1.0～1.2", "B": "1.2～1.4", "C": "1.4～1.6", "D": "1.6～1.8"}, "answer": "C", "type": "single", "category": "用电安全"}, {"id": 1559, "question": "钢丝绳直径为20mm，选择钢丝绳夹时，绳夹的数量不得少于\n（\n）个。\nA.3\n\n=== 第516页 ===\nB.4\nC.5\nD.7", "options": {"A": "3 === 第516页 ===", "B": "4", "C": "5", "D": "7"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1560, "question": "凡架设高度在（\n）m 及以下的物料提升机为低架物料提升机。\nA.30\nB.35\nC.40\nD.45", "options": {"A": "30", "B": "35", "C": "40", "D": "45"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1561, "question": "当吊装（\n）m 以上跨度屋架时，应采用钢管横吊梁。\nA.15\nB.18\nC.21\nD.24", "options": {"A": "15", "B": "18", "C": "21", "D": "24"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 1562, "question": "物料提升机的卷扬机卷筒与钢丝绳直径的比值应不小于（\n）。\nA.25\nB.30\nC.35\nD.40", "options": {"A": "25", "B": "30", "C": "35", "D": "40"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1563, "question": "滑轮的滑轮槽底磨损量超过钢丝绳直径的（\n）%，滑轮应予\n报废。\nA.10\nB.15\nC.20\nD.25", "options": {"A": "10", "B": "15", "C": "20", "D": "25"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1564, "question": "起重量在（\n）kN 及以上的起重设备安装工程为超过一定规\n模的危险性较大的分部分项工程。\nA.200\nB.250\nC.300\nD.350", "options": {"A": "200", "B": "250", "C": "300", "D": "350"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 1565, "question": "两台以上蛙式打夯机同时作业时，左右间距不得小于（\n）m。\nA.3\nB.4\nC.5\nD.6", "options": {"A": "3", "B": "4", "C": "5", "D": "6"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1566, "question": "挖掘机作业时（\n）不得在铲斗回转半径范围内停留。\nA.任何人\n\n=== 第518页 ===\nB.非工作人员\nC.工程技术人员\nD.围观群众", "options": {"A": "任何人 === 第518页 ===", "B": "非工作人员", "C": "工程技术人员", "D": "围观群众"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1567, "question": "现场防火安全要求，乙炔瓶应放置在距离明火至少（\n）m 以\n外的地方，严禁倒放。\nA.5\nB.10\nC.12\nD.15", "options": {"A": "5", "B": "10", "C": "12", "D": "15"}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 1568, "question": "当风速超过（\n）级应将桩机顺风向停置，并增加缆风绳。\nA.5\nB.6\nC.7\nD.8", "options": {"A": "5", "B": "6", "C": "7", "D": "8"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1569, "question": "物料提升机应安装上行程限位并灵敏可靠，安全越程不应小于\n（\n）m。\nA.2\nB.2.5\nC.3\n\n=== 第519页 ===\nD.3.5", "options": {"A": "2", "B": "2.5", "C": "3 === 第519页 ===", "D": "3.5"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1570, "question": "物料提升机风缆绳与地面的夹角不应大于（\n）。\nA.45°\nB.50°\nC.60°\nD.65°", "options": {"A": "45°", "B": "50°", "C": "60°", "D": "65°"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1571, "question": "安装管道时必须有已完结构或操作平台为立足点，严禁在安装\n中的管道上（\n）。\nA.堆物\nB.站立\nC.行走\nD.站立和行走", "options": {"A": "堆物", "B": "站立", "C": "行走", "D": "站立和行走"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1572, "question": "潜水泵应直立于水中，水深不得小于（\n）m。\nA.0.5\nB.1\nC.1.5\nD.2", "options": {"A": "0.5", "B": "1", "C": "1.5", "D": "2"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1573, "question": "跨度等于或超过（\n）m 的装卸桥和门式起重机，应装偏斜调\n\n=== 第520页 ===\n整和显示装置。\nA.35\nB.40\nC.45\nD.50", "options": {"A": "35", "B": "40", "C": "45", "D": "50"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 1574, "question": "钢平台安装时，钢丝绳应采用专用的挂钩挂牢，采取其他方式\n时卡头的卡子不得少于（\n）。\nA.5 个\nB.4 个\nC.3 个\nD.2 个", "options": {"A": "5 个", "B": "4 个", "C": "3 个", "D": "2 个"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1575, "question": "交流电焊机空载电压为60—80V，工作电压为（\n）V。\nA.20\nB.30\nC.40\nD.50", "options": {"A": "20", "B": "30", "C": "40", "D": "50"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1576, "question": "钢平台左右两侧必须装置（\n）的防护栏杆。\nA.流动\nB.固定\n\n=== 第521页 ===\nC.一道栏杆\nD.挂设平网", "options": {"A": "流动", "B": "固定 === 第521页 ===", "C": "一道栏杆", "D": "挂设平网"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1577, "question": "滑轮绳槽壁厚磨损量达原壁厚的（\n）%，滑轮应予报废。\nA.5\nB.10\nC.15\nD.20", "options": {"A": "5", "B": "10", "C": "15", "D": "20"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1578, "question": "采用双机抬吊作业时，每台起重机荷载不得超过允许荷载的\n（\n）。\nA.0.8\nB.0.85\nC.0.9\nD.0.95", "options": {"A": "0.8", "B": "0.85", "C": "0.9", "D": "0.95"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 1579, "question": "使用挖掘机拆除构筑物时，在挖掘机驾驶室与被拆除构筑物之\n间应留有（\n）空间。\nA.1m\nB.2m\nC.3m\nD.构筑物倒塌的\n\n=== 第522页 ===", "options": {"A": "1m", "B": "2m", "C": "3m", "D": "构筑物倒塌的 === 第522页 ==="}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1580, "question": "施工升降机的吊笼内空净高度不得小于（\n）m。\nA.2\nB.2.2\nC.2.4\nD.2.8", "options": {"A": "2", "B": "2.2", "C": "2.4", "D": "2.8"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 1581, "question": "施工升降机安全装置的安全检查评定要求，施工升降机防坠安\n全器只能在有效的标定期限内使用，有效标定期限不应超过（\n）\n年。\nA.1\nB.2\nC.3\nD.4", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 1582, "question": "房屋建筑工程施工安全管理检查评定时，下列选项中不是物料\n提升机检查评定的一般项目的是（\n）。\nA.基础与导轨架\nB.通信装置\nC.附墙架与缆风绳\nD.避雷装置", "options": {"A": "基础与导轨架", "B": "通信装置", "C": "附墙架与缆风绳", "D": "避雷装置"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1583, "question": "房屋建筑工程施工安全管理检查评定时，下列选项中不是塔式\n起重机检查评定的保证项目的是（\n）。\nA.荷载限制装置\nB.行程限位装置\nC.结构设施\nD.保护装置", "options": {"A": "荷载限制装置", "B": "行程限位装置", "C": "结构设施", "D": "保护装置"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 1584, "question": "吊篮在静力试验时，应有超过（\n）%额定载重量的能力。\nA.25\nB.30\nC.40\nD.50", "options": {"A": "25", "B": "30", "C": "40", "D": "50"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1585, "question": "吊篮提升机的电动机扭转转矩不低于（\n）%的额定转矩。\nA.120\nB.150\nC.180\nD.210", "options": {"A": "120", "B": "150", "C": "180", "D": "210"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1586, "question": "主要用来夹紧钢丝绳末端或将两根钢丝绳固定在一起的是\n（\n）。\nA.卡环\n\n=== 第524页 ===\nB.绳夹\nC.吊钩\nD.吊环", "options": {"A": "卡环 === 第524页 ===", "B": "绳夹", "C": "吊钩", "D": "吊环"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1587, "question": "钢丝绳在卷筒上缠绕时，应（\n）。\nA.逐圈紧密地排列整齐，不应错叠或离缝\nB.逐圈排列，不可以错叠但可离缝\nC.逐圈紧密地排列整齐，但可错叠或离缝\nD.随意排列，但不能错叠", "options": {"A": "逐圈紧密地排列整齐，不应错叠或离缝", "B": "逐圈排列，不可以错叠但可离缝", "C": "逐圈紧密地排列整齐，但可错叠或离缝", "D": "随意排列，但不能错叠"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1588, "question": "现场防火安全要求，电焊导线中间不应有接头，如果必须设有\n接头，其接头处要远离易燃、易爆物（\n）m 以外。\nA.5\nB.10\nC.12\nD.15", "options": {"A": "5", "B": "10", "C": "12", "D": "15"}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 1589, "question": "钢丝绳用绳卡连接时，钢丝绳直径为7～16mm 时，绳卡不少于\n（\n）个。\nA.3\nB.4\nC.5\n\n=== 第525页 ===\nD.6", "options": {"A": "3", "B": "4", "C": "5 === 第525页 ===", "D": "6"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1590, "question": "当采用绳卡固接时，绳卡螺栓宜拧紧到使两绳直径高度压扁\n（\n）。\nA.1/3\nB.2/3\nC.1/4\nD.2/5", "options": {"A": "1/3", "B": "2/3", "C": "1/4", "D": "2/5"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1591, "question": "钢丝绳的安全系数是（\n）。\nA.钢丝绳破断拉力与允许拉力的比\nB.钢丝绳允许拉力与破断拉力的比\nC.钢丝的破断拉力与允许应力的比\nD.随意定", "options": {"A": "钢丝绳破断拉力与允许拉力的比", "B": "钢丝绳允许拉力与破断拉力的比", "C": "钢丝的破断拉力与允许应力的比", "D": "随意定"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1592, "question": "钢丝绳在破断前一般有（\n）预兆，容易检查、便于预防事故。\nA.表面光亮\nB.生锈\nC.断丝、断股\nD.表面有泥", "options": {"A": "表面光亮", "B": "生锈", "C": "断丝、断股", "D": "表面有泥"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 1593, "question": "不得用挖掘机铲斗（\n）。\n\n=== 第526页 ===\nA.吊运物料\nB.助推机械\nC.牵引机械\nD.运料", "options": {"A": "吊运物料", "B": "助推机械", "C": "牵引机械", "D": "运料"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1594, "question": "木工机械应安装（\n）开关。\nA.按钮\nB.倒顺开关\nC.闸刀\nD.负荷开关", "options": {"A": "按钮", "B": "倒顺开关", "C": "闸刀", "D": "负荷开关"}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 1595, "question": "焊接用电缆线应采用（\n）。\nA.多股细铜线\nB.多股细铝线\nC.单股铜线\nD.单股铝线", "options": {"A": "多股细铜线", "B": "多股细铝线", "C": "单股铜线", "D": "单股铝线"}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 1596, "question": "手持电动工具由（\n）进行定期检查。\nA.安全员\nB.专业电工\nC.操作人员\nD.技术负责人\n\n=== 第527页 ===", "options": {"A": "安全员", "B": "专业电工", "C": "操作人员", "D": "技术负责人 === 第527页 ==="}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1597, "question": "塔式起重机最基本的工作机构包括（\n）。\nA.起升机构、变幅机构、回转机构和行走机构\nB.起升机构、限位机构、回转机构和行走机构\nC.起升机构、变幅机构、回转机构和自升机构\nD.起升机构、限位机构、回转机构和自升机构", "options": {"A": "起升机构、变幅机构、回转机构和行走机构", "B": "起升机构、限位机构、回转机构和行走机构", "C": "起升机构、变幅机构、回转机构和自升机构", "D": "起升机构、限位机构、回转机构和自升机构"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 1598, "question": "附着式升降脚手架的防倾装置在升降和使用状态下，位于在同\n一竖向平面的防倾装置均不得少于（\n）处。\nA.1\nB.2\nC.3\nD.4", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 1599, "question": "（\n）能够防止塔机超载、避免由于严重超载而引起塔机的倾\n覆或折臂等恶性事故。\nA.力矩限制器\nB.吊钩保险\nC.行程限制器\nD.幅度限制器", "options": {"A": "力矩限制器", "B": "吊钩保险", "C": "行程限制器", "D": "幅度限制器"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 1600, "question": "塔式起重机工作时，风速应低于（\n）级。\n\n=== 第528页 ===\nA.4\nB.5\nC.6\nD.7", "options": {"A": "4", "B": "5", "C": "6", "D": "7"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 1601, "question": "在有建筑物的场所，应注意起重机的尾部与建筑物及建筑物外\n围施工设施之间的距离不小于（\n）m。\nA.1\nB.1.5\nC.0.6\nD.2", "options": {"A": "1", "B": "1.5", "C": "0.6", "D": "2"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 1602, "question": "多塔作业时，处于高位的塔机（吊钩升至最高点）与低位塔机\n的垂直距离在任何情况下不得小于（\n）。\nA.1m\nB.1.5m\nC.2m\nD.3m", "options": {"A": "1m", "B": "1.5m", "C": "2m", "D": "3m"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1603, "question": "下列对物料提升机使用的叙述，（\n）是正确的。\nA.只准运送物料，严禁载人上下\nB.一般情况下不准载人上下，遇有紧急情况可以载人上下\n\n=== 第529页 ===\nC.安全管理人员检查时可以乘坐吊笼上下\nD.维修人员可以乘坐吊笼上下", "options": {"A": "只准运送物料，严禁载人上下", "B": "一般情况下不准载人上下，遇有紧急情况可以载人上下 === 第529页 ===", "C": "安全管理人员检查时可以乘坐吊笼上下", "D": "维修人员可以乘坐吊笼上下"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1604, "question": "物料提升机按结构形式分类，分为（\n）。\nA.龙门架式和井架式\nB.上回转式和下回转式\nC.高架和低架\nD.行走式和固定式", "options": {"A": "龙门架式和井架式", "B": "上回转式和下回转式", "C": "高架和低架", "D": "行走式和固定式"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1605, "question": "物料提升机标准节采用螺栓连接，不得采用（\n）以下的螺栓，\n强度等级不得小于8.8 级。\nA.M12\nB.M16\nC.M18\nD.M10", "options": {"A": "M12", "B": "M16", "C": "M18", "D": "M10"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 1606, "question": "物料提升机的提升钢丝绳安全系数一般取（\n）。\nA.5\nB.6\nC.7\nD.8", "options": {"A": "5", "B": "6", "C": "7", "D": "8"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1607, "question": "房屋建筑工程施工安全管理检查评定时，下列选项中不是物料\n提升机检查评定的保证项目的是（\n）。\nA.安全装置\nB.动力与传动\nC.防护设施\nD.钢丝绳", "options": {"A": "安全装置", "B": "动力与传动", "C": "防护设施", "D": "钢丝绳"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1608, "question": "装载机在沟槽边卸料时，必须设专人指挥，装载机前轮应与沟\n槽边缘保持不小于（\n）m 的安全距离，并设置挡木。\nA.1.2\nB.1.5\nC.1.8\nD.2", "options": {"A": "1.2", "B": "1.5", "C": "1.8", "D": "2"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1609, "question": "配电箱、开关箱应装设端正、牢固。移动式配电箱、开关箱应\n装设在固定、稳定的支架上。其中心点与地面的垂直距离宜为（\n）\nm。\nA.0.8～1\nB.0.8～1.2\nC.0.8～1.4\nD.0.8～1.6", "options": {"A": "0.8～1", "B": "0.8～1.2", "C": "0.8～1.4", "D": "0.8～1.6"}, "answer": "D", "type": "single", "category": "脚手架与模板工程"}, {"id": 1610, "question": "一般场所开关箱中漏电保护器，其额定漏电动作电流不大于\n（\n）。\nA.10mA\nB.20mA\nC.30mA\nD.50mA", "options": {"A": "10mA", "B": "20mA", "C": "30mA", "D": "50mA"}, "answer": "C", "type": "single", "category": "用电安全"}, {"id": 1611, "question": "吊篮的主要受力构件产生永久变形而不能修复时，应予以（\n）。\nA.修改\nB.矫正\nC.报废\nD.继续使用", "options": {"A": "修改", "B": "矫正", "C": "报废", "D": "继续使用"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1612, "question": "攀登的用具、结构构造上必须牢固可靠。供人上下的踏板其使\n用荷载不应大于（\n）。\nA.1000N\nB.1100N\nC.1200N\nD.1300N", "options": {"A": "1000N", "B": "1100N", "C": "1200N", "D": "1300N"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1613, "question": "静作用压路机在施工过程中，要求实际含水量不超过最佳含水\n量的2﹪，也不低于（\n），否则应采取措施。\n\n=== 第532页 ===\nA.3%\nB.6%\nC.9%\nD.12%", "options": {"A": "3%", "B": "6%", "C": "9%", "D": "12%"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1614, "question": "振捣器作业时应使用移动配电箱，电缆线长度不应超过（\n）\nm。\nA.10\nB.15\nC.20\nD.30", "options": {"A": "10", "B": "15", "C": "20", "D": "30"}, "answer": "D", "type": "single", "category": "用电安全"}, {"id": 1615, "question": "吊篮钢丝绳的安全系数不应小于（\n）。\nA.7\nB.8\nC.9\nD.10", "options": {"A": "7", "B": "8", "C": "9", "D": "10"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1616, "question": "氧气瓶在使用时环境温度不得超过（\n）。\nA.40℃\nB.50℃\nC.60℃\n\n=== 第533页 ===\nD.70℃", "options": {"A": "40℃", "B": "50℃", "C": "60℃ === 第533页 ===", "D": "70℃"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1617, "question": "塔吊接地电阻值不大于（\n）Ω。\nA.30\nB.20\nC.10\nD.4", "options": {"A": "30", "B": "20", "C": "10", "D": "4"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 1618, "question": "某公司在一工地用吊篮进行外装修作业时，施工员指派名抹灰\n工升吊篮，由于吊篮未挂保险钢丝绳，在上升时突然一个倒链急剧下\n滑，吊篮随即倾斜，由于一作业人员未系安全带，从吊篮坠落死亡。\n下列关于施工员布置这项工作的说法正确的是（\n）。\nA.事故责任在于设备，与施工员无关\nB.可以安排未经培训的抹灰工操作吊篮的升降\nC.施工现场的工作布置由施工员安排，没有违章指挥\nD.抹灰工对于施工员的违章指挥可以拒绝接受", "options": {"A": "事故责任在于设备，与施工员无关", "B": "可以安排未经培训的抹灰工操作吊篮的升降", "C": "施工现场的工作布置由施工员安排，没有违章指挥", "D": "抹灰工对于施工员的违章指挥可以拒绝接受"}, "answer": "D", "type": "single", "category": "高处作业"}, {"id": 1619, "question": "Ⅱ类手持式电动工具适用场所是（\n）。\nA.潮湿场所\nB.金属容器内\nC.地沟中\nD.管道内\n\n=== 第534页 ===", "options": {"A": "潮湿场所", "B": "金属容器内", "C": "地沟中", "D": "管道内 === 第534页 ==="}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1620, "question": "高度在24m 以上的封闭性扣件式钢管脚手架，除拐角应设置横\n向斜撑外，中间应每隔（\n）跨设置一道。\nA.3\nB.4\nC.5\nD.6", "options": {"A": "3", "B": "4", "C": "5", "D": "6"}, "answer": "D", "type": "single", "category": "脚手架与模板工程"}, {"id": 1621, "question": "在地沟、管道内等狭窄场所使用手持式电动工具时，必须选用\n（\n）。\nA.Ⅰ类工具\nB.塑料外壳，Ⅱ类工具\nC.金属外壳，Ⅱ类工具\nD.Ⅲ类工具", "options": {"A": "Ⅰ类工具", "B": "塑料外壳，Ⅱ类工具", "C": "金属外壳，Ⅱ类工具", "D": "Ⅲ类工具"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1622, "question": "电平刨作业时，长于（\n）m 的木料应由两人配合操作。\nA.1\nB.2\nC.3\nD.4", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1623, "question": "木工机械距开关箱水平距离不得大于（\n），以便发生故障时，\n\n=== 第535页 ===\n迅速切断电源。\nA.1m\nB.2m\nC.3m\nD.4m", "options": {"A": "1m", "B": "2m", "C": "3m", "D": "4m"}, "answer": "C", "type": "single", "category": "用电安全"}, {"id": 1624, "question": "通常气焊所用的可燃气体是（\n）。\nA.乙炔气\nB.氢气\nC.四氯化氮\nD.氧气", "options": {"A": "乙炔气", "B": "氢气", "C": "四氯化氮", "D": "氧气"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1625, "question": "混凝土搅拌机械操作工的主要职业危害不包括（\n）。\nA.粉尘\nB.辐射\nC.高温\nD.噪声", "options": {"A": "粉尘", "B": "辐射", "C": "高温", "D": "噪声"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1626, "question": "使用有毒化学品时，劳动者应正确使用防护工具，在作业点的\n（\n）施工。\nA.上风向\nB.下风向\n\n=== 第536页 ===\nC.左风向\nD.右风向", "options": {"A": "上风向", "B": "下风向 === 第536页 ===", "C": "左风向", "D": "右风向"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1627, "question": "下列哪种灭火设施不适用于扑灭电器火灾？（\n）\nA.水\nB.干粉剂灭火剂\nC.砂子\nD.干燥的石粉", "options": {"A": "水", "B": "干粉剂灭火剂", "C": "砂子", "D": "干燥的石粉"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 1628, "question": "吊篮工作钢丝绳最小直径不应小于（\n）mm。\nA.4\nB.5\nC.6\nD.7", "options": {"A": "4", "B": "5", "C": "6", "D": "7"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1629, "question": "插入式振动器在搬运时应当（\n）。\nA.切断电源\nB.使电动机停止运行\nC.用软管托拉\nD.无要求", "options": {"A": "切断电源", "B": "使电动机停止运行", "C": "用软管托拉", "D": "无要求"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1630, "question": "临时木工间、油漆间和木、机具间等每（\n）配备一只种类合\n\n=== 第537页 ===\n适的灭火器。\nA.15m²\nB.20m²\nC.25m²\nD.30m²", "options": {"A": "15m²", "B": "20m²", "C": "25m²", "D": "30m²"}, "answer": "C", "type": "single", "category": "消防安全"}, {"id": 1631, "question": "施工现场的消火栓泵应采用专用消防配电线路，专用消防配电\n线路应自施工现场总配电箱的总断路器（\n）接入，且应保持不间\n断供电。\nA.下端\nB.接地处\nC.上端\nD.分段", "options": {"A": "下端", "B": "接地处", "C": "上端", "D": "分段"}, "answer": "C", "type": "single", "category": "用电安全"}, {"id": 1632, "question": "推土机在深沟、基坑或陡坡地区作业时，应有专人指挥，其垂\n直边坡深度一般不超过（\n）m。\nA.1\nB.2\nC.3\nD.4", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "B", "type": "single", "category": "基坑工程"}, {"id": 1633, "question": "可燃材料宜存放于库房内，露天存放时，应分类成垛堆放，垛\n\n=== 第538页 ===\n高不应超过（\n）m，单垛体积不应超过（\n）m³。\nA.2；50\nB.2；60\nC.1；50\nD.1；60", "options": {"A": "2；50", "B": "2；60", "C": "1；50", "D": "1；60"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1634, "question": "气瓶应分类储存，空瓶和实瓶同库存放时，应分开放置，空瓶\n和实瓶的间距不应小于（\n）m。\nA.1.5\nB.2\nC.2.5\nD.3", "options": {"A": "1.5", "B": "2", "C": "2.5", "D": "3"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1635, "question": "甲建筑公司承建乙市一隧道项目，现缺乏一种进口挖掘机，公\n司领导决定采用租赁方式向乙市建筑机械租赁公司租赁，以节约资金。\n原乙建筑机械租赁公司的此种进口挖掘机确实性能良好，但缺少产品\n合格证，下列说法正确的是（\n）。\nA.不能出租\nB.可以出租\nC.经乙市建设局批准后可以出租\nD.经乙市人民政府批准后可以出租", "options": {"A": "不能出租", "B": "可以出租", "C": "经乙市建设局批准后可以出租", "D": "经乙市人民政府批准后可以出租"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1636, "question": "电焊机二次线应使用专用焊把线，（\n）到位，焊把线不得有\n裸露接头，严禁借用金属管道、脚手架等金属物代替导线使用。\nA.单线\nB.双线\nC.保护零线\nD.工作零线", "options": {"A": "单线", "B": "双线", "C": "保护零线", "D": "工作零线"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 1637, "question": "移动式操作平台的面积不应超过（\n）㎡。\nA.5\nB.10\nC.15\nD.20", "options": {"A": "5", "B": "10", "C": "15", "D": "20"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1638, "question": "氧气瓶与明火的距离不小于（\n）m 并不得靠近热源和电器设\n备。\nA.4\nB.6\nC.8\nD.10", "options": {"A": "4", "B": "6", "C": "8", "D": "10"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1639, "question": "物料提升机的卷扬机卷筒边缘外周至最外层钢丝绳的距离应不\n小于钢丝绳直径的（\n）倍。\n\n=== 第540页 ===\nA.2\nB.2.5\nC.3\nD.3.5", "options": {"A": "2", "B": "2.5", "C": "3", "D": "3.5"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1640, "question": "物料提升机的导轨架垂直度偏差不应大于导轨架高度的（\n）%。\nA.0.1\nB.0.15\nC.0.2\nD.0.25", "options": {"A": "0.1", "B": "0.15", "C": "0.2", "D": "0.25"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1641, "question": "塔式起重机行程限位装置的安全检查评定要求，回转限位正反\n两个方向动作时，臂架旋转角度应不大于±（\n）。\nA.360°\nB.480°\nC.540°\nD.720°", "options": {"A": "360°", "B": "480°", "C": "540°", "D": "720°"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 1642, "question": "人货两用施工升降机提升吊笼钢丝绳的安全系数不得小于\n（\n）。\nA.6\nB.8\n\n=== 第541页 ===\nC.10\nD.12", "options": {"A": "6", "B": "8 === 第541页 ===", "C": "10", "D": "12"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 1643, "question": "塔式起重机的安装时，（\n）应符合规定要求，严禁用其他代\n用品代用。应使用力矩扳手或专用工具紧固联接螺栓。\nA.避雷装置\nB.电缆线固定装置\nC.联接件及其防松防脱件\nD.操作平台连接螺栓", "options": {"A": "避雷装置", "B": "电缆线固定装置", "C": "联接件及其防松防脱件", "D": "操作平台连接螺栓"}, "answer": "C", "type": "single", "category": "用电安全"}, {"id": 1644, "question": "吊篮的安全锁承受静力试验荷载时，静置（\n）min，不得有\n任何滑移现象。\nA.6\nB.8\nC.10\nD.12", "options": {"A": "6", "B": "8", "C": "10", "D": "12"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1645, "question": "当电压为110kV 时，塔式起重机和输电线路之间的最小安全距\n离沿水平方向为（\n）m。\nA.2\nB.4\nC.6\n\n=== 第542页 ===\nD.1.5", "options": {"A": "2", "B": "4", "C": "6 === 第542页 ===", "D": "1.5"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 1646, "question": "在潮湿作业场所或金属构架上等导电性能良好的作业场所，应\n使用（\n）工具。\nA.Ｉ类或Ⅱ类\nB.Ｉ类或Ⅲ类\nC.Ⅱ类或Ⅲ类\nD.均可使用", "options": {"A": "Ｉ类或Ⅱ类", "B": "Ｉ类或Ⅲ类", "C": "Ⅱ类或Ⅲ类", "D": "均可使用"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1647, "question": "Ⅰ类工具电源线中的（\n）在任何情况下只能用作保护接地线\n（PE）。\nA.红色相线\nB.黄色相线\nC.蓝色\nD.绿/黄双色线", "options": {"E": "。", "A": "红色相线", "B": "黄色相线", "C": "蓝色", "D": "绿/黄双色线"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1648, "question": "手持Ⅰ类工具在防止触电的保护方面不仅依靠基本绝缘，而且\n它还包含一个附加的安全预防措施，其方法是（\n），以这样的方法\n来使可触及的可导电的零件在基本绝缘损坏的事故中不成为带电体。\nA.将可触及的可导电的零件与已安装的固定线路中的保护（接地）导\n线连接起来\nB.将工具外壳接地\n\n=== 第543页 ===\nC.将工具外壳可导电体与工作零线连接\nD.以上方法均可", "options": {"A": "将可触及的可导电的零件与已安装的固定线路中的保护（接地）导 线连接起来", "B": "将工具外壳接地 === 第543页 ===", "C": "将工具外壳可导电体与工作零线连接", "D": "以上方法均可"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 1649, "question": "起重机械的司机室内应配备（\n）。\nA.空调\nB.电扇\nC.便盆\nD.灭火器", "options": {"A": "空调", "B": "电扇", "C": "便盆", "D": "灭火器"}, "answer": "D", "type": "single", "category": "消防安全"}, {"id": 1650, "question": "物料提升机架体地面进料口处应搭设（\n）。\nA.运输通道\nB.防护棚\nC.安全讲台\nD.歇凉亭", "options": {"A": "运输通道", "B": "防护棚", "C": "安全讲台", "D": "歇凉亭"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1651, "question": "气焊（割）设备中乙炔与铜等金属长期接触时能生成乙炔铜等\n爆炸物质，所以，凡是供乙炔用的器具、管接头不能用含铜（\n）\n以上的铜合金制造。\nA.50%\nB.60%\nC.70%\nD.80%\n\n=== 第544页 ===", "options": {"A": "50%", "B": "60%", "C": "70%", "D": "80% === 第544页 ==="}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1652, "question": "钢筋弯曲机的芯轴、挡铁轴、转盘等不应有（\n），防护罩应\n坚固可靠。\nA.间隙\nB.轴套\nC.变形\nD.裂纹和损伤", "options": {"A": "间隙", "B": "轴套", "C": "变形", "D": "裂纹和损伤"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1653, "question": "吊装作业开始起吊时，应先将构件吊离地面（\n）mm 后停止\n起吊。\nA.100～200\nB.200～300\nC.300～400\nD.400～500", "options": {"A": "100～200", "B": "200～300", "C": "300～400", "D": "400～500"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 1654, "question": "物料提升机自由端高度不宜大于（\n）；附墙架间距不宜大于\n6m。\nA.4m\nB.6m\nC.9m\nD.10m", "options": {"A": "4m", "B": "6m", "C": "9m", "D": "10m"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1655, "question": "卷筒两端的凸缘至最外层钢丝绳的距离不应小于钢丝绳直径的\n（\n）。\nA.2 倍\nB.3 倍\nC.4 倍\nD.6 倍", "options": {"A": "2 倍", "B": "3 倍", "C": "4 倍", "D": "6 倍"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1656, "question": "钢丝绳在卷筒上应整齐排列，端部应与卷筒压紧装置连接牢固。\n当吊笼处于最低位置时，卷筒上的钢丝绳不应少于（\n）圈。\nA.2\nB.3\nC.6\nD.8", "options": {"A": "2", "B": "3", "C": "6", "D": "8"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1657, "question": "物料提升机严禁使用（\n）卷扬机。\nA.齿轮传动\nB.链传动\nC.摩擦式\nD.螺旋传动", "options": {"A": "齿轮传动", "B": "链传动", "C": "摩擦式", "D": "螺旋传动"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1658, "question": "当物料提升机司机对吊笼升降运行、停层平台观察视线不清时，\n必须设置通信装置，通信装置应同时具备（\n）。\n\n=== 第546页 ===\nA.语音功能\nB.影像显示功能\nC.信号传递功能\nD.语音和影像显示功能", "options": {"A": "语音功能", "B": "影像显示功能", "C": "信号传递功能", "D": "语音和影像显示功能"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1659, "question": "物料提升机的基础应能承受最不利工作条件下的全部荷载。\n（\n）及以上物料提升机的基础应进行设计计算。\nA.25m\nB.30m\nC.35m\nD.50m", "options": {"A": "25m", "B": "30m", "C": "35m", "D": "50m"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1660, "question": "当物料提升机安装条件受到限制不能使用附墙架时，可采用缆\n风绳，缆风绳与水平面夹角宜在（\n）°～（\n）°之间。\nA.30°～45°\nB.45°～60°\nC.60°～75°\nD.<30°", "options": {"A": "30°～45°", "B": "45°～60°", "C": "60°～75°", "D": "<30°"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1661, "question": "《建筑与市政工程施工现场临时用电安全技术标准》规定，为\n保证机械强度，架空相邻铝线的截面积不得小于（\n）mm²。\nA.12\n\n=== 第547页 ===\nB.14\nC.16\nD.18", "options": {"A": "12 === 第547页 ===", "B": "14", "C": "16", "D": "18"}, "answer": "C", "type": "single", "category": "用电安全"}, {"id": 1662, "question": "移动式分配电箱、开关箱中心点与地面的垂直距离宜为（\n）\nm。\nA.0.6～1.4\nB.0.8～1.6\nC.0.9～1.7\nD.0.7～1.5", "options": {"A": "0.6～1.4", "B": "0.8～1.6", "C": "0.9～1.7", "D": "0.7～1.5"}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 1663, "question": "当吊重超过额定起重量并小于最大起重量的110%时，起重量限\n制器应动作，使塔机停止（\n）运行。\nA.上升\nB.下降\nC.左右\nD.上下", "options": {"A": "上升", "B": "下降", "C": "左右", "D": "上下"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 1664, "question": "在施工现场安装、拆卸施工起重机械和整体提升脚手架、模板\n等自升式架设设施，必须由（\n）承担。\nA.项目负责人指挥下技术人员\nB.项目负责人指挥下操作班组\n\n=== 第548页 ===\nC.具有相应资质的单位\nD.施工员指挥下技术人员和操作班组", "options": {"A": "项目负责人指挥下技术人员", "B": "项目负责人指挥下操作班组 === 第548页 ===", "C": "具有相应资质的单位", "D": "施工员指挥下技术人员和操作班组"}, "answer": "C", "type": "single", "category": "脚手架与模板工程"}, {"id": 1665, "question": "夯土机械电缆长度不应大于（\n）。\nA.30 米\nB.40 米\nC.50 米\nD.60 米", "options": {"A": "30 米", "B": "40 米", "C": "50 米", "D": "60 米"}, "answer": "C", "type": "single", "category": "用电安全"}, {"id": 1666, "question": "保护起吊物品重量不超过塔机允许的最大起重量的装置是\n（\n）。\nA.力矩限制器\nB.起重量限制器\nC.起升高度限位器\nD.幅度限位器", "options": {"A": "力矩限制器", "B": "起重量限制器", "C": "起升高度限位器", "D": "幅度限位器"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 1667, "question": "在高层建筑的临时电缆配电时，电缆水平敷设宜沿墙或门口固\n定，最大弧垂距地不得小于（\n）m。\nA.1.5\nB.2\nC.2.5\nD.3\n\n=== 第549页 ===", "options": {"A": "1.5", "B": "2", "C": "2.5", "D": "3 === 第549页 ==="}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 1668, "question": "塔机安拆应严格执行（\n）标准？\nA.国家标准\nB.行业标准\nC.部颁标准\nD.以上答案都正确", "options": {"A": "国家标准", "B": "行业标准", "C": "部颁标准", "D": "以上答案都正确"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 1669, "question": "上回转塔机一般采用什么架设？（\n）\nA.利用自身或随机抱杆拼装\nB.利用自身设备整体架设\nC.先用辅机组拼，再以自身设备架设\nD.借用辅机安装后，再以其它设备接高", "options": {"A": "利用自身或随机抱杆拼装", "B": "利用自身设备整体架设", "C": "先用辅机组拼，再以自身设备架设", "D": "借用辅机安装后，再以其它设备接高"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1670, "question": "塔机附着于建筑物用的拉结系统称为什么？（\n）\nA.锚固环\nB.锚固装置\nC.附着杆\nD.附着支座", "options": {"A": "锚固环", "B": "锚固装置", "C": "附着杆", "D": "附着支座"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1671, "question": "塔机技术试验不包括（\n）。\nA.稳定性试验\nB.空载试验\n\n=== 第550页 ===\nC.额定载荷试验\nD.超载试验", "options": {"A": "稳定性试验", "B": "空载试验 === 第550页 ===", "C": "额定载荷试验", "D": "超载试验"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1672, "question": "对小车变幅的塔式起重机，起重力矩限制器应分别由（\n）进\n行控制。\nA.起重量和起升速度\nB.起升速度和幅度\nC.起重量和起升高度\nD.起重量和幅度", "options": {"A": "起重量和起升速度", "B": "起升速度和幅度", "C": "起重量和起升高度", "D": "起重量和幅度"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 1673, "question": "塔式起重机最大高度处的风速风力在（\n）级及以上时不得进\n行起重机塔机升降作业。\nA.4\nB.5\nC.6\nD.7", "options": {"A": "4", "B": "5", "C": "6", "D": "7"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 1674, "question": "（\n）能够防止钢丝绳在传动过程中脱离滑轮槽而造成钢丝绳\n卡死和损伤。\nA.力矩限制器\nB.超高限制器\nC.吊钩保险\n\n=== 第551页 ===\nD.钢丝绳防脱槽装置", "options": {"A": "力矩限制器", "B": "超高限制器", "C": "吊钩保险 === 第551页 ===", "D": "钢丝绳防脱槽装置"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1675, "question": "出现什么的情况，吊钩应报废（\n）。\nA.挂绳处断面磨损量超过原高的20%\nB.挂绳处断面磨损量超过原高的15%\nC.挂绳处断面磨损量超过原高的10%\nD.挂绳处断面磨损量超过原高的5%", "options": {"A": "挂绳处断面磨损量超过原高的20%", "B": "挂绳处断面磨损量超过原高的15%", "C": "挂绳处断面磨损量超过原高的10%", "D": "挂绳处断面磨损量超过原高的5%"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1676, "question": "吊笼运行时振动过大，产生原因不可能的是（\n）。\nA.导向轮松动\nB.齿轮齿条啮合间隙过大或缺油\nC.导向轮与背轮间隙过大\nD.吊笼运行速度过快", "options": {"A": "导向轮松动", "B": "齿轮齿条啮合间隙过大或缺油", "C": "导向轮与背轮间隙过大", "D": "吊笼运行速度过快"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1677, "question": "超载试验时，施工升降机吊笼内均匀布置额定载荷的（\n）载\n荷。\nA.110%\nB.125%\nC.130%\nD.150%", "options": {"A": "110%", "B": "125%", "C": "130%", "D": "150%"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 1678, "question": "施工升降机运行中安全操作描述正确的是（\n）。\n\n=== 第552页 ===\nA.物体超长伸出吊笼时，应调整门限位启动\nB.当超重时，一旦启动在到达高度前不得停机\nC.施工升降机运行无事时，将操作盘擦拭干净\nD.严禁用碰撞上、下限位开关自动停车来代替正常驾驶", "options": {"A": "物体超长伸出吊笼时，应调整门限位启动", "B": "当超重时，一旦启动在到达高度前不得停机", "C": "施工升降机运行无事时，将操作盘擦拭干净", "D": "严禁用碰撞上、下限位开关自动停车来代替正常驾驶"}, "answer": "D", "type": "single", "category": "用电安全"}, {"id": 1679, "question": "施工升降机装有超载保护装置，当载荷达到额定载荷（\n）时，\n不能启动。\nA.90%\nB.100%\nC.110%\nD.120%", "options": {"A": "90%", "B": "100%", "C": "110%", "D": "120%"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 1680, "question": "低速SCD200/200 型施工升降机一般配备的安全器额定载荷为\n（\n）。\nA.20kN\nB.30kN\nC.50kN\nD.60kN", "options": {"A": "20kN", "B": "30kN", "C": "50kN", "D": "60kN"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 1681, "question": "SC 型施工升降机齿轮齿条啮合时，接触长度，齿高方向不小于\n（\n），齿长方向不小于（\n）。\nA.30%；50%\n\n=== 第553页 ===\nB.40%；40%\nC.30%；60%\nD.40%；50%", "options": {"A": "30%；50% === 第553页 ===", "B": "40%；40%", "C": "30%；60%", "D": "40%；50%"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 1682, "question": "通过调节（\n）使传动齿轮与驱动齿轮啮合。\nA.靠背轮\nB.导向轮\nC.驱动轮\nD.齿条", "options": {"A": "靠背轮", "B": "导向轮", "C": "驱动轮", "D": "齿条"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1683, "question": "吊笼上最高一对安全钩应处于最低驱动齿轮（\n）。\nA.之上\nB.之下\nC.同一线上\nD.之间", "options": {"A": "之上", "B": "之下", "C": "同一线上", "D": "之间"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1684, "question": "施工升降机扶墙架连接螺栓应采用（\n）。\nA.可以使用膨胀螺栓\nB.8.8 级以上高强螺栓\nC.6.8 级以上螺栓\nD.3.6-6.8 级普通螺栓即可", "options": {"A": "可以使用膨胀螺栓", "B": "8.8 级以上高强螺栓", "C": "6.8 级以上螺栓", "D": "3.6-6.8 级普通螺栓即可"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 1685, "question": "施工升降机运动部件与建筑物和固定施工设备之间的距离不得\n小于（\n）米。\nA.0.8\nB.0.6\nC.0.4\nD.0.25", "options": {"A": "0.8", "B": "0.6", "C": "0.4", "D": "0.25"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 1686, "question": "当SC 型施工升降机高度小于70m 时，其垂直度偏差应控制在\n导轨架高度的（\n）以内。\nA.千分之四\nB.千分之二\nC.千分之一\nD.千分之三", "options": {"A": "千分之四", "B": "千分之二", "C": "千分之一", "D": "千分之三"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 1687, "question": "起重设备当电压偏差大于额定电压（\n）时，应停止使用。\nA.±5%\nB.±10%\nC.±15%\nD.±20%", "options": {"A": "±5%", "B": "±10%", "C": "±15%", "D": "±20%"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 1688, "question": "当吊笼内发生火灾时，在未切断电源的情形下严禁使用下列哪\n种灭火器（\n）。\n\n=== 第555页 ===\nA.泡沫灭火器\nB.干粉灭火器\nC.二氧化碳灭火器\nD.1211 灭火器", "options": {"A": "泡沫灭火器", "B": "干粉灭火器", "C": "二氧化碳灭火器", "D": "1211 灭火器"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 1689, "question": "吊篮内的作业人员不应超过（\n）人。\nA.1\nB.2\nC.3\nD.4", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1690, "question": "施工升降机导轨架是有标准高度的导轨通过什么（\n）组装而\n成。\nA.焊接\nB.钢丝绳连接\nC.铆接\nD.高强度螺栓连接", "options": {"A": "焊接", "B": "钢丝绳连接", "C": "铆接", "D": "高强度螺栓连接"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 1691, "question": "施工升降机导轨标准节组合时，立管接缝处相互错位形成的阶\n差不应大于多少（\n）。\nA.0.8mm\nB.1.6mm\n\n=== 第556页 ===\nC.2.0mm\nD.2.5mm", "options": {"A": "0.8mm", "B": "1.6mm === 第556页 ===", "C": "2.0mm", "D": "2.5mm"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 1692, "question": "当施工升降机架设超过一定高度时，受电缆的机械强度限制，\n应采用（\n）来收放随行电缆。\nA.电缆进线架\nB.电缆导向架\nC.电缆储筒\nD.电缆滑车系统", "options": {"A": "电缆进线架", "B": "电缆导向架", "C": "电缆储筒", "D": "电缆滑车系统"}, "answer": "D", "type": "single", "category": "用电安全"}, {"id": 1693, "question": "吊篮提升机滑轮直径与钢丝绳直径之比不应小于（\n）。\nA.18\nB.20\nC.22\nD.24", "options": {"A": "18", "B": "20", "C": "22", "D": "24"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1694, "question": "高度超过（\n）m 的在建工程，应在适当楼层增设临时中转水\n池及加压水泵。\nA.50\nB.70\nC.90\nD.100\n\n=== 第557页 ===", "options": {"A": "50", "B": "70", "C": "90", "D": "100 === 第557页 ==="}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1695, "question": "使用千斤顶顶起结构构件时，应随起随垫枕木，且枕木块与构\n件间距离必须保持在（\n）mm 以内。\nA.50\nB.100\nC.200\nD.500", "options": {"A": "50", "B": "100", "C": "200", "D": "500"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1696, "question": "两台推土机在同一地区作业时，前后距离应大于8m，左右距离\n应大于（\n）。\nA.1m\nB.1.5m\nC.2m\nD.2.5m", "options": {"A": "1m", "B": "1.5m", "C": "2m", "D": "2.5m"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1697, "question": "安全网使用（\n）月后，必须进行绳的强度测试。\nA.1\nB.2\nC.3\nD.4", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "C", "type": "single", "category": "高处作业"}, {"id": 1698, "question": "塔式起重机停用（\n）以上的，在复工前，应组织出租单位、\n\n=== 第558页 ===\n安装单位、使用单位、监理单位、总承包单位进行重新验收，合格后\n方可使用。\nA.3 个月\nB.4 个月\nC.5 个月\nD.6 个月", "options": {"A": "3 个月", "B": "4 个月", "C": "5 个月", "D": "6 个月"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 1699, "question": "塔式起重机尾部与建（构）筑物及施工设施之间的距离不得小\n于（\n）米。\nA.0.1\nB.0.2\nC.0.4\nD.0.6", "options": {"A": "0.1", "B": "0.2", "C": "0.4", "D": "0.6"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 1700, "question": "在空载、风速不大于3m/s 状态下，独立状态塔身（或附着状态\n下最高附着点以上塔身），塔机起重臂轴线与观测点处于同一平面内\n时，塔身轴心线对支撑面的垂直度不大于（\n）。\nA.1‰\nB.2‰\nC.3‰\nD.4‰", "options": {"A": "1‰", "B": "2‰", "C": "3‰", "D": "4‰"}, "answer": "D", "type": "single", "category": "脚手架与模板工程"}, {"id": 1701, "question": "起重力矩限制器、起重量限制器，必须灵敏可靠，当起重量大\n于相应档位的额定值并小于该额定值的（\n）时，为合格。\nA.100%\nB.110%\nC.120%\nD.125%", "options": {"A": "100%", "B": "110%", "C": "120%", "D": "125%"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 1702, "question": "施工升降机使用过程中，以下运载物料说法正确的是（\n）。\nA.仅运送搭设层站的脚手架钢管时，允许其从吊笼顶紧急逃离窗伸出\nB.粉末状无害材料可以直接倒在电梯笼内进行运送\nC.严禁运载强酸、强碱\nD.使用搬运机械向中笼内搬运物料时，搬运机械不得碰撞施工升降机", "options": {"A": "仅运送搭设层站的脚手架钢管时，允许其从吊笼顶紧急逃离窗伸出", "B": "粉末状无害材料可以直接倒在电梯笼内进行运送", "C": "严禁运载强酸、强碱", "D": "使用搬运机械向中笼内搬运物料时，搬运机械不得碰撞施工升降机"}, "answer": "D", "type": "single", "category": "脚手架与模板工程"}, {"id": 1703, "question": "每次加节完毕后，应对施工升降机导轨架的垂直度进行校正，\n其安装垂直度偏差应符合（\n）。\nA.导轨架架设高度不大于70m 时，垂直度偏差不大于70mm\nB.导轨架架设高度大于70m 且不大于100m 时，垂直度偏差不大于\n100mm\nC.导轨架架设高度大于100m 且不大于150m 时，垂直度偏差不大于\n90mm\nD.导轨架架设高度大于150m 且不大于200m 时，垂直度偏差不大于\n150mm\n\n=== 第560页 ===", "options": {"A": "导轨架架设高度不大于70m 时，垂直度偏差不大于70mm", "B": "导轨架架设高度大于70m 且不大于100m 时，垂直度偏差不大于 100mm", "C": "导轨架架设高度大于100m 且不大于150m 时，垂直度偏差不大于 90mm", "D": "导轨架架设高度大于150m 且不大于200m 时，垂直度偏差不大于 150mm === 第560页 ==="}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 1704, "question": "物料提升机卷扬机的控制开关严禁选用（\n）。\nA.倒顺开关\nB.控制按钮\nC.限位开关\nD.刀开关", "options": {"A": "倒顺开关", "B": "控制按钮", "C": "限位开关", "D": "刀开关"}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 1705, "question": "对于物料提升机附墙架以下说法正确的是（\n）。\nA.附墙架与物料提升机架体之间采用柔性连接\nB.附墙架可选用坚实的木棍制作\nC.附墙架及架体不得与脚手架连接\nD.附墙架悬高应符合现场生产要求", "options": {"A": "附墙架与物料提升机架体之间采用柔性连接", "B": "附墙架可选用坚实的木棍制作", "C": "附墙架及架体不得与脚手架连接", "D": "附墙架悬高应符合现场生产要求"}, "answer": "C", "type": "single", "category": "脚手架与模板工程"}, {"id": 1706, "question": "使用单位应当自建筑起重机械安装验收合格之日起（\n）日内，\n将建筑起重机械安装验收资料、建筑起重机械安全管理制度、特种作\n业人员名单等，向工程所在地县级以上地方人民政府建设主管部门办\n理建筑起重机械使用登记。登记标志置于或者附着于该设备的显著位\n置。\nA.15\nB.30\nC.45\nD.60\n\n=== 第561页 ===", "options": {"A": "15", "B": "30", "C": "45", "D": "60 === 第561页 ==="}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 1707, "question": "塔式起重机作业完毕后，应松开（\n），各部件应置于非工作\n状态，控制开关应置于零位，并应切断总电源。\nA.回转制动器\nB.小车变幅制动器\nC.大车行走制动器\nD.开关", "options": {"A": "回转制动器", "B": "小车变幅制动器", "C": "大车行走制动器", "D": "开关"}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 1708, "question": "桩锤在施打过程中，操作人员必须在距离桩锤中心（\n）以外\n监视。\nA.2m\nB.3m\nC.4m\nD.5m", "options": {"A": "2m", "B": "3m", "C": "4m", "D": "5m"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1709, "question": "制动器既是起重机的控制装置，又是（\n）装置。\nA.开关装置\nB.接触装置\nC.安全装置\nD.运行装置", "options": {"A": "开关装置", "B": "接触装置", "C": "安全装置", "D": "运行装置"}, "answer": "C", "type": "single", "category": "用电安全"}, {"id": 1710, "question": "在每次防护架提升后，必须逐一检查扣件紧固程度；所有连接\n\n=== 第562页 ===\n件拧紧力矩必须达到（\n）。\nA.40N·m—65N·m\nB.45N·m—65N·m\nC.40N·m—60N·m\nD.45N·m—60N·m", "options": {"A": "40N·m—65N·m", "B": "45N·m—65N·m", "C": "40N·m—60N·m", "D": "45N·m—60N·m"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1711, "question": "在扣件式钢管脚手架搭设时，模板支架立杆应竖直设置，2m 高\n度的垂直允许偏差为（\n）mm。\nA.12\nB.15\nC.18\nD.21", "options": {"A": "12", "B": "15", "C": "18", "D": "21"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 1712, "question": "圆盘锯锯片上方必须安装保险挡板，在锯片后面，离齿（\n）\n处，必须安装弧形楔刀。\nA.10～15mm\nB.10～20mm\nC.15～20mm\nD.20～25mm", "options": {"A": "10～15mm", "B": "10～20mm", "C": "15～20mm", "D": "20～25mm"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1713, "question": "预应力V 形折板吊装必须采用多点起吊，吊点间距宜为（\n）。\n起吊时，应用横吊梁使折板张开不小于（\n）。\n\n=== 第563页 ===\nA.1.0m～1.5m；45°\nB.1.5m～2.0m；45°\nC.1.5m～2.0m；30°\nD.2.0m～2.5m；30°", "options": {"A": "1.0m～1.5m；45°", "B": "1.5m～2.0m；45°", "C": "1.5m～2.0m；30°", "D": "2.0m～2.5m；30°"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 1714, "question": "用小发动机启动柴油机时，每次启动时间不得超过（\n）。\nA.3min\nB.5min\nC.8min\nD.10min", "options": {"A": "3min", "B": "5min", "C": "8min", "D": "10min"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1715, "question": "液压滑升设备的油泵、千斤顶、阀及油管等液压件，使用前应\n经耐压试验，试验压力应为（\n）倍的额定压力。\nA.1\nB.1.5\nC.2\nD.2.5", "options": {"A": "1", "B": "1.5", "C": "2", "D": "2.5"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1716, "question": "施工升降机夜间作业完毕后，操作错误的是（\n）。\nA.控制开关置于零位，切断电源\nB.将吊笼停靠至地面\nC.切断施工升降机专用电箱电源和开关箱电源\n\n=== 第564页 ===\nD.关闭障碍灯", "options": {"A": "控制开关置于零位，切断电源", "B": "将吊笼停靠至地面", "C": "切断施工升降机专用电箱电源和开关箱电源 === 第564页 ===" ": "施工升降机上限位与上极限开关之间的越程距离：齿轮齿条式\n施工升降机不应小于（\n）。\nA.0.1m\nB.0.15m\nC.0.2m\nD.0.25m", "options": {"A": "0.1m", "B": "0.15m", "C": "0.2m", "D": "0.25m"}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 1789, "question": "上施工升降机限位与上极限开关之间的越程距离：钢丝绳式施\n工升降机不应小于（\n）。\nA.0.5m\nB.1m\nC.1.5m\n\n=== 第587页 ===\nD.2m", "options": {"A": "0.5m", "B": "1m", "C": "1.5m === 第587页 ===", "D": "2m"}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 1790, "question": "当施工升降机安装高度大于（\n），并超过建筑物高度时，应\n安装红色障碍灯，障碍灯电源不得因施工升降机停机而停电。\nA.110m\nB.120m\nC.130m\nD.140m", "options": {"A": "110m", "B": "120m", "C": "130m", "D": "140m"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 1791, "question": "在使用乙炔瓶的现场，超过（\n）瓶时，应设置乙炔瓶库。\nA.10\nB.20\nC.30\nD.40", "options": {"A": "10", "B": "20", "C": "30", "D": "40"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1792, "question": "登高焊割作业时，一般认为在地面周围（\n）m 范围内为危险\n区。\nA.3\nB.5\nC.10\nD.20", "options": {"A": "3", "B": "5", "C": "10", "D": "20"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1793, "question": "乙炔瓶瓶体温度不准超过（\n）℃。\nA.25\nB.30\nC.40\nD.60", "options": {"A": "25", "B": "30", "C": "40", "D": "60"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1794, "question": "当多片吊篮同时升降（吊点在两个以上）时，必须采取电动葫\n芦，并有控制同步升降的装置，使吊篮同步升降不发生过大变形，同\n步平差不应超过（\n）。\nA.5cm\nB.8cm\nC.10cm\nD.15cm", "options": {"A": "5cm", "B": "8cm", "C": "10cm", "D": "15cm"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1795, "question": "吊篮与建筑物水平距离不大于（\n）。\nA.10cm\nB.20cm\nC.30cm\nD.40cm", "options": {"A": "10cm", "B": "20cm", "C": "30cm", "D": "40cm"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1796, "question": "塔式起重机在吊物载荷达到额定载荷的（\n）%时，应先将吊\n物吊离地面200mm—500mm 后，检查机械状况、制动性能、物件绑\n\n=== 第589页 ===\n扎情况等，确认无误后方可起吊。\nA.70\nB.80\nC.90\nD.100", "options": {"A": "70", "B": "80", "C": "90", "D": "100"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 1797, "question": "当钢丝绳的端部采用编结固按时，编结部分的长度不得小于钢\n丝绳直径的20 倍，并不应小于（\n）mm。\nA.100\nB.200\nC.300\nD.400", "options": {"A": "100", "B": "200", "C": "300", "D": "400"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1798, "question": "施工升降机应安装超载保护装置。齿轮齿条式载人施工升降机\n载荷达到额定载重量的（\n）倍时应能给出报警信号。\nA.0.9\nB.1\nC.1.1\nD.1.2", "options": {"A": "0.9", "B": "1", "C": "1.1", "D": "1.2"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 1799, "question": "施工升降机安装作业中，当遇大雨、大雪、大雾或风速大于（\n）\nm/s 等恶劣天气时，应停止安装作业。\n\n=== 第590页 ===\nA.11\nB.12\nC.13\nD.14", "options": {"A": "11", "B": "12", "C": "13", "D": "14"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 1800, "question": "施工升降机最外侧边缘与外面架空输电线路的边线之间，应保\n持安全操作距离。当外电线电路电压小于1kV，最小安全操作距离\n（\n）m。\nA.4\nB.6\nC.8\nD.10", "options": {"A": "4", "B": "6", "C": "8", "D": "10"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 1801, "question": "施工升降机最外侧边缘与外面架空输电线路的边线之间，应保\n持安全操作距离。当外电线电路电压1～10kV，最小安全操作距离\n（\n）m。\nA.4\nB.6\nC.8\nD.10", "options": {"A": "4", "B": "6", "C": "8", "D": "10"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 1802, "question": "施工升降机最外侧边缘与外面架空输电线路的边线之间，应保\n\n=== 第591页 ===\n持安全操作距离。当外电线电路电压35～110kV，最小安全操作距离\n（\n）m。\nA.4\nB.6\nC.8\nD.10", "options": {"A": "4", "B": "6", "C": "8", "D": "10"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 1803, "question": "对于图示作业行为，管理人员做法错误的是（\n）。\nA.责令相关单位对外架进行整改\n\n=== 第592页 ===\nB.要求工人正确佩戴安全帽，系好安全带\nC.继续旁站工人作业\nD.对工人做好教育交底工作", "options": {"A": "责令相关单位对外架进行整改 === 第592页 ===", "B": "要求工人正确佩戴安全帽，系好安全带", "C": "继续旁站工人作业", "D": "对工人做好教育交底工作"}, "answer": "C", "type": "single", "category": "高处作业"}, {"id": 1804, "question": "图中所示现场最有可能发生的安全事故是（\n）。\nA.高处坠落\nB.物体打击\nC.火灾\nD.触电", "options": {"A": "高处坠落", "B": "物体打击", "C": "火灾", "D": "触电"}, "answer": "A", "type": "single", "category": "高处作业"}, {"id": 1805, "question": "图示现场最有可能发生的安全事故是（\n）。\nA.高处坠落\nB.物体打击\nC.火灾\nD.触电", "options": {"A": "高处坠落", "B": "物体打击", "C": "火灾", "D": "触电"}, "answer": "A", "type": "single", "category": "高处作业"}, {"id": 1806, "question": "看下图，关于孔桩洞口防护说法正确的是（\n）。\nA.孔桩成孔前，每日施工完成后可以不用防护，因为还要继续作业\nB.成孔后搭设防护，挂设安全警示牌\nC.成孔后如果下一道工序间隔时间不长，可以不防护\nD.孔桩较醒目易察觉的，人员能自行避开，无需防护", "options": {"A": "孔桩成孔前，每日施工完成后可以不用防护，因为还要继续作业", "B": "成孔后搭设防护，挂设安全警示牌", "C": "成孔后如果下一道工序间隔时间不长，可以不防护", "D": "孔桩较醒目易察觉的，人员能自行避开，无需防护"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1807, "question": "看下图，关于楼梯口、楼梯平台和梯段边防护说法错误的是\n（\n）。\nA.楼梯口、楼梯平台和梯段边，应安装防护栏杆\nB.外设楼梯口、楼梯平台和梯段边还应采用密目式安全立网封闭\nC.楼梯口、楼梯平台和梯段边防护应同步搭设至施工层\nD.楼梯口、楼梯平台和梯段边防护在支模架拆除后进行搭设", "options": {"A": "楼梯口、楼梯平台和梯段边，应安装防护栏杆", "B": "外设楼梯口、楼梯平台和梯段边还应采用密目式安全立网封闭", "C": "楼梯口、楼梯平台和梯段边防护应同步搭设至施工层", "D": "楼梯口、楼梯平台和梯段边防护在支模架拆除后进行搭设"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1808, "question": "对图示作业环境，管理人员做法错误的是（\n）。\nA.责令停止作业\nB.要求佩戴并系挂好安全带\nC.在旁边监督工人继续作业\nD.对工人做好交底工作", "options": {"A": "责令停止作业", "B": "要求佩戴并系挂好安全带", "C": "在旁边监督工人继续作业", "D": "对工人做好交底工作"}, "answer": "C", "type": "single", "category": "高处作业"}, {"id": 1809, "question": "图中所示现场最有可能发生的事故是（\n）。\nA.高处坠落\nB.物体打击\nC.坍塌\nD.机械伤害", "options": {"A": "高处坠落", "B": "物体打击", "C": "坍塌", "D": "机械伤害"}, "answer": "A", "type": "single", "category": "高处作业"}, {"id": 1810, "question": "下图中存在的最主要的安全隐患是什么？（\n）\nA.未配备消防器材\nB.临边区域无防护措施\nC.预留洞口未进行封闭\nD.建筑材料未分类码放", "options": {"A": "未配备消防器材", "B": "临边区域无防护措施", "C": "预留洞口未进行封闭", "D": "建筑材料未分类码放"}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 1811, "question": "针对下图情况，所采取的措施错误的是？（\n）\nA.电缆线进行绝缘、悬挂处理\nB.要求操作工人立即停止作业\nC.立即安排将龙门架护身栏杆安装好\nD.管理人员旁站时继续作业", "options": {"A": "电缆线进行绝缘、悬挂处理", "B": "要求操作工人立即停止作业", "C": "立即安排将龙门架护身栏杆安装好", "D": "管理人员旁站时继续作业"}, "answer": "D", "type": "single", "category": "用电安全"}, {"id": 1812, "question": "下图中悬挑脚手架存在的主要隐患是？（\n）\nA.架体底部封闭不严密\nB.大横杆间距过大\nC.安全网污染未清理\nD.扫地杆高度过高", "options": {"A": "架体底部封闭不严密", "B": "大横杆间距过大", "C": "安全网污染未清理", "D": "扫地杆高度过高"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 1813, "question": "对下图中安全隐患的说法错误的是（\n）。\nA.通道口未搭设安全防护棚\nB.该脚手架立杆悬空\nC.脚手架操作平台无防护栏杆\nD.脚手架剪刀撑扣件连接方式错误", "options": {"A": "通道口未搭设安全防护棚", "B": "该脚手架立杆悬空", "C": "脚手架操作平台无防护栏杆", "D": "脚手架剪刀撑扣件连接方式错误"}, "answer": "D", "type": "single", "category": "脚手架与模板工程"}, {"id": 1814, "question": "根据下图所示，下列描述错误的是（\n）。\nA.临边防护拆除前不需要进行申请\nB.作业人员在该电梯井口作业系挂安全带\nC.作业完成后将临边防护恢复原状\nD.管理人员应现场旁站监督", "options": {"A": "临边防护拆除前不需要进行申请", "B": "作业人员在该电梯井口作业系挂安全带", "C": "作业完成后将临边防护恢复原状", "D": "管理人员应现场旁站监督"}, "answer": "A", "type": "single", "category": "高处作业"}, {"id": 1815, "question": "下图所示1.2×2 米的洞口，下列处理方式错误的是（\n）。\nA.四周安装1.2 米高防护栏杆\nB.用大块旧模板盖住\nC.悬挂警示标识\nD.按30cm 间距均匀铺设方钢后再铺模板固定", "options": {"A": "四周安装1.2 米高防护栏杆", "B": "用大块旧模板盖住", "C": "悬挂警示标识", "D": "按30cm 间距均匀铺设方钢后再铺模板固定"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 1816, "question": "如图所示卸料平台，存在的最主要的安全隐患是（\n）。\nA.钢丝绳锚固点使用螺纹钢，结构存在裂缝\nB.钢丝绳绳卡方向错误\nC.钢丝绳生锈\nD.钢丝绳直径偏大", "options": {"A": "钢丝绳锚固点使用螺纹钢，结构存在裂缝", "B": "钢丝绳绳卡方向错误", "C": "钢丝绳生锈", "D": "钢丝绳直径偏大"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1817, "question": "如图所示，卸料平台存在安全隐患，正确的处置方法是？（\n）\nA.派专人看管，这一层使用完后立即拆除\nB.工字钢增加钢管回顶后再使用\nC.料台两侧增加防护栏杆后再使用\nD.卸料平台无条件的拆除，禁止使用", "options": {"A": "派专人看管，这一层使用完后立即拆除", "B": "工字钢增加钢管回顶后再使用", "C": "料台两侧增加防护栏杆后再使用", "D": "卸料平台无条件的拆除，禁止使用"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1818, "question": "图中所示，关于压力气瓶使用，下列做法错误的是（\n）。\nA.氧气瓶与乙炔瓶保持8 米距离\nB.气瓶应安装防震圈\nC.动火作业前应清理周边易燃物品\nD.气瓶与动火作业点保持8 米距离", "options": {"A": "氧气瓶与乙炔瓶保持8 米距离", "B": "气瓶应安装防震圈", "C": "动火作业前应清理周边易燃物品", "D": "气瓶与动火作业点保持8 米距离"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1819, "question": "图中所示钢筋加工设备应采取的措施，错误的是（\n）。\nA.设置钢筋导向笼\nB.安装防护棚\nC.加工区封闭防护\nD.设备三级箱设在5 米外的二级箱旁", "options": {"A": "设置钢筋导向笼", "B": "安装防护棚", "C": "加工区封闭防护", "D": "设备三级箱设在5 米外的二级箱旁"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1820, "question": "根据下图所示，下列描述正确的是（\n）。\nA.三级箱与切割机距离2 米，超过规范要求\nB.切割机周边无易燃物，不需要防护罩\nC.电缆线拖地，应采取绝缘防护措施\nD.为方便操作，三级箱门应敞开", "options": {"A": "三级箱与切割机距离2 米，超过规范要求", "B": "切割机周边无易燃物，不需要防护罩", "C": "电缆线拖地，应采取绝缘防护措施", "D": "为方便操作，三级箱门应敞开"}, "answer": "C", "type": "single", "category": "用电安全"}, {"id": 1821, "question": "下图存在的最主要的违规行为是（\n）。\nA.设备周边卫生未清理\nB.把断路器当电源开关使用\nC.设备未接地\nD.设备传动部位无防护罩", "options": {"A": "设备周边卫生未清理", "B": "把断路器当电源开关使用", "C": "设备未接地", "D": "设备传动部位无防护罩"}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 1822, "question": "关于下图气瓶存放的说法，错误的是（\n）。\nA.气瓶应设置单独仓库存放\nB.气瓶不应混放\nC.气瓶存放区应配备消防器材\nD.仓库存放气瓶不需要安装防震圈", "options": {"A": "气瓶应设置单独仓库存放", "B": "气瓶不应混放", "C": "气瓶存放区应配备消防器材", "D": "仓库存放气瓶不需要安装防震圈"}, "answer": "D", "type": "single", "category": "消防安全"}, {"id": 1823, "question": "针对下图所采取的安全整改措施，错误的是（\n）。\nA.安装防护罩\nB.清理周边材料和垃圾\nC.设置单独木工加工房\nD.将电缆线捆扎好后再放在地面上", "options": {"A": "安装防护罩", "B": "清理周边材料和垃圾", "C": "设置单独木工加工房", "D": "将电缆线捆扎好后再放在地面上"}, "answer": "D", "type": "single", "category": "用电安全"}, {"id": 1824, "question": "对于图示现场存在的主要安全隐患不包括（\n）。\nA.自制圆盘锯防护罩缺失\nB.使用插线板\nC.文明施工差，灭火器缺失\nD.临边防护不足", "options": {"A": "自制圆盘锯防护罩缺失", "B": "使用插线板", "C": "文明施工差，灭火器缺失", "D": "临边防护不足"}, "answer": "D", "type": "single", "category": "消防安全"}, {"id": 1825, "question": "如图所示，关于登高车作业描述错误的是（\n）。\nA.登高车操作人员应体检合格并取得操作证后方可上岗作业\nB.同一登高车上作业人员不得超过2 人\nC.登高车进场前应进行验收挂牌，合格后才可使用\nD.登高车升空作业时可以水平行走", "options": {"A": "登高车操作人员应体检合格并取得操作证后方可上岗作业", "B": "同一登高车上作业人员不得超过2 人", "C": "登高车进场前应进行验收挂牌，合格后才可使用", "D": "登高车升空作业时可以水平行走"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1826, "question": "如图所示，关于电瓶斗车作业描述错误的是（\n）。\nA.电瓶斗车装卸货物时,应保持货物的载荷均匀\nB.电瓶斗车进场前应进行验收挂牌，合格后方可投入使用\nC.可以使用电瓶斗车载人\nD.手推式电动斗车或板车进入电梯笼内后必须关闭行车开关，拔掉钥\n匙，并拉起制动装置", "options": {"A": "电瓶斗车装卸货物时,应保持货物的载荷均匀", "B": "电瓶斗车进场前应进行验收挂牌，合格后方可投入使用", "C": "可以使用电瓶斗车载人", "D": "手推式电动斗车或板车进入电梯笼内后必须关闭行车开关，拔掉钥 匙，并拉起制动装置"}, "answer": "C", "type": "single", "category": "用电安全"}, {"id": 1827, "question": "如图所示，关于工程三轮车作业描述错误的是（\n）。\nA.工程三轮车进场前应验收挂牌\nB.工程三轮车使用前应对车辆的油门、刹车、轮胎等关键部位进行检\n查\nC.工程三轮车应严格遵循施工现场限速要求\nD.工程三轮车可以载人、载货", "options": {"A": "工程三轮车进场前应验收挂牌", "B": "工程三轮车使用前应对车辆的油门、刹车、轮胎等关键部位进行检 查", "C": "工程三轮车应严格遵循施工现场限速要求", "D": "工程三轮车可以载人、载货"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1828, "question": "如图所示，关于叉车作业描述错误的是（\n）。\nA.叉车进场前应验收挂牌\nB.叉车操作人员应持有效期内的特种作业操作证上岗\nC.叉车可以进行长距离货物运输\nD.叉车作业前应对作业环境进行检查", "options": {"A": "叉车进场前应验收挂牌", "B": "叉车操作人员应持有效期内的特种作业操作证上岗", "C": "叉车可以进行长距离货物运输", "D": "叉车作业前应对作业环境进行检查"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1829, "question": "对于图示现场存在的主要安全隐患描述正确的是（\n）。\nA.葫芦吊钩防脱保险失效\nB.库房文明施工差\nC.材料散乱堆放在地面\nD.材料未分类对码", "options": {"A": "葫芦吊钩防脱保险失效", "B": "库房文明施工差", "C": "材料散乱堆放在地面", "D": "材料未分类对码"}, "answer": "A", "type": "single", "category": "文明施工"}, {"id": 1830, "question": "建筑施工安全检查标准JGJ59-2011 文明施工检查评分表保证项\n目要求，施工现场主要道路及材料加工区地面应进行（\n）。\nA.硬化处理\nB.碎石垫铺\nC.碾压压实\nD.平整压实", "options": {"A": "硬化处理", "B": "碎石垫铺", "C": "碾压压实", "D": "平整压实"}, "answer": "A", "type": "single", "category": "文明施工"}, {"id": 1831, "question": "图中钢管存放区，存在的不足之处是（\n）。\nA.材料堆放未码放好、未分区隔离\nB.未涂刷油漆\nC.未挂安全网\nD.未在库房存放", "options": {"A": "材料堆放未码放好、未分区隔离", "B": "未涂刷油漆", "C": "未挂安全网", "D": "未在库房存放"}, "answer": "A", "type": "single", "category": "高处作业"}, {"id": 1832, "question": "如图所示，市政工程主要存在的安全隐患描述正确的是（\n）。\nA.管道检查井口未防护到位\nB.管道检查井口无警示标识\nC.管道井深度达到3 米应做安全防护\nD.管道井深度达到5 米应做安全防护", "options": {"A": "管道检查井口未防护到位", "B": "管道检查井口无警示标识", "C": "管道井深度达到3 米应做安全防护", "D": "管道井深度达到5 米应做安全防护"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1833, "question": "下图中施工现场材料堆放要求描述错误的是（\n）。\nA.围挡（围墙）外可以堆放建筑材料\nB.材料堆放场地与其他区域设置1.8m 分隔围护设施\nC.材料码放整齐，并设有名称、规格等标识牌\nD.建筑材料按总平面布局进行码放", "options": {"A": "围挡（围墙）外可以堆放建筑材料", "B": "材料堆放场地与其他区域设置1.8m 分隔围护设施", "C": "材料码放整齐，并设有名称、规格等标识牌", "D": "建筑材料按总平面布局进行码放"}, "answer": "A", "type": "single", "category": "基坑工程"}, {"id": 1834, "question": "JGJ59—2011 标准文明施工检查表中规定易燃易爆物品应（\n）。\nA.远离施工现场\nB.分类存放\nC.远离食堂\nD.远离居民区", "options": {"A": "远离施工现场", "B": "分类存放", "C": "远离食堂", "D": "远离居民区"}, "answer": "B", "type": "single", "category": "文明施工"}, {"id": 1835, "question": "悬挑脚手架的锚固端长度与悬挑部分长度的最小比例是多少？\n（\n）\nA.1：1\nB.1.25：1\nC.1.5：1\n
