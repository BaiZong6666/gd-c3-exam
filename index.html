<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Microsoft YaHei", Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
.container { max-width: 900px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }

.btn { padding: 12px 30px; border: none; border-radius: 25px; font-size: 16px; cursor: pointer; transition: all 0.3s; font-weight: bold; }
.btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }

.btn-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; }
.btn-warning { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
.btn-danger { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); color: white; }
.mode-select { padding: 40px; text-align: center; }

.mode-btn:hover { background: #667eea; color: white; transform: translateY(-3px); }
.category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
.category-card { padding: 20px; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; transition: all 0.3s; text-align: center; }
.category-card:hover { border-color: #667eea; background: #f5f5ff; }
.category-card h3 { color: #667eea; margin-bottom: 10px; }
.quiz-area { padding: 30px; display: none; }
.timer { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8); color: white; padding: 15px 25px; border-radius: 10px; font-size: 20px; z-index: 1000; display: none; }
.timer.warning { background: #f5576c; animation: pulse 1s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.question-card { background: #f8f9fa; padding: 25px; border-radius: 15px; margin-bottom: 20px; }
.question-text { font-size: 18px; color: #333; margin-bottom: 20px; line-height: 1.6; }
.question-meta { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
.badge { padding: 5px 12px; border-radius: 15px; font-size: 12px; font-weight: bold; }
.badge-single { background: #e3f2fd; color: #1976d2; }
.badge-multi { background: #fff3e0; color: #f57c00; }
.badge-category { background: #f3e5f5; color: #7b1fa2; }
.option { display: block; padding: 15px; margin: 10px 0; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; transition: all 0.3s; background: white; text-align: left; width: 100%; font-size: 16px; }
.option:hover { border-color: #667eea; background: #f5f5ff; }
.option.selected { border-color: #667eea; background: #e8eaf6; }
.option.correct { border-color: #4caf50; background: #e8f5e9; }
.option.wrong { border-color: #f44336; background: #ffebee; }
.option.disabled { cursor: not-allowed; opacity: 0.7; }
.answer-sheet { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; margin: 20px 0; }
.answer-btn { padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; background: white; cursor: pointer; font-size: 14px; transition: all 0.3s; }
.answer-btn.current { border-color: #667eea; background: #667eea; color: white; }
.answer-btn.answered { border-color: #4caf50; background: #e8f5e9; }
.answer-btn.flagged { border-color: #ff9800; background: #fff3e0; }
.progress-bar { height: 8px; background: #e0e0e0; border-radius: 4px; margin: 20px 0; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); transition: width 0.3s; }
.nav-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 30px; }
.result-area { padding: 40px; text-align: center; display: none; }
.score-circle { width: 200px; height: 200px; margin: 30px auto; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 48px; font-weight: bold; color: white; }
.score-excellent { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
.score-good { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
.score-poor { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin: 30px 0; }
.stat-card { padding: 20px; background: #f8f9fa; border-radius: 10px; }
.stat-card .num { font-size: 32px; font-weight: bold; color: #667eea; }
.stat-card .label { font-size: 14px; color: #666; margin-top: 5px; }
.wrong-list { text-align: left; margin-top: 30px; }
.wrong-item { padding: 15px; margin: 10px 0; background: #ffebee; border-radius: 10px; border-left: 4px solid #f44336; }
.wrong-item .q-text { font-weight: bold; margin-bottom: 10px; }
.wrong-item .your-answer { color: #f44336; }
.wrong-item .correct-answer { color: #4caf50; }
.history-area { padding: 30px; display: none; }
.history-item { padding: 20px; margin: 15px 0; background: #f8f9fa; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
.history-item .score { font-size: 24px; font-weight: bold; color: #667eea; }
.flag-btn { padding: 8px 15px; border: 2px solid #ff9800; border-radius: 8px; background: white; color: #ff9800; cursor: pointer; font-size: 14px; margin-top: 10px; }
.flag-btn.flagged { background: #ff9800; color: white; }
.explanation { margin-top: 15px; padding: 15px; background: #e3f2fd; border-radius: 10px; display: none; }
.explanation.show { display: block; }
@media (max-width: 768px) {
    .mode-buttons { flex-direction: column; }
    .answer-sheet { grid-template-columns: repeat(5, 1fr); }
    .question-text { font-size: 16px; }
}
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📚 广东省C3安全员模拟考试</h1>

        </div>
        <div class="question-card" id="questionCard"></div>

            <button class="btn btn-primary" onclick="nextQuestion()">下一题 ➡️</button>
        </div>
        <div id="explanation" class="explanation"></div>
    </div>

    <div class="result-area" id="resultArea"></div>
    <div class="history-area" id="historyArea"></div>
</div>

<div class="timer" id="timer"></div>

const questions = [{"id": 1, "question": "根据《建筑起重机械安全监督管理规定》，建筑起重机械在（\n安全生产考核第六批题库及参考答案\n重要提示：自2025 年10 月20 日起，广东省建筑施工企业安全生产\n管理人员安全生产考核启用第六批考核题库。\n一、单选题\n）\n应当经有相应资质的检验检测机构监督检验合格。\nA.验收前\nB.验收后\nC.调试前\nD.调试后", "options": {"A": "验收前", "B": "验收后", "C": "调试前", "D": "调试后"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 2, "question": "根据《建筑起重机械安全监督管理规定》，建筑起重机械特种作业\n人员应当遵守建筑起重机械安全操作规程和安全管理制度，在作业中\n有权拒绝违章指挥和强令冒险作业，（\n）在发生危及人身安全的紧\n急情况时立即停止作业或者采取必要的应急措施后撤离危险区域。\nA.有权\nB.无权\nC.有责任\nD.无责任", "options": {"A": "有权", "B": "无权", "C": "有责任", "D": "无责任"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 3, "question": "根据《建筑起重机械安全监督管理规定》，建筑起重机械经验收合\n\n=== 第2页 ===\n格后方可投入使用，未经验收或者验收不合格的（\n）。\nA.不得使用\nB.减少起重量使用\nC.应立即报废\nD.可以试用", "options": {"A": "不得使用", "B": "减少起重量使用", "C": "应立即报废", "D": "可以试用"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 4, "question": "根据《建筑起重机械安全监督管理规定》，建筑起重机械安装完毕\n后，安装单位应当按照安全技术标准及安装使用说明书的有关要求对\n建筑起重机械进行自检、调试和试运转。自检合格的，应当出具自检\n合格证明，并向（\n）进行安全使用说明。\nA.生产单位\nB.安装单位\nC.使用单位\nD.监理单位", "options": {"A": "生产单位", "B": "安装单位", "C": "使用单位", "D": "监理单位"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 5, "question": "根据《建筑起重机械安全监督管理规定》，建筑起重机械安装完毕\n后，（\n）应当组织出租、安装、监理等有关单位进行验收，或者委\n托具有相应资质的检验检测机构进行验收。\nA.生产单位\nB.安装单位\nC.使用单位\nD.监理单位\n\n=== 第3页 ===", "options": {"A": "生产单位", "B": "安装单位", "C": "使用单位", "D": "监理单位 === 第3页 ==="}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 6, "question": "根据《建筑起重机械安全监督管理规定》，出租单位在建筑起重机\n械（\n）前，自购建筑起重机械的使用单位在建筑起重机械首次安\n装前，应当持建筑起重机械特种设备制造许可证、产品合格证和制造\n监督检验证明到本单位工商注册所在地县级以上地方人民政府建设\n主管部门办理备案。\nA.首次订购\nB.首次出租\nC.每次订购\nD.每次出租", "options": {"A": "首次订购", "B": "首次出租", "C": "每次订购", "D": "每次出租"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 7, "question": "根据《建筑起重机械安全监督管理规定》，（\n）应当建立建筑起\n重机械安装、拆卸工程档案。\nA.生产单位\nB.安装单位\nC.使用单位\nD.监理单位", "options": {"A": "生产单位", "B": "安装单位", "C": "使用单位", "D": "监理单位"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 8, "question": "根据《中华人民共和国行政处罚法》规定，对违法行为给予行政处\n罚的规定必须（\n）；未经公布的，不得作为行政处罚的依据。\nA.公开\nB.公布\n\n=== 第4页 ===\nC.保密\nD.告知", "options": {"A": "公开", "B": "公布 === 第4页 ===", "C": "保密", "D": "告知"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 9, "question": "根据《建筑起重机械安全监督管理规定》，（\n）的专业技术人员、\n专职安全生产管理人员应当进行现场监督，技术负责人应当定期巡查。\nA.生产单位\nB.安装单位\nC.使用单位\nD.监理单位", "options": {"A": "生产单位", "B": "安装单位", "C": "使用单位", "D": "监理单位"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 10, "question": "根据《建设工程安全生产管理条例》，施工单位的主要负责人、项\n目经理、专职安全生产管理人员应当经（\n）或其他有关部门考核\n合格后方可任职。\nA.安全生产管理机构\nB.建设行政主管部门\nC.监察机构\nD.劳动保障机构", "options": {"A": "安全生产管理机构", "B": "建设行政主管部门", "C": "监察机构", "D": "劳动保障机构"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 11, "question": "根据《建设工程安全生产管理条例》，军事建设工程的安全生产管\n理，按照（\n）的有关规定执行。\nA.国务院\nB.中央军事委员会\n\n=== 第5页 ===\nC.建设部\nD.地方各级人民政府", "options": {"A": "国务院", "B": "中央军事委员会 === 第5页 ===", "C": "建设部", "D": "地方各级人民政府"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 12, "question": "根据《建设工程安全生产管理条例》规定，作业人员应当遵守安\n全施工的强制性标准、规章制度和操作规程，（\n）安全防护用具、\n机械设备等。\nA.正确使用\nB.正确穿戴\nC.正确装配\nD.正确佩戴", "options": {"A": "正确使用", "B": "正确穿戴", "C": "正确装配", "D": "正确佩戴"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 13, "question": "对事故报告和调查处理中的违法行为，任何单位和个人有权向\n（\n）、监察机关或者其他有关部门举报，接到举报的部门应当依法\n及时处理。\nA.安全生产监督管理部门\nB.工会组织\nC.当地人民政府\nD.国家海事管理机构", "options": {"A": "安全生产监督管理部门", "B": "工会组织", "C": "当地人民政府", "D": "国家海事管理机构"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 14, "question": "根据《建设工程安全生产管理条例》规定，施工单位应当在施工\n现场建立（\n），确定消防安全责任人。\nA.消防安全责任制度\n\n=== 第6页 ===\nB.消防责任制度\nC.安全责任制度\nD.消防警示制度", "options": {"A": "消防安全责任制度 === 第6页 ===", "B": "消防责任制度", "C": "安全责任制度", "D": "消防警示制度"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 15, "question": "根据《建设工程安全生产管理条例》规定，施工单位采购、租赁\n的安全防护用具、机械设备、施工机具及配件，应当具有（\n），并\n在进入施工现场前进行查验。\nA.生产（制造）许可证、产品合格证\nB.产品编号和生产日期\nC.产品材料证明\nD.生产制造人员和检验人员", "options": {"A": "生产（制造）许可证、产品合格证", "B": "产品编号和生产日期", "C": "产品材料证明", "D": "生产制造人员和检验人员"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 16, "question": "根据《建设工程安全生产管理条例》规定，施工单位不得在尚未\n竣工的建筑物内设置（\n）。\nA.避雨处\nB.吸烟处\nC.临时厕所\nD.员工集体宿舍", "options": {"A": "避雨处", "B": "吸烟处", "C": "临时厕所", "D": "员工集体宿舍"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 17, "question": "根据《建设工程安全生产管理条例》的规定，建设行政主管部门\n或者其他有关部门可以将施工现场的监督检查（\n）给建设工程监\n督机构具体实施。\n\n=== 第7页 ===\nA.委托\nB.移交\nC.直接\nD.批准", "options": {"A": "委托", "B": "移交", "C": "直接", "D": "批准"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 18, "question": "根据《建设工程安全生产管理条例》的规定，（\n）应当设立安\n全生产管理机构，配备专职安全生产管理人员。\nA.工程监理单位\nB.建设单位\nC.施工单位\nD.设计单位", "options": {"A": "工程监理单位", "B": "建设单位", "C": "施工单位", "D": "设计单位"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 19, "question": "根据《建设工程安全生产管理条例》，作业人员不服管理、违反规\n章制度和操作规程冒险作业造成（\n）或者其他严重后果，构成犯\n罪的，依照刑法有关规定追究刑事责任。\nA.安全生产事故\nB.机械事故\nC.一般事故\nD.重大伤亡事故", "options": {"A": "安全生产事故", "B": "机械事故", "C": "一般事故", "D": "重大伤亡事故"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 20, "question": "根据《建设工程安全生产管理条例》，总承包单位应当自行完成建\n设工程（\n）的施工。\n\n=== 第8页 ===\nA.整体结构\nB.主要结构\nC.主体结构\nD.所有结构", "options": {"A": "整体结构", "B": "主要结构", "C": "主体结构", "D": "所有结构"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 21, "question": "根据《建设工程安全生产管理条例》，总承包单位和分包单位对分\n包工程的安全生产承担（\n）责任。\nA.全部\nB.连带\nC.部分\nD.主要", "options": {"A": "全部", "B": "连带", "C": "部分", "D": "主要"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 22, "question": "根据《建设工程安全生产管理条例》，总承包单位（\n）完成建\n设工程主体结构的施工。\nA.可转包其他单位\nB.可联合其他单位\nC.应当自行\nD.可部分分包", "options": {"A": "可转包其他单位", "B": "可联合其他单位", "C": "应当自行", "D": "可部分分包"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 23, "question": "根据《建设工程安全生产管理条例》，注册执业人员未执行法律、\n法规和工程建设强制性标准的，造成重大安全事故的，（\n）内不予\n注册。\n\n=== 第9页 ===\nA.3 年\nB.5 年\nC.8 年\nD.终身", "options": {"A": "3 年", "B": "5 年", "C": "8 年", "D": "终身"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 24, "question": "根据《建设工程安全生产管理条例》，注册执业人员未执行法律、\n法规和工程建设强制性标准的，情节严重的，吊销资格证书，（\n）\n内不予注册。\nA.1 年\nB.3 年\nC.2 年\nD.5 年", "options": {"A": "1 年", "B": "3 年", "C": "2 年", "D": "5 年"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 25, "question": "根据《建设工程安全生产管理条例》，意外伤害保险期限自建设工\n程开工之日起至（\n）止。\nA.保修期结束\nB.竣工验收合格\nC.建筑封顶\nD.施工作业人员退场", "options": {"A": "保修期结束", "B": "竣工验收合格", "C": "建筑封顶", "D": "施工作业人员退场"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 26, "question": "根据《建设工程安全生产管理条例》，依法批准开工报告的建设工\n程，建设单位应当自开工报告批准之日起（\n）日内，将保证安全\n\n=== 第10页 ===\n施工的措施报送建设工程所在地县级以上地方人民政府建设行政主\n管部门或者其他有关部门备案。\nA.7\nB.15\nC.30\nD.60", "options": {"A": "7", "B": "15", "C": "30", "D": "60"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 27, "question": "根据《建设工程安全生产管理条例》，施工单位应当根据不同施工\n阶段和周围环境及季节、气候的变化，在施工现场采取相应的（\n）。\nA.安全施工方案\nB.安全施工措施\nC.质量保障措施\nD.安全检查措施", "options": {"A": "安全施工方案", "B": "安全施工措施", "C": "质量保障措施", "D": "安全检查措施"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 28, "question": "根据《建设工程安全生产管理条例》，建设行政主管部门在审核发\n放施工许可证时，应当对建设工程是否有（\n）进行审查，对没有\n此项内容的，不得颁发施工许可证。\nA.安全操作规程\nB.安全施工措施\nC.应急处置措施\nD.工程质量保证措施", "options": {"A": "安全操作规程", "B": "安全施工措施", "C": "应急处置措施", "D": "工程质量保证措施"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 29, "question": "根据《建设工程安全生产管理条例》，建设行政主管部门或者其他\n有关部门对建设工程是否有安全施工措施进行审查时，（\n）。\nA.可以收取费用\nB.不得收取费用\nC.适当收取合理费用\nD.收取必要费用", "options": {"A": "可以收取费用", "B": "不得收取费用", "C": "适当收取合理费用", "D": "收取必要费用"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 30, "question": "根据《建设工程安全生产管理条例》，建设单位不得对勘察、设计、\n施工、工程监理等单位提出不符合建设工程安全生产法律、法规和强\n制性标准规定的要求，不得（\n）。\nA.变更合同约定的造价\nB.变更合同约定的内容\nC.变更设计图纸\nD.压缩合同约定的工期", "options": {"A": "变更合同约定的造价", "B": "变更合同约定的内容", "C": "变更设计图纸", "D": "压缩合同约定的工期"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 31, "question": "根据《建设工程安全生产管理条例》，建设单位不得（\n）施工\n单位购买、租赁、使用不符合安全施工要求的安全防护用具、机械设\n备、施工机具及配件、消防设施和器材。\nA.委托\nB.明示或暗示\nC.要求\nD.命令\n\n=== 第12页 ===", "options": {"A": "委托", "B": "明示或暗示", "C": "要求", "D": "命令 === 第12页 ==="}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 32, "question": "根据《中华人民共和国大气污染防治法》规定，国家建立（\n）\n天气监测预警体系。\nA.一般污染\nB.轻度污染\nC.中度污染\nD.重污染", "options": {"A": "一般污染", "B": "轻度污染", "C": "中度污染", "D": "重污染"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 33, "question": "根据《安全生产约谈实施办法》的规定，国务院安委会主任约见\n（\n），就安全生产有关问题进行提醒、告诫，督促整改的谈话。\nA.被约谈单位负责人\nB.被约谈单位安全负责人\nC.地方人民政府负责人\nD.地方人民政府安全监督管理部门负责人", "options": {"A": "被约谈单位负责人", "B": "被约谈单位安全负责人", "C": "地方人民政府负责人", "D": "地方人民政府安全监督管理部门负责人"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 34, "question": "根据《安全生产约谈实施办法》的规定，被约谈方应当在约定的\n时限内将整改措施落实情况（\n）报约谈方。\nA.电报\nB.书面\nC.电话\nD.传真", "options": {"A": "电报", "B": "书面", "C": "电话", "D": "传真"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 35, "question": "根据《安全生产许可证条例》规定，企业取得安全生产许可证应\n当有职业危害防治措施，下列属于职业病的是（\n）。\nA.肺结核\nB.尘肺\nC.新冠肺炎\nD.乙肝", "options": {"A": "肺结核", "B": "尘肺", "C": "新冠肺炎", "D": "乙肝"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 36, "question": "根据《安全生产许可证条例》规定，企业取得安全生产许可证应\n当依法参加（\n）保险，为从业人员缴纳保险费。\nA.意外伤害\nB.工伤\nC.大病医疗\nD.养老", "options": {"A": "意外伤害", "B": "工伤", "C": "大病医疗", "D": "养老"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 37, "question": "根据《安全生产许可证条例》规定，企业取得安全生产许可证应\n当设立（\n）。\nA.消防救援部门\nB.人事部门\nC.安全生产管理机构\nD.安全培训机构", "options": {"A": "消防救援部门", "B": "人事部门", "C": "安全生产管理机构", "D": "安全培训机构"}, "answer": "C", "type": "single", "category": "消防安全"}, {"id": 38, "question": "根据《安全生产许可证条例》规定，不符合本条例规定的安全生\n\n=== 第14页 ===\n产条件的，不予颁发安全生产许可证，（\n）通知企业并说明理由。\nA.书面\nB.口头\nC.电话\nD.电子邮件", "options": {"A": "书面", "B": "口头", "C": "电话", "D": "电子邮件"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 39, "question": "根据《安全生产许可证条例》规定，安全生产许可证有效期可一\n次延期（\n）年。\nA.6\nB.5\nC.4\nD.3", "options": {"A": "6", "B": "5", "C": "4", "D": "3"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 40, "question": "根据《安全生产培训管理办法》的规定，安全生产监管执法证、\n煤矿安全监察执法证、安全合格证的有效期为（\n）年。\nA.1\nB.2\nC.3\nD.6", "options": {"A": "1", "B": "2", "C": "3", "D": "6"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 41, "question": "根据“安管人员”相关考核规定，对考核不合格的，应当通过“安\n管人员”（\n）通知本人并说明理由。\n\n=== 第15页 ===\nA.所在企业\nB.培训机构\nC.人才中心\nD.考核中心", "options": {"A": "所在企业", "B": "培训机构", "C": "人才中心", "D": "考核中心"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 42, "question": "各级住建部门要加强安全生产知识（\n），把典型事故和应急救\n援避险知识普及社会教育体系。\nA.公益宣传\nB.宣传督导\nC.教育培训\nD.教育管理", "options": {"A": "公益宣传", "B": "宣传督导", "C": "教育培训", "D": "教育管理"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 43, "question": "高温天气作业是指用人单位在高温天气期间安排劳动者在高温\n（\n）下进行的作业。\nA.室内环境\nB.自然气象环境\nC.工作场所\nD.室外环境", "options": {"A": "室内环境", "B": "自然气象环境", "C": "工作场所", "D": "室外环境"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 44, "question": "法人组织因违法行为受到行政处罚，其违法行为对他人造成损害\n的，应当依法承担（\n）。\nA.民事责任\n\n=== 第16页 ===\nB.行政责任\nC.刑事责任\nD.违法责任", "options": {"A": "民事责任 === 第16页 ===", "B": "行政责任", "C": "刑事责任", "D": "违法责任"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 45, "question": "发生生产安全事故，对负有责任的生产经营单位除要求其依法承\n担相应的赔偿等责任外，由应急管理部门依照下列规定处以罚款：\n（\n）。\nA.发生一般事故的，处二十万元以上五十万元以下的罚款\nB.发生一般事故的，处十万元以上五十万元以下的罚款\nC.发生一般事故的，处三十万元以上五十万元以下的罚款\nD.发生一般事故的，处三十万元以上一百万元以下的罚款", "options": {"A": "发生一般事故的，处二十万元以上五十万元以下的罚款", "B": "发生一般事故的，处十万元以上五十万元以下的罚款", "C": "发生一般事故的，处三十万元以上五十万元以下的罚款", "D": "发生一般事故的，处三十万元以上一百万元以下的罚款"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 46, "question": "发生（\n）或贯彻落实党中央、国务院安全生产重大决策部署不\n坚决、不到位的，由国务院安委会主任或副主任约谈省级人民政府主\n要负责人。\nA.重大事故\nB.特别重大事故\nC.较大事故\nD.一般事故", "options": {"A": "重大事故", "B": "特别重大事故", "C": "较大事故", "D": "一般事故"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 47, "question": "地方性法规可以设定除限制人身自由、（\n）以外的行政处罚。\nA.行政拘留\n\n=== 第17页 ===\nB.责令停业\nC.吊销营业执照\nD.罚款", "options": {"A": "行政拘留 === 第17页 ===", "B": "责令停业", "C": "吊销营业执照", "D": "罚款"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 48, "question": "从业人员发现直接危及人身安全的情况时，有权停止作业或者\n（\n）。\nA.觉得危险不大继续作业\nB.在采取可能的应急措施后撤离作业场所\nC.直接撤离作业场所\nD.要求继续作业", "options": {"A": "觉得危险不大继续作业", "B": "在采取可能的应急措施后撤离作业场所", "C": "直接撤离作业场所", "D": "要求继续作业"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 49, "question": "安全生产监督管理部门和负有安全生产监督管理职责的有关部门\n接到重大事故报告后，逐级上报至（\n）安全生产监督管理部门和\n负有安全生产监督管理职责的有关部门。\nA.设区的市级人民政府\nB.省级人民政府\nC.省、自治区、直辖市人民政府\nD.国务院", "options": {"A": "设区的市级人民政府", "B": "省级人民政府", "C": "省、自治区、直辖市人民政府", "D": "国务院"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 50, "question": "安全生产工作应当以人为本，坚持人民至上、生命至上，把保护\n（\n）摆在首位，树牢安全发展理念。\nA.人民生命安全\n\n=== 第18页 ===\nB.生产安全\nC.国家安全\nD.安全效益", "options": {"A": "人民生命安全 === 第18页 ===", "B": "生产安全", "C": "国家安全", "D": "安全效益"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 51, "question": "安全生产工作实行管行业必须管安全、管业务必须管安全、管\n（\n）必须管安全，强化和落实生产经营单位主体责任与政府监管\n责任。\nA.生产经营\nB.财务\nC.行政\nD.政务", "options": {"A": "生产经营", "B": "财务", "C": "行政", "D": "政务"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 52, "question": "《生产安全事故报告和调查处理条例》自2007 年（\n）起施行。\n国务院1989 年3 月29 日公布的《特别重大事故调查程序暂行规定》\n和1991 年2 月22 日公布的《企业职工伤亡事故报告和处理规定》同\n时废止。\nA.6 月1 日\nB.9 月1 日\nC.10 月1 日\nD.12 月1 日", "options": {"A": "6 月1 日", "B": "9 月1 日", "C": "10 月1 日", "D": "12 月1 日"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 53, "question": "《生产安全事故报告和调查处理条例》规定，事故调查组应当自\n\n=== 第19页 ===\n事故发生之日起（\n）日内提交事故调查报告，特殊情况下，经负\n责事故调查的人民政府批准，提交事故调查报告的期限可适当延长。\nA.15\nB.30\nC.45\nD.60", "options": {"A": "15", "B": "30", "C": "45", "D": "60"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 54, "question": "《建设工程安全生产管理条例》规定，在施工中发生危及人身安\n全的紧急情况时，（\n）有权立即停止作业或者在采取必要的应急措\n施后撤离危险区域。\nA.作业人员\nB.负责人\nC.行政主管\nD.安全主管", "options": {"A": "作业人员", "B": "负责人", "C": "行政主管", "D": "安全主管"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 55, "question": "《建设工程安全生产管理条例》规定，施工单位专职安全生产管\n理人员负责对安全生产进行现场监督检查。发现安全事故隐患，应当\n及时向（\n）报告。\nA.项目负责人\nB.安全生产管理机构\nC.项目负责人和安全生产管理机构\nD.建设行政主管部门\n\n=== 第20页 ===", "options": {"A": "项目负责人", "B": "安全生产管理机构", "C": "项目负责人和安全生产管理机构", "D": "建设行政主管部门 === 第20页 ==="}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 56, "question": "《建设工程安全生产管理条例》规定，施工单位应当自施工起重\n机械和整体提升脚手架、模板等自升式架设设施（\n），向建设行政\n主管部门或者其他有关部门登记。\nA.验收合格之日起15 日内\nB.验收合格之日起30 日内\nC.安装完毕后15 日内\nD.安装完毕后30 日内", "options": {"A": "验收合格之日起15 日内", "B": "验收合格之日起30 日内", "C": "安装完毕后15 日内", "D": "安装完毕后30 日内"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 57, "question": "《建设工程安全生产管理条例》规定，建设单位在编制工程概算\n时，应当确定建设工程安全作业（\n）及安全施工措施所需费用。\nA.场地\nB.工序\nC.人员\nD.环境", "options": {"A": "场地", "B": "工序", "C": "人员", "D": "环境"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 58, "question": "《国务院关于加强和规范事中事后监管的指导意见》要求适应新\n经济新技术发展趋势，及时修订调整已有标准，加快新产业新业态标\n准的研究制定。加强质量认证体系建设，对涉及安全、健康、环保等\n方面的产品依法实施（\n）。\nA.强制性认证\nB.推荐性认证\n\n=== 第21页 ===\nC.选择性认证\nD.分类认证", "options": {"A": "强制性认证", "B": "推荐性认证 === 第21页 ===", "C": "选择性认证", "D": "分类认证"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 59, "question": "《国务院关于加强和规范事中事后监管的指导意见》提出：原则\n上所有日常涉企行政检查都应通过“（\n）”的方式进行。\nA.一随机、双公开\nB.双随机、一公开\nC.双随机、双公开\nD.一随机、一公开", "options": {"A": "一随机、双公开", "B": "双随机、一公开", "C": "双随机、双公开", "D": "一随机、一公开"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 60, "question": "（\n）应当服从总承包单位的安全生产管理，（\n）不服从管理\n导致生产安全事故的，由（\n）承担主要责任。\nA.建设单位；建设单位；建设单位\nB.监理单位；监理单位；监理单位\nC.施工单位；施工单位；施工单位\nD.分包单位；分包单位；分包单位", "options": {"A": "建设单位；建设单位；建设单位", "B": "监理单位；监理单位；监理单位", "C": "施工单位；施工单位；施工单位", "D": "分包单位；分包单位；分包单位"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 61, "question": "（\n）转让、出借资质证书或者以其他方式允许他人以本企业的\n名义承揽工程的，责令改正，没收违法所得，并处罚款，可以责令停\n业整顿，降低资质等级。\nA.建设单位\nB.项目管理单位\n\n=== 第22页 ===\nC.建筑施工企业\nD.物业服务单位", "options": {"A": "建设单位", "B": "项目管理单位 === 第22页 ===", "C": "建筑施工企业", "D": "物业服务单位"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 62, "question": "（\n）由国务院或者国务院授权有关部门组织事故调查组进行调\n查。\nA.一般事故\nB.较大事故\nC.重大事故\nD.特别重大事故", "options": {"A": "一般事故", "B": "较大事故", "C": "重大事故", "D": "特别重大事故"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 63, "question": "（\n）应当遵守有关环境保护和安全生产的法律、法规的规定，\n采取控制和处理施工现场的各种粉尘、废气、废水、固体废物以及噪\n声、振动对环境的污染和危害的措施。\nA.建设单位\nB.监理单位\nC.建筑施工企业\nD.勘察单位", "options": {"A": "建设单位", "B": "监理单位", "C": "建筑施工企业", "D": "勘察单位"}, "answer": "C", "type": "single", "category": "文明施工"}, {"id": 64, "question": "（\n）应当在施工现场采取维护安全、防范危险、预防火灾等措\n施；有条件的，应当对施工现场实行封闭管理。\nA.建设单位\nB.监理单位\n\n=== 第23页 ===\nC.建筑施工企业\nD.物业公司", "options": {"A": "建设单位", "B": "监理单位 === 第23页 ===", "C": "建筑施工企业", "D": "物业公司"}, "answer": "C", "type": "single", "category": "消防安全"}, {"id": 65, "question": "（\n）应当依照有关法律法规和本规定，对“安管人员”持证上\n岗、教育培训和履行职责等情况进行监督检查。\nA.县级以上人民政府住房城乡建设主管部门\nB.县级以上人民政府安全监督管理部门\nC.市级以上人民政府住房城乡建设主管部门\nD.省级以上人民政府住房城乡建设主管部门", "options": {"A": "县级以上人民政府住房城乡建设主管部门", "B": "县级以上人民政府安全监督管理部门", "C": "市级以上人民政府住房城乡建设主管部门", "D": "省级以上人民政府住房城乡建设主管部门"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 66, "question": "（\n）应当将防治扬尘污染的费用列入工程造价，并在施工承包\n合同中明确施工单位扬尘污染防治责任。\nA.设计单位\nB.建设单位\nC.总包单位\nD.政府部门", "options": {"A": "设计单位", "B": "建设单位", "C": "总包单位", "D": "政府部门"}, "answer": "B", "type": "single", "category": "文明施工"}, {"id": 67, "question": "（\n）应当对机关、团体、企业、事业等单位遵守消防法律、法\n规的情况依法进行监督检查。\nA.应急管理部门\nB.消防救援机构\nC.公安部门\n\n=== 第24页 ===\nD.专职消防队", "options": {"A": "应急管理部门", "B": "消防救援机构", "C": "公安部门 === 第24页 ===", "D": "专职消防队"}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 68, "question": "（\n）应当对本行政区域内前款规定的重点生产经营单位的生产\n安全事故应急救援预案演练进行抽查。\nA.县级以上地方人民政府\nB.国务院行业主管部门\nC.应急管理部\nD.县级以上地方人民政府负有安全生产监督管理职责的部门", "options": {"A": "县级以上地方人民政府", "B": "国务院行业主管部门", "C": "应急管理部", "D": "县级以上地方人民政府负有安全生产监督管理职责的部门"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 69, "question": "（\n）应当按照法律、法规和工程建设强制性标准进行勘察，提\n供的勘察文件应当真实、准确，满足建设工程安全生产的需要。\nA.建设单位\nB.设计单位\nC.施工单位\nD.勘察单位", "options": {"A": "建设单位", "B": "设计单位", "C": "施工单位", "D": "勘察单位"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 70, "question": "（\n）应当安排用于配备劳动防护用品、进行安全生产培训的经\n费。\nA.负有安全生产监督管理职责的部门\nB.劳动保护部门\nC.劳务单位\nD.生产经营单位\n\n=== 第25页 ===", "options": {"A": "负有安全生产监督管理职责的部门", "B": "劳动保护部门", "C": "劳务单位", "D": "生产经营单位 === 第25页 ==="}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 71, "question": "（\n）以下等级事故，事故发生地与事故发生单位不在同一个县\n级以上行政区域的，由事故发生地人民政府负责调查，事故发生单位\n所在地人民政府应当派人参加。\nA.特别重大事故\nB.重大事故\nC.较大事故\nD.一般事故", "options": {"A": "特别重大事故", "B": "重大事故", "C": "较大事故", "D": "一般事故"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 72, "question": "（\n）以上人民政府生态环境主管部门对大气污染防治实施统一\n监督管理。\nA.县级\nB.地市级\nC.省级\nD.直辖市", "options": {"A": "县级", "B": "地市级", "C": "省级", "D": "直辖市"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 73, "question": "（\n）以上地方人民政府应急管理部门对本行政区域内的消防工\n作实施监督管理，并由本级人民政府消防救援机构负责实施。\nA.街道\nB.县级\nC.市级\nD.省级\n\n=== 第26页 ===", "options": {"A": "街道", "B": "县级", "C": "市级", "D": "省级 === 第26页 ==="}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 74, "question": "（\n）依照《中华人民共和国行政处罚法》的规定，对安全生产\n许可证颁发管理机关及其工作人员履行本条例规定的职责实施监察。\nA.监察机关\nB.公安机关\nC.发证机关\nD.法院", "options": {"A": "监察机关", "B": "公安机关", "C": "发证机关", "D": "法院"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 75, "question": "（\n）依法维护工伤职工的合法权益，对用人单位的工伤保险工\n作实行监督。\nA.监管部门\nB.政府部门\nC.社会保险行政部门\nD.工会组织", "options": {"A": "监管部门", "B": "政府部门", "C": "社会保险行政部门", "D": "工会组织"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 76, "question": "依据《中华人民共和国建筑法》，（\n）违反本法规定，对建筑安\n全事故隐患不采取措施予以消除的，责令改正，可以处以罚款；情节\n严重的，责令停业整顿，降低资质等级或者吊销资质证书；构成犯罪\n的，依法追究刑事责任。\nA.建设单位\nB.监理单位\nC.建筑施工企业\n\n=== 第27页 ===\nD.设计单位", "options": {"A": "建设单位", "B": "监理单位", "C": "建筑施工企业 === 第27页 ===", "D": "设计单位"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 77, "question": "（\n）人民政府、城市街道办事处应当指导、支持和帮助村民委\n员会、居民委员会开展群众性的消防工作。\nA.直辖市\nB.地级市\nC.县区\nD.乡镇", "options": {"A": "直辖市", "B": "地级市", "C": "县区", "D": "乡镇"}, "answer": "D", "type": "single", "category": "消防安全"}, {"id": 78, "question": "（\n）接到事故报告后，应当迅速采取有效措施，组织抢救，防\n止事故扩大，减少人员伤亡和财产损失。\nA.现场负责人\nB.安全负责人\nC.单位负责人\nD.生产负责人", "options": {"A": "现场负责人", "B": "安全负责人", "C": "单位负责人", "D": "生产负责人"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 79, "question": "（\n）级以上人民政府建设主管部门应当加强对建筑施工企业安\n全生产许可证的监督管理。\nA.县\nB.市\nC.省\nD.区\n\n=== 第28页 ===", "options": {"A": "县", "B": "市", "C": "省", "D": "区 === 第28页 ==="}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 80, "question": "（\n）级以上地方各级人民政府社会保险行政部门负责本行政区\n域内的工伤保险工作。\nA.乡\nB.县\nC.市\nD.省", "options": {"A": "乡", "B": "县", "C": "市", "D": "省"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 81, "question": "（\n）和个人不得阻挠和干涉对事故的报告和依法调查处理。\nA.生产单位\nB.参建单位\nC.任何单位\nD.安监部门", "options": {"A": "生产单位", "B": "参建单位", "C": "任何单位", "D": "安监部门"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 82, "question": "（\n）公安机关根据事故的情况，对涉嫌犯罪的，应当依法立案\n侦查，采取强制措施和侦查措施。\nA.事故发生地\nB.犯罪行为地\nC.事故发生单位注册地\nD.事故发生单位法人户籍地", "options": {"A": "事故发生地", "B": "犯罪行为地", "C": "事故发生单位注册地", "D": "事故发生单位法人户籍地"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 83, "question": "地方政府规章设定的行政处罚中，罚款的限额由省级（\n）规定。\n\n=== 第29页 ===\nA.人民代表大会\nB.人民政府\nC.人民政协\nD.人民代表大会常务委员会", "options": {"A": "人民代表大会", "B": "人民政府", "C": "人民政协", "D": "人民代表大会常务委员会"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 84, "question": "（\n）负责本行政区域内规定以外的建筑施工企业安全生产许可\n证的颁发和管理。\nA.市级建设行政主管部门\nB.省级建设行政主管部门\nC.国务院建设主管部门\nD.县级以上建设行政主管部门", "options": {"A": "市级建设行政主管部门", "B": "省级建设行政主管部门", "C": "国务院建设主管部门", "D": "县级以上建设行政主管部门"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 85, "question": "（\n）负有安全生产监督管理职责的部门应当按照国家有关规定\n建立生产安全事故应急救援信息系统。\nA.县级以上地方人民政府\nB.市级以上人民政府\nC.省级以上人民政府\nD.国务院", "options": {"A": "县级以上地方人民政府", "B": "市级以上人民政府", "C": "省级以上人民政府", "D": "国务院"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 86, "question": "（\n）对本企业安全生产工作全面负责，应当建立健全企业安全\n生产管理体系，落实安全生产责任制度。\nA.安全负责人\n\n=== 第30页 ===\nB.法人授权代表人\nC.主要负责人\nD.项目经理", "options": {"A": "安全负责人 === 第30页 ===", "B": "法人授权代表人", "C": "主要负责人", "D": "项目经理"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 87, "question": "（\n）的行政处罚权只能由公安机关和法律规定的其他机关行使。\nA.限制人身自由\nB.警告\nC.罚款\nD.通报批评", "options": {"A": "限制人身自由", "B": "警告", "C": "罚款", "D": "通报批评"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 88, "question": "（\n）的管理人员违章指挥、强令职工冒险作业，因而发生重大\n伤亡事故或者造成其他严重后果的，依法追究刑事责任。\nA.建设单位\nB.监理单位\nC.设计单位\nD.建筑施工企业", "options": {"A": "建设单位", "B": "监理单位", "C": "设计单位", "D": "建筑施工企业"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 89, "question": "（\n）的颁布实施，标志着安全生产成为我国现阶段建筑业工作\n的重点，安全生产制度被确立为促进我国建筑业发展的一项根本制度。\nA.《中华人民共和国建筑法》\nB.《中华人民共和国安全生产法》\nC.《建设工程安全生产管理条例》\n\n=== 第31页 ===\nD.《建设工程质量管理条例》", "options": {"A": "《中华人民共和国建筑法》", "B": "《中华人民共和国安全生产法》", "C": "《建设工程安全生产管理条例》 === 第31页 ===", "D": "《建设工程质量管理条例》"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 90, "question": "（\n）必须遵守本法和其他有关安全生产的法律、法规，加强安\n全生产管理，建立健全全员安全生产责任制和安全生产规章制度。\nA.行政事业单位\nB.行政监督部门\nC.生产部门\nD.生产经营单位", "options": {"A": "行政事业单位", "B": "行政监督部门", "C": "生产部门", "D": "生产经营单位"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 91, "question": "（\n）必须依法加强对建筑安全生产的管理，执行安全生产责任\n制度，采取有效措施，防止伤亡和其他安全生产事故的发生。\nA.建设单位\nB.监理单位\nC.建筑施工企业\nD.物业公司", "options": {"A": "建设单位", "B": "监理单位", "C": "建筑施工企业", "D": "物业公司"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 92, "question": "（\n）、生态环境主管部门应当依法加强机动车维修单位对在用\n机动车是否按要求进行维修的情况监督管理。\nA.交通运输\nB.公安交警\nC.应急管理\nD.市场质量监督\n\n=== 第32页 ===", "options": {"A": "交通运输", "B": "公安交警", "C": "应急管理", "D": "市场质量监督 === 第32页 ==="}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 93, "question": "依照《中华人民共和国消防法》第二十四条规定经强制性产品认\n证合格或者技术鉴定合格的消防产品，国务院（\n）应当予以公布。\nA.产品质量监督部门\nB.应急管理部门\nC.公安部门\nD.科学技术部门", "options": {"A": "产品质量监督部门", "B": "应急管理部门", "C": "公安部门", "D": "科学技术部门"}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 94, "question": "乡镇人民政府应当根据当地经济发展和消防工作的需要，建立专\n职消防队、（\n），承担火灾扑救工作。\nA.综合性消防救援队\nB.消防站\nC.志愿消防队\nD.消防宣传机构", "options": {"A": "综合性消防救援队", "B": "消防站", "C": "志愿消防队", "D": "消防宣传机构"}, "answer": "C", "type": "single", "category": "消防安全"}, {"id": 95, "question": "生产经营单位委托前款规定的机构提供安全生产技术、管理服务\n的，保证安全生产的责任（\n）。\nA.由服务单位负责\nB.由服务单位和本单位对半负责\nC.由本单位负责\nD.由服务单位和本单位连带负责", "options": {"A": "由服务单位负责", "B": "由服务单位和本单位对半负责", "C": "由本单位负责", "D": "由服务单位和本单位连带负责"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 96, "question": "编制有关开发利用规划，建设对环境有影响的项目，应当依法进\n行（\n）。\nA.环境状况评价\nB.环境保护\nC.环境影响评价\nD.环境危害研究", "options": {"A": "环境状况评价", "B": "环境保护", "C": "环境影响评价", "D": "环境危害研究"}, "answer": "C", "type": "single", "category": "文明施工"}, {"id": 97, "question": "涉及（\n）的装修工程，建设单位应当在施工前委托设计单位提\n出设计方案；没有设计方案的，不得施工。\nA.门窗翻新\nB.承重结构变动\nC.外立面涂刷\nD.地坪翻新", "options": {"A": "门窗翻新", "B": "承重结构变动", "C": "外立面涂刷", "D": "地坪翻新"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 98, "question": "地方各级人民政府应当加强对（\n）消防工作的领导，采取措施\n加强公共消防设施建设，组织建立和督促落实消防安全责任制。\nA.农村\nB.社区\nC.企业\nD.学校", "options": {"A": "农村", "B": "社区", "C": "企业", "D": "学校"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 99, "question": "单位专职消防队、志愿消防队参加扑救外单位火灾所损耗的燃料、\n\n=== 第34页 ===\n灭火剂和器材、装备等，由火灾发生地的（\n）给予补偿。\nA.人民政府\nB.本单位\nC.外单位\nD.消防救援机构", "options": {"A": "人民政府", "B": "本单位", "C": "外单位", "D": "消防救援机构"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 100, "question": "单位违反《中华人民共和国消防法》规定，占用、堵塞、封闭消\n防车通道，妨碍消防车通行的，责令改正，处（\n）罚款。\nA.5 千元以上5 万元以下\nB.1 万元以上5 万元以下\nC.3 万元以上8 万元以下\nD.3 万元以上10 万元以下", "options": {"A": "5 千元以上5 万元以下", "B": "1 万元以上5 万元以下", "C": "3 万元以上8 万元以下", "D": "3 万元以上10 万元以下"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 101, "question": "单位违反《中华人民共和国消防法》规定，消防设施、器材或者\n消防安全标志的配置、设置不符合国家标准、行业标准，或者未保持\n完好有效的，责令改正，处（\n）罚款。\nA.5 千元以上5 万元以下\nB.1 万元以上5 万元以下\nC.3 万元以上8 万元以下\nD.5 万元以上30 万元以下", "options": {"A": "5 千元以上5 万元以下", "B": "1 万元以上5 万元以下", "C": "3 万元以上8 万元以下", "D": "5 万元以上30 万元以下"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 102, "question": "单位违反《中华人民共和国消防法》规定，损坏、挪用或者擅自\n\n=== 第35页 ===\n拆除、停用消防设施、器材的，责令改正，处（\n）罚款。\nA.5 千元以上5 万元以下\nB.1 万元以上5 万元以下\nC.3 万元以上8 万元以下\nD.3 万元以上10 万元以下", "options": {"A": "5 千元以上5 万元以下", "B": "1 万元以上5 万元以下", "C": "3 万元以上8 万元以下", "D": "3 万元以上10 万元以下"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 103, "question": "单位违反《中华人民共和国消防法》规定，人员密集场所在门窗\n上设置影响逃生和灭火救援的障碍物的，责令改正，处（\n）罚款。\nA.5 千元以上5 万元以下\nB.1 万元以上5 万元以下\nC.3 万元以上8 万元以下\nD.3 万元以上10 万元以下", "options": {"A": "5 千元以上5 万元以下", "B": "1 万元以上5 万元以下", "C": "3 万元以上8 万元以下", "D": "3 万元以上10 万元以下"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 104, "question": "单位违反《中华人民共和国消防法》规定，埋压、圈占、遮挡消\n火栓或者占用防火间距的，责令改正，处（\n）罚款。\nA.5 千元以上5 万元以下\nB.1 万元以上5 万元以下\nC.3 万元以上8 万元以下\nD.3 万元以上10 万元以下", "options": {"A": "5 千元以上5 万元以下", "B": "1 万元以上5 万元以下", "C": "3 万元以上8 万元以下", "D": "3 万元以上10 万元以下"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 105, "question": "单位违反《中华人民共和国消防法》规定，对火灾隐患经消防救\n援机构通知后不及时采取措施消除的，责令改正，处（\n）罚款。\n\n=== 第36页 ===\nA.5 千元以上5 万元以下\nB.1 万元以上5 万元以下\nC.3 万元以上8 万元以下\nD.3 万元以上10 万元以下", "options": {"A": "5 千元以上5 万元以下", "B": "1 万元以上5 万元以下", "C": "3 万元以上8 万元以下", "D": "3 万元以上10 万元以下"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 106, "question": "单位负责人接到事故报告后，应当迅速采取有效措施，（\n），\n防止事故扩大，减少人员伤亡和财产损失。\nA.抢救财产\nB.组织抢救\nC.通知投资人\nD.筹措费用", "options": {"A": "抢救财产", "B": "组织抢救", "C": "通知投资人", "D": "筹措费用"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 107, "question": "大型建筑工程或者结构复杂的建筑工程，可以由两个以上的承包\n单位联合共同承包。共同承包的各方对承包合同的履行承担（\n）。\nA.独立责任\nB.全部责任\nC.协议责任\nD.连带责任", "options": {"A": "独立责任", "B": "全部责任", "C": "协议责任", "D": "连带责任"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 108, "question": "存在高温职业病危害的用人单位，（\n）实施由专人负责的高温\n日常监测，并按照有关规定进行职业病危害因素检测、评价。\nA.可以\n\n=== 第37页 ===\nB.应当\nC.推荐\nD.需要", "options": {"A": "可以 === 第37页 ===", "B": "应当", "C": "推荐", "D": "需要"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 109, "question": "存在高温职业病危害的建设项目，（\n）保证其设计符合国家职\n业卫生相关标准和卫生要求。\nA.可以\nB.应当\nC.推荐\nD.需要", "options": {"A": "可以", "B": "应当", "C": "推荐", "D": "需要"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 110, "question": "从业人员发现（\n）人身安全的情况时，有权停止作业或者在\n采取可能的应急措施后撤离作业场所。\nA.影响\nB.直接危及\nC.可能危及\nD.可能出现", "options": {"A": "影响", "B": "直接危及", "C": "可能危及", "D": "可能出现"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 111, "question": "从业人员（\n）安全生产教育和培训，掌握本职工作所需的安\n全生产知识，提高安全生产技能，增强事故预防和应急处理能力。\nA.有义务接受\nB.自愿接受\n\n=== 第38页 ===\nC.可以接受\nD.宜接受", "options": {"A": "有义务接受", "B": "自愿接受 === 第38页 ===", "C": "可以接受", "D": "宜接受"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 112, "question": "从事建筑活动的专业技术人员，应当依法取得相应的执业资格证\n书，并在（\n）的范围内从事建筑活动。\nA.长期从事领域\nB.执业资格证书许可\nC.专业擅长领域\nD.毕业专业课程", "options": {"A": "长期从事领域", "B": "执业资格证书许可", "C": "专业擅长领域", "D": "毕业专业课程"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 113, "question": "从事建筑活动的建筑施工企业、勘察单位、设计单位和工程监理\n单位，经资质审查合格，取得相应等级的资质证书后，方可在（\n）\n内从事建筑活动。\nA.注册所在地地域省\nB.其资质等级许可的范围\nC.专业擅长领域\nD.资质备案地范围", "options": {"A": "注册所在地地域省", "B": "其资质等级许可的范围", "C": "专业擅长领域", "D": "资质备案地范围"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 114, "question": "从事房屋建筑、（\n）、河道整治以及建筑物拆除等施工单位，\n应当向负责监督管理扬尘污染防治的主管部门备案。\nA.园林园艺\nB.改造装修\n\n=== 第39页 ===\nC.室内装修\nD.市政基础设施建设", "options": {"A": "园林园艺", "B": "改造装修 === 第39页 ===", "C": "室内装修", "D": "市政基础设施建设"}, "answer": "D", "type": "single", "category": "文明施工"}, {"id": 115, "question": "从事（\n）的劳动者必须经过专门培训并取得特种作业资格。\nA.特种设备管理\nB.特种作业\nC.高危险作业\nD.职业危害作业", "options": {"A": "特种设备管理", "B": "特种作业", "C": "高危险作业", "D": "职业危害作业"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 116, "question": "除中央管理的其他建筑施工企业，包括中央管理的建筑施工企业\n（集团公司、总公司）下属的建筑施工企业，应当向企业注册所在地\n（\n）申请领取安全生产许可证。\nA.省级建设行政主管部门\nB.市级建设行政主管部门\nC.国务院建设主管部门\nD.县级以上建设行政主管部门", "options": {"A": "省级建设行政主管部门", "B": "市级建设行政主管部门", "C": "国务院建设主管部门", "D": "县级以上建设行政主管部门"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 117, "question": "初次违法且危害后果轻微并及时改正的，（\n）不予行政处罚。\nA.应当\nB.可以\nC.必须\nD.不得\n\n=== 第40页 ===", "options": {"A": "应当", "B": "可以", "C": "必须", "D": "不得 === 第40页 ==="}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 118, "question": "城市人民政府可以划定并公布高污染燃料禁燃区，高污染燃料的\n目录由（\n）确定。\nA.国务院生态环境主管部门\nB.省级生态环境主管部门\nC.直辖市生态环境主管部门\nD.自治区生态环境主管部门", "options": {"A": "国务院生态环境主管部门", "B": "省级生态环境主管部门", "C": "直辖市生态环境主管部门", "D": "自治区生态环境主管部门"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 119, "question": "城市轨道交通运营、建筑施工单位（\n）建立应急救援组织。\nA.可以\nB.应当\nC.自觉\nD.宜", "options": {"A": "可以", "B": "应当", "C": "自觉", "D": "宜"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 120, "question": "承包建筑工程的单位应当持有依法取得的资质证书，并在其\n（\n）内承揽工程。\nA.注册所在地地域省\nB.专业擅长领域\nC.资质等级许可的范围\nD.资质备案地范围", "options": {"A": "注册所在地地域省", "B": "专业擅长领域", "C": "资质等级许可的范围", "D": "资质备案地范围"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 121, "question": "《广东省安全生产条例》规定，安全生产工作应当（\n），坚持\n\n=== 第41页 ===\n人民至上、生命至上，把保护人民生命安全摆在首位，树牢安全发展\n理念，坚持安全第一、预防为主、综合治理的方针，从源头上防范化\n解重大安全风险。\nA.以保护财产为根本\nB.以不发生事故为根本\nC.以人为本\nD.以增产增收为根本", "options": {"A": "以保护财产为根本", "B": "以不发生事故为根本", "C": "以人为本", "D": "以增产增收为根本"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 122, "question": "《广东省安全生产条例》规定，下列生产经营单位的主要负责人\n应当履行的安全生产工作职责，表述不准确的是（\n）。\nA.组织制定并实施本单位安全生产教育和培训计划\nB.保证本单位安全生产投入的有效实施\nC.督促安全风险分级管控、隐患排查和整改措施的落实，及时消除生\n产安全事故隐患，每半年至少组织一次安全生产全面检查，研究分析\n安全生产存在问题\nD.组织实施生产安全事故应急救援预案，每年至少组织一次应急救援\n演练", "options": {"A": "组织制定并实施本单位安全生产教育和培训计划", "B": "保证本单位安全生产投入的有效实施", "C": "督促安全风险分级管控、隐患排查和整改措施的落实，及时消除生 产安全事故隐患，每半年至少组织一次安全生产全面检查，研究分析 安全生产存在问题", "D": "组织实施生产安全事故应急救援预案，每年至少组织一次应急救援 演练"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 123, "question": "《广东省安全生产条例》规定，生产经营单位应当使用符合（\n）\n的安全设备，对安全设备进行经常性维护、保养，并定期检测，保证\n正常运转。\nA.国家级标准\n\n=== 第42页 ===\nB.省级标准\nC.行业标准\nD.国家标准或者行业标准", "options": {"A": "国家级标准 === 第42页 ===", "B": "省级标准", "C": "行业标准", "D": "国家标准或者行业标准"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 124, "question": "《广东省安全生产条例》规定，生产经营单位对（\n）应当登\n记建档。登记建档内容包括重大危险源的名称、位置、性质、应急措\n施和可能造成的危害等。\nA.重大隐患\nB.较大隐患\nC.重大危险源\nD.一般危险源", "options": {"A": "重大隐患", "B": "较大隐患", "C": "重大危险源", "D": "一般危险源"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 125, "question": "参加事故调查工作的人员应当（\n）、（\n），遵守事故调查组\n的纪律。\nA.诚信公正；恪尽职守\nB.诚信公正；秉公守法\nC.公平合法；恪尽职守\nD.公正无私；秉公守法", "options": {"A": "诚信公正；恪尽职守", "B": "诚信公正；秉公守法", "C": "公平合法；恪尽职守", "D": "公正无私；秉公守法"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 126, "question": "《广东省安全生产条例》规定，生产经营单位应当落实（\n）\n制度，开展安全风险识别、分析、评价，并按照安全风险分级采取相\n应的管控措施。\n\n=== 第43页 ===\nA.事故分类管理\nB.隐患分级管理\nC.安全风险分类管控\nD.安全风险分级管控", "options": {"A": "事故分类管理", "B": "隐患分级管理", "C": "安全风险分类管控", "D": "安全风险分级管控"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 127, "question": "《广东省安全生产条例》规定，建筑施工、危险化学品的生产经\n营单位，应当按照规定向负有安全生产监督管理职责的部门实时、准\n确、完整地报送下列安全生产数据（\n）。\nA.安全生产视频监控和监测预警数据\nB.经营情况数据\nC.较大安全风险数据\nD.隐患排查数据", "options": {"A": "安全生产视频监控和监测预警数据", "B": "经营情况数据", "C": "较大安全风险数据", "D": "隐患排查数据"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 128, "question": "《广东省安全生产条例》规定，生产经营单位进行爆破、吊装、\n动火、临时用电、悬吊、挖掘、建设工程拆除作业，有限空间作业和\n国家规定的其他危险作业，应当执行相关作业管理规定以及本单位作\n业管理制度，落实现场安全管理措施。以下现场安全管理措施描述错\n误的是（\n）。\nA.制定作业方案或者安全防范措施，设置安全警示标志\nB.安排兼职人员进行现场安全管理，确保操作规程的遵守和安全措施\n的落实\nC.向作业人员说明危险因素、安全作业要求和应急措施\n\n=== 第44页 ===\nD.按照规定开具安全作业票证，并对安全作业票证进行现场查验确认", "options": {"A": "制定作业方案或者安全防范措施，设置安全警示标志", "B": "安排兼职人员进行现场安全管理，确保操作规程的遵守和安全措施 的落实", "C": "向作业人员说明危险因素、安全作业要求和应急措施 === 第44页 ===", "D": "按照规定开具安全作业票证，并对安全作业票证进行现场查验确认"}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 129, "question": "《广东省安全生产条例》规定，事故调查报告应当从（\n）等\n方面详细分析事故原因，并依法及时向社会公布。事故调查组成员的\n不同意见应当在事故调查报告的附件中说明。\nA.人员和管理\nB.技术和管理\nC.技术和人员\nD.人员和环境", "options": {"A": "人员和管理", "B": "技术和管理", "C": "技术和人员", "D": "人员和环境"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 130, "question": "不是行政处罚适用简易程序的必备条件是（\n）。\nA.符合当场处罚的范围\nB.当事人对当场行政处罚无异议\nC.违法事实确凿\nD.有法定依据", "options": {"A": "符合当场处罚的范围", "B": "当事人对当场行政处罚无异议", "C": "违法事实确凿", "D": "有法定依据"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 131, "question": "不得安排未成年工从事矿山井下、有毒有害、国家规定的第（\n）\n体力劳动强度的劳动和其他禁忌从事的劳动。\nA.一级\nB.二级\nC.三级\nD.四级\n\n=== 第45页 ===", "options": {"A": "一级", "B": "二级", "C": "三级", "D": "四级 === 第45页 ==="}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 132, "question": "不得安排女职工在经期从事（\n）作业和国家规定的第三级体\n力劳动强度的劳动。\nA.高处、低温\nB.高处、焊接\nC.钢筋、冷水\nD.高处、模板", "options": {"A": "高处、低温", "B": "高处、焊接", "C": "钢筋、冷水", "D": "高处、模板"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 133, "question": "不得安排女职工在怀孕期间从事国家规定的第（\n）体力劳动\n强度的劳动和孕期禁忌从事的劳动。\nA.一级\nB.二级\nC.三级\nD.四级", "options": {"A": "一级", "B": "二级", "C": "三级", "D": "四级"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 134, "question": "不得安排女职工在哺乳未满一周岁的婴儿期间从事国家规定的\n第三级体力劳动强度的劳动和哺乳期禁忌从事的其他劳动，不得安排\n（\n）。\nA.出差作业\nB.户外作业\nC.夜班劳动\nD.站立作业\n\n=== 第46页 ===", "options": {"A": "出差作业", "B": "户外作业", "C": "夜班劳动", "D": "站立作业 === 第46页 ==="}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 135, "question": "《中华人民共和国建筑法》规定的责令停业整顿、降低资质等级\n和吊销资质证书的行政处罚，由（\n）决定。\nA.行政管理机关\nB.工商管理机关\nC.颁发资质证书的机关\nD.公安机关", "options": {"A": "行政管理机关", "B": "工商管理机关", "C": "颁发资质证书的机关", "D": "公安机关"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 136, "question": "根据《建筑施工企业安全生产许可证动态监管暂行办法》，颁发\n管理机关接到本办法第十条规定的暂扣安全生产许可证建议后，应当\n于（\n）个工作日内立案，并根据情节轻重依法给予企业暂扣安全\n生产许可证（\n）日至（\n）日的处罚。\nA.5；30；60\nB.7；30；60\nC.5；60；90\nD.10；60；90", "options": {"A": "5；30；60", "B": "7；30；60", "C": "5；60；90", "D": "10；60；90"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 137, "question": "按照法律、法规和工程建设强制性标准进行设计，防止因设计不\n合理导致生产安全事故的发生，是（\n）的安全责任。\nA.建设单位\nB.勘察单位\nC.施工单位\n\n=== 第47页 ===\nD.设计单位", "options": {"A": "建设单位", "B": "勘察单位", "C": "施工单位 === 第47页 ===", "D": "设计单位"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 138, "question": "安装单位、使用单位拒不整改生产安全事故隐患的，建设单位接\n到（\n）报告后，应当责令安装单位、使用单位立即停工整改。\nA.施工单位\nB.监理单位\nC.建设单位\nD.出租单位", "options": {"A": "施工单位", "B": "监理单位", "C": "建设单位", "D": "出租单位"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 139, "question": "安全生产许可证有效期满需要延期的，企业应当向（\n）办理\n延期手续。\nA.企业办公地管理机关\nB.原安全生产许可证颁发管理机关\nC.企业注册地管理机关\nD.企业项目所在地管理机关", "options": {"A": "企业办公地管理机关", "B": "原安全生产许可证颁发管理机关", "C": "企业注册地管理机关", "D": "企业项目所在地管理机关"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 140, "question": "安全生产许可证由（\n）安全生产监督管理部门规定统一的式\n样。\nA.国务院\nB.省级\nC.自治区\nD.直辖市\n\n=== 第48页 ===", "options": {"A": "国务院", "B": "省级", "C": "自治区", "D": "直辖市 === 第48页 ==="}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 141, "question": "安全生产许可证颁发机构应在收到申请之日起（\n）日内审查\n完毕。\nA.15\nB.20\nC.30\nD.45", "options": {"A": "15", "B": "20", "C": "30", "D": "45"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 142, "question": "主要负责人、项目负责人未按规定履行安全生产管理，构成犯罪\n受处罚的，自刑罚执行完毕之日起，（\n）内不得担任建筑施工企业\n的主要负责人、项目负责人。\nA.3 年\nB.5 年\nC.10 年\nD.终生", "options": {"A": "3 年", "B": "5 年", "C": "10 年", "D": "终生"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 143, "question": "安全生产许可证颁发管理机关应当自收到申请之日起（\n）日\n内审查完毕，经审查符合本条例规定的安全生产条件的，颁发安全生\n产许可证。\nA.60\nB.45\nC.30\n\n=== 第49页 ===\nD.15", "options": {"A": "60", "B": "45", "C": "30 === 第49页 ===", "D": "15"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 144, "question": "安全生产许可证颁发管理机关应当定期向社会公布企业取得安\n全生产许可证的情况，（\n）向同级安全生产监督管理部门通报建筑\n施工企业安全生产许可证颁发和管理情况。\nA.每年\nB.每半年\nC.每两年\nD.每季度", "options": {"A": "每年", "B": "每半年", "C": "每两年", "D": "每季度"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 145, "question": "安全生产许可证颁发管理机关应当（\n）向社会公布企业取得\n安全生产许可证的情况。\nA.定期\nB.每年\nC.每月\nD.每半年", "options": {"A": "定期", "B": "每年", "C": "每月", "D": "每半年"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 146, "question": "安全生产考核合格证书有效期为（\n）年，证书在全国范围内\n有效。\nA.1\nB.3\nC.5\n\n=== 第50页 ===\nD.7", "options": {"A": "1", "B": "3", "C": "5 === 第50页 ===", "D": "7"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 147, "question": "安全生产考核合格证书有效期届满需要延续的，须按规定参加企\n业和（\n）组织的安全生产教育培训。\nA.县级以上人民政府住房城乡建设主管部门\nB.市级以上人民政府住房城乡建设主管部门\nC.省级以上人民政府住房城乡建设主管部门\nD.国务院住房城乡建设主管部门", "options": {"A": "县级以上人民政府住房城乡建设主管部门", "B": "市级以上人民政府住房城乡建设主管部门", "C": "省级以上人民政府住房城乡建设主管部门", "D": "国务院住房城乡建设主管部门"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 148, "question": "安全生产考核合格证书有效期届满需要延续的，且证书有效期内\n无相关违规记录的，考核机关应当在受理延续申请之日起（\n）个\n工作日内，准予证书延续。\nA.15\nB.20\nC.30\nD.45", "options": {"A": "15", "B": "20", "C": "30", "D": "45"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 149, "question": "安全生产考核合格证书有效期届满需要延续的，“安管人员”应\n当在有效期届满前3 个月内，由本人通过受聘企业向原考核机关申请\n证书延续。准予证书延续的，证书有效期延续（\n）年。\nA.4\nB.3\n\n=== 第51页 ===\nC.2\nD.1", "options": {"A": "4", "B": "3 === 第51页 ===", "C": "2", "D": "1"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 150, "question": "安全生产考核合格证书有效期届满需要延续的，“安管人员”应\n当在有效期届满前（\n）个月内，由本人通过受聘企业向原考核机\n关申请证书延续。\nA.1\nB.3\nC.5\nD.7", "options": {"A": "1", "B": "3", "C": "5", "D": "7"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 151, "question": "重大事故、较大事故、一般事故，负责事故调查的人民政府应当\n自收到事故调查报告之日起（\n）日内作出批复。\nA.3\nB.7\nC.15\nD.30", "options": {"A": "3", "B": "7", "C": "15", "D": "30"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 152, "question": "安全生产监督检查人员依法履行监督检查职责，（\n）应当予以\n配合，不得拒绝、阻挠。\nA.建设单位\nB.施工单位\n\n=== 第52页 ===\nC.监理单位\nD.各参建单位", "options": {"A": "建设单位", "B": "施工单位 === 第52页 ===", "C": "监理单位", "D": "各参建单位"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 153, "question": "安全生产监督管理部门及有关部门接到特别重大事故报告后，逐\n级上报至（\n）安全生产监督管理部门和负有安全生产监督管理职\n责的有关部门。\nA.设区的市级人民政府\nB.省级人民政府\nC.省、自治区、直辖市人民政府\nD.国务院", "options": {"A": "设区的市级人民政府", "B": "省级人民政府", "C": "省、自治区、直辖市人民政府", "D": "国务院"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 154, "question": "安全生产监督管理部门和其他负有安全生产监督管理职责的部\n门依法开展安全生产行政执法工作，对生产经营单位进行监督检查，\n行使以下职权：（\n）。\nA.对检查中发现的安全生产违法行为，五天内作出行政处罚决定\nB.进入生产经营单位进行检查，调阅有关资料，向有关单位和人员了\n解情况\nC.监督检查时，被检查单位承担检查相关费用\nD.监督检查时，被检查单位暂停生产经营活动", "options": {"A": "对检查中发现的安全生产违法行为，五天内作出行政处罚决定", "B": "进入生产经营单位进行检查，调阅有关资料，向有关单位和人员了 解情况", "C": "监督检查时，被检查单位承担检查相关费用", "D": "监督检查时，被检查单位暂停生产经营活动"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 155, "question": "安全生产监督管理部门和负有安全生产监督管理职责的有关部\n门逐级上报事故情况，每级上报时间不得超过（\n）。\n\n=== 第53页 ===\nA.1 小时\nB.2 小时\nC.4 小时\nD.12 小时", "options": {"A": "1 小时", "B": "2 小时", "C": "4 小时", "D": "12 小时"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 156, "question": "安全生产监督管理部门和负有安全生产监督管理职责的有关部\n门应对事故发生单位落实（\n）和整改措施的情况进行监督检查。\nA.预防\nB.防止\nC.检查\nD.防范", "options": {"A": "预防", "B": "防止", "C": "检查", "D": "防范"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 157, "question": "安全生产监督管理部门和负有安全生产监督管理职责的有关部\n门应当建立值班制度，并向社会公布值班电话，受理事故报告和（\n）。\nA.追查\nB.处理\nC.举报\nD.投诉", "options": {"A": "追查", "B": "处理", "C": "举报", "D": "投诉"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 158, "question": "安全生产监督管理部门和负有安全生产监督管理职责的有关部\n门接到（\n）事故报告后，逐级上报至省、自治区、直辖市人民政\n府安全生产监督管理部门和负有安全生产监督管理职责的有关部门。\n\n=== 第54页 ===\nA.一般\nB.较大\nC.重大\nD.特别重大", "options": {"A": "一般", "B": "较大", "C": "重大", "D": "特别重大"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 159, "question": "安全生产监督管理部门和对有关行业、领域的安全生产工作实施\n监督管理的部门，统称（\n）。\nA.安全生产综合监督管理部门\nB.负有安全生产监督管理职责的部门\nC.应急管理部门\nD.应急救援部门", "options": {"A": "安全生产综合监督管理部门", "B": "负有安全生产监督管理职责的部门", "C": "应急管理部门", "D": "应急救援部门"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 160, "question": "重大事故，是指造成（\n）人以上（\n）人以下死亡，或者（\n）\n人以上（\n）人以下重伤，或者5000 万元以上1 亿元以下直接经济\n损失的事故。\nA.10；30；70；100\nB.10；20；50；100\nC.10；30；50；100\nD.10；15；30；50", "options": {"A": "10；30；70；100", "B": "10；20；50；100", "C": "10；30；50；100", "D": "10；15；30；50"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 161, "question": "安全生产工作应当以人为本，坚持安全发展，坚持（\n）的方\n针。\n\n=== 第55页 ===\nA.安全第一、预防为主、综合治理\nB.安全第一、预防为主、以人为本\nC.安全第一、预防为主、协调发展\nD.安全第一、预防为主、可持续发展", "options": {"A": "安全第一、预防为主、综合治理", "B": "安全第一、预防为主、以人为本", "C": "安全第一、预防为主、协调发展", "D": "安全第一、预防为主、可持续发展"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 162, "question": "安全生产工作实行管（\n）必须管安全、管业务必须管安全、\n管生产经营必须管安全，强化和落实生产经营单位主体责任与政府监\n管责任。\nA.行业\nB.财务\nC.行政\nD.政务", "options": {"A": "行业", "B": "财务", "C": "行政", "D": "政务"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 163, "question": "安全生产工作坚持（\n）的领导。\nA.国务院\nB.中国共产党\nC.应急管理部\nD.城乡建设部", "options": {"A": "国务院", "B": "中国共产党", "C": "应急管理部", "D": "城乡建设部"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 164, "question": "安全生产工作不力，发生重大事故或6 个月内发生（\n）起较\n大事故，由国务院安委会办公室负责人约谈市人民政府主要负责人。\nA.1\n\n=== 第56页 ===\nB.2\nC.3\nD.4", "options": {"A": "1 === 第56页 ===", "B": "2", "C": "3", "D": "4"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 165, "question": "安全生产工作不力，发生重大事故或（\n）个月内发生3 起较\n大事故，由国务院安委会办公室负责人约谈市人民政府主要负责人。\nA.3\nB.4\nC.5\nD.6", "options": {"A": "3", "B": "4", "C": "5", "D": "6"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 166, "question": "安全生产标准化评定为优良的建筑施工项目数量，原则上不超过\n所辖区域内本年度拟竣工项目数量的（\n）。\nA.10%\nB.15%\nC.20%\nD.30%", "options": {"A": "10%", "B": "15%", "C": "20%", "D": "30%"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 167, "question": "《生产安全事故报告和调查处理条例》是为了规范生产安全事故\n的报告和调查处理，落实生产安全事故责任追究制度，防止和减少生\n产安全事故，根据（\n）和有关法律制定。\nA.《中华人民共和国安全生产法》\n\n=== 第57页 ===\nB.《中华人民共和国安全生产许可条例》\nC.《中华人民共和国突发事件应对法》\nD.《生产安全事故应急条例》", "options": {"A": "《中华人民共和国安全生产法》 === 第57页 ===", "B": "《中华人民共和国安全生产许可条例》", "C": "《中华人民共和国突发事件应对法》", "D": "《生产安全事故应急条例》"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 168, "question": "制订《建设工程安全生产管理条例》的主要目的是（\n）。\nA.减少安全投入，节约安全成本\nB.加强建设安全生产监督管理，保障人民群众生命和财产\nC.制度评分办法，便于行业管理\nD.建立统一的司法解释，有助于法律程序的执行", "options": {"A": "减少安全投入，节约安全成本", "B": "加强建设安全生产监督管理，保障人民群众生命和财产", "C": "制度评分办法，便于行业管理", "D": "建立统一的司法解释，有助于法律程序的执行"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 169, "question": "《中华人民共和国行政处罚法》中“二日”“三日”“五日”“七\n日”的规定是指工作日，不含（\n）。\nA.节假日\nB.法定节假日\nC.休息日\nD.周六日", "options": {"A": "节假日", "B": "法定节假日", "C": "休息日", "D": "周六日"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 170, "question": "《危险性较大的分部分项工程安全管理规定》中所称危险性较大\n的分部分项工程（以下简称“危大工程”），是指房屋建筑和市政基础\n设施工程在（\n）中，容易导致人员群死群伤或者造成重大经济损\n失的分部分项工程。\nA.设计过程\n\n=== 第58页 ===\nB.施工过程\nC.监理过程\nD.验收过程", "options": {"A": "设计过程 === 第58页 ===", "B": "施工过程", "C": "监理过程", "D": "验收过程"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 171, "question": "《危险性较大的分部分项工程安全管理规定》适用于房屋建筑和\n市政基础设施工程中（\n）的分部分项工程安全管理。\nA.危险性一般\nB.危险性较大\nC.危险性重大\nD.危险性特大", "options": {"A": "危险性一般", "B": "危险性较大", "C": "危险性重大", "D": "危险性特大"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 172, "question": "《生产安全事故报告和调查处理条例》中，根据生产安全事故造\n成的人员伤亡或者直接经济损失，事故分为（\n）等级。\nA.3 个\nB.4 个\nC.5 个\nD.6 个", "options": {"A": "3 个", "B": "4 个", "C": "5 个", "D": "6 个"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 173, "question": "《生产安全事故报告和调查处理条例》规定的罚款的行政处罚，\n由（\n）决定。\nA.人民政府\nB.事故调查组\n\n=== 第59页 ===\nC.安监部门\nD.监察部门", "options": {"A": "人民政府", "B": "事故调查组 === 第59页 ===", "C": "安监部门", "D": "监察部门"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 174, "question": "《生产安全事故报告和调查处理条例》规定，有关机关应当按照\n人民政府的批复，依照法律、行政法规规定的权限和程序，对事故发\n生单位和有关人员进行（\n），对负有事故责任的国家工作人员进行\n（\n）。\nA.行政处罚；处理\nB.行政处罚；处分\nC.行政处罚和经济处罚；处理\nD.行政处罚和经济处罚；处分", "options": {"A": "行政处罚；处理", "B": "行政处罚；处分", "C": "行政处罚和经济处罚；处理", "D": "行政处罚和经济处罚；处分"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 175, "question": "《生产安全事故报告和调查处理条例》规定，事故发生后，有关\n单位和人员应当妥善保护事故现场以及相关证据，任何单位和个人不\n得（\n）。\nA.损坏事故现场，毁坏相关证据\nB.破坏事故现场，毁坏相关证据\nC.破坏事故现场，消除相关证据\nD.破坏事故现场，毁灭相关证据", "options": {"A": "损坏事故现场，毁坏相关证据", "B": "破坏事故现场，毁坏相关证据", "C": "破坏事故现场，消除相关证据", "D": "破坏事故现场，毁灭相关证据"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 176, "question": "《生产安全事故报告和调查处理条例》规定，事故发生单位对事\n故发生负有责任的，其单位主要负责人受到刑事处罚或者撤职处分的，\n\n=== 第60页 ===\n自刑罚执行完毕或者受处分之日起，5 年内不得担任任何（\n）。\nA.单位法人\nB.单位负责人\nC.生产经营单位法人\nD.生产经营单位主要负责人", "options": {"A": "单位法人", "B": "单位负责人", "C": "生产经营单位法人", "D": "生产经营单位主要负责人"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 177, "question": "《生产安全事故报告和调查处理条例》规定，事故调查中涉嫌犯\n罪的，事故调查组应当及时将有关材料或其复印件移交（\n）处理。\nA.上级机关\nB.司法机关\nC.当地人民政府\nD.安全生产监督管理部门", "options": {"A": "上级机关", "B": "司法机关", "C": "当地人民政府", "D": "安全生产监督管理部门"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 178, "question": "《生产安全事故报告和调查处理条例》规定，事故调查技术鉴定\n所需时间（\n）事故调查期限。\nA.计入\nB.不计入\nC.部分计入\nD.经专家论证后确定是否计入", "options": {"A": "计入", "B": "不计入", "C": "部分计入", "D": "经专家论证后确定是否计入"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 179, "question": "《生产安全事故报告和调查处理条例》规定，事故调查报告应当\n附具（\n），事故调查组成员应当在事故调查报告上（\n）。\n\n=== 第61页 ===\nA.对事故发生单位的处理建议；附具事故调查个人总结\nB.对事故发生单位的处理建议；签名\nC.有关证据材料；附具事故调查个人总结\nD.有关证据材料；签名", "options": {"A": "对事故发生单位的处理建议；附具事故调查个人总结", "B": "对事故发生单位的处理建议；签名", "C": "有关证据材料；附具事故调查个人总结", "D": "有关证据材料；签名"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 180, "question": "《生产安全事故报告和调查处理条例》规定，事故调查报告报送\n负责（\n）后，事故调查工作即告结束。\nA.事故调查的人民政府\nB.事故调查的安全生产监督管理部门\nC.司法机关\nD.事故发生地人民检察院", "options": {"A": "事故调查的人民政府", "B": "事故调查的安全生产监督管理部门", "C": "司法机关", "D": "事故发生地人民检察院"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 181, "question": "《生产安全事故报告和调查处理条例》规定，事故报告应当及时、\n准确、完整，（\n）和个人对事故不得迟报、漏报、谎报或者瞒报。\nA.生产单位\nB.参建单位\nC.任何单位\nD.安监部门", "options": {"A": "生产单位", "B": "参建单位", "C": "任何单位", "D": "安监部门"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 182, "question": "《生产安全事故报告和调查处理条例》规定，负责重大事故、较\n大事故、一般事故调查的人民政府应当自收到事故调查报告之日起\n（\n）日内做出批复，特别重大事故，（\n）日内做出批复，特殊\n\n=== 第62页 ===\n情况下，批复时间可适当延长。\nA.7；15\nB.7；30\nC.15；30\nD.15；60", "options": {"A": "7；15", "B": "7；30", "C": "15；30", "D": "15；60"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 183, "question": "《生产安全事故报告和调查处理条例》规定，对事故发生单位主\n要负责人未依法履行安全生产职责，导致事故发生的，处上一年年收\n入80%的罚款的事故为（\n）。\nA.一般事故\nB.较大事故\nC.重大事故\nD.特别重大事故", "options": {"A": "一般事故", "B": "较大事故", "C": "重大事故", "D": "特别重大事故"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 184, "question": "《生产安全事故报告和调查处理条例》规定，对事故发生单位主\n要负责人未依法履行安全生产职责，导致事故发生的，处上一年年收\n入30%的罚款的事故为（\n）。\nA.一般事故\nB.较大事故\nC.重大事故\nD.特别重大事故", "options": {"A": "一般事故", "B": "较大事故", "C": "重大事故", "D": "特别重大事故"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 185, "question": "职工发生工伤，经治疗伤情相对稳定后存在残疾、影响劳动能力\n的，应当进行（\n）。\nA.工作能力鉴定\nB.劳动能力鉴定\nC.劳动能力认定\nD.工作能力认定", "options": {"A": "工作能力鉴定", "B": "劳动能力鉴定", "C": "劳动能力认定", "D": "工作能力认定"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 186, "question": "《建筑施工企业主要负责人、项目负责人和专职安全生产管理人\n员安全生产管理规定》自（\n）起施行。\nA.2014 年8 月1 日\nB.2014 年1 月1 日\nC.2014 年9 月1 日\nD.2015 年1 月1 日", "options": {"A": "2014 年8 月1 日", "B": "2014 年1 月1 日", "C": "2014 年9 月1 日", "D": "2015 年1 月1 日"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 187, "question": "《建筑施工企业安全生产许可证管理规定》中，建筑施工企业因\n违法需将其安全生产许可证暂扣、吊销的，由（\n）决定。\nA.省级人民政府建设主管部门\nB.市级人民政府建设主管部门\nC.县级人民政府建设主管部门\nD.安全生产许可证的颁发管理机关", "options": {"A": "省级人民政府建设主管部门", "B": "市级人民政府建设主管部门", "C": "县级人民政府建设主管部门", "D": "安全生产许可证的颁发管理机关"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 188, "question": "《建设工程安全生产管理条例》规定的（\n），由建设行政主管\n\n=== 第64页 ===\n部门或者其他有关部门依照法定职权决定。\nA.民事责任\nB.行政处罚\nC. 刑事处罚\nD.赔偿责任", "options": {"A": "民事责任", "B": "行政处罚", "C": "刑事处罚", "D": "赔偿责任"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 189, "question": "《建设工程安全生产管理条例》规定，专职安全生产管理人员负\n责对安全生产进行现场监督检查，对有违章指挥、违章操作情况的，\n应当（\n）。\nA.及时上报\nB.立即制止\nC.协商处理\nD.马上处罚", "options": {"A": "及时上报", "B": "立即制止", "C": "协商处理", "D": "马上处罚"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 190, "question": "《建设工程安全生产管理条例》规定，在城市市区内的建设工程，\n施工单位应对施工现场实行（\n）。\nA.封闭施工\nB.密闭\nC.围挡施工\nD.封闭围挡", "options": {"A": "封闭施工", "B": "密闭", "C": "围挡施工", "D": "封闭围挡"}, "answer": "D", "type": "single", "category": "文明施工"}, {"id": 191, "question": "《建设工程安全生产管理条例》规定，施工单位应对达到一定规\n\n=== 第65页 ===\n模的危险性较大的分部分项工程编制专项施工方案，并附具（\n），\n经施工单位技术负责人、总监理工程师签字后实施，由专职安全生产\n管理人员进行现场监督。\nA.进度计划控制措施\nB.安全验算结果\nC.安全操作规程\nD.安全措施方案", "options": {"A": "进度计划控制措施", "B": "安全验算结果", "C": "安全操作规程", "D": "安全措施方案"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 192, "question": "执法人员当场收缴的罚款，应当自收缴罚款之日起（\n）日内，\n交至行政机关。\nA.二\nB.三\nC.五\nD.七", "options": {"A": "二", "B": "三", "C": "五", "D": "七"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 193, "question": "《建设工程安全生产管理条例》规定，施工单位应当在施工组织\n设计中编制安全技术措施和施工现场（\n）方案。\nA.抢险救灾\nB.人员疏散\nC.临时用电\nD.抢险物资使用", "options": {"A": "抢险救灾", "B": "人员疏散", "C": "临时用电", "D": "抢险物资使用"}, "answer": "C", "type": "single", "category": "用电安全"}, {"id": 194, "question": "《建设工程安全生产管理条例》规定，施工单位应当在其（\n）\n内承揽工程。\nA.能力范围\nB.地域范围\nC.行业范围\nD.资质等级许可的范围", "options": {"A": "能力范围", "B": "地域范围", "C": "行业范围", "D": "资质等级许可的范围"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 195, "question": "《建设工程安全生产管理条例》规定，施工单位的项目负责人应\n当由（\n）的人员担任。\nA.具有相应职称\nB.具有施工经验\nC.长期从事安全生产管理工作\nD.取得相应执业资格", "options": {"A": "具有相应职称", "B": "具有施工经验", "C": "长期从事安全生产管理工作", "D": "取得相应执业资格"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 196, "question": "《建设工程安全生产管理条例》规定，施工单位采购的（\n）\n必须由专人管理，定期检查、维修和保养。\nA.安全防护用具、安全标志、安全操作规程\nB.安全防护用具、机械设备、安全操作规程\nC.安全防护用具、机械设备、施工机具及配件\nD.安全标志、机械设备、施工机具及配件", "options": {"A": "安全防护用具、安全标志、安全操作规程", "B": "安全防护用具、机械设备、安全操作规程", "C": "安全防护用具、机械设备、施工机具及配件", "D": "安全标志、机械设备、施工机具及配件"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 197, "question": "《建设工程安全生产管理条例》规定，施工单位（\n）依法对\n\n=== 第67页 ===\n本单位的安全生产工作全面负责。\nA.主要负责人\nB.董事长\nC.分管安全生产的负责人\nD.总经理", "options": {"A": "主要负责人", "B": "董事长", "C": "分管安全生产的负责人", "D": "总经理"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 198, "question": "《建设工程安全生产管理条例》规定，设计单位应当按照法律、\n法规和工程建设强制性标准进行设计，防止因设计不合理导致生产安\n全事故的发生。对建设工程的设计，（\n）应当对其设计负责。\nA.设计单位\nB.设计主管\nC.设计单位和注册建筑师等注册执业人员\nD.设计主管和注册建筑师等注册执业人员", "options": {"A": "设计单位", "B": "设计主管", "C": "设计单位和注册建筑师等注册执业人员", "D": "设计主管和注册建筑师等注册执业人员"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 199, "question": "《建设工程安全生产管理条例》规定，勘察在勘察作业时，应当\n严格执行（\n），采取措施保证各类管线、设施和周边建筑物、构筑\n物的安全。\nA.技术规范\nB.标准规范\nC.操作规程\nD.规章制度", "options": {"A": "技术规范", "B": "标准规范", "C": "操作规程", "D": "规章制度"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 200, "question": "《建设工程安全生产管理条例》规定，勘察单位应当按照（\n）\n进行勘察，提供的勘察文件应当真实准确，满足建设工程安全生产的\n需要。\nA.工程建设强制性标准\nB.法律、法规和合同约定\nC.合同约定和工程建设强制性标准\nD.法律、法规和工程建设强制性标准", "options": {"A": "工程建设强制性标准", "B": "法律、法规和合同约定", "C": "合同约定和工程建设强制性标准", "D": "法律、法规和工程建设强制性标准"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 201, "question": "《建设工程安全生产管理条例》规定，建设单位在编制（\n）\n时，应当确定建设工程安全作业环境及安全施工措施所需费用。\nA.工程估算\nB.工程概算\nC.工程预算\nD.工程决算", "options": {"A": "工程估算", "B": "工程概算", "C": "工程预算", "D": "工程决算"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 202, "question": "在施工现场安装、拆卸施工起重机械和整体提升脚手架、模板等\n自升式架设设施时，（\n）应当编制拆装方案、制定安全施工措施。\nA.建设单位\nB.安装单位\nC.施工总承包单位\nD.出租单位", "options": {"A": "建设单位", "B": "安装单位", "C": "施工总承包单位", "D": "出租单位"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 203, "question": "《建设工程安全生产管理条例》规定，建设单位应当将拆除工程\n发包给具有相应资质等级的施工单位。建设单位应当在拆除工程施工\n15 日前，将（\n）报送建设工程所在地县级以上人民政府建设行政\n主管部门或者其他有关部门备案。\nA.拟拆除建筑物、构筑物及可能危及毗邻建筑的说明\nB.工程项目负责人、安全管理人员和特种作业人员持证上岗情况\nC.拟用于安全生产和文明施工的措施费用清单\nD.临时设施规划方案和已搭建情况", "options": {"A": "拟拆除建筑物、构筑物及可能危及毗邻建筑的说明", "B": "工程项目负责人、安全管理人员和特种作业人员持证上岗情况", "C": "拟用于安全生产和文明施工的措施费用清单", "D": "临时设施规划方案和已搭建情况"}, "answer": "A", "type": "single", "category": "文明施工"}, {"id": 204, "question": "《建设工程安全生产管理条例》规定，建设单位应当将拆除工程\n发包给（\n）施工。\nA.具有相应能力的单位，但可以不一定有资质等级\nB.具有相应资质等级的施工单位\nC.具有相应资质等级的设计单位\nD.具有相应资质等级的勘察单位", "options": {"A": "具有相应能力的单位，但可以不一定有资质等级", "B": "具有相应资质等级的施工单位", "C": "具有相应资质等级的设计单位", "D": "具有相应资质等级的勘察单位"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 205, "question": "《建设工程安全生产管理条例》规定，国家对严重危及施工安全\n的工艺、设备、材料实行（\n）制度。\nA.限制使用\nB.定期取消\nC.淘汰\nD.禁止生产\n\n=== 第70页 ===", "options": {"A": "限制使用", "B": "定期取消", "C": "淘汰", "D": "禁止生产 === 第70页 ==="}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 206, "question": "《建设工程安全生产管理条例》规定，工程监理单位应当审查施\n工组织设计中的安全技术措施或者专项施工方案是否符合工程建设\n（\n）标准。\nA.推荐性\nB.国家\nC.强制性\nD.行业", "options": {"A": "推荐性", "B": "国家", "C": "强制性", "D": "行业"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 207, "question": "《建设工程安全生产管理条例》规定，工程监理单位应当审查施\n工组织设计中的安全技术措施或者专项施工方案是否符合（\n）。\nA.建设单位要求\nB.合同的有关规定\nC.工程监理规范\nD.工程建设强制性标准", "options": {"A": "建设单位要求", "B": "合同的有关规定", "C": "工程监理规范", "D": "工程建设强制性标准"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 208, "question": "《建设工程安全生产管理条例》规定，工程监理单位和监理工程\n师应当按照法律、法规和工程建设强制性标准实施监理，并对建设工\n程安全生产承担（\n）。\nA.全部责任\nB.部门责任\nC.监理责任\n\n=== 第71页 ===\nD.监督责任", "options": {"A": "全部责任", "B": "部门责任", "C": "监理责任 === 第71页 ===", "D": "监督责任"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 209, "question": "《建设工程安全生产管理条例》规定，分包单位应当服从总承包\n单位的安全生产管理，分包单位不服从管理导致生产安全事故的，\n（\n）。\nA.由总承包单位承担主要责任\nB.由分包单位承担主要责任\nC.由总承包单位和分包单位共同承担主要责任\nD.由分包单位承担责任，总承包单位不承担责任", "options": {"A": "由总承包单位承担主要责任", "B": "由分包单位承担主要责任", "C": "由总承包单位和分包单位共同承担主要责任", "D": "由分包单位承担责任，总承包单位不承担责任"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 210, "question": "《建设工程安全生产管理条例》规定，发生生产安全事故后，施\n工单位应当采取措施防止事故扩大，保护事故现场。需要移动现场物\n品时，应当（\n），妥善保管有关证物。\nA.绘制简图\nB.拍照或录像\nC.做出书面标记\nD.做出标记和书面记录", "options": {"A": "绘制简图", "B": "拍照或录像", "C": "做出书面标记", "D": "做出标记和书面记录"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 211, "question": "《建设工程安全生产管理条例》规定，出租单位应当对出租的机\n械设备和施工机具及配件的安全性能进行检测，在签订租赁协议时，\n应当出具（\n）。\nA.生产许可证\n\n=== 第72页 ===\nB.制造许可证\nC.产品许可证\nD.检测合格证明", "options": {"A": "生产许可证 === 第72页 ===", "B": "制造许可证", "C": "产品许可证", "D": "检测合格证明"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 212, "question": "《建设工程安全生产管理条例》规定，（\n）负责对安全生产进\n行现场监督检查。\nA.项目负责人\nB.监理工程师\nC.专职安全生产管理人员\nD.专业技术人员", "options": {"A": "项目负责人", "B": "监理工程师", "C": "专职安全生产管理人员", "D": "专业技术人员"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 213, "question": "在建的建筑工程因故中止施工的，建设单位应当自中止施工之日\n起（\n）个月内，向发证机关报告，并按照规定做好建筑工程的维\n护管理工作。\nA.一\nB.二\nC.三\nD.四", "options": {"A": "一", "B": "二", "C": "三", "D": "四"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 214, "question": "《建设工程安全生产管理条例》规定，（\n）对检测合格的施工\n起重机械和整体提升脚手架、模板等自升式架设设施，应当出具安全\n合格证明文件，并对检测结果负责。\n\n=== 第73页 ===\nA.设备租赁机构\nB.检验检测机构\nC.施工单位\nD.建设单位", "options": {"A": "设备租赁机构", "B": "检验检测机构", "C": "施工单位", "D": "建设单位"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 215, "question": "《国务院关于加强和规范事中事后监管的指导意见》中指出：以\n习近平新时代中国特色社会主义思想为指导，切实管出公平、管出效\n率、管出活力，促进提高市场主体竞争力和市场效率，推动（\n）。\nA.资本市场持续健康发展\nB.经济社会持续健康发展\nC.文化持续健康发展\nD.社会进步", "options": {"A": "资本市场持续健康发展", "B": "经济社会持续健康发展", "C": "文化持续健康发展", "D": "社会进步"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 216, "question": "《国务院关于加强和规范事中事后监管的指导意见》提出：重大\n行政执法决定必须经过（\n），未经（\n）或审核未通过的，不得\n作出决定。\nA.法制审核\nB.法院审核\nC.检察院审核\nD.领导审核", "options": {"A": "法制审核", "B": "法院审核", "C": "检察院审核", "D": "领导审核"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 217, "question": "《国务院关于加强和规范事中事后监管的指导意见》提出：以\n\n=== 第74页 ===\n（\n）为标识，依法依规建立权威、统一、可查询的市场主体信用\n记录。大力推行信用承诺制度，将信用承诺履行情况纳入信用记录。\nA.统一营业执照\nB.统一安全生产许可证\nC.统一社会信用代码\nD.统一银行信用报告", "options": {"A": "统一营业执照", "B": "统一安全生产许可证", "C": "统一社会信用代码", "D": "统一银行信用报告"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 218, "question": "《国务院关于加强和规范事中事后监管的指导意见》提出：推进\n信用分级分类监管，依据（\n），在监管方式、抽查比例和频次等方\n面采取差异化措施。\nA.企业信用情况\nB.企业盈利情况\nC.企业安全情况\nD.企业规模情况", "options": {"A": "企业信用情况", "B": "企业盈利情况", "C": "企业安全情况", "D": "企业规模情况"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 219, "question": "《国务院关于加强和规范事中事后监管的指导意见》提出：将随\n机抽查的比例频次、被抽查概率与抽查对象的信用等级、风险程度挂\n钩，对（\n）的要加大抽查力度。\nA.有良好信用记录、风险低\nB.有不良信用记录、风险高\nC.有不良信用记录、风险低\nD.有良好信用记录、风险高\n\n=== 第75页 ===", "options": {"A": "有良好信用记录、风险低", "B": "有不良信用记录、风险高", "C": "有不良信用记录、风险低", "D": "有良好信用记录、风险高 === 第75页 ==="}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 220, "question": "《国务院关于加强和规范事中事后监管的指导意见》提出：建立\n完善（\n），促使市场主体在安全生产、质量管理、营销宣传、售后\n服务、诚信纳税等方面加强自我监督、履行法定义务。\nA.市场主体首负责任制\nB.市场主体责任制\nC.监管主体责任制\nD.检查主体首负责任制", "options": {"A": "市场主体首负责任制", "B": "市场主体责任制", "C": "监管主体责任制", "D": "检查主体首负责任制"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 221, "question": "《国务院关于加强和规范事中事后监管的指导意见》提出：规范\n涉企行政检查和处罚。禁止将（\n）与行政执法机关利益挂钩。\nA.税费收入\nB.罚款收入\nC.罚没收入\nD.上缴收入", "options": {"A": "税费收入", "B": "罚款收入", "C": "罚没收入", "D": "上缴收入"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 222, "question": "《国务院关于加强和规范事中事后监管的指导意见》提出：规范\n认定并设立市场主体信用“（\n）”，建立企业信用与自然人信用挂钩\n机制，强化跨行业、跨领域、跨部门失信联合惩戒，对失信主体在行\n业准入、项目审批、获得信贷、发票领用、出口退税、出入境、高消\n费等方面依法予以限制。\nA.白名单\n\n=== 第76页 ===\nB.黑名单\nC.红名单\nD.绿名单", "options": {"A": "白名单 === 第76页 ===", "B": "黑名单", "C": "红名单", "D": "绿名单"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 223, "question": "《国务院关于加强和规范事中事后监管的指导意见》提出：对直\n接涉及公共安全和人民群众生命健康等特殊重点领域，依法依规实行\n全覆盖的重点监管，强化全过程质量管理，加强（\n）。\nA.生产监管执法\nB.安全生产监管执法\nC.质量生产监管执法\nD.企业生产监管执法", "options": {"A": "生产监管执法", "B": "安全生产监管执法", "C": "质量生产监管执法", "D": "企业生产监管执法"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 224, "question": "《国务院关于加强和规范事中事后监管的指导意见》提出：对监\n管中发现的违法违规问题，建立完善（\n）、惩罚性赔偿和巨额罚款\n制度、终身禁入机制，让严重违法者付出高昂成本。\nA.违法严惩制度\nB.守法奖励制度\nC.违法封停制度\nD.违法检查制度", "options": {"A": "违法严惩制度", "B": "守法奖励制度", "C": "违法封停制度", "D": "违法检查制度"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 225, "question": "《国务院关于加强和规范事中事后监管的指导意见》提出：地方\n各级政府可根据区域和行业风险特点，探索建立（\n），严格控制重\n\n=== 第77页 ===\n点监管事项数量，规范重点监管程序，并筛选确定重点监管的生产经\n营单位，实行跟踪监管、直接指导。\nA.日常监管制度\nB.重点单位制度\nC.重点监管清单制度\nD.监管清单制度", "options": {"A": "日常监管制度", "B": "重点单位制度", "C": "重点监管清单制度", "D": "监管清单制度"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 226, "question": "《国务院关于加强和规范事中事后监管的指导意见》加强标准体\n系建设，精简整合强制性标准，重点加强安全、卫生、节能、环保等\n领域的标准建设，优化（\n）底线。\nA.推荐性认证\nB.强制性标准\nC.选择性认证\nD.分类认证", "options": {"A": "推荐性认证", "B": "强制性标准", "C": "选择性认证", "D": "分类认证"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 227, "question": "《国务院关于加强和规范事中事后监管的指导意见》的基本原则：\n对各类市场主体一视同仁，坚决破除妨碍公平竞争的体制机制障碍，\n依法保护各类市场主体合法权益，确保公平，以下哪项是错误的（\n）。\nA.权利公平\nB.盈利公平\nC.机会公平\nD.规则公平\n\n=== 第78页 ===", "options": {"A": "权利公平", "B": "盈利公平", "C": "机会公平", "D": "规则公平 === 第78页 ==="}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 228, "question": "《国务院关于加强和规范事中事后监管的指导意见》的夯实监管\n责任中指出：（\n）要统筹制定本行政区域内监管计划任务，指导和\n督促省级部门、市县级人民政府加强和规范监管执法。\nA.国务院\nB.省级人民政府\nC.市级人民政府\nD.自治区人民政府", "options": {"A": "国务院", "B": "省级人民政府", "C": "市级人民政府", "D": "自治区人民政府"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 229, "question": "《工伤保险条例》要求，用人单位实行承包经营的，工伤保险责\n任由（\n）承担。\nA.职工本人\nB.职工劳动关系原单位\nC.职工劳动关系所在单位\nD.社会保险部门", "options": {"A": "职工本人", "B": "职工劳动关系原单位", "C": "职工劳动关系所在单位", "D": "社会保险部门"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 230, "question": "《工伤保险条例》规定，用人单位参加工伤保险并补缴应当缴纳\n的工伤保险费、滞纳金后，由（\n）依照条例的规定支付新发生的\n费用。\nA.用人单位\nB.工伤保险基金\nC.用人单位和工伤保险基金\n\n=== 第79页 ===\nD.用人单位和职工本人", "options": {"A": "用人单位", "B": "工伤保险基金", "C": "用人单位和工伤保险基金 === 第79页 ===", "D": "用人单位和职工本人"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 231, "question": "《工伤保险条例》规定，用人单位、工伤职工或者其近亲属骗取\n工伤保险待遇，医疗机构、辅助器具配置机构骗取工伤保险基金支出，\n情节严重的，依法追究（\n）。\nA.民事责任\nB.刑事责任\nC.赔偿责任\nD.领导责任", "options": {"A": "民事责任", "B": "刑事责任", "C": "赔偿责任", "D": "领导责任"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 232, "question": "《防暑降温措施管理办法》的制定，是为了保障（\n）的利益。\nA.公务员\nB.政府\nC.劳动者\nD.企业家", "options": {"A": "公务员", "B": "政府", "C": "劳动者", "D": "企业家"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 233, "question": "《中华人民共和国安全生产法》是综合规范安全生产法律制度的\n法律，它适用于（\n），是我国安全生产法律体系的核心。\nA.所有人员\nB.所有工作\nC.工厂和矿山企业\nD.所有生产经营单位\n\n=== 第80页 ===", "options": {"A": "所有人员", "B": "所有工作", "C": "工厂和矿山企业", "D": "所有生产经营单位 === 第80页 ==="}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 234, "question": "安全生产法规定的安全生产管理方针是（\n）。\nA.安全第一、预防为主、综合治理\nB.安全生产人人有责\nC.安全为了生产，生产必须安全\nD.坚持安全发展", "options": {"A": "安全第一、预防为主、综合治理", "B": "安全生产人人有责", "C": "安全为了生产，生产必须安全", "D": "坚持安全发展"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 235, "question": "“安管人员”应当通过（\n），向企业工商注册地的省、自治区、\n直辖市人民政府住房城乡建设主管部门（以下简称考核机关）申请安\n全生产考核，并取得安全生产考核合格证书。\nA.个人\nB.培训机构\nC.人才中心\nD.受聘企业", "options": {"A": "个人", "B": "培训机构", "C": "人才中心", "D": "受聘企业"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 236, "question": "“安管人员”隐瞒有关情况或者提供虚假材料申请安全生产考核\n的，考核机关不予考核，并给予警告；“安管人员”（\n）内不得再\n次申请考核。\nA.半年\nB.1 年\nC.2 年\nD.3 年\n\n=== 第81页 ===", "options": {"A": "半年", "B": "1 年", "C": "2 年", "D": "3 年 === 第81页 ==="}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 237, "question": "“安管人员”以欺骗、贿赂等不正当手段取得安全生产考核合格\n证书的，由（\n）撤销安全生产考核合格证书。\nA.县级以上人民政府安全监督管理部门\nB.原考核机关\nC.县级以上人民政府住房城乡建设主管部门\nD.本人籍贯所在地考核机关", "options": {"A": "县级以上人民政府安全监督管理部门", "B": "原考核机关", "C": "县级以上人民政府住房城乡建设主管部门", "D": "本人籍贯所在地考核机关"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 238, "question": "“安管人员”遗失安全生产考核合格证书需补办的，考核机关应\n当在受理申请之日起（\n）个工作日内办理完毕。\nA.3\nB.5\nC.7\nD.10", "options": {"A": "3", "B": "5", "C": "7", "D": "10"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 239, "question": "在高温天气来临之前，用人单位应当对高温天气作业的劳动者进\n行健康检查。职业健康检查费用由（\n）承担。\nA.本人\nB.政府\nC.用人单位\nD.本人及用人单位各一半", "options": {"A": "本人", "B": "政府", "C": "用人单位", "D": "本人及用人单位各一半"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 240, "question": "“安管人员”涂改、倒卖、出租、出借或者以其他形式非法转让\n安全生产考核合格证书的，将被给予警告，并处（\n）的罚款。\nA.500 元以上1000 元以下\nB.1000 元以上3000 元以下\nC.1000 元以上5000 元以下\nD.3000 元以上8000 元以下", "options": {"A": "500 元以上1000 元以下", "B": "1000 元以上3000 元以下", "C": "1000 元以上5000 元以下", "D": "3000 元以上8000 元以下"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 241, "question": "“安管人员”非法转让安全生产考核合格证书的，由（\n）给\n予警告，并处1000 元以上5000 元以下的罚款。\nA.县级以上人民政府安全监督管理部门\nB.原考核机关\nC.县级以上人民政府住房城乡建设主管部门\nD.本人籍贯所在地考核机关", "options": {"A": "县级以上人民政府安全监督管理部门", "B": "原考核机关", "C": "县级以上人民政府住房城乡建设主管部门", "D": "本人籍贯所在地考核机关"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 242, "question": "“安管人员”变更受聘企业的，应当与原聘用企业解除劳动关系，\n并通过新聘用企业到考核机关申请办理证书变更手续。考核机关应当\n在受理变更申请之日起（\n）内办理完毕。\nA.一周\nB.15 日\nC.5 个工作日\nD.一个月", "options": {"A": "一周", "B": "15 日", "C": "5 个工作日", "D": "一个月"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 243, "question": "根据《工伤保险条例》，任何组织和个人对有关工伤保险的违法\n行为，有权举报，（\n）对举报应当及时调查，按照规定处理，并为\n举报人保密。\nA.监管部门\nB.政府部门\nC.社会保险行政部门\nD.工会", "options": {"A": "监管部门", "B": "政府部门", "C": "社会保险行政部门", "D": "工会"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 244, "question": "根据《建设工程安全生产管理条例》，作业人员不服管理、违反\n规章制度和操作规程冒险作业造成重大伤亡事故或者其他严重后果，\n构成犯罪的，依照刑法有关规定追究（\n）。\nA.民事责任\nB.行政责任\nC.刑事责任\nD.相关责任", "options": {"A": "民事责任", "B": "行政责任", "C": "刑事责任", "D": "相关责任"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 245, "question": "（\n）应当按规定实施项目安全生产管理，监控危险性较大分\n部分项工程，及时排查处理施工现场安全事故隐患，隐患排查处理情\n况应当记入项目安全管理档案；发生事故时，应当按规定及时报告并\n开展现场救援。\nA.项目经理\nB.项目负责人\n\n=== 第84页 ===\nC.施工负责人\nD.安全负责人", "options": {"A": "项目经理", "B": "项目负责人 === 第84页 ===", "C": "施工负责人", "D": "安全负责人"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 246, "question": "（\n）以上人民政府住房城乡建设主管部门在实施监督检查时，\n应当有两名以上监督检查人员参加，不得妨碍企业正常的生产经营活\n动，不得索取或者收受企业的财物，不得谋取其他利益。\nA.乡镇级\nB.县级\nC.市级\nD.省级", "options": {"A": "乡镇级", "B": "县级", "C": "市级", "D": "省级"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 247, "question": "（\n）以上人民政府住房城乡建设主管部门应当依照有关法律\n法规和本规定，对“安管人员”持证上岗、教育培训和履行职责等情\n况进行监督检查。\nA.乡镇级\nB.县级\nC.市级\nD.省级", "options": {"A": "乡镇级", "B": "县级", "C": "市级", "D": "省级"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 248, "question": "（\n）以上人民政府建设主管部门应当加强对建筑施工企业安\n全生产许可证的监督管理。\nA.区级\n\n=== 第85页 ===\nB.县级\nC.市级\nD.省级", "options": {"A": "区级 === 第85页 ===", "B": "县级", "C": "市级", "D": "省级"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 249, "question": "（\n）对列入建设工程概算的安全作业环境及安全施工措施所\n需费用，应当用于施工安全防护用具及设施的采购和更新、安全施工\n措施的落实、安全生产条件的改善，不得挪作他用。\nA.建设单位\nB.监理单位\nC.施工单位\nD.分包单位", "options": {"A": "建设单位", "B": "监理单位", "C": "施工单位", "D": "分包单位"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 250, "question": "（\n）对本项目安全生产管理全面负责，应当建立项目安全生\n产管理体系，明确项目管理人员安全职责，落实安全生产管理制度，\n确保项目安全生产费用有效使用。\nA.项目经理\nB.项目负责人\nC.施工负责人\nD.安全负责人", "options": {"A": "项目经理", "B": "项目负责人", "C": "施工负责人", "D": "安全负责人"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 251, "question": "（\n）对本企业安全生产工作全面负责。\nA.主要负责人\n\n=== 第86页 ===\nB.法人代表\nC.总经理\nD.副总经理", "options": {"A": "主要负责人 === 第86页 ===", "B": "法人代表", "C": "总经理", "D": "副总经理"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 252, "question": "（\n）承包单位将其承包的全部建筑工程转包给他人，（\n）\n承包单位将其承包的全部建筑工程肢解以后以分包的名义分别转包\n给他人。\nA.严禁；严禁\nB.严禁；可以\nC.禁止；禁止\nD.严禁；禁止", "options": {"A": "严禁；严禁", "B": "严禁；可以", "C": "禁止；禁止", "D": "严禁；禁止"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 253, "question": "（\n）主管部门和认证认可监督管理部门应当对机动车排放检\n验机构的排放检验情况进行监督检查。\nA.应急管理\nB.生态环境\nC.公安交警\nD.交通运输", "options": {"A": "应急管理", "B": "生态环境", "C": "公安交警", "D": "交通运输"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 254, "question": "（\n）制定国家环境质量标准。\nA.国务院\nB.全国人大常委会\n\n=== 第87页 ===\nC.发改委\nD.国务院环境保护主管部门", "options": {"A": "国务院", "B": "全国人大常委会 === 第87页 ===", "C": "发改委", "D": "国务院环境保护主管部门"}, "answer": "D", "type": "single", "category": "文明施工"}, {"id": 255, "question": "（\n）应当将环境保护工作纳入国民经济和社会发展规划。\nA.省级以上人民政府\nB.市级以上人民政府\nC.县级以上人民政府\nD.区级以上人民政府", "options": {"A": "省级以上人民政府", "B": "市级以上人民政府", "C": "县级以上人民政府", "D": "区级以上人民政府"}, "answer": "C", "type": "single", "category": "文明施工"}, {"id": 256, "question": "（\n）负责中央管理的建筑施工企业安全生产许可证的颁发和\n管理。\nA.市级建设行政主管部门\nB.省级建设行政主管部门\nC.国务院建设主管部门\nD.县级以上建设行政主管部门", "options": {"A": "市级建设行政主管部门", "B": "省级建设行政主管部门", "C": "国务院建设主管部门", "D": "县级以上建设行政主管部门"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 257, "question": "（\n）对工程的施工质量负责。\nA.建设单位\nB.监理单位\nC.建筑施工企业\nD.设计单位", "options": {"A": "建设单位", "B": "监理单位", "C": "建筑施工企业", "D": "设计单位"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 258, "question": "（\n）的为安全生产提供技术、管理服务的机构，依照法律、\n行政法规和执业准则，接受生产经营单位的委托为其安全生产工作提\n供技术、管理服务。\nA.政府投资\nB.依法设立\nC.应急管理局设立\nD.工商登记", "options": {"A": "政府投资", "B": "依法设立", "C": "应急管理局设立", "D": "工商登记"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 259, "question": "（\n）的建筑施工企业（集团公司、总公司）应当向国务院建\n设主管部门申请领取安全生产许可证。\nA.市级行政主管部门管理\nB.省级行政主管部门管理\nC.中央管理\nD.县级行政主管部门管理", "options": {"A": "市级行政主管部门管理", "B": "省级行政主管部门管理", "C": "中央管理", "D": "县级行政主管部门管理"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 260, "question": "（\n）不得使用应当淘汰的危及生产安全的工艺、设备。\nA.设计单位\nB.施工单位\nC.检测单位\nD.生产经营单位", "options": {"A": "设计单位", "B": "施工单位", "C": "检测单位", "D": "生产经营单位"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 261, "question": "一级“一体化”企业应配备下列各类技术人员：建筑起重机械维\n\n=== 第89页 ===\n修工不少于（\n）人，电器维修工不少于（\n）人，建筑起重机械\n安装拆卸工不少于（\n）人，信号司索工不少于（\n）人。\nA.6；3；18；6\nB.6；3；20；6\nC.6；5；18；3\nD.5；3；18；6", "options": {"A": "6；3；18；6", "B": "6；3；20；6", "C": "6；5；18；3", "D": "5；3；18；6"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 262, "question": "违反《中华人民共和国大气污染防治法》规定，使用不符合标准\n或者要求的船舶用燃油的，由（\n）、渔业主管部门按照职责处一万\n元以上十万元以下的罚款。\nA.海事管理机构\nB.生态环境部门\nC.工商行政部门\nD.市场监督部门", "options": {"A": "海事管理机构", "B": "生态环境部门", "C": "工商行政部门", "D": "市场监督部门"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 263, "question": "省、自治区、直辖市人民政府可以在条件具备的地区，（\n）执\n行国家机动车大气污染物排放标准中相应阶段排放限值。\nA.同步\nB.提前\nC.推后\nD.酌情", "options": {"A": "同步", "B": "提前", "C": "推后", "D": "酌情"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 264, "question": "企业事业单位和其他生产经营者违反法律法规规定排放污染物，\n造成或者可能造成严重污染的，县级以上人民政府环境保护主管部门\n和其他负有环境保护监督管理职责的部门，可以（\n）造成污染物\n排放的设施、设备。\nA.没收\nB.销毁\nC.查封、扣押\nD.改造", "options": {"A": "没收", "B": "销毁", "C": "查封、扣押", "D": "改造"}, "answer": "C", "type": "single", "category": "文明施工"}, {"id": 265, "question": "建筑工程招标的开标、评标、定标由建设单位依法组织实施，并\n接受有关（\n）的监督。\nA.投标单位\nB.监理单位\nC.上级单位\nD.行政主管部门", "options": {"A": "投标单位", "B": "监理单位", "C": "上级单位", "D": "行政主管部门"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 266, "question": "总承包单位和分包单位就分包工程对建设单位承担（\n）。\nA.二分之一责任\nB.连带责任\nC.约定责任\nD.全部责任", "options": {"A": "二分之一责任", "B": "连带责任", "C": "约定责任", "D": "全部责任"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 267, "question": "自事故发生之日起（\n）日内，事故造成的伤亡人数发生变化\n的，应当及时补报。道路交通事故、火灾事故自发生之日起7 日内，\n事故造成的伤亡人数发生变化的，应当及时补报。\nA.7\nB.15\nC.30\nD.60", "options": {"A": "7", "B": "15", "C": "30", "D": "60"}, "answer": "C", "type": "single", "category": "消防安全"}, {"id": 268, "question": "自劳动能力鉴定结论作出之日起（\n）后，工伤职工或者其近\n亲属、所在单位或者经办机构认为伤残情况发生变化的，可以申请劳\n动能力复查鉴定。\nA.一月\nB.三月\nC.半年\nD.一年", "options": {"A": "一月", "B": "三月", "C": "半年", "D": "一年"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 269, "question": "重点区域内有关省、自治区、直辖市人民政府应当实施更严格的\n机动车大气污染物排放标准，统一在用机动车（\n）和排放限值，\n并配套供应合格的车用燃油。\nA.检验标准\nB.检验地点\nC.检验方法\n\n=== 第92页 ===\nD.检验人员", "options": {"A": "检验标准", "B": "检验地点", "C": "检验方法 === 第92页 ===", "D": "检验人员"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 270, "question": "仲裁裁决一般应在收到仲裁申请的六十日内作出。对仲裁裁决无\n异议的，（\n）。\nA.当事人可以再向法院提起诉讼\nB.当事人可以再申请仲裁\nC.当事人必须履行\nD.当事人商议履行", "options": {"A": "当事人可以再向法院提起诉讼", "B": "当事人可以再申请仲裁", "C": "当事人必须履行", "D": "当事人商议履行"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 271, "question": "中华人民共和国建筑法由（\n）修订通过。\nA.全国人民代表大会常务委员会\nB.住房和城乡建设部\nC.国务院\nD.司法部", "options": {"A": "全国人民代表大会常务委员会", "B": "住房和城乡建设部", "C": "国务院", "D": "司法部"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 272, "question": "职工或者其近亲属认为是工伤，用人单位不认为是工伤的，由\n（\n）承担举证责任。\nA.职工或者其直系亲属\nB.劳动保障部门\nC.用人单位\nD.医疗机构", "options": {"A": "职工或者其直系亲属", "B": "劳动保障部门", "C": "用人单位", "D": "医疗机构"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 273, "question": "执法人员在调查或者进行检查时，应当主动向当事人或者有关人\n员出示（\n）。\nA.执法程序\nB.执法记录仪\nC.执法证件\nD.执法依据", "options": {"A": "执法程序", "B": "执法记录仪", "C": "执法证件", "D": "执法依据"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 274, "question": "执法人员当场作出的行政处罚决定，应当报所属行政机关（\n）。\nA.审批\nB.备案\nC.批准\nD.审核", "options": {"A": "审批", "B": "备案",
