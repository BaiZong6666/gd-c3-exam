D.2：1", "options": {"A": "1：1", "B": "1.25：1", "C": "1.5：1", "D": "2：1"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 1836, "question": "如图所示灭火器，应该如何处置？（\n）\nA.不做处理\nB.继续使用\nC.报废处理\nD.返厂处理", "options": {"A": "不做处理", "B": "继续使用", "C": "报废处理", "D": "返厂处理"}, "answer": "C", "type": "single", "category": "消防安全"}, {"id": 1837, "question": "根据安全检查标准JGJ59-2011 文明施工检查评分表保证项目要\n求，图中宿舍不符合规定的是（\n）。\nA.未使用电磁炉\nB.宿舍内兼做伙房\nC.未配备抽油烟机\nD.电流不足", "options": {"A": "未使用电磁炉", "B": "宿舍内兼做伙房", "C": "未配备抽油烟机", "D": "电流不足"}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 1838, "question": "使用时，氧气瓶与乙炔瓶的安全距离不得小于（\n）米？\nA.3\nB.4\nC.5\nD.6", "options": {"A": "3", "B": "4", "C": "5", "D": "6"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1839, "question": "某建筑物的建筑高度是50 米，其底部安全通道的长度应达到\n（\n）米以上？\nA.3\nB.4\nC.5\nD.6", "options": {"A": "3", "B": "4", "C": "5", "D": "6"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1840, "question": "装配式活动板房，每层建筑面积大于200m2 时，房间门至疏散\n楼梯的最大距离不应大于多少米？（\n）\nA.15 米\nB.20 米\nC.25 米\nD.30 米", "options": {"A": "15 米", "B": "20 米", "C": "25 米", "D": "30 米"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1841, "question": "生活区每组临时活动板房之间的防火间距不应小于（\n）米？\n当建筑构件燃烧性能等级为A 级时，其防火间距可减少到（\n）米？\nA.3.5；3.0\nB.3.0；2.5\nC.4.0；3.5\nD.3.5；2.5", "options": {"A": "3.5；3.0", "B": "3.0；2.5", "C": "4.0；3.5", "D": "3.5；2.5"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 1842, "question": "某工地正在搭设基坑临边护栏，请问基坑临边护栏的标准高度\n可以设置为多少米？（\n）\nA.1 米\nB.1.1 米\nC.1.2 米\nD.1.7 米", "options": {"A": "1 米", "B": "1.1 米", "C": "1.2 米", "D": "1.7 米"}, "answer": "C", "type": "single", "category": "基坑工程"}, {"id": 1843, "question": "在市区主要路段的建筑工程，建筑施工工地围墙高度设置不能\n低于多少米？（\n）\nA.2 米\nB.1.8 米\nC.2.5 米\nD.2.2 米", "options": {"A": "2 米", "B": "1.8 米", "C": "2.5 米", "D": "2.2 米"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1844, "question": "下列关于施工现场临时室外消防给水系统的设置，不符合要求\n的是（\n）？\nA.给水管网宜布置成环状\nB.消火栓的间距不应大于120m\nC.消火栓的最大保护半径不应大于200m\nD.室外消火栓与可燃材料堆场外边线距离不小于5m", "options": {"A": "给水管网宜布置成环状", "B": "消火栓的间距不应大于120m", "C": "消火栓的最大保护半径不应大于200m", "D": "室外消火栓与可燃材料堆场外边线距离不小于5m"}, "answer": "C", "type": "single", "category": "消防安全"}, {"id": 1845, "question": "JGJ59--2011 标准文明施工检查表中封闭管理栏目要求在门头必\n须设置（\n）。\nA.标语\nB.企业标识和形象标志\nC.企业宣传标语\nD.安全文明标语", "options": {"A": "标语", "B": "企业标识和形象标志", "C": "企业宣传标语", "D": "安全文明标语"}, "answer": "B", "type": "single", "category": "文明施工"}, {"id": 1846, "question": "施工现场出入口应设车辆（\n）设施。\nA.冲洗设备和冲洗槽\nB.冲洗泵\nC.防护设施\nD.安全通道", "options": {"A": "冲洗设备和冲洗槽", "B": "冲洗泵", "C": "防护设施", "D": "安全通道"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1847, "question": "安全带的正确系挂方法是（\n）。\nA.随意系挂\nB.低挂高用\nC.高挂低用\nD.根据现场情况系挂", "options": {"A": "随意系挂", "B": "低挂高用", "C": "高挂低用", "D": "根据现场情况系挂"}, "answer": "C", "type": "single", "category": "高处作业"}, {"id": 1848, "question": "高处作业时手持工具和零星物料应放在（\n）。\nA.上衣口袋\nB.裤兜\nC.工具袋\nD.脚手板上", "options": {"A": "上衣口袋", "B": "裤兜", "C": "工具袋", "D": "脚手板上"}, "answer": "C", "type": "single", "category": "高处作业"}, {"id": 1849, "question": "作业人员在机械挖土清理基坑时，（\n）进入铲斗回转半径范\n围。\nA.可以\nB.严禁\nC.必须\nD.不必", "options": {"A": "可以", "B": "严禁", "C": "必须", "D": "不必"}, "answer": "B", "type": "single", "category": "基坑工程"}, {"id": 1850, "question": "施工单位单位应当在施工现场出入口处、施工起重机械、临时\n用电设施、脚手架、出入口通道、楼梯口、电梯井口、孔洞口、桥梁\n口、隧道口、基坑边沿、爆破物及有害危险气体和液体存放处等危险\n部位，设置明显的（\n）。\nA.安全提示标志\nB.安全宣传标志\nC.安全指示标志\nD.安全警示标志", "options": {"A": "安全提示标志", "B": "安全宣传标志", "C": "安全指示标志", "D": "安全警示标志"}, "answer": "D", "type": "single", "category": "脚手架与模板工程"}, {"id": 1851, "question": "模板工程作业高度在2m 以上时，应根据高处作业安全技术规范\n的要求进行操作和防护，在4m 或结构层（\n）层以上周围应设水\n平兜网和防护栏杆。\nA.1\nB.2\nC.3\nD.4", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 1852, "question": "建筑物内垃圾应采用（\n）或搭设专用（\n）垃圾通道方式\n清运，严禁凌空抛掷。\nA.容器；封闭式\nB.及时清除；覆盖\nC.运输车辆；降尘\nD.清扫；洒水", "options": {"A": "容器；封闭式", "B": "及时清除；覆盖", "C": "运输车辆；降尘", "D": "清扫；洒水"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1853, "question": "建筑设计单位对设计文件选用的建筑材料、建筑构配件和设备，\n不得指定（\n）。\nA.规格\nB.厂家\nC.型号\nD.供应商\nE.性能", "options": {"A": "规格", "B": "厂家", "C": "型号", "D": "供应商", "E": "性能"}, "answer": "BD", "type": "multi", "category": "安全管理"}, {"id": 1854, "question": "建设工程施工前，施工单位负责项目管理的技术人员应当对有\n关安全施工的技术要求向（\n）做出详细说明，并由双方签字确认。\nA.项目负责人\nB.专职安全生产管理人员\nC.作业班组\nD.分包单位安全生产管理人员\nE.作业人员", "options": {"A": "项目负责人", "B": "专职安全生产管理人员", "C": "作业班组", "D": "分包单位安全生产管理人员", "E": "作业人员"}, "answer": "CE", "type": "multi", "category": "安全管理"}, {"id": 1855, "question": "机关、团体、企业、事业等单位应当履行下列消防安全职责（\n）。\nA.落实消防安全责任制\nB.组织进行有针对性的消防演练\nC.对建筑消防设施每年至少进行一次全面检测\nD.保障疏散通道、安全出口、消防车通道畅通\n\n=== 第642页 ===\nE.组织防火检查，及时消除火灾隐患", "options": {"A": "落实消防安全责任制", "B": "组织进行有针对性的消防演练", "C": "对建筑消防设施每年至少进行一次全面检测", "D": "保障疏散通道、安全出口、消防车通道畅通 === 第642页 ===", "E": "组织防火检查，及时消除火灾隐患"}, "answer": "ABCDE", "type": "multi", "category": "消防安全"}, {"id": 1856, "question": "国务院（\n）主管部门和国家大气污染防治重点区域内有关\n（\n）人民政府可以组织有关部门开展联合执法、跨区域执法、交\n叉执法。\nA.生态环境\nB.省\nC.自治区\nD.直辖市\nE.自治州", "options": {"A": "生态环境", "B": "省", "C": "自治区", "D": "直辖市", "E": "自治州"}, "answer": "ABCD", "type": "multi", "category": "安全管理"}, {"id": 1857, "question": "国家在城市管理、（\n）、农业等领域推行建立综合行政执法制\n度，相对集中行政处罚权。\nA.市场监管\nB.生态环境\nC.文化市场\nD.交通运输\nE.应急管理", "options": {"A": "市场监管", "B": "生态环境", "C": "文化市场", "D": "交通运输", "E": "应急管理"}, "answer": "ABCDE", "type": "multi", "category": "事故处理"}, {"id": 1858, "question": "国家实行环境保护（\n）和（\n）。\nA.目标管理制度\nB.目标责任制度\n\n=== 第643页 ===\nC.考核责任制度\nD.考核评价制度\nE.目标评价制度", "options": {"A": "目标管理制度", "B": "目标责任制度 === 第643页 ===", "C": "考核责任制度", "D": "考核评价制度", "E": "目标评价制度"}, "answer": "BD", "type": "multi", "category": "文明施工"}, {"id": 1859, "question": "国家对在（\n）等方面取得显著成绩的单位和个人，给予奖励。\nA.改善安全生产条件\nB.排查安全隐患\nC.防止生产安全事故\nD.参加抢险救护\nE.日常安全管理", "options": {"A": "改善安全生产条件", "B": "排查安全隐患", "C": "防止生产安全事故", "D": "参加抢险救护", "E": "日常安全管理"}, "answer": "ACD", "type": "multi", "category": "安全管理"}, {"id": 1860, "question": "国家对严重污染大气环境的工艺、设备和产品实行淘汰制度，\n相关方应当在规定期限内停止（\n）列入淘汰规定目录中的设备和\n产品。\nA.生产\nB.进口\nC.销售\nD.使用\nE.出口", "options": {"A": "生产", "B": "进口", "C": "销售", "D": "使用", "E": "出口"}, "answer": "ABCD", "type": "multi", "category": "法律法规"}, {"id": 1861, "question": "国家对（\n）生产企业（以下统称企业）实行安全生产许可制\n度。\n\n=== 第644页 ===\nA.矿山企业\nB.商品混凝土\nC.建筑施工\nD.起重机械\nE.烟花爆竹生产", "options": {"A": "矿山企业", "B": "商品混凝土", "C": "建筑施工", "D": "起重机械", "E": "烟花爆竹生产"}, "answer": "ACE", "type": "multi", "category": "特种设备"}, {"id": 1862, "question": "国家采取有利于（\n）的经济、技术政策和措施，使经济社会\n发展与环境保护相协调。\nA.节约和循环利用资源\nB.保护和改善环境\nC.促进人与自然和谐\nD.发展地方经济\nE.推动和改进社会", "options": {"A": "节约和循环利用资源", "B": "保护和改善环境", "C": "促进人与自然和谐", "D": "发展地方经济", "E": "推动和改进社会"}, "answer": "ABC", "type": "multi", "category": "文明施工"}, {"id": 1863, "question": "国家按照分类监督管理的原则对特种设备生产实行许可制度。\n特种设备生产单位应当具备下列条件，并经负责特种设备安全监督管\n理的部门许可，方可从事生产活动（\n）。\nA.有与生产相适应的专业技术人员\nB.有与生产相适应的设备、设施\nC.有健全的质量保证、安全管理和岗位责任等制度\nD.有与生产相适应的工作场所\nE.有健全的质量保证、安全岗位责任等制度\n\n=== 第645页 ===", "options": {"A": "有与生产相适应的专业技术人员", "B": "有与生产相适应的设备、设施", "C": "有健全的质量保证、安全管理和岗位责任等制度", "D": "有与生产相适应的工作场所", "E": "有健全的质量保证、安全岗位责任等制度 === 第645页 ==="}, "answer": "ABCDE", "type": "multi", "category": "特种设备"}, {"id": 1864, "question": "国家（\n）安全生产科学技术研究和安全生产先进技术的推广\n应用，提高安全生产水平。\nA.鼓励\nB.要求\nC.支持\nD.推广\nE.强制", "options": {"A": "鼓励", "B": "要求", "C": "支持", "D": "推广", "E": "强制"}, "answer": "AC", "type": "multi", "category": "安全管理"}, {"id": 1865, "question": "工伤职工有下列（\n）情形的，停止享受工伤保险待遇。\nA.丧失享受待遇条件的\nB.拒不接受劳动能力鉴定的\nC.拒绝治疗的\nD.被判刑正在收监执行的\nE.持有革命伤残军人证，到用人单位后旧伤复发的", "options": {"A": "丧失享受待遇条件的", "B": "拒不接受劳动能力鉴定的", "C": "拒绝治疗的", "D": "被判刑正在收监执行的", "E": "持有革命伤残军人证，到用人单位后旧伤复发的"}, "answer": "ABC", "type": "multi", "category": "安全管理"}, {"id": 1866, "question": "工伤保险基金不得有下列哪种用途（\n）。\nA.劳动能力鉴定\nB.工伤预防的宣传、培训\nC.新建或者改建办公场所\nD.投资运营\nE.发放奖金\n\n=== 第646页 ===", "options": {"A": "劳动能力鉴定", "B": "工伤预防的宣传、培训", "C": "新建或者改建办公场所", "D": "投资运营", "E": "发放奖金 === 第646页 ==="}, "answer": "CDE", "type": "multi", "category": "安全管理"}, {"id": 1867, "question": "根据行政处罚决定法制审核原则，下列需要进行法制审核的情\n形有（\n）。\nA.涉及重大公共利益的\nB.涉及当事人重大利益的\nC.直接关系当事人或者第三人重大权益，经过听证程序的\nD.案件情况疑难复杂、涉及多个法律关系的\nE.法律、法规规定应当进行法制审核的其他情形", "options": {"A": "涉及重大公共利益的", "B": "涉及当事人重大利益的", "C": "直接关系当事人或者第三人重大权益，经过听证程序的", "D": "案件情况疑难复杂、涉及多个法律关系的", "E": "法律、法规规定应当进行法制审核的其他情形"}, "answer": "ACDE", "type": "multi", "category": "法律法规"}, {"id": 1868, "question": "根据相关法律法规规定，申请参加安全生产考核的“安管人员”，\n应当具备哪些条件（\n）。\nA.相应文化程度\nB.专业技术职称\nC.一定的安全生产工作经历\nD.与企业确立劳动关系\nE.经企业年度安全生产教育培训合格", "options": {"A": "相应文化程度", "B": "专业技术职称", "C": "一定的安全生产工作经历", "D": "与企业确立劳动关系", "E": "经企业年度安全生产教育培训合格"}, "answer": "ABCDE", "type": "multi", "category": "法律法规"}, {"id": 1869, "question": "根据相关法律法规，建筑施工企业不再具备安全生产条件的，\n安全生产许可证颁发管理机关发现应当（\n）安全生产许可证。\nA.销毁\nB.暂扣\nC.吊销\n\n=== 第647页 ===\nD.取缔\nE.拉黑", "options": {"A": "销毁", "B": "暂扣", "C": "吊销 === 第647页 ===", "D": "取缔", "E": "拉黑"}, "answer": "BC", "type": "multi", "category": "法律法规"}, {"id": 1870, "question": "根据事故的情况，事故调查组由（\n）派人组成，并应当邀请\n人民检察院派人参加，并应当邀请人民检察院派人参加。\nA.有关人民政府\nB.安全生产监督管理部门\nC.负有安全生产监督管理职责的有关部门\nD.监察机关及公安机关\nE.工会", "options": {"A": "有关人民政府", "B": "安全生产监督管理部门", "C": "负有安全生产监督管理职责的有关部门", "D": "监察机关及公安机关", "E": "工会"}, "answer": "ABCDE", "type": "multi", "category": "事故处理"}, {"id": 1871, "question": "根据生产安全事故造成的人员伤亡或直接经济损失，事故一般\n分为以下等级（\n）。\nA.特别重大事故\nB.重大事故\nC.严重事故\nD.较大事故\nE.一般事故", "options": {"A": "特别重大事故", "B": "重大事故", "C": "严重事故", "D": "较大事故", "E": "一般事故"}, "answer": "ABDE", "type": "multi", "category": "事故处理"}, {"id": 1872, "question": "根据《中华人民共和国消防法》规定机关、团体、（\n）等单\n位以及（\n）根据需要，建立志愿消防队等多种形式的消防组织，\n开展群众性自防自救工作。\n\n=== 第648页 ===\nA.企业\nB.事业\nC.村民委员会\nD.居民委员会\nE.住宅小区", "options": {"A": "企业", "B": "事业", "C": "村民委员会", "D": "居民委员会", "E": "住宅小区"}, "answer": "ABCD", "type": "multi", "category": "消防安全"}, {"id": 1873, "question": "根据《中华人民共和国消防法》规定，下列违法行为可以被处\n十日以上十五日以下拘留的是（\n）。\nA.故意破坏火灾现场的\nB.指使或者强令他人违反消防安全规定，冒险作业的\nC.过失引起火灾的\nD.在火灾发生后阻拦报警\nE.扰乱火灾现场秩序影响灭火救援的", "options": {"A": "故意破坏火灾现场的", "B": "指使或者强令他人违反消防安全规定，冒险作业的", "C": "过失引起火灾的", "D": "在火灾发生后阻拦报警", "E": "扰乱火灾现场秩序影响灭火救援的"}, "answer": "ABCDE", "type": "multi", "category": "消防安全"}, {"id": 1874, "question": "根据《中华人民共和国消防法》规定，可由其主管单位监督管\n理消防工作的有（\n）。\nA.军事消防设施\nB.矿井地下部分\nC.矿井地上建筑\nD.核电厂\nE.海上石油天然气设施", "options": {"A": "军事消防设施", "B": "矿井地下部分", "C": "矿井地上建筑", "D": "核电厂", "E": "海上石油天然气设施"}, "answer": "ABDE", "type": "multi", "category": "消防安全"}, {"id": 1875, "question": "根据《中华人民共和国消防法》规定，禁止非法携带易燃易爆\n危险品进入（\n）或者乘坐（\n）。\nA.公共场所\nB.个人住所\nC.仓库\nD.公共交通工具\nE.私家车", "options": {"A": "公共场所", "B": "个人住所", "C": "仓库", "D": "公共交通工具", "E": "私家车"}, "answer": "AD", "type": "multi", "category": "消防安全"}, {"id": 1876, "question": "根据《中华人民共和国消防法》规定，机关、团体、企业、事\n业等单位应当履行的消防安全职责有（\n）。\nA.落实消防安全责任制\nB.按照标准配置消防设施、器材\nC.建筑消防设施每年至少进行一次全面检测，确保完好有效\nD.组织防火检查，及时消除火灾隐患\nE.组织进行有针对性的消防演练", "options": {"A": "落实消防安全责任制", "B": "按照标准配置消防设施、器材", "C": "建筑消防设施每年至少进行一次全面检测，确保完好有效", "D": "组织防火检查，及时消除火灾隐患", "E": "组织进行有针对性的消防演练"}, "answer": "ABCDE", "type": "multi", "category": "消防安全"}, {"id": 1877, "question": "根据《中华人民共和国消防法》规定，火灾现场总指挥根据扑\n救火灾的需要，有权决定下列事项（\n）。\nA.使用各种水源\nB.限制用火用电\nC.划定警戒区\nD.实行局部交通管制\n\n=== 第650页 ===\nE.截断通信", "options": {"A": "使用各种水源", "B": "限制用火用电", "C": "划定警戒区", "D": "实行局部交通管制 === 第650页 ===", "E": "截断通信"}, "answer": "ABCD", "type": "multi", "category": "用电安全"}, {"id": 1878, "question": "根据《中华人民共和国特种设备安全法》所称特种设备，是指\n对人身和财产安全有较大危险性的（\n）。\nA.锅炉\nB.压力容器（含气瓶）\nC.压力管道\nD.电梯\nE.起重机械", "options": {"A": "锅炉", "B": "压力容器（含气瓶）", "C": "压力管道", "D": "电梯", "E": "起重机械"}, "answer": "ABCDE", "type": "multi", "category": "特种设备"}, {"id": 1879, "question": "根据《中华人民共和国特种设备安全法》规定，与事故相关的\n单位和人员（\n）。\nA.不得迟报事故情况\nB.不得谎报事故情况\nC.不得瞒报事故情况\nD.不得隐匿、毁灭有关证据\nE.故意破坏事故现场", "options": {"A": "不得迟报事故情况", "B": "不得谎报事故情况", "C": "不得瞒报事故情况", "D": "不得隐匿、毁灭有关证据", "E": "故意破坏事故现场"}, "answer": "ABCDE", "type": "multi", "category": "特种设备"}, {"id": 1880, "question": "根据《中华人民共和国特种设备安全法》规定，下列适用于特\n种设备安全法的情况有（\n）。\nA.特种设备的生产（包括设计、制造、安装、改造、修理）\nB.特种设备的经营\n\n=== 第651页 ===\nC.特种设备的使用\nD.特种设备的检验\nE.特种设备的检测和特种设备安全的监督管理", "options": {"A": "特种设备的生产（包括设计、制造、安装、改造、修理）", "B": "特种设备的经营 === 第651页 ===", "C": "特种设备的使用", "D": "特种设备的检验", "E": "特种设备的检测和特种设备安全的监督管理"}, "answer": "ABCDE", "type": "multi", "category": "特种设备"}, {"id": 1881, "question": "根据《中华人民共和国特种设备安全法》规定，下列不适用于\n特种设备安全法的有（\n）。\nA.军事装备使用的特种设备安全的监督管理\nB.核设施使用的特种设备安全的监督管理\nC.航空航天器使用的特种设备安全的监督管理\nD.建筑工地使用的特种设备安全的监督管理\nE.市政工地使用的特种设备安全的监督管理", "options": {"A": "军事装备使用的特种设备安全的监督管理", "B": "核设施使用的特种设备安全的监督管理", "C": "航空航天器使用的特种设备安全的监督管理", "D": "建筑工地使用的特种设备安全的监督管理", "E": "市政工地使用的特种设备安全的监督管理"}, "answer": "ABC", "type": "multi", "category": "特种设备"}, {"id": 1882, "question": "根据《中华人民共和国特种设备安全法》规定，为了（\n）制\n定《中华人民共和国特种设备安全法》。\nA.加强特种设备安全工作\nB.预防特种设备事故\nC.保障人身和财产安全\nD.促进经济社会发展\nE.防止特种设备事故", "options": {"A": "加强特种设备安全工作", "B": "预防特种设备事故", "C": "保障人身和财产安全", "D": "促进经济社会发展", "E": "防止特种设备事故"}, "answer": "ABCD", "type": "multi", "category": "特种设备"}, {"id": 1883, "question": "根据《中华人民共和国特种设备安全法》规定，违反本法规定，\n电梯制造单位有（\n）情形之一的，责令限期改正；逾期未改正的，\n\n=== 第652页 ===\n处一万元以上十万元以下罚款。\nA.未按照安全技术规范的要求对电梯进行校验的\nB.未按照安全技术规范的要求对电梯进行调试的\nC.对电梯的安全运行情况进行跟踪调查和了解时，发现存在严重事故\n隐患，未及时告知电梯使用单位并向负责特种设备安全监督管理的部\n门报告的\nD.对电梯的安全运行情况进行跟踪调查和了解时，发现存在严重事故\n隐患\nE.对电梯的安全运行情况进行跟踪调查和了解时，发现存在严重事故\n隐患，及时告知电梯使用单位并向负责特种设备安全监督管理的部门\n报告的", "options": {"A": "未按照安全技术规范的要求对电梯进行校验的", "B": "未按照安全技术规范的要求对电梯进行调试的", "C": "对电梯的安全运行情况进行跟踪调查和了解时，发现存在严重事故 隐患，未及时告知电梯使用单位并向负责特种设备安全监督管理的部 门报告的", "D": "对电梯的安全运行情况进行跟踪调查和了解时，发现存在严重事故 隐患", "E": "对电梯的安全运行情况进行跟踪调查和了解时，发现存在严重事故 隐患，及时告知电梯使用单位并向负责特种设备安全监督管理的部门 报告的"}, "answer": "ABC", "type": "multi", "category": "特种设备"}, {"id": 1884, "question": "根据《中华人民共和国特种设备安全法》规定，特种设备使用\n单位有下列行为之一的，责令停止使用有关特种设备，处三万元以上\n三十万元以下罚款（\n）。\nA.使用未取得许可生产，未经检验或者检验不合格的特种设备\nB.国家明令淘汰、已经报废的特种设备的\nC.特种设备出现故障或者发生异常情况，未对其进行全面检查、消除\n事故隐患，继续使用的\nD.特种设备出现故障或者发生异常情况，未对其进行全面检查、消除\n事故隐患，但已经停止使用\nE.特种设备存在严重事故隐患，无改造、修理价值，或者达到安全技\n\n=== 第653页 ===\n术规范规定的其他报废条件，未依法履行报废义务，并办理使用登记\n证书注销手续的", "options": {"A": "使用未取得许可生产，未经检验或者检验不合格的特种设备", "B": "国家明令淘汰、已经报废的特种设备的", "C": "特种设备出现故障或者发生异常情况，未对其进行全面检查、消除 事故隐患，继续使用的", "D": "特种设备出现故障或者发生异常情况，未对其进行全面检查、消除 事故隐患，但已经停止使用", "E": "特种设备存在严重事故隐患，无改造、修理价值，或者达到安全技 === 第653页 === 术规范规定的其他报废条件，未依法履行报废义务，并办理使用登记 证书注销手续的"}, "answer": "ABCE", "type": "multi", "category": "特种设备"}, {"id": 1885, "question": "根据《中华人民共和国特种设备安全法》规定，特种设备生产\n单位（\n）生产许可证的，责令停止生产，处五万元以上五十万元\n以下罚款；情节严重的，吊销生产许可证。\nA.涂改\nB.倒卖\nC.出租\nD.出借\nE.申请", "options": {"A": "涂改", "B": "倒卖", "C": "出租", "D": "出借", "E": "申请"}, "answer": "ABCD", "type": "multi", "category": "特种设备"}, {"id": 1886, "question": "根据《中华人民共和国特种设备安全法》规定，特种设备生产\n单位（\n）的，责令停止生产、销售，没收违法生产、销售、交付\n的特种设备，处三万元以上三十万元以下罚款；有违法所得的，没收\n违法所得。\nA.生产国家明令淘汰的特种设备\nB.销售国家明令淘汰的特种设备\nC.交付国家明令淘汰的特种设备\nD.淘汰国家明令淘汰的特种设备\nE.报废国家明令淘汰的特种设备", "options": {"A": "生产国家明令淘汰的特种设备", "B": "销售国家明令淘汰的特种设备", "C": "交付国家明令淘汰的特种设备", "D": "淘汰国家明令淘汰的特种设备", "E": "报废国家明令淘汰的特种设备"}, "answer": "ABC", "type": "multi", "category": "特种设备"}, {"id": 1887, "question": "根据《中华人民共和国特种设备安全法》规定，特种设备生产、\n经营、使用单位有下列情形之一的，责令限期改正；逾期未改正的，\n责令停止使用有关特种设备或者停产停业整顿，处一万元以上五万元\n以下罚款（\n）。\nA.未配备具有相应资格的特种设备安全管理人员、检测人员和作业人\n员的\nB.使用未取得相应资格的人员从事特种设备安全管理、检测和作业的\nC.未对特种设备安全管理人员、检测人员和作业人员进行安全教育的\nD.未对特种设备安全管理人员、检测人员和作业人员进行技能培训的\nE.已经配备具有相应资格的特种设备安全管理人员、检测人员和作业\n人员的", "options": {"A": "未配备具有相应资格的特种设备安全管理人员、检测人员和作业人 员的", "B": "使用未取得相应资格的人员从事特种设备安全管理、检测和作业的", "C": "未对特种设备安全管理人员、检测人员和作业人员进行安全教育的", "D": "未对特种设备安全管理人员、检测人员和作业人员进行技能培训的", "E": "已经配备具有相应资格的特种设备安全管理人员、检测人员和作业 人员的"}, "answer": "ABCD", "type": "multi", "category": "特种设备"}, {"id": 1888, "question": "根据《中华人民共和国特种设备安全法》规定，负责特种设备\n安全监督管理的部门在依法履行监督检查职责时，可以行使下列职权\n有（\n）。\nA.进入现场进行检查，向特种设备生产、经营、使用单位和检验、检\n测机构的主要负责人和其他有关人员调查、了解有关情况\nB.根据举报或者取得的涉嫌违法证据，查阅、复制特种设备生产、经\n营、使用单位和检验、检测机构的有关合同、发票、账簿以及其他有\n关资料\nC.对有证据表明不符合安全技术规范要求或者存在严重事故隐患的\n特种设备实施查封、扣押\n\n=== 第655页 ===\nD.对流入市场的达到报废条件或者已经报废的特种设备实施查封、扣\n押\nE.对违反本法规定的行为作出行政处罚决定", "options": {"A": "进入现场进行检查，向特种设备生产、经营、使用单位和检验、检 测机构的主要负责人和其他有关人员调查、了解有关情况", "B": "根据举报或者取得的涉嫌违法证据，查阅、复制特种设备生产、经 营、使用单位和检验、检测机构的有关合同、发票、账簿以及其他有 关资料", "C": "对有证据表明不符合安全技术规范要求或者存在严重事故隐患的 特种设备实施查封、扣押 === 第655页 ===", "D": "对流入市场的达到报废条件或者已经报废的特种设备实施查封、扣 押", "E": "对违反本法规定的行为作出行政处罚决定"}, "answer": "ABCDE", "type": "multi", "category": "特种设备"}, {"id": 1889, "question": "根据《中华人民共和国特种设备安全法》规定，负责特种设备\n安全监督管理的部门对（\n）实施监督检查，应当对每次监督检查\n的内容、发现的问题及处理情况作出记录，并由参加监督检查的特种\n设备安全监察人员和被检查单位的有关负责人签字后归档。\nA.特种设备生产单位\nB.特种设备经营、单位\nC.特种设备使用单位\nD.特种设备检验机构\nE.特种设备检测机构", "options": {"A": "特种设备生产单位", "B": "特种设备经营、单位", "C": "特种设备使用单位", "D": "特种设备检验机构", "E": "特种设备检测机构"}, "answer": "ABCDE", "type": "multi", "category": "特种设备"}, {"id": 1890, "question": "根据《危险性较大的分部分项工程安全管理规定》，专家论证会\n后的意见有（\n）。\nA.通过\nB.修改后通过\nC.不通过\nD.修改后不通过\nE.部分通过", "options": {"A": "通过", "B": "修改后通过", "C": "不通过", "D": "修改后不通过", "E": "部分通过"}, "answer": "ABC", "type": "multi", "category": "安全管理"}, {"id": 1891, "question": "根据《危险性较大的分部分项工程安全管理规定》，施工单位应\n当将（\n）等相关资料纳入档案管理。\nA.专项施工方案\nB.专项施工方案的审核\nC.专项施工方案的专家论证\nD.专项施工方案现场检查\nE.专项施工方案现场验收及整改", "options": {"A": "专项施工方案", "B": "专项施工方案的审核", "C": "专项施工方案的专家论证", "D": "专项施工方案现场检查", "E": "专项施工方案现场验收及整改"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 1892, "question": "根据《危险性较大的分部分项工程安全管理规定》，监测单位应\n当按照监测方案开展监测，及时向建设单位报送监测成果，并对监测\n成果负责；发现异常时，及时向（\n）报告，建设单位应当立即组\n织相关单位采取处置措施。\nA.建设单位\nB.设计单位\nC.施工单位\nD.监理单位\nE.特种设备检测单位", "options": {"A": "建设单位", "B": "设计单位", "C": "施工单位", "D": "监理单位", "E": "特种设备检测单位"}, "answer": "ABCD", "type": "multi", "category": "特种设备"}, {"id": 1893, "question": "根据《特种作业人员安全技术培训考核管理规定》的规定，生\n产经营单位不得使用非法（\n）的特种作业操作证。\nA.使用\nB.印制\n\n=== 第657页 ===\nC.伪造\nD.复印\nE.倒卖", "options": {"A": "使用", "B": "印制 === 第657页 ===", "C": "伪造", "D": "复印", "E": "倒卖"}, "answer": "BCE", "type": "multi", "category": "法律法规"}, {"id": 1894, "question": "根据《生产安全事故应急条例》县级以上人民政府应当加强对\n生产安全事故应急救援队伍建设的（\n）。\nA.检查\nB.统一规划\nC.组织\nD.指导\nE.资金投入", "options": {"A": "检查", "B": "统一规划", "C": "组织", "D": "指导", "E": "资金投入"}, "answer": "BCD", "type": "multi", "category": "法律法规"}, {"id": 1895, "question": "根据《生产安全事故报告和调查处理条例》，事故报告应当及时、\n准确、完整，任何单位和个人对事故不得（\n）。\nA.迟报\nB.漏报\nC.拖延不报\nD.谎报\nE.瞒报", "options": {"A": "迟报", "B": "漏报", "C": "拖延不报", "D": "谎报", "E": "瞒报"}, "answer": "ABDE", "type": "multi", "category": "法律法规"}, {"id": 1896, "question": "根据《建筑施工企业安全生产许可证管理规定》，建筑施工企业\n违反哪些规定将受到10 万元以上50 万元以下的罚款（\n）。\n\n=== 第658页 ===\nA.未取得安全生产许可证\nB.转让安全生产许可证\nC.接受转让安全生产许可证\nD.冒用安全生产许可证\nE.使用伪造的安全生产许可证", "options": {"A": "未取得安全生产许可证", "B": "转让安全生产许可证", "C": "接受转让安全生产许可证", "D": "冒用安全生产许可证", "E": "使用伪造的安全生产许可证"}, "answer": "ABCDE", "type": "multi", "category": "法律法规"}, {"id": 1897, "question": "根据《建筑起重机械安全监督管理规定》，有下列情形之一的建\n筑起重机械，不得出租、使用（\n）。\nA.属国家明令淘汰或者禁止使用的\nB.超过安全技术标准或者制造厂家规定的使用年限的\nC.经检验达不到安全技术标准规定的\nD.没有完整安全技术档案的\nE.没有齐全有效的安全保护装置的", "options": {"A": "属国家明令淘汰或者禁止使用的", "B": "超过安全技术标准或者制造厂家规定的使用年限的", "C": "经检验达不到安全技术标准规定的", "D": "没有完整安全技术档案的", "E": "没有齐全有效的安全保护装置的"}, "answer": "ABCDE", "type": "multi", "category": "特种设备"}, {"id": 1898, "question": "根据《建筑起重机械安全监督管理规定》，建筑起重机械安全技\n术档案应当包括（\n）。\nA.购销合同、制造许可证、产品合格证、制造监督检验证明、安装使\n用说明书、备案证明等原始资料\nB.定期检验报告\nC.定期自行检查记录\nD.定期维护保养记录、维修和技术改造记录、运行故障和生产安全事\n故记录、累计运转记录等运行资料\n\n=== 第659页 ===\nE.历次安装验收资料", "options": {"A": "购销合同、制造许可证、产品合格证、制造监督检验证明、安装使 用说明书、备案证明等原始资料", "B": "定期检验报告", "C": "定期自行检查记录", "D": "定期维护保养记录、维修和技术改造记录、运行故障和生产安全事 故记录、累计运转记录等运行资料 === 第659页 ===", "E": "历次安装验收资料"}, "answer": "ABCDE", "type": "multi", "category": "特种设备"}, {"id": 1899, "question": "根据《建筑起重机械安全监督管理规定》，国务院建设主管部门\n对全国建筑起重机械的（\n）实施监督管理。\nA.租赁\nB.安装\nC.拆卸\nD.使用\nE.设计", "options": {"A": "租赁", "B": "安装", "C": "拆卸", "D": "使用", "E": "设计"}, "answer": "ABCD", "type": "multi", "category": "特种设备"}, {"id": 1900, "question": "根据《建设工程安全生产管理条例》，总承包单位依法将建设工\n程分包给其他单位的，分包合同中应当明确各自的安全生产方面的\n（\n）。\nA.利益\nB.效益\nC.关系\nD.权利\nE.义务", "options": {"A": "利益", "B": "效益", "C": "关系", "D": "权利", "E": "义务"}, "answer": "DE", "type": "multi", "category": "法律法规"}, {"id": 1901, "question": "根据《建设工程安全生产管理条例》，下列说法正确的是（\n）。\nA.建设工程实行施工总承包的，由总承包单位对施工现场安全生产负\n总责\n\n=== 第660页 ===\nB.施工总承包可将主体结构、装饰装修等分包给具有相应资质的分包\n单位\nC.总承包单位依法将建设工程分包给其他单位的，分包合同中应当明\n确各自的安全生产方面的权利、义务\nD.总承包单位和分包单位对分包工程的安全生产承担连带责任\nE.分包单位不服从管理导致发生安全事故的，由分包单位承担主要责\n任", "options": {"A": "建设工程实行施工总承包的，由总承包单位对施工现场安全生产负 总责 === 第660页 ===", "B": "施工总承包可将主体结构、装饰装修等分包给具有相应资质的分包 单位", "C": "总承包单位依法将建设工程分包给其他单位的，分包合同中应当明 确各自的安全生产方面的权利、义务", "D": "总承包单位和分包单位对分包工程的安全生产承担连带责任", "E": "分包单位不服从管理导致发生安全事故的，由分包单位承担主要责 任"}, "answer": "ACDE", "type": "multi", "category": "法律法规"}, {"id": 1902, "question": "根据《建设工程安全生产管理条例》，施工单位应当根据（\n）\n变化，在施工现场采取相应的安全施工措施。\nA.不同施工阶段\nB.周围环境\nC.季节\nD.气候\nE.作业班组调整", "options": {"A": "不同施工阶段", "B": "周围环境", "C": "季节", "D": "气候", "E": "作业班组调整"}, "answer": "ABCD", "type": "multi", "category": "法律法规"}, {"id": 1903, "question": "根据《建设工程安全生产管理条例》，施工单位的主要负责人、\n项目负责人未履行安全生产管理职责的，下列说法正确的是（\n）。\nA.应责令限期整改\nB.逾期未整改的，责令施工单位停业整顿\nC.逾期未整改的，处以5 万元以上10 万元以下的罚款\nD.造成重大安全事故或者其他严重后果，构成犯罪的，依照刑法有关\n\n=== 第661页 ===\n规定追究刑事责任\nE.情节严重的，降低资质等级，直至吊销资质证书", "options": {"A": "应责令限期整改", "B": "逾期未整改的，责令施工单位停业整顿", "C": "逾期未整改的，处以5 万元以上10 万元以下的罚款", "D": "造成重大安全事故或者其他严重后果，构成犯罪的，依照刑法有关 === 第661页 === 规定追究刑事责任", "E": "情节严重的，降低资质等级，直至吊销资质证书"}, "answer": "ABD", "type": "multi", "category": "法律法规"}, {"id": 1904, "question": "根据《建设工程安全生产管理条例》下列说法正确的是（\n）。\nA.建设单位在编制工程概算时，应当确定建设工程安全作业环境及安\n全施工措施所需费用\nB.建设单位在申请领取施工许可证时，应当提供建设工程有关安全施\n工措施的资料\nC.建设单位可压缩合同约定工期\nD.建设工程安全生产管理，坚持质量第一、预防为主的方针\nE.建设单位应当向施工单位提供施工现场资料，并保证资料的真实、\n准确、完整", "options": {"A": "建设单位在编制工程概算时，应当确定建设工程安全作业环境及安 全施工措施所需费用", "B": "建设单位在申请领取施工许可证时，应当提供建设工程有关安全施 工措施的资料", "C": "建设单位可压缩合同约定工期", "D": "建设工程安全生产管理，坚持质量第一、预防为主的方针", "E": "建设单位应当向施工单位提供施工现场资料，并保证资料的真实、 准确、完整"}, "answer": "ABE", "type": "multi", "category": "法律法规"}, {"id": 1905, "question": "根据《工伤保险条例》，经办机构有下列（\n）行为之一的，\n由社会保险行政部门责令改正，对直接负责的主管人员和其他责任人\n员依法给予纪律处分。\nA.收受当事人财物的\nB.未按规定保存用人单位缴费\nC.不按规定核定工伤保险待遇的\nD.丢失或者篡改缴费记录、享受社会保险待遇记录等社会保险数据、\n个人权益记录的\nE.无正当理由不受理工伤认定申请\n\n=== 第662页 ===", "options": {"A": "收受当事人财物的", "B": "未按规定保存用人单位缴费", "C": "不按规定核定工伤保险待遇的", "D": "丢失或者篡改缴费记录、享受社会保险待遇记录等社会保险数据、 个人权益记录的", "E": "无正当理由不受理工伤认定申请 === 第662页 ==="}, "answer": "ABC", "type": "multi", "category": "法律法规"}, {"id": 1906, "question": "根据《安全生产培训管理办法》的规定，安全培训机构有下列\n情形之一的，责令限期改正，处1 万元以下的罚款；逾期未改正的，\n给予警告，处1 万元以上3 万元以下的罚款（\n）。\nA.不具备安全培训条件的\nB.未按照统一的培训大纲组织教学培训的\nC.未建立培训档案或者培训档案管理不规范的\nD.未经实习期满独立上岗作业的\nE.从业人员安全培训的时间少于有关标准规定的", "options": {"A": "不具备安全培训条件的", "B": "未按照统一的培训大纲组织教学培训的", "C": "未建立培训档案或者培训档案管理不规范的", "D": "未经实习期满独立上岗作业的", "E": "从业人员安全培训的时间少于有关标准规定的"}, "answer": "ABC", "type": "multi", "category": "安全管理"}, {"id": 1907, "question": "根据《安全生产培训管理办法》的规定，安全培训工作实行（\n）\n的原则。\nA.统一规划\nB.归口管理\nC.分级实施\nD.分类指导\nE.教考分离", "options": {"A": "统一规划", "B": "归口管理", "C": "分级实施", "D": "分类指导", "E": "教考分离"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 1908, "question": "根据《安全生产培训管理办法》的规定，（\n）的有效期为3\n年。\nA.驾驶证\nB.安全生产监管执法证\n\n=== 第663页 ===\nC.煤矿安全监察执法证\nD.安全合格证\nE.培训合格证", "options": {"A": "驾驶证", "B": "安全生产监管执法证 === 第663页 ===", "C": "煤矿安全监察执法证", "D": "安全合格证", "E": "培训合格证"}, "answer": "BCD", "type": "multi", "category": "法律法规"}, {"id": 1909, "question": "从事建筑活动的建筑施工企业、勘察单位、设计单位和工程监\n理单位，应当具备下列条件（\n）。\nA.有符合国家规定的注册资本\nB.需在工程所在地设立分公司\nC.有与其从事的建筑活动相适应的具有法定执业资格的专业技术人\n员\nD.有从事相关建筑活动所应有的技术装备\nE.法律、行政法规规定的其他条件", "options": {"A": "有符合国家规定的注册资本", "B": "需在工程所在地设立分公司", "C": "有与其从事的建筑活动相适应的具有法定执业资格的专业技术人 员", "D": "有从事相关建筑活动所应有的技术装备", "E": "法律、行政法规规定的其他条件"}, "answer": "ACDE", "type": "multi", "category": "法律法规"}, {"id": 1910, "question": "被约谈方应根据约谈事由准备书面材料，主要包括（\n）等。\nA.基本情况\nB.原因分析\nC.主要教训\nD.采取的整改措施\nE.约谈后的感悟", "options": {"A": "基本情况", "B": "原因分析", "C": "主要教训", "D": "采取的整改措施", "E": "约谈后的感悟"}, "answer": "ABCD", "type": "multi", "category": "安全管理"}, {"id": 1911, "question": "报告事故应当包括的内容有（\n）。\nA.事故发生单位概况\n\n=== 第664页 ===\nB.事故发生时间、地点以及事故现场情况\nC.事故的简要经过\nD.事故已经造成或者可能造成的伤亡人数\nE.已经采取的措施", "options": {"A": "事故发生单位概况 === 第664页 ===", "B": "事故发生时间、地点以及事故现场情况", "C": "事故的简要经过", "D": "事故已经造成或者可能造成的伤亡人数", "E": "已经采取的措施"}, "answer": "ABCDE", "type": "multi", "category": "事故处理"}, {"id": 1912, "question": "安全生产监督管理部门和煤矿安全培训监管机构应当对安全培\n训机构开展安全培训活动的情况进行监督检查，检查内容包括（\n）。\nA.具备从事安全培训工作所需要的条件的情况\nB.建立培训管理制度和教师配备的情况\nC.执行培训大纲、建立培训档案和培训保障的情况\nD.培训收费的情况\nE.法律法规规定的其他内容", "options": {"A": "具备从事安全培训工作所需要的条件的情况", "B": "建立培训管理制度和教师配备的情况", "C": "执行培训大纲、建立培训档案和培训保障的情况", "D": "培训收费的情况", "E": "法律法规规定的其他内容"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 1913, "question": "《中华人民共和国噪声污染防治法》规定，建设项目的环境噪\n声污染防治设施必须与主体工程（\n）。\nA.同时设计\nB.同时布置\nC.同时检查\nD.同时施工\nE.同时投产使用", "options": {"A": "同时设计", "B": "同时布置", "C": "同时检查", "D": "同时施工", "E": "同时投产使用"}, "answer": "ADE", "type": "multi", "category": "法律法规"}, {"id": 1914, "question": "《中华人民共和国噪声污染防治法》规定，（\n）的建设项目，\n\n=== 第665页 ===\n必须遵守国家有关建设项目环境保护管理的规定。\nA.新建\nB.改建\nC.扩建\nD.拆除\nE.爆破", "options": {"A": "新建", "B": "改建", "C": "扩建", "D": "拆除", "E": "爆破"}, "answer": "ABC", "type": "multi", "category": "文明施工"}, {"id": 1915, "question": "《生产安全事故报告和调查处理条例》规定，有关地方人民政\n府、安全生产监督管理部门和负有安全生产监督管理职责的有关部门\n有（\n）行为的，对直接负责的主管人员和其他直接责任人员给予\n处分。\nA.不立即组织事故抢救的\nB.迟报、漏报、谎报或者瞒报事故的\nC.阻碍、干涉事故调查工作的\nD.在事故调查中作伪证或者指使他人作伪证的\nE.事故发生后逃逸的", "options": {"A": "不立即组织事故抢救的", "B": "迟报、漏报、谎报或者瞒报事故的", "C": "阻碍、干涉事故调查工作的", "D": "在事故调查中作伪证或者指使他人作伪证的", "E": "事故发生后逃逸的"}, "answer": "ABCD", "type": "multi", "category": "法律法规"}, {"id": 1916, "question": "《生产安全事故报告和调查处理条例》规定，事故调查应当包\n括的内容有（\n）。\nA.事故发生单位概况、事故发生经过和事故救援情况\nB.事故发生原因、事故性质以及事故造成的人员伤亡和直接经济损失\nC.事故责任的认定以及对事故责任者的处理建议\n\n=== 第666页 ===\nD.事故防范和整改措施\nE.事故造成的社会影响和恢复生产的要求", "options": {"A": "事故发生单位概况、事故发生经过和事故救援情况", "B": "事故发生原因、事故性质以及事故造成的人员伤亡和直接经济损失", "C": "事故责任的认定以及对事故责任者的处理建议 === 第666页 ===", "D": "事故防范和整改措施", "E": "事故造成的社会影响和恢复生产的要求"}, "answer": "ABCD", "type": "multi", "category": "法律法规"}, {"id": 1917, "question": "《国务院关于加强和规范事中事后监管的指导意见》中指出：\n把更多行政资源从事前审批转到加强事中事后监管上来，落实（\n），\n健全（\n），创新（\n）。\nA.监管责任\nB.监管规则\nC.监管方式\nD.监管人员\nE.监管单位", "options": {"A": "监管责任", "B": "监管规则", "C": "监管方式", "D": "监管人员", "E": "监管单位"}, "answer": "ABC", "type": "multi", "category": "法律法规"}, {"id": 1918, "question": "《国务院关于加强和规范事中事后监管的指导意见》要求加快\n建立完善各领域国家标准和行业标准，明确市场主体应当执行的\n（\n），严格依照标准开展监管。\nA.管理标准\nB.技术标准\nC.安全标准\nD.产品标准\nE.质量标准", "options": {"A": "管理标准", "B": "技术标准", "C": "安全标准", "D": "产品标准", "E": "质量标准"}, "answer": "ABCD", "type": "multi", "category": "法律法规"}, {"id": 1919, "question": "《国务院关于加强和规范事中事后监管的指导意见》提出对监\n\n=== 第667页 ===\n管中发现的违法违规问题，综合运用（\n）处理等手段，依法进行\n惩处。\nA.行政强制\nB.行政处罚\nC.联合惩戒\nD.移送司法机关\nE.拘役", "options": {"A": "行政强制", "B": "行政处罚", "C": "联合惩戒", "D": "移送司法机关", "E": "拘役"}, "answer": "ABCD", "type": "multi", "category": "法律法规"}, {"id": 1920, "question": "（\n）易燃易爆危险品的场所不得与居住场所设置在同一建筑\n物内，并应当与居住场所保持安全距离。\nA.使用\nB.运输\nC.生产\nD.储存\nE.经营", "options": {"A": "使用", "B": "运输", "C": "生产", "D": "储存", "E": "经营"}, "answer": "CDE", "type": "multi", "category": "安全管理"}, {"id": 1921, "question": "（\n）人民政府建设主管部门负责建筑施工企业安全生产许可\n证的颁发和管理，并接受国务院建设主管部门的指导和监督。\nA.直辖市\nB.省\nC.自治区\nD.国务院\n\n=== 第668页 ===\nE.地级市", "options": {"A": "直辖市", "B": "省", "C": "自治区", "D": "国务院 === 第668页 ===", "E": "地级市"}, "answer": "ABC", "type": "multi", "category": "安全管理"}, {"id": 1922, "question": "（\n）等单位，应当加强对本单位人员的消防宣传教育。\nA.机关\nB.个体户\nC.团体\nD.企业\nE.事业", "options": {"A": "机关", "B": "个体户", "C": "团体", "D": "企业", "E": "事业"}, "answer": "ACDE", "type": "multi", "category": "消防安全"}, {"id": 1923, "question": "（\n）的有效期为3 年。有效期届满需要延期的，应当于有效\n期届满30 日前向原发证部门申请办理延期手续。\nA.驾驶证\nB.安全生产监管执法证\nC.煤矿安全监察执法证\nD.安全合格证\nE.培训合格证", "options": {"A": "驾驶证", "B": "安全生产监管执法证", "C": "煤矿安全监察执法证", "D": "安全合格证", "E": "培训合格证"}, "answer": "BCD", "type": "multi", "category": "安全管理"}, {"id": 1924, "question": "用人单位有下列行为之一，由公安机关对责任人员处以十五日\n以下拘留、罚款或者警告；构成犯罪的，对责任人员依法追究刑事责\n任：（\n）。\nA.非法限制人身自由的手段强迫劳动的\nB.侮辱、体罚、殴打、非法搜查和拘禁劳动者的\n\n=== 第669页 ===\nC.以扣发工资限制人身自由的手段强迫劳动的\nD.拒绝提供劳动者必要生活条件的\nE.以暂扣证件限制人身自由的手段强迫劳动的", "options": {"A": "非法限制人身自由的手段强迫劳动的", "B": "侮辱、体罚、殴打、非法搜查和拘禁劳动者的 === 第669页 ===", "C": "以扣发工资限制人身自由的手段强迫劳动的", "D": "拒绝提供劳动者必要生活条件的", "E": "以暂扣证件限制人身自由的手段强迫劳动的"}, "answer": "AB", "type": "multi", "category": "安全管理"}, {"id": 1925, "question": "（\n）等有关单位，应当有针对性地面向社会进行消防宣传教\n育。\nA.新闻\nB.广播\nC.电视\nD.报社\nE.影院", "options": {"A": "新闻", "B": "广播", "C": "电视", "D": "报社", "E": "影院"}, "answer": "ABC", "type": "multi", "category": "消防安全"}, {"id": 1926, "question": "生产经营单位必须执行依法制定的保障安全生产的（\n）标准。\nA.国家\nB.国际\nC.行业\nD.企业\nE.地方", "options": {"A": "国家", "B": "国际", "C": "行业", "D": "企业", "E": "地方"}, "answer": "AC", "type": "multi", "category": "法律法规"}, {"id": 1927, "question": "企业事业单位和其他生产经营者有下列行为之一，尚不构成犯\n罪的，除依照有关法律法规规定予以处罚外，由县级以上人民政府环\n境保护主管部门或者其他有关部门将案件移送公安机关，对其直接负\n\n=== 第670页 ===\n责的主管人员和其他直接责任人员，处十日以上十五日以下拘留；情\n节较轻的，处五日以上十日以下拘留：（\n）。\nA.建设项目未依法进行环境影响评价，被责令停止建设，拒不执行的\nB.违反法律规定，未取得排污许可证排放污染物，被责令停止排污，\n拒不执行的\nC.通过暗管、渗井、渗坑、灌注或者篡改、伪造监测数据，或者不正\n常运行防治污染设施等逃避监管的方式违法排放污染物的\nD.生产、使用国家明令禁止生产、使用的农药，被责令改正，拒不改\n正的\nE.超过污染物排放标准或者超过重点污染物排放总量控制指标排放\n污染物的", "options": {"A": "建设项目未依法进行环境影响评价，被责令停止建设，拒不执行的", "B": "违反法律规定，未取得排污许可证排放污染物，被责令停止排污， 拒不执行的", "C": "通过暗管、渗井、渗坑、灌注或者篡改、伪造监测数据，或者不正 常运行防治污染设施等逃避监管的方式违法排放污染物的", "D": "生产、使用国家明令禁止生产、使用的农药，被责令改正，拒不改 正的", "E": "超过污染物排放标准或者超过重点污染物排放总量控制指标排放 污染物的"}, "answer": "ABCD", "type": "multi", "category": "法律法规"}, {"id": 1928, "question": "根据《危险性较大的分部分项工程安全管理规定》超过一定规\n模的危险性较大的分部分项工程包括（\n）。\nA.开挖深度超过8m 基坑工程\nB.混凝土模板支撑工程搭设高度20m 及以上\nC.单件起重量10kN 吊装工程\nD.搭设高度50m 及以上的落地式钢管脚手架工程\nE.跨度35m 及以上的钢结构安装工程", "options": {"A": "开挖深度超过8m 基坑工程", "B": "混凝土模板支撑工程搭设高度20m 及以上", "C": "单件起重量10kN 吊装工程", "D": "搭设高度50m 及以上的落地式钢管脚手架工程", "E": "跨度35m 及以上的钢结构安装工程"}, "answer": "ABD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 1929, "question": "根据《广东省房屋市政工程专职安全生产管理人员工作手册》\n规定，专职安全生产管理人员应落实以下（\n）日常工作。\n\n=== 第671页 ===\nA.配备检查工具\nB.每日开工前，对现场安全生产条件及施工环境，特别是对所有洞口\n临边进行巡查，发现问题及时处置\nC.落实“晨会”及班前会制度\nD.隐患排查整改\nE.认真规范填写《房屋市政工程施工安全日志》，真实记录并总结每\n日安全工作", "options": {"A": "配备检查工具", "B": "每日开工前，对现场安全生产条件及施工环境，特别是对所有洞口 临边进行巡查，发现问题及时处置", "C": "落实“晨会”及班前会制度", "D": "隐患排查整改", "E": "认真规范填写《房屋市政工程施工安全日志》，真实记录并总结每 日安全工作"}, "answer": "ABCDE", "type": "multi", "category": "法律法规"}, {"id": 1930, "question": "根据《广东省住房和城乡建设厅关于房屋市政工程建设单位落\n实质量安全首要责任的管理规定（试行）》规定，建设单位应当依法\n发包，禁止下列行为（\n）。\nA.将房屋市政工程发包给不具有相应资质等级的单位或者个人\nB.肢解发包\nC.将施工合同范围内的单位房屋市政工程或者分部分项房屋市政工\n程另行发包\nD.违反合同约定，通过各种形式要求承包单位选择建设单位指定的分\n包单位\nE.法律法规规定的其他情形", "options": {"A": "将房屋市政工程发包给不具有相应资质等级的单位或者个人", "B": "肢解发包", "C": "将施工合同范围内的单位房屋市政工程或者分部分项房屋市政工 程另行发包", "D": "违反合同约定，通过各种形式要求承包单位选择建设单位指定的分 包单位", "E": "法律法规规定的其他情形"}, "answer": "ABCDE", "type": "multi", "category": "法律法规"}, {"id": 1931, "question": "根据住建《重大事故隐患判定标准（2024 版）》规定，模板工程\n及支撑体系有下列情形的，应判定为重大事故隐患（\n）。\nA.模板支架的基础承载力和变形不满足设计要求\n\n=== 第672页 ===\nB.模板支架承受的施工荷载超过设计值\nC.模板支架拆除及滑模、爬模爬升时，混凝土强度未达到设计或规范\n要求\nD.危险性较大的混凝土模板支撑工程未按专项施工方案要求的顺序\n或分层厚度浇筑混凝土\nE.作业前未进行安全技术交底", "options": {"A": "模板支架的基础承载力和变形不满足设计要求 === 第672页 ===", "B": "模板支架承受的施工荷载超过设计值", "C": "模板支架拆除及滑模、爬模爬升时，混凝土强度未达到设计或规范 要求", "D": "危险性较大的混凝土模板支撑工程未按专项施工方案要求的顺序 或分层厚度浇筑混凝土", "E": "作业前未进行安全技术交底"}, "answer": "ABCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 1932, "question": "根据住建《重大事故隐患判定标准（2024 版）》规定，脚手架工\n程有下列情形的，应判定为重大事故隐患（\n）。\nA.脚手架工程的基础承载力和变形不满足设计要求\nB.未设置连墙件或连墙件整层缺失\nC.附着式升降脚手架的防倾覆、防坠落或同步升降控制装置不符合设\n计要求、失效或缺失\nD.附着式升降脚手架未经验收合格即投入使用\nE.附着式升降脚手架使用过程中架体悬臂高度大于架体高度的2/5 或\n大于6 米", "options": {"A": "脚手架工程的基础承载力和变形不满足设计要求", "B": "未设置连墙件或连墙件整层缺失", "C": "附着式升降脚手架的防倾覆、防坠落或同步升降控制装置不符合设 计要求、失效或缺失", "D": "附着式升降脚手架未经验收合格即投入使用", "E": "附着式升降脚手架使用过程中架体悬臂高度大于架体高度的2/5 或 大于6 米"}, "answer": "ABC", "type": "multi", "category": "脚手架与模板工程"}, {"id": 1933, "question": "根据住建《重大事故隐患判定标准（2024 版）》规定，施工临时\n用电有下列情形的，应判定为重大事故隐患（\n）。\nA.特殊作业环境（通风不畅、高温、有导电灰尘、相对湿度长期超过\n75%、泥泞、存在积水或其他导电液体等不利作业环境）照明未按规\n定使用安全电压\n\n=== 第673页 ===\nB.在建工程及脚手架、机械设备、场内机动车道与外电架空线路之间\n的安全距离不符合规范要求且未采取防护措施\nC.未定期对配电箱检查\nD.未开展过防触电应急演练\nE.电工上岗前未进行安全技术交底", "options": {"A": "特殊作业环境（通风不畅、高温、有导电灰尘、相对湿度长期超过 75%、泥泞、存在积水或其他导电液体等不利作业环境）照明未按规 定使用安全电压 === 第673页 ===", "B": "在建工程及脚手架、机械设备、场内机动车道与外电架空线路之间 的安全距离不符合规范要求且未采取防护措施", "C": "未定期对配电箱检查", "D": "未开展过防触电应急演练", "E": "电工上岗前未进行安全技术交底"}, "answer": "AB", "type": "multi", "category": "脚手架与模板工程"}, {"id": 1934, "question": "根据住建《重大事故隐患判定标准（2024 版）》规定，有限空间\n作业有下列情形的，应判定为重大事故隐患（\n）。\nA.未辨识施工现场有限空间，且未在显著位置设置警示标志\nB.有限空间作业未履行“作业审批制度”，未对施工人员进行专项安\n全教育培训，未执行“先通风、再检测、后作业”原则\nC.有限空间作业时现场无专人负责监护工作，或无专职安全生产管理\n人员现场监督\nD.有限空间作业现场未配备必要的气体检测、机械通风、呼吸防护及\n应急救援设施设备\nE.作业前未进行安全技术交底", "options": {"A": "未辨识施工现场有限空间，且未在显著位置设置警示标志", "B": "有限空间作业未履行“作业审批制度”，未对施工人员进行专项安 全教育培训，未执行“先通风、再检测、后作业”原则", "C": "有限空间作业时现场无专人负责监护工作，或无专职安全生产管理 人员现场监督", "D": "有限空间作业现场未配备必要的气体检测、机械通风、呼吸防护及 应急救援设施设备", "E": "作业前未进行安全技术交底"}, "answer": "ABCD", "type": "multi", "category": "法律法规"}, {"id": 1935, "question": "砂轮机属于危险性较大的生产设备，虽然结构简单，但使用频\n率高，一旦发生事故、后果严重，因此，砂轮机在使用过程中必须遵\n守安全操作要求，下列砂轮机使用安全要求中正确的有（\n）。\nA.禁止多人共用一台砂轮机同时作业\nB.应使用砂轮的圆周表面进行磨销削作业\n\n=== 第674页 ===\nC.操作者应站在砂轮机的正前方位\nD.操作者应站在砂轮机的侧方位\nE.砂轮机的除尘装置应定期检查和维修", "options": {"A": "禁止多人共用一台砂轮机同时作业", "B": "应使用砂轮的圆周表面进行磨销削作业 === 第674页 ===", "C": "操作者应站在砂轮机的正前方位", "D": "操作者应站在砂轮机的侧方位", "E": "砂轮机的除尘装置应定期检查和维修"}, "answer": "ABE", "type": "multi", "category": "事故处理"}, {"id": 1936, "question": "气瓶安全附件是气瓶的重要组成部门，对气瓶安全使用起着非\n常重要的作用，瓶洞、安全泄压装置防震圈都属于气瓶安全附件，下\n列气瓶附件设计及使用的安全要求中，正确的有（\n）。\nA.易熔合金塞结构简单不得用于固定式压力容器\nB.盛装剧毒或自燃气体的气瓶禁止安装安全泄压装置\nC.安全阀的开启压力应不大于该气瓶的水压试验压力\nD.盛装氧气的气瓶瓶调出气口螺纹应为左旋\nE.与乙炔接触的瓶阀材料铜含量应小于85%", "options": {"A": "易熔合金塞结构简单不得用于固定式压力容器", "B": "盛装剧毒或自燃气体的气瓶禁止安装安全泄压装置", "C": "安全阀的开启压力应不大于该气瓶的水压试验压力", "D": "盛装氧气的气瓶瓶调出气口螺纹应为左旋", "E": "与乙炔接触的瓶阀材料铜含量应小于85%"}, "answer": "ABC", "type": "multi", "category": "安全管理"}, {"id": 1937, "question": "圆锯机是以圆锯片对木材进行锯切加工的机械设备，可分为手\n动进料圆锯机和自动进料圆锯机，作业过程主要危险有锯片的切割伤\n害、木材的反弹抛射打击伤害等。为了保证使用安全，圆据机须设置\n安全装置。下列安全装置中，自动进料圆齿机应设置（\n）。\nA.止逆器\nB.压料装置\nC.可调式防护罩\nD.侧向防护挡板\nE.固定式防护罩\n\n=== 第675页 ===", "options": {"A": "止逆器", "B": "压料装置", "C": "可调式防护罩", "D": "侧向防护挡板", "E": "固定式防护罩 === 第675页 ==="}, "answer": "ABD", "type": "multi", "category": "安全管理"}, {"id": 1938, "question": "依据《生产安全事故报告和调查处理条例》的规定，下列事故\n中，属于重大事故的有（\n）。\nA.某建筑施工企业发生的导致31 人死亡的事故\nB.某危险化学品企业发生爆炸导致60 人重伤的事故\nC.某煤矿企业瓦斯爆炸造成15 人死亡的事故\nD.某烟花爆竹企业发生的造成直接经济损失200 万元的事故\nE.某企业尾矿库溃坝造成直接经济损失6000 万元的事故", "options": {"A": "某建筑施工企业发生的导致31 人死亡的事故", "B": "某危险化学品企业发生爆炸导致60 人重伤的事故", "C": "某煤矿企业瓦斯爆炸造成15 人死亡的事故", "D": "某烟花爆竹企业发生的造成直接经济损失200 万元的事故", "E": "某企业尾矿库溃坝造成直接经济损失6000 万元的事故"}, "answer": "BCE", "type": "multi", "category": "法律法规"}, {"id": 1939, "question": "依据《中华人民共和国安全生产法》的规定，下列企业中，必\n须设置安全生产管理机构或者配备专职安全管理人员的企业包括\n（\n）。\nA.从业人员100 人的矿山企业\nB.从业人员60 人的机械制造企业\nC.从业人员600 人的纺织企业\nD.从业人员100 人的危险物品生产、经营、储存企业\nE.从业人员100 人的建筑施工企业", "options": {"A": "从业人员100 人的矿山企业", "B": "从业人员60 人的机械制造企业", "C": "从业人员600 人的纺织企业", "D": "从业人员100 人的危险物品生产、经营、储存企业", "E": "从业人员100 人的建筑施工企业"}, "answer": "ACDE", "type": "multi", "category": "安全管理"}, {"id": 1940, "question": "以不良信用记录作为企业安全生产诚信“黑名单”的主要判断\n依据。生产经营单位有下列情况之一的，纳入国家管理的安全生产诚\n信“黑名单”（\n）。\nA.一年内发生生产安全重大责任事故，或累计发生责任事故死亡3 人\n\n=== 第676页 ===\n（含）以上的\nB.重大安全生产隐患不及时整改或整改不到位的\nC.发生暴力抗法的行为，或未按时完成行政执法指令的\nD.发生事故隐瞒不报、谎报或迟报，故意破坏事故现场、毁灭有关证\n据的\nE.无证、证照不全、超层越界开采、超载超限超时运输等非法违法行\n为的", "options": {"A": "一年内发生生产安全重大责任事故，或累计发生责任事故死亡3 人 === 第676页 === （含）以上的", "B": "重大安全生产隐患不及时整改或整改不到位的", "C": "发生暴力抗法的行为，或未按时完成行政执法指令的", "D": "发生事故隐瞒不报、谎报或迟报，故意破坏事故现场、毁灭有关证 据的", "E": "无证、证照不全、超层越界开采、超载超限超时运输等非法违法行 为的"}, "answer": "BCDE", "type": "multi", "category": "事故处理"}, {"id": 1941, "question": "依据《生产安全事故报告和调查处理条例》，事故调查组的法律\n属性体现为（\n）。\nA.法定性\nB.不可复议性\nC.临时性\nD.专业性\nE.建设性", "options": {"A": "法定性", "B": "不可复议性", "C": "临时性", "D": "专业性", "E": "建设性"}, "answer": "ACDE", "type": "multi", "category": "法律法规"}, {"id": 1942, "question": "小李下班后顺路去菜市场买菜，买完菜在回家路上被一辆闯红\n灯的小汽车撞伤住院，之后，小李与工作单位因此事故伤害是否可以\n认定工伤的问题产生纠纷。依据《工伤保险条例》的规定，下列关于\n小李工伤认定的说法，正确的有（\n）。\nA.小李在下班途中受到非本人主要责任的交通事故伤害，应当认定为\n工伤\n\n=== 第677页 ===\nB.小李下班后顺路去菜市场买菜，不属于上下班途中受到伤害，不能\n认定工伤\nC.若小李认为是工伤，工作单位不认为是工伤，应当由工作单位承担\n举证责任\nD.工作单位不提出工伤认定申请，小李可在伤害发生之日起1 年内直\n接向工作单位所在地的社会保险行政部门提出工伤认定申请\nE.提出工伤认定申请，应当提交工伤认定申请表、小李与工作单位存\n在劳动关系的证明材料、医疗诊断证明等", "options": {"A": "小李在下班途中受到非本人主要责任的交通事故伤害，应当认定为 工伤 === 第677页 ===", "B": "小李下班后顺路去菜市场买菜，不属于上下班途中受到伤害，不能 认定工伤", "C": "若小李认为是工伤，工作单位不认为是工伤，应当由工作单位承担 举证责任", "D": "工作单位不提出工伤认定申请，小李可在伤害发生之日起1 年内直 接向工作单位所在地的社会保险行政部门提出工伤认定申请", "E": "提出工伤认定申请，应当提交工伤认定申请表、小李与工作单位存 在劳动关系的证明材料、医疗诊断证明等"}, "answer": "ACDE", "type": "multi", "category": "法律法规"}, {"id": 1943, "question": "依据《建筑施工企业安全生产许可证管理办法》，下列要求中，\n属于施工企业取得安全生产许可证应当具备的安全生产条件有（\n）。\nA.建立、健全安全生产责任制\nB.保证本单位安全生产条件所需资金投入\nC.保障工程质量和安全的具体措施\nD.管理人员每年至少进行1 次安全生产教育培训\nE.已经取得建设工程规划许可证", "options": {"A": "建立、健全安全生产责任制", "B": "保证本单位安全生产条件所需资金投入", "C": "保障工程质量和安全的具体措施", "D": "管理人员每年至少进行1 次安全生产教育培训", "E": "已经取得建设工程规划许可证"}, "answer": "ABD", "type": "multi", "category": "安全管理"}, {"id": 1944, "question": "根据《特种设备安全监察条例》，特种设备事故发生，事故发生\n单位应当（\n）。\nA.立即启动事故应急预案\nB.组织抢救，防止事故扩大\nC.追究直接责任人\n\n=== 第678页 ===\nD.减少人员伤亡和财产损失\nE.及时向事故发生地县以上特种设备安全监督管理部门和有关部门\n报告", "options": {"A": "立即启动事故应急预案", "B": "组织抢救，防止事故扩大", "C": "追究直接责任人 === 第678页 ===", "D": "减少人员伤亡和财产损失", "E": "及时向事故发生地县以上特种设备安全监督管理部门和有关部门 报告"}, "answer": "ABDE", "type": "multi", "category": "特种设备"}, {"id": 1945, "question": "某市政工程施工单位电焊工甲，长期从事压力管道焊接，按照\n职业病危害因素来源分类，属于劳动过程中的危害因素有（\n）。\nA.甲从事焊接工作，长期接触电焊烟尘\nB.甲在作业过程中，企业未采取有效通风措施，长期换气不足\nC.甲因施工单位人力组织不合理，长期加班\nD.因为管道焊接的工作需要，甲长期需要佝偻身体在管道内进行焊接\nE.甲从事焊接作业的区域，管道口打磨的工作同步进行，长期在打磨\n噪声中作业", "options": {"A": "甲从事焊接工作，长期接触电焊烟尘", "B": "甲在作业过程中，企业未采取有效通风措施，长期换气不足", "C": "甲因施工单位人力组织不合理，长期加班", "D": "因为管道焊接的工作需要，甲长期需要佝偻身体在管道内进行焊接", "E": "甲从事焊接作业的区域，管道口打磨的工作同步进行，长期在打磨 噪声中作业"}, "answer": "CD", "type": "multi", "category": "安全管理"}, {"id": 1946, "question": "某企业开具高处作业票，作业高度17m，作业人员王某、李某，\n监护人张某，王某和李某负责维修，下午3 点左右，王某和李某佩戴\n好区域限制安全带及安全帽后开始进行膨胀螺栓紧固作业，中途张某\n因事离开高处作业处，下午4 时左右，王某在紧固螺栓时，重心不稳\n身体后倾，从板上坠落，安全帽破裂造成重伤对此事故的原因分析，\n下列正确的有（\n）。\nA.Ⅲ级高处作业，不合格安全带\nB.Ⅲ级高处作业，未设专人监护\nC.Ⅳ级高处作业，未设专人监护\n\n=== 第679页 ===\nD.Ⅳ级高处作业，不合格安全带\nE.Ⅳ级高处作业，不合格安全帽", "options": {"A": "Ⅲ级高处作业，不合格安全带", "B": "Ⅲ级高处作业，未设专人监护", "C": "Ⅳ级高处作业，未设专人监护 === 第679页 ===", "D": "Ⅳ级高处作业，不合格安全带", "E": "Ⅳ级高处作业，不合格安全帽"}, "answer": "AB", "type": "multi", "category": "高处作业"}, {"id": 1947, "question": "根据《特种设备作业人员考核规则》，下列特种设备作业人员监\n督、管理、考核相关要求，正确的有（\n）。\nA.特种设备的作业人员及相关管理人员统称为特种设备作业人员\nB.特种设备的作业人员年龄应在18 周岁（含18 周岁）以上，60 周\n岁（含60 周岁）以下\nC.特种设备作业人员的考试均为理论考试和实际操作技能考试两个\n科目\nD.用人单位应当聘用持证作业人员，并建立特种设备作业人员管理档\n案\nE.特种设备作业人员证每3 年复审—次，持证人员应在复审期满3 个\n月窗口申请", "options": {"A": "特种设备的作业人员及相关管理人员统称为特种设备作业人员", "B": "特种设备的作业人员年龄应在18 周岁（含18 周岁）以上，60 周 岁（含60 周岁）以下", "C": "特种设备作业人员的考试均为理论考试和实际操作技能考试两个 科目", "D": "用人单位应当聘用持证作业人员，并建立特种设备作业人员管理档 案", "E": "特种设备作业人员证每3 年复审—次，持证人员应在复审期满3 个 月窗口申请"}, "answer": "ABD", "type": "multi", "category": "特种设备"}, {"id": 1948, "question": "某企业新购置了一台20t 汽车吊，在汽车吊投入使用前向所在地\n市场监督管理部门办理了使用登记证，应纳入该汽车吊安全技术档案\n的有（\n）。\nA.生产厂家的资质\nB.管理人员资格证\nC.使用登记证\nD.产品质量合格证明\n\n=== 第680页 ===\nE.检验试验证明", "options": {"A": "生产厂家的资质", "B": "管理人员资格证", "C": "使用登记证", "D": "产品质量合格证明 === 第680页 ===", "E": "检验试验证明"}, "answer": "CD", "type": "multi", "category": "安全管理"}, {"id": 1949, "question": "《企业安全生产费用提取和使用管理办法》（财资〔2022〕136\n号）进—步扩大或调整了适用行业范围，属于新增行业的有（\n）。\nA.烟花爆竹生产\nB.电力生产与供应\nC.武器装备研制生产与试验\nD.民用爆炸品生产\nE.交通运输", "options": {"A": "烟花爆竹生产", "B": "电力生产与供应", "C": "武器装备研制生产与试验", "D": "民用爆炸品生产", "E": "交通运输"}, "answer": "BD", "type": "multi", "category": "安全管理"}, {"id": 1950, "question": "项目专职安全生产管理人员应按规定到岗，并应履行下列主要\n安全生产职责有（\n）。\nA.对项目安全生产管理情况应实施巡查\nB.阻止和处理违章指挥、违章作业和违反劳动纪律等现象，并应做好\n口头汇报\nC.对危险性较大的分部分项工程应依据方案实施监督并做好记录\nD.应建立项目安全生产管理档案\nE.并应定期向企业报告项目安全生产情况", "options": {"A": "对项目安全生产管理情况应实施巡查", "B": "阻止和处理违章指挥、违章作业和违反劳动纪律等现象，并应做好 口头汇报", "C": "对危险性较大的分部分项工程应依据方案实施监督并做好记录", "D": "应建立项目安全生产管理档案", "E": "并应定期向企业报告项目安全生产情况"}, "answer": "ACDE", "type": "multi", "category": "法律法规"}, {"id": 1951, "question": "施工企业的工程项目部应根据企业安全生产管理制度，实施施\n工现场安全生产管理，应包括（\n）内容。\nA.制订项目安全管理目标，建立安全生产组织与责任体系，明确安全\n\n=== 第681页 ===\n生产管理职责，实施责任考核\nB.配置满足安全生产、文明施工要求的费用、从业人员、设施、设备、\n劳动防护用品及相关的检测器具\nC.编制安全技术措施、方案、应急预案\nD.落实施工过程的安全生产措施，组织安全检查，整改安全隐患\nE.确定消防安全责任人，制订用火、用电、使用易燃易爆材料等各项\n消防安全管理制度和操作规程，设置消防通道、消防水源，配备消防\n设施和灭火器材，并在施工现场入口处设置明显标志", "options": {"A": "制订项目安全管理目标，建立安全生产组织与责任体系，明确安全 === 第681页 === 生产管理职责，实施责任考核", "B": "配置满足安全生产、文明施工要求的费用、从业人员、设施、设备、 劳动防护用品及相关的检测器具", "C": "编制安全技术措施、方案、应急预案", "D": "落实施工过程的安全生产措施，组织安全检查，整改安全隐患", "E": "确定消防安全责任人，制订用火、用电、使用易燃易爆材料等各项 消防安全管理制度和操作规程，设置消防通道、消防水源，配备消防 设施和灭火器材，并在施工现场入口处设置明显标志"}, "answer": "ABCDE", "type": "multi", "category": "用电安全"}, {"id": 1952, "question": "分包方安全生产管理应包括（\n）等工作内容。\nA.分包单位的选择\nB.供应商的选择\nC.施工过程管理\nD.评价\nE.近三年发生较大及以上质量事故的情况", "options": {"A": "分包单位的选择", "B": "供应商的选择", "C": "施工过程管理", "D": "评价", "E": "近三年发生较大及以上质量事故的情况"}, "answer": "ABCD", "type": "multi", "category": "事故处理"}, {"id": 1953, "question": "安全生产费用应包括（\n）等，以及必要的安全评价、监测、\n检测、论证所需费用。\nA.安全技术措施\nB.安全教育培训\nC.劳动保护\nD.安全事故赔偿\n\n=== 第682页 ===\nE.应急准备", "options": {"A": "安全技术措施", "B": "安全教育培训", "C": "劳动保护", "D": "安全事故赔偿 === 第682页 ===", "E": "应急准备"}, "answer": "ABCE", "type": "multi", "category": "事故处理"}, {"id": 1954, "question": "施工企业安全生产教育培训应贯穿于生产经营的全过程，教育\n培训应包括（\n）等工作内容。\nA.演练\nB.计划编制\nC.组织实施\nD.教育评定\nE.人员持证审核", "options": {"A": "演练", "B": "计划编制", "C": "组织实施", "D": "教育评定", "E": "人员持证审核"}, "answer": "BCE", "type": "multi", "category": "安全管理"}, {"id": 1955, "question": "下列（\n）单位应当建立单位专职消防队，承担本单位的火灾\n扑救工作。\nA.大型核设施单位、大型发电厂、民用机场、主要港口\nB.生产、储存易燃易爆危险品的大型企业\nC.危险性较大的大型企业\nD.储备可燃的重要物资的大型仓库、基地\nE.距离国家综合性消防救援队较远、被列为全国重点文物保护单位的\n古建筑群的管理单位", "options": {"A": "大型核设施单位、大型发电厂、民用机场、主要港口", "B": "生产、储存易燃易爆危险品的大型企业", "C": "危险性较大的大型企业", "D": "储备可燃的重要物资的大型仓库、基地", "E": "距离国家综合性消防救援队较远、被列为全国重点文物保护单位的 古建筑群的管理单位"}, "answer": "ABDE", "type": "multi", "category": "消防安全"}, {"id": 1956, "question": "住房和城乡建设主管部门、消防救援机构及其工作人员应当按\n照法定的职权和程序进行消防设计的（\n），做到公正、严格、文明、\n高效。\n\n=== 第683页 ===\nA.审查\nB.验收\nC.备案\nD.抽查\nE.安全检查", "options": {"A": "审查", "B": "验收", "C": "备案", "D": "抽查", "E": "安全检查"}, "answer": "ABCDE", "type": "multi", "category": "消防安全"}, {"id": 1957, "question": "关于基坑工程安全生产现场控制表述正确的是（\n）。\nA.基坑支护及开挖符合规范、设计及专项施工方案的要求\nB.基坑周围地面排水措施符合规范及专项施工方案的要求\nC.基坑地下水控制措施符合规范及专项施工方案的要求\nD.基坑监测项目、监测方法、测点布置、监测频率、监测报警及日常\n检查符合规范、设计及专项施工方案的要求\nE.基坑坡顶地面无裂缝，基坑周边建筑物无变形", "options": {"A": "基坑支护及开挖符合规范、设计及专项施工方案的要求", "B": "基坑周围地面排水措施符合规范及专项施工方案的要求", "C": "基坑地下水控制措施符合规范及专项施工方案的要求", "D": "基坑监测项目、监测方法、测点布置、监测频率、监测报警及日常 检查符合规范、设计及专项施工方案的要求", "E": "基坑坡顶地面无裂缝，基坑周边建筑物无变形"}, "answer": "ABCD", "type": "multi", "category": "基坑工程"}, {"id": 1958, "question": "以下（\n）属于施工单位的安全行为。\nA.设立安全生产管理机构，按规定配备专职安全生产管理人员\nB.按规定办理施工安全监督手续\nC.项目负责人、专职安全生产管理人员与办理施工安全监督手续资料\n一致\nD.按规定对从业人员进行安全生产教育和培训\nE.按规定为作业人员提供劳动防护用品", "options": {"A": "设立安全生产管理机构，按规定配备专职安全生产管理人员", "B": "按规定办理施工安全监督手续", "C": "项目负责人、专职安全生产管理人员与办理施工安全监督手续资料 一致", "D": "按规定对从业人员进行安全生产教育和培训", "E": "按规定为作业人员提供劳动防护用品"}, "answer": "ACDE", "type": "multi", "category": "法律法规"}, {"id": 1959, "question": "设计单位应当按照（\n）进行设计，防止因设计不合理导致生\n产安全事故的发生。\nA.法律法规\nB.合同文件\nC.招标文件\nD.补充协议\nE.工程建设强制性标准", "options": {"A": "法律法规", "B": "合同文件", "C": "招标文件", "D": "补充协议", "E": "工程建设强制性标准"}, "answer": "AE", "type": "multi", "category": "法律法规"}, {"id": 1960, "question": "施工企业的哪些人（\n）简称为“安管人员”。\nA.法人\nB.主要负责人\nC.项目负责人\nD.专职安全生产管理人员\nE.保安", "options": {"A": "法人", "B": "主要负责人", "C": "项目负责人", "D": "专职安全生产管理人员", "E": "保安"}, "answer": "BCD", "type": "multi", "category": "安全管理"}, {"id": 1961, "question": "安全色标以形象而醒目的方式向人们提供表达（\n）等安全信\n息。\nA.禁止\nB.指引\nC.警告\nD.指令\nE.提示\n\n=== 第685页 ===", "options": {"A": "禁止", "B": "指引", "C": "警告", "D": "指令", "E": "提示 === 第685页 ==="}, "answer": "ACDE", "type": "multi", "category": "安全管理"}, {"id": 1962, "question": "每个刚进企业的新员工必须接受的首次安全生产方面的基本教\n育包括（\n）。\nA.公司\nB.项目\nC.政府\nD.班组\nE.行业", "options": {"A": "公司", "B": "项目", "C": "政府", "D": "班组", "E": "行业"}, "answer": "ABD", "type": "multi", "category": "安全管理"}, {"id": 1963, "question": "生产经营单位应急预案分为（\n）。\nA.综合应急预案\nB.隐患处理方案\nC.专项应急预案\nD.安全管理方案\nE.现场处置方案", "options": {"A": "综合应急预案", "B": "隐患处理方案", "C": "专项应急预案", "D": "安全管理方案", "E": "现场处置方案"}, "answer": "ACE", "type": "multi", "category": "安全管理"}, {"id": 1964, "question": "下列不属于施工现场消火栓给水系统常见问题的是（\n）。\nA.供水压力不足，不能满足水枪充实水柱的要求，影响火灾火场施救\nB.水泵接合器故障、失效\nC.灭火器材上锁不方便使用\nD.消火栓箱内器材锈蚀，水带发霉、阀门锈蚀无法开启\nE.夏季酷热时消火栓在阳光下暴晒\n\n=== 第686页 ===", "options": {"A": "供水压力不足，不能满足水枪充实水柱的要求，影响火灾火场施救", "B": "水泵接合器故障、失效", "C": "灭火器材上锁不方便使用", "D": "消火栓箱内器材锈蚀，水带发霉、阀门锈蚀无法开启", "E": "夏季酷热时消火栓在阳光下暴晒 === 第686页 ==="}, "answer": "CE", "type": "multi", "category": "消防安全"}, {"id": 1965, "question": "下列关于颜色特性说法正确的是（\n）。\nA.红色：醒目，使人在心理上会产生兴奋感和刺激性\nB.蓝色：与白色相配合使用效果不错，特别是在背光的情况下效果更\n明显\nC.黄色对人眼能产生比红色更高的明度\nD.黄色被选用为警告色\nE.绿色的视认性和注目性都不高", "options": {"A": "红色：醒目，使人在心理上会产生兴奋感和刺激性", "B": "蓝色：与白色相配合使用效果不错，特别是在背光的情况下效果更 明显", "C": "黄色对人眼能产生比红色更高的明度", "D": "黄色被选用为警告色", "E": "绿色的视认性和注目性都不高"}, "answer": "ACDE", "type": "multi", "category": "安全管理"}, {"id": 1966, "question": "下列属于编制安全技术措施计划的依据有（\n）。\nA.在安全生产检查中发现而尚未解决的问题\nB.针对新技术、新工艺、新设备等应采取的安全技术措施\nC.安全技术革新项目和职工提出的合理化建议等\nD.相关工种的安全技术操作规程\nE.建设单位或监理单位提出额特殊要求", "options": {"A": "在安全生产检查中发现而尚未解决的问题", "B": "针对新技术、新工艺、新设备等应采取的安全技术措施", "C": "安全技术革新项目和职工提出的合理化建议等", "D": "相关工种的安全技术操作规程", "E": "建设单位或监理单位提出额特殊要求"}, "answer": "ABC", "type": "multi", "category": "安全管理"}, {"id": 1967, "question": "在使用（\n）的同时，必须研究应用相应的安全技术措施。\nA.新技术\nB.新工艺\nC.新设备\nD.新材料\nE.新机械\n\n=== 第687页 ===", "options": {"A": "新技术", "B": "新工艺", "C": "新设备", "D": "新材料", "E": "新机械 === 第687页 ==="}, "answer": "ABCD", "type": "multi", "category": "安全管理"}, {"id": 1968, "question": "根据《施工企业安全生产评价标准》（JGJ/T77-2010），施工现场\n安全管理评价应为对企业所属施工现场安全状况的考核，其内容包括\n（\n）等评定项目。\nA.施工现场安全达标\nB.安全文明资金保障\nC.资质和资格管理\nD.生产安全事故控制\nE.设备设施工艺选用、保险", "options": {"A": "施工现场安全达标", "B": "安全文明资金保障", "C": "资质和资格管理", "D": "生产安全事故控制", "E": "设备设施工艺选用、保险"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 1969, "question": "根据《建筑施工安全检查标准》（JGJ59-2011），安全管理检查评\n定保证项目应包括安全生产责任制、施工组设计及专项施工方案和\n（\n）等6 个。\nA.安全技术交底\nB.安全检查\nC.教育\nD.分包单位安全管理\nE.应急救援", "options": {"A": "安全技术交底", "B": "安全检查", "C": "教育", "D": "分包单位安全管理", "E": "应急救援"}, "answer": "ABCE", "type": "multi", "category": "安全管理"}, {"id": 1970, "question": "下列哪些情况属于违章作业？（\n）\nA.高处作业穿硬底鞋\nB.任意拆除设备上的照明设施\n\n=== 第688页 ===\nC.特种作业持证者独立进行操作\nD.非岗位人员任意在危险区域内逗留\nE.搭拆脚手架系挂安全带", "options": {"A": "高处作业穿硬底鞋", "B": "任意拆除设备上的照明设施 === 第688页 ===", "C": "特种作业持证者独立进行操作", "D": "非岗位人员任意在危险区域内逗留", "E": "搭拆脚手架系挂安全带"}, "answer": "ABD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 1971, "question": "甲公司是一家一级建筑施工企业，委托乙公司进行塔吊等特种\n设备的安装与运行操作。并与其签订了安全协议，明确了各自的安全\n管理责任，关于特种设备使用管理的说法，正确的是（\n）。\nA.甲公司应逐台建立塔吊等特种设备的安全技术档案\nB.乙公司应负责塔吊等特种设备检测检验\nC.乙公司应对塔吊运行过程中发生的事故负责\nD.甲公司应在塔吊使用前30 日内向所在地市特种设备安全监督部门\n登记\nE.甲公司应将塔吊使用登记证明文件置于司机室内", "options": {"A": "甲公司应逐台建立塔吊等特种设备的安全技术档案", "B": "乙公司应负责塔吊等特种设备检测检验", "C": "乙公司应对塔吊运行过程中发生的事故负责", "D": "甲公司应在塔吊使用前30 日内向所在地市特种设备安全监督部门 登记", "E": "甲公司应将塔吊使用登记证明文件置于司机室内"}, "answer": "AD", "type": "multi", "category": "特种设备"}, {"id": 1972, "question": "G 建设单位负责的地铁工程工期紧张，作业现场有土建施工总\n包单位H、公共区装修施工单位J、机电设备安装单位K 以及轨道安\n装单位M。这些单位同时交叉作业，其中H、K 和M 均为G 委托的\n承包商，J 为H 的专业分包商。为做好安全管理工作，G 应该履行的\n安全管理责任包括（\n）。\nA.与H 在承包合同中约定安全生产管理职责\nB.与J 签订安全管理协议\nC.与K 签订安全管理协议\n\n=== 第689页 ===\nD.对各承包商的安全生产工作统一协调管理\nE.监督K 与M 签订安全管理协议", "options": {"A": "与H 在承包合同中约定安全生产管理职责", "B": "与J 签订安全管理协议", "C": "与K 签订安全管理协议 === 第689页 ===", "D": "对各承包商的安全生产工作统一协调管理", "E": "监督K 与M 签订安全管理协议"}, "answer": "ACD", "type": "multi", "category": "安全管理"}, {"id": 1973, "question": "生产经营单位新建、改建、扩建工程项目的安全设施，必须与\n主体工程同时（\n）、同时（\n）、同时（\n）。\nA.设计\nB.策划\nC.发展\nD.施工\nE.投入生产和使用", "options": {"A": "设计", "B": "策划", "C": "发展", "D": "施工", "E": "投入生产和使用"}, "answer": "ADE", "type": "multi", "category": "安全管理"}, {"id": 1974, "question": "Ⅱ类手持式电动工具适用的场所为（\n）。\nA.潮湿场所\nB.金属构件上\nC.锅炉内\nD.地沟内\nE.管道内", "options": {"A": "潮湿场所", "B": "金属构件上", "C": "锅炉内", "D": "地沟内", "E": "管道内"}, "answer": "AB", "type": "multi", "category": "安全管理"}, {"id": 1975, "question": "依据《广东省安全生产条例》安全生产管理机构的职责主要包\n括（\n）。\nA.组织或者参与拟订本单位安全生产规章制度、操作规程和生产安全\n事故应急救援预案\n\n=== 第690页 ===\nB.组织或者参与本单位安全生产教育和培训\nC.组织开展安全风险和危险源辨识、评估\nD.组织或者参与本单位应急救援演练\nE.制止和纠正违章指挥、强令冒险作业、违反操作规程的行为", "options": {"A": "组织或者参与拟订本单位安全生产规章制度、操作规程和生产安全 事故应急救援预案 === 第690页 ===", "B": "组织或者参与本单位安全生产教育和培训", "C": "组织开展安全风险和危险源辨识、评估", "D": "组织或者参与本单位应急救援演练", "E": "制止和纠正违章指挥、强令冒险作业、违反操作规程的行为"}, "answer": "ABCDE", "type": "multi", "category": "法律法规"}, {"id": 1976, "question": "导致建筑起重机械，不得出租、使用有以下情形（\n）。\nA.属国家明令淘汰或者禁止使用的\nB.超过安全技术标准或者制造厂家规定的使用年限\nC.经检验达不到安全技术标准规定的\nD.没有完整安全技术档案的\nE.没有齐全有效的安全保护装置的", "options": {"A": "属国家明令淘汰或者禁止使用的", "B": "超过安全技术标准或者制造厂家规定的使用年限", "C": "经检验达不到安全技术标准规定的", "D": "没有完整安全技术档案的", "E": "没有齐全有效的安全保护装置的"}, "answer": "ABCDE", "type": "multi", "category": "特种设备"}, {"id": 1977, "question": "冬期施工安全教育应该从以下哪几方面进行：（\n）。\nA.针对冬期施工特点，避免冰雪结冻引发的事故\nB.加强防火安全宣传\nC.安全用电教育\nD.大型施工机械、设施常见事故案例，预防事故的措施\nE.冬季气候寒冷，在深基坑、地下管道、沉井、涵洞及地下室内作业\n时，应加强对作业人员的自我保护意识教育", "options": {"A": "针对冬期施工特点，避免冰雪结冻引发的事故", "B": "加强防火安全宣传", "C": "安全用电教育", "D": "大型施工机械、设施常见事故案例，预防事故的措施", "E": "冬季气候寒冷，在深基坑、地下管道、沉井、涵洞及地下室内作业 时，应加强对作业人员的自我保护意识教育"}, "answer": "ABCE", "type": "multi", "category": "用电安全"}, {"id": 1978, "question": "对施工现场临边、洞口的防护一般是指对施工现场（\n）的防\n护。\n\n=== 第691页 ===\nA.“一高处”\nB.“三宝”\nC.“四口”\nD.“五临边”\nE.“四临边”", "options": {"A": "“一高处”", "B": "“三宝”", "C": "“四口”", "D": "“五临边”", "E": "“四临边”"}, "answer": "CD", "type": "multi", "category": "高处作业"}, {"id": 1979, "question": "工程开工前，应将（\n）等情况，向工地负责人、工长进行详\n细交底。必要时直至向参加施工的全体人员进行交底。\nA.安全管理目标\nB.施工方法\nC.安全技术措施\nD.施工组织设计\nE.工程概况", "options": {"A": "安全管理目标", "B": "施工方法", "C": "安全技术措施", "D": "施工组织设计", "E": "工程概况"}, "answer": "BCE", "type": "multi", "category": "安全管理"}, {"id": 1980, "question": "混凝土振捣器操作人员应该掌握一定的安全用电知识，作业时\n应该穿戴好作业的（\n）。\nA.绝缘胶鞋\nB.防滑鞋\nC.绝缘手套\nD.安全帽\nE.防护服", "options": {"A": "绝缘胶鞋", "B": "防滑鞋", "C": "绝缘手套", "D": "安全帽", "E": "防护服"}, "answer": "AC", "type": "multi", "category": "用电安全"}, {"id": 1981, "question": "建筑工程安全生产的特点主要体现在以下几个方面：（\n）。\nA.产品的固定性导致作业环境局限性\nB.露天作业多导致作业条件恶劣性\nC.体积庞大带来了施工作业高空性\nD.手工操作多、体积消耗大、强度高带来了个体劳动保护艰巨性\nE.拆除工程潜在危险带来作业的不安全性", "options": {"A": "产品的固定性导致作业环境局限性", "B": "露天作业多导致作业条件恶劣性", "C": "体积庞大带来了施工作业高空性", "D": "手工操作多、体积消耗大、强度高带来了个体劳动保护艰巨性", "E": "拆除工程潜在危险带来作业的不安全性"}, "answer": "ABCDE", "type": "multi", "category": "高处作业"}, {"id": 1982, "question": "使用者在选用安全帽时，要注意检查“三证”，即（\n）。\nA.生产许可证\nB.使用许可证\nC.产品合格证\nD.质量等级证\nE.安全鉴定证", "options": {"A": "生产许可证", "B": "使用许可证", "C": "产品合格证", "D": "质量等级证", "E": "安全鉴定证"}, "answer": "ACE", "type": "multi", "category": "安全管理"}, {"id": 1983, "question": "使用者在选择安全帽时要注意（\n）。\nA.检查“三证”\nB.检查标识\nC.检查产品做工\nD.进行撞击测试\nE.目测佩戴高度、垂直距离、水平距离等指标", "options": {"A": "检查“三证”", "B": "检查标识", "C": "检查产品做工", "D": "进行撞击测试", "E": "目测佩戴高度、垂直距离、水平距离等指标"}, "answer": "ABCE", "type": "multi", "category": "安全管理"}, {"id": 1984, "question": "下列选项中不属于班组教育的主要内容的是（\n）。\n\n=== 第693页 ===\nA.本工种的安全操作规程\nB.班组安全活动制度及纪律\nC.本班组施工生产工作概况\nD.本单位安全生产制度、规定和安全注意事项\nE.本工程项目施工的基本情况，施工中应当注意的安全事项", "options": {"A": "本工种的安全操作规程", "B": "班组安全活动制度及纪律", "C": "本班组施工生产工作概况", "D": "本单位安全生产制度、规定和安全注意事项", "E": "本工程项目施工的基本情况，施工中应当注意的安全事项"}, "answer": "DE", "type": "multi", "category": "法律法规"}, {"id": 1985, "question": "项目经理部在项目施工管理总策划时必须对施工现场的危险源\n进行（\n）。\nA.识别\nB.检测\nC.评价\nD.控制策划\nE.测试", "options": {"A": "识别", "B": "检测", "C": "评价", "D": "控制策划", "E": "测试"}, "answer": "ACD", "type": "multi", "category": "安全管理"}, {"id": 1986, "question": "硬器刺伤是指（\n）造成的刺伤。\nA.刀具、碎玻璃\nB.铁丝、铁钉\nC.铁棍\nD.钢筋\nE.木刺", "options": {"A": "刀具、碎玻璃", "B": "铁丝、铁钉", "C": "铁棍", "D": "钢筋", "E": "木刺"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 1987, "question": "有以下情形之一的，建设单位应当按照国家有关规定办理申请\n\n=== 第694页 ===\n批准手续（\n）。\nA.需要临时占用规划批准范围以外场地的\nB.可能损坏道路、管线、电力、邮电通讯等公共设施的\nC.需要临时停水、停电、中断道路交通的\nD.需要进行爆破作业的\nE.法律、法规规定需要办理报批手续的其他情形", "options": {"A": "需要临时占用规划批准范围以外场地的", "B": "可能损坏道路、管线、电力、邮电通讯等公共设施的", "C": "需要临时停水、停电、中断道路交通的", "D": "需要进行爆破作业的", "E": "法律、法规规定需要办理报批手续的其他情形"}, "answer": "ABCDE", "type": "multi", "category": "法律法规"}, {"id": 1988, "question": "事故隐患分为（\n）。\nA.一般事故隐患\nB.较大事故隐患\nC.重大事故隐患\nD.特大事故隐患\nE.一级事故隐患", "options": {"A": "一般事故隐患", "B": "较大事故隐患", "C": "重大事故隐患", "D": "特大事故隐患", "E": "一级事故隐患"}, "answer": "AC", "type": "multi", "category": "事故处理"}, {"id": 1989, "question": "改善作业环境质量的控制措施主要包括（\n）。\nA.控制污染源头\nB.加强环境通风\nC.增强个体防护\nD.改善作业场所\nE.张贴指示标志", "options": {"A": "控制污染源头", "B": "加强环境通风", "C": "增强个体防护", "D": "改善作业场所", "E": "张贴指示标志"}, "answer": "ABC", "type": "multi", "category": "安全管理"}, {"id": 1990, "question": "下列属于安全标志类型的是（\n）。\n\n=== 第695页 ===\nA.禁止标志\nB.警告标志\nC.指令标志\nD.指示标志\nE.交通标志", "options": {"A": "禁止标志", "B": "警告标志", "C": "指令标志", "D": "指示标志", "E": "交通标志"}, "answer": "ABC", "type": "multi", "category": "安全管理"}, {"id": 1991, "question": "根据《建设工程安全生产管理条例》（国务院令第393 号），下\n列工作职责中，属于工程项目部专职安全生产管理人员的有（\n）。\nA.建立安全生产责任制度\nB.对施工现场进行监督检查\nC.对违章指挥、违章操作立即制止\nD.发现安全生产事故隐患及时报告\nE.根据工程情况制定安全施工措施", "options": {"A": "建立安全生产责任制度", "B": "对施工现场进行监督检查", "C": "对违章指挥、违章操作立即制止", "D": "发现安全生产事故隐患及时报告", "E": "根据工程情况制定安全施工措施"}, "answer": "BCD", "type": "multi", "category": "法律法规"}, {"id": 1992, "question": "生产经营单位应当在有较大危险因素的生产经营场所和有关\n（\n）上，设置明显的安全警示标志。\nA.设施\nB.设备\nC.机器\nD.岗位\nE.墙壁", "options": {"A": "设施", "B": "设备", "C": "机器", "D": "岗位", "E": "墙壁"}, "answer": "AB", "type": "multi", "category": "安全管理"}, {"id": 1993, "question": "在工程建设过程中下列情形属于重大事故的有（\n）。\nA.死亡3 人以上10 人以下\nB.重伤50 人以上100 人以下\nC.死亡10 人以上30 人以下\nD.直接经济损失5000 万元以上1 亿元以下\nE.直接经济损失1000 万元以上5000 万元以下", "options": {"A": "死亡3 人以上10 人以下", "B": "重伤50 人以上100 人以下", "C": "死亡10 人以上30 人以下", "D": "直接经济损失5000 万元以上1 亿元以下", "E": "直接经济损失1000 万元以上5000 万元以下"}, "answer": "BCD", "type": "multi", "category": "事故处理"}, {"id": 1994, "question": "企业取得安全生产许可证，应当具备下列安全生产条件（\n）。\nA.建立、健全安全生产责任制，制定完备的安全生产规章制度和操作\n规程\nB.主要负责人和安全生产管理人员经考核合格\nC.依法进行安全评价\nD.设置安全生产管理机构，配备专职安全生产管理人员\nE.可以没有重大危险源检测、评估、监控措施和应急预案", "options": {"A": "建立、健全安全生产责任制，制定完备的安全生产规章制度和操作 规程", "B": "主要负责人和安全生产管理人员经考核合格", "C": "依法进行安全评价", "D": "设置安全生产管理机构，配备专职安全生产管理人员", "E": "可以没有重大危险源检测、评估、监控措施和应急预案"}, "answer": "ABCD", "type": "multi", "category": "事故处理"}, {"id": 1995, "question": "第二方评价的目的是（\n）。\nA.从专业的角度，出具评价报告\nB.对施工企业进行监督检查\nC.确认其安全生产能力及其持续保持情况\nD.提出整改要求，或进行相应的处理\nE.为企业安全生产状况提供客观、专业的证据和建议", "options": {"A": "从专业的角度，出具评价报告", "B": "对施工企业进行监督检查", "C": "确认其安全生产能力及其持续保持情况", "D": "提出整改要求，或进行相应的处理", "E": "为企业安全生产状况提供客观、专业的证据和建议"}, "answer": "BC", "type": "multi", "category": "安全管理"}, {"id": 1996, "question": "出租单位应当在签订的建筑起重机械租赁合同中，明确租赁双\n方的安全责任，并出具建筑起重机械特种设备（\n）。\nA.制造许可证\nB.备案证明\nC.产品合格证\nD.制造监督检验证明\nE.自检合格证明", "options": {"A": "制造许可证", "B": "备案证明", "C": "产品合格证", "D": "制造监督检验证明", "E": "自检合格证明"}, "answer": "ABCDE", "type": "multi", "category": "特种设备"}, {"id": 1997, "question": "安全带按作业类别分为（\n）。\nA.围杆作业安全带\nB.区域限制安全带\nC.移动式安全带\nD.坠落悬挂安全带\nE.固定挂式安全带", "options": {"A": "围杆作业安全带", "B": "区域限制安全带", "C": "移动式安全带", "D": "坠落悬挂安全带", "E": "固定挂式安全带"}, "answer": "ABD", "type": "multi", "category": "高处作业"}, {"id": 1998, "question": "班组长在班前进行上岗交底的主要工作内容是（\n）。\nA.当天的作业环境\nB.气候情况\nC.主要工作内容\nD.检查上岗人员的劳动防护情况\nE.每个岗位周围作业环境是否安全无患", "options": {"A": "当天的作业环境", "B": "气候情况", "C": "主要工作内容", "D": "检查上岗人员的劳动防护情况", "E": "每个岗位周围作业环境是否安全无患"}, "answer": "ABC", "type": "multi", "category": "安全管理"}, {"id": 1999, "question": "安全管理的原理包括（\n）。\nA.系统原理\nB.人本原理\nC.强制原理\nD.轨迹交叉理论\nE.海因里希事故因果连锁理论", "options": {"A": "系统原理", "B": "人本原理", "C": "强制原理", "D": "轨迹交叉理论", "E": "海因里希事故因果连锁理论"}, "answer": "ABC", "type": "multi", "category": "安全管理"}, {"id": 2000, "question": "塔式起重机基础设计应采用塔机使用说明书中基础荷载，应包\n括工作状态和非工作状态的（\n）以及非工作状态的基本风压。\nA.垂直荷载\nB.倾覆力矩\nC.水平荷载\nD.扭矩\nE.动荷载", "options": {"A": "垂直荷载", "B": "倾覆力矩", "C": "水平荷载", "D": "扭矩", "E": "动荷载"}, "answer": "ABCD", "type": "multi", "category": "特种设备"}, {"id": 2001, "question": "危大工程专项施工方案的主要内容应当包括：（\n）。\nA.计算书及相关施工图纸\nB.应急处置措施\nC.监测点布置图\nD.施工安全保证措施\nE.施工计划", "options": {"A": "计算书及相关施工图纸", "B": "应急处置措施", "C": "监测点布置图", "D": "施工安全保证措施", "E": "施工计划"}, "answer": "ABDE", "type": "multi", "category": "事故处理"}, {"id": 2002, "question": "新工人在分配到施工队之前，必须进行初步的安全教育，下列\n属于公司级的安全教育内容的是（\n）。\nA.劳动保护的意义和任务的一般教育\nB.安全生产方针、政策、法规、标准和安全知识\nC.企业安全规章制度\nD.安全生产纪律和文明生产要求\nE.本工种安全操作规程", "options": {"A": "劳动保护的意义和任务的一般教育", "B": "安全生产方针、政策、法规、标准和安全知识", "C": "企业安全规章制度", "D": "安全生产纪律和文明生产要求", "E": "本工种安全操作规程"}, "answer": "ABC", "type": "multi", "category": "法律法规"}, {"id": 2003, "question": "编制安全检查表的主要依据有：（\n）。\nA.有关标准、规程、规范及规定\nB.国内外事故案例及本单位在安全管理及生产中的有关经验\nC.通过系统的分析，确定的危险部位及防范措施都是安全检查表的内\n容\nD.新知识、新成果、新方法、新技术、新法规和新标准\nE.通过仪器检测法来进行定量测量，发现安全隐患是安全检查表的内\n容", "options": {"A": "有关标准、规程、规范及规定", "B": "国内外事故案例及本单位在安全管理及生产中的有关经验", "C": "通过系统的分析，确定的危险部位及防范措施都是安全检查表的内 容", "D": "新知识、新成果、新方法、新技术、新法规和新标准", "E": "通过仪器检测法来进行定量测量，发现安全隐患是安全检查表的内 容"}, "answer": "ABCD", "type": "multi", "category": "安全管理"}, {"id": 2004, "question": "机械设备进入施工现场后，项目负责人应组织（\n）进行验收。\nA.项目技术负责人\nB.机械管理人员\nC.专职安全管理人员\nD.使用单位有关人员\n\n=== 第700页 ===\nE.租赁单位有关人员", "options": {"A": "项目技术负责人", "B": "机械管理人员", "C": "专职安全管理人员", "D": "使用单位有关人员 === 第700页 ===", "E": "租赁单位有关人员"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 2005, "question": "根据《建筑施工企业安全生产许可证动态监管暂行办法》，建设\n单位或其委托的工程招标代理机构在编制资格预审文件和招标文件\n时，应当明确的要求建筑施工企业提供安全生产许可证，以及（\n）。\nA.企业主要负责人\nB.拟担任该项目负责人\nC.专职安全生产管理人员\nD.土建类安全管理人员\nE.机械类安全管理人员", "options": {"A": "企业主要负责人", "B": "拟担任该项目负责人", "C": "专职安全生产管理人员", "D": "土建类安全管理人员", "E": "机械类安全管理人员"}, "answer": "ABC", "type": "multi", "category": "安全管理"}, {"id": 2006, "question": "企业有下列（\n）行为的，将依法吊销安全生产许可证。\nA.12 个月内同一企业连续发生两次生产安全事故的\nB.12 个月内同一企业连续发生3 次生产安全事故的\nC.建筑施工企业在安全生产许可证暂扣期内，拒不整改的\nD.企业降低安全生产条件\nE.建筑施工企业暂扣时限超过120 日", "options": {"A": "12 个月内同一企业连续发生两次生产安全事故的", "B": "12 个月内同一企业连续发生3 次生产安全事故的", "C": "建筑施工企业在安全生产许可证暂扣期内，拒不整改的", "D": "企业降低安全生产条件", "E": "建筑施工企业暂扣时限超过120 日"}, "answer": "BCE", "type": "multi", "category": "事故处理"}, {"id": 2007, "question": "防护鞋的作用有（\n）。\nA.防止物体砸伤\nB.防止高低温伤害\nC.防止触电伤害\n\n=== 第701页 ===\nD.防止物体刺割伤害\nE.防止酸碱性化学品伤害", "options": {"A": "防止物体砸伤", "B": "防止高低温伤害", "C": "防止触电伤害 === 第701页 ===", "D": "防止物体刺割伤害", "E": "防止酸碱性化学品伤害"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 2008, "question": "属于超过一定规模的危险性较大的分部分项工程范围的有\n（\n）。\nA.搭设高度50m 及以上的落地式钢管脚手架工程\nB.采用矿山法、盾构法的隧道工程\nC.人工挖孔桩工程\nD.开挖深度超过5m（含5m）的基坑工程\nE.采用非常规起重设备、方法，且单件起吊重量在100kN 及以上的起\n重吊装工程", "options": {"A": "搭设高度50m 及以上的落地式钢管脚手架工程", "B": "采用矿山法、盾构法的隧道工程", "C": "人工挖孔桩工程", "D": "开挖深度超过5m（含5m）的基坑工程", "E": "采用非常规起重设备、方法，且单件起吊重量在100kN 及以上的起 重吊装工程"}, "answer": "ABDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2009, "question": "安全标志按其用途可分为（\n）标志。\nA.注意\nB.提示\nC.警告\nD.禁止\nE.指令", "options": {"A": "注意", "B": "提示", "C": "警告", "D": "禁止", "E": "指令"}, "answer": "BCDE", "type": "multi", "category": "安全管理"}, {"id": 2010, "question": "专职安全生产管理人员分为（\n）等三类。\nA.建筑\nB.机械\n\n=== 第702页 ===\nC.土建\nD.综合\nE.道桥", "options": {"A": "建筑", "B": "机械 === 第702页 ===", "C": "土建", "D": "综合", "E": "道桥"}, "answer": "BCD", "type": "multi", "category": "安全管理"}, {"id": 2011, "question": "安全生产管理的目的是保证在生产经营活动中的（\n）。\nA.人身安全\nB.环境安全\nC.财产安全\nD.促进生产的发展\nE.保持社会的稳定", "options": {"A": "人身安全", "B": "环境安全", "C": "财产安全", "D": "促进生产的发展", "E": "保持社会的稳定"}, "answer": "ACDE", "type": "multi", "category": "安全管理"}, {"id": 2012, "question": "安全教育培训的方法包括哪些（\n）。\nA.工作现场的安全教育\nB.安全操作技能的培训\nC.讨论法\nD.脑力激荡法\nE.安全活动", "options": {"A": "工作现场的安全教育", "B": "安全操作技能的培训", "C": "讨论法", "D": "脑力激荡法", "E": "安全活动"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 2013, "question": "根据《施工企业安全生产评价标准》JGJ/T77—2010，关于安全\n生产责任制度的要求扣分项包括（\n）。\nA.企业未建立安全生产考核、奖惩制度\nB.企业未建立安全生产责任制度\n\n=== 第703页 ===\nC.企业未建立安全生产责任制考核制度\nD.企业未建立分包管理制度\nE.企业未建立安全培训制度", "options": {"A": "企业未建立安全生产考核、奖惩制度", "B": "企业未建立安全生产责任制度 === 第703页 ===", "C": "企业未建立安全生产责任制考核制度", "D": "企业未建立分包管理制度", "E": "企业未建立安全培训制度"}, "answer": "ABC", "type": "multi", "category": "安全管理"}, {"id": 2014, "question": "生产经营单位作出涉及安全生产的经营决策，应当听取（\n）\n的意见。\nA.安全生产管理机构\nB.技术部\nC.总工室\nD.技术人员\nE.安全生产管理人员", "options": {"A": "安全生产管理机构", "B": "技术部", "C": "总工室", "D": "技术人员", "E": "安全生产管理人员"}, "answer": "AE", "type": "multi", "category": "安全管理"}, {"id": 2015, "question": "建筑施工中通常所说的“三宝”是指（\n）。\nA.安全帽\nB.安全带\nC.安全网\nD.安全鞋\nE.安全锁", "options": {"A": "安全帽", "B": "安全带", "C": "安全网", "D": "安全鞋", "E": "安全锁"}, "answer": "ABC", "type": "multi", "category": "高处作业"}, {"id": 2016, "question": "工程项目部在组织装配式建筑混凝土预制构件安装施工时，下\n列现场安全管理的做法中，正确的有（\n）。\nA.项目技术负责人向现场管理人员进行方案交底\n\n=== 第704页 ===\nB.在施工现场显著位置公告危险性较大的分部分项工程名称、施工时\n间和责任人员\nC.工程项目部对预制构件安装作业人员进行登记\nD.项目负责人在施工现场带班对危险性较大的分部分项工程进行检\n查\nE.项目专职安全生产管理人员组织模板支撑体系验收", "options": {"A": "项目技术负责人向现场管理人员进行方案交底 === 第704页 ===", "B": "在施工现场显著位置公告危险性较大的分部分项工程名称、施工时 间和责任人员", "C": "工程项目部对预制构件安装作业人员进行登记", "D": "项目负责人在施工现场带班对危险性较大的分部分项工程进行检 查", "E": "项目专职安全生产管理人员组织模板支撑体系验收"}, "answer": "ABCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2017, "question": "甲防腐公司5 人在乙企业廊道内进行防腐作业，其中1 人监护4\n人作业，作业2 小时后，监护人去洗手间，回来后发现4 人在廊道内\n晕倒。事故发生后，乙企业检修部门负责人汇报公司主要领导，启动\n专项应急预案，拨打了110 电话，并组织将伤者送入医院抢救。为切\n实保障救援者的身心健康，乙企业将参与救援的20 多名职工送到当\n地医院，留观正常。由于该事故涉及送医人员较多，未及时报告当地\n政府有关部门，造成一定的社会恐慌。根据《生产经营单位生产安全\n事故应急预案编制导则》，该专项预案应完善的内容包括（\n）。\nA.应急响应启动后必须信息公开，避免造成恐慌\nB.乙企业主要领导应启动专项应急预案\nC.处置措施环节应明确专人拨打110 电话\nD.应急保障部分应明确医疗应急救援相关事项\nE.处置措施环节应增加向当地政府部门即时报送信息", "options": {"A": "应急响应启动后必须信息公开，避免造成恐慌", "B": "乙企业主要领导应启动专项应急预案", "C": "处置措施环节应明确专人拨打110 电话", "D": "应急保障部分应明确医疗应急救援相关事项", "E": "处置措施环节应增加向当地政府部门即时报送信息"}, "answer": "AE", "type": "multi", "category": "事故处理"}, {"id": 2018, "question": "某日甲化工企业氯乙烯气柜泄漏，氯乙烯扩散至厂外区域，遇\n\n=== 第705页 ===\n火源发生爆炸，造成24 人死亡、21 人受伤，38 辆大货车和12 辆小\n型车损毁。根据伤亡事故的不同特点，事故按照行业、致损因素和伤\n害程度分类，下列事故分类中，正确的有（\n）。\nA.按照致损因素划分，该事故是火灾事故\nB.按照行业划分，该事故是危险化学品事故\nC.按照伤害程度划分，该事故是重大事故\nD.按照致损因素划分，该事故是其他爆炸事故\nE.按照伤害程度划分，该事故是死亡事故", "options": {"A": "按照致损因素划分，该事故是火灾事故", "B": "按照行业划分，该事故是危险化学品事故", "C": "按照伤害程度划分，该事故是重大事故", "D": "按照致损因素划分，该事故是其他爆炸事故", "E": "按照伤害程度划分，该事故是死亡事故"}, "answer": "BDE", "type": "multi", "category": "消防安全"}, {"id": 2019, "question": "某建筑企业安全监管部门组织秋季安全生产大检查，发现承包\n方架子工在外桥墩作业过程中，使用的安全带不符合安全规范要求，\n提出疑义。关于该架子工所使用的安全带的说法，正确的有（\n）。\nA.架子工使用标记为“X”字母的安全带\nB.架子工采用坠落悬挂式安全带\nC.架子工使用标记为“R”字母的安全带\nD.架子工使用标记为“F”字母的安全带\nE.架子工使用标记为“X-RF”字母的安全带", "options": {"A": "架子工使用标记为“X”字母的安全带", "B": "架子工采用坠落悬挂式安全带", "C": "架子工使用标记为“R”字母的安全带", "D": "架子工使用标记为“F”字母的安全带", "E": "架子工使用标记为“X-RF”字母的安全带"}, "answer": "BCD", "type": "multi", "category": "高处作业"}, {"id": 2020, "question": "根据《建筑施工安全检查标准》（JGJ59），甲检查时发现落地式\n扣件钢管脚手架存在的5 项安全隐患中，属于落地式扣件钢管脚手架\n检查评定保证项目的有（\n）。\nA.架体未设供人员上下的专用斜道\n\n=== 第706页 ===\nB.作业面脚手板下方未采用安全平网兜底\nC.作业层外侧设置高度150mm 的挡脚板\nD.搭设完毕未办理验收手续\nE.落地式扣件钢管脚手架未编制专项施工方案", "options": {"A": "架体未设供人员上下的专用斜道 === 第706页 ===", "B": "作业面脚手板下方未采用安全平网兜底", "C": "作业层外侧设置高度150mm 的挡脚板", "D": "搭设完毕未办理验收手续", "E": "落地式扣件钢管脚手架未编制专项施工方案"}, "answer": "CDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2021, "question": "安全检查的类型应包括（\n）等。\nA.日常巡查\nB.专项检查\nC.季节性检查\nD.定期检查\nE.不定期抽查", "options": {"A": "日常巡查", "B": "专项检查", "C": "季节性检查", "D": "定期检查", "E": "不定期抽查"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 2022, "question": "以下属于危险性较大的分部分项工程的是（\n）。\nA.搭设高度18m 及以上的落地式钢管脚手架工程\nB.附着式升降脚手架工程\nC.悬挑式脚手架工程\nD.操作平台工程\nE.高处作业吊篮", "options": {"A": "搭设高度18m 及以上的落地式钢管脚手架工程", "B": "附着式升降脚手架工程", "C": "悬挑式脚手架工程", "D": "操作平台工程", "E": "高处作业吊篮"}, "answer": "BCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2023, "question": "安全生产法律法规是国家法律体系中的重要组成部分。我们通\n常说的安全生产法律法规是对有关安全生产的（\n）总称。\nA.法律\n\n=== 第707页 ===\nB.行政法规\nC.规章\nD.通知\nE.文件", "options": {"A": "法律 === 第707页 ===", "B": "行政法规", "C": "规章", "D": "通知", "E": "文件"}, "answer": "ABC", "type": "multi", "category": "法律法规"}, {"id": 2024, "question": "目前，我国的安全生产法规已初步形成一个以《中华人民共和\n国宪法》为依据的、以《中华人民共和国安全生产法》为主体的、由\n有关（\n）所组成的综合体系。\nA.法律\nB.行政法规、地方性法规\nC.行政规章\nD.企业规章\nE.技术标准", "options": {"A": "法律", "B": "行政法规、地方性法规", "C": "行政规章", "D": "企业规章", "E": "技术标准"}, "answer": "ABCE", "type": "multi", "category": "法律法规"}, {"id": 2025, "question": "下列对安全生产法规作用的叙述，正确的有（\n）。\nA.为保护劳动者的安全健康提供法律保障\nB.加强安全生产的法制化管理\nC.推动安全生产工作的发展，促进企业安全生产\nD.保证产品质量的提高\nE.进一步提高生产力，保证企业效益的实现和国家经济建设事业的顺\n利发展", "options": {"A": "为保护劳动者的安全健康提供法律保障", "B": "加强安全生产的法制化管理", "C": "推动安全生产工作的发展，促进企业安全生产", "D": "保证产品质量的提高", "E": "进一步提高生产力，保证企业效益的实现和国家经济建设事业的顺 利发展"}, "answer": "ABCE", "type": "multi", "category": "法律法规"}, {"id": 2026, "question": "《中华人民共和国安全生产法》规定，生产经营单位应当具备\n的安全生产条件所必需的资金投入，由生产经营单位的（\n）予以\n保证，并对由于安全生产所必需的资金投入不足导致的后果承担责任。\nA.决策机构\nB.主要负责人\nC.总经理\nD.个人经营的投资人\nE.董事会", "options": {"A": "决策机构", "B": "主要负责人", "C": "总经理", "D": "个人经营的投资人", "E": "董事会"}, "answer": "ABD", "type": "multi", "category": "法律法规"}, {"id": 2027, "question": "《中华人民共和国安全生产法》规定，生产经营单位采用（\n），\n必须了解、掌握其安全技术特性，采取有效的安全防护措施，并对从\n业人员进行专门的安全生产教育和培训。\nA.新工艺\nB.新技术\nC.新材料\nD.新结构\nE.新设备", "options": {"A": "新工艺", "B": "新技术", "C": "新材料", "D": "新结构", "E": "新设备"}, "answer": "ABCE", "type": "multi", "category": "法律法规"}, {"id": 2028, "question": "下列属于《中华人民共和国安全生产法》规定的工会组织的权\n利有（\n）。\nA.有权对建设项目的安全设施与主体工程同时设计、同时施工、同时\n投入生产和使用进行监督，提出意见\n\n=== 第709页 ===\nB.对生产经营单位违反安全生产法律、法规，侵犯从业人员合法权益\n的行为，有权要求纠正\nC.发现生产经营单位违章指挥、强令冒险作业或者发现事故隐患时，\n有权提出解决的建议\nD.发现危及从业人员生命安全的情况时，有权向生产经营单位建议组\n织从业人员撤离危险场\nE.有权依法参加事故调查，向有关部门提出处理意见，并要求追究有\n关人员的责任", "options": {"A": "有权对建设项目的安全设施与主体工程同时设计、同时施工、同时 投入生产和使用进行监督，提出意见 === 第709页 ===", "B": "对生产经营单位违反安全生产法律、法规，侵犯从业人员合法权益 的行为，有权要求纠正", "C": "发现生产经营单位违章指挥、强令冒险作业或者发现事故隐患时， 有权提出解决的建议", "D": "发现危及从业人员生命安全的情况时，有权向生产经营单位建议组 织从业人员撤离危险场", "E": "有权依法参加事故调查，向有关部门提出处理意见，并要求追究有 关人员的责任"}, "answer": "ABCDE", "type": "multi", "category": "法律法规"}, {"id": 2029, "question": "依照《中华人民共和国安全生产法》，生产经营单位发生生产安\n全事故，单位负责人接到事故报告后应采取的措施是（\n）。\nA.迅速采取有效措施，组织抢救，防止事故扩大，减少人员伤亡和财\n产损失\nB.封锁事故现场\nC.藏匿有关证据\nD.按照国家有关规定立即如实报告\nE.按照四不放过原则进行调查处理后，上报事故", "options": {"A": "迅速采取有效措施，组织抢救，防止事故扩大，减少人员伤亡和财 产损失", "B": "封锁事故现场", "C": "藏匿有关证据", "D": "按照国家有关规定立即如实报告", "E": "按照四不放过原则进行调查处理后，上报事故"}, "answer": "AD", "type": "multi", "category": "法律法规"}, {"id": 2030, "question": "《中华人民共和国安全生产法》规定，生产经营单位的从业人\n员有权了解其作业场所和工作岗位存在的（\n）。\nA.危险因素\nB.风险\n\n=== 第710页 ===\nC.防范措施\nD.特点\nE.事故应急措施", "options": {"A": "危险因素", "B": "风险 === 第710页 ===", "C": "防范措施", "D": "特点", "E": "事故应急措施"}, "answer": "ACE", "type": "multi", "category": "法律法规"}, {"id": 2031, "question": "按照《中华人民共和国消防法》的规定，下列属于机关、团体、\n企业、事业单位应当履行的消防安全职责的有（\n）。\nA.承担火灾扑救工作\nB.实行防火安全责任制\nC.组织防火检查，及时消除火灾隐患\nD.按照国家有关规定配置消防设施和器材、设置消防安全标志\nE.保障疏散通道、安全出口畅通，并设置符合国家规定的消防安全疏\n散标志", "options": {"A": "承担火灾扑救工作", "B": "实行防火安全责任制", "C": "组织防火检查，及时消除火灾隐患", "D": "按照国家有关规定配置消防设施和器材、设置消防安全标志", "E": "保障疏散通道、安全出口畅通，并设置符合国家规定的消防安全疏 散标志"}, "answer": "BCDE", "type": "multi", "category": "消防安全"}, {"id": 2032, "question": "根据《建设工程安全生产管理条例》规定，县级以上人民政府\n负有建设工程安全生产监督管理职责的部门在各自的职责范围内履\n行安全监督检查职责时，有权采取的措施有（\n）。\nA.要求被检查单位提供有关建设工程安全生产的文件和资料\nB.进入被检查单位施工现场进行检查\nC.纠正施工中违反安全生产要求的行为\nD.对检查中发现的安全事故隐患，责令立即排除；重大安全事故隐患\n排除前或者排除过程中无法保证安全的，责令从危险区域内撤出作业\n人员或者暂时停止施工\n\n=== 第711页 ===\nE.在检查中发现重大安全事故隐患，有权责令被检查单位停业整顿", "options": {"A": "要求被检查单位提供有关建设工程安全生产的文件和资料", "B": "进入被检查单位施工现场进行检查", "C": "纠正施工中违反安全生产要求的行为", "D": "对检查中发现的安全事故隐患，责令立即排除；重大安全事故隐患 排除前或者排除过程中无法保证安全的，责令从危险区域内撤出作业 人员或者暂时停止施工 === 第711页 ===", "E": "在检查中发现重大安全事故隐患，有权责令被检查单位停业整顿"}, "answer": "ABCD", "type": "multi", "category": "法律法规"}, {"id": 2033, "question": "依据《建设工程安全生产管理条例》规定，下列对工程监理单\n位安全生产责任的叙述，正确的有（\n）。\nA.工程监理单位在实施监理过程中，发现存在安全事故隐患的，应当\n要求施工单位整改\nB.发现存在安全事故隐患情况严重，施工单位拒不整改或者不停止施\n工的，工程监理单位应当及时向安全生产综合监督管理部门报告\nC.发现施工单位的施工组织设计存在重大缺陷的，工程监理单位应当\n责令施工单位修改\nD.工程监理单位和监理工程师应当按照法律、法规和工程建设强制性\n标准实施监理，并对建设工程安全生产承担监理责任\nE.工程监理单位应当审查施工组织设计中的安全技术措施或者专项\n施工方案是否符合工程建设强制性标准", "options": {"A": "工程监理单位在实施监理过程中，发现存在安全事故隐患的，应当 要求施工单位整改", "B": "发现存在安全事故隐患情况严重，施工单位拒不整改或者不停止施 工的，工程监理单位应当及时向安全生产综合监督管理部门报告", "C": "发现施工单位的施工组织设计存在重大缺陷的，工程监理单位应当 责令施工单位修改", "D": "工程监理单位和监理工程师应当按照法律、法规和工程建设强制性 标准实施监理，并对建设工程安全生产承担监理责任", "E": "工程监理单位应当审查施工组织设计中的安全技术措施或者专项 施工方案是否符合工程建设强制性标准"}, "answer": "ADE", "type": "multi", "category": "法律法规"}, {"id": 2034, "question": "《建设工程安全生产管理条例》规定，施工单位应当在施工现\n场建立消防安全责任制度，可采取的措施有（\n）。\nA.确定消防安全责任人\nB.制定用火、用电、使用易燃易爆材料等各项消防安全管理制度和操\n作规程\nC.设置消防通道、消防水源\nD.配备消防设施和灭火器材\n\n=== 第712页 ===\nE.在施工现场设置安全标志", "options": {"A": "确定消防安全责任人", "B": "制定用火、用电、使用易燃易爆材料等各项消防安全管理制度和操 作规程", "C": "设置消防通道、消防水源", "D": "配备消防设施和灭火器材 === 第712页 ===", "E": "在施工现场设置安全标志"}, "answer": "ABCD", "type": "multi", "category": "用电安全"}, {"id": 2035, "question": "《建设工程安全生产管理条例》规定，施工单位应当建立健全\n安全生产教育培训制度，加强对职工安全生产的教育培训管理，从\n（\n）等方面给予保障，确保安全教育培训质量和覆盖面。\nA.资金\nB.物力\nC.时间\nD.人力\nE.技术", "options": {"A": "资金", "B": "物力", "C": "时间", "D": "人力", "E": "技术"}, "answer": "ABCD", "type": "multi", "category": "法律法规"}, {"id": 2036, "question": "《建设工程安全生产管理条例》规定，安全教育培训内容主要\n有：（\n）。\nA.三级安全教育、岗位安全培训\nB.年度安全教育培训\nC.变换工种、变换工地的安全教育培训\nD.采用新技术、新工艺、新设备、新材料的安全教育培训\nE.经常性安全教育培训", "options": {"A": "三级安全教育、岗位安全培训", "B": "年度安全教育培训", "C": "变换工种、变换工地的安全教育培训", "D": "采用新技术、新工艺、新设备、新材料的安全教育培训", "E": "经常性安全教育培训"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 2037, "question": "施工企业应根据施工管理和环境特征，组织各管理层制订应急\n救援预案，应包括（\n）。\nA.紧急情况、事故类型及特征分析\n\n=== 第713页 ===\nB.应急救援组织机构与人员及职责分工、联系方式\nC.应急救援设备和器材的调用程序\nD.与企业内部相关职能部门和外部政府、消防、抢险、医疗等相关单\n位与部门的信息报告、联系方法\nE.抢险急救的组织、现场保护、人员撤离及疏散等活动的具体安排", "options": {"A": "紧急情况、事故类型及特征分析 === 第713页 ===", "B": "应急救援组织机构与人员及职责分工、联系方式", "C": "应急救援设备和器材的调用程序", "D": "与企业内部相关职能部门和外部政府、消防、抢险、医疗等相关单 位与部门的信息报告、联系方法", "E": "抢险急救的组织、现场保护、人员撤离及疏散等活动的具体安排"}, "answer": "ABCDE", "type": "multi", "category": "消防安全"}, {"id": 2038, "question": "施工企业应建立生产安全事故档案，事故档案应包括（\n）。\nA.事故应急预案\nB.事故预防措施\nC.依据生产安全事故报告要素形成的企业职工伤亡事故统计汇总表\nD.生产安全事故报告\nE.事故调查情况报告、对事故责任者的处理决定、伤残鉴定、政府的\n事故处理批复资料及相关影像资料", "options": {"A": "事故应急预案", "B": "事故预防措施", "C": "依据生产安全事故报告要素形成的企业职工伤亡事故统计汇总表", "D": "生产安全事故报告", "E": "事故调查情况报告、对事故责任者的处理决定、伤残鉴定、政府的 事故处理批复资料及相关影像资料"}, "answer": "CDE", "type": "multi", "category": "事故处理"}, {"id": 2039, "question": "施工企业安全检查的形式应包括各管理层的（\n）等。\nA.自查\nB.督查\nC.互查\nD.对上级管理层的抽查\nE.对下级管理层的抽查", "options": {"A": "自查", "B": "督查", "C": "互查", "D": "对上级管理层的抽查", "E": "对下级管理层的抽查"}, "answer": "ACE", "type": "multi", "category": "安全管理"}, {"id": 2040, "question": "施工企业应定期对安全生产管理的（\n）进行评估。\n\n=== 第714页 ===\nA.适宜性\nB.科学性\nC.符合性\nD.有效性\nE.经济性", "options": {"A": "适宜性", "B": "科学性", "C": "符合性", "D": "有效性", "E": "经济性"}, "answer": "ACD", "type": "multi", "category": "安全管理"}, {"id": 2041, "question": "高温作业是指有（\n）相结合的异常作业条件、湿球黑球温度\n指数（WBGT 指数）超过规定限值的作业。\nA.高光照度\nB.高气温\nC.强烈的热辐射\nD.伴有高气湿（相对湿度≥80%RH）\nE.高辐射", "options": {"A": "高光照度", "B": "高气温", "C": "强烈的热辐射", "D": "伴有高气湿（相对湿度≥80%RH）", "E": "高辐射"}, "answer": "BCD", "type": "multi", "category": "法律法规"}, {"id": 2042, "question": "单位负责人接到事故报告后，应当立即如实报告当地负有安全\n生产监督管理职责的部门，不得（\n）。\nA.故意破坏事故现场\nB.失误破坏事故现场\nC.故意毁灭有关证据\nD.拓宽通道，挪动事故现场\nE.开辟救援通道，挪动事故现场", "options": {"A": "故意破坏事故现场", "B": "失误破坏事故现场", "C": "故意毁灭有关证据", "D": "拓宽通道，挪动事故现场", "E": "开辟救援通道，挪动事故现场"}, "answer": "AC", "type": "multi", "category": "事故处理"}, {"id": 2043, "question": "出租单位出租的建筑起重机械和使用单位购置、租赁、使用的\n建筑起重机械应当具有（\n）、（\n）、（\n）。\nA.特种设备制造许可证\nB.安全生产许可证\nC.制造监督检验证明\nD.产品合格证\nE.检测报告", "options": {"A": "特种设备制造许可证", "B": "安全生产许可证", "C": "制造监督检验证明", "D": "产品合格证", "E": "检测报告"}, "answer": "ACD", "type": "multi", "category": "特种设备"}, {"id": 2044, "question": "承包单位及其工作人员不得利用向发包单位及其工作人员\n（\n）等不正当手段承揽工程。\nA.行贿\nB.提供回扣\nC.给予其他好处\nD.给予折扣\nE.给予低价", "options": {"A": "行贿", "B": "提供回扣", "C": "给予其他好处", "D": "给予折扣", "E": "给予低价"}, "answer": "ABC", "type": "multi", "category": "安全管理"}, {"id": 2045, "question": "按照合同约定，建筑材料、建筑构配件和设备由工程承包单位\n采购的，发包单位不得指定承包单位购入用于工程的建筑材料、建筑\n构配件和设备或者指定（\n）。\nA.生产厂\nB.供应商\nC.参数\n\n=== 第716页 ===\nD.型号\nE.性能", "options": {"A": "生产厂", "B": "供应商", "C": "参数 === 第716页 ===", "D": "型号", "E": "性能"}, "answer": "AB", "type": "multi", "category": "安全管理"}, {"id": 2046, "question": "安全生产知识考核内容包括哪些内容（\n）。\nA.企业规章\nB.规章制度\nC.标准规范\nD.建筑施工安全管理基本理论\nE.建筑施工安全的法律法规", "options": {"A": "企业规章", "B": "规章制度", "C": "标准规范", "D": "建筑施工安全管理基本理论", "E": "建筑施工安全的法律法规"}, "answer": "BCDE", "type": "multi", "category": "安全管理"}, {"id": 2047, "question": "《建设工程安全生产管理条例》规定，专职安全生产管理人员\n负责对安全生产进行现场监督检查，对有（\n）情况的，应当立即\n制止。\nA.违章指挥\nB.劳动散漫\nC.违章操作\nD.穿戴不合要求\nE.不执行施工计划", "options": {"A": "违章指挥", "B": "劳动散漫", "C": "违章操作", "D": "穿戴不合要求", "E": "不执行施工计划"}, "answer": "AC", "type": "multi", "category": "法律法规"}, {"id": 2048, "question": "《建设工程安全生产管理条例》规定，施工现场的安全防护用\n具、机械设备、施工机具及配件必须（\n）。\nA.由专人管理\n\n=== 第717页 ===\nB.堆放在特定位置\nC.定期检查、维修和保养\nD.建立相应的资料档案\nE.按照国家规定及时报废", "options": {"A": "由专人管理 === 第717页 ===", "B": "堆放在特定位置", "C": "定期检查、维修和保养", "D": "建立相应的资料档案", "E": "按照国家规定及时报废"}, "answer": "ACDE", "type": "multi", "category": "法律法规"}, {"id": 2049, "question": "《建设工程安全生产管理条例》规定，施工单位应当在施工组\n织设计中编制有关安全的（\n）。\nA.安全技术措施\nB.施工现场临时用电方案\nC.进度计划控制方案\nD.施工经济措施\nE.施工作业材料选购方案", "options": {"A": "安全技术措施", "B": "施工现场临时用电方案", "C": "进度计划控制方案", "D": "施工经济措施", "E": "施工作业材料选购方案"}, "answer": "AB", "type": "multi", "category": "用电安全"}, {"id": 2050, "question": "《建设工程安全生产管理条例》规定，施工单位从事建设工程\n的新建、扩建、改建和拆除等活动，应当具备国家规定的（\n）等\n条件。\nA.施工单位人数\nB.注册资本\nC.专业技术人员\nD.技术装备\nE.安全生产", "options": {"A": "施工单位人数", "B": "注册资本", "C": "专业技术人员", "D": "技术装备", "E": "安全生产"}, "answer": "BCDE", "type": "multi", "category": "法律法规"}, {"id": 2051, "question": "《建设工程安全生产管理条例》规定，勘察单位在勘察作业时，\n应当严格执行操作规程，采取措施保证各类（\n）的安全。\nA.管线\nB.材料\nC.设施\nD.周边建筑物、构筑物\nE.施工机具", "options": {"A": "管线", "B": "材料", "C": "设施", "D": "周边建筑物、构筑物", "E": "施工机具"}, "answer": "ACD", "type": "multi", "category": "法律法规"}, {"id": 2052, "question": "住房和城乡建设主管部门、消防救援机构及其工作人员应当按\n照法定的职权和程序进行（\n），做到公正、严格、文明、高效。\nA.消防设计审查\nB.消防验收\nC.备案抽查\nD.消防安全检查\nE.消防救援", "options": {"A": "消防设计审查", "B": "消防验收", "C": "备案抽查", "D": "消防安全检查", "E": "消防救援"}, "answer": "ABCD", "type": "multi", "category": "消防安全"}, {"id": 2053, "question": "下列说法正确的有（\n）。\nA.施工单位应当向作业人员提供安全防护用具和安全防护服装，并书\n面或口头告知危险岗位的操作规程和违章操作的危害\nB.作业人员有权对施工现场的作业条件、作业程序和作业方式中存在\n的安全问题提出批评、检举和控告\nC.作业人员有权拒绝违章指挥和强令冒险作业\n\n=== 第719页 ===\nD.在施工中发生危及人身安全的紧急情况时，作业人员应立即上报或\n者在请示现场管理人员后采取必要的应急措施后撤离危险区域\nE.作业人员应当遵守安全施工的强制性标准、规章制度和操作规程，\n正确使用安全防护用具、机械设备等", "options": {"A": "施工单位应当向作业人员提供安全防护用具和安全防护服装，并书 面或口头告知危险岗位的操作规程和违章操作的危害", "B": "作业人员有权对施工现场的作业条件、作业程序和作业方式中存在 的安全问题提出批评、检举和控告", "C": "作业人员有权拒绝违章指挥和强令冒险作业 === 第719页 ===", "D": "在施工中发生危及人身安全的紧急情况时，作业人员应立即上报或 者在请示现场管理人员后采取必要的应急措施后撤离危险区域", "E": "作业人员应当遵守安全施工的强制性标准、规章制度和操作规程， 正确使用安全防护用具、机械设备等"}, "answer": "BCE", "type": "multi", "category": "法律法规"}, {"id": 2054, "question": "下列哪些单位应当建立应急值班制度，配备应急值班人员（\n）。\nA.县级以上人民政府\nB.建筑施工单位\nC.应急救援队伍\nD.个体工商户\nE.互联网企业", "options": {"A": "县级以上人民政府", "B": "建筑施工单位", "C": "应急救援队伍", "D": "个体工商户", "E": "互联网企业"}, "answer": "ABC", "type": "multi", "category": "事故处理"}, {"id": 2055, "question": "下列劳动合同依法无效：（\n）。\nA.违反法律、行政法规的劳动合同\nB.采取欺诈、威胁等手段订立的劳动合同\nC.口头协议\nD.未约定薪酬的劳动合同\nE.与劳动者意志相反的合同", "options": {"A": "违反法律、行政法规的劳动合同", "B": "采取欺诈、威胁等手段订立的劳动合同", "C": "口头协议", "D": "未约定薪酬的劳动合同", "E": "与劳动者意志相反的合同"}, "answer": "AB", "type": "multi", "category": "法律法规"}, {"id": 2056, "question": "特种作业操作证需要复审的，应当在期满前60 日内，由申请人\n或者申请人的用人单位向原考核发证机关或者从业所在地考核发证\n机关提出申请，并提交下列材料（\n）。\n\n=== 第720页 ===\nA.本人特种操作证\nB.本人身份证\nC.社区或者县级以上医疗机构出具的健康证明\nD.从事特种作业的情况\nE.安全培训考试合格记录", "options": {"A": "本人特种操作证", "B": "本人身份证", "C": "社区或者县级以上医疗机构出具的健康证明", "D": "从事特种作业的情况", "E": "安全培训考试合格记录"}, "answer": "CDE", "type": "multi", "category": "安全管理"}, {"id": 2057, "question": "特殊建设工程未经消防设计审查或者审查不合格的，（\n）单\n位、（\n）单位不得施工。\nA.设计\nB.建设\nC.施工\nD.监理\nE.检测", "options": {"A": "设计", "B": "建设", "C": "施工", "D": "监理", "E": "检测"}, "answer": "BC", "type": "multi", "category": "消防安全"}, {"id": 2058, "question": "施工起重机械安装、拆卸单位有（\n）行为的，经有关部门或\n者单位职工提出后，对事故隐患仍不采取措施，因而发生重大伤亡事\n故或者造成其他严重后果，构成犯罪的，对直接责任人员，依照刑法\n有关规定追究刑事责任。\nA.未编制拆装方案、制定安全施工措施\nB.未由专业技术人员现场监督\nC.未出具自检合格证明\nD.未向施工单位进行安全使用说明，办理移交手续\n\n=== 第721页 ===\nE.出具虚假证明", "options": {"A": "未编制拆装方案、制定安全施工措施", "B": "未由专业技术人员现场监督", "C": "未出具自检合格证明", "D": "未向施工单位进行安全使用说明，办理移交手续 === 第721页 ===", "E": "出具虚假证明"}, "answer": "ACE", "type": "multi", "category": "特种设备"}, {"id": 2059, "question": "施工单位主要负责人依法对本单位的安全生产工作全面负责，\n施工单位应当（\n）。\nA.建立健全安全生产责任制度\nB.建立健全安全生产教育培训制度\nC.制定安全生产规章制度和操作规程\nD.保证本单位安全生产条件所需资金的投入\nE.对所承担的建设工程进行定期和专项安全检查，并做好安全检查记\n录", "options": {"A": "建立健全安全生产责任制度", "B": "建立健全安全生产教育培训制度", "C": "制定安全生产规章制度和操作规程", "D": "保证本单位安全生产条件所需资金的投入", "E": "对所承担的建设工程进行定期和专项安全检查，并做好安全检查记 录"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 2060, "question": "施工单位应对下列（\n）等达到一定规模的危险性较大的分部\n分项工程编制专项施工方案，并附具安全验算结果，经施工单位技术\n负责人、总监理工程师签字后实施，由专职安全生产管理人员进行现\n场监督。\nA.基坑支护与降水工程\nB.土方开挖工程\nC.模板工程\nD.起重吊装工程\nE.大方量混凝土工程", "options": {"A": "基坑支护与降水工程", "B": "土方开挖工程", "C": "模板工程", "D": "起重吊装工程", "E": "大方量混凝土工程"}, "answer": "ABCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2061, "question": "施工单位应对达到一定规模的危险性较大的分部分项工程编制\n\n=== 第722页 ===\n专项施工方案，并附具安全验算结果，经（\n）签字后实施，由专\n职安全生产管理人员进行现场监督。\nA.施工单位项目经理\nB.施工单位技术负责人\nC.生产经理\nD.总监理工程师\nE.设计单位负责人", "options": {"A": "施工单位项目经理", "B": "施工单位技术负责人", "C": "生产经理", "D": "总监理工程师", "E": "设计单位负责人"}, "answer": "BD", "type": "multi", "category": "安全管理"}, {"id": 2062, "question": "施工单位应当在施工现场建立消防安全责任制度，确定消防安\n全责任人，制定用火、用电、使用易燃易爆材料等各项消防安全管理\n制度和操作规程，（\n）。\nA.设置消防通道\nB.设置消防水源\nC.每周进行一次消防演练\nD.在施工现场入口处设置明显标志\nE.配备消防设施和灭火器材", "options": {"A": "设置消防通道", "B": "设置消防水源", "C": "每周进行一次消防演练", "D": "在施工现场入口处设置明显标志", "E": "配备消防设施和灭火器材"}, "answer": "ABDE", "type": "multi", "category": "用电安全"}, {"id": 2063, "question": "施工单位应当在施工工地设置硬质围挡，并采取（\n）等有效\n防尘降尘措施。\nA.覆盖\nB.分段作业\nC.择时施工\n\n=== 第723页 ===\nD.洒水抑尘\nE.冲洗地面和车辆", "options": {"A": "覆盖", "B": "分段作业", "C": "择时施工 === 第723页 ===", "D": "洒水抑尘", "E": "冲洗地面和车辆"}, "answer": "ABCDE", "type": "multi", "category": "文明施工"}, {"id": 2064, "question": "施工单位对列入建设工程概算的安全作业环境及安全施工措施\n所需费用，应当用于（\n），不得挪作他用。\nA.施工安全防护用具及设施的采购和更新\nB.安全施工措施的落实\nC.专职安全管理人员工资发放\nD.安全事故损失赔付\nE.安全生产条件的改善", "options": {"A": "施工安全防护用具及设施的采购和更新", "B": "安全施工措施的落实", "C": "专职安全管理人员工资发放", "D": "安全事故损失赔付", "E": "安全生产条件的改善"}, "answer": "ABE", "type": "multi", "category": "安全管理"}, {"id": 2065, "question": "施工单位的主要负责人、项目负责人有违法行为，自刑罚执行\n完毕或者受处分之日起，5 年内不得担任（\n）。\nA.原单位的法人或主要负责人\nB.原单位的项目负责人\nC.任何施工单位的主要负责人\nD.任何施工单位的项目负责人\nE.任何施工单位的安全管理人员", "options": {"A": "原单位的法人或主要负责人", "B": "原单位的项目负责人", "C": "任何施工单位的主要负责人", "D": "任何施工单位的项目负责人", "E": "任何施工单位的安全管理人员"}, "answer": "CD", "type": "multi", "category": "安全管理"}, {"id": 2066, "question": "生产经营活动中发生（\n）的生产安全事故的报告和调查处理，\n适用《生产安全事故报告和调查处理条例》。\nA.造成人身伤亡\n\n=== 第724页 ===\nB.直接经济损失\nC.间接经济损失\nD.造成不良影响\nE.造成停产停业", "options": {"A": "造成人身伤亡 === 第724页 ===", "B": "直接经济损失", "C": "间接经济损失", "D": "造成不良影响", "E": "造成停产停业"}, "answer": "AB", "type": "multi", "category": "法律法规"}, {"id": 2067, "question": "生产经营单位应当具备（\n）规定的安全生产条件；不具备安\n全生产条件的，不得从事生产经营活动。\nA.法律\nB.行政法规\nC.国家标准\nD.行业标准\nE.企业标准", "options": {"A": "法律", "B": "行政法规", "C": "国家标准", "D": "行业标准", "E": "企业标准"}, "answer": "ABCD", "type": "multi", "category": "法律法规"}, {"id": 2068, "question": "生产经营单位应当建立安全生产教育和培训档案，如实记录安\n全生产教育和培训的（\n）等情况。\nA.时间\nB.内容\nC.参加人员\nD.培训照片\nE.考核结果", "options": {"A": "时间", "B": "内容", "C": "参加人员", "D": "培训照片", "E": "考核结果"}, "answer": "ABCE", "type": "multi", "category": "安全管理"}, {"id": 2069, "question": "生产经营单位应当对从业人员进行安全生产教育和培训，（\n）。\n\n=== 第725页 ===\n未经安全生产教育和培训合格的从业人员，不得上岗作业。\nA.保证从业人员具备必要的体能要求\nB.熟悉有关的安全生产规章制度和安全操作规程\nC.掌握本岗位的安全操作技能\nD.了解事故应急处理措施\nE.知悉自身在安全生产方面的权利和义务", "options": {"A": "保证从业人员具备必要的体能要求", "B": "熟悉有关的安全生产规章制度和安全操作规程", "C": "掌握本岗位的安全操作技能", "D": "了解事故应急处理措施", "E": "知悉自身在安全生产方面的权利和义务"}, "answer": "BCDE", "type": "multi", "category": "事故处理"}, {"id": 2070, "question": "生产经营单位新建、改建、扩建工程项目的安全设施，必须与\n主体工程（\n）。\nA.同时设计\nB.同时施工\nC.同时竣工\nD.同时验收\nE.同时投入生产和使用", "options": {"A": "同时设计", "B": "同时施工", "C": "同时竣工", "D": "同时验收", "E": "同时投入生产和使用"}, "answer": "ABE", "type": "multi", "category": "安全管理"}, {"id": 2071, "question": "生产经营单位使用被派遣劳动者的，应当将被派遣劳动者纳入\n本单位从业人员统一管理，对被派遣劳动者进行（\n）的教育和培\n训。\nA.岗位安全操作规程\nB.岗位工作劳动纪律\nC.安全操作技能\nD.岗位保密规定\n\n=== 第726页 ===\nE.岗位职业道德", "options": {"A": "岗位安全操作规程", "B": "岗位工作劳动纪律", "C": "安全操作技能", "D": "岗位保密规定 === 第726页 ===", "E": "岗位职业道德"}, "answer": "AC", "type": "multi", "category": "法律法规"}, {"id": 2072, "question": "生产经营单位进行（\n）以及国务院应急管理部门会同国务院\n有关部门规定的其他危险作业，应当安排专门人员进行现场安全管理，\n确保操作规程的遵守和安全措施的落实。\nA.爆破\nB.吊装\nC.动火\nD.临时用电\nE.切割", "options": {"A": "爆破", "B": "吊装", "C": "动火", "D": "临时用电", "E": "切割"}, "answer": "ABCD", "type": "multi", "category": "用电安全"}, {"id": 2073, "question": "生产经营单位的安全生产管理机构以及安全生产管理人员履行\n下列职责：（\n）。\nA.组织或者参与拟订本单位安全生产规章制度、操作规程和生产安全\n事故应急救援预案\nB.组织或者参与本单位安全生产教育和培训，如实记录安全生产教育\n和培训情况\nC.编制本单位施工用电的安全技术方案\nD.督促落实本单位安全生产整改措施\nE.组织或者参与本单位应急救援演练", "options": {"A": "组织或者参与拟订本单位安全生产规章制度、操作规程和生产安全 事故应急救援预案", "B": "组织或者参与本单位安全生产教育和培训，如实记录安全生产教育 和培训情况", "C": "编制本单位施工用电的安全技术方案", "D": "督促落实本单位安全生产整改措施", "E": "组织或者参与本单位应急救援演练"}, "answer": "ABDE", "type": "multi", "category": "用电安全"}, {"id": 2074, "question": "生产经营单位不得因安全生产管理人员依法履行职责而（\n）。\n\n=== 第727页 ===\nA.降低其工资\nB.降低其福利等待遇\nC.罚款\nD.延迟发放工资\nE.解除与其订立的劳动合同", "options": {"A": "降低其工资", "B": "降低其福利等待遇", "C": "罚款", "D": "延迟发放工资", "E": "解除与其订立的劳动合同"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 2075, "question": "生产经营单位必须建立健全全员安全生产责任制和安全生产规\n章制度，加大对（\n）的投入保障力度，改善安全生产条件，加强\n安全生产标准化、信息化建设。\nA.安全生产资金\nB.物资\nC.技术\nD.信息\nE.人员", "options": {"A": "安全生产资金", "B": "物资", "C": "技术", "D": "信息", "E": "人员"}, "answer": "ABCE", "type": "multi", "category": "法律法规"}, {"id": 2076, "question": "生产、储存、装卸易燃易爆危险品的（\n）的设置，应当符合\n消防技术标准。\
