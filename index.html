nA.工厂\nB.仓库\nC.专用车站\nD.车辆\nE.码头\n\n=== 第728页 ===", "options": {"A": "工厂", "B": "仓库", "C": "专用车站", "D": "车辆", "E": "码头 === 第728页 ==="}, "answer": "ABCE", "type": "multi", "category": "消防安全"}, {"id": 2077, "question": "任何单位、个人不得（\n）消防设施、器材。\nA.损坏\nB.挪用\nC.擅自拆除\nD.停用\nE.启用", "options": {"A": "损坏", "B": "挪用", "C": "擅自拆除", "D": "停用", "E": "启用"}, "answer": "ABCD", "type": "multi", "category": "消防安全"}, {"id": 2078, "question": "企业不得（\n）、（\n）安全生产许可证或者使用（\n）的安\n全生产许可证。\nA.租用\nB.转让\nC.冒用\nD.伪造\nE.借用", "options": {"A": "租用", "B": "转让", "C": "冒用", "D": "伪造", "E": "借用"}, "answer": "BCD", "type": "multi", "category": "安全管理"}, {"id": 2079, "question": "两个以上生产经营单位在同一作业区域内进行生产经营活动，\n可能危及对方生产安全的，应当签订安全生产管理协议，明确（\n），\n并指定专职安全生产管理人员进行安全检查与协调。\nA.各自的安全生产管理职责\nB.操作人员数量\nC.应当采取的安全措施\n\n=== 第729页 ===\nD.作业时间\nE.临时用电线路标准", "options": {"A": "各自的安全生产管理职责", "B": "操作人员数量", "C": "应当采取的安全措施 === 第729页 ===", "D": "作业时间", "E": "临时用电线路标准"}, "answer": "AC", "type": "multi", "category": "用电安全"}, {"id": 2080, "question": "矿山、金属冶炼、建筑施工、道路运输单位和危险物品的生产、\n经营、储存单位，应当设置（\n）。\nA.安全生产管理机构\nB.综合管理部门\nC.保卫部门\nD.消防应急队\nE.配备专职安全生产管理人员", "options": {"A": "安全生产管理机构", "B": "综合管理部门", "C": "保卫部门", "D": "消防应急队", "E": "配备专职安全生产管理人员"}, "answer": "AE", "type": "multi", "category": "消防安全"}, {"id": 2081, "question": "建筑施工企业取得安全生产许可证，（\n）经建设主管部门或\n者其他部门考核合格。\nA.主要负责人\nB.劳务人员\nC.专职安全生产管理人员\nD.项目负责人\nE.司勤人员", "options": {"A": "主要负责人", "B": "劳务人员", "C": "专职安全生产管理人员", "D": "项目负责人", "E": "司勤人员"}, "answer": "ACD", "type": "multi", "category": "安全管理"}, {"id": 2082, "question": "建筑施工企业的管理人员（\n），因而发生重大伤亡事故或者\n造成其他严重后果的，依法追究刑事责任。\nA.违章指挥\n\n=== 第730页 ===\nB.强令职工冒险作业\nC.口头指挥\nD.批评劳务人员\nE.不尊重劳动者", "options": {"A": "违章指挥 === 第730页 ===", "B": "强令职工冒险作业", "C": "口头指挥", "D": "批评劳务人员", "E": "不尊重劳动者"}, "answer": "AB", "type": "multi", "category": "事故处理"}, {"id": 2083, "question": "建设单位不得以任何理由，要求建筑设计单位或者建筑施工企\n业在工程设计或者施工作业中，违反（\n），降低工程质量。\nA.法律\nB.行政法规\nC.建筑工程质量标准\nD.建筑工程安全标准\nE.合同", "options": {"A": "法律", "B": "行政法规", "C": "建筑工程质量标准", "D": "建筑工程安全标准", "E": "合同"}, "answer": "ABCD", "type": "multi", "category": "法律法规"}, {"id": 2084, "question": "工业生产企业应当采取（\n）等措施，减少内部物料的堆存、\n传输、装卸等环节产生的粉尘和气态污染物的排放。\nA.密闭\nB.围挡\nC.遮盖\nD.清扫\nE.洒水", "options": {"A": "密闭", "B": "围挡", "C": "遮盖", "D": "清扫", "E": "洒水"}, "answer": "ABCE", "type": "multi", "category": "文明施工"}, {"id": 2085, "question": "根据《中华人民共和国特种设备安全法》规定，特种设备检验、\n\n=== 第731页 ===\n检测机构及其检验、检测人员应当依法为特种设备生产、经营、使用\n单位提供（\n）的检验、检测服务。\nA.安全\nB.可靠\nC.便捷\nD.诚信\nE.敬业", "options": {"A": "安全", "B": "可靠", "C": "便捷", "D": "诚信", "E": "敬业"}, "answer": "ABCD", "type": "multi", "category": "特种设备"}, {"id": 2086, "question": "根据《中华人民共和国特种设备安全法》规定，负责特种设备\n安全监督管理的部门对依法办理使用登记的特种设备应当建立完整\n的（\n）和（\n）。\nA.监督管理档案\nB.信息查询系统\nC.安全技术档案\nD.质量技术档案\nE.技术参数档案", "options": {"A": "监督管理档案", "B": "信息查询系统", "C": "安全技术档案", "D": "质量技术档案", "E": "技术参数档案"}, "answer": "AB", "type": "multi", "category": "特种设备"}, {"id": 2087, "question": "根据《建筑起重机械安全监督管理规定》，使用单位应当履行下\n列安全职责有（\n）。\nA.根据不同施工阶段、周围环境以及季节、气候的变化，对建筑起重\n机械采取相应的安全防护措施\nB.制定建筑起重机械生产安全事故应急救援预案\n\n=== 第732页 ===\nC.在建筑起重机械活动范围内设置明显的安全警示标志，对集中作业\n区做好安全防护\nD.设置相应的设备管理机构或者配备专职的设备管理人员\nE.指定专职设备管理人员、专职安全生产管理人员进行现场监督检查", "options": {"A": "根据不同施工阶段、周围环境以及季节、气候的变化，对建筑起重 机械采取相应的安全防护措施", "B": "制定建筑起重机械生产安全事故应急救援预案 === 第732页 ===", "C": "在建筑起重机械活动范围内设置明显的安全警示标志，对集中作业 区做好安全防护", "D": "设置相应的设备管理机构或者配备专职的设备管理人员", "E": "指定专职设备管理人员、专职安全生产管理人员进行现场监督检查"}, "answer": "ABCDE", "type": "multi", "category": "特种设备"}, {"id": 2088, "question": "根据《建筑起重机械安全监督管理规定》，施工总承包单位应当\n履行下列安全职责（\n）。\nA.向安装单位提供拟安装设备位置的基础施工资料，确保建筑起重机\n械进场安装、拆卸所需的施工条件\nB.审核建筑起重机械的特种设备制造许可证、产品合格证、制造监督\n检验证明、备案证明等文件\nC.审核安装单位、使用单位的资质证书、安全生产许可证和特种作业\n人员的特种作业操作资格证书\nD.审核安装单位制定的建筑起重机械安装、拆卸工程专项施工方案和\n生产安全事故应急救援预案\nE.审核使用单位制定的建筑起重机械生产安全事故应急救援预案", "options": {"A": "向安装单位提供拟安装设备位置的基础施工资料，确保建筑起重机 械进场安装、拆卸所需的施工条件", "B": "审核建筑起重机械的特种设备制造许可证、产品合格证、制造监督 检验证明、备案证明等文件", "C": "审核安装单位、使用单位的资质证书、安全生产许可证和特种作业 人员的特种作业操作资格证书", "D": "审核安装单位制定的建筑起重机械安装、拆卸工程专项施工方案和 生产安全事故应急救援预案", "E": "审核使用单位制定的建筑起重机械生产安全事故应急救援预案"}, "answer": "ABCDE", "type": "multi", "category": "特种设备"}, {"id": 2089, "question": "根据《建筑起重机械安全监督管理规定》，监理单位应当履行下\n列安全职责（\n）。\nA.审核建筑起重机械特种设备制造许可证、产品合格证、制造监督检\n验证明、备案证明等文件\nB.审核建筑起重机械安装单位、使用单位的资质证书、安全生产许可\n\n=== 第733页 ===\n证和特种作业人员的特种作业操作资格证书\nC.审核建筑起重机械安装、拆卸工程专项施工方案\nD.监督安装单位执行建筑起重机械安装、拆卸工程专项施工方案情况\nE.监督检查建筑起重机械的使用情况", "options": {"A": "审核建筑起重机械特种设备制造许可证、产品合格证、制造监督检 验证明、备案证明等文件", "B": "审核建筑起重机械安装单位、使用单位的资质证书、安全生产许可 === 第733页 === 证和特种作业人员的特种作业操作资格证书", "C": "审核建筑起重机械安装、拆卸工程专项施工方案", "D": "监督安装单位执行建筑起重机械安装、拆卸工程专项施工方案情况", "E": "监督检查建筑起重机械的使用情况"}, "answer": "ABCDE", "type": "multi", "category": "特种设备"}, {"id": 2090, "question": "根据《建筑起重机械安全监督管理规定》，出租单位应当在签订\n的建筑起重机械租赁合同中，明确租赁双方的安全责任，并出具（\n），\n提交安装使用说明书。\nA.建筑起重机械特种设备制造许可证\nB.产品合格证\nC.制造监督检验证明\nD.备案证明\nE.自检合格证明", "options": {"A": "建筑起重机械特种设备制造许可证", "B": "产品合格证", "C": "制造监督检验证明", "D": "备案证明", "E": "自检合格证明"}, "answer": "ABCDE", "type": "multi", "category": "特种设备"}, {"id": 2091, "question": "根据《建筑起重机械安全监督管理规定》，安装单位应当履行下\n列安全职责有（\n）。\nA.按照安全技术标准及建筑起重机械性能要求，编制建筑起重机械安\n装、拆卸工程专项施工方案\nB.按照安全技术标准及安装使用说明书等检查建筑起重机械及现场\n施工条件\nC.组织安全施工技术交底并签字确认\nD.制定建筑起重机械安装、拆卸工程生产安全事故应急救援预案\n\n=== 第734页 ===\nE.将建筑起重机械安装、拆卸工程专项施工方案，安装、拆卸人员名\n单，安装、拆卸时间等材料报施工总承包单位和监理单位审核后，告\n知工程所在地县级以上地方人民政府建设主管部门", "options": {"A": "按照安全技术标准及建筑起重机械性能要求，编制建筑起重机械安 装、拆卸工程专项施工方案", "B": "按照安全技术标准及安装使用说明书等检查建筑起重机械及现场 施工条件", "C": "组织安全施工技术交底并签字确认", "D": "制定建筑起重机械安装、拆卸工程生产安全事故应急救援预案 === 第734页 ===", "E": "将建筑起重机械安装、拆卸工程专项施工方案，安装、拆卸人员名 单，安装、拆卸时间等材料报施工总承包单位和监理单位审核后，告 知工程所在地县级以上地方人民政府建设主管部门"}, "answer": "ABCDE", "type": "multi", "category": "特种设备"}, {"id": 2092, "question": "根据《建设工程安全生产管理条例》，施工单位的（\n）应当\n经建设行政主管部门或其他有关部门考核合格后方可任职。\nA.主要负责人\nB.所有人员\nC.项目经理\nD.技术人员\nE.专职安全生产管理人员", "options": {"A": "主要负责人", "B": "所有人员", "C": "项目经理", "D": "技术人员", "E": "专职安全生产管理人员"}, "answer": "ACE", "type": "multi", "category": "法律法规"}, {"id": 2093, "question": "根据《建设工程安全生产管理条例》规定，作业人员有权对施\n工现场的作业条件、作业程序和作业方式存在的安全问题提出（\n），\n有权拒绝违章指挥和强令冒险作业。\nA.批评\nB.教育\nC.检举\nD.控告\nE.质疑", "options": {"A": "批评", "B": "教育", "C": "检举", "D": "控告", "E": "质疑"}, "answer": "ACD", "type": "multi", "category": "法律法规"}, {"id": 2094, "question": "根据《建设工程安全生产管理条例》规定，作业人员有权对施\n\n=== 第735页 ===\n工现场的（\n）存在的安全问题提出批评、检举、控告，有权拒绝\n违章指挥和强令冒险作业。\nA.作业条件\nB.作业环境\nC.作业程序\nD.作业时间\nE.作业方式", "options": {"A": "作业条件", "B": "作业环境", "C": "作业程序", "D": "作业时间", "E": "作业方式"}, "answer": "ACE", "type": "multi", "category": "法律法规"}, {"id": 2095, "question": "根据《建设工程安全生产管理条例》，县级以上人民政府负有建\n设工程安全生产监督管理职责的部门在各自的职责范围内履行安全\n监督检查职责时，有权（\n）。\nA.纠正施工中违反安全生产要求的行为\nB.进入被检查单位施工现场进行检查\nC.要求被检查单位提供有关建设工程安全生产的文件和资料\nD.对于检查中发现的安全事故隐患，责令立即停止施工\nE.对于无法保证安全排除的重大事故隐患，责令从危险区域内撤出作\n业人员或者暂时停止施工", "options": {"A": "纠正施工中违反安全生产要求的行为", "B": "进入被检查单位施工现场进行检查", "C": "要求被检查单位提供有关建设工程安全生产的文件和资料", "D": "对于检查中发现的安全事故隐患，责令立即停止施工", "E": "对于无法保证安全排除的重大事故隐患，责令从危险区域内撤出作 业人员或者暂时停止施工"}, "answer": "ABCE", "type": "multi", "category": "法律法规"}, {"id": 2096, "question": "根据《建设工程安全生产管理条例》，施工企业的项目负责人应\n当由取得相应执业资格的人员担任，其对建设工程的安全负有的主要\n职责有（\n）。\nA.落实安全生产责任制度和操作规程\n\n=== 第736页 ===\nB.确保安全生产费用的有效使用\nC.制定安全生产规章制度和操作规程\nD.对建设工程项目的安全施工负责\nE.根据工程特点组织制定安全施工措施", "options": {"A": "落实安全生产责任制度和操作规程 === 第736页 ===", "B": "确保安全生产费用的有效使用", "C": "制定安全生产规章制度和操作规程", "D": "对建设工程项目的安全施工负责", "E": "根据工程特点组织制定安全施工措施"}, "answer": "ABDE", "type": "multi", "category": "法律法规"}, {"id": 2097, "question": "根据“安管人员”管理规定，（\n）未按规定履行安全生产管\n理职责的，由县级以上人民政府住房城乡建设主管部门责令限期改正。\nA.主要负责人\nB.项目负责人\nC.安全负责人\nD.分管项目副总\nE.企业安全总监", "options": {"A": "主要负责人", "B": "项目负责人", "C": "安全负责人", "D": "分管项目副总", "E": "企业安全总监"}, "answer": "AB", "type": "multi", "category": "法律法规"}, {"id": 2098, "question": "根据住建部《危险性较大的分部分项工程专项施工方案严重缺\n陷清单（试行）》，基坑工程专项施工方案中属于严重缺陷的是：\n（\n）。\nA.未明确土方开挖施工工艺\nB.无支护体系施工工艺及要求\nC.地下水位之下施工锚杆，无防漏水漏砂措施\nD.支撑结构与围护结构未实现有效连接\nE.未明确支撑工程拆撑条件及拆撑顺序", "options": {"A": "未明确土方开挖施工工艺", "B": "无支护体系施工工艺及要求", "C": "地下水位之下施工锚杆，无防漏水漏砂措施", "D": "支撑结构与围护结构未实现有效连接", "E": "未明确支撑工程拆撑条件及拆撑顺序"}, "answer": "ABCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2099, "question": "根据住建部《危险性较大的分部分项工程专项施工方案严重缺\n\n=== 第737页 ===\n陷清单（试行）》，脚手架工程专项施工方案中属于严重缺陷的是：\n（\n）。\nA.脚手架基础或附着结构不满足承载力要求\nB.高度超过50 米落地脚手架及高度超过20 米悬挑脚手架无架体卸荷\n措施\nC.吊挂平台操作架及索网式脚手架工程无搭设和拆除的施工工序设\n计\nD.非标准吊篮无构件规格、材质、连接螺栓、焊缝及连接板的设计要\n求\nE.附着式升降脚手架架体悬臂高度超规范且无加强措施", "options": {"A": "脚手架基础或附着结构不满足承载力要求", "B": "高度超过50 米落地脚手架及高度超过20 米悬挑脚手架无架体卸荷 措施", "C": "吊挂平台操作架及索网式脚手架工程无搭设和拆除的施工工序设 计", "D": "非标准吊篮无构件规格、材质、连接螺栓、焊缝及连接板的设计要 求", "E": "附着式升降脚手架架体悬臂高度超规范且无加强措施"}, "answer": "ABCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2100, "question": "根据住建部《危险性较大的分部分项工程专项施工方案严重缺\n陷清单（试行）》，拆除工程专项施工方案中属于严重缺陷的是：\n（\n）。\nA.施工场区存在需要保护的结构、管线、设施和树木但无相应的安全\n技术措施\nB.无拆除施工作业顺序安排和主要拆除方法\nC.影响保留部分结构安全的局部拆除无先加固或者支撑措施\nD.无拆除吊运和拆除作业平台（装置、结构、场地）设计或设置\nE.采用机械破碎缺口定向倾倒拆除高耸构筑物或者爆破拆除时无预\n估塌散范围、减振、控制飞散物等安全技术措施", "options": {"A": "施工场区存在需要保护的结构、管线、设施和树木但无相应的安全 技术措施", "B": "无拆除施工作业顺序安排和主要拆除方法", "C": "影响保留部分结构安全的局部拆除无先加固或者支撑措施", "D": "无拆除吊运和拆除作业平台（装置、结构、场地）设计或设置", "E": "采用机械破碎缺口定向倾倒拆除高耸构筑物或者爆破拆除时无预 估塌散范围、减振、控制飞散物等安全技术措施"}, "answer": "ABCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2101, "question": "根据住建部《危险性较大的分部分项工程专项施工方案严重缺\n\n=== 第738页 ===\n陷清单（试行）》，模板及支撑体系工程专项施工方案中属于严重缺陷\n的是：（\n）。\nA.爬模无附着支撑、承载体设计\nB.滑模无支撑节点构造设计\nC.滑模施工无混凝土强度保证及监测措施\nD.支撑架基础存在沉陷、坍塌、滑移风险，无防范措施\nE.高宽比大于5 的独立支撑架无架体稳定构造措施", "options": {"A": "爬模无附着支撑、承载体设计", "B": "滑模无支撑节点构造设计", "C": "滑模施工无混凝土强度保证及监测措施", "D": "支撑架基础存在沉陷、坍塌、滑移风险，无防范措施", "E": "高宽比大于5 的独立支撑架无架体稳定构造措施"}, "answer": "ABCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2102, "question": "根据住建部《危险性较大的分部分项工程专项施工方案严重缺\n陷清单（试行）》，建筑幕墙安装工程专项施工方案中属于严重缺陷的\n是：（\n）。\nA.无型钢悬挑梁、U 型环和锚固螺栓的规格型号\nB.非标吊篮无构件规格、材质、连接螺栓、焊缝及连接板设计要求\nC.无材料运输、安装设备运输安装工艺\nD.采用轨道吊篮时，无吊篮与环轨连接构造；无缆风绳稳固措施\nE.同一立面内交叉作业，无安全技术措施", "options": {"A": "无型钢悬挑梁、U 型环和锚固螺栓的规格型号", "B": "非标吊篮无构件规格、材质、连接螺栓、焊缝及连接板设计要求", "C": "无材料运输、安装设备运输安装工艺", "D": "采用轨道吊篮时，无吊篮与环轨连接构造；无缆风绳稳固措施", "E": "同一立面内交叉作业，无安全技术措施"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 2103, "question": "下列属于《建筑施工安全检查标准》JGJ 59-2011 文明施工一般\n项目中社区服务的内容是（\n）。\nA.夜间施工前，必须经批准后方可进行施工\nB.施工现场应有安全标语\nC.施工现场严禁焚烧各类废弃物\n\n=== 第739页 ===\nD.施工现场应制定防粉尘、防噪音、防光污染等措施\nE.应制定施工不扰民措施", "options": {"A": "夜间施工前，必须经批准后方可进行施工", "B": "施工现场应有安全标语", "C": "施工现场严禁焚烧各类废弃物 === 第739页 ===", "D": "施工现场应制定防粉尘、防噪音、防光污染等措施", "E": "应制定施工不扰民措施"}, "answer": "ACDE", "type": "multi", "category": "文明施工"}, {"id": 2104, "question": "下列有关《建筑施工安全检查标准》JGJ 59-2011 文明施工一般\n项目中生活设施内容说法正确的是（\n）。\nA.食堂使用的燃气罐与其它物品共同存放时，应保持存放间通风良好\nB.应建立卫生责任制度并落实到人\nC.食堂与厕所、垃圾站、有毒有害场所等污染源的距离应符合规范要\n求\nD.食堂必须有卫生许可证，炊事人员必须持身体健康证上岗\nE.厕所内的设施数量和布局应符合规范要求", "options": {"A": "食堂使用的燃气罐与其它物品共同存放时，应保持存放间通风良好", "B": "应建立卫生责任制度并落实到人", "C": "食堂与厕所、垃圾站、有毒有害场所等污染源的距离应符合规范要 求", "D": "食堂必须有卫生许可证，炊事人员必须持身体健康证上岗", "E": "厕所内的设施数量和布局应符合规范要求"}, "answer": "BCDE", "type": "multi", "category": "文明施工"}, {"id": 2105, "question": "下列属于《建筑施工安全检查标准》JGJ 59-2011 文明施工保证\n项目中现场围挡内容的是（\n）。\nA.市区主要路段的工地应设置高度不小于2.5m 的封闭围挡\nB.一般路段的工地应设置高度不小于1.8m 的封闭围挡\nC.围挡应坚固、稳定、整洁、美观\nD.围挡基础应坚实、牢固\nE.围挡立面应顺直、整洁、美观", "options": {"A": "市区主要路段的工地应设置高度不小于2.5m 的封闭围挡", "B": "一般路段的工地应设置高度不小于1.8m 的封闭围挡", "C": "围挡应坚固、稳定、整洁、美观", "D": "围挡基础应坚实、牢固", "E": "围挡立面应顺直、整洁、美观"}, "answer": "ABC", "type": "multi", "category": "文明施工"}, {"id": 2106, "question": "下列属于《建筑施工安全检查标准》JGJ 59-2011 文明施工保证\n项目中封闭管理内容的是（\n）。\n\n=== 第740页 ===\nA.施工现场进出口应设置大门，并应设置门卫值班室\nB.围挡应坚固、稳定、整洁、美观\nC.应建立门卫值守管理制度，并应配备门卫值守人员\nD.施工人员进入施工现场应佩戴工作卡\nE.施工现场出入口应标有企业名称或标识，并应设置车辆冲洗设施", "options": {"A": "施工现场进出口应设置大门，并应设置门卫值班室", "B": "围挡应坚固、稳定、整洁、美观", "C": "应建立门卫值守管理制度，并应配备门卫值守人员", "D": "施工人员进入施工现场应佩戴工作卡", "E": "施工现场出入口应标有企业名称或标识，并应设置车辆冲洗设施"}, "answer": "ACDE", "type": "multi", "category": "文明施工"}, {"id": 2107, "question": "下列关于《建筑施工安全检查标准》JGJ 59-2011 文明施工保证\n项目中材料管理内容说法正确的是（\n）。\nA.建筑材料、构件、料具应按总平面布局进行码放\nB.易燃易爆物品与其他材料储存在一起时，应制定防火措施\nC.材料应码放整齐，并应标明名称、规格等\nD.施工现场材料码放应采取防火、防锈蚀、防雨等措施\nE.建筑物内施工垃圾的清运，应采用器具或管道运输，严禁随意抛掷", "options": {"A": "建筑材料、构件、料具应按总平面布局进行码放", "B": "易燃易爆物品与其他材料储存在一起时，应制定防火措施", "C": "材料应码放整齐，并应标明名称、规格等", "D": "施工现场材料码放应采取防火、防锈蚀、防雨等措施", "E": "建筑物内施工垃圾的清运，应采用器具或管道运输，严禁随意抛掷"}, "answer": "ACDE", "type": "multi", "category": "消防安全"}, {"id": 2108, "question": "下列关于《建筑施工安全检查标准》JGJ 59-2011 文明施工保证\n项目中现场办公与住宿内容说法错误的是（\n）。\nA.在施工程、伙房、库房不得兼作宿舍\nB.冬季宿舍内应有采暖和防一氧化碳中毒措施\nC.施工现场办公区与生活区无须划分清晰\nD.宿舍内住宿人员人均面积不应小于2 ㎡，且不得超过16 人\nE.夏季宿舍内应有防暑降温和防蚊蝇措施", "options": {"A": "在施工程、伙房、库房不得兼作宿舍", "B": "冬季宿舍内应有采暖和防一氧化碳中毒措施", "C": "施工现场办公区与生活区无须划分清晰", "D": "宿舍内住宿人员人均面积不应小于2 ㎡，且不得超过16 人", "E": "夏季宿舍内应有防暑降温和防蚊蝇措施"}, "answer": "CD", "type": "multi", "category": "文明施工"}, {"id": 2109, "question": "房屋建筑工程施工的安全管理检查评定时，以下选项中属于文\n明施工检查评定的一般项目的是（\n）。\nA.现场围挡\nB.材料管理\nC.现场办公与住宿\nD.生活设施\nE.社区服务", "options": {"A": "现场围挡", "B": "材料管理", "C": "现场办公与住宿", "D": "生活设施", "E": "社区服务"}, "answer": "DE", "type": "multi", "category": "文明施工"}, {"id": 2110, "question": "房屋建筑工程施工的安全管理检查评定时，以下选项中属于文\n明施工检查评定的保证项目的是（\n）。\nA.综合治理\nB.现场防火\nC.社区服务\nD.现场办公与住宿\nE.封闭管理", "options": {"A": "综合治理", "B": "现场防火", "C": "社区服务", "D": "现场办公与住宿", "E": "封闭管理"}, "answer": "BDE", "type": "multi", "category": "消防安全"}, {"id": 2111, "question": "临时用房和临时设施应纳入施工现场总平面布局的是（\n）。\nA.施工现场的出入口、围墙、围挡\nB.防护栏杆\nC.给水管网或管路和配电线路敷设或架设的走向、高度\nD.临时消防车道、消防救援场地和消防水源\nE.场内临时道路\n\n=== 第742页 ===", "options": {"A": "施工现场的出入口、围墙、围挡", "B": "防护栏杆", "C": "给水管网或管路和配电线路敷设或架设的走向、高度", "D": "临时消防车道、消防救援场地和消防水源", "E": "场内临时道路 === 第742页 ==="}, "answer": "ACDE", "type": "multi", "category": "用电安全"}, {"id": 2112, "question": "下列有关临时消防车道的设置说法正确的是（\n）。\nA.临时消防车道宜为环形，设置环形车道确有困难时，应在消防车道\n尽端设置尺寸不小于12m×12m 的回车场\nB.临时消防车道的净宽度不应小于4m\nC.临时消防车道的净空高度不应小于5m\nD.临时消防车道的右侧应设置消防车行进路线指示标识\nE.临时消防车道路基、路面及其下部设施应能承受消防车通行压力及\n工作荷载", "options": {"A": "临时消防车道宜为环形，设置环形车道确有困难时，应在消防车道 尽端设置尺寸不小于12m×12m 的回车场", "B": "临时消防车道的净宽度不应小于4m", "C": "临时消防车道的净空高度不应小于5m", "D": "临时消防车道的右侧应设置消防车行进路线指示标识", "E": "临时消防车道路基、路面及其下部设施应能承受消防车通行压力及 工作荷载"}, "answer": "ABDE", "type": "multi", "category": "消防安全"}, {"id": 2113, "question": "临时消防救援场地的设置应符合下列（\n）规定。\nA.临时消防救援场地应设置在成组布置的临时用房场地的短边一侧\n及在建工程的短边一侧\nB.临时消防救援场地应在在建工程装饰装修阶段设置\nC.临时消防救援场地应在在建工程主体结构施工阶段设置\nD.临时消防救援场地应设置在成组布置的临时用房场地的长边一侧\n及在建工程的长边一侧\nE.临时救援场地宽度应满足消防车正常操作要求，且不应小于6m，\n与在建工程外脚手架的净距不宜小于2m，且不宜超过6m", "options": {"A": "临时消防救援场地应设置在成组布置的临时用房场地的短边一侧 及在建工程的短边一侧", "B": "临时消防救援场地应在在建工程装饰装修阶段设置", "C": "临时消防救援场地应在在建工程主体结构施工阶段设置", "D": "临时消防救援场地应设置在成组布置的临时用房场地的长边一侧 及在建工程的长边一侧", "E": "临时救援场地宽度应满足消防车正常操作要求，且不应小于6m， 与在建工程外脚手架的净距不宜小于2m，且不宜超过6m"}, "answer": "BDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2114, "question": "下列（\n）建筑应设置环形临时消防车道，设置环形临时消防\n车道确有困难时，除应设置回车场外，尚应设置临时消防救援场地。\n\n=== 第743页 ===\nA.建筑高度26m 的在建工程\nB.建筑工程单体占地面积4000m2 的在建工程\nC.建筑高度21m 的在建工程\nD.建筑工程单体占地面积2500m2 的在建工程\nE.超过10 栋，且成组布置的临时用房", "options": {"A": "建筑高度26m 的在建工程", "B": "建筑工程单体占地面积4000m2 的在建工程", "C": "建筑高度21m 的在建工程", "D": "建筑工程单体占地面积2500m2 的在建工程", "E": "超过10 栋，且成组布置的临时用房"}, "answer": "ABE", "type": "multi", "category": "消防安全"}, {"id": 2115, "question": "在建工程防火设计应根据（\n）等情况进行确定。\nA.施工需要\nB.施工性质\nC.建筑高度\nD.建筑规模\nE.结构特点", "options": {"A": "施工需要", "B": "施工性质", "C": "建筑高度", "D": "建筑规模", "E": "结构特点"}, "answer": "BCDE", "type": "multi", "category": "消防安全"}, {"id": 2116, "question": "下列有关《建设工程施工现场消防安全技术规范》GB507203\n中宿舍、办公用房的防火设计说法正确的是（\n）。\nA.疏散楼梯的净宽度不应小于疏散走道的净宽度\nB.建筑层数不应超过10 层，每层建筑面积不应大于300m2\nC.建筑构件的燃烧性能等级应为A 级。当采用金属夹芯板材时，其芯\n材的燃烧性能等级应为A 级\nD.隔墙应从楼地面基层隔断至顶板基层底面\nE.房间内任一点至最近疏散门的距离不应大于15m，房门的净宽度不\n应小于0.8m\n\n=== 第744页 ===", "options": {"A": "疏散楼梯的净宽度不应小于疏散走道的净宽度", "B": "建筑层数不应超过10 层，每层建筑面积不应大于300m2", "C": "建筑构件的燃烧性能等级应为A 级。当采用金属夹芯板材时，其芯 材的燃烧性能等级应为A 级", "D": "隔墙应从楼地面基层隔断至顶板基层底面", "E": "房间内任一点至最近疏散门的距离不应大于15m，房门的净宽度不 应小于0.8m === 第744页 ==="}, "answer": "ACDE", "type": "multi", "category": "消防安全"}, {"id": 2117, "question": "下列有关《建设工程施工现场消防安全技术规范》GB507203\n中发电机房、变配电房、厨房操作间、锅炉房、可燃材料库房及易燃\n易爆危险品库房的防火设计说法正确的是（\n）。\nA.建筑构件的燃烧性能等级应为B1 级\nB.建筑构件的燃烧性能等级应为A 级\nC.层数应为1 层，建筑面积不应大于200m2\nD.可燃材料库房单个房间的建筑面积不应超过30m2，易燃易爆危险\n品库房单个房间的建筑面积不应超过20m2\nE.房间内任一点至最近疏散门的距离不应大于10m，房门的净宽度不\n应小于0．8m", "options": {"A": "建筑构件的燃烧性能等级应为B1 级", "B": "建筑构件的燃烧性能等级应为A 级", "C": "层数应为1 层，建筑面积不应大于200m2", "D": "可燃材料库房单个房间的建筑面积不应超过30m2，易燃易爆危险 品库房单个房间的建筑面积不应超过20m2", "E": "房间内任一点至最近疏散门的距离不应大于10m，房门的净宽度不 应小于0．8m"}, "answer": "BCDE", "type": "multi", "category": "用电安全"}, {"id": 2118, "question": "下列有关建筑临时用房防火说法错误的是（\n）。\nA.宿舍、办公用房应与厨房操作间、锅炉房、变配电房等组合建造\nB.会议室、文化娱乐室等人员密集的房间应设置在临时用房的第一层，\n其疏散门应向内开启\nC.疏散楼梯的净宽度不应小于疏散走道的净宽度\nD.隔墙应从楼地面基层隔断至顶板基层底面\nE.建筑构件的燃烧性能等级应为A 级", "options": {"A": "宿舍、办公用房应与厨房操作间、锅炉房、变配电房等组合建造", "B": "会议室、文化娱乐室等人员密集的房间应设置在临时用房的第一层， 其疏散门应向内开启", "C": "疏散楼梯的净宽度不应小于疏散走道的净宽度", "D": "隔墙应从楼地面基层隔断至顶板基层底面", "E": "建筑构件的燃烧性能等级应为A 级"}, "answer": "AB", "type": "multi", "category": "用电安全"}, {"id": 2119, "question": "在建工程作业场所临时疏散通道的设置应符合下列（\n）规定。\nA.耐火极限不应低于0．5h\n\n=== 第745页 ===\nB.临时疏散通道不宜采用爬梯，确需采用时，应采取可靠固定措施\nC.临时疏散通道应设置照明设施\nD.临时疏散通道应设置明显的疏散指示标识\nE.临时疏散通道的侧面为临空面时，应沿临空面设置高度不小于2m\n的防护栏杆", "options": {"A": "耐火极限不应低于0．5h === 第745页 ===", "B": "临时疏散通道不宜采用爬梯，确需采用时，应采取可靠固定措施", "C": "临时疏散通道应设置照明设施", "D": "临时疏散通道应设置明显的疏散指示标识", "E": "临时疏散通道的侧面为临空面时，应沿临空面设置高度不小于2m 的防护栏杆"}, "answer": "ABCD", "type": "multi", "category": "法律法规"}, {"id": 2120, "question": "施工现场临时室外消防给水系统的设置应符合下列（\n）规定。\nA.消火栓的最大保护半径不应大于120m\nB.消火栓的间距不应大于100m\nC.给水管网宜布置成环状\nD.临时室外消防给水干管的管径不应小于DN100\nE.室外消火栓应与在建工程、临时用房和可燃材料堆场及其加工场的\n外边线的距离不应小于5m", "options": {"A": "消火栓的最大保护半径不应大于120m", "B": "消火栓的间距不应大于100m", "C": "给水管网宜布置成环状", "D": "临时室外消防给水干管的管径不应小于DN100", "E": "室外消火栓应与在建工程、临时用房和可燃材料堆场及其加工场的 外边线的距离不应小于5m"}, "answer": "CDE", "type": "multi", "category": "消防安全"}, {"id": 2121, "question": "《建设工程施工现场消防安全技术规范》规定设置临时室内消\n防给水系统的在建工程，各结构层均应设置室内消火栓接口及消防软\n管接口，并应符合下列（\n）规定。\nA.消火栓接口或软管接口的间距，多层建筑不应大于30m，高层建筑\n不应大于50m\nB.消火栓接口的前端可不设置截止阀\nC.消火栓接口及软管接口应设置在位置明显且易于操作的部位\nD.消火栓接口的前端应设置截止阀\n\n=== 第746页 ===\nE.消火栓接口或软管接口的间距，多层建筑不应大于50m，高层建筑\n不应大于30m", "options": {"A": "消火栓接口或软管接口的间距，多层建筑不应大于30m，高层建筑 不应大于50m", "B": "消火栓接口的前端可不设置截止阀", "C": "消火栓接口及软管接口应设置在位置明显且易于操作的部位", "D": "消火栓接口的前端应设置截止阀 === 第746页 ===", "E": "消火栓接口或软管接口的间距，多层建筑不应大于50m，高层建筑 不应大于30m"}, "answer": "CDE", "type": "multi", "category": "消防安全"}, {"id": 2122, "question": "《建设工程施工现场消防安全技术规范》规定施工现场的下列\n（\n）场所应配备临时应急照明。\nA.自备发电机房及变配电房\nB.高度超过70m 的在建工程的室内疏散通道\nC.水泵房\nD.发生火灾时仍需坚持工作的其他场所\nE.无天然采光的作业场所及疏散通道", "options": {"A": "自备发电机房及变配电房", "B": "高度超过70m 的在建工程的室内疏散通道", "C": "水泵房", "D": "发生火灾时仍需坚持工作的其他场所", "E": "无天然采光的作业场所及疏散通道"}, "answer": "ACDE", "type": "multi", "category": "用电安全"}, {"id": 2123, "question": "防火技术方案应包括下列（\n）主要内容。\nA.施工现场重大火灾危险源辨识\nB.施工现场防火技术措施\nC.组织机构设置\nD.临时消防设施、临时疏散设施配备\nE.临时消防设施和消防警示标识布置图", "options": {"A": "施工现场重大火灾危险源辨识", "B": "施工现场防火技术措施", "C": "组织机构设置", "D": "临时消防设施、临时疏散设施配备", "E": "临时消防设施和消防警示标识布置图"}, "answer": "ABDE", "type": "multi", "category": "消防安全"}, {"id": 2124, "question": "消防安全检查应包括下列（\n）主要内容。\nA.可燃物及易燃易爆危险品的管理是否落实\nB.用火、用电、用气是否存在违章操作，电、气焊及保温防水施工是\n否执行操作规程\n\n=== 第747页 ===\nC.动火作业的防火措施是否落实\nD.临时消防设施是否完好有效\nE.临时消防车道及临时疏散设施是否畅通", "options": {"A": "可燃物及易燃易爆危险品的管理是否落实", "B": "用火、用电、用气是否存在违章操作，电、气焊及保温防水施工是 否执行操作规程 === 第747页 ===", "C": "动火作业的防火措施是否落实", "D": "临时消防设施是否完好有效", "E": "临时消防车道及临时疏散设施是否畅通"}, "answer": "ABCDE", "type": "multi", "category": "用电安全"}, {"id": 2125, "question": "施工现场用火应符合下列（\n）规定。\nA.动火作业应办理动火许可证\nB.动火操作人员应具有相应资格\nC.裸露的可燃材料上直接进行动火作业\nD.具有火灾、爆炸危险的场所严禁明火\nE.施工现场采用明火取暖", "options": {"A": "动火作业应办理动火许可证", "B": "动火操作人员应具有相应资格", "C": "裸露的可燃材料上直接进行动火作业", "D": "具有火灾、爆炸危险的场所严禁明火", "E": "施工现场采用明火取暖"}, "answer": "ABD", "type": "multi", "category": "消防安全"}, {"id": 2126, "question": "气瓶使用时，应符合下列（\n）规定。\nA.气瓶用后应及时归库\nB.氧气瓶内剩余气体的压力不应小于0．2MPa\nC.冬季使用气瓶，气瓶的瓶阀、减压器等发生冻结时，严禁用火烘烤\n或用铁器敲击瓶阀，严禁猛拧减压器的调节螺丝\nD.氧气瓶与乙炔瓶的工作间距不应小于10m，气瓶与明火作业点的距\n离不应小于5m\nE.使用前，应检查气瓶及气瓶附件的完好性，检查连接气路的气密性，\n并采取避免气体泄漏的措施，严禁使用已老化的橡皮气管", "options": {"A": "气瓶用后应及时归库", "B": "氧气瓶内剩余气体的压力不应小于0．2MPa", "C": "冬季使用气瓶，气瓶的瓶阀、减压器等发生冻结时，严禁用火烘烤 或用铁器敲击瓶阀，严禁猛拧减压器的调节螺丝", "D": "氧气瓶与乙炔瓶的工作间距不应小于10m，气瓶与明火作业点的距 离不应小于5m", "E": "使用前，应检查气瓶及气瓶附件的完好性，检查连接气路的气密性， 并采取避免气体泄漏的措施，严禁使用已老化的橡皮气管"}, "answer": "ACE", "type": "multi", "category": "法律法规"}, {"id": 2127, "question": "施工现场如将某种易燃、易爆类物质存放在集装箱类金属外壳\n\n=== 第748页 ===\n房屋的室内，当装有（\n）时，应按电气接地要求进行接地，如未\n安装任何电气设备时，应按防静电和等电位要求接地。\nA.照明\nB.通风机\nC.空调\nD.自曝灭火器\nE.水管", "options": {"A": "照明", "B": "通风机", "C": "空调", "D": "自曝灭火器", "E": "水管"}, "answer": "AB", "type": "multi", "category": "用电安全"}, {"id": 2128, "question": "施工用电检查评定的保证项目应包括：（\n）。\nA.外电防护\nB.接地与接零保护系统\nC.配电线路\nD.配电箱与开关箱\nE.现场照明", "options": {"A": "外电防护", "B": "接地与接零保护系统", "C": "配电线路", "D": "配电箱与开关箱", "E": "现场照明"}, "answer": "ABCD", "type": "multi", "category": "用电安全"}, {"id": 2129, "question": "施工用电检查评定的一般项目应包括（\n）。\nA.配电室与配电装置\nB.现场照明\nC.用电档案\nD.配电线路\nE.外电防护", "options": {"A": "配电室与配电装置", "B": "现场照明", "C": "用电档案", "D": "配电线路", "E": "外电防护"}, "answer": "ABC", "type": "multi", "category": "用电安全"}, {"id": 2130, "question": "架空线路的档距可以是（\n）m。\nA.20\nB.25\nC.30\nD.35\nE.40", "options": {"A": "20", "B": "25", "C": "30", "D": "35", "E": "40"}, "answer": "ABCD", "type": "multi", "category": "安全管理"}, {"id": 2131, "question": "架空线路的线间距可以是（\n）m。\nA.0.2\nB.0.3\nC.0.5\nD.0.7\nE.0.8", "options": {"A": "0.2", "B": "0.3", "C": "0.5", "D": "0.7", "E": "0.8"}, "answer": "BCDE", "type": "multi", "category": "安全管理"}, {"id": 2132, "question": "架空线靠近电杆的两导线的间距可以是（\n）m。\nA.0.3\nB.0.5\nC.0.7\nD.0.8\nE.1", "options": {"A": "0.3", "B": "0.5", "C": "0.7", "D": "0.8", "E": "1"}, "answer": "BCDE", "type": "multi", "category": "安全管理"}, {"id": 2133, "question": "架空线路宜采用钢筋混凝土杆、木杆或绝缘材料杆。钢筋混凝\n\n=== 第750页 ===\n土杆表面不得有露筋、宽度大于0.4mm 的裂纹和扭曲；木杆内部不\n得腐朽，其梢径可以是（\n）mm。\nA.100\nB.130\nC.140\nD.150\nE.160", "options": {"A": "100", "B": "130", "C": "140", "D": "150", "E": "160"}, "answer": "CDE", "type": "multi", "category": "安全管理"}, {"id": 2134, "question": "交流弧焊机变压器的一次侧电源线长度可以为（\n）m，其电\n源进线处必须设置防护。\nA.3\nB.5\nC.8\nD.10\nE.15", "options": {"A": "3", "B": "5", "C": "8", "D": "10", "E": "15"}, "answer": "AB", "type": "multi", "category": "安全管理"}, {"id": 2135, "question": "架空线路横担，低压铁横担角钢为L50x5 直线杆时，可使用的\n导线横截面为（\n）平方毫米。\nA.16\nB.25\nC.35\nD.50\n\n=== 第751页 ===\nE.60", "options": {"A": "16", "B": "25", "C": "35", "D": "50 === 第751页 ===", "E": "60"}, "answer": "ABCD", "type": "multi", "category": "安全管理"}, {"id": 2136, "question": "在施工程电缆水平敷设宜沿墙或门口刚性固定，下坠弧垂距地\n面的距离可为（\n）m。\nA.1.5\nB.1.8\nC.2\nD.2.5\nE.3", "options": {"A": "1.5", "B": "1.8", "C": "2", "D": "2.5", "E": "3"}, "answer": "CDE", "type": "multi", "category": "用电安全"}, {"id": 2137, "question": "使用夯土机械必须按规定穿戴绝缘用品，使用过程应有专人调\n整电缆，电缆长度可以为（\n）m。\nA.40\nB.45\nC.50\nD.60\nE.70", "options": {"A": "40", "B": "45", "C": "50", "D": "60", "E": "70"}, "answer": "ABC", "type": "multi", "category": "用电安全"}, {"id": 2138, "question": "电工在安装配电箱时，配电箱、开关箱应装设端正、牢固。固\n定式配电箱、开关箱的中心点与地面的垂直距离可以为（\n）m。\nA.1\nB.1.4\n\n=== 第752页 ===\nC.1.5\nD.1.8\nE.2", "options": {"A": "1", "B": "1.4 === 第752页 ===", "C": "1.5", "D": "1.8", "E": "2"}, "answer": "BC", "type": "multi", "category": "用电安全"}, {"id": 2139, "question": "电杆的拉线宜采用不少于3 根D4.0mm 的镀锌钢丝。拉线与电\n杆的夹角应在30°～45°之间。拉线埋设深度不可以为（\n）m。\nA.0.5\nB.0.6\nC.0.8\nD.1\nE.1.5", "options": {"A": "0.5", "B": "0.6", "C": "0.8", "D": "1", "E": "1.5"}, "answer": "ABC", "type": "multi", "category": "安全管理"}, {"id": 2140, "question": "施工现场停止作业（\n）个小时，应将动力开关箱断电上锁。\nA.0.5\nB.1\nC.1.5\nD.2\nE.2.5", "options": {"A": "0.5", "B": "1", "C": "1.5", "D": "2", "E": "2.5"}, "answer": "CDE", "type": "multi", "category": "用电安全"}, {"id": 2141, "question": "潜水电机的负荷线应采用防水橡皮护套铜芯软电缆，长度可以\n为（\n）m，且不得承受外力。\nA.0.8\n\n=== 第753页 ===\nB.1\nC.1.4\nD.1.8\nE.2", "options": {"A": "0.8 === 第753页 ===", "B": "1", "C": "1.4", "D": "1.8", "E": "2"}, "answer": "DE", "type": "multi", "category": "用电安全"}, {"id": 2142, "question": "照明系统宜使三相负荷平衡，其中每一单相回路上，灯具和插\n座的总数可以为（\n）个，负荷电流不宜超过15A。\nA.15\nB.20\nC.25\nD.30\nE.35", "options": {"A": "15", "B": "20", "C": "25", "D": "30", "E": "35"}, "answer": "ABC", "type": "multi", "category": "安全管理"}, {"id": 2143, "question": "携带式变压器的一次侧电源线应采用橡皮护套或塑料护套铜芯\n软电缆，中间不得有接头，长度可以为（\n）m。\nA.1\nB.2\nC.3\nD.4\nE.5", "options": {"A": "1", "B": "2", "C": "3", "D": "4", "E": "5"}, "answer": "ABC", "type": "multi", "category": "用电安全"}, {"id": 2144, "question": "建筑施工企业每年应按规定对所有相关人员进行安全生产继续\n\n=== 第754页 ===\n教育，教育培训应包括（\n）。\nA.新颁布的安全生产法律法规\nB.安全技术标准\nC.规范\nD.安全生产规范性文件\nE.先进的安全生产管理经验和典型事故案例分析", "options": {"A": "新颁布的安全生产法律法规", "B": "安全技术标准", "C": "规范", "D": "安全生产规范性文件", "E": "先进的安全生产管理经验和典型事故案例分析"}, "answer": "ABCDE", "type": "multi", "category": "法律法规"}, {"id": 2145, "question": "关于安全生产费用管理，下列说法正确的是（\n）。\nA.施工企业各管理层相关负责人必须在其管辖范围内，按专款专用、\n及时足额的要求，组织实施安全生产费用使用计划\nB.施工企业各管理层应定期对安全生产费用使用计划的实施情况进\n行监督审查\nC.施工企业各管理层应建立安全生产费用分类使用台账，定期统计上\n报\nD.施工企业各管理层应对安全生产费用的使用情况进行年度汇总分\n析\nE.安全生产费用的使用比例不得调整", "options": {"A": "施工企业各管理层相关负责人必须在其管辖范围内，按专款专用、 及时足额的要求，组织实施安全生产费用使用计划", "B": "施工企业各管理层应定期对安全生产费用使用计划的实施情况进 行监督审查", "C": "施工企业各管理层应建立安全生产费用分类使用台账，定期统计上 报", "D": "施工企业各管理层应对安全生产费用的使用情况进行年度汇总分 析", "E": "安全生产费用的使用比例不得调整"}, "answer": "ABCD", "type": "multi", "category": "安全管理"}, {"id": 2146, "question": "施工企业应定期分析（\n）的安全状态采取必要的改进措施。\nA.施工设施\nB.设备\nC.劳动防护用品\n\n=== 第755页 ===\nD.相关的安全检测器具\nE.施工人员", "options": {"A": "施工设施", "B": "设备", "C": "劳动防护用品 === 第755页 ===", "D": "相关的安全检测器具", "E": "施工人员"}, "answer": "ABCD", "type": "multi", "category": "安全管理"}, {"id": 2147, "question": "关于安全技术管理，下列说法正确的是（\n）。\nA.施工企业应根据施工组织设计、专项施工方案（措施）的审核、审\n批权限，组织相关职能部门审核，技术负责人审批\nB.审核、审批应有明确意见并签名盖章。编制、审批应在完工前完成\nC.施工企业应分级进行安全技术交底，编制人员应参与安全技术交底、\n验收和检查\nD.施工企业各管理层的技术负责人应对管理范围的安全技术管理负\n责\nE.施工企业可结合生产实际制订企业内部安全技术标准和图集", "options": {"A": "施工企业应根据施工组织设计、专项施工方案（措施）的审核、审 批权限，组织相关职能部门审核，技术负责人审批", "B": "审核、审批应有明确意见并签名盖章。编制、审批应在完工前完成", "C": "施工企业应分级进行安全技术交底，编制人员应参与安全技术交底、 验收和检查", "D": "施工企业各管理层的技术负责人应对管理范围的安全技术管理负 责", "E": "施工企业可结合生产实际制订企业内部安全技术标准和图集"}, "answer": "ACDE", "type": "multi", "category": "法律法规"}, {"id": 2148, "question": "分包方安全生产管理应包括分包单位以及供应商的（\n）等工\n作内容。\nA.选择\nB.施工过程管理\nC.评价\nD.组建\nE.训练", "options": {"A": "选择", "B": "施工过程管理", "C": "评价", "D": "组建", "E": "训练"}, "answer": "ABC", "type": "multi", "category": "安全管理"}, {"id": 2149, "question": "移动式操作平台下列哪些说法符合规定：（\n）。\n\n=== 第756页 ===\nA.操作平台的面积不应超过10 ㎡，高度不应超过5m\nB.平台轮子与平台连接应牢固、可靠，立柱底端距地面高度不得大于\n100mm\nC.操作平台应按规范要求进行组装，铺板应严密\nD.操作平台四周应按规范要求设置防护栏杆，并设置登高扶梯\nE.操作平台的材质应符合规范要求", "options": {"A": "操作平台的面积不应超过10 ㎡，高度不应超过5m", "B": "平台轮子与平台连接应牢固、可靠，立柱底端距地面高度不得大于 100mm", "C": "操作平台应按规范要求进行组装，铺板应严密", "D": "操作平台四周应按规范要求设置防护栏杆，并设置登高扶梯", "E": "操作平台的材质应符合规范要求"}, "answer": "ACDE", "type": "multi", "category": "法律法规"}, {"id": 2150, "question": "某工地使用固定式直梯进行攀登作业，直梯顶端的踏步与攀登\n顶面齐平，可以加设（\n）m 高的扶手。\nA.1.1\nB.1.2\nC.1.3\nD.1.4\nE.1.5", "options": {"A": "1.1", "B": "1.2", "C": "1.3", "D": "1.4", "E": "1.5"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 2151, "question": "当建筑物高度大于24m 并采用木质板搭设时，双层安全防护棚\n两层防护的间距可以设置为（\n）mm。\nA.650\nB.750\nC.800\nD.850\nE.900\n\n=== 第757页 ===", "options": {"A": "650", "B": "750", "C": "800", "D": "850", "E": "900 === 第757页 ==="}, "answer": "BCDE", "type": "multi", "category": "安全管理"}, {"id": 2152, "question": "防护栏杆立杆间距可以设置为（\n）m。\nA.1.2\nB.1.5\nC.1.8\nD.2.0\nE.2.2", "options": {"A": "1.2", "B": "1.5", "C": "1.8", "D": "2.0", "E": "2.2"}, "answer": "ABCD", "type": "multi", "category": "安全管理"}, {"id": 2153, "question": "防护栏杆挡脚板高度可以设置为（\n）mm。\nA.150\nB.160\nC.170\nD.180\nE.190", "options": {"A": "150", "B": "160", "C": "170", "D": "180", "E": "190"}, "answer": "DE", "type": "multi", "category": "安全管理"}, {"id": 2154, "question": "30°的屋面上作业，当无外脚手架时，可以设置（\n）m 高的\n防护栏杆。\nA.1.2\nB.1.4\nC.1.5\nD.1.6\nE.1.7\n\n=== 第758页 ===", "options": {"A": "1.2", "B": "1.4", "C": "1.5", "D": "1.6", "E": "1.7 === 第758页 ==="}, "answer": "CDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2155, "question": "某建筑物高度为50m，可选用长边（\n）m 的吊篮平台。\nA.2.5\nB.5.5\nC.7.5\nD.8.5\nE.9.5", "options": {"A": "2.5", "B": "5.5", "C": "7.5", "D": "8.5", "E": "9.5"}, "answer": "ABC", "type": "multi", "category": "安全管理"}, {"id": 2156, "question": "A 楼栋高度为100m，选用吊篮时，可选用长边为（\n）m 的\n吊篮。\nA.2.5\nB.3.5\nC.4.5\nD.5.5\nE.7.5", "options": {"A": "2.5", "B": "3.5", "C": "4.5", "D": "5.5", "E": "7.5"}, "answer": "ABCD", "type": "multi", "category": "安全管理"}, {"id": 2157, "question": "以下吊篮选择正确的有：（\n）。\nA.悬挂高度40m，使用长边2.5m 的吊篮平台\nB.悬挂高度50m，使用长边7.5m 的吊篮平台\nC.悬挂高度80m，使用长边7.5m 的吊篮平台\nD.悬挂高度110m，使用长边5.5m 的吊篮平台\nE.悬挂高度120m，使用长边2.5m 的吊篮平台\n\n=== 第759页 ===", "options": {"A": "悬挂高度40m，使用长边2.5m 的吊篮平台", "B": "悬挂高度50m，使用长边7.5m 的吊篮平台", "C": "悬挂高度80m，使用长边7.5m 的吊篮平台", "D": "悬挂高度110m，使用长边5.5m 的吊篮平台", "E": "悬挂高度120m，使用长边2.5m 的吊篮平台 === 第759页 ==="}, "answer": "ABE", "type": "multi", "category": "安全管理"}, {"id": 2158, "question": "下列区段属于高处作业划分高度区段的有：（\n）。\nA.2m 至5m\nB.5m 以上至10m\nC.10m 以上至15m\nD.15m 以上至30m\nE.30m 以上", "options": {"A": "2m 至5m", "B": "5m 以上至10m", "C": "10m 以上至15m", "D": "15m 以上至30m", "E": "30m 以上"}, "answer": "ADE", "type": "multi", "category": "高处作业"}, {"id": 2159, "question": "下列固定式直梯需要加设梯间平台的有：（\n）。\nA.高度3m\nB.高度5m\nC.高度8m\nD.高度10m\nE.高度12m", "options": {"A": "高度3m", "B": "高度5m", "C": "高度8m", "D": "高度10m", "E": "高度12m"}, "answer": "CDE", "type": "multi", "category": "安全管理"}, {"id": 2160, "question": "高处作业吊篮作业前，下列行为正确的有：（\n）。\nA.查阅交接班记录\nB.检查设备技术状况\nC.检查运行范围内有无障碍物\nD.将吊篮升至离地1m，检查安全装置\nE.检查卫生状况", "options": {"A": "查阅交接班记录", "B": "检查设备技术状况", "C": "检查运行范围内有无障碍物", "D": "将吊篮升至离地1m，检查安全装置", "E": "检查卫生状况"}, "answer": "ABCD", "type": "multi", "category": "高处作业"}, {"id": 2161, "question": "高处作业吊篮使用结束后，下列行为正确的有：（\n）。\nA.检查各部位安全技术状况\nB.对平台各部位进行卫生清洁\nC.切断电源\nD.锁好电控箱\nE.填写交接班记录", "options": {"A": "检查各部位安全技术状况", "B": "对平台各部位进行卫生清洁", "C": "切断电源", "D": "锁好电控箱", "E": "填写交接班记录"}, "answer": "ABCDE", "type": "multi", "category": "高处作业"}, {"id": 2162, "question": "当使用梯子进入高处平面（屋顶或平台）时，下列设置不可行\n的有：（\n）。\nA.梯子顶端距离高处平面还差20cm\nB.梯子顶端与高处平面平齐，可靠固定\nC.梯子顶端超出高处平面20cm，可靠固定\nD.梯子顶端超出高处平面50cm，可靠固定\nE.梯子顶端超出高处平面1m，可靠固定", "options": {"A": "梯子顶端距离高处平面还差20cm", "B": "梯子顶端与高处平面平齐，可靠固定", "C": "梯子顶端超出高处平面20cm，可靠固定", "D": "梯子顶端超出高处平面50cm，可靠固定", "E": "梯子顶端超出高处平面1m，可靠固定"}, "answer": "ABCD", "type": "multi", "category": "高处作业"}, {"id": 2163, "question": "高处水平通道搭设与使用正确的有：（\n）。\nA.梁式通道承重梁、承载结构经过设计确定，搁置端固定牢固\nB.通行面应满铺防滑板，并固定牢固\nC.通行面两侧设置防护栏杆\nD.高空结构物间采用简易跳板通行\nE.可用已安装的构件或既有的结构构件作为高处水平通道", "options": {"A": "梁式通道承重梁、承载结构经过设计确定，搁置端固定牢固", "B": "通行面应满铺防滑板，并固定牢固", "C": "通行面两侧设置防护栏杆", "D": "高空结构物间采用简易跳板通行", "E": "可用已安装的构件或既有的结构构件作为高处水平通道"}, "answer": "ABCE", "type": "multi", "category": "高处作业"}, {"id": 2164, "question": "落地式操作平台可以设置为高（\n）m，宽（\n）m。\nA.5；3\nB.6；2\nC.8；2\nD.10；5\nE.16；8", "options": {"A": "5；3", "B": "6；2", "C": "8；2", "D": "10；5", "E": "16；8"}, "answer": "ABD", "type": "multi", "category": "安全管理"}, {"id": 2165, "question": "落地式操作平台连墙件间隔可以设置为（\n）m 一处。\nA.2.5\nB.3\nC.3.5\nD.4\nE.4.5", "options": {"A": "2.5", "B": "3", "C": "3.5", "D": "4", "E": "4.5"}, "answer": "ABCD", "type": "multi", "category": "安全管理"}, {"id": 2166, "question": "关于人行塔梯说法正确的有：（\n）。\nA.与平台满铺防滑板\nB.四周按临边作业要求设置防护栏杆\nC.4m 高度可不设连墙件\nD.7m 高度可不设连墙件\nE.10m 高度必须设连墙件", "options": {"A": "与平台满铺防滑板", "B": "四周按临边作业要求设置防护栏杆", "C": "4m 高度可不设连墙件", "D": "7m 高度可不设连墙件", "E": "10m 高度必须设连墙件"}, "answer": "ABCE", "type": "multi", "category": "安全管理"}, {"id": 2167, "question": "当高处作业使用悬吊座椅时，下列设置正确的有：（\n）。\n\n=== 第762页 ===\nA.椅座宽度为350mm\nB.椅座宽度为450mm\nC.坠落防护安全绳与吊架连接\nD.靠背高度150mm\nE.靠背高度200mm", "options": {"A": "椅座宽度为350mm", "B": "椅座宽度为450mm", "C": "坠落防护安全绳与吊架连接", "D": "靠背高度150mm", "E": "靠背高度200mm"}, "answer": "BCE", "type": "multi", "category": "高处作业"}, {"id": 2168, "question": "当吊篮为双层平台时，设置正确的有：（\n）。\nA.可以在上层底板设置出入口\nB.两平台底板之间设置可以安全通过的爬梯\nC.可以在下层地板设置出入口\nD.不可以设置上下爬梯\nE.上下层均不可以设置出入口", "options": {"A": "可以在上层底板设置出入口", "B": "两平台底板之间设置可以安全通过的爬梯", "C": "可以在下层地板设置出入口", "D": "不可以设置上下爬梯", "E": "上下层均不可以设置出入口"}, "answer": "AB", "type": "multi", "category": "安全管理"}, {"id": 2169, "question": "当吊篮为双层平台时，上下层平台间距可以设置为：（\n）。\nA.1.5m\nB.1.8m\nC.2.0m\nD.2.2m\nE.2.8m", "options": {"A": "1.5m", "B": "1.8m", "C": "2.0m", "D": "2.2m", "E": "2.8m"}, "answer": "CDE", "type": "multi", "category": "安全管理"}, {"id": 2170, "question": "上下立体交叉作业时，下层作业的位置应：（\n）。\nA.处于上层作业坠落半径之外\n\n=== 第763页 ===\nB.处于上层作业坠落半径之内\nC.不设安全棚\nD.设置安全棚\nE.不作业", "options": {"A": "处于上层作业坠落半径之外 === 第763页 ===", "B": "处于上层作业坠落半径之内", "C": "不设安全棚", "D": "设置安全棚", "E": "不作业"}, "answer": "AD", "type": "multi", "category": "高处作业"}, {"id": 2171, "question": "上下立体交叉作业时，上层拆除的各种部件堆放处离临边边沿\n距离可以为（\n）m。\nA.0.5\nB.0.8\nC.1.0\nD.1.2\nE.1.5", "options": {"A": "0.5", "B": "0.8", "C": "1.0", "D": "1.2", "E": "1.5"}, "answer": "CDE", "type": "multi", "category": "安全管理"}, {"id": 2172, "question": "下立体交叉作业时，上层拆除的各种部件堆放高度可以为（\n）\nm。\nA.0.5\nB.0.8\nC.1.0\nD.1.2\nE.1.5", "options": {"A": "0.5", "B": "0.8", "C": "1.0", "D": "1.2", "E": "1.5"}, "answer": "ABC", "type": "multi", "category": "安全管理"}, {"id": 2173, "question": "模板支撑使用的钢管不得有（\n）情况。\n\n=== 第764页 ===\nA.轻微锈蚀\nB.严重锈蚀\nC.严重弯曲\nD.压扁\nE.裂纹", "options": {"A": "轻微锈蚀", "B": "严重锈蚀", "C": "严重弯曲", "D": "压扁", "E": "裂纹"}, "answer": "BCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2174, "question": "模板结构或构件不得使用（\n）的木材。\nA.腐朽\nB.霉变\nC.虫蛀\nD.折裂\nE.枯节", "options": {"A": "腐朽", "B": "霉变", "C": "虫蛀", "D": "折裂", "E": "枯节"}, "answer": "ABCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2175, "question": "胶合模板板材表面应平整光滑，具有（\n）的保护膜。\nA.防水\nB.防火\nC.耐磨\nD.耐酸碱\nE.耐寒", "options": {"A": "防水", "B": "防火", "C": "耐磨", "D": "耐酸碱", "E": "耐寒"}, "answer": "ACD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2176, "question": "模板及其支架的设计应根据（\n）进行。\nA.工程结构形式\n\n=== 第765页 ===\nB.荷载大小\nC.地基土类别\nD.施工设备和材料\nE.施工计划", "options": {"A": "工程结构形式 === 第765页 ===", "B": "荷载大小", "C": "地基土类别", "D": "施工设备和材料", "E": "施工计划"}, "answer": "ABCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2177, "question": "模板及其支架的设计应具有足够（\n）。\nA.承载力\nB.刚度\nC.稳定性\nD.专一性\nE.固定性", "options": {"A": "承载力", "B": "刚度", "C": "稳定性", "D": "专一性", "E": "固定性"}, "answer": "ABC", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2178, "question": "支撑架立杆下垫板应有足够的（\n）。\nA.强度\nB.刚度\nC.支承面积\nD.厚度\nE.重量", "options": {"A": "强度", "B": "刚度", "C": "支承面积", "D": "厚度", "E": "重量"}, "answer": "AC", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2179, "question": "以下混凝土构件，模板应起拱的有（\n）。\nA.跨度3m 的梁\nB.跨度5m 的梁\n\n=== 第766页 ===\nC.跨度8m 的梁\nD.跨度5m 的板\nE.跨度6m 的板", "options": {"A": "跨度3m 的梁", "B": "跨度5m 的梁 === 第766页 ===", "C": "跨度8m 的梁", "D": "跨度5m 的板", "E": "跨度6m 的板"}, "answer": "BCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2180, "question": "模板支撑体系中，板下立杆间距为1.0m 时，梁下立杆间距可以\n为（\n）m。\nA.1.0\nB.0.8\nC.0.6\nD.0.5\nE.0.4", "options": {"A": "1.0", "B": "0.8", "C": "0.6", "D": "0.5", "E": "0.4"}, "answer": "AD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2181, "question": "支架立柱与结构柱固结，固结点间距符合要求的有（\n）。\nA.水平间距5m\nB.水平间距7m\nC.水平间距9m\nD.竖向间距2m\nE.竖向间距4m", "options": {"A": "水平间距5m", "B": "水平间距7m", "C": "水平间距9m", "D": "竖向间距2m", "E": "竖向间距4m"}, "answer": "BCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2182, "question": "关于吊运模板，说法正确的是（\n）。\nA.作业前应检查绳索、卡具、模板上的吊环，必须完整有效\nB.吊运必须使用卡环连接，并应稳起稳落，待模板就位连接牢固后，\n\n=== 第767页 ===\n方可摘除卡环\nC.吊运散装模板时，必须码放整齐，待捆绑牢固后方可起吊\nD.严禁起重机在架空输电线路下面工作\nE.遇5 级及以上大风时，应停止一切吊运作业", "options": {"A": "作业前应检查绳索、卡具、模板上的吊环，必须完整有效", "B": "吊运必须使用卡环连接，并应稳起稳落，待模板就位连接牢固后， === 第767页 === 方可摘除卡环", "C": "吊运散装模板时，必须码放整齐，待捆绑牢固后方可起吊", "D": "严禁起重机在架空输电线路下面工作", "E": "遇5 级及以上大风时，应停止一切吊运作业"}, "answer": "ABCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2183, "question": "工具式立柱支撑的构造与安装，下列说法正确的是（\n）。\nA.工具式钢管单立柱支撑的间距应符合支撑设计的规定\nB.立柱可以接长使用\nC.立柱不得接长使用\nD.所有夹具、螺栓、销子和其他配件应处在闭合或拧紧的位置\nE.构造措施应符合相应规范要求", "options": {"A": "工具式钢管单立柱支撑的间距应符合支撑设计的规定", "B": "立柱可以接长使用", "C": "立柱不得接长使用", "D": "所有夹具、螺栓、销子和其他配件应处在闭合或拧紧的位置", "E": "构造措施应符合相应规范要求"}, "answer": "ACDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2184, "question": "当采用扣件式钢管作立柱支撑时，构造与安装做法正确的是\n（\n）。\nA.钢管规格、间距、扣件应符合设计要求\nB.当立柱底部不在同一高度时，高处的纵向扫地杆应向低处延长不少\n于2 跨\nC.立柱接长可以搭接\nD.相邻两立柱的对接接头不得在同步内\nE.各接头中心距主节点不宜大于步距的1/3", "options": {"A": "钢管规格、间距、扣件应符合设计要求", "B": "当立柱底部不在同一高度时，高处的纵向扫地杆应向低处延长不少 于2 跨", "C": "立柱接长可以搭接", "D": "相邻两立柱的对接接头不得在同步内", "E": "各接头中心距主节点不宜大于步距的1/3"}, "answer": "ABDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2185, "question": "关于多层悬挑结构模板，说法正确的是（\n）。\n\n=== 第768页 ===\nA.上下立柱应保持在同一条垂直线上\nB.上下立柱应交错设置\nC.立柱应连续支撑，不少于2 层\nD.立柱应连续支撑，不少于3 层\nE.立柱应连续支撑，不少于4 层", "options": {"A": "上下立柱应保持在同一条垂直线上", "B": "上下立柱应交错设置", "C": "立柱应连续支撑，不少于2 层", "D": "立柱应连续支撑，不少于3 层", "E": "立柱应连续支撑，不少于4 层"}, "answer": "AD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2186, "question": "角柱模板的支撑，应在里侧设置能承受（\n）的斜撑。\nA.拉力\nB.压力\nC.内力\nD.轴力\nE.侧向力", "options": {"A": "拉力", "B": "压力", "C": "内力", "D": "轴力", "E": "侧向力"}, "answer": "AB", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2187, "question": "独立梁和整体楼盖梁结构模板，下列说法正确的是（\n）。\nA.安装独立梁模板时应设安全操作平台\nB.底模与横楞应拉结好，横楞与支架、立柱应连接牢固\nC.安装梁侧模时，应边安装边与底模连接\nD.当侧模高度多于2 块时，应采取临时固定措施\nE.起拱应在侧模内外楞连固前进行", "options": {"A": "安装独立梁模板时应设安全操作平台", "B": "底模与横楞应拉结好，横楞与支架、立柱应连接牢固", "C": "安装梁侧模时，应边安装边与底模连接", "D": "当侧模高度多于2 块时，应采取临时固定措施", "E": "起拱应在侧模内外楞连固前进行"}, "answer": "ABCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2188, "question": "楼板或平台板模板，下列说法正确的是（\n）。\nA.当预组合模板采用桁架支模时，桁架与支点的连接应固定牢靠\n\n=== 第769页 ===\nB.桁架支承应采用平直通长的型钢或木方\nC.当预组合模板块较大时，应加钢楞后方可吊运\nD.单块模就位安装，必须待支架搭设稳固、板下横楞与支架连接牢固\n后进行\nE.U 形卡应按设计规定安装", "options": {"A": "当预组合模板采用桁架支模时，桁架与支点的连接应固定牢靠 === 第769页 ===", "B": "桁架支承应采用平直通长的型钢或木方", "C": "当预组合模板块较大时，应加钢楞后方可吊运", "D": "单块模就位安装，必须待支架搭设稳固、板下横楞与支架连接牢固 后进行", "E": "U 形卡应按设计规定安装"}, "answer": "ABCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2189, "question": "进入施工现场的爬升模板系统中的（\n），应按施工组织设计\n及有关图纸验收，合格后方可使用。\nA.大模板\nB.爬升支架\nC.爬升设备\nD.脚手架\nE.相关附件", "options": {"A": "大模板", "B": "爬升支架", "C": "爬升设备", "D": "脚手架", "E": "相关附件"}, "answer": "ABCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2190, "question": "关于模板拆除作业，说法正确的是（\n）。\nA.应设专人指挥\nB.作业区应设围栏\nC.专人负责监护\nD.拆下的模板、零配件可以抛掷\nE.从下往上拆除", "options": {"A": "应设专人指挥", "B": "作业区应设围栏", "C": "专人负责监护", "D": "拆下的模板、零配件可以抛掷", "E": "从下往上拆除"}, "answer": "ABC", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2191, "question": "拆模如遇中途停歇，应将（\n）的模板或支架进行临时支撑牢\n\n=== 第770页 ===\n固或相互连接稳固。\nA.松动\nB.悬空\nC.浮吊\nD.固定\nE.未拆除", "options": {"A": "松动", "B": "悬空", "C": "浮吊", "D": "固定", "E": "未拆除"}, "answer": "ABC", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2192, "question": "拆除条形基础、杯形基础、独立基础或设备基础的模板时，说\n法正确的是（\n）。\nA.拆除前应先检查基槽（坑）土壁的安全状况\nB.模板和支撑杆件等应随拆随运\nC.模板可以堆在基坑边缘\nD.施工人员应站在安全地方\nE.小型零配件应装入工具袋内或小型箱笼内", "options": {"A": "拆除前应先检查基槽（坑）土壁的安全状况", "B": "模板和支撑杆件等应随拆随运", "C": "模板可以堆在基坑边缘", "D": "施工人员应站在安全地方", "E": "小型零配件应装入工具袋内或小型箱笼内"}, "answer": "ABDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2193, "question": "拆除梁、板模板时，正确的是（\n）。\nA.应先拆梁侧模，再拆板底模，最后拆除梁底模\nB.应分段分片进行，严禁成片撬落或成片拉拆\nC.用铁棍或铁锤乱砸\nD.站在悬臂结构边缘敲拆下面的底模\nE.人员应站在安全地方", "options": {"A": "应先拆梁侧模，再拆板底模，最后拆除梁底模", "B": "应分段分片进行，严禁成片撬落或成片拉拆", "C": "用铁棍或铁锤乱砸", "D": "站在悬臂结构边缘敲拆下面的底模", "E": "人员应站在安全地方"}, "answer": "ABE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2194, "question": "安装和拆除模板时，操作人员应佩戴（\n）。\nA.安全帽\nB.安全带\nC.安全绳\nD.防滑鞋\nE.绝缘手套", "options": {"A": "安全帽", "B": "安全带", "C": "安全绳", "D": "防滑鞋", "E": "绝缘手套"}, "answer": "ABD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2195, "question": "模板工程作业人员严禁攀登（\n）。\nA.模板\nB.斜撑杆\nC.立杆\nD.拉条\nE.绳索", "options": {"A": "模板", "B": "斜撑杆", "C": "立杆", "D": "拉条", "E": "绳索"}, "answer": "ABDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2196, "question": "钢管满堂模板支撑架检查评定的保证项目包括（\n）。\nA.方案与交底\nB.构配件和材质\nC.地基基础\nD.架体搭设\nE.架体稳定、拆除、使用与监测", "options": {"A": "方案与交底", "B": "构配件和材质", "C": "地基基础", "D": "架体搭设", "E": "架体稳定、拆除、使用与监测"}, "answer": "ABCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2197, "question": "钢管满堂模板支撑架检查评定的一般项目包括（\n）。\n\n=== 第772页 ===\nA.杆件连接\nB.安全防护\nC.底座、托撑与主次楞\nD.检查验收\nE.教育交底", "options": {"A": "杆件连接", "B": "安全防护", "C": "底座、托撑与主次楞", "D": "检查验收", "E": "教育交底"}, "answer": "ABCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2198, "question": "进场的钢管及构配件应有质量合格证、产品性能检验报告，其\n（\n）应符合国家现行相关标准要求。\nA.规格\nB.型号\nC.材质\nD.产品质量\nE.产品数量", "options": {"A": "规格", "B": "型号", "C": "材质", "D": "产品质量", "E": "产品数量"}, "answer": "ABCD", "type": "multi", "category": "法律法规"}, {"id": 2199, "question": "关于钢管满堂模板支撑架地基基础，下列说法正确的是（\n）。\nA.地基应坚实、平整\nB.立杆底部应设底座、垫板或混凝土垫层\nC.立杆与基础应接触紧密\nD.基础排水设施应完善\nE.基础可不用进行承载力验算", "options": {"A": "地基应坚实、平整", "B": "立杆底部应设底座、垫板或混凝土垫层", "C": "立杆与基础应接触紧密", "D": "基础排水设施应完善", "E": "基础可不用进行承载力验算"}, "answer": "ABCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2200, "question": "关于钢管满堂模板支撑架架体搭设，（\n）应满足国家现行标\n\n=== 第773页 ===\n准规定。\nA.立杆垂直度\nB.水平杆水平度\nC.水平杆直线度\nD.杆件表面平整度\nE.杆件长度", "options": {"A": "立杆垂直度", "B": "水平杆水平度", "C": "水平杆直线度", "D": "杆件表面平整度", "E": "杆件长度"}, "answer": "ABC", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2201, "question": "（\n）不得与模板支撑架相连。\nA.起重设备\nB.混凝土输送管\nC.作业脚手架\nD.物料周转平台\nE.主体结构", "options": {"A": "起重设备", "B": "混凝土输送管", "C": "作业脚手架", "D": "物料周转平台", "E": "主体结构"}, "answer": "ABCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2202, "question": "支撑架应编制监测监控措施，在（\n）阶段对基础沉降、模板\n支撑体系的位移进行监测监控。\nA.架体搭设\nB.钢筋安装\nC.混凝土浇捣过程中\nD.混凝土终凝前\nE.混凝土终凝后", "options": {"A": "架体搭设", "B": "钢筋安装", "C": "混凝土浇捣过程中", "D": "混凝土终凝前", "E": "混凝土终凝后"}, "answer": "ABCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2203, "question": "支撑架监测监控应记录（\n）。\nA.监测点\nB.监测时间\nC.工况\nD.监测项目\nE.报警值", "options": {"A": "监测点", "B": "监测时间", "C": "工况", "D": "监测项目", "E": "报警值"}, "answer": "ABCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2204, "question": "梁柱式模板支撑架检查评定保证项目包括（\n）。\nA.方案与交底\nB.构配件和材质\nC.基础\nD.立柱或托架、纵梁和横梁\nE.检查验收、使用与监测", "options": {"A": "方案与交底", "B": "构配件和材质", "C": "基础", "D": "立柱或托架、纵梁和横梁", "E": "检查验收、使用与监测"}, "answer": "ABCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2205, "question": "梁柱式模板支撑架检查评定一般项目包括（\n）。\nA.构件规格\nB.构件连接\nC.安全防护\nD.拆除\nE.验收", "options": {"A": "构件规格", "B": "构件连接", "C": "安全防护", "D": "拆除", "E": "验收"}, "answer": "BCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2206, "question": "梁柱式模板支撑架构配件，说法正确的是（\n）。\n\n=== 第775页 ===\nA.应有质量合格证、产品性能检验报告\nB.常备式定型钢构件应有使用说明书\nC.支架承力主体结构构件、连接件严禁存在显著的扭曲和侧弯变形\nD.应选用高强度材料\nE.应符合施工方案要求", "options": {"A": "应有质量合格证、产品性能检验报告", "B": "常备式定型钢构件应有使用说明书", "C": "支架承力主体结构构件、连接件严禁存在显著的扭曲和侧弯变形", "D": "应选用高强度材料", "E": "应符合施工方案要求"}, "answer": "ABC", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2207, "question": "关于梁柱式模板支撑架，下列说法正确的是（\n）。\nA.立柱与基础，立柱与顶部横梁连接部位应接触紧密、连接牢固\nB.立柱的竖向连接应采用法兰连接\nC.两根及以上型钢构成的组合梁，应采用垫板、加劲肋将型钢连接成\n整体\nD.桁架式纵横梁应在支承位置设置侧向限位装置\nE.倾斜设置的纵梁或横梁支座处应采取可靠的防滑移固定措施", "options": {"A": "立柱与基础，立柱与顶部横梁连接部位应接触紧密、连接牢固", "B": "立柱的竖向连接应采用法兰连接", "C": "两根及以上型钢构成的组合梁，应采用垫板、加劲肋将型钢连接成 整体", "D": "桁架式纵横梁应在支承位置设置侧向限位装置", "E": "倾斜设置的纵梁或横梁支座处应采取可靠的防滑移固定措施"}, "answer": "ABCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2208, "question": "移动模架检查评定保证项目包括（\n）。\nA.方案与交底\nB.模架产品和材质\nC.模架结构、安装、检查验收\nD.模架过孔\nE.使用与监测", "options": {"A": "方案与交底", "B": "模架产品和材质", "C": "模架结构、安装、检查验收", "D": "模架过孔", "E": "使用与监测"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 2209, "question": "定型移动模架产品应具有（\n）。\n\n=== 第776页 ===\nA.设计制造资质证书\nB.设备出厂合格证\nC.设计及安装技术资料\nD.操作手册\nE.评价报告", "options": {"A": "设计制造资质证书", "B": "设备出厂合格证", "C": "设计及安装技术资料", "D": "操作手册", "E": "评价报告"}, "answer": "ABCD", "type": "multi", "category": "安全管理"}, {"id": 2210, "question": "非定型移动模架所用的承重构配件和连接件应有（\n）。\nA.设计制造资质证书\nB.质量合格证\nC.材质证明\nD.操作手册\nE.评价报告", "options": {"A": "设计制造资质证书", "B": "质量合格证", "C": "材质证明", "D": "操作手册", "E": "评价报告"}, "answer": "BC", "type": "multi", "category": "安全管理"}, {"id": 2211, "question": "非定型移动模架的主承重梁的（\n）应符合模架设计要求。\nA.重量\nB.支承位置\nC.间距\nD.方向\nE.高度", "options": {"A": "重量", "B": "支承位置", "C": "间距", "D": "方向", "E": "高度"}, "answer": "BC", "type": "multi", "category": "安全管理"}, {"id": 2212, "question": "移动模架组装后首次使用前应组织（\n）单位共同进行检查验\n收。\n\n=== 第777页 ===\nA.设计制造\nB.安装\nC.专业分包\nD.劳务分包\nE.班组", "options": {"A": "设计制造", "B": "安装", "C": "专业分包", "D": "劳务分包", "E": "班组"}, "answer": "AB", "type": "multi", "category": "安全管理"}, {"id": 2213, "question": "移动模架安装，说法正确的是（\n）。\nA.按产品操作手册安装\nB.临时拼装支架地基基础应坚实可靠\nC.上行式模架后支腿应置于已浇筑梁段腹板中心线上\nD.拼装过程中，支腿托架、主梁、横梁应及时连接\nE.可以按需求自行改装", "options": {"A": "按产品操作手册安装", "B": "临时拼装支架地基基础应坚实可靠", "C": "上行式模架后支腿应置于已浇筑梁段腹板中心线上", "D": "拼装过程中，支腿托架、主梁、横梁应及时连接", "E": "可以按需求自行改装"}, "answer": "ABCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2214, "question": "移动模架检查验收，说法正确的是（\n）。\nA.重点部位焊缝进行无损探伤检测\nB.应对精轧螺纹钢筋、夹具及连接器进行外观检查\nC.对电路、液压系统的运行情况进行检查\nD.应组织设计制造和安装单位共同进行检查验收\nE.验收可以在投入使用后进行", "options": {"A": "重点部位焊缝进行无损探伤检测", "B": "应对精轧螺纹钢筋、夹具及连接器进行外观检查", "C": "对电路、液压系统的运行情况进行检查", "D": "应组织设计制造和安装单位共同进行检查验收", "E": "验收可以在投入使用后进行"}, "answer": "ABCD", "type": "multi", "category": "安全管理"}, {"id": 2215, "question": "移动模架过孔，说法正确的是（\n）。\nA.过孔应在梁体预应力初张拉完成后方可进行\n\n=== 第778页 ===\nB.模架打开过孔前应确认电路、油路运行正常\nC.模架纵向移动时两侧的承重主梁应保持同步\nD.纵移到最后1m 时，应按点动按钮前进\nE.应有可靠的纵向过孔限位和制动装置", "options": {"A": "过孔应在梁体预应力初张拉完成后方可进行 === 第778页 ===", "B": "模架打开过孔前应确认电路、油路运行正常", "C": "模架纵向移动时两侧的承重主梁应保持同步", "D": "纵移到最后1m 时，应按点动按钮前进", "E": "应有可靠的纵向过孔限位和制动装置"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 2216, "question": "移动模架施工时应有（\n）。\nA.风速仪\nB.避雷针\nC.避雷带\nD.防风锚定设施\nE.防雨设施", "options": {"A": "风速仪", "B": "避雷针", "C": "避雷带", "D": "防风锚定设施", "E": "防雨设施"}, "answer": "ABD", "type": "multi", "category": "安全管理"}, {"id": 2217, "question": "移动模架拆除，说法正确的是（\n）。\nA.模架拆除前，应设置围栏和警示标志\nB.拆除应在不带电的状态下进行\nC.拆除应对称进行\nD.拆除主梁等大型构件前，应采取增设缆风绳、临时支撑等措施\nE.拆下的构件应堆放稳定", "options": {"A": "模架拆除前，应设置围栏和警示标志", "B": "拆除应在不带电的状态下进行", "C": "拆除应对称进行", "D": "拆除主梁等大型构件前，应采取增设缆风绳、临时支撑等措施", "E": "拆下的构件应堆放稳定"}, "answer": "ABCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2218, "question": "悬臂施工挂篮检查评定保证项目包括（\n）。\nA.方案与交底\nB.构配件和材质\n\n=== 第779页 ===\nC.加工制作\nD.挂篮结构\nE.行走与锚固", "options": {"A": "方案与交底", "B": "构配件和材质 === 第779页 ===", "C": "加工制作", "D": "挂篮结构", "E": "行走与锚固"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 2219, "question": "悬臂施工挂篮检查评定一般项目包括（\n）。\nA.检查验收\nB.预留预埋\nC.安全防护\nD.安装\nE.拆除", "options": {"A": "检查验收", "B": "预留预埋", "C": "安全防护", "D": "安装", "E": "拆除"}, "answer": "BCE", "type": "multi", "category": "安全管理"}, {"id": 2220, "question": "挂篮加工制作，说法正确的是（\n）。\nA.各部件加工完成后应进行试拼装\nB.采用螺栓连接进行拼装时，严禁对螺栓孔进行切割扩孔\nC.挂篮制作完成后应经厂家自检合格，并应出具合格证\nD.焊接部位焊缝应饱满\nE.销轴端头应安装保险销", "options": {"A": "各部件加工完成后应进行试拼装", "B": "采用螺栓连接进行拼装时，严禁对螺栓孔进行切割扩孔", "C": "挂篮制作完成后应经厂家自检合格，并应出具合格证", "D": "焊接部位焊缝应饱满", "E": "销轴端头应安装保险销"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 2221, "question": "挂篮行走与锚固，说法正确的是（\n）。\nA.挂篮行走应制定专项操作指导书\nB.挂篮滑道或轨道应铺设平顺\nC.挂篮移动前，应完成锚固体系的可靠转换\n\n=== 第780页 ===\nD.挂篮行走前应检查行走系统、吊挂系统和模板系统\nE.墩两侧挂篮应对称、平稳移动", "options": {"A": "挂篮行走应制定专项操作指导书", "B": "挂篮滑道或轨道应铺设平顺", "C": "挂篮移动前，应完成锚固体系的可靠转换 === 第780页 ===", "D": "挂篮行走前应检查行走系统、吊挂系统和模板系统", "E": "墩两侧挂篮应对称、平稳移动"}, "answer": "ABCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2222, "question": "挂篮使用时，说法正确的是（\n）。\nA.应在显著位置悬挂挂篮安全使用规程\nB.严禁在精轧螺纹钢筋吊杆上进行电焊、搭火作业\nC.挂篮行走过程中，构件上站人\nD.风力超过挂篮设计移动风力时不得移动挂篮\nE.施工现场应建立挂篮的安全技术档案", "options": {"A": "应在显著位置悬挂挂篮安全使用规程", "B": "严禁在精轧螺纹钢筋吊杆上进行电焊、搭火作业", "C": "挂篮行走过程中，构件上站人", "D": "风力超过挂篮设计移动风力时不得移动挂篮", "E": "施工现场应建立挂篮的安全技术档案"}, "answer": "ABDE", "type": "multi", "category": "安全管理"}, {"id": 2223, "question": "挂篮拆除，说法正确的是（\n）。\nA.项目技术负责人应向现场管理人员和作业人员进行安全技术交底\nB.挂篮后移过程中应设专人统一指挥\nC.两悬臂端挂篮后移和拆除应对称同步进行\nD.拆除过程中，前端堆放物料\nE.先拆除模板和吊挂系统", "options": {"A": "项目技术负责人应向现场管理人员和作业人员进行安全技术交底", "B": "挂篮后移过程中应设专人统一指挥", "C": "两悬臂端挂篮后移和拆除应对称同步进行", "D": "拆除过程中，前端堆放物料", "E": "先拆除模板和吊挂系统"}, "answer": "ABCE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2224, "question": "液压爬升模板检查评定保证项目包括（\n）。\nA.方案与交底\nB.承载体\nC.防倾与防坠装置\nD.爬升机构\n\n=== 第781页 ===\nE.架体爬升、检查验收", "options": {"A": "方案与交底", "B": "承载体", "C": "防倾与防坠装置", "D": "爬升机构 === 第781页 ===", "E": "架体爬升、检查验收"}, "answer": "ABCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2225, "question": "液压爬升模板检查评定一般项目包括（\n）。\nA.方案与交底\nB.架体构造\nC.安全防护\nD.安全作业\nE.检查验收", "options": {"A": "方案与交底", "B": "架体构造", "C": "安全防护", "D": "安全作业", "E": "检查验收"}, "answer": "BCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2226, "question": "液压爬升模板承载体，说法正确的是（\n）。\nA.锥型承载接头定位中心允许偏差应为±5mm\nB.挂钩连接座应采用专用承载螺栓固定\nC.锥体螺母长度不应小于承载螺栓外径的3 倍\nD.预埋件和承载螺栓拧入锥体螺母的深度均不应小于承载螺栓外径\n的2 倍\nE.承载螺栓应与锥体螺母扭紧", "options": {"A": "锥型承载接头定位中心允许偏差应为±5mm", "B": "挂钩连接座应采用专用承载螺栓固定", "C": "锥体螺母长度不应小于承载螺栓外径的3 倍", "D": "预埋件和承载螺栓拧入锥体螺母的深度均不应小于承载螺栓外径 的2 倍", "E": "承载螺栓应与锥体螺母扭紧"}, "answer": "ABCE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2227, "question": "液压爬升模板架体爬升时，说法正确的是（\n）。\nA.爬模装置爬升时，承载体受力处混凝土的强度不应小于lOMPa\nB.架体爬升前，应清除操作平台上的堆料\nC.防坠爬升器的工作状态应与导轨或架体的爬升状态相一致\nD.导轨爬升前，导轨锁定销键和导轨底部调节支腿应处于松开状态\n\n=== 第782页 ===\nE.架体爬升到位后，应及时建立下层附墙连接装置", "options": {"A": "爬模装置爬升时，承载体受力处混凝土的强度不应小于lOMPa", "B": "架体爬升前，应清除操作平台上的堆料", "C": "防坠爬升器的工作状态应与导轨或架体的爬升状态相一致", "D": "导轨爬升前，导轨锁定销键和导轨底部调节支腿应处于松开状态 === 第782页 ===", "E": "架体爬升到位后，应及时建立下层附墙连接装置"}, "answer": "ABCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2228, "question": "液压爬升模板上架体高度、宽度应能满足（\n）的需要。\nA.支模\nB.脱模\nC.绑扎钢筋\nD.浇筑混凝土\nE.堆载材料", "options": {"A": "支模", "B": "脱模", "C": "绑扎钢筋", "D": "浇筑混凝土", "E": "堆载材料"}, "answer": "ABCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2229, "question": "液压爬升模板下架体高度应能满足（\n）的安装和施工需求。\nA.模板\nB.油缸\nC.导轨\nD.挂钩连接座\nE.吊平台", "options": {"A": "模板", "B": "油缸", "C": "导轨", "D": "挂钩连接座", "E": "吊平台"}, "answer": "BCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2230, "question": "矿山法隧道检查评定保证项目包括（\n）。\nA.方案与交底\nB.洞口及交叉口工程\nC.地层超前支护加固\nD.隧道开挖、爆破\nE.初期支护、监测\n\n=== 第783页 ===", "options": {"A": "方案与交底", "B": "洞口及交叉口工程", "C": "地层超前支护加固", "D": "隧道开挖、爆破", "E": "初期支护、监测 === 第783页 ==="}, "answer": "ABCDE", "type": "multi", "category": "基坑工程"}, {"id": 2231, "question": "矿山法隧道检查评定一般项目包括（\n）。\nA.防水工程\nB.二次衬砌\nC.作业架\nD.隧道施工运输\nE.作业环境", "options": {"A": "防水工程", "B": "二次衬砌", "C": "作业架", "D": "隧道施工运输", "E": "作业环境"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 2232, "question": "隧道施工前应按时测定（\n）的浓度，浓度超限时应采取有效\n处理措施。\nA.粉尘\nB.氧气\nC.二氧化碳\nD.有害气体\nE.氮气", "options": {"A": "粉尘", "B": "氧气", "C": "二氧化碳", "D": "有害气体", "E": "氮气"}, "answer": "AD", "type": "multi", "category": "安全管理"}, {"id": 2233, "question": "矿山法隧道开挖，下列说法正确的是（\n）。\nA.开挖应控制每循环进尺、相邻隧道作业面纵向间距\nB.作业面周围应支护牢固，松动石块应及时清理\nC.不良地质地段掌子面应及时支护、封闭\nD.双向开挖面相距15m〜30m 时，应改为单向开挖\nE.双向开挖面相距20m〜40m 时，应改为单向开挖\n\n=== 第784页 ===", "options": {"A": "开挖应控制每循环进尺、相邻隧道作业面纵向间距", "B": "作业面周围应支护牢固，松动石块应及时清理", "C": "不良地质地段掌子面应及时支护、封闭", "D": "双向开挖面相距15m〜30m 时，应改为单向开挖", "E": "双向开挖面相距20m〜40m 时，应改为单向开挖 === 第784页 ==="}, "answer": "ABCD", "type": "multi", "category": "基坑工程"}, {"id": 2234, "question": "矿山法爆破作业，下列说法正确的是（\n）。\nA.爆破器材应具有检验合格证、技术指标和说明书\nB.起爆设备或检测仪表应定期标定\nC.装药量应符合设计要求\nD.爆破作业应在上一循环喷射混凝土终凝大于4h 后进行\nE.爆破时人员、设备与爆破点的距离应大于爆破安全距离，不满足要\n求时，应有安全防护措施", "options": {"A": "爆破器材应具有检验合格证、技术指标和说明书", "B": "起爆设备或检测仪表应定期标定", "C": "装药量应符合设计要求", "D": "爆破作业应在上一循环喷射混凝土终凝大于4h 后进行", "E": "爆破时人员、设备与爆破点的距离应大于爆破安全距离，不满足要 求时，应有安全防护措施"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 2235, "question": "隧道施工运输，下列说法正确的是（\n）。\nA.竖井垂直运输材料过程中，井下作业人员应撤离至安全地带\nB.运输车辆应有产品合格证明\nC.洞内运输车辆应制动有效，不得人料混载、超载、超宽、超高运输\nD.洞内车辆照明、信号系统应完善\nE.隧道内车辆行驶道路应畅通，不得有堆积物料、积泥（水）等影响\n车辆通行", "options": {"A": "竖井垂直运输材料过程中，井下作业人员应撤离至安全地带", "B": "运输车辆应有产品合格证明", "C": "洞内运输车辆应制动有效，不得人料混载、超载、超宽、超高运输", "D": "洞内车辆照明、信号系统应完善", "E": "隧道内车辆行驶道路应畅通，不得有堆积物料、积泥（水）等影响 车辆通行"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 2236, "question": "满堂支撑架竖向剪刀撑斜杆与地面倾角可以为（\n）。\nA.40°\nB.45°\nC.50°\nD.60°\n\n=== 第785页 ===\nE.65°", "options": {"A": "40°", "B": "45°", "C": "50°", "D": "60° === 第785页 ===", "E": "65°"}, "answer": "BCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2237, "question": "满堂支撑架水平剪刀撑与支架纵向（或横向）夹角可以为（\n）。\nA.40°\nB.45°\nC.50°\nD.60°\nE.65°", "options": {"A": "40°", "B": "45°", "C": "50°", "D": "60°", "E": "65°"}, "answer": "BCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2238, "question": "满堂支撑脚手架的永久荷载包括（\n）。\nA.架体结构自重\nB.模板及支撑梁等的自重\nC.作用在模板上的混凝土和钢筋的自重\nD.施工荷载\nE.风荷载", "options": {"A": "架体结构自重", "B": "模板及支撑梁等的自重", "C": "作用在模板上的混凝土和钢筋的自重", "D": "施工荷载", "E": "风荷载"}, "answer": "ABC", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2239, "question": "满堂支撑脚手架的可变荷载包括（\n）。\nA.架体结构自重\nB.施工荷载\nC.风荷载\nD.模板及支撑梁等的自重\nE.其他可变荷载\n\n=== 第786页 ===", "options": {"A": "架体结构自重", "B": "施工荷载", "C": "风荷载", "D": "模板及支撑梁等的自重", "E": "其他可变荷载 === 第786页 ==="}, "answer": "BCE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2240, "question": "爬模专项施工方案应包括（\n）。\nA.工程概况和编制依据\nB.爬模施工部署\nC.爬模装置设计\nD.爬模主要施工方法及措施\nE.施工管理措施", "options": {"A": "工程概况和编制依据", "B": "爬模施工部署", "C": "爬模装置设计", "D": "爬模主要施工方法及措施", "E": "施工管理措施"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 2241, "question": "爬模模板应满足（\n）的要求。\nA.强度\nB.刚度\nC.平整度\nD.美观\nE.周转次数", "options": {"A": "强度", "B": "刚度", "C": "平整度", "D": "美观", "E": "周转次数"}, "answer": "ABCE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2242, "question": "爬模模板连接可采用（\n）。\nA.螺栓\nB.钢销\nC.模板卡具\nD.铆钉\nE.卡环", "options": {"A": "螺栓", "B": "钢销", "C": "模板卡具", "D": "铆钉", "E": "卡环"}, "answer": "ABC", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2243, "question": "爬模装置包括（\n）。\nA.模板系统\nB.架体与操作平台系统\nC.液压爬升系统\nD.电气控制系统\nE.动力系统", "options": {"A": "模板系统", "B": "架体与操作平台系统", "C": "液压爬升系统", "D": "电气控制系统", "E": "动力系统"}, "answer": "ABCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2244, "question": "顶进工作井位置选择应符合下列规定（\n）。\nA.宜选择在管道井室位置\nB.便于排水、排泥、出土和运输\nC.尽量避开现有构（建）筑物，减小施工扰动对周围环境的影响\nD.顶管单向顶进时宜设在下游一侧\nE.顶管单向顶进时宜设在上游一侧", "options": {"A": "宜选择在管道井室位置", "B": "便于排水、排泥、出土和运输", "C": "尽量避开现有构（建）筑物，减小施工扰动对周围环境的影响", "D": "顶管单向顶进时宜设在下游一侧", "E": "顶管单向顶进时宜设在上游一侧"}, "answer": "ABCD", "type": "multi", "category": "法律法规"}, {"id": 2245, "question": "以下模板工程属于危大工程范围的有（\n）。\nA.爬模\nB.滑模\nC.飞模\nD.隧道模\nE.铝模", "options": {"A": "爬模", "B": "滑模", "C": "飞模", "D": "隧道模", "E": "铝模"}, "answer": "ABCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2246, "question": "以下模板支撑工程专项施工方案需要进行论证的有（\n）。\n\n=== 第788页 ===\nA.搭设高度7m\nB.搭设跨度15m\nC.搭设高度11m\nD.搭设跨度20m\nE.施工总荷载16kN/m²", "options": {"A": "搭设高度7m", "B": "搭设跨度15m", "C": "搭设高度11m", "D": "搭设跨度20m", "E": "施工总荷载16kN/m²"}, "answer": "CDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2247, "question": "以下模板工程属于超过一定规模的危大工程的有（\n）。\nA.爬模\nB.滑模\nC.飞模\nD.隧道模\nE.铝模", "options": {"A": "爬模", "B": "滑模", "C": "飞模", "D": "隧道模", "E": "铝模"}, "answer": "ABCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2248, "question": "下列哪些人应参加高支模工程的验收（\n）。\nA.总包单位技术负责人\nB.总包单位项目经理\nC.监理单位总监理工程师\nD.监理单位总专业监理工程师\nE.专项方案编制人员", "options": {"A": "总包单位技术负责人", "B": "总包单位项目经理", "C": "监理单位总监理工程师", "D": "监理单位总专业监理工程师", "E": "专项方案编制人员"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 2249, "question": "下列情况支撑脚手架安全等级为Ⅰ级的是（\n）。\nA.总荷载18kN/m²\n\n=== 第789页 ===\nB.总荷载14kN/m²\nC.集中线荷载16kN/m\nD.集中线荷载21kN/m\nE.单点集中荷载8kN", "options": {"A": "总荷载18kN/m² === 第789页 ===", "B": "总荷载14kN/m²", "C": "集中线荷载16kN/m", "D": "集中线荷载21kN/m", "E": "单点集中荷载8kN"}, "answer": "ADE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2250, "question": "下列情况支撑脚手架安全等级为Ⅱ级的是（\n）。\nA.总荷载18kN/m²\nB.总荷载14kN/m²\nC.集中线荷载16kN/m\nD.集中线荷载21kN/m\nE.单点集中荷载8kN", "options": {"A": "总荷载18kN/m²", "B": "总荷载14kN/m²", "C": "集中线荷载16kN/m", "D": "集中线荷载21kN/m", "E": "单点集中荷载8kN"}, "answer": "BC", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2251, "question": "当支撑脚手架同时满足下列（\n）条件时，可不设置竖向、水\n平剪刀撑。\nA.搭设高度小于5m，架体高宽比小于1.5\nB.被支承结构自重面荷载不大于5kN/m²；线荷载不大于8kN/m\nC.杆件连接节点的转动刚度符合标准要求\nD.架体结构与既有建筑结构可靠连接\nE.立杆基础均匀，满足承载力要求", "options": {"A": "搭设高度小于5m，架体高宽比小于1.5", "B": "被支承结构自重面荷载不大于5kN/m²；线荷载不大于8kN/m", "C": "杆件连接节点的转动刚度符合标准要求", "D": "架体结构与既有建筑结构可靠连接", "E": "立杆基础均匀，满足承载力要求"}, "answer": "ABCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2252, "question": "模板及支架宜选用（\n）的材料。\nA.轻质\n\n=== 第790页 ===\nB.高强\nC.耐用\nD.防冻\nE.防火", "options": {"A": "轻质 === 第790页 ===", "B": "高强", "C": "耐用", "D": "防冻", "E": "防火"}, "answer": "ABC", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2253, "question": "模板及支架设计内容包括（\n）。\nA.模板及支架的选型及构造设计\nB.模板及支架上的荷载及其效应计算\nC.模板及支架的承载力、刚度验算\nD.模板及支架的抗倾覆验算\nE.绘制模板及支架施工图", "options": {"A": "模板及支架的选型及构造设计", "B": "模板及支架上的荷载及其效应计算", "C": "模板及支架的承载力、刚度验算", "D": "模板及支架的抗倾覆验算", "E": "绘制模板及支架施工图"}, "answer": "ABCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2254, "question": "支架立柱和竖向模板安装在土层上时，说法正确的是（\n）。\nA.应设置具有足够强度和支承面积的垫板\nB.土层应坚实，并应有排水措施\nC.对湿陷性黄土、膨胀土，应有防水措施\nD.对冻胀性土，应有防冻胀措施\nE.立杆直接落在土层上", "options": {"A": "应设置具有足够强度和支承面积的垫板", "B": "土层应坚实，并应有排水措施", "C": "对湿陷性黄土、膨胀土，应有防水措施", "D": "对冻胀性土，应有防冻胀措施", "E": "立杆直接落在土层上"}, "answer": "ABCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2255, "question": "关于模板拆除的要求，说法正确的是（\n）。\nA.先支的后拆\nB.后支的先拆\n\n=== 第791页 ===\nC.先拆非承重模板\nD.后拆承重模板\nE.从上而下拆除", "options": {"A": "先支的后拆", "B": "后支的先拆 === 第791页 ===", "C": "先拆非承重模板", "D": "后拆承重模板", "E": "从上而下拆除"}, "answer": "ABCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2256, "question": "下列哪些混凝土构件拆底模需要到75%设计强度（\n）。\nA.跨度2m 的板\nB.跨度8m 的板\nC.跨度4m 的梁\nD.跨度8m 的梁\nE.跨度10m 的梁", "options": {"A": "跨度2m 的板", "B": "跨度8m 的板", "C": "跨度4m 的梁", "D": "跨度8m 的梁", "E": "跨度10m 的梁"}, "answer": "BCDE", "type": "multi", "category": "安全管理"}, {"id": 2257, "question": "多个楼层间连续支模的底层支架拆除时间，应根据（\n）确定。\nA.连续支模楼层间的荷载分配\nB.楼层高度\nC.混凝土强度增长情况\nD.混凝土标号\nE.模板强度", "options": {"A": "连续支模楼层间的荷载分配", "B": "楼层高度", "C": "混凝土强度增长情况", "D": "混凝土标号", "E": "模板强度"}, "answer": "AC", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2258, "question": "碗扣式架体立杆的碗扣节点由（\n）构成。\nA.上碗扣\nB.下碗扣\nC.水平杆接头\n\n=== 第792页 ===\nD.限位销\nE.插槽", "options": {"A": "上碗扣", "B": "下碗扣", "C": "水平杆接头 === 第792页 ===", "D": "限位销", "E": "插槽"}, "answer": "ABCD", "type": "multi", "category": "安全管理"}, {"id": 2259, "question": "碗扣式支撑架节点间距，说法正确的是（\n）。\nA.Q235 级材质钢管立杆宜按0．5m 模数\nB.Q235 级材质钢管立杆宜按0．6m 模数\nC.Q345 级材质钢管立杆宜按0．5m 模数\nD.Q345 级材质钢管立杆宜按0．6m 模数\nE.Q345 级材质钢管立杆宜按0．8m 模数", "options": {"A": "Q235 级材质钢管立杆宜按0．5m 模数", "B": "Q235 级材质钢管立杆宜按0．6m 模数", "C": "Q345 级材质钢管立杆宜按0．5m 模数", "D": "Q345 级材质钢管立杆宜按0．6m 模数", "E": "Q345 级材质钢管立杆宜按0．8m 模数"}, "answer": "BC", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2260, "question": "当立杆采用Q235 级材质钢管时，碗扣式支撑架步距可以为\n（\n）m。\nA.0.5\nB.1.0\nC.1.2\nD.1.8\nE.2.0", "options": {"A": "0.5", "B": "1.0", "C": "1.2", "D": "1.8", "E": "2.0"}, "answer": "CD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2261, "question": "当立杆采用Q345 级材质钢管时，碗扣式支撑架立杆间距可以为\n（\n）m。\nA.1.2\nB.1.5\n\n=== 第793页 ===\nC.1.8\nD.2.1\nE.2.4", "options": {"A": "1.2", "B": "1.5 === 第793页 ===", "C": "1.8", "D": "2.1", "E": "2.4"}, "answer": "ABC", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2262, "question": "碗扣式模板支撑架搭设，说法正确的是（\n）。\nA.按先立杆、后水平杆、再斜杆的顺序搭设\nB.按先立杆、后斜杆、再水平杆的顺序搭设\nC.以基本架体单元逐排、逐层扩展\nD.每层搭设高度不宜大于3m\nE.每层搭设高度不宜大于4m", "options": {"A": "按先立杆、后水平杆、再斜杆的顺序搭设", "B": "按先立杆、后斜杆、再水平杆的顺序搭设", "C": "以基本架体单元逐排、逐层扩展", "D": "每层搭设高度不宜大于3m", "E": "每层搭设高度不宜大于4m"}, "answer": "ACD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2263, "question": "当有下列情况之一时，碗扣式支撑架宜按现行行业标准规定对\n模板支撑架及地基进行预压（\n）。\nA.承受重载或设计有特殊要求时\nB.地基为不良地质条件时\nC.拟浇筑构件跨度大、对成型线形有要求时\nD.架体搭设超过8m 时\nE.架体搭设跨度超过18m 时", "options": {"A": "承受重载或设计有特殊要求时", "B": "地基为不良地质条件时", "C": "拟浇筑构件跨度大、对成型线形有要求时", "D": "架体搭设超过8m 时", "E": "架体搭设跨度超过18m 时"}, "answer": "ABC", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2264, "question": "门式支撑架的搭设参数，说法正确的是（\n）。\nA.跨距≤1.5m\nB.列距≤1.8m\n\n=== 第794页 ===\nC.搭设高度≤30m\nD.高宽比≤3\nE.高宽比≤5", "options": {"A": "跨距≤1.5m", "B": "列距≤1.8m === 第794页 ===", "C": "搭设高度≤30m", "D": "高宽比≤3", "E": "高宽比≤5"}, "answer": "AB", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2265, "question": "安全等级为Ⅰ级的满堂支撑架，平行于门架平面的水平加固杆\n应按（\n）各设置一道。\nA.在架体顶部和沿高度方向不大于2 步\nB.在架体顶部和沿高度方向不大于3 步\nC.在架体外侧和水平方向间隔不大于2 个跨距\nD.在架体外侧和水平方向间隔不大于3 个跨距\nE.在架体外侧和水平方向间隔不大于4 个跨距", "options": {"A": "在架体顶部和沿高度方向不大于2 步", "B": "在架体顶部和沿高度方向不大于3 步", "C": "在架体外侧和水平方向间隔不大于2 个跨距", "D": "在架体外侧和水平方向间隔不大于3 个跨距", "E": "在架体外侧和水平方向间隔不大于4 个跨距"}, "answer": "AC", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2266, "question": "安全等级为Ⅰ级的门式满堂支撑架，垂直于门架平面的水平加\n固杆应按（\n）各设置一道。\nA.在架体顶部和沿高度方向不大于2 步\nB.在架体顶部和沿高度方向不大于3 步\nC.在架体外侧和水平方向间隔不大于2 个列距\nD.在架体外侧和水平方向间隔不大于3 个列距\nE.在架体外侧和水平方向间隔不大于4 个列距", "options": {"A": "在架体顶部和沿高度方向不大于2 步", "B": "在架体顶部和沿高度方向不大于3 步", "C": "在架体外侧和水平方向间隔不大于2 个列距", "D": "在架体外侧和水平方向间隔不大于3 个列距", "E": "在架体外侧和水平方向间隔不大于4 个列距"}, "answer": "AC", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2267, "question": "安全等级为Ⅰ级的门式满堂支撑架，竖向剪刀撑应按下列要求\n设置（\n）。\n\n=== 第795页 ===\nA.平行于门架平面的竖向剪刀撑应在架体外侧和水平间隔不大于4\n个跨距各设置一道\nB.平行于门架平面的竖向剪刀撑应在架体外侧和水平间隔不大于5\n个跨距各设置一道\nC.垂直于门架平面的竖向剪刀撑应在架体外侧和水平间隔不大于4\n个列距各设置一道\nD.垂直于门架平面的竖向剪刀撑应在架体外侧和水平间隔不大于5\n个列距各设置一道\nE.每道竖向剪刀撑的宽度宜为4 个跨距", "options": {"A": "平行于门架平面的竖向剪刀撑应在架体外侧和水平间隔不大于4 个跨距各设置一道", "B": "平行于门架平面的竖向剪刀撑应在架体外侧和水平间隔不大于5 个跨距各设置一道", "C": "垂直于门架平面的竖向剪刀撑应在架体外侧和水平间隔不大于4 个列距各设置一道", "D": "垂直于门架平面的竖向剪刀撑应在架体外侧和水平间隔不大于5 个列距各设置一道", "E": "每道竖向剪刀撑的宽度宜为4 个跨距"}, "answer": "ACE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2268, "question": "门式支撑架应设置水平架对架体进行纵向拉结，水平架的设置\n应符合下列规定（\n）。\nA.安全等级为Ⅰ级的满堂支撑架应在架体顶部及沿高度方向间隔不\n大于2 步的每榀门架上连续设置\nB.安全等级为Ⅰ级的满堂支撑架应在架体顶部及沿高度方向间隔不\n大于3 步的每榀门架上连续设置\nC.安全等级为Ⅱ级的满堂支撑架应在架体顶部及沿高度方向间隔不\n大于4 步的每榀门架上连续设置\nD.安全等级为Ⅱ级的满堂支撑架应在架体顶部及沿高度方向间隔不\n大于5 步的每榀门架上连续设置\nE.搭设高度小于3m 时可不设", "options": {"A": "安全等级为Ⅰ级的满堂支撑架应在架体顶部及沿高度方向间隔不 大于2 步的每榀门架上连续设置", "B": "安全等级为Ⅰ级的满堂支撑架应在架体顶部及沿高度方向间隔不 大于3 步的每榀门架上连续设置", "C": "安全等级为Ⅱ级的满堂支撑架应在架体顶部及沿高度方向间隔不 大于4 步的每榀门架上连续设置", "D": "安全等级为Ⅱ级的满堂支撑架应在架体顶部及沿高度方向间隔不 大于5 步的每榀门架上连续设置", "E": "搭设高度小于3m 时可不设"}, "answer": "AC", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2269, "question": "对于高宽比大于2 的门式支撑架，宜采取设置缆风绳或连墙件\n等有效措施防止架体倾覆，缆风绳或连墙件做法正确的是（\n）。\nA.在架体外侧周边水平间距不宜超过8m\nB.竖向间距不宜超过4 步\nC.宜与竖向剪刀撑或水平加固杆的位置对应设置\nD.在架体外侧周边水平间距不宜超过6m\nE.竖向间距不宜超过5 步", "options": {"A": "在架体外侧周边水平间距不宜超过8m", "B": "竖向间距不宜超过4 步", "C": "宜与竖向剪刀撑或水平加固杆的位置对应设置", "D": "在架体外侧周边水平间距不宜超过6m", "E": "竖向间距不宜超过5 步"}, "answer": "ABC", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2270, "question": "当门式支撑架中间设置通道口时，说法正确的是（\n）。\nA.通道口底层门架可不设垂直通道方向的水平加固杆和扫地杆\nB.通道口底层门架应设垂直通道方向的水平加固杆和扫地杆\nC.通道口上部两侧应设置斜撑杆\nD.通道口上部两侧可不设置斜撑杆\nE.通道口上部设置防护层", "options": {"A": "通道口底层门架可不设垂直通道方向的水平加固杆和扫地杆", "B": "通道口底层门架应设垂直通道方向的水平加固杆和扫地杆", "C": "通道口上部两侧应设置斜撑杆", "D": "通道口上部两侧可不设置斜撑杆", "E": "通道口上部设置防护层"}, "answer": "ACE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2271, "question": "盘扣式支撑架计算内容包括（\n）。\nA.立杆的稳定性计算\nB.独立支撑架超出规定高宽比时的抗倾覆验算\nC.纵横向水平杆承载力计算\nD.当通过立杆连接盘传力时的连接盘抗剪承载力验算\nE.立杆地基承载力计算", "options": {"A": "立杆的稳定性计算", "B": "独立支撑架超出规定高宽比时的抗倾覆验算", "C": "纵横向水平杆承载力计算", "D": "当通过立杆连接盘传力时的连接盘抗剪承载力验算", "E": "立杆地基承载力计算"}, "answer": "ABCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2272, "question": "对标准步距为1.5m 的盘扣式支撑架，应根据支撑架（\n）设\n置竖向斜杆。\nA.支撑架搭设高度\nB.支撑架搭设跨度\nC.支撑架型号\nD.立杆轴向力设计值\nE.立杆间距", "options": {"A": "支撑架搭设高度", "B": "支撑架搭设跨度", "C": "支撑架型号", "D": "立杆轴向力设计值", "E": "立杆间距"}, "answer": "ACD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2273, "question": "当以独立塔架形式搭设盘扣式支撑架时，可沿高度间隔（\n）\n个步距与相邻的独立塔架水平拉结。\nA.1\nB.2\nC.3\nD.4\nE.5", "options": {"A": "1", "B": "2", "C": "3", "D": "4", "E": "5"}, "answer": "BCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2274, "question": "盘扣式支撑架拆除作业，说法正确的是（\n）。\nA.先装先拆\nB.先装后拆\nC.后装先拆\nD.后装后拆\nE.不得上下同时作业\n\n=== 第798页 ===", "options": {"A": "先装先拆", "B": "先装后拆", "C": "后装先拆", "D": "后装后拆", "E": "不得上下同时作业 === 第798页 ==="}, "answer": "BCE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2275, "question": "在纵、横方向，由不少于三排立杆并与（\n）等构成的脚手架。\n该架体顶部作业层施工荷载通过水平杆传递给立杆，顶部立杆呈偏心\n受压状态，称为满堂扣件式钢管脚手架。\nA.水平杆\nB.水平剪刀撑\nC.竖向剪刀撑\nD.扣件\nE.刀卡", "options": {"A": "水平杆", "B": "水平剪刀撑", "C": "竖向剪刀撑", "D": "扣件", "E": "刀卡"}, "answer": "ABCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2276, "question": "贴近楼（地）面设置，连接立杆根部的纵、横向水平杆件，称\n为扫地杆。包括（\n）扫地杆。\nA.纵向\nB.横向\nC.水平\nD.垂直\nE.斜向", "options": {"A": "纵向", "B": "横向", "C": "水平", "D": "垂直", "E": "斜向"}, "answer": "AB", "type": "multi", "category": "安全管理"}, {"id": 2277, "question": "脚手架的主节点是指：（\n）三杆紧靠的扣接点。\nA.立杆\nB.抛撑\nC.纵向水平杆\n\n=== 第799页 ===\nD.横向水平杆\nE.剪刀撑", "options": {"A": "立杆", "B": "抛撑", "C": "纵向水平杆 === 第799页 ===", "D": "横向水平杆", "E": "剪刀撑"}, "answer": "ACD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2278, "question": "扣件包括有（\n）等几种。\nA.直角扣件\nB.斜角扣件\nC.旋转扣件\nD.对接扣件\nE.平行扣件", "options": {"A": "直角扣件", "B": "斜角扣件", "C": "旋转扣件", "D": "对接扣件", "E": "平行扣件"}, "answer": "ACD", "type": "multi", "category": "安全管理"}, {"id": 2279, "question": "脚手架每根立杆底部宜设置（\n）或（\n）。\nA.底座\nB.扫天杆\nC.垫板\nD.顶托\nE.扣件", "options": {"A": "底座", "B": "扫天杆", "C": "垫板", "D": "顶托", "E": "扣件"}, "answer": "AC", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2280, "question": "连墙杆必须采用可承受（\n）的构造。\nA.拉力\nB.扭力\nC.压力\nD.剪切力\n\n=== 第800页 ===\nE.弯矩", "options": {"A": "拉力", "B": "扭力", "C": "压力", "D": "剪切力 === 第800页 ===", "E": "弯矩"}, "answer": "AC", "type": "multi", "category": "安全管理"}, {"id": 2281, "question": "在主节点处固定（\n）等用的直角扣件、旋转扣件的中心点的\n相互距离不应大于150mm。\nA.横向水平杆\nB.纵向水平杆\nC.剪刀撑\nD.横向斜撑\nE.脚手板", "options": {"A": "横向水平杆", "B": "纵向水平杆", "C": "剪刀撑", "D": "横向斜撑", "E": "脚手板"}, "answer": "ABCD", "type": "multi", "category": "安全管理"}, {"id": 2282, "question": "脚手架及其地基基础应在下列阶段进行检查与验收（\n）。\nA.基础完工后及脚手架搭设前\nB.作业层上施加荷载前\nC.达到设计高度后\nD.停用超过一周\nE.每搭设完6m—8m 高度后", "options": {"A": "基础完工后及脚手架搭设前", "B": "作业层上施加荷载前", "C": "达到设计高度后", "D": "停用超过一周", "E": "每搭设完6m—8m 高度后"}, "answer": "ABCE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2283, "question": "脚手架使用中，应定期检查下列要求内容（\n）。\nA.应无超载使用\nB.安全防护措施应符合规范要求\nC.扣件螺栓应无松动\nD.地基应无积水，底座无松动，立杆应无悬空\n\n=== 第801页 ===\nE.不需要检查", "options": {"A": "应无超载使用", "B": "安全防护措施应符合规范要求", "C": "扣件螺栓应无松动", "D": "地基应无积水，底座无松动，立杆应无悬空 === 第801页 ===", "E": "不需要检查"}, "answer": "ABCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2284, "question": "在脚手架使用期间，严禁拆除下列杆件（\n）。\nA.主节点处的纵向水平杆\nB.主节点处的横向水平杆\nC.连墙件\nD.纵向扫地杆\nE.横向扫地杆", "options": {"A": "主节点处的纵向水平杆", "B": "主节点处的横向水平杆", "C": "连墙件", "D": "纵向扫地杆", "E": "横向扫地杆"}, "answer": "ABCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2285, "question": "脚手架的设计、搭设、使用和维护应满足下列要求（\n）。\nA.应能承受设计荷载\nB.结构应稳固，不得发生影响正常使用的变形\nC.应满足使用要求，具有安全防护功能\nD.在使用中，脚手架结构性能不得发生明显改变\nE.当遇意外作用或偶然超载时，不得发生整体破坏", "options": {"A": "应能承受设计荷载", "B": "结构应稳固，不得发生影响正常使用的变形", "C": "应满足使用要求，具有安全防护功能", "D": "在使用中，脚手架结构性能不得发生明显改变", "E": "当遇意外作用或偶然超载时，不得发生整体破坏"}, "answer": "ABCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2286, "question": "脚手架应（\n）。\nA.构造合理\nB.连接牢固\nC.搭设与拆除方便\nD.使用安全可靠\nE.要做专家论证\n\n=== 第802页 ===", "options": {"A": "构造合理", "B": "连接牢固", "C": "搭设与拆除方便", "D": "使用安全可靠", "E": "要做专家论证 === 第802页 ==="}, "answer": "ABCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2287, "question": "脚手架的永久荷载应包括（\n）。\nA.脚手架结构件自重\nB.脚手板、安全网、栏杆等附件的自重\nC.支撑脚手架的支承体系自重\nD.支撑脚手架之上的建筑结构材料及堆放物的自重\nE.其他可按永久荷载计算的荷载", "options": {"A": "脚手架结构件自重", "B": "脚手板、安全网、栏杆等附件的自重", "C": "支撑脚手架的支承体系自重", "D": "支撑脚手架之上的建筑结构材料及堆放物的自重", "E": "其他可按永久荷载计算的荷载"}, "answer": "ABCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2288, "question": "脚手架的可变荷载应包括（\n）。\nA.施工荷载\nB.风荷载\nC.其他可变荷载\nD.脚手架自重\nE.脚手板自重", "options": {"A": "施工荷载", "B": "风荷载", "C": "其他可变荷载", "D": "脚手架自重", "E": "脚手板自重"}, "answer": "ABC", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2289, "question": "作业脚手架连墙件应采用能承受（\n）的构造，并应与建筑结\n构和架体连接牢固。\nA.剪力\nB.摩擦力\nC.拉力\nD.压力\nE.扭力\n\n=== 第803页 ===", "options": {"A": "剪力", "B": "摩擦力", "C": "拉力", "D": "压力", "E": "扭力 === 第803页 ==="}, "answer": "CD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2290, "question": "脚手架在使用过程中应分阶段进行（\n）。\nA.检查\nB.监护\nC.维护\nD.保养\nE.探伤检测", "options": {"A": "检查", "B": "监护", "C": "维护", "D": "保养", "E": "探伤检测"}, "answer": "ABCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2291, "question": "施工现场应建立脚手架工程施工（\n）和（\n）制度。\nA.安全管理体系\nB.安全检查\nC.安全考核\nD.安全教育\nE.应急救援", "options": {"A": "安全管理体系", "B": "安全检查", "C": "安全考核", "D": "安全教育", "E": "应急救援"}, "answer": "ABC", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2292, "question": "脚手架在使用过程中，应定期进行检查，检查项目应符合下列\n规定（\n）。\nA.主要受力杆件，剪刀撑等加固杆件，连墙件应无缺失、无松动，架\n体应无明显变形\nB.场地应无积水，立杆底端应无松动、无悬空\nC.安全防护设施应齐全、有效，应无损坏缺失\nD.附着式升降脚手架支座应牢固，防倾、防坠装置应处于良好工作状\n\n=== 第804页 ===\n态，架体升降应正常平稳\nE.悬挑脚手架的悬挑支承结构应固定牢固", "options": {"A": "主要受力杆件，剪刀撑等加固杆件，连墙件应无缺失、无松动，架 体应无明显变形", "B": "场地应无积水，立杆底端应无松动、无悬空", "C": "安全防护设施应齐全、有效，应无损坏缺失", "D": "附着式升降脚手架支座应牢固，防倾、防坠装置应处于良好工作状 === 第804页 === 态，架体升降应正常平稳", "E": "悬挑脚手架的悬挑支承结构应固定牢固"}, "answer": "ABCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2293, "question": "当脚手架遇有下列情况之一时，应进行检查，确认安全后方可\n继续使用（\n）。\nA.遇有6 级及以上强风或大雨过后\nB.冻结的地基土解冻后\nC.停用超过1 个月\nD.架体部分拆除\nE.其他特殊情况", "options": {"A": "遇有6 级及以上强风或大雨过后", "B": "冻结的地基土解冻后", "C": "停用超过1 个月", "D": "架体部分拆除", "E": "其他特殊情况"}, "answer": "ABCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2294, "question": "严禁将（\n）固定在作业脚手架上。\nA.支撑脚手架\nB.缆风绳\nC.混凝土输送泵管\nD.卸料平台\nE.大型设备的支承件", "options": {"A": "支撑脚手架", "B": "缆风绳", "C": "混凝土输送泵管", "D": "卸料平台", "E": "大型设备的支承件"}, "answer": "ABCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2295, "question": "（\n）天气应停止脚手架的搭设和拆除作业。\nA.晴\nB.阴\nC.雨\n\n=== 第805页 ===\nD.雪\nE.雾", "options": {"A": "晴", "B": "阴", "C": "雨 === 第805页 ===", "D": "雪", "E": "雾"}, "answer": "CDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2296, "question": "（\n）后上架作业应采取有效的防滑措施，并应清除积雪。\nA.霜\nB.阴\nC.雨\nD.雪\nE.雾", "options": {"A": "霜", "B": "阴", "C": "雨", "D": "雪", "E": "雾"}, "answer": "ACD", "type": "multi", "category": "安全管理"}, {"id": 2297, "question": "在脚手架作业层上进行（\n）作业时，应采取防火措施，并应\n设专人监护。\nA.打孔\nB.动火\nC.气焊\nD.抹灰\nE.电焊", "options": {"A": "打孔", "B": "动火", "C": "气焊", "D": "抹灰", "E": "电焊"}, "answer": "BCE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2298, "question": "在搭设和拆除脚手架作业时，应设置（\n），并应派专人监护，\n严禁非作业人员入内。\nA.安全警戒线\nB.警戒标志\n\n=== 第806页 ===\nC.公示牌\nD.灭火器\nE.临边防护", "options": {"A": "安全警戒线", "B": "警戒标志 === 第806页 ===", "C": "公示牌", "D": "灭火器", "E": "临边防护"}, "answer": "AB", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2299, "question": "连墙杆是保证脚手架稳定最重要的杆件，应靠近主节点设置，\n可采用（\n）布置。\nA.圆形\nB.菱形\nC.方形\nD.矩形\nE.平行", "options": {"A": "圆形", "B": "菱形", "C": "方形", "D": "矩形", "E": "平行"}, "answer": "BCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2300, "question": "高处作业吊篮必须使用厂家生产的定型产品，设备要有（\n）。\nA.实验报告\nB.制造许可证\nC.产品合格证\nD.产品使用说明书\nE.安全教育交底", "options": {"A": "实验报告", "B": "制造许可证", "C": "产品合格证", "D": "产品使用说明书", "E": "安全教育交底"}, "answer": "BCD", "type": "multi", "category": "高处作业"}, {"id": 2301, "question": "两台以上蛙式打夯机同时作业时，左右间距不少于（\n）m，\n前后不小于（\n）m 的安全距离。\nA.3\n\n=== 第807页 ===\nB.5\nC.6\nD.8\nE.10", "options": {"A": "3 === 第807页 ===", "B": "5", "C": "6", "D": "8", "E": "10"}, "answer": "BE", "type": "multi", "category": "安全管理"}, {"id": 2302, "question": "滑轮按中心轴的位置是否移动可分为（\n）。\nA.导向滑轮\nB.平衡滑轮\nC.定滑轮\nD.动滑轮\nE.滑轮组", "options": {"A": "导向滑轮", "B": "平衡滑轮", "C": "定滑轮", "D": "动滑轮", "E": "滑轮组"}, "answer": "CD", "type": "multi", "category": "安全管理"}, {"id": 2303, "question": "5.5kW 以上电动机开关箱中电器配置组合可以是（\n）。\nA.刀开关、断路器、漏电保护器\nB.断路器、漏电保护器\nC.刀开关、漏电断路器\nD.刀开关、断路器\nE.具有可见分断点的断路器、漏电保护器", "options": {"A": "刀开关、断路器、漏电保护器", "B": "断路器、漏电保护器", "C": "刀开关、漏电断路器", "D": "刀开关、断路器", "E": "具有可见分断点的断路器、漏电保护器"}, "answer": "ACE", "type": "multi", "category": "用电安全"}, {"id": 2304, "question": "在桅杆滑移法吊装试吊过程中，发现有哪些现象时，应立即停\n止吊装或者使工件复位，判明原因妥善处理，经有关人员确认安全后，\n方可进行试吊（\n）。\n\n=== 第808页 ===\nA.地锚冒顶、位移\nB.钢丝绳抖动\nC.设备或机具有异常声响、变形、裂纹\nD.桅杆地基下沉\nE.其他异常情况", "options": {"A": "地锚冒顶、位移", "B": "钢丝绳抖动", "C": "设备或机具有异常声响、变形、裂纹", "D": "桅杆地基下沉", "E": "其他异常情况"}, "answer": "ABCDE", "type": "multi", "category": "特种设备"}, {"id": 2305, "question": "以下哪些属于特种设备（\n）。\nA.电梯\nB.起重机械\nC.危险性较大的锅炉\nD.混凝土振动棒\nE.钢筋切断机", "options": {"A": "电梯", "B": "起重机械", "C": "危险性较大的锅炉", "D": "混凝土振动棒", "E": "钢筋切断机"}, "answer": "ABC", "type": "multi", "category": "特种设备"}, {"id": 2306, "question": "易燃物品仓库内不准使用（\n）等电器器具。\nA.电视机\nB.电冰箱\nC.电熨斗\nD.电烙铁\nE.电炉子", "options": {"A": "电视机", "B": "电冰箱", "C": "电熨斗", "D": "电烙铁", "E": "电炉子"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 2307, "question": "盾构施工过程安全保护措施环节有：（\n）。\nA.盾构机进洞\n\n=== 第809页 ===\nB.盾构机推进开挖\nC.安全教育\nD.盾构机出洞\nE.加强检查", "options": {"A": "盾构机进洞 === 第809页 ===", "B": "盾构机推进开挖", "C": "安全教育", "D": "盾构机出洞", "E": "加强检查"}, "answer": "ABD", "type": "multi", "category": "基坑工程"}, {"id": 2308, "question": "导致炉管爆破的原因主要有（\n）。\nA.水质不良，管子结垢，阻力增大\nB.管道腐蚀、冲刷使管壁减薄\nC.锅水中悬浮物或含盐量过多\nD.管材或焊接缺陷\nE.水循环不良，传热效果差，导致局部管子超温", "options": {"A": "水质不良，管子结垢，阻力增大", "B": "管道腐蚀、冲刷使管壁减薄", "C": "锅水中悬浮物或含盐量过多", "D": "管材或焊接缺陷", "E": "水循环不良，传热效果差，导致局部管子超温"}, "answer": "ABDE", "type": "multi", "category": "安全管理"}, {"id": 2309, "question": "残缺绝缘盖的闸刀开关禁止使用，开关不得采用（\n）线作熔\n断保险丝。\nA.铜\nB.铁\nC.铝\nD.铅\nE.镁", "options": {"A": "铜", "B": "铁", "C": "铝", "D": "铅", "E": "镁"}, "answer": "ABCE", "type": "multi", "category": "用电安全"}, {"id": 2310, "question": "压力表的种类很多可分为（\n）四种。\nA.液柱式\n\n=== 第810页 ===\nB.弹性元件式\nC.电接点式\nD.活塞式\nE.单弹簧管式压力表", "options": {"A": "液柱式 === 第810页 ===", "B": "弹性元件式", "C": "电接点式", "D": "活塞式", "E": "单弹簧管式压力表"}, "answer": "ABCD", "type": "multi", "category": "安全管理"}, {"id": 2311, "question": "下列属于第二类压力容器的有（\n）。\nA.中压容器\nB.移动式压力容器\nC.存贮毒性程度为极度和高度危害介质的低压容器\nD.中压搪玻璃压力容器\nE.低压管壳式余热锅炉", "options": {"A": "中压容器", "B": "移动式压力容器", "C": "存贮毒性程度为极度和高度危害介质的低压容器", "D": "中压搪玻璃压力容器", "E": "低压管壳式余热锅炉"}, "answer": "ACE", "type": "multi", "category": "安全管理"}, {"id": 2312, "question": "低碳钢试件在整个拉伸过程中，应力应变曲线变化分为以下几\n个阶段（\n）。\nA.受力阶段\nB.颈缩阶段\nC.屈服阶段\nD.强化阶段\nE.回弹阶段", "options": {"A": "受力阶段", "B": "颈缩阶段", "C": "屈服阶段", "D": "强化阶段", "E": "回弹阶段"}, "answer": "BCD", "type": "multi", "category": "安全管理"}, {"id": 2313, "question": "下列场所中能使用36V 安全电压照明的是（\n）。\nA.高温\n\n=== 第811页 ===\nB.有导电灰尘\nC.潮湿\nD.易触及带电体\nE.狭窄", "options": {"A": "高温 === 第811页 ===", "B": "有导电灰尘", "C": "潮湿", "D": "易触及带电体", "E": "狭窄"}, "answer": "AB", "type": "multi", "category": "安全管理"}, {"id": 2314, "question": "安装单位应当建立建筑起重机械安装、拆卸工程档案，档案应\n当包括（\n）资料。\nA.安装、拆卸合同及安全协议书\nB.安装、拆卸工程专项施工方案\nC.安全施工技术交底的有关资料\nD.安装工程验收资料\nE.安装、拆卸工程生产安全事故应急救援预案", "options": {"A": "安装、拆卸合同及安全协议书", "B": "安装、拆卸工程专项施工方案", "C": "安全施工技术交底的有关资料", "D": "安装工程验收资料", "E": "安装、拆卸工程生产安全事故应急救援预案"}, "answer": "ABCDE", "type": "multi", "category": "特种设备"}, {"id": 2315, "question": "采用整体安装法吊装塔架时，应符合下列规定：（\n）。\nA.必须保证塔架起扳用的两只扳铰与安装就位的同心度\nB.塔架起扳至80°左右时，应停止起扳，待在起重滑轮组的反向回\n直滑轮组收紧使起重滑轮组失效后，再缓慢放松回直滑轮组将塔架就\n位\nC.用人字拔杆起扳时，其高度不得小于塔架高度的1/3\nD.对起重滑轮组和回直滑轮必须设置地锚\nE.起吊时各吊点应保证均匀受力", "options": {"A": "必须保证塔架起扳用的两只扳铰与安装就位的同心度", "B": "塔架起扳至80°左右时，应停止起扳，待在起重滑轮组的反向回 直滑轮组收紧使起重滑轮组失效后，再缓慢放松回直滑轮组将塔架就 位", "C": "用人字拔杆起扳时，其高度不得小于塔架高度的1/3", "D": "对起重滑轮组和回直滑轮必须设置地锚", "E": "起吊时各吊点应保证均匀受力"}, "answer": "ABCDE", "type": "multi", "category": "特种设备"}, {"id": 2316, "question": "某工地，早晨上班，土建队的木工班继续拆除热电厂蒸发站工\n程7m 高的混凝土平台模板，当一名工人从4-5 轴线中间的钢窗进入\n操作地点时，他左手攀着钢窗开窗器立管跃入室内，工人喊了两声“电\n着我了”。该班长立即跑去找电工切断电源线，土建队电工不清楚，\n直到7、8min 后，才切断电源，触电工人经抢救无效死亡。经查拆除\n的模板钢支架由4.8m 处落下，一端砸断了卷扬机的电源线，另一端\n倒在拆下的钢管上，钢管又搭在钢窗上。判断原因可能是？（\n）\nA.事故的直接原因是卷扬机电源线被轧断后，又与钢管和钢窗相连，\n使钢窗带电，工人手扶钢窗触电死亡\nB.模板拆除前，虽然编写了拆除方案，也做了交底，但对作业环境存\n在的隐患，没有考虑\nC.在拆除方案中，对拆下的钢管和钢支架等如何从高处放下，没有提\n出具体措施，才造成模板支架从4．8m 落下，轧断了电源线\nD.卷扬机与开关箱之间的距离超过了规定的3m\nE.作业人员安全意识较强", "options": {"A": "事故的直接原因是卷扬机电源线被轧断后，又与钢管和钢窗相连， 使钢窗带电，工人手扶钢窗触电死亡", "B": "模板拆除前，虽然编写了拆除方案，也做了交底，但对作业环境存 在的隐患，没有考虑", "C": "在拆除方案中，对拆下的钢管和钢支架等如何从高处放下，没有提 出具体措施，才造成模板支架从4．8m 落下，轧断了电源线", "D": "卷扬机与开关箱之间的距离超过了规定的3m", "E": "作业人员安全意识较强"}, "answer": "ABCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2317, "question": "某公司设备二队铆工班孙×和起重班苏×在结构厂二车间北侧\n露天平台预制方炉钢结构立柱（600 号H 钢，长24.04mm），在柱子\n翻面后吊起摆正过程中（吊起高度240mm），焊工要×和铆工孙×站\n在柱子西端外侧扶着柱子稳住，李×站在南面，孙×站在北面。柱子\n吊起后受扭力作用西端向南转动，孙×将李×推开，跨到柱子南面内\n侧试图将柱子稳住，但由于柱子惯性较大，西端撞在南侧另一根摆放\n\n=== 第813页 ===\n的柱子上，将孙×左小腿挤在中间，造成左下肢胫骨、腓骨骨折。请\n判断事故原因（\n）。\nA.柱子翻身起吊就位时没按规定用四个吊点起吊，而是用2 个点吊点\n造成了不平衡，产生扭力引起柱子转动构成不安全状态。这是事故发\n生的直接原因和主要原因\nB.现场作业面狭窄也是造成事故的重要原因\nC.吊装作业前没有编制专项施工方案，因此对吊装柱子过程的平衡问\n题没有系过设计计算而是凭系验选择\nD.施工人员安全意识差，对违章冒险作业习以为常\nE.作业人员安全意识较强", "options": {"A": "柱子翻身起吊就位时没按规定用四个吊点起吊，而是用2 个点吊点 造成了不平衡，产生扭力引起柱子转动构成不安全状态。这是事故发 生的直接原因和主要原因", "B": "现场作业面狭窄也是造成事故的重要原因", "C": "吊装作业前没有编制专项施工方案，因此对吊装柱子过程的平衡问 题没有系过设计计算而是凭系验选择", "D": "施工人员安全意识差，对违章冒险作业习以为常", "E": "作业人员安全意识较强"}, "answer": "ABCD", "type": "multi", "category": "特种设备"}, {"id": 2318, "question": "某施工现场，一工人徒手推一运砖小铁车碾过一段地面上的电\n焊机电源线（电缆），一声爆裂，该工人倒地身亡。请判断事故原因\n（\n）。\nA.小车将电缆线辗断，电缆破皮漏电工人手扶小铁车触电死亡\nB.电焊机的开关箱中无漏电保护器或漏电保护器失灵\nC.电焊机电源电缆线不应敷设在地面上，应埋地或架设\nD.该推车的工人未戴绝缘手套\nE.作业人员遵守操作规程", "options": {"A": "小车将电缆线辗断，电缆破皮漏电工人手扶小铁车触电死亡", "B": "电焊机的开关箱中无漏电保护器或漏电保护器失灵", "C": "电焊机电源电缆线不应敷设在地面上，应埋地或架设", "D": "该推车的工人未戴绝缘手套", "E": "作业人员遵守操作规程"}, "answer": "ABC", "type": "multi", "category": "用电安全"}, {"id": 2319, "question": "施工升降机作业前应重点检查下列项目，并应符合相应要求：\n（\n）。\n\n=== 第814页 ===\nA.齿条与齿轮、导向轮与导轨应接合正常\nB.运行范围内不得有障碍，安全保护装置应灵敏可靠\nC.钢丝绳应固定良好，不得有异常磨损\nD.结构不得有变形，连接螺栓不得松动\nE.结构轻微变形不影响使用", "options": {"A": "齿条与齿轮、导向轮与导轨应接合正常", "B": "运行范围内不得有障碍，安全保护装置应灵敏可靠", "C": "钢丝绳应固定良好，不得有异常磨损", "D": "结构不得有变形，连接螺栓不得松动", "E": "结构轻微变形不影响使用"}, "answer": "ABCD", "type": "multi", "category": "特种设备"}, {"id": 2320, "question": "施工现场应配备（\n）等急救器材。\nA.常用药\nB.绷带\nC.止血带\nD.担架\nE.救护车", "options": {"A": "常用药", "B": "绷带", "C": "止血带", "D": "担架", "E": "救护车"}, "answer": "ABCD", "type": "multi", "category": "事故处理"}, {"id": 2321, "question": "施工现场宜选用低噪声、低振动的设备，强噪音设备宜设置在\n远离居民区的一侧，并应采用（\n）材料搭设的防护棚或屏障。\nA.隔声\nB.吸声\nC.硬质\nD.轻质\nE.安全性", "options": {"A": "隔声", "B": "吸声", "C": "硬质", "D": "轻质", "E": "安全性"}, "answer": "AB", "type": "multi", "category": "文明施工"}, {"id": 2322, "question": "塔机安装单位进入施工现场前，监理单位应检查软件资料：\n\n=== 第815页 ===\n（\n）。\nA.隐蔽工程验收合格证明\nB.安装使用说明书\nC.试验报告\nD.安装塔机的零部件检验记录\nE.检测机构的安装检测报告", "options": {"A": "隐蔽工程验收合格证明", "B": "安装使用说明书", "C": "试验报告", "D": "安装塔机的零部件检验记录", "E": "检测机构的安装检测报告"}, "answer": "ABCD", "type": "multi", "category": "安全管理"}, {"id": 2323, "question": "弯曲机作业时，严禁在（\n）站人。\nA.弯曲作业的半径内\nB.机身不设固定销的一侧\nC.机身设固定销的一侧\nD.作业范围内\nE.弯曲作业的半径外", "options": {"A": "弯曲作业的半径内", "B": "机身不设固定销的一侧", "C": "机身设固定销的一侧", "D": "作业范围内", "E": "弯曲作业的半径外"}, "answer": "AB", "type": "multi", "category": "安全管理"}, {"id": 2324, "question": "特种设备生产、经营、使用单位应当按照国家有关规定配备特\n种设备（\n），并对其进行必要的安全教育和技能培训。\nA.销售人员\nB.安全管理人员\nC.检测人员\nD.作业人员\nE.检验人员", "options": {"A": "销售人员", "B": "安全管理人员", "C": "检测人员", "D": "作业人员", "E": "检验人员"}, "answer": "BCD", "type": "multi", "category": "特种设备"}, {"id": 2325, "question": "特种设备管理员应根据本企业制定特种设备事故的（\n）方案。\nA.应急措施.\nB.救援预案\nC.组织救援\nD.演习\nE.培训", "options": {"A": "应急措施.", "B": "救援预案", "C": "组织救援", "D": "演习", "E": "培训"}, "answer": "ABCD", "type": "multi", "category": "特种设备"}, {"id": 2326, "question": "特种设备（\n）、检测人员和（\n）应当按照国家有关规定取\n得相应资格，方可从事相关工作。\nA.作业人员\nB.安全管理人员\nC.维修人员\nD.销售人员\nE.检验人员", "options": {"A": "作业人员", "B": "安全管理人员", "C": "维修人员", "D": "销售人员", "E": "检验人员"}, "answer": "AB", "type": "multi", "category": "特种设备"}, {"id": 2327, "question": "下列关于施工升降机安装的说法，正确的有（\n）。\nA.施工升降机安装前应对各个部件进行检查\nB.施工升降机基础制作完成后即可进行安装作业\nC.安装作业前应对安装作业人员进行安全技术交底，并在交底书上签\n字留存\nD.当吊杆上悬挂有物件时，严禁开动施工升降机\nE.施工升降机安装时传递工具或器材当高度较低时可以采用投掷的\n\n=== 第817页 ===\n方式", "options": {"A": "施工升降机安装前应对各个部件进行检查", "B": "施工升降机基础制作完成后即可进行安装作业", "C": "安装作业前应对安装作业人员进行安全技术交底，并在交底书上签 字留存", "D": "当吊杆上悬挂有物件时，严禁开动施工升降机", "E": "施工升降机安装时传递工具或器材当高度较低时可以采用投掷的 === 第817页 === 方式"}, "answer": "ACD", "type": "multi", "category": "特种设备"}, {"id": 2328, "question": "用切断机切料时。不得剪切（\n）单根钢筋。\nA.直径超过铭牌规定\nB.强度超过铭牌规定\nC.多根\nD.烧红\nE.单根", "options": {"A": "直径超过铭牌规定", "B": "强度超过铭牌规定", "C": "多根", "D": "烧红", "E": "单根"}, "answer": "ABD", "type": "multi", "category": "法律法规"}, {"id": 2329, "question": "在某大厦二期围护桩施工过程中，2 号桩机在余某指挥下进行桩\n机转向作业，班组操作工人有许某等6 人。当桩架在KX②轴处完成\n转向进行导轨就位时，由于机架底盘左后角处未按操作堆积设置垫木，\n致使该处离地悬空400mm 左右，许某在桩架后角顶升千斤顶，其他\n几人在桩机左侧轴换底盘桩架导轨。当千斤顶顶升20—300mm 高度\n时，造成机架倾倒，将正在观看桩机转向作业的4 名围观群众砸伤，\n造成3 人死亡。请判断事故原因（\n）。\nA.违章指挥、违章作业是造成这次事故的直接原因\nB.在桩机已经失稳的情况下又用千斤顶顶升20—300mm 使机架达到\n倾覆条件，造成机架倾倒。在出现桩机失稳时应果断采取措施调整、\n固定机架\nC.机架底盘一角离地悬空400mm 左右说明桩机已经失稳，机架底盘\n必须按操作规程设置垫木垫实\n\n=== 第818页 ===\nD.施工现场管理混乱，桩机移位作业危险性较大，应当设置警戒区，\n无关人员应在危险区域外\nE.其它", "options": {"A": "违章指挥、违章作业是造成这次事故的直接原因", "B": "在桩机已经失稳的情况下又用千斤顶顶升20—300mm 使机架达到 倾覆条件，造成机架倾倒。在出现桩机失稳时应果断采取措施调整、 固定机架", "C": "机架底盘一角离地悬空400mm 左右说明桩机已经失稳，机架底盘 必须按操作规程设置垫木垫实 === 第818页 ===", "D": "施工现场管理混乱，桩机移位作业危险性较大，应当设置警戒区， 无关人员应在危险区域外", "E": "其它"}, "answer": "ABCD", "type": "multi", "category": "基坑工程"}, {"id": 2330, "question": "自升式塔式起重机的顶升加节应符合下列规定：（\n）。\nA.顶升系统必须完好\nB.顶升前，塔式起重机下支座与顶升套架应可靠连接\nC.顶升过程中，不应进行起升，回转、变幅等操作\nD.结构件必须完好\nE.顶升前不需要进行安全技术交底", "options": {"A": "顶升系统必须完好", "B": "顶升前，塔式起重机下支座与顶升套架应可靠连接", "C": "顶升过程中，不应进行起升，回转、变幅等操作", "D": "结构件必须完好", "E": "顶升前不需要进行安全技术交底"}, "answer": "ABCD", "type": "multi", "category": "特种设备"}, {"id": 2331, "question": "在（\n）涂刷各种防腐涂料作业时，必须根据场地大小，采取\n多台抽风机把苯等有害气体抽出室外，以防止急性苯中毒。\nA.露台\nB.地面\nC.通风不良的车间\nD.通风不良的地下室\nE.通风不良的防水池内", "options": {"A": "露台", "B": "地面", "C": "通风不良的车间", "D": "通风不良的地下室", "E": "通风不良的防水池内"}, "answer": "CDE", "type": "multi", "category": "安全管理"}, {"id": 2332, "question": "电焊工可能导致的职业病有哪几种？（\n）\nA.耳聋\nB.电光性眼炎\n\n=== 第819页 ===\nC.化学性眼部灼伤\nD.职业性白内障\nE.苯中毒", "options": {"A": "耳聋", "B": "电光性眼炎 === 第819页 ===", "C": "化学性眼部灼伤", "D": "职业性白内障", "E": "苯中毒"}, "answer": "BCD", "type": "multi", "category": "安全管理"}, {"id": 2333, "question": "用人单位应对职业病防护设备、应急救援设施和个人使用的职\n业病防护用品按规定定期进行（\n）。\nA.清洗\nB.维护\nC.检修\nD.预防\nE.检测", "options": {"A": "清洗", "B": "维护", "C": "检修", "D": "预防", "E": "检测"}, "answer": "BCE", "ty
