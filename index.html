ion": "施工现场职工宿舍每间居住人员可以为20 人。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2692, "question": "施工现场食堂制作间的炊具宜存放在封闭的橱柜内，刀、盆、\n案板等炊具必须生熟分开。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2693, "question": "施工现场生活区淋浴室内应设置储衣柜或挂衣架，室内使用安\n全电压，设置防水防爆灯具。\n\n=== 第907页 ===\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2694, "question": "施工现场某种安全标志几何图形为蓝底白色图形的圆形图案，\n则该安全标志是提示标志。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2695, "question": "当施工现场带电设备发生火灾时，可采用化学泡沫灭火器进行\n灭火。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 2696, "question": "建筑施工现场的开水炉、电热水器、保温水桶应上锁由专人负\n责管理。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2697, "question": "为了减少建筑垃圾运输量，可以在施工现场将部分焚烧后再清\n运。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2698, "question": "易燃易爆危险品库房应远离明火作业区、人员密集区和建筑物\n相对集中区。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2699, "question": "安全生产管理的最终目的是为了减少和控制危害和事故，尽量\n避免生产过程中发生人身伤害、财产损失、环境污染以及其他损失。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 2700, "question": "安全生产治本攻坚三年行动方案实施过程中，必须坚持以人民\n为中心的发展思想。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2701, "question": "安全生产治本攻坚三年行动方案的目标只包括减少安全事故的\n发生，不包括提高员工安全意识。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 2702, "question": "在安全生产治本攻坚三年行动方案中，企业可以根据自身情况\n选择性执行相关政策要求。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2703, "question": "《安全生产治本攻坚三年行动方案》规定，生产经营单位主要\n负责人每年至少开展一次对本单位重大事故隐患的排查整治检查。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 2704, "question": "《安全生产治本攻坚三年行动方案》规定，生产经营单位主要\n负责人可以不参加安全教育培训。\n\n=== 第909页 ===\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 2705, "question": "要坚持以人民为中心，凝心聚力、锐意进取，真抓实干、奋发\n有为，扎实做好新时代应急与安全生产工作，使人民群众的安全感更\n加充实、更有保障、更可持续。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 2706, "question": "《全国安全生产专项整治三年行动计划》主要聚焦在风险高隐\n患多、事故易发多发的9 个行业领域，包括煤矿、非煤矿山、危险化\n学品、消防、道路运输等。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 2707, "question": "习近平总书记强调，发展决不能以牺牲人的生命为代价，这是\n一条不可逾越的红线。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2708, "question": "各级党委和政府应牢固树立安全发展理念，严格落实“党政同\n责、一岗双责”、齐抓共管的安全生产责任体系。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2709, "question": "在公共安全领域，习近平总书记提出要坚持标本兼治、综合治\n理、系统建设的原则。\n\n=== 第910页 ===\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2710, "question": "广东省专项整治三年行动内容“1+2+9+N”方案体系，其中“1”\n是指总方案，即《省实施计划》；“2”是指2 个专题实施方案，分别\n是学习贯彻习近平总书记关于安全生产重要论述和落实企业安全生\n产主体责任。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2711, "question": "根据《房屋市政工程生产安全重大事故隐患判定标准》，重大隐\n患指的是房屋市政工程施工中，存在危害程度较大，可能导致群死群\n伤或造成重大经济损失的生产安全事故隐患。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 2712, "question": "根据住建《重大事故隐患判定标准（2024 版）》规定，对于按照\n规定需要验收的危险性较大的分部分项工程，未经验收合格即进入下\n一道工序或投入使用，应判定为重大事故隐患。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 2713, "question": "根据住建《重大事故隐患判定标准（2024 版）》规定，塔式起重\n机与周边建（构）筑物或群塔作业未保持安全距离，应判定为重大事\n故隐患。\nA.正确\nB.错误\n\n=== 第911页 ===", "options": {"A": "正确", "B": "错误 === 第911页 ==="}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 2714, "question": "根据住建《重大事故隐患判定标准（2024 版）》规定，使用达到\n报废标准的建筑起重机械，或使用达到报废标准的吊索具进行起重吊\n装作业，不属于重大事故隐患。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 2715, "question": "根据《广东省住房和城乡建设厅关于房屋市政工程建设单位落\n实质量安全首要责任的管理规定（试行）》规定，对于按规定需要进\n行第三方监测的危大工程，建设单位应当委托具有相应资质的单位进\n行监测，接到监测单位关于监测结果异常报告时，应当立即组织相关\n单位采取处置措施。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 2716, "question": "根据《广东省房屋市政工程专职安全生产管理人员工作手册》\n规定，安全员应接受危大工程专项施工方案交底。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 2717, "question": "根据《广东省房屋市政工程专职安全生产管理人员工作手册》\n规定，任职专职安全生产管理人员需满足从事施工管理工作1 年以上，\n必须具备相应的安全生产知识和管理能力。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 2718, "question": "根据《广东省房屋市政工程专职安全生产管理人员工作手册》\n规定，工程项目配备的安全员必须由公司任命并实际在项目履职，做\n到人证合一。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 2719, "question": "根据《广东省房屋市政工程专职安全生产管理人员工作手册》\n规定，劳务分包单位施工人员200 人及以上的，应当配备3 名及以上\n专职安全生产管理人员，并根据所承担的分部分项工程施工危险实际\n情况增加，不得少于工程施工人员总人数的3‰。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 2720, "question": "根据《广东省房屋市政工程专职安全生产管理人员工作手册》\n规定，建筑工程1 万平方米以下的工程，总承包单位应配备项目专职\n安全生产管理人员不少于1 人。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 2721, "question": "根据住建部《危险性较大的分部分项工程专项施工方案严重缺\n陷清单（试行）》，在专项施工方案审核、审查、专家论证等环节，方\n案存在严重缺陷的，其审核、审查和专家论证应不予通过。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2722, "question": "根据住建部《危险性较大的分部分项工程专项施工方案严重缺\n\n=== 第913页 ===\n陷清单（试行）》，在专项施工方案实施环节，方案存在严重缺陷的，\n应判定为重大事故隐患。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 2723, "question": "“TN”第一个字母T 表示保护接地；第二字母N 表示采用保护\n接零。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2724, "question": "搭设高度超过1m 以上的支撑架体应设置作业人员登高措施。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 2725, "question": "模板的拆除顺序和安装顺序相同，即先安装的模板先拆除，后\n安装的后拆除。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 2726, "question": "施工现场临时用电必须采用TN-S 系统，不要采用TN-C 系统。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 2727, "question": "乙炔瓶可以卧放。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2728, "question": "遇有五级以上强风、浓雾等恶劣气候，不得进行露天攀登与悬\n\n=== 第914页 ===\n空高处作业。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "高处作业"}, {"id": 2729, "question": "在脚手架上拉设缆风绳、泵送混凝土和砂浆的输送管及起重设\n备时应符合设计要求。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 2730, "question": "安全带在使用两年后应抽检一次，使用频繁的绳要经常进行外\n观检查，发现异常必须立即更换。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "高处作业"}, {"id": 2731, "question": "板与墙的洞口必须设置牢固的盖板、防护栏杆、安全网或者其\n他防坠落的防护设施。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "高处作业"}, {"id": 2732, "question": "保护零线禁止作重复接地，工作零线必须作重复接地。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2733, "question": "暴雨等危险性来临之前，施工现场临时用电应全部切断。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 2734, "question": "采用真空泵抽水时，管路系统应严密，确保无漏水或漏气现象，\n\n=== 第915页 ===\n经试运转后，方可正式使用。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2735, "question": "拆除脚手架作业必须由上而下逐层进行，严禁上下同时作业；\n连墙件必须随脚手架逐层拆除，严禁先将连墙件整层或数层拆除后再\n拆除脚手架；分段拆除高差大于两步时，应增设连墙件加固。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 2736, "question": "搭设高度2m 以上的支撑架体应设置作业人员登高措施。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 2737, "question": "大雪过后，必须清理脚手架和施工现场的雪。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 2738, "question": "电缆线路必须有短路保护和过载保护，短路保护和过载保护电\n器与电缆的选配应符合规范要求。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 2739, "question": "盾构进出洞是集起重吊装、焊接作业、设备调试为一体的综合\n性分部工程。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 2740, "question": "分配电箱与开关箱的距离与手持电动工具的距离可以为3m。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 2741, "question": "高大模板支撑系统应在搭设完成并验收合格后，经施工单位项\n目负责人及项目总监理工程师签字后，方可进入后续工序的施工。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 2742, "question": "焊接、切割、烘烤或加热等动火作业前，应对作业现场的易燃、\n可燃物进行清理。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2743, "question": "机械不得靠经架空输电线作业，并无需按照相关规定留出安全\n距离。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 2744, "question": "集水井（坑）降水是指在基坑或沟槽开挖时，在坑底设置集水\n井（坑），并沿坑底四周或中央开挖排水沟，使水经排水沟流入集水\n井（坑）内，然后用水泵抽出坑外。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "基坑工程"}, {"id": 2745, "question": "脚手架对接扣件开口应朝上或朝内。\nA.正确\nB.错误\n\n=== 第917页 ===", "options": {"A": "正确", "B": "错误 === 第917页 ==="}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 2746, "question": "开挖深度大于等于5m 或开挖深度小于5m、现场地质情况和周\n围环境较复杂的基坑工程以及其他需要监测的基坑工程应实施基坑\n工程监测。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "基坑工程"}, {"id": 2747, "question": "可燃材料库房不应使用高热灯具，易燃易爆危险品库房内应使\n用防爆灯具。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2748, "question": "可以在脚手架基础及邻近处进行挖掘作业。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 2749, "question": "扣件螺栓拧紧力矩为40～65N·m。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2750, "question": "连墙件应呈水平设置，当不能呈水平设置时，与脚手架连接的\n一端应下斜连接。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 2751, "question": "临街搭设的脚手架外侧应有防护措施，以防坠物伤人。\nA.正确\nB.错误\n\n=== 第918页 ===", "options": {"A": "正确", "B": "错误 === 第918页 ==="}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 2752, "question": "当以独立塔架形式搭设盘扣式支撑架时，应沿高度间隔2～4 个\n步距与相邻的独立塔架水平拉结。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 2753, "question": "脚手架与模板支架的搭设程序应符合满堂脚手架和模板支架应\n采用逐列、逐排和逐层的方法搭设的规定。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 2754, "question": "属于危大工程范围的模板工程的专项施工方案必须经企业技术\n负责人审核签字。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 2755, "question": "模板构件进场后，应认真检查构件和材料是否符合设计要求。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 2756, "question": "人行斜道和运料斜道的脚手板上应每隔200～250mm 设置一根\n防滑木条，木条厚度应为20～30mm。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2757, "question": "施工现场的消火栓泵应采用专用消防配电线路。\nA.正确\nB.错误\n\n=== 第919页 ===", "options": {"A": "正确", "B": "错误 === 第919页 ==="}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 2758, "question": "室外消火栓应沿在建工程、临时用房及可燃材料堆场及其加工\n场均匀布置，距在建工程、临时用房及可燃材料堆场及其加工场的外\n边线不应小于3m。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2759, "question": "不是所有交、直流电焊机的金属外壳都必须采取保护接地或接\n零。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2760, "question": "土方开挖应遵守“开槽支撑、先撑后挖、分层开挖、严禁超挖”\n的原则。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 2761, "question": "未搭设完的脚手架，所有人员一律不准上架。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 2762, "question": "一般来讲，季节性施工主要是指雨期施工和冬期施工。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2763, "question": "易燃易爆物品可以与其他材料混放保管。\nA.正确\nB.错误\n\n=== 第920页 ===", "options": {"A": "正确", "B": "错误 === 第920页 ==="}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2764, "question": "雨期施工时，高耸结构的模板作业要安装避雷设施。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 2765, "question": "在建工程结构施工完毕的每层楼梯处，应设置消防水枪、水带\n及软管，且每个设置点不少于1 套。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 2766, "question": "总配电箱和开关箱中漏电保护器的极数和线数必须与其负荷侧\n负荷的相数和线数一致。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 2767, "question": "开关箱与用电设备之间应实行“一机、一闸、一漏、一箱”制。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 2768, "question": "不得在安全防护棚棚顶堆放物料。（\n）\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2769, "question": "高处作业不得使用座板式单人吊具，不得使用自制吊篮。（\n）\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "高处作业"}, {"id": 2770, "question": "不得用吊车载运人员，但可以用物料提升机载运人员。（\n）\n\n=== 第921页 ===\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2771, "question": "木工圆锯机上的旋转锯片必须设置防护罩。（\n）\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2772, "question": "单排、双排与满堂脚手架立杆接长，各层各步接头必须采用对\n接扣件连接。（\n）\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 2773, "question": "开口型双排脚手架的两端均应设置横向斜撑。（\n）\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 2774, "question": "动力开关箱与照明开关箱宜分设。（\n）\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 2775, "question": "配电箱、开关箱内的电器（含插座）可以安装在金属或非木质\n阻燃绝缘电器安装板上。（\n）\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 2776, "question": "配电箱、开关箱应定期检查、维修。某施工现场木工加工厂一\n开关箱需要维修，现场专业电工在现场另一处进行配电箱检查、维修，\n经专业电工同意后，木工作业人员甲某进行了该开关箱的维修，并做\n\n=== 第922页 ===\n好了检查、维修工作记录，此做法是否正确？（\n）\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 2777, "question": "顶管施工中，千斤顶的顶力合力位置不能与顶进抗力的位置在\n同一个轴线上。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2778, "question": "乙炔瓶在储存使用过程中必须保持直立。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2779, "question": "24m 以上的脚手架，连墙杆应采用可承受拉、压荷载的柔性结\n构。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 2780, "question": "管井井点就是沿基坑每隔一定距离设置一个管井或在坑内降水\n时每隔一定距离设置一个管井，每个管井单独用一台水泵不断抽取管\n井内的水来降低地下水位。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "基坑工程"}, {"id": 2781, "question": "架空进户线的室外端应采用绝缘子固定，过墙处应穿管保护，\n距地面高度可以小于2.5m。\nA.正确\nB.错误\n\n=== 第923页 ===", "options": {"A": "正确", "B": "错误 === 第923页 ==="}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2782, "question": "井点降水就是在基坑开挖前，预先在基坑四周埋设一定数量的\n滤水管（井），利用抽水设备，在基坑开挖前和基坑开挖过程中不断\n地抽出地下水，使地下水位降低到坑底以下，直至基础工程施工完毕\n为止。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "基坑工程"}, {"id": 2783, "question": "储存可燃物资仓库的管理，必须执行消防技术标准和管理规定。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 2784, "question": "移动式操作平台移动时，操作平台上可以站人。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2785, "question": "移动式操作平台高度可以为20m。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2786, "question": "钢平台可以安装在安全通道、外用电梯的上方。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 2787, "question": "高压架空线下面可以搭设临时性建筑物或堆放可燃物品。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2788, "question": "填方应该按一个确定方向顺序进行回填和夯实。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2789, "question": "对于同一基坑的不同部位，可采用不同的安全等级。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "基坑工程"}, {"id": 2790, "question": "在有支撑的基坑中挖土时，必须防止碰坏支撑，在坑沟边使用\n机械挖土时，无需计算，直接开挖。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 2791, "question": "密排桩比地下连续墙施工简便，整体性也比地下连续墙要好。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2792, "question": "施工现场的电力系统严禁利用大地作相线或零线。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2793, "question": "在建工程结构施工完毕的每层楼梯处，应设置消防水枪、水带\n及软管，且每个设置点不少于4 套。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 2794, "question": "高度在30m 以下的封闭型双排脚手架可不设横向斜撑。\nA.正确\nB.错误\n\n=== 第925页 ===", "options": {"A": "正确", "B": "错误 === 第925页 ==="}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 2795, "question": "模板运到现场后，应认真检查模板、支撑等构件和材料是否符\n合设计要求，钢模板有无严重锈蚀或变形，木模板及支撑材质是否合\n格。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 2796, "question": "截水即利用截水帷幕切断基坑外的地下水流入基坑内部。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "基坑工程"}, {"id": 2797, "question": "基坑边坡必须经过验算，保证边坡稳定。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "基坑工程"}, {"id": 2798, "question": "大模板放置时，下面不得有电线和气焊管线。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 2799, "question": "配电箱、开关箱周围应有足够2 人同时工作的空间和通道。\n（\n）\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 2800, "question": "施工现场停止作业1 小时以上时，应将动力开关箱断电上锁。\n（\n）\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 2801, "question": "某项目即将完工，施工项目部为了更快完工验收，同意现场所\n有开关箱的电源进线端采用插头做活动连接，此项目部的做法是否正\n确？（\n）\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 2802, "question": "客运索道、大型游乐设施的使用管理人应当将客运索道、大型\n游乐设施的使用登记标志、检验标志、安全使用说明、安全注意事项、\n警示标志、使用年限届满日期置于出入口、等候区、乘客区等易于为\n乘客注意的显著位置。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2803, "question": "电动葫芦应设缓冲器，起吊重物时，重物重量过大时可由两台\n及以上手拉葫芦同时起吊（\n）。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2804, "question": "违反《广东省特种设备安全条例》违反本条例第十一条规定，\n从事特种设备生产的单位，其单位名称、单位地址变更未按规定申请\n办理变更手续的。责令限期改正，处五千元罚款。（\n）\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 2805, "question": "启用已办理停用手续的特种设备，应当办理启用手续；启用已\n停用一年以上或者已超过原检验有效期的特种设备，还应当向特种设\n\n=== 第927页 ===\n备检验机构申请检验。（\n）\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 2806, "question": "特种设备因故停用的，使用管理人应当确保停用设备不危及人\n身、财产安全，并在显著位置设置停用标志。停用三个月以上的，应\n当向原负责登记的特种设备安全监督管理部门办理停用手续。（\n）\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 2807, "question": "新安装特种设备未移交所有权人的，项目建设单位为使用管理\n人。（\n）\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 2808, "question": "特种设备安全监督管理部门应当建立安全监察情况记录制度，\n对安全监察的内容、发现的问题及处理情况作出记录。发现违反特种\n设备有关法律法规、安全技术规范和标准的行为或者特种设备存在事\n故隐患时，应当以口头形式发出特种设备安全监察指令，责令有关单\n位改正或者消除事故隐患。（\n）\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 2809, "question": "从事特种设备活动的单位，应当按照国家有关规定聘用取得相\n应资格的人员从事特种设备的安全管理、作业、检验、检测工作，并\n对其进行安全教育和技能培训。（\n）\n\n=== 第928页 ===\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 2810, "question": "特种设备使用管理人应当组织开展特种设备安全使用风险分析，\n采取有效措施防控风险，保证特种设备的安全使用。（\n）\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 2811, "question": "《广东省特种设备安全条例》中特种设备的生产，是指特种设\n备的设计、制造、安装、改造、修理、出售。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 2812, "question": "《广东省特种设备安全条例》所称特种设备的使用，是指利用\n特种设备从事生产、经营或者为他人提供服务的行为。（\n）\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 2813, "question": "设备的多个控制位置在联动控制操作会产生安全风险时，各控\n制装置应具有互锁功能，包括停机装置和急停装置（\n）。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2814, "question": "钢筋加工机械的接地电阻不应大于10Ω（\n）。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2815, "question": "成槽前，应根据地质条件进行护壁泥浆材料的试配及室内性能\n\n=== 第929页 ===\n试验，泥浆配比应按试验确定。泥浆拌制后应贮放12h，待泥浆材料\n充分水化后方可使用。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2816, "question": "雨雪后进行吊装作业时，应及时清理冰雪并应采取防冻和防漏\n电措施，先试吊，确认制动器灵敏可靠后方可进行作业。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 2817, "question": "轨道行程两端的轨顶高度不宜高于其余部位中最高点的轨顶高\n度。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2818, "question": "起重设备的通行道路应平整，承载力应满足设备通行要求。吊\n装作业区域四周应设置明显标志，严禁非操作人员入内。夜间不宜作\n业，当确需夜间作业时，应有足够的照明。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 2819, "question": "吊篮和工作台的脚手板应铺平绑牢，允许出现探头板。吊移操\n作平台时，平台上面严禁站人。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2820, "question": "高空吊装屋架、梁和采用斜吊绑扎吊装柱时，应在构件其中一\n\n=== 第930页 ===\n端绑扎溜绳，由操作人员控制构件的平衡和稳定。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "高处作业"}, {"id": 2821, "question": "吊装大、重构件和采用新的吊装工艺时，应先进行试吊，确认\n无问题后，方可正式起吊。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 2822, "question": "大雨、雾、大雪及六级以上大风等恶劣天气应停止吊装作业。\n雨雪后进行吊装作业时，应及时清理冰雪并应采取防滑和防漏电措施，\n先试吊，确认制动器灵敏可靠后方可进行作业。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 2823, "question": "吊起的构件应确保在起重机吊杆顶的下方，严禁采用斜拉、斜\n吊，严禁起吊埋于地下或粘结在地上的构件。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 2824, "question": "开始起吊时，应先将构件吊离地面300mm～400mm 后暂停，检\n查起重机的稳定性、制动装置的可靠性、构件的平衡性和绑扎的牢固\n性等，确认无误后，方可继续起吊。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 2825, "question": "已吊起的构件不得长久停滞在空中。严禁超载和吊装重量不明\n\n=== 第931页 ===\n的重型构件和设备。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 2826, "question": "严禁在吊起的构件上行走或站立，不得用起重机载运人员，不\n得在构件上堆放或悬挂零星物件。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 2827, "question": "已安装好的结构构件，未经有关设计和技术部门批准不得随意\n凿洞开孔。严禁在其上堆放超过设计荷载的施工荷载。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2828, "question": "对起吊物进行移动、吊升、停止、安装时的过程中应采用旗语\n或通用手势信号进行指挥，信号不明不得启动，上下联系应相互协调，\n也可采用通信工具。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2829, "question": "起重机械安全定期检验周期为2 年。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 2830, "question": "对脚手架工程、施工用电、基坑支护、模板工程、起重吊装作\n业、塔吊、物料提升机及其他垂直运输设备等专业性较强的项目，要\n单独编制专项安全施工方案。\n\n=== 第932页 ===\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 2831, "question": "轮胎压路机最适于碾压沥青路面。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2832, "question": "出土车轨道终端，必须安装限制装置。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2833, "question": "严禁挖掘机在未经爆破的4 级以上的岩石或冻土地区作业。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2834, "question": "高处作业的安全技术措施及其所需料具，必须列入工程的施工\n组织设计。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "高处作业"}, {"id": 2835, "question": "千斤顶工作时，放在平整坚实地面并要在其下垫枕木、木板或\n钢板的目的是加大千斤顶的举升力。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2836, "question": "悬空安装大模板、吊装第一块预制构件、吊装单独的大中型预\n制构件时，作业人员要站在操作平台上小心操作。\nA.正确\nB.错误\n\n=== 第933页 ===", "options": {"A": "正确", "B": "错误 === 第933页 ==="}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 2837, "question": "焊工在金属容器内、地下、地沟或狭窄、潮湿等处施焊时，要\n设监护人员。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2838, "question": "配电室的门应向右开并配锁。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 2839, "question": "电箱的进出线口应设在箱体的上顶面。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2840, "question": "单相线路中，零线截面与相截面应相同。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2841, "question": "塔式起重机的安装、拆卸作业人员及司机、指挥应持证上岗。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 2842, "question": "起重机作业同一人同时兼顾信号指挥和司索时应注意安全。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 2843, "question": "物料提升机墙架可采用钢丝绳与架体及建筑连接。\nA.正确\nB.错误\n\n=== 第934页 ===", "options": {"A": "正确", "B": "错误 === 第934页 ==="}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2844, "question": "根据《建设工程安全生产管理条例》，安装、拆卸施工起重机械\n和整体提升脚手架、模板等自升式架设设施，应当编制拆装方案、制\n定安全施工措施，并由专业技术人员现场监督。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 2845, "question": "根据《建设工程安全生产管理条例》，施工现场的安全防护用具、\n机械设备、施工机具及配件必须由专人管理，定期进行检查、维修和\n保养，建立相应的资料档案，并按照国家有关规定及时报废。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 2846, "question": "根据《建设工程安全生产管理条例》，施工单位应当对管理人员\n和作业人员每半年至少进行一次安全生产教育培训，其教育培训情况\n记入个人工作档案。安全生产教育培训考核不合格的人员，不得上岗。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 2847, "question": "安全设备的设计、制造、安装、使用、检测、维修、改造和报\n废，应当符合国家标准或者行业标准。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 2848, "question": "进行电焊、气焊等具有火灾危险的作业人员和自动消防系统的\n操作人员，必须持证上岗，并严格遵守消防安全操作规程。\n\n=== 第935页 ===\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 2849, "question": "塔式起重机基础出现下沉、倾斜，应立即停止作业。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 2850, "question": "施工起重机械和整体提升脚手架、模板等自升式架设设施的使\n用达到国家规定的检验检测期限的，必须经具有相应资格的检验检测\n机构检测。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 2851, "question": "塔式起重机在安装前，塔式起重机的安全装置必须齐全，并应\n按程序进行调试合格。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 2852, "question": "塔式起重机拆卸时，应先拆除附着装置后降节。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 2853, "question": "在使用工具前，操作者应认真阅读产品使用说明书和安全操作\n规程，详细了解工具的性能和掌握正确使用的方法。使用时，操作者\n应采取必要的防护措施。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2854, "question": "《特种设备安全监察条例》规定的起重机械必须经有相应资质\n的检验检测机构检测合格后方可使用。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 2855, "question": "盾构机的选用应与周围岩土条件相适应。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2856, "question": "吊装作业时，严禁超载吊装和起吊重量不明的重大构件和设备。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 2857, "question": "吊装作业区四周应设置明显标识，严禁非操作人员入内。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 2858, "question": "混凝土搅拌机料斗放到最             break;
        case 'random100':
            selected = shuffleArray([...questions]).slice(0, 100);
            timeLimit = 90 * 60;
            break;
        case 'full':
            selected = [...questions];
            timeLimit = 0;
            break;
        case 'category':
            selected = questions.filter(q => q.category === category);
            timeLimit = 0;
            break;
    }
    
    currentQuiz = {
        questions: selected,
        answers: new Array(selected.length).fill(null),
        flagged: new Array(selected.length).fill(false),
        startTime: Date.now(),
        timeLimit: timeLimit
    };
    currentIndex = 0;
    
    document.getElementById('modeSelect').style.display = 'none';
    document.getElementById('quizArea').style.display = 'block';
    
    if (timeLimit > 0) startTimer(timeLimit);
    renderQuestion();
}

function renderQuestion() {
    const q = currentQuiz.questions[currentIndex];
    const card = document.getElementById('questionCard');
    
    const meta = `<div class="question-meta">
        <span class="badge ${q.type === 'multi' ? 'badge-multi' : 'badge-single'}">
            ${q.type === 'multi' ? '☑️ 多选题' : '✅ 单选题'}
        </span>
        <span class="badge badge-category">${q.category}</span>
        <span style="color: #999; font-size: 14px;">第 ${currentIndex + 1}/${currentQuiz.questions.length} 题</span>
    </div>`;
    
    let optionsHtml = '';
    const OptionTag = q.type === 'multi' ? 'div' : 'div';
    
    Object.entries(q.options).forEach(([key, val]) => {
        const isSelected = currentQuiz.answers[currentIndex] && 
            (q.type === 'multi' ? currentQuiz.answers[currentIndex].includes(key) : currentQuiz.answers[currentIndex] === key);
        
        optionsHtml += `
            <${OptionTag} class="option ${isSelected ? 'selected' : ''}" 
                onclick="selectOption('${key}', ${q.type === 'multi'})">
                <strong>${key}.</strong> ${val}
            </${OptionTag}>
        `;
    });
    
    card.innerHTML = meta + `<div class="question-text">${q.question}</div>` + optionsHtml;
    
    // Update flag button
    const flagBtn = document.getElementById('flagBtn');
    flagBtn.className = `btn ${currentQuiz.flagged[currentIndex] ? 'btn-warning' : ''}`;
    flagBtn.textContent = currentQuiz.flagged[currentIndex] ? '🔖 已标记' : '🔖 标记';
    
    // Update progress
    document.getElementById('progressFill').style.width = 
        ((currentIndex + 1) / currentQuiz.questions.length * 100) + '%';
}

function selectOption(key, isMulti) {
    if (!currentQuiz.answers[currentIndex]) {
        currentQuiz.answers[currentIndex] = isMulti ? [] : null;
    }
    
    if (isMulti) {
        const arr = currentQuiz.answers[currentIndex];
        const idx = arr.indexOf(key);
        if (idx >= 0) arr.splice(idx, 1);
        else arr.push(key);
    } else {
        currentQuiz.answers[currentIndex] = key;
    }
    
    renderQuestion();
}

function nextQuestion() {
    if (currentIndex < currentQuiz.questions.length - 1) {
        currentIndex++;
        renderQuestion();
    }
}

function prevQuestion() {
    if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
    }
}

function flagQuestion() {
    currentQuiz.flagged[currentIndex] = !currentQuiz.flagged[currentIndex];
    renderQuestion();
}

function showAnswerSheet() {
    let html = '<div style="padding: 30px;"><h2>📋 答题卡</h2><div class="answer-sheet">';
    currentQuiz.questions.forEach((q, i) => {
        const answered = currentQuiz.answers[i] !== null && 
            (Array.isArray(currentQuiz.answers[i]) ? currentQuiz.answers[i].length > 0 : true);
        const cls = i === currentIndex ? 'current' : (currentQuiz.flagged[i] ? 'flagged' : (answered ? 'answered' : ''));
        html += `<button class="answer-btn ${cls}" onclick="jumpTo(${i})">${i + 1}</button>`;
    });
    html += '</div>';
    html += '<div style="margin-top: 20px; text-align: center;">';
    html += '<button class="btn btn-danger" onclick="confirmSubmit()">✅ 确认交卷</button>';
    html += '<button class="btn" onclick="closeModal()" style="margin-left: 10px; background: #e0e0e0;">返回</button>';
    html += '</div></div>';
    
    const modal = document.createElement('div');
    modal.id = 'modal';
    modal.style = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; overflow-y: auto;';
    modal.innerHTML = html;
    document.body.appendChild(modal);
}

function jumpTo(idx) {
    currentIndex = idx;
    closeModal();
    renderQuestion();
}

function closeModal() {
    const modal = document.getElementById('modal');
    if (modal) modal.remove();
}

function confirmSubmit() {
    closeModal();
    if (!confirm('确认要交卷吗？')) return;
    submitQuiz();
}

function submitQuiz() {
    clearInterval(timerInterval);
    document.getElementById('timer').style.display = 'none';
    
    let correct = 0, wrong = 0, unanswered = 0;
    const wrongList = [];
    
    currentQuiz.questions.forEach((q, i) => {
        const userAns = currentQuiz.answers[i];
        const correctAns = q.answer;
        
        if (!userAns || (Array.isArray(userAns) && userAns.length === 0)) {
            unanswered++;
            return;
        }
        
        const userSorted = Array.isArray(userAns) ? userAns.sort().join('') : userAns;
        const correctSorted = correctAns.split('').sort().join('');
        
        if (userSorted === correctSorted) {
            correct++;
        } else {
            wrong++;
            wrongList.push({ question: q, userAnswer: userAns, correctAnswer: correctAns });
        }
    });
    
    // Save wrong questions
    wrongList.forEach(w => {
        if (!wrongQuestions.find(q => q.id === w.question.id)) {
            wrongQuestions.push(w.question);
        }
    });
    localStorage.setItem('wrongQuestions', JSON.stringify(wrongQuestions));
    
    // Save history
    const duration = Math.round((Date.now() - currentQuiz.startTime) / 1000);
    history.unshift({
        date: new Date().toLocaleString('zh-CN'),
        total: currentQuiz.questions.length,
        correct, wrong, unanswered,
        duration: Math.round(duration / 60) + '分钟',
        score: Math.round(correct / currentQuiz.questions.length * 100)
    });
    localStorage.setItem('quizHistory', JSON.stringify(history.slice(0, 50)));
    
    // Show result
    showResult(correct, wrong, unanswered, wrongList);
}

function showResult(correct, wrong, unanswered, wrongList) {
    document.getElementById('quizArea').style.display = 'none';
    const resultArea = document.getElementById('resultArea');
    resultArea.style.display = 'block';
    
    const total = currentQuiz.questions.length;
    const score = Math.round(correct / total * 100);
    const scoreClass = score >= 80 ? 'score-excellent' : (score >= 60 ? 'score-good' : 'score-poor');
    
    let html = `
        <div class="score-circle ${scoreClass}">${score}分</div>
        <h2>${score >= 60 ? '🎉 恭喜通过！' : '💪 继续加油！'}</h2>
        <div class="stats-grid">
            <div class="stat-card"><div class="num">${total}</div><div class="label">总题数</div></div>
            <div class="stat-card"><div class="num" style="color: #4caf50;">${correct}</div><div class="label">正确</div></div>
            <div class="stat-card"><div class="num" style="color: #f44336;">${wrong}</div><div class="label">错误</div></div>
            <div class="stat-card"><div class="num" style="color: #ff9800;">${unanswered}</div><div class="label">未答</div></div>
        </div>
    `;
    
    if (wrongList.length > 0) {
        html += '<div class="wrong-list"><h3>📝 错题详情</h3>';
        wrongList.slice(0, 10).forEach(w => {
            html += `
                <div class="wrong-item">
                    <div class="q-text">${w.question.question}</div>
                    <div class="your-answer">你的答案: ${Array.isArray(w.userAnswer) ? w.userAnswer.join(', ') : w.userAnswer || '未答'}</div>
                    <div class="correct-answer">正确答案: ${w.correctAnswer}</div>
                </div>
            `;
        });
        if (wrongList.length > 10) html += `<p style="text-align: center; color: #999;">... 还有 ${wrongList.length - 10} 道错题</p>`;
        html += '</div>';
    }
    
    html += '<div style="margin-top: 30px;">';
    html += '<button class="btn btn-primary" onclick="location.reload()">🔄 重新练习</button>';
    html += '<button class="btn btn-warning" onclick="reviewWrong()" style="margin-left: 10px;">📝 错题本</button>';
    html += '</div>';
    
    resultArea.innerHTML = html;
}

function reviewWrong() {
    if (wrongQuestions.length === 0) {
        alert('🎉 暂无错题！');
        return;
    }
    currentQuiz = {
        questions: wrongQuestions,
        answers: new Array(wrongQuestions.length).fill(null),
        flagged: new Array(wrongQuestions.length).fill(false),
        startTime: Date.now(),
        timeLimit: 0
    };
    currentIndex = 0;
    document.getElementById('modeSelect').style.display = 'none';
    document.getElementById('resultArea').style.display = 'none';
    document.getElementById('historyArea').style.display = 'none';
    document.getElementById('quizArea').style.display = 'block';
    renderQuestion();
}

function showHistory() {
    document.getElementById('modeSelect').style.display = 'none';
    document.getElementById('quizArea').style.display = 'none';
    document.getElementById('resultArea').style.display = 'none';
    const historyArea = document.getElementById('historyArea');
    historyArea.style.display = 'block';
    
    if (history.length === 0) {
        historyArea.innerHTML = '<div style="padding: 40px; text-align: center;"><h2>暂无练习记录</h2></div>';
        return;
    }
    
    let html = '<div style="padding: 30px;"><h2>📊 练习历史</h2>';
    history.forEach(h => {
        html += `
            <div class="history-item">
                <div>
                    <div style="font-weight: bold; color: #666;">${h.date}</div>
                    <div style="color: #999; font-size: 14px;">用时: ${h.duration} | 正确率: ${h.score}%</div>
                </div>
                <div class="score">${h.score}分</div>
            </div>
        `;
    });
    html += '<div style="margin-top: 30px; text-align: center;">';
    html += '<button class="btn btn-primary" onclick="backToMenu()">返回</button>';
    html += '</div></div>';
    historyArea.innerHTML = html;
}

function backToMenu() {
    document.getElementById('modeSelect').style.display = 'block';
    document.getElementById('historyArea').style.display = 'none';
    document.getElementById('resultArea').style.display = 'none';
}

function startTimer(seconds) {
    const timerEl = document.getElementById('timer');
    timerEl.style.display = 'block';
    
    function update() {
        const min = Math.floor(seconds / 60);
        const sec = seconds % 60;
        timerEl.textContent = `${min}:${sec < 10 ? '0' : ''}${sec}`;
        
        if (seconds <= 300) timerEl.className = 'timer warning';
        if (seconds <= 0) { clearInterval(timerInterval); submitQuiz(); }
        seconds--;
    }
    update();
    timerInterval = setInterval(update, 1000);
}

function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}
</script>
