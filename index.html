带应系挂在（\n）。\nA.专用安全绳\nB.吊篮栏杆\nC.吊篮钢索\nD.吊篮停靠楼层的可靠位置", "options": {"A": "专用安全绳", "B": "吊篮栏杆", "C": "吊篮钢索", "D": "吊篮停靠楼层的可靠位置"}, "answer": "A", "type": "single", "category": "高处作业"}, {"id": 1113, "question": "吊篮正常工作时，人员应从（\n）进入吊篮内。\nA.楼顶\nB.停留层\nC.作业层\n\n=== 第379页 ===\nD.地面", "options": {"A": "楼顶", "B": "停留层", "C": "作业层 === 第379页 ===", "D": "地面"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1114, "question": "钢结构安装时，应使用梯子或其他登高设施攀登作业。坠落高\n度超过（\n）m 时，应设置操作平台。\nA.1\nB.2\nC.3\nD.4", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "B", "type": "single", "category": "高处作业"}, {"id": 1115, "question": "当安装屋架时，屋脊处设置的扶梯踏步间距不应大于（\n）mm。\nA.200\nB.400\nC.600\nD.800", "options": {"A": "200", "B": "400", "C": "600", "D": "800"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1116, "question": "高处作业使用落地式操作平台时高度不应超过（\n）m。\nA.5\nB.10\nC.15\nD.20", "options": {"A": "5", "B": "10", "C": "15", "D": "20"}, "answer": "C", "type": "single", "category": "高处作业"}, {"id": 1117, "question": "落地式操作平台搭设高宽比不应大于（\n）。\n\n=== 第380页 ===\nA.1：1\nB.2：1\nC.3：1\nD.3：2", "options": {"A": "1：1", "B": "2：1", "C": "3：1", "D": "3：2"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1118, "question": "在使用落地式操作平台过程中，接料平台的施工荷载大于（\n）\nkN/m²时，应进行专项设计。\nA.2\nB.4\nC.6\nD.8", "options": {"A": "2", "B": "4", "C": "6", "D": "8"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1119, "question": "高处作业使用的落地式操作平台搭设正确的是：（\n）。\nA.与建筑物柔性连接\nB.高度不高可以不加防倾措施\nC.不得与脚手架连接\nD.连墙件间隔不应大于5m", "options": {"A": "与建筑物柔性连接", "B": "高度不高可以不加防倾措施", "C": "不得与脚手架连接", "D": "连墙件间隔不应大于5m"}, "answer": "C", "type": "single", "category": "脚手架与模板工程"}, {"id": 1120, "question": "落地式操作平台一次搭设高度不应超过相邻连墙件以上（\n）\n步。\nA.一\nB.二\n\n=== 第381页 ===\nC.三\nD.四", "options": {"A": "一", "B": "二 === 第381页 ===", "C": "三", "D": "四"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1121, "question": "悬挑式操作平台的悬挑长度不宜大于（\n）m。\nA.3\nB.4\nC.5\nD.6", "options": {"A": "3", "B": "4", "C": "5", "D": "6"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1122, "question": "悬挑式操作平台的均布荷载不应大于（\n）kN/m²。\nA.4.0\nB.5.5\nC.7.0\nD.10", "options": {"A": "4.0", "B": "5.5", "C": "7.0", "D": "10"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1123, "question": "悬挑式操作平台的集中荷载不应大于（\n）kN。\nA.15\nB.20\nC.25\nD.30", "options": {"A": "15", "B": "20", "C": "25", "D": "30"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1124, "question": "采用支承方式的悬挑式操作平台，应在钢平台下方设置不少于\n\n=== 第382页 ===\n（\n）斜撑。\nA.一道\nB.两道\nC.三道\nD.四道", "options": {"A": "一道", "B": "两道", "C": "三道", "D": "四道"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1125, "question": "悬挑式操作平台安装时，钢丝绳应采用专用的钢丝绳夹连接，\n钢丝绳夹数量应与钢丝绳直径相匹配，且不得少于（\n）个。\nA.2\nB.4\nC.5\nD.6", "options": {"A": "2", "B": "4", "C": "5", "D": "6"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1126, "question": "悬挑式操作平台的外侧应略（\n）于内侧；外侧应安装防护栏\n杆并应设置防护挡板（\n）封闭。\nA.高；半\nB.低；半\nC.低；全\nD.高；全", "options": {"A": "高；半", "B": "低；半", "C": "低；全", "D": "高；全"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1127, "question": "上层作业高度大于2m，小于5m 时，坠落半径为（\n）m。\nA.3\n\n=== 第383页 ===\nB.4\nC.5\nD.6", "options": {"A": "3 === 第383页 ===", "B": "4", "C": "5", "D": "6"}, "answer": "A", "type": "single", "category": "高处作业"}, {"id": 1128, "question": "上层作业高度为9m，坠落半径为（\n）m。\nA.3\nB.4\nC.5\nD.6", "options": {"A": "3", "B": "4", "C": "5", "D": "6"}, "answer": "B", "type": "single", "category": "高处作业"}, {"id": 1129, "question": "上层作业高度为20m，坠落半径为（\n）m。\nA.3\nB.4\nC.5\nD.6", "options": {"A": "3", "B": "4", "C": "5", "D": "6"}, "answer": "C", "type": "single", "category": "高处作业"}, {"id": 1130, "question": "上层作业高度大于30m 时，坠落半径为（\n）m。\nA.3\nB.4\nC.5\nD.6", "options": {"A": "3", "B": "4", "C": "5", "D": "6"}, "answer": "D", "type": "single", "category": "高处作业"}, {"id": 1131, "question": "对不搭设脚手架和设置安全防护棚时的交叉作业，应设置安全\n防护网，当在多层、高层建筑外立面施工时，应每隔（\n）层设一\n道固定的安全防护网，同时设一道随施工高度提升的安全防护网。\nA.二\nB.三\nC.四\nD.五", "options": {"A": " "高处作业"}, {"id": 1141, "question": "在使用高处作业吊篮时，吊篮悬挂高度在100m 及其以下的，宜\n选用长边不大于（\n）m 的吊篮平台。\nA.5.5\nB.6.0\nC.6.5\nD.7.0", "options": {"A": "5.5", "B": "6.0", "C": "6.5", "D": "7.0"}, "answer": "A", "type": "single", "category": "高处作业"}, {"id": 1142, "question": "在使用高处作业吊篮时，吊篮悬挂高度在100m 以上时，宜选用\n长边不大于（\n）m 的吊篮平台。\nA.2.5\nB.3.5\nC.4.5\nD.5.5", "options": {"A": "2.5", "B": "3.5", "C": "4.5", "D": "5.5"}, "answer": "A", "type": "single", "category": "高处作业"}, {"id": 1143, "question": "当吊篮施工遇有雨雪、大雾、风沙及（\n）级以上大风等恶劣\n天气时，应停止作业。\nA.4\nB.5\nC.6\nD.7", "options": {"A": "4", "B": "5", "C": "6", "D": "7"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1144, "question": "吊篮遇大风停止作业后，应将吊篮停放在（\n）。\n\n=== 第388页 ===\nA.顶部楼层\nB.地面\nC.中间楼层\nD.楼层固定点", "options": {"A": "顶部楼层", "B": "地面", "C": "中间楼层", "D": "楼层固定点"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1145, "question": "当施工中发现吊篮设备故障和安全隐患时，应及时排除，对可\n能危及人身安全时，应停止作业，并应由专业人员进行维修。维修后\n的吊篮（\n）可投入使用。\nA.直接\nB.维修单位盖章确认维修达到合格\nC.监理单位同意使用\nD.重新进行检查验收合格", "options": {"A": "直接", "B": "维修单位盖章确认维修达到合格", "C": "监理单位同意使用", "D": "重新进行检查验收合格"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1146, "question": "在雨、霜、雾、雪等天气进行高处作业时，下列措施正确的有：\n（\n）。\nA.不能进行高处作业\nB.采取防滑措施\nC.采取防滑、防冻措施\nD.采取防滑、防冻和防雷措施", "options": {"A": "不能进行高处作业", "B": "采取防滑措施", "C": "采取防滑、防冻措施", "D": "采取防滑、防冻和防雷措施"}, "answer": "D", "type": "single", "category": "高处作业"}, {"id": 1147, "question": "李某在通道口使用折叠梯进行喷涂作业，四下无人，他不应\n（\n）。\n\n=== 第389页 ===\nA.设置警示标牌\nB.喊人旁站\nC.继续作业\nD.设置围栏", "options": {"A": "设置警示标牌", "B": "喊人旁站", "C": "继续作业", "D": "设置围栏"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1148, "question": "当安全防护棚为非机动车辆通行时，棚底至地面高度不应小于\n（\n）m。\nA.3\nB.4\nC.5\nD.6", "options": {"A": "3", "B": "4", "C": "5", "D": "6"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1149, "question": "当安全防护棚为机动车辆通行时，棚底至地面高度不应小于\n（\n）m。\nA.3\nB.4\nC.5\nD.6", "options": {"A": "3", "B": "4", "C": "5", "D": "6"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1150, "question": "某工地一楼栋主体结构高度已建至30m，该楼栋安全通道棚的\n高度不应小于（\n）m。\nA.3\n\n=== 第390页 ===\nB.4\nC.5\nD.6", "options": {"A": "3 === 第390页 ===", "B": "4", "C": "5", "D": "6"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1151, "question": "某建筑物高度为23m，安全通道棚的顶棚采用木质板搭设，下\n列说法错误的是：（\n）。\nA.防护棚不可采用单层搭设\nB.防护棚长度不可以小于5m\nC.防护棚高度可以为4m\nD.木板厚度可以为50mm", "options": {"A": "防护棚不可采用单层搭设", "B": "防护棚长度不可以小于5m", "C": "防护棚高度可以为4m", "D": "木板厚度可以为50mm"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1152, "question": "密目式安全立网的网目密度应为10cm×10cm 面积上大于或等\n于（\n）目。\nA.800\nB.1200\nC.1800\nD.2000", "options": {"A": "800", "B": "1200", "C": "1800", "D": "2000"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1153, "question": "当立网用于龙门架、物料提升架及井架的封闭防护时，四周边\n绳应与支撑架贴紧，边绳的断裂张力不得小于（\n）kN。\nA.3\nB.4\n\n=== 第391页 ===\nC.5\nD.6", "options": {"A": "3", "B": "4 === 第391页 ===", "C": "5", "D": "6"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 1154, "question": "当立网用于龙门架、物料提升架及井架的封闭防护时，系绳间\n距不得大于（\n）mm。\nA.450\nB.550\nC.650\nD.750", "options": {"A": "450", "B": "550", "C": "650", "D": "750"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1155, "question": "用于电梯井、钢结构和框架结构及构筑物封闭防护的平网，边\n绳的断裂张力不得小于（\n）kN。\nA.5\nB.6\nC.7\nD.8", "options": {"A": "5", "B": "6", "C": "7", "D": "8"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 1156, "question": "用于电梯井、钢结构和框架结构及构筑物封闭防护的平网，系\n绳沿网边应均匀分布，间距不得大于（\n）mm。\nA.450\nB.550\nC.650\n\n=== 第392页 ===\nD.750", "options": {"A": "450", "B": "550", "C": "650 === 第392页 ===", "D": "750"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 1157, "question": "用于电梯井封闭防护的平网，与井壁的空隙不得大于（\n）mm。\nA.15\nB.25\nC.35\nD.45", "options": {"A": "15", "B": "25", "C": "35", "D": "45"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 1158, "question": "深基坑施工应设置扶梯、入坑踏步及专用载人设备或斜道等设\n施。采用斜道时，应加设间距不大于（\n）mm 的防滑条等防滑措\n施。\nA.400\nB.500\nC.600\nD.700", "options": {"A": "400", "B": "500", "C": "600", "D": "700"}, "answer": "A", "type": "single", "category": "基坑工程"}, {"id": 1159, "question": "绑扎立柱和墙体钢筋，下列行为正确的是：（\n）。\nA.沿钢筋骨架攀登\nB.站在骨架上作业\nC.操作平台上作业\nD.在操作平台上搭梯作业", "options": {"A": "沿钢筋骨架攀登", "B": "站在骨架上作业", "C": "操作平台上作业", "D": "在操作平台上搭梯作业"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1160, "question": "高处作业吊篮做升降运行时，工作平台两端高差不得超过（\n）\nmm。\nA.150\nB.250\nC.350\nD.450", "options": {"A": "150", "B": "250", "C": "350", "D": "450"}, "answer": "A", "type": "single", "category": "高处作业"}, {"id": 1161, "question": "某工地高处作业吊篮配备的是使用离心触发式安全锁。当吊篮\n停留在空中作业时，作业人员应将连接安全绳的安全锁（\n）。\nA.锁定\nB.与吊篮下降时保持一致\nC.与吊篮上升时保持一致\nD.都可以", "options": {"A": "锁定", "B": "与吊篮下降时保持一致", "C": "与吊篮上升时保持一致", "D": "都可以"}, "answer": "A", "type": "single", "category": "高处作业"}, {"id": 1162, "question": "在吊篮施工中，为防止污水或涂料安全设施造成影响，在进行\n喷涂、洗刷外墙等作业时，应对（\n）采取防护措施。\nA.平台板\nB.平台栏杆\nC.安全锁\nD.安全帽", "options": {"A": "平台板", "B": "平台栏杆", "C": "安全锁", "D": "安全帽"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1163, "question": "当吊篮的悬挑结构需要向左平行移动2m 时，应将吊篮（\n）。\n\n=== 第394页 ===\nA.提升至顶端\nB.降落至地面\nC.与悬挑结构拆卸分开\nD.钢丝绳处于紧绷状态", "options": {"A": "提升至顶端", "B": "降落至地面", "C": "与悬挑结构拆卸分开", "D": "钢丝绳处于紧绷状态"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1164, "question": "某工人在吊篮内进行电焊作业，他应对（\n）采取保护措施。\nA.钢丝绳\nB.防护栏杆\nC.安全帽\nD.吊篮内另一名工人", "options": {"A": "钢丝绳", "B": "防护栏杆", "C": "安全帽", "D": "吊篮内另一名工人"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1165, "question": "为保障高处作业吊篮的安全，在吊篮内进行电焊作业时，下列\n说法不正确的有：（\n）。\nA.电焊机不能放在吊篮内\nB.电焊缆线不能与吊篮接触\nC.电焊钳搭挂在吊篮上\nD.对电机采取保护措施", "options": {"A": "电焊机不能放在吊篮内", "B": "电焊缆线不能与吊篮接触", "C": "电焊钳搭挂在吊篮上", "D": "对电机采取保护措施"}, "answer": "C", "type": "single", "category": "高处作业"}, {"id": 1166, "question": "吊篮作业时，作业人员应系好安全带，身后的安全带余绳不得\n超过（\n）m。\nA.0.8\nB.1.0\n\n=== 第395页 ===\nC.1.2\nD.1.5", "options": {"A": "0.8", "B": "1.0 === 第395页 ===", "C": "1.2", "D": "1.5"}, "answer": "B", "type": "single", "category": "高处作业"}, {"id": 1167, "question": "下列外架上安全防护平网搭设正确的有：（\n）。\nA.安全防护网应外低里高\nB.每隔4m 设一根支撑杆\nC.支撑杆水平夹角为50°\nD.网与网拼接松散", "options": {"A": "安全防护网应外低里高", "B": "每隔4m 设一根支撑杆", "C": "支撑杆水平夹角为50°", "D": "网与网拼接松散"}, "answer": "C", "type": "single", "category": "脚手架与模板工程"}, {"id": 1168, "question": "高处作业吊篮的防护栏杆在靠近建筑物一侧不应小于（\n）m。\nA.0.8\nB.1.0\nC.1.2\nD.1.5", "options": {"A": "0.8", "B": "1.0", "C": "1.2", "D": "1.5"}, "answer": "A", "type": "single", "category": "高处作业"}, {"id": 1169, "question": "高处作业吊篮的防护栏杆除靠近建筑物的一侧外，另外三个面\n不应小于（\n）m。\nA.0.8\nB.1.0\nC.1.1\nD.1.2", "options": {"A": "0.8", "B": "1.0", "C": "1.1", "D": "1.2"}, "answer": "C", "type": "single", "category": "高处作业"}, {"id": 1170, "question": "高处作业吊篮的防护栏杆应能承受（\n）N 水平移动的集中荷\n载。\nA.400\nB.600\nC.800\nD.1000", "options": {"A": "400", "B": "600", "C": "800", "D": "1000"}, "answer": "D", "type": "single", "category": "高处作业"}, {"id": 1171, "question": "吊篮应急手动滑降装置应可靠有效，下降速度不应大于（\n）\n倍的额定速度。\nA.1.5\nB.1.8\nC.2.0\nD.2.2", "options": {"A": "1.5", "B": "1.8", "C": "2.0", "D": "2.2"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 1172, "question": "吊篮使用过程中，纵向倾斜角度不应大于（\n）。\nA.3°\nB.8°\nC.13°\nD.18°", "options": {"A": "3°", "B": "8°", "C": "13°", "D": "18°"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1173, "question": "移动式操作平台在使用时，出现以下状况可以继续使用的有：\n（\n）。\n\n=== 第397页 ===\nA.垂直\nB.靠墙一侧略微倾斜\nC.不靠墙一侧略微倾斜\nD.斜撑水平方向变形", "options": {"A": "垂直", "B": "靠墙一侧略微倾斜", "C": "不靠墙一侧略微倾斜", "D": "斜撑水平方向变形"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1174, "question": "使用单梯进行攀登作业时，梯子出现下列哪些情况可以继续使\n用：（\n）。\nA.最下面一根踏步缺失\nB.最上面一根踏步缺失\nC.梯面与水平面成75°夹角\nD.梯脚下放置砌块", "options": {"A": "最下面一根踏步缺失", "B": "最上面一根踏步缺失", "C": "梯面与水平面成75°夹角", "D": "梯脚下放置砌块"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1175, "question": "接地与接零保护系统中，施工现场配电系统不得同时采用（\n）\n种保护系统。\nA.1\nB.2\nC.3\nD.4", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 1176, "question": "接地与接零保护系统中，接地装置的接地线应采用（\n）根及\n以上导体，在不同点与接地体做电气连接。\nA.1\n\n=== 第398页 ===\nB.2\nC.3\nD.4", "options": {"A": "1 === 第398页 ===", "B": "2", "C": "3", "D": "4"}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 1177, "question": "接地与接零保护系统中，重复接地电阻不得大于（\n）Ω。\nA.4\nB.6\nC.8\nD.10", "options": {"A": "4", "B": "6", "C": "8", "D": "10"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1178, "question": "施工现场起重机、物料提升机、施工升降机、脚手架应按规范\n要求采取防雷措施，防雷装置的冲击接地电阻值不得大于（\n）Ω。\nA.4\nB.6\nC.10\nD.30", "options": {"A": "4", "B": "6", "C": "10", "D": "30"}, "answer": "D", "type": "single", "category": "脚手架与模板工程"}, {"id": 1179, "question": "配电线路，室内非埋地明敷主干线距地面高度不得小于（\n）\nm。\nA.1.5\nB.2\nC.2.5\n\n=== 第399页 ===\nD.3", "options": {"A": "1.5", "B": "2", "C": "2.5 === 第399页 ===", "D": "3"}, "answer": "C", "type": "single", "category": "用电安全"}, {"id": 1180, "question": "施工现场配电系统应采用三级配电、二级漏电保护系统，用电\n设备（\n）有各自专用的开关箱。\nA.必须\nB.可以\nC.不必\nD.不可以", "options": {"A": "必须", "B": "可以", "C": "不必", "D": "不可以"}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 1181, "question": "配电室的建筑耐火等级不应低于（\n）级，配电室应配置适用\n于电气火灾的灭火器材。\nA.1\nB.2\nC.3\nD.4", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "C", "type": "single", "category": "用电安全"}, {"id": 1182, "question": "在跨越铁路、公路、河流、电力线路档距内，架空线（\n）。\nA.不得有接头\nB.可以有1 个接头\nC.可以有2 个接头\nD.可以有3 个接头", "options": {"A": "不得有接头", "B": "可以有1 个接头", "C": "可以有2 个接头", "D": "可以有3 个接头"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1183, "question": "备用发电机组应与外电线路进行（\n）。\nA.联锁\nB.并联\nC.串联\nD.并联或串联", "options": {"A": "联锁", "B": "并联", "C": "串联", "D": "并联或串联"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1184, "question": "专项用电施工组织设计、外电防护专项方案应履行审批程序，\n实施后应由（\n）组织验收。\nA.技术部\nB.安全部\nC.工程部\nD.相关部门", "options": {"A": "技术部", "B": "安全部", "C": "工程部", "D": "相关部门"}, "answer": "D", "type": "single", "category": "用电安全"}, {"id": 1185, "question": "临时用电使用与维护中，安装、巡检、维修或拆除临时用电设\n备和线路，必须由电工完成，并应有（\n）监护。\nA.人\nB.安全员\nC.技术员\nD.安全总监", "options": {"A": "人", "B": "安全员", "C": "技术员", "D": "安全总监"}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 1186, "question": "临时用电使用与维护中，暂停使用设备的开关箱应分断电源隔\n离开关，并应（\n）。\n\n=== 第401页 ===\nA.关门\nB.挂牌\nC.接地\nD.关门上锁", "options": {"A": "关门", "B": "挂牌", "C": "接地", "D": "关门上锁"}, "answer": "D", "type": "single", "category": "用电安全"}, {"id": 1187, "question": "临时用电使用与维护中，检查、维修时应正确穿戴（\n）、手\n套，必须使用电工绝缘工具。\nA.工作服\nB.工作鞋\nC.劳保鞋\nD.绝缘鞋", "options": {"A": "工作服", "B": "工作鞋", "C": "劳保鞋", "D": "绝缘鞋"}, "answer": "D", "type": "single", "category": "用电安全"}, {"id": 1188, "question": "沿构、建筑物水平敷设的电缆线路，距地面高度不宜小于（\n）\nm。\nA.1.5\nB.2\nC.2.5\nD.3", "options": {"A": "1.5", "B": "2", "C": "2.5", "D": "3"}, "answer": "C", "type": "single", "category": "用电安全"}, {"id": 1189, "question": "电缆线路应固定牢固，绑扎线应使用（\n）。\nA.铁丝\nB.扎丝\n\n=== 第402页 ===\nC.扣件\nD.塑料扎带", "options": {"A": "铁丝", "B": "扎丝 === 第402页 ===", "C": "扣件", "D": "塑料扎带"}, "answer": "D", "type": "single", "category": "用电安全"}, {"id": 1190, "question": "垂直引上敷设的电缆线路，固定点每楼层不得少于（\n）处。\nA.1\nB.2\nC.3\nD.4", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 1191, "question": "室内配线在穿过楼板或墙壁时应用（\n）保护。\nA.铁管\nB.铝管\nC.铜管\nD.pvc 套管", "options": {"A": "铁管", "B": "铝管", "C": "铜管", "D": "pvc 套管"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1192, "question": "工作人员在工作中正常活动范围与（\n）及以下电压等级设备\n带电部位的最小安全距离不得小于0.7m。\nA.1kV\nB.10kV\nC.15kV\nD.20kV", "options": {"A": "1kV", "B": "10kV", "C": "15kV", "D": "20kV"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1193, "question": "行灯在使用中经常需要手持移动，而（\n）V 的临时照明灯具\n无法提供必要的电击防护措施，易导致电击事故发生，不能作为行灯\n使用。\nA.12\nB.24\nC.36\nD.220", "options": {"A": "12", "B": "24", "C": "36", "D": "220"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 1194, "question": "（\n）类电气设备不仅依靠基本绝缘，还将易电击的导电部分\n连接到设备固定布线中的保护（接地）导体上。\nA.1\nB.2\nC.3\nD.4", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 1195, "question": "交流电焊机装设防触电保护器的目的是为了（\n），其二次侧\n空载电压过高，导致电击事故的发生。\nA.防止交流电焊机未施焊时\nB.开路\nC.短路\nD.断路", "options": {"A": "防止交流电焊机未施焊时", "B": "开路", "C": "短路", "D": "断路"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 1196, "question": "（\n）系统为电力系统有一点直接接地，电气设备的外露可导\n电部分通过保护导体（PE）接至与电力系统接地点无关的接地装置。\nA.TT\nB.TN-S\nC.TN-C-S\nD.TN-C", "options": {"E": "接至与电力系统接地点无关的接地装置。", "A": "TT", "B": "TN-S", "C": "TN-C-S", "D": "TN-C"}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 1197, "question": "因TT 系统接地故障电流小，应在（\n）上装设剩余电流保护\n器。\nA.每一回路\nB.两个回路\nC.三个回路\nD.整个回路", "options": {"A": "每一回路", "B": "两个回路", "C": "三个回路", "D": "整个回路"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1198, "question": "在一般地区1kV～10kV 电压导线的边线延伸距离为（\n）m。\nA.2\nB.3\nC.5\nD.10", "options": {"A": "2", "B": "3", "C": "5", "D": "10"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1199, "question": "电缆的中间接头应能保证原电缆的电气特性，并能（\n）可靠。\nA.防水\n\n=== 第405页 ===\nB.绝缘\nC.防水且绝缘\nD.防水或绝缘", "options": {"A": "防水 === 第405页 ===", "B": "绝缘", "C": "防水且绝缘", "D": "防水或绝缘"}, "answer": "C", "type": "single", "category": "用电安全"}, {"id": 1200, "question": "施工现场的直埋线路宜采用（\n）电缆。\nA.防水\nB.铠装\nC.普通\nD.五芯线缆", "options": {"A": "防水", "B": "铠装", "C": "普通", "D": "五芯线缆"}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 1201, "question": "一般施工现场的低压配电系统宜采用（\n）级配电。\nA.1\nB.2\nC.3\nD.4", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "C", "type": "single", "category": "用电安全"}, {"id": 1202, "question": "配电箱中电源进线保护电器和出线回路保护电器，由于在一个\n箱体内，按（\n）级配电处理。\nA.1\nB.2\nC.3\nD.4\n\n=== 第406页 ===", "options": {"A": "1", "B": "2", "C": "3", "D": "4 === 第406页 ==="}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 1203, "question": "施工现场为低压供电，第（\n）个配电柜或配电箱，亦称为总\n配电箱。\nA.1\nB.2\nC.3\nD.4", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 1204, "question": "消防水泵等，由于对供电可靠性要求比较高，因此，要求由总\n配电箱的（\n） 1\nB.32\nC.44\nD.67", "options": {"A": "21", "B": "32", "C": "44", "D": "67"}, "answer": "D", "type": "single", "category": "用电安全"}, {"id": 1214, "question": "在分配电箱设置插座直接给末级配电箱供电，省去了接线的工\n作，提高了工作效率，为保证供电的安全可靠性，应采用（\n）插\n座。\nA.家用\nB.工业用\nC.智能\nD.普通", "options": {"A": "家用", "B": "工业用", "C": "智能", "D": "普通"}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 1215, "question": "末级配电箱应在装设具有短路保护、过负荷保护功能电器的基\n\n=== 第410页 ===\n础上装设具有（\n）的电器。\nA.漏电保护\nB.剩余电流动作保护功能\nC.发热保护\nD.接地保护", "options": {"A": "漏电保护", "B": "剩余电流动作保护功能", "C": "发热保护", "D": "接地保护"}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 1216, "question": "为防止箱式变电站基础受水冲刷、浸泡，规定户外安装的箱式\n变电站底部距地面的高度不应小于（\n）m。\nA.0.5\nB.0.7\nC.0.8\nD.1", "options": {"A": "0.5", "B": "0.7", "C": "0.8", "D": "1"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 1217, "question": "变压器在投入运行前，使其低压侧开路，由系统供电侧（高压\n侧）对变压器进行（\n）次冲击合闸试验。\nA.1\nB.2\nC.3\nD.5", "options": {"A": "1", "B": "2", "C": "3", "D": "5"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1218, "question": "DK 表示什么意思（\n）。\nA.开关\n\n=== 第411页 ===\nB.电源隔离开关\nC.普通开关\nD.太空插头", "options": {"A": "开关 === 第411页 ===", "B": "电源隔离开关", "C": "普通开关", "D": "太空插头"}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 1219, "question": "施工现场临时用电设备在（\n）台及以上或设备总容量在50kW\n及以上者，应编制用电组织设计。\nA.3\nB.4\nC.5\nD.6", "options": {"A": "3", "B": "4", "C": "5", "D": "6"}, "answer": "C", "type": "single", "category": "用电安全"}, {"id": 1220, "question": "施工现场临时用电设备在5 台及以上或设备总容量在（\n）kW\n及以上者，应编制用电组织设计。\nA.30\nB.40\nC.50\nD.60", "options": {"A": "30", "B": "40", "C": "50", "D": "60"}, "answer": "C", "type": "single", "category": "用电安全"}, {"id": 1221, "question": "施工现场临时用电设备在（\n）台以下和设备总容量在（\n）\nkW 以下者，应制定安全用电和电气防火措施。\nA.5；40\nB.5；50\n\n=== 第412页 ===\nC.4；40\nD.4；50", "options": {"A": "5；40", "B": "5；50 === 第412页 ===", "C": "4；40", "D": "4；50"}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 1222, "question": "施工现场开挖沟槽边缘与外电埋地电缆沟槽边缘之间的距离不\n得小于（\ {"A": "1.2", "B": "1.5", "C": "1.8", "D": "2.2"}, "answer": "D", "type": "single", "category": "用电安全"}, {"id": 1249, "question": "配电装置的上端距顶棚不小于（\n）m。\nA.0.5\nB.0.6\n\n=== 第421页 ===\nC.0.8\nD.1", "options": {"A": "0.5", "B": "0.6 === 第421页 ===", "C": "0.8", "D": "1"}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 1250, "question": "电源隔离开关分断时应有明显（\n）。\nA.可见分断点\nB.显示\nC.标识\nD.带电显示器", "options": {"A": "可见分断点", "B": "显示", "C": "标识", "D": "带电显示器"}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 1251, "question": "电流表与计费电度表不得共用一组（\n）。\nA.电流互感器\nB.电压互感器\nC.远程控制线\nD.漏电保护器", "options": {"A": "电流互感器", "B": "电压互感器", "C": "远程控制线", "D": "漏电保护器"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1252, "question": "配电柜应（\n），并应有用途标记。\nA.编号\nB.分组\nC.垫高\nD.涂色", "options": {"A": "编号", "B": "分组", "C": "垫高", "D": "涂色"}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 1253, "question": "配电柜或配电线路停电维修时，应挂接地线，并应悬挂“（\n）”\n\n=== 第422页 ===\n停电标志牌。停送电必须由专人负责。\nA.禁止合闸、有人工作\nB.危险\nC.带电设备\nD.禁止靠近", "options": {"A": "禁止合闸、有人工作", "B": "危险", "C": "带电设备", "D": "禁止靠近"}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 1254, "question": "停送电应设置（\n）监护。\nA.专人\nB.安全员\nC.监理\nD.电工", "options": {"A": "专人", "B": "安全员", "C": "监理", "D": "电工"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1255, "question": "发电机组的排烟管道（\n）伸出室外。\nA.应\nB.不应\nC.可以\nD.不能", "options": {"A": "应", "B": "不应", "C": "可以", "D": "不能"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1256, "question": "发电机组并列运行时，应装设（\n）装置，并在机组同步运行\n后再向负载供电。\nA.同期\nB.异步\n\n=== 第423页 ===\nC.同步\nD.变异", "options": {"A": "同期", "B": "异步 === 第423页 ===", "C": "同步", "D": "变异"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1257, "question": "架空线路末端电压偏移不大于其额定电压的（\n）%。\nA.1\nB.5\nC.10\nD.15", "options": {"A": "1", "B": "5", "C": "10", "D": "15"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1258, "question": "三相四线制线路的N 线和PE 线截面不小于相线截面的（\n）%，\n单相线路的零线截面与相线截面相同。\nA.10\nB.20\nC.50\nD.60", "options": {"A": "10", "B": "20", "C": "50", "D": "60"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1259, "question": "按机械强度要求，绝缘铜线截面不小于（\n）mm²，绝缘铝线\n截面不小于（\n）mm²。\nA.10；10\nB.10；16\nC.16；16\nD.16；18\n\n=== 第424页 ===", "options": {"A": "10；10", "B": "10；16", "C": "16；16", "D": "16；18 === 第424页 ==="}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1260, "question": "房屋建筑工程施工的安全管理检查评定时，下列选项中属于文\n明施工检查评定的一般项目的是（\n）。\nA.现场围挡\nB.材料管理\nC.现场办公与住宿\nD.生活设施", "options": {"A": "现场围挡", "B": "材料管理", "C": "现场办公与住宿", "D": "生活设施"}, "answer": "D", "type": "single", "category": "文明施工"}, {"id": 1261, "question": "房屋建筑工程施工的安全管理检查评定时，下列选项中属于文\n明施工检查评定的保证项目的是（\n）。\nA.综合治理\nB.现场防火\nC.社区服务\nD.公示标牌", "options": {"A": "综合治理", "B": "现场防火", "C": "社区服务", "D": "公示标牌"}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 1262, "question": "根据《市政工程施工安全检查标准》，下列哪项是施工现场的围\n挡基础的要求（\n）。\nA.牢固\nB.整洁\nC.美观\nD.顺直", "options": {"A": "牢固", "B": "整洁", "C": "美观", "D": "顺直"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1263, "question": "根据《市政工程施工安全检查标准》，下列哪项是施工现场的围\n挡立面的要求（\n）。\nA.稳定\nB.整洁\nC.坚实\nD.牢固", "options": {"A": "稳定", "B": "整洁", "C": "坚实", "D": "牢固"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1264, "question": "JGJ59-2011 标准文明施工中封闭管理栏目要求施工人员进入施\n工现场应（\n）。\nA.穿着工作服\nB.佩戴工作卡\nC.佩戴护目镜\nD.携带身份证", "options": {"A": "穿着工作服", "B": "佩戴工作卡", "C": "佩戴护目镜", "D": "携带身份证"}, "answer": "B", "type": "single", "category": "文明施工"}, {"id": 1265, "question": "JGJ59-2011 标准文明施工中封闭管理栏目要求施工现场出入口\n应标有企业名称或标识，并应设置（\n）。\nA.平面图\nB.车辆停放点\nC.车辆冲洗设施\nD.安全标志", "options": {"A": "平面图", "B": "车辆停放点", "C": "车辆冲洗设施", "D": "安全标志"}, "answer": "C", "type": "single", "category": "文明施工"}, {"id": 1266, "question": "下列不属于《建筑施工安全检查标准》JGJ 59-2011 文明施工一\n\n=== 第426页 ===\n般项目中社区服务的内容是（\n）。\nA.夜间施工前，必须经批准后方可进行施工\nB.施工现场应有安全标语\nC.施工现场严禁焚烧各类废弃物\nD.施工现场应制定防粉尘、防噪音、防光污染等措施", "options": {"A": "夜间施工前，必须经批准后方可进行施工", "B": "施工现场应有安全标语", "C": "施工现场严禁焚烧各类废弃物", "D": "施工现场应制定防粉尘、防噪音、防光污染等措施"}, "answer": "B", "type": "single", "category": "文明施工"}, {"id": 1267, "question": "下列有关《建筑施工安全检查标准》JGJ 59-2011 文明施工一般\n项目中生活设施内容说法错误的是（\n）。\nA.食堂使用的燃气罐与其它物品共同存放时，应保持存放间通风良好\nB.应建立卫生责任制度并落实到人\nC.食堂与厕所、垃圾站、有毒有害场所等污染源的距离应符合规范要\n求\nD.食堂必须有卫生许可证，炊事人员必须持身体健康证上岗", "options": {"A": "食堂使用的燃气罐与其它物品共同存放时，应保持存放间通风良好", "B": "应建立卫生责任制度并落实到人", "C": "食堂与厕所、垃圾站、有毒有害场所等污染源的距离应符合规范要 求", "D": "食堂必须有卫生许可证，炊事人员必须持身体健康证上岗"}, "answer": "A", "type": "single", "category": "文明施工"}, {"id": 1268, "question": "下列不属于《建筑施工安全检查标准》JGJ 59-2011 文明施工保\n证项目中现场围挡内容的是（\n）。\nA.市区主要路段的工地应设置高度不小于2.5m 的封闭围挡\nB.一般路段的工地应设置高度不小于1.8m 的封闭围挡\nC.围挡应坚固、稳定、整洁、美观\nD.围挡基础应坚实、牢固", "options": {"A": "市区主要路段的工地应设置高度不小于2.5m 的封闭围挡", "B": "一般路段的工地应设置高度不小于1.8m 的封闭围挡", "C": "围挡应坚固、稳定、整洁、美观", "D": "围挡基础应坚实、牢固"}, "answer": "D", "type": "single", "category": "文明施工"}, {"id": 1269, "question": "《建设工程施工现场消防安全技术规范》中规定易燃易爆危险\n\n=== 第427页 ===\n品库房与在建工程的防火间距不应小于（\n）m。\nA.10\nB.12\nC.15\nD.20", "options": {"A": "10", "B": "12", "C": "15", "D": "20"}, "answer": "C", "type": "single", "category": "消防安全"}, {"id": 1270, "question": "《建设工程施工现场消防安全技术规范》中规定可燃材料堆场\n及其加工场、固定动火作业场与在建工程的防火间距不应小于（\n）\nm。\nA.10\nB.12\nC.15\nD.20", "options": {"A": "10", "B": "12", "C": "15", "D": "20"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 1271, "question": "施工现场内应设置临时消防车道，临时消防车道与在建工程、\n临时用房、可燃材料堆场及其加工场的距离不宜小于（\n）m，且\n不宜大于40m。\nA.5\nB.6\nC.7\nD.8", "options": {"A": "5", "B": "6", "C": "7", "D": "8"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 1272, "question": "宿舍、办公用房建筑构件的燃烧性能等级应为（\n）级。当采\n用金属夹芯板材时，其芯材的燃烧性能等级应为A 级。\nA.A\nB.B1\nC.B2\nD.B3", "options": {"A": "A", "B": "B1", "C": "B2", "D": "B3"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 1273, "question": "宿舍、办公用房层数为3 层或每层建筑面积大于200m²时，应\n设置至少（\n）部疏散楼梯，房间疏散门至疏散楼梯的最大距离不\n应大于25m。\nA.1\nB.2\nC.3\nD.4", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1274, "question": "在建工程作业场所临时疏散通道的耐火极限不应低于（\n）h。\nA.1.5\nB.1.0\nC.0.5\nD.0.25", "options": {"A": "1.5", "B": "1.0", "C": "0.5", "D": "0.25"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1275, "question": "施工现场临时室外消防给水干管的管径，应根据施工现场临时\n\n=== 第429页 ===\n消防用水量和干管内水流计算速度计算确定，且不应小于（\n）。\nA.DN50\nB.DN75\nC.DN100\nD.DN25", "options": {"A": "DN50", "B": "DN75", "C": "DN100", "D": "DN25"}, "answer": "C", "type": "single", "category": "消防安全"}, {"id": 1276, "question": "在建工程结构施工完毕的每层楼梯处应设置消防水枪、水带及\n软管，且每个设置点不应少于（\n）套。\nA.2\nB.3\nC.4\nD.5", "options": {"A": "2", "B": "3", "C": "4", "D": "5"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 1277, "question": "施工现场临时消防给水系统应与施工现场生产、生活给水系统\n合并设置，但应设置将生产、生活用水转为消防用水的应急阀门。应\n急阀门不应超过（\n）个。\nA.1\nB.2\nC.3\nD.4", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 1278, "question": "按《建设工程施工现场环境与卫生标准》\n（JGJ146－2013）\n（5.1.18）\n\n=== 第430页 ===\n厕位宜设置门及隔板，高度不应小于（\n）。\nA.0.8m\nB.0.9m\nC.1m\nD.1.2m", "options": {"A": "0.8m", "B": "0.9m", "C": "1m", "D": "1.2m"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 1279, "question": "按《建设工程施工现场环境与卫生标准》\n（JGJ146－2013）\n（5.1.5）\n宿舍内应保证必要的生活空间，室内净高不得小于（\n）。\nA.2m\nB.2.8m\nC.2.5m\nD.3m", "options": {"A": "2m", "B": "2.8m", "C": "2.5m", "D": "3m"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 1280, "question": "按《建设工程施工现场环境与卫生标准》\n（JGJ146－2013）\n（5.1.5）\n宿舍内应保证必要的生活空间，室内通道宽度不得小于（\n）。\nA.0.5m\nB.0.7m\nC.1m\nD.0.9m", "options": {"A": "0.5m", "B": "0.7m", "C": "1m", "D": "0.9m"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 1281, "question": "根据《建设工程施工现场消防安全技术规范》(GB50720—2011）\n规定，高度超过100m 的在建工程，应在适当楼层增设临时中转水池\n\n=== 第431页 ===\n及加压水泵。中转水池的有效容积不应少于（\n），上下两个中转水\n池的高差不宜超过100m。\nA.15m³\nB.10m³\nC.20m³\nD.25m³", "options": {"A": "15m³", "B": "10m³", "C": "20m³", "D": "25m³"}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 1282, "question": "宿舍、办公用房建筑层数不应超过3 层，每层建筑面积不应大\n于（\n）m²。\nA.200\nB.300\nC.400\nD.500", "options": {"A": "200", "B": "300", "C": "400", "D": "500"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1283, "question": "现浇钢筋混凝土梁、板跨度大时，模板应起拱：当设计无具体\n要求时，起拱高度宜为全跨长度的（\n）。\nA.1/1000～3/1000\nB.1/1000～4/1000\nC.2/1000～3/1000\nD.2/1000～4/1000", "options": {"A": "1/1000～3/1000", "B": "1/1000～4/1000", "C": "2/1000～3/1000", "D": "2/1000～4/1000"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 1284, "question": "现浇钢筋混凝土梁、板，当跨度大于（\n）m 时，模板应起拱。\n\n=== 第432页 ===\nA.3\nB.4\nC.5\nD.6", "options": {"A": "3", "B": "4", "C": "5", "D": "6"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 1285, "question": "扣件式钢管模板支撑体系中，钢管立柱顶部应设U 型支托，螺\n杆伸出钢管顶部不得大于（\n）mm。\nA.150\nB.200\nC.250\nD.300", "options": {"A": "150", "B": "200", "C": "250", "D": "300"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 1286, "question": "拼装高度为（\n）m 以上的竖向模板，不得站在下层模板上拼\n装上层模板。安装过程中应设置临时固定设施。\nA.2\nB.2.5\nC.3\nD.4", "options": {"A": "2", "B": "2.5", "C": "3", "D": "4"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 1287, "question": "在立柱底距地面（\n）mm 高处，沿纵横水平方向应按纵下横\n上的程序设扫地杆。\nA.150\n\n=== 第433页 ===\nB.200\nC.250\nD.300", "options": {"A": "150 === 第433页 ===", "B": "200", "C": "250", "D": "300"}, "answer": "B", "type": "single", "category": "高处作业"}, {"id": 1288, "question": "当模板安装高度超过（\n）m 时，必须搭设脚手架，除操作人\n员外，脚手架下不得站其他人。\nA.2\nB.3\nC.4\nD.5", "options": {"A": "2", "B": "3", "C": "4", "D": "5"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 1289, "question": "吊运大块或整体模板时，竖向吊运不应少于两个吊点，水平吊\n运不应少于（\n）个吊点。\nA.2\nB.3\nC.4\nD.5", "options": {"A": "2", "B": "3", "C": "4", "D": "5"}, "answer": "C", "type": "single", "category": "脚手架与模板工程"}, {"id": 1290, "question": "采用扣件式钢管作为立柱支撑时，立柱底部应设置底座及垫板，\n垫板厚度不小于（\n）mm。\nA.50\nB.60\n\n=== 第434页 ===\nC.80\nD.100", "options": {"A": "50", "B": "60 === 第434页 ===", "C": "80", "D": "100"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 1291, "question": "钢管支架立柱底部不在同一高度时，高处的纵向扫地杆应向低\n处延长不少于（\n）跨，高低差不得大于（\n）m。\nA.1；1\nB.1；2\nC.2；1\nD.2；2", "options": {"A": "1；1", "B": "1；2", "C": "2；1", "D": "2；2"}, "answer": "C", "type": "single", "category": "脚手架与模板工程"}, {"id": 1292, "question": "钢管支撑立柱接长严禁搭接，必须采用对接扣件连接，相邻两\n立柱的对接接头不得在同步内，且对接接头沿竖向错开的距离不宜小\n于（\n）mm。\nA.200\nB.300\nC.400\nD.500", "options": {"A": "200", "B": "300", "C": "400", "D": "500"}, "answer": "D", "type": "single", "category": "脚手架与模板工程"}, {"id": 1293, "question": "现场拼装柱模时，应适时地按设临时支撑进行固定，斜撑与地\n面的倾角宜为（\n）°。\nA.40\nB.45\n\n=== 第435页 ===\nC.50\nD.60", "options": {"A": "40", "B": "45 === 第435页 ===", "C": "50", "D": "60"}, "answer": "D", "type": "single", "category": "脚手架与模板工程"}, {"id": 1294, "question": "多层悬挑结构模板支撑的立柱应连续支撑，并不得少于（\n）\n层。\nA.2\nB.3\nC.4\nD.5", "options": {"A": "2", "B": "3", "C": "4", "D": "5"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 1295, "question": "基础及地下工程模板施工时，斜支撑与侧模的夹角不应小于\n（\n）°。\nA.30\nB.45\nC.50\nD.60", "options": {"A": "30", "B": "45", "C": "50", "D": "60"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 1296, "question": "基础及地下工程模板施工时，距基槽（坑）上口边缘（\n）m\n内不得堆放模板。\nA.0.5\nB.1\nC.1.5\n\n=== 第436页 ===\nD.2", "options": {"A": "0.5", "B": "1", "C": "1.5 === 第436页 ===", "D": "2"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 1297, "question": "大模板爬升时附墙架穿墙螺栓受力处的新浇混凝土应达到\n（\n）N/mm²。\nA.5\nB.10\nC.15\nD.20", "options": {"A": "5", "B": "10", "C": "15", "D": "20"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 1298, "question": "当混凝土未达到规定强度或已达到设计规定强度，需提前拆模\n或承受部分超设计荷载时，必须经过计算和（\n）确认其强度能足\n够承受此荷载后，方可拆除。\nA.项目经理\nB.技术主管\nC.安全员\nD.施工员", "options": {"A": "项目经理", "B": "技术主管", "C": "安全员", "D": "施工员"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 1299, "question": "在承重焊接钢筋骨架作配筋的结构中，承受混凝土重量的模板，\n应在混凝土达到设计强度的（\n）后方可拆除承重模板。\nA.25%\nB.50%\nC.75%\n\n=== 第437页 ===\nD.100%", "options": {"A": "25%", "B": "50%", "C": "75% === 第437页 ===", "D": "100%"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 1300, "question": "后张预应力混凝土结构的侧模宜在（\n）拆除。\nA.施加预应力前\nB.施加预应力后\nC.混凝土达到设计强度50%后\nD.混凝土达到设计强度75%后", "options": {"A": "施加预应力前", "B": "施加预应力后", "C": "混凝土达到设计强度50%后", "D": "混凝土达到设计强度75%后"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1301, "question": "后张预应力混凝土结构的底模宜在（\n）拆除。\nA.施加预应力前\nB.施加预应力后\nC.混凝土达到设计强度50%后\nD.混凝土达到设计强度75%后", "options": {"A": "施加预应力前", "B": "施加预应力后", "C": "混凝土达到设计强度50%后", "D": "混凝土达到设计强度75%后"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1302, "question": "高处拆除模板时，操作层临时堆放的模板不能超过（\n）层。\nA.3\nB.4\nC.5\nD.6", "options": {"A": "3", "B": "4", "C": "5", "D": "6"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 1303, "question": "在提前拆除互相搭连并涉及其他后拆模板的支撑时，应补设\n（\n）。\n\n=== 第438页 ===\nA.竖向支撑\nB.横向支撑\nC.临时支撑\nD.剪刀撑", "options": {"A": "竖向支撑", "B": "横向支撑", "C": "临时支撑", "D": "剪刀撑"}, "answer": "C", "type": "single", "category": "脚手架与模板工程"}, {"id": 1304, "question": "拆模时对活动部件应（\n）拆除。\nA.一次\nB.两次\nC.1h 内\nD.2h 内", "options": {"A": "一次", "B": "两次", "C": "1h 内", "D": "2h 内"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1305, "question": "已拆除了模板的结构，应在混凝土强度达到（\n）后方可承受\n全部设计荷载。\nA.设计强度值\nB.75%设计强度值\nC.80%设计强度值\nD.90%设计强度值", "options": {"A": "设计强度值", "B": "75%设计强度值", "C": "80%设计强度值", "D": "90%设计强度值"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 1306, "question": "当拆除钢楞、木楞、钢桁架时，应在其（\n）临时搭设防护支\n架。\nA.侧面\nB.两侧\n\n=== 第439页 ===\nC.下面\nD.以上都不对", "options": {"A": "侧面", "B": "两侧 === 第439页 ===", "C": "下面", "D": "以上都不对"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1307, "question": "钢管满堂模板支架专项施工方案实施前，应进行（\n）。\nA.安全教育\nB.安全技术交底\nC.安全检查\nD.安全验收", "options": {"A": "安全教育", "B": "安全技术交底", "C": "安全检查", "D": "安全验收"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 1308, "question": "钢管满堂模板支架的水平杆和扫地杆设置，下列说法正确的是\n（\n）。\nA.隔跨设置\nB.纵、横向连续设置\nC.可单向设置\nD.以上都不对", "options": {"A": "隔跨设置", "B": "纵、横向连续设置", "C": "可单向设置", "D": "以上都不对"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 1309, "question": "扣件式钢管模板支撑架的水平杆采用搭接连接时，其搭接长度\n不应小于（\n）m，并应不少于3 处扣接点。\nA.1\nB.1.2\nC.1.5\nD.2\n\n=== 第440页 ===", "options": {"A": "1", "B": "1.2", "C": "1.5", "D": "2 === 第440页 ==="}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 1310, "question": "扣件式钢管模板支撑架立杆应采用对接扣件连接，（\n）搭接\n接长。\nA.可以\nB.不得\nC.特殊情况下可以\nD.以上都不对", "options": {"A": "可以", "B": "不得", "C": "特殊情况下可以", "D": "以上都不对"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 1311, "question": "钢管满堂模板支架专用斜撑杆的两端应固定在（\n）。\nA.立杆上\nB.水平杆上\nC.纵、横向水平杆与立杆交汇的节点处\nD.以上都不对", "options": {"A": "立杆上", "B": "水平杆上", "C": "纵、横向水平杆与立杆交汇的节点处", "D": "以上都不对"}, "answer": "C", "type": "single", "category": "脚手架与模板工程"}, {"id": 1312, "question": "当无外脚手架时，架体顶面四周应设置宽度不小于（\n）mm\n的作业平台。\nA.800\nB.900\nC.1000\nD.1200", "options": {"A": "800", "B": "900", "C": "1000", "D": "1200"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 1313, "question": "钢管扣件满堂架架体与既有结构连接件的连接点距离架体主节\n\n=== 第441页 ===\n点不应大于（\n）mm。\nA.150\nB.200\nC.250\nD.300", "options": {"A": "150", "B": "200", "C": "250", "D": "300"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1314, "question": "可调托撑螺杆插入立杆内的长度不得小于（\n）mm。\nA.100\nB.150\nC.200\nD.250", "options": {"A": "100", "B": "150", "C": "200", "D": "250"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1315, "question": "型钢纵梁间应设置横向连接系将（\n）内全部纵梁连接成整体。\nA.相邻两跨\nB.相邻三跨\nC.同跨\nD.以上都不对", "options": {"A": "相邻两跨", "B": "相邻三跨", "C": "同跨", "D": "以上都不对"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1316, "question": "贝雷梁两端及支承位置均应设置通长横向连接系，且其间距不\n应大于（\n）m。\nA.6\nB.7\n\n=== 第442页 ===\nC.8\nD.9", "options": {"A": "6", "B": "7 === 第442页 ===", "C": "8", "D": "9"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1317, "question": "梁柱式模板支撑架桁架式纵横梁应在支承位置设置（\n）限位\n装置。\nA.横向\nB.竖向\nC.侧向\nD.斜向", "options": {"A": "横向", "B": "竖向", "C": "侧向", "D": "斜向"}, "answer": "C", "type": "single", "category": "脚手架与模板工程"}, {"id": 1318, "question": "两根及以上型钢构成的组合梁，应采用（\n）将型钢连接成整\n体。\nA.垫板、加劲肋\nB.加劲肋\nC.型钢\nD.以上都不对", "options": {"A": "垫板、加劲肋", "B": "加劲肋", "C": "型钢", "D": "以上都不对"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1319, "question": "倾斜设置的纵梁或横梁（\n）应采取可靠的防滑移固定措施。\nA.梁底\nB.支座处\nC.梁中部\nD.梁侧面\n\n=== 第443页 ===", "options": {"A": "梁底", "B": "支座处", "C": "梁中部", "D": "梁侧面 === 第443页 ==="}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1320, "question": "下行式模架的托架采用（\n）连接时，精轧螺纹钢筋的使用次\n数不应超过设计要求。\nA.对拉\nB.非对拉\nC.法兰\nD.焊接", "options": {"A": "对拉", "B": "非对拉", "C": "法兰", "D": "焊接"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1321, "question": "移动模架在首孔梁浇筑位置首次安装就位后应按不小于（\n）\n倍施工总荷载进行预压试验。\nA.1.1\nB.1.2\nC.1.5\nD.1.8", "options": {"A": "1.1", "B": "1.2", "C": "1.5", "D": "1.8"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1322, "question": "模架打开过孔前应确认电路、油路运行正常，并应（\n）所有\n影响模架位移的约束。\nA.保持\nB.解除\nC.解除部分\nD.以上都不对", "options": {"A": "保持", "B": "解除", "C": "解除部分", "D": "以上都不对"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1323, "question": "移动模架安装完成或纵移定位后，支撑主梁的油缸应处于（\n）\n状态。\nA.锁定\nB.活动\nC.半锁定\nD.以上都不对", "options": {"A": "锁定", "B": "活动", "C": "半锁定", "D": "以上都不对"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 1324, "question": "风力大于（\n）级时，不得进行移动模架施工作业。\nA.4\nB.5\nC.6\nD.7", "options": {"A": "4", "B": "5", "C": "6", "D": "7"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1325, "question": "移动模架拆除应（\n）进行，防止整体结构失衡失稳。\nA.从左至右\nB.从右至左\nC.对称\nD.分段", "options": {"A": "从左至右", "B": "从右至左", "C": "对称", "D": "分段"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1326, "question": "挂篮采用螺栓连接进行拼装时，（\n）对螺栓孔进行切割扩孔。\nA.严禁\nB.可以\n\n=== 第445页 ===\nC.特殊时可以\nD.尽量不要", "options": {"A": "严禁", "B": "可以 === 第445页 ===", "C": "特殊时可以", "D": "尽量不要"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1327, "question": "挂篮施工时，混凝土浇筑应
