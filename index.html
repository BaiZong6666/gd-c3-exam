"安全生产保障 === 第192页 ===", "C": "职业危害知识", "D": "工伤保险"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 567, "question": "张某从技工学校电焊专业毕业后，被招录到某建筑公司从事电焊\n工作，按要求申办特种作业操作证。根据《特种作业人员安全技术培\n训考核管理规定》关于张某安全培训要求的说法，正确的是（\n）。\nA.免于安全培训，可以直接取得操作证\nB.免于实际操作培训，仍需理论培训\nC.免于理论培训，仍需实际操作培训\nD.持学历证明经考核发证机关同意，可免予专业培训", "options": {"A": "免于安全培训，可以直接取得操作证", "B": "免于实际操作培训，仍需理论培训", "C": "免于理论培训，仍需实际操作培训", "D": "持学历证明经考核发证机关同意，可免予专业培训"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 568, "question": "根据《生产安全事故应急条例》，关于生产安全事故应急工作的\n说法，正确的是（\n）。\nA.国务院应急管理部门统筹领导全国的生产安全事故应急工作\nB.生产安全事故应急工作涉及两个行政区域的，可由共同的上一级人\n民政府负责\nC.根据生产安全事故的类型确定统一领导生产安全事故应急工作的\n部门\nD.生产安全事故应急工作涉及两个行政区域的，可由这两个行政区域\n的人民政府负责", "options": {"A": "国务院应急管理部门统筹领导全国的生产安全事故应急工作", "B": "生产安全事故应急工作涉及两个行政区域的，可由共同的上一级人 民政府负责", "C": "根据生产安全事故的类型确定统一领导生产安全事故应急工作的 部门", "D": "生产安全事故应急工作涉及两个行政区域的，可由这两个行政区域 的人民政府负责"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 569, "question": "根据《建设工程安全生产管理条例》，关于建设单位安全生产的\n\n=== 第193页 ===\n说法，正确的是（\n）。\nA.建设单位经与施工单位协商，可以适当压缩合同工期\nB.在申领施工许可证时，建设单位应当提供建设工程有关安全施工措\n施的资料\nC.建设单位在编制工程概算时，可以暂不考虑安全施工措施所需要的\n费用\nD.在拆除工程施工15 日后，建设单位应当及时向所在地建设行政主\n管部门备案", "options": {"A": "建设单位经与施工单位协商，可以适当压缩合同工期", "B": "在申领施工许可证时，建设单位应当提供建设工程有关安全施工措 施的资料", "C": "建设单位在编制工程概算时，可以暂不考虑安全施工措施所需要的 费用", "D": "在拆除工程施工15 日后，建设单位应当及时向所在地建设行政主 管部门备案"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 570, "question": "某公司有女职工和未成年工。根据《中华人民共和国劳动法》，\n下列对女职工和未成年工特殊保护的做法中，正确的是（\n）。\nA.该公司安排17 周岁员工李某从事矿山井下的劳动\nB.该公司安排16 周岁员工王某从事第二级体力劳动强度的后勤保障\n工作\nC.该公司安排女职工金某生育期间休两个月的产假\nD.该公司安排怀孕七个月以上的女职工胡某夜班劳动", "options": {"A": "该公司安排17 周岁员工李某从事矿山井下的劳动", "B": "该公司安排16 周岁员工王某从事第二级体力劳动强度的后勤保障 工作", "C": "该公司安排女职工金某生育期间休两个月的产假", "D": "该公司安排怀孕七个月以上的女职工胡某夜班劳动"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 571, "question": "根据《生产安全事故应急预案管理办法》，关于应急预案备案的\n说法，正确的是（\n）。\nA.地方各级安全监管部门的应急预案，应当报上一级安全监管部门备\n案\nB.生产经营单位应当在应急预案公布之日起1 个月内，按照分级属地\n\n=== 第194页 ===\n原则向安全监管部门和有关部门进行告知性备案\nC.中央企业总部（上市公司）的应急预案报所在地的省级或者设区的\n市级人民政府负有安全监管职责的部门备案\nD.对于实行安全生产许可的生产经营单位，已经进行应急预案备案的，\n在申请安全生产许可证时，可以不提供相应的应急预案，仅提供应急\n预案备案登记表", "options": {"A": "地方各级安全监管部门的应急预案，应当报上一级安全监管部门备 案", "B": "生产经营单位应当在应急预案公布之日起1 个月内，按照分级属地 === 第194页 === 原则向安全监管部门和有关部门进行告知性备案", "C": "中央企业总部（上市公司）的应急预案报所在地的省级或者设区的 市级人民政府负有安全监管职责的部门备案", "D": "对于实行安全生产许可的生产经营单位，已经进行应急预案备案的， 在申请安全生产许可证时，可以不提供相应的应急预案，仅提供应急 预案备案登记表"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 572, "question": "《中华人民共和国消防法》在总则中规定消防工作贯彻（\n）\n的方针。\nA.安全第一，预防为主\nB.消防为主，防消结合\nC.预防为主，防消结合\nD.预防为主，综合治理", "options": {"A": "安全第一，预防为主", "B": "消防为主，防消结合", "C": "预防为主，防消结合", "D": "预防为主，综合治理"}, "answer": "C", "type": "single", "category": "消防安全"}, {"id": 573, "question": "生产经营单位应当对离岗（\n）的或者换岗的从业人员，采用\n新工艺、新技术、新材料或者使用新设备后的有关从业人员，进行专\n门的安全生产培训。\nA.三个月以上\nB.六个月以上\nC.十二个月以上\nD.因人而异", "options": {"A": "三个月以上", "B": "六个月以上", "C": "十二个月以上", "D": "因人而异"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 574, "question": "某现场指挥作业的负责人赵某在未采取足够安全保障措施的情\n况下，不顾工人的反对意见，强令工人从事爆破作业，造成1 人死亡、\n5 人重伤的事故。依据《最高人民法院、最高人民检察院关于办理危\n害生产安全刑事案件适用法律若干问题的解释》，下列关于赵某应负\n刑事责任的说法中，正确的是（\n）。\nA.赵某处三年以下有期徒刑或者拘役\nB.赵某处五年以下有期徒刑或者拘役\nC.赵某未按照规定进行事故报告，5 名重伤人员中又有1 人死亡，赵\n某处五年以上有期徒刑\nD.赵某未按照规定进行事故报告，5 名重伤人员中又有1 人死亡，赵\n某处五年以上十年以下有期徒刑或者拘役", "options": {"A": "赵某处三年以下有期徒刑或者拘役", "B": "赵某处五年以下有期徒刑或者拘役", "C": "赵某未按照规定进行事故报告，5 名重伤人员中又有1 人死亡，赵 某处五年以上有期徒刑", "D": "赵某未按照规定进行事故报告，5 名重伤人员中又有1 人死亡，赵 某处五年以上十年以下有期徒刑或者拘役"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 575, "question": "某市气象局发布了防汛黄色警报。根据《中华人民共和国突发事\n件应对法》，警报发布后，地方政府应当采取的措施是（\n）。\nA.转移、疏散或者撤离易受雷雨危害的煤矿人员并予以妥善安置\nB.责令矿山应急救援队伍、负有特定职责的人员进入待命状态\nC.采取必要措施，确保交通、通信、供水、排水、供电等公共设施的\n安全和正常运行\nD.启动应急预案，责令有关部门、专业机构和负有特定职责的人员收\n集、报告有关信息", "options": {"A": "转移、疏散或者撤离易受雷雨危害的煤矿人员并予以妥善安置", "B": "责令矿山应急救援队伍、负有特定职责的人员进入待命状态", "C": "采取必要措施，确保交通、通信、供水、排水、供电等公共设施的 安全和正常运行", "D": "启动应急预案，责令有关部门、专业机构和负有特定职责的人员收 集、报告有关信息"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 576, "question": "根据《生产安全事故应急预案管理办法》，关于应急预案备案的\n\n=== 第196页 ===\n说法，正确的是？（\n）\nA.地方各级安全监管部门的应急预案，应当报上一级人民政府备案\nB.生产经营单位应当在应急预案公布之日起30 个工作日内，按照分\n级属地原则向安全监管部门和有关部门进行告知性备案\nC.建筑施工单位央企业总部（上市公司）的应急预案报所在地的省级\n或者设区的市级人民政府负有安全监管职责的部门备案\nD.人员密集场所经营单位属于中央企业所属单位的应急预案报所在\n地的省、或者设区的市级人民政府主管的负有安全生产监管职责的部\n门备案", "options": {"A": "地方各级安全监管部门的应急预案，应当报上一级人民政府备案", "B": "生产经营单位应当在应急预案公布之日起30 个工作日内，按照分 级属地原则向安全监管部门和有关部门进行告知性备案", "C": "建筑施工单位央企业总部（上市公司）的应急预案报所在地的省级 或者设区的市级人民政府负有安全监管职责的部门备案", "D": "人员密集场所经营单位属于中央企业所属单位的应急预案报所在 地的省、或者设区的市级人民政府主管的负有安全生产监管职责的部 门备案"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 577, "question": "根据《建设工程安全生产管理条例》，关于实行施工总承包和分\n包单位的建设工程安全责任的说法，不正确的是（\n）。\nA.分包单位不服从管理导致生产安全事故的，由分包单位承担主要责\n任\nB.建设工程实行施工总承包的，由总承包单位对施工现场的安全生产\n负总责\nC.施工单位应当为施工现场从事危险作业的人员办理意外伤害保险\nD.总承包单位可以将建设工程部分主体结构分包给有资质的施工单\n位", "options": {"A": "分包单位不服从管理导致生产安全事故的，由分包单位承担主要责 任", "B": "建设工程实行施工总承包的，由总承包单位对施工现场的安全生产 负总责", "C": "施工单位应当为施工现场从事危险作业的人员办理意外伤害保险", "D": "总承包单位可以将建设工程部分主体结构分包给有资质的施工单 位"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 578, "question": "根据《生产安全事故应急条例》，发生生产安全事故后，生产经\n营单位可以采取的应急措施不包括（\n）。\n\n=== 第197页 ===\nA.迅速控制危险源，组织抢救遇险人员\nB.及时通知可能受到事故影响的单位和人员\nC.划定警戒区域，疏散受到威胁的人员，实施交通管制\nD.维护事故现场秩序，保护事故现场和相关证据", "options": {"A": "迅速控制危险源，组织抢救遇险人员", "B": "及时通知可能受到事故影响的单位和人员", "C": "划定警戒区域，疏散受到威胁的人员，实施交通管制", "D": "维护事故现场秩序，保护事故现场和相关证据"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 579, "question": "根据《安全生产事故隐患排查治理暂行规定》，关于生产经营单\n位事故隐患排查治理职责的说法，正确的是（\n）。\nA.一般事故隐患由生产经营单位安全生产管理人员立即组织整改，重\n大事故隐患由生产经营单位主要负责人或生产经营单位车间、分厂、\n区队等负责人组织制定并实施事故隐患治理方案\nB.在接到有关自然灾害预报时，生产经营单位应当立即采取撤离人员、\n停止作业、加强监测等安全措施，并及时向当地人民政府及其有关部\n门报告\nC.事故隐患排除前或者排除过程中无法保证安全的，生产经营单位应\n当及时发出预警通知，提醒作业人员注意安全，必要时自行撤离\nD.生产经营单位应当每季、每年对本单位事故隐患排查治理情况进行\n统计分析，并分别于下一季度15 日前和下一年1 月31 日前向安全监\n管监察部门和有关部门报送书面统计分析表", "options": {"A": "一般事故隐患由生产经营单位安全生产管理人员立即组织整改，重 大事故隐患由生产经营单位主要负责人或生产经营单位车间、分厂、 区队等负责人组织制定并实施事故隐患治理方案", "B": "在接到有关自然灾害预报时，生产经营单位应当立即采取撤离人员、 停止作业、加强监测等安全措施，并及时向当地人民政府及其有关部 门报告", "C": "事故隐患排除前或者排除过程中无法保证安全的，生产经营单位应 当及时发出预警通知，提醒作业人员注意安全，必要时自行撤离", "D": "生产经营单位应当每季、每年对本单位事故隐患排查治理情况进行 统计分析，并分别于下一季度15 日前和下一年1 月31 日前向安全监 管监察部门和有关部门报送书面统计分析表"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 580, "question": "特种作业操作证应当定期复审。根据《特种作业人员安全技术培\n训考核管理规定》，关于特种作业人员特种作业操作证复审的说法，\n正确的是（\n）。\n\n=== 第198页 ===\nA.申请复审的，应当参加必要的安全培训并考核合格\nB.连续从事本工种10 年以上的，复审时间自动延长至每6 年一次\nC.申请复审的，安全培训时间不少于4 学时\nD.有1 次违章行为并查证属实的，复审不予通过", "options": {"A": "申请复审的，应当参加必要的安全培训并考核合格", "B": "连续从事本工种10 年以上的，复审时间自动延长至每6 年一次", "C": "申请复审的，安全培训时间不少于4 学时", "D": "有1 次违章行为并查证属实的，复审不予通过"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 581, "question": "根据《中华人民共和国安全生产法》，从业人员安全生产权利与\n义务包括（\n）。\nA.发现直接危及人身安全的紧急情况时，从业人员有权立即撤离作业\n现场\nB.从业人员有权拒绝接受生产经营单位提供的安全生产教育培训\nC.从业人员发现事故隐患，可不报告\nD.从业人员受到事故伤害获得工伤保险后，不再享有获得民事赔偿的\n权利", "options": {"A": "发现直接危及人身安全的紧急情况时，从业人员有权立即撤离作业 现场", "B": "从业人员有权拒绝接受生产经营单位提供的安全生产教育培训", "C": "从业人员发现事故隐患，可不报告", "D": "从业人员受到事故伤害获得工伤保险后，不再享有获得民事赔偿的 权利"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 582, "question": "某安监站依法对某建筑施工企业进行安全检查。依据《中华人民\n共和国安全生产法》的规定，下列关于安全检查人员的做法，正确的\n是（\n）。\nA.对检查中发现的问题作出书面记录，并要求被检查单位安全管理人\n员签字\nB.发现施工人员佩戴的安全帽规格不符合规定，要求购买某合格品牌\n安全帽\nC.为便于进入危险区域检查，保证检查安全，责令该企业停止施工接\n\n=== 第199页 ===\n受检查\nD.对检查中了解到的该企业节能环保内墙保温涂层技术秘密，严格为\n其保密", "options": {"A": "对检查中发现的问题作出书面记录，并要求被检查单位安全管理人 员签字", "B": "发现施工人员佩戴的安全帽规格不符合规定，要求购买某合格品牌 安全帽", "C": "为便于进入危险区域检查，保证检查安全，责令该企业停止施工接 === 第199页 === 受检查", "D": "对检查中了解到的该企业节能环保内墙保温涂层技术秘密，严格为 其保密"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 583, "question": "依据《中华人民共和国安全生产法》的规定，下列关于事故报告\n和应急预案工作的说法，正确的是（\n）。\nA.生产经营单位应当制定本单位生产安全事故应急救援预案，与设区\n的市级以上地方人民政府组织制定的生产安全事故应急救援预案相\n衔接\nB.危险物品的生产、经营、储存、运输单位都应当建立应急救援组织\nC.安全监督部门接到生产安全事故报告后，应在2 小时内赶赴事故现\n场\nD.生产经营单位发生生产安全事故后，事故现场有关人员应当立即报\n告本单位负责人", "options": {"A": "生产经营单位应当制定本单位生产安全事故应急救援预案，与设区 的市级以上地方人民政府组织制定的生产安全事故应急救援预案相 衔接", "B": "危险物品的生产、经营、储存、运输单位都应当建立应急救援组织", "C": "安全监督部门接到生产安全事故报告后，应在2 小时内赶赴事故现 场", "D": "生产经营单位发生生产安全事故后，事故现场有关人员应当立即报 告本单位负责人"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 584, "question": "甲市应急管理局在执法检查中发现某公司仓库存在重大安全隐\n患，责令该企业暂时停止使用相关设备，立即进行整改。3 个月后发\n现该企业未整改，并在此期间新购入储存材料，一旦发生泄漏爆炸，\n后果不堪设想。根据《中华人民共和国刑法》及相关司法解释，该企\n业主要负责人的行为涉嫌构成（\n）。\nA.重大责任事故罪\nB.危险作业罪\n\n=== 第200页 ===\nC.强令、组织他人违章冒险作业罪\nD.重大劳动安全事故罪", "options": {"A": "重大责任事故罪", "B": "危险作业罪 === 第200页 ===", "C": "强令、组织他人违章冒险作业罪", "D": "重大劳动安全事故罪"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 585, "question": "根据《中华人民共和国安全生产法》，关于建设项目安全设施“三\n同时”的说法，正确的是（\n）。\nA.新建项目安全设施必须与主体工程同时设计、施工、投入生产和使\n用，改建项目安全设施则不需要同时设计、施工、投入生产和使用\nB.改扩建项目安全设施报经有关部门批准，可以在批准期限内迟于主\n体工程施工\nC.建设项目安全设施竣工后必须经建设行政主管部门验收合格，方可\n投入使用\nD.矿山建设项目的施工单位按照批准的安全设施设计施工，并对安全\n设施的工程质量负责", "options": {"A": "新建项目安全设施必须与主体工程同时设计、施工、投入生产和使 用，改建项目安全设施则不需要同时设计、施工、投入生产和使用", "B": "改扩建项目安全设施报经有关部门批准，可以在批准期限内迟于主 体工程施工", "C": "建设项目安全设施竣工后必须经建设行政主管部门验收合格，方可 投入使用", "D": "矿山建设项目的施工单位按照批准的安全设施设计施工，并对安全 设施的工程质量负责"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 586, "question": "安全监管部门对某生产经营单位进行安全生产监督检查。依据\n《中华人民共和国安全生产法》的规定，下列安全生产监督检查人员\n履行安全监管职责的说法，正确的是（\n）。\nA.负有安全监管职责的部门在监督检查中发现单位存在重大隐患时，\n可以采取停止供电措施\nB.执行监督检查任务时，对涉及被检查单位的技术秘密和业务秘密的，\n监督检查人员不得进行检查\nC.对违法生产、储存、使用、经营危险物品的作业场所予以查封\n\n=== 第201页 ===\nD.将检查发现的问题及其处理情况可以书面或口头形式告知被检查\n单位的负责人", "options": {"A": "负有安全监管职责的部门在监督检查中发现单位存在重大隐患时， 可以采取停止供电措施", "B": "执行监督检查任务时，对涉及被检查单位的技术秘密和业务秘密的， 监督检查人员不得进行检查", "C": "对违法生产、储存、使用、经营危险物品的作业场所予以查封 === 第201页 ===", "D": "将检查发现的问题及其处理情况可以书面或口头形式告知被检查 单位的负责人"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 587, "question": "特种设备出现故障或者发生异常情况，特种设备（\n）应当对\n其进行全面检查，消除事故隐患，方可继续使用。\nA.使用单位\nB.检测单位\nC.出租单位\nD.生产单位", "options": {"A": "使用单位", "B": "检测单位", "C": "出租单位", "D": "生产单位"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 588, "question": "特种设备安装、改造、修理竣工后，安装、改造、修理的施工单\n位应当在验收后（\n）内将相关技术资料和文件移交特种设备使用\n单位。特种设备使用单位应当将其存入该特种设备的安全技术档案。\nA.15 日\nB.30 日\nC.45 日\nD.20 日", "options": {"A": "15 日", "B": "30 日", "C": "45 日", "D": "20 日"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 589, "question": "（\n）在申请领取施工许可证时，应当提供建设工程有关安全\n施工措施的资料。\nA.施工单位\nB.建设单位\n\n=== 第202页 ===\nC.项目负责人\nD.监理公司", "options": {"A": "施工单位", "B": "建设单位 === 第202页 ===", "C": "项目负责人", "D": "监理公司"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 590, "question": "甲建筑公司承建乙市一隧道项目，现缺乏一种进口挖掘机，公司\n领导决定采用租赁方式向乙市建筑机械租赁，以节约资金。原乙建筑\n机械租赁公司的此种进口挖掘机确实性能良好，但缺少产品合格证，\n下列说法正确的是（\n）。\nA.经乙市人民政府批准后可以出租\nB.经乙市建设局批准后可以出租\nC.可以出租\nD.不能出租", "options": {"A": "经乙市人民政府批准后可以出租", "B": "经乙市建设局批准后可以出租", "C": "可以出租", "D": "不能出租"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 591, "question": "根据《建设工程安全生产管理条例》，检验检测机构对检测合格\n的施工起重机械和整体提升脚手架、模板等自升式架设设施，应当出\n具（\n）证明文件，并对检测结果负责。\nA.产品合格\nB.安全合格\nC.生产合格\nD.制造合格", "options": {"A": "产品合格", "B": "安全合格", "C": "生产合格", "D": "制造合格"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 592, "question": "根据《建设工程安全生产管理条例》，专职安全生产管理人员对\n违章指挥、违章操作的，应当（\n）。\n\n=== 第203页 ===\nA.立即上报\nB.处以罚款\nC.立即制止\nD.给予处分", "options": {"A": "立即上报", "B": "处以罚款", "C": "立即制止", "D": "给予处分"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 593, "question": "建筑安全监督机构在检查施工现场时，发现某施工单位在没有竣\n工的建筑物内设置员工集体宿舍，下列表述正确的是施工单位（\n）。\nA.经工程所在地建设安全监督机构同意，可以继续使用\nB.经工程所在地建设行政主管部门同意，可以继续使用\nC.必须将宿舍迁出\nD.经工程所在地质量监督机构同意，可以继续使用", "options": {"A": "经工程所在地建设安全监督机构同意，可以继续使用", "B": "经工程所在地建设行政主管部门同意，可以继续使用", "C": "必须将宿舍迁出", "D": "经工程所在地质量监督机构同意，可以继续使用"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 594, "question": "施工单位的安全生产费用不应该用于（\n）。\nA.购买施工安全防护用具\nB.安全设施的更新\nC.安全施工措施的落实\nD.职工安全事故的赔偿", "options": {"A": "购买施工安全防护用具", "B": "安全设施的更新", "C": "安全施工措施的落实", "D": "职工安全事故的赔偿"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 595, "question": "施工现场暂时停止施工的，施工单位应当做好现场防护，所需费\n用由（\n）承担或按合同约定执行。\nA.设计方\nB.施工方\n\n=== 第204页 ===\nC.责任方\nD.业主方", "options": {"A": "设计方", "B": "施工方 === 第204页 ===", "C": "责任方", "D": "业主方"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 596, "question": "根据《建设工程安全生产管理条例》，施工现场的安全防护用具、\n机械设备、施工机具及配件必须由专人管理，定期进行检查、维修和\n保养，建立相应的（\n），并按照国家有关规定及时报废。\nA.资料档案\nB.系统档案\nC.审查档案\nD.备份档案", "options": {"A": "资料档案", "B": "系统档案", "C": "审查档案", "D": "备份档案"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 597, "question": "根据《建设工程安全生产管理条例》，施工单位的主要负责人、\n项目负责人、专职安全生产管理人员应当经建设行政主管部门或者其\n他有关部门（\n）方可任职。\nA.评审后\nB.资质检验后\nC.推荐\nD.考核合格后", "options": {"A": "评审后", "B": "资质检验后", "C": "推荐", "D": "考核合格后"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 598, "question": "根据《建设工程安全生产管理条例》，施工单位应当对管理人员\n和作业人员（\n）安全生产教育培训。\nA.每季至少进行一次\n\n=== 第205页 ===\nB.每月至少进行一次\nC.每年至少进行一次\nD.每年至少进行两次", "options": {"A": "每季至少进行一次 === 第205页 ===", "B": "每月至少进行一次", "C": "每年至少进行一次", "D": "每年至少进行两次"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 599, "question": "县级以上人民政府在履行安全监督检查职责时，对于设计单位有\n权（\n）。\nA.更换设计单位\nB.指定设计人员\nC.要求停止设计\nD.要求提供有关建设工程生产安全的文件和资料", "options": {"A": "更换设计单位", "B": "指定设计人员", "C": "要求停止设计", "D": "要求提供有关建设工程生产安全的文件和资料"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 600, "question": "建设工程实行施工总承包的，由总承包单位统一组织编制建设工\n程生产安全事故应急救援预案，工程（\n）按照应急救援预案，建\n立应急救援组织或者配备应急救援人员，配备救援器材、设备，并定\n期组织演练。\nA.总承包单位\nB.分包单位\nC.监理单位\nD.总承包单位和分包单位", "options": {"A": "总承包单位", "B": "分包单位", "C": "监理单位", "D": "总承包单位和分包单位"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 601, "question": "根据《建设工程安全生产管理条例》，建设单位未将保证安全施\n工的措施或者拆除工程的有关资料报送有关部门备案的，责令（\n），\n\n=== 第206页 ===\n给予警告。\nA.限期改正\nB.停止施工\nC.缴纳罚款\nD.暂扣施工许可证", "options": {"A": "限期改正", "B": "停止施工", "C": "缴纳罚款", "D": "暂扣施工许可证"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 602, "question": "根据《建设工程安全生产管理条例》，施工单位取得资质证书后，\n降低安全生产条件的，责令限期改正；经整改仍未达到与其资质等级\n相适应的安全生产条件的，责令停业整顿，（\n）。\nA.暂扣资质证书\nB.罚款\nC.降低其资质等级直至吊销营业执照\nD.降低其资质等级直至吊销资质证书", "options": {"A": "暂扣资质证书", "B": "罚款", "C": "降低其资质等级直至吊销营业执照", "D": "降低其资质等级直至吊销资质证书"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 603, "question": "下列（\n）选项不属于企业取得安全生产许可证所应当具备的\n安全生产条件。\nA.建立、健全安全生产责任制，制定完备的安全生产规章制度和操作\n规程\nB.企业负责人学历要求为本科以上\nC.安全投入符合安全生产要求\nD.设置安全生产管理机构，配备专职安全生产管理人员", "options": {"A": "建立、健全安全生产责任制，制定完备的安全生产规章制度和操作 规程", "B": "企业负责人学历要求为本科以上", "C": "安全投入符合安全生产要求", "D": "设置安全生产管理机构，配备专职安全生产管理人员"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 604, "question": "安全生产许可证有效期满需要延期的，企业应当于期满前（\n）\n个月向原安全生产许可证颁发管理机关办理延期手续。\nA.3\nB.6\nC.9\nD.12", "options": {"A": "3", "B": "6", "C": "9", "D": "12"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 605, "question": "安全生产许可证的有效期为（\n）年。\nA.2\nB.3\nC.4\nD.5", "options": {"A": "2", "B": "3", "C": "4", "D": "5"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 606, "question": "企业在安全生产许可证有效期内，未发生死亡事故的，安全生产\n许可证届满时，经原安全生产许可证颁发管理机关同意，（\n）。\nA.不再审查，有效期延期3 年\nB.必须再次审查，有效期增加2 年\nC.不再审查，有效期直至发生死亡事故\nD.必须再次审查，重新办理", "options": {"A": "不再审查，有效期延期3 年", "B": "必须再次审查，有效期增加2 年", "C": "不再审查，有效期直至发生死亡事故", "D": "必须再次审查，重新办理"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 607, "question": "事故发生后，单位负责人接到报告后，应当于（\n）向事故发\n生地县级以上人民政府安全生产监督管理部门和负有安全生产监督\n\n=== 第208页 ===\n管理职责的有关部门报告。\nA.立即\nB.1 小时内\nC.2 小时内\nD.3 小时内", "options": {"A": "立即", "B": "1 小时内", "C": "2 小时内", "D": "3 小时内"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 608, "question": "（\n）由事故发生地省级人民政府负责调查。\nA.一般事故\nB.较大事故\nC.重大事故\nD.特别重大事故", "options": {"A": "一般事故", "B": "较大事故", "C": "重大事故", "D": "特别重大事故"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 609, "question": "特别重大事故，特殊情况下，批复时间可以适当延长，但延长的\n时间最长不超过（\n）。\nA.5 日\nB.10 日\nC.15 日\nD.30 日", "options": {"A": "5 日", "B": "10 日", "C": "15 日", "D": "30 日"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 610, "question": "事故发生单位主要负责人构成犯罪的，应（\n）。\nA.记大过\nB.警告\n\n=== 第209页 ===\nC.留用察看\nD.依法追究刑事责任", "options": {"A": "记大过", "B": "警告 === 第209页 ===", "C": "留用察看", "D": "依法追究刑事责任"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 611, "question": "监理单位要加强对施工现场劳动保护用品的监督检查。发现有不\n使用、或使用不符合要求的劳动保护用品，应责令相关企业立即改正。\n对拒不改正的，应当向（\n）报告。\nA.建设行政主管部门\nB.建设单位\nC.相关协会\nD.设计单位", "options": {"A": "建设行政主管部门", "B": "建设单位", "C": "相关协会", "D": "设计单位"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 612, "question": "建筑施工企业应当实行建设工程项目专职安全生产管理人员\n（\n）制度。\nA.考核\nB.竞争\nC.委派\nD.授权", "options": {"A": "考核", "B": "竞争", "C": "委派", "D": "授权"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 613, "question": "建筑施工企业安全生产管理机构专职安全生产管理人员的配备\n应满足要求，并应根据企业经营规模、设备管理和生产需要予以增加。\n建筑施工总承包特级资质不少于（\n）人。\nA.4\n\n=== 第210页 ===\nB.5\nC.6\nD.7", "options": {"A": "4 === 第210页 ===", "B": "5", "C": "6", "D": "7"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 614, "question": "总承包单位要按照规定配备项目专职安全生产管理人员，1 万～5\n万平方米的建筑工程配备不少于（\n）人。\nA.1\nB.2\nC.3\nD.4", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 615, "question": "建筑施工项目经理质量安全违法违规行为记分周期为（\n），满\n分为12 分。\nA.12 个月\nB.6 个月\nC.实际工期\nD.合同工期", "options": {"A": "12 个月", "B": "6 个月", "C": "实际工期", "D": "合同工期"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 616, "question": "项目负责人应当在办理工程质量监督手续前签署工程质量（\n），\n连同法定代表人授权书，报工程质量监督机构备案。\nA.任务分工责任书\nB.缺陷责任期保修书\n\n=== 第211页 ===\nC.终身维修保证书\nD.终身责任承诺书", "options": {"A": "任务分工责任书", "B": "缺陷责任期保修书 === 第211页 ===", "C": "终身维修保证书", "D": "终身责任承诺书"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 617, "question": "住房城乡建设主管部门应当及时公布项目负责人质量责任追究\n情况，将其违法违规等不良行为及处罚结果记入（\n）。\nA.个人信用档案\nB.个人处罚档案\nC.企业信用档案\nD.企业处罚档案", "options": {"A": "个人信用档案", "B": "个人处罚档案", "C": "企业信用档案", "D": "企业处罚档案"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 618, "question": "要全面开展安全达标，深入开展以岗位达标、专业达标和企业达\n标为内容的安全生产（\n）建设。\nA.责任制\nB.标准化\nC.全方位\nD.全过程", "options": {"A": "责任制", "B": "标准化", "C": "全方位", "D": "全过程"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 619, "question": "要严格安全生产准入前置条件，把符合（\n）作为高危行业企\n业准入的前置条件。\nA.安全生产许可证\nB.安全生产管理措施\nC.安全生产标准\n\n=== 第212页 ===\nD.安全生产技术措施", "options": {"A": "安全生产许可证", "B": "安全生产管理措施", "C": "安全生产标准 === 第212页 ===", "D": "安全生产技术措施"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 620, "question": "根据动用明火的危险程度和发生火灾的可能性，动火许可证可分\n为（\n）等级，分别采取不同的管理措施。\nA.二个\nB.三个\nC.四个\nD.五个", "options": {"A": "二个", "B": "三个", "C": "四个", "D": "五个"}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 621, "question": "建设单位、施工单位、监理单位和其他各单位在工程竣工或有关\n安全技术活动结束后30 天内，应将安全技术文件交本单位档案室归\n档，档案保存期（\n）。\nA.12 个月以上\nB.24 个月以上\nC.3 个月以上\nD.6 个月以上", "options": {"A": "12 个月以上", "B": "24 个月以上", "C": "3 个月以上", "D": "6 个月以上"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 622, "question": "建筑施工企业违反《中华人民共和国建筑法》规定，对建筑安全\n事故隐患不采取措施予以消除的，责令改正，（\n）。\nA.吊扣资质证书\nB.降低资质等级\nC.可处以罚款\n\n=== 第213页 ===\nD.依法追究刑事责任", "options": {"A": "吊扣资质证书", "B": "降低资质等级", "C": "可处以罚款 === 第213页 ===", "D": "依法追究刑事责任"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 623, "question": "施工单位不得在尚未竣工的建筑物内设置（\n）。\nA.避雨处\nB.吸烟处\nC.临时厕所\nD.员工集体宿舍", "options": {"A": "避雨处", "B": "吸烟处", "C": "临时厕所", "D": "员工集体宿舍"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 624, "question": "下列关于施工场地划分的叙述，不正确的是（\n）。\nA.施工现场的办公区、生活区应当与作业区分开设置\nB.办公生活区应当设置于在建建筑物坠落半径之外，否则，应当采取\n相应措施\nC.生活区与作业区之间进行明显的划分隔离，是为了美化场地\nD.功能区的规划设置时还应考虑交通、水电、消防和卫生、环保等因\n素", "options": {"A": "施工现场的办公区、生活区应当与作业区分开设置", "B": "办公生活区应当设置于在建建筑物坠落半径之外，否则，应当采取 相应措施", "C": "生活区与作业区之间进行明显的划分隔离，是为了美化场地", "D": "功能区的规划设置时还应考虑交通、水电、消防和卫生、环保等因 素"}, "answer": "C", "type": "single", "category": "高处作业"}, {"id": 625, "question": "选用劳动防护用品时，野外作业可以使用的防护用品是（\n）。\nA.防寒鞋\nB.防机械伤害手套\nC.防砸鞋\nD.耐酸碱鞋", "options": {"A": "防寒鞋", "B": "防机械伤害手套", "C": "防砸鞋", "D": "耐酸碱鞋"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 626, "question": "建筑施工企业主要负责人、项目负责人和专职安全生产管理人员\n未按规定履行安全生产管理职责，导致发生较大及以上生产安全事故\n的，考核机关应当（\n）。\nA.对其进行警告\nB.暂扣其安全生产考核合格证书\nC.对其处以罚款\nD.撤销其安全生产考核合格证书", "options": {"A": "对其进行警告", "B": "暂扣其安全生产考核合格证书", "C": "对其处以罚款", "D": "撤销其安全生产考核合格证书"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 627, "question": "项目专职安全生产管理人员应当对专项施工方案实施情况进行\n（\n），对未按照专项施工方案施工的，应当要求立即整改，并及时\n报告项目负责人，项目负责人应当及时组织限期整改。\nA.巡查\nB.抽查\nC.现场监督\nD.定期检查", "options": {"A": "巡查", "B": "抽查", "C": "现场监督", "D": "定期检查"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 628, "question": "企业取得安全生产许可证后，不得降低（\n），并应当加强日常\n安全生产管理，接受安全生产许可证颁发管理机关的监督检查。\nA.安全生产监督水平\nB.安全生产投入\nC.安全生产条件\nD.安全管理力度\n\n=== 第215页 ===", "options": {"A": "安全生产监督水平", "B": "安全生产投入", "C": "安全生产条件", "D": "安全管理力度 === 第215页 ==="}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 629, "question": "（\n）是一门以经验为基础而建立起来的管理科学，经验是掌\n握客观事物所必需的，将个别的已经证明行之有效的经验加以科学总\n结，而形成的一门知识体系。\nA.事故防治科学\nB.危险源预防科学\nC.事故预防科学\nD.危险源防治科学", "options": {"A": "事故防治科学", "B": "危险源预防科学", "C": "事故预防科学", "D": "危险源防治科学"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 630, "question": "下列不属于事故调查报告应包括的内容的是（\n）。\nA.事故发生单位概况\nB.事故发生经过和事故救援情况\nC.事故责任人的最终处理情况\nD.事故防范和整改措施", "options": {"A": "事故发生单位概况", "B": "事故发生经过和事故救援情况", "C": "事故责任人的最终处理情况", "D": "事故防范和整改措施"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 631, "question": "根据《施工企业安全生产管理规范》GB50656-2011，专职安全管\n理人员每年安全生产教育和培训的时间不少于（\n）学时。\nA.15\nB.30\nC.40\nD.60", "options": {"A": "15", "B": "30", "C": "40", "D": "60"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 632, "question": "预防为主的科学观就是要高效、高质量的实现企业的安全生产，\n必须采用现代的科学技术和（\n），变纵向单因素管理为横向综合管\n理。\nA.安全管理技术\nB.科学管理技术\nC.安全生产技术\nD.安全事故技术", "options": {"A": "安全管理技术", "B": "科学管理技术", "C": "安全生产技术", "D": "安全事故技术"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 633, "question": "建筑施工项目实行施工总承包的，（\n）应当组织专业承包单位\n等开展项目安全生产标准化工作。\nA.建设单位\nB.监理单位\nC.施工总承包单位\nD.分包单位", "options": {"A": "建设单位", "B": "监理单位", "C": "施工总承包单位", "D": "分包单位"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 634, "question": "每天要对班组工人进行施工要求、作业环境的安全交底的人是\n（\n）。\nA.技术总工程师\nB.施工员\nC.班组长\nD.监理员", "options": {"A": "技术总工程师", "B": "施工员", "C": "班组长", "D": "监理员"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 635, "question": "下列不属于四个急救步骤的是（\n）。\nA.调查事故现场\nB.初步检查伤病员，判断其神志、气管、呼吸循环是否有问题\nC.呼救\nD.如果没有发现危及伤病员的体征，可以不用再检查", "options": {"A": "调查事故现场", "B": "初步检查伤病员，判断其神志、气管、呼吸循环是否有问题", "C": "呼救", "D": "如果没有发现危及伤病员的体征，可以不用再检查"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 636, "question": "从业人员经过安全教育培训，了解岗位操作规程，但未遵守而造\n成事故的，行为人应负（\n）责任，有关负责人应负（\n）责任。\nA.直接；间接\nB.直接；领导\nC.间接；管理\nD.直接；管理", "options": {"A": "直接；间接", "B": "直接；领导", "C": "间接；管理", "D": "直接；管理"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 637, "question": "公司级安全教育由企业安全教育部门实施，下列（\n）不属于\n公司教育内容。\nA.国家和地方有关安全生产方面的方针、政策及法律法规\nB.施工安全、职业健康和劳动保护的基本知识\nC.建筑施工人员安全生产方面的权利和义务\nD.工程概况、施工现场作业环境和施工安全特点", "options": {"A": "国家和地方有关安全生产方面的方针、政策及法律法规", "B": "施工安全、职业健康和劳动保护的基本知识", "C": "建筑施工人员安全生产方面的权利和义务", "D": "工程概况、施工现场作业环境和施工安全特点"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 638, "question": "下列是关于防护用品的阐述，最正确的是（\n）。\nA.建筑施工企业必须根据作业人员的施工环境、作业需要配发安全防\n\n=== 第218页 ===\n护用品\nB.建筑施工企业必须根据作业人员的施工需要，按照规定配发安全防\n护用品并监督其正确佩戴使用\nC.建筑施工企业必须根据作业人员的施工环境、作业需要，按照规定\n配发安全防护用品\nD.建筑施工企业配发的安全防护用品必须由职工支付购置费", "options": {"A": "建筑施工企业必须根据作业人员的施工环境、作业需要配发安全防 === 第218页 === 护用品", "B": "建筑施工企业必须根据作业人员的施工需要，按照规定配发安全防 护用品并监督其正确佩戴使用", "C": "建筑施工企业必须根据作业人员的施工环境、作业需要，按照规定 配发安全防护用品", "D": "建筑施工企业配发的安全防护用品必须由职工支付购置费"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 639, "question": "下列是关于防护用品使用的阐述，不正确的是（\n）。\nA.施工现场的作业人员必须戴安全帽、穿工作鞋和工作服\nB.特殊情况下不戴安全帽时，长发者从事机械作业必须戴工作帽\nC.处于无可靠安全防护设施的高处作业，必须系安全带\nD.从事脚手架作业，操作人员必须穿灵便、紧口工作服、系带的高腰\n皮革防滑鞋，戴工作手套，高处作业时，必须系安全带", "options": {"A": "施工现场的作业人员必须戴安全帽、穿工作鞋和工作服", "B": "特殊情况下不戴安全帽时，长发者从事机械作业必须戴工作帽", "C": "处于无可靠安全防护设施的高处作业，必须系安全带", "D": "从事脚手架作业，操作人员必须穿灵便、紧口工作服、系带的高腰 皮革防滑鞋，戴工作手套，高处作业时，必须系安全带"}, "answer": "D", "type": "single", "category": "脚手架与模板工程"}, {"id": 640, "question": "下列是关于安全帽使用的阐述，不正确的是（\n）。\nA.可以在安全帽内再佩戴其他帽子\nB.将帽衬衬带位置调节好并系牢，帽衬的顶端与帽壳内顶之间应保持\n20～50mm\nC.安全帽的下颌带必须扣在颌下，并系牢，松紧要适度，以防帽子滑\n落、碰掉\nD.使用前应根据自己头型将帽箍调至适当位置，避免过松或过紧", "options": {"A": "可以在安全帽内再佩戴其他帽子", "B": "将帽衬衬带位置调节好并系牢，帽衬的顶端与帽壳内顶之间应保持 20～50mm", "C": "安全帽的下颌带必须扣在颌下，并系牢，松紧要适度，以防帽子滑 落、碰掉", "D": "使用前应根据自己头型将帽箍调至适当位置，避免过松或过紧"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 641, "question": "在施工现场入口处宜设置（\n）等指令标志。\nA.必须戴安全帽\nB.禁止吸烟\nC.当心触电\nD.禁止通行", "options": {"A": "必须戴安全帽", "B": "禁止吸烟", "C": "当心触电", "D": "禁止通行"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 642, "question": "下列属于警告标志的选项是（\n）。\nA.禁止合闸\nB.紧急出口\nC.当心落物\nD.必须加锁", "options": {"A": "禁止合闸", "B": "紧急出口", "C": "当心落物", "D": "必须加锁"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 643, "question": "下列属于禁止标志的选项是（\n）。\nA.禁止乘人\nB.注意安全\nC.当心火灾\nD.必须戴安全帽", "options": {"A": "禁止乘人", "B": "注意安全", "C": "当心火灾", "D": "必须戴安全帽"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 644, "question": "下列关于事故现场应急处理的阐述，不正确的选项是（\n）。\nA.事故发生单位负责人接到事故报告后，应当立即启动事故相应应急\n预案，或者采取有效措施，组织抢救，防止事故扩大，减少人员伤亡\n和财产损失\n\n=== 第220页 ===\nB.事故救援时应当妥善保护事故现场以及相关证据，任何单位和个人\n不得破坏事故现场、毁灭相关证据\nC.事故救援时，因抢救人员、防止事故扩大以及疏通交通等原因，需\n要移动事故现场物件的，应当做出标志，绘制现场简图并做出书面记\n录，妥善保存现场重要痕迹、物证，有条件的可以拍照或录像\nD.事故救援时，应当先救领导", "options": {"A": "事故发生单位负责人接到事故报告后，应当立即启动事故相应应急 预案，或者采取有效措施，组织抢救，防止事故扩大，减少人员伤亡 和财产损失 === 第220页 ===", "B": "事故救援时应当妥善保护事故现场以及相关证据，任何单位和个人 不得破坏事故现场、毁灭相关证据", "C": "事故救援时，因抢救人员、防止事故扩大以及疏通交通等原因，需 要移动事故现场物件的，应当做出标志，绘制现场简图并做出书面记 录，妥善保存现场重要痕迹、物证，有条件的可以拍照或录像", "D": "事故救援时，应当先救领导"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 645, "question": "（\n），我们称之为危险源。\nA.可能导致死亡、伤害、职业病、财产损失、工作环境破坏或者上述\n情况的组合所形成的根源或者状态\nB.对人造成伤亡或者对物造成突发性损害的因素\nC.对影响人的身体健康，导致疾病，或者对物造成慢性损害的因素\nD.以上三者", "options": {"A": "可能导致死亡、伤害、职业病、财产损失、工作环境破坏或者上述 情况的组合所形成的根源或者状态", "B": "对人造成伤亡或者对物造成突发性损害的因素", "C": "对影响人的身体健康，导致疾病，或者对物造成慢性损害的因素", "D": "以上三者"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 646, "question": "（\n）是外部对企业安全生产管理体系监督管理的形式。\nA.安全生产条件评价\nB.安全生产条件的审核\nC.安全生产条件的评价或审核\nD.安全生产条件的评价和审核", "options": {"A": "安全生产条件评价", "B": "安全生产条件的审核", "C": "安全生产条件的评价或审核", "D": "安全生产条件的评价和审核"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 647, "question": "建筑施工企业应建立安全生产投入保障制度，完善和改进安全生\n产条件，按规定提取（\n），专项用于安全生产，并建立安全费用台\n\n=== 第221页 ===\n账。\nA.管理费用\nB.劳动保护费用\nC.临建搭设和道路费用\nD.安全费用", "options": {"A": "管理费用", "B": "劳动保护费用", "C": "临建搭设和道路费用", "D": "安全费用"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 648, "question": "制定安全生产操作规程，应突出（\n）为主的指导思想。\nA.工作效率\nB.事故预防\nC.工期安排\nD.节省材料", "options": {"A": "工作效率", "B": "事故预防", "C": "工期安排", "D": "节省材料"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 649, "question": "（\n）是安全生产目标管理的重要内容，能够充分体现目标完\n成的时限和完成情况的效果。\nA.目标制定\nB.目标分解\nC.目标考核\nD.安全生产奖惩", "options": {"A": "目标制定", "B": "目标分解", "C": "目标考核", "D": "安全生产奖惩"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 650, "question": "生产经营单位建立安全生产责任制的总体要求是：横向到边、纵\n向到底。横向到边是指（\n）。\nA.所有职能部门都有相应的安全生产责任\n\n=== 第222页 ===\nB.从主要负责人到岗位工人都有相应的安全生产责任\nC.从主要负责人到各级安全管理人员都有相应的安全生产责任\nD.所有行政管理部门都有相应的安全生产责任", "options": {"A": "所有职能部门都有相应的安全生产责任 === 第222页 ===", "B": "从主要负责人到岗位工人都有相应的安全生产责任", "C": "从主要负责人到各级安全管理人员都有相应的安全生产责任", "D": "所有行政管理部门都有相应的安全生产责任"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 651, "question": "粉尘作业时要戴（\n）。\nA.棉纱口罩\nB.过滤式防尘口罩\nC.防毒面具\nD.毛巾", "options": {"A": "棉纱口罩", "B": "过滤式防尘口罩", "C": "防毒面具", "D": "毛巾"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 652, "question": "班前安全活动的主要内容，下列表述错误的是（\n）。\nA.针对本班组作业特点及安全操作规程进行班前教育\nB.根据本班组班组长要求进行分工\nC.督促检查作业人员正确使用安全防护装置（设施）及个人劳动防护\n用品\nD.对本班人员进行遵纪守法的教育，杜绝违章指挥，违法作业的现象\n发生", "options": {"A": "针对本班组作业特点及安全操作规程进行班前教育", "B": "根据本班组班组长要求进行分工", "C": "督促检查作业人员正确使用安全防护装置（设施）及个人劳动防护 用品", "D": "对本班人员进行遵纪守法的教育，杜绝违章指挥，违法作业的现象 发生"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 653, "question": "对施工现场应急处置预案的演练（\n）不少于一次，并做好演\n练记录。\nA.每年\nB.每半年\n\n=== 第223页 ===\nC.每季度\nD.每个月", "options": {"A": "每年", "B": "每半年 === 第223页 ===", "C": "每季度", "D": "每个月"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 654, "question": "施工单位应当将施工现场的办公、生产区与作业区（\n）；办公、\n生活区的选址应当符合（\n）要求；职工的膳食、饮水、休息场所\n应当符合卫生标准。\nA.保持适当距离；卫生性\nB.随意设置、并保持安全距离；卫生性\nC.保持安全距离；安全性\nD.分开设置、并保持安全距离；安全性", "options": {"A": "保持适当距离；卫生性", "B": "随意设置、并保持安全距离；卫生性", "C": "保持安全距离；安全性", "D": "分开设置、并保持安全距离；安全性"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 655, "question": "根据《施工企业安全生产管理规范》GB50656-2011 的内容，施\n工企业应根据施工生产特点和规模，并以（\n）为核心，建立健全\n安全生产管理制度。\nA.安全生产责任制\nB.安全保证体系\nC.安全目标\nD.安全教育培训", "options": {"A": "安全生产责任制", "B": "安全保证体系", "C": "安全目标", "D": "安全教育培训"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 656, "question": "施工企业应按照《施工企业安全生产管理规范》GB50656-2011\n要求，定期对（\n）进行分析评估，并实施改进。\nA.安全操作规程\n\n=== 第224页 ===\nB.安全生产管理状况\nC.安全专项方案\nD.安全教育培训", "options": {"A": "安全操作规程 === 第224页 ===", "B": "安全生产管理状况", "C": "安全专项方案", "D": "安全教育培训"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 657, "question": "根据《施工企业安全生产管理规范》GB50656-2011 的内容，施\n工企业（\n）是指对施工企业日常生产经营活动和安全生产工作全\n面负责，具有生产经营决策权的人员。\nA.副经理\nB.部门负责人\nC.项目经理\nD.主要负责人", "options": {"A": "副经理", "B": "部门负责人", "C": "项目经理", "D": "主要负责人"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 658, "question": "根据《施工企业安全生产管理规范》GB50656-2011 的内容，项\n目专职安全管理人员应定期向（\n）报告项目安全生产管理情况。\nA.监理单位\nB.企业\nC.建设单位\nD.分包单位", "options": {"A": "监理单位", "B": "企业", "C": "建设单位", "D": "分包单位"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 659, "question": "根据《施工企业安全生产管理规范》GB50656-2011 的内容，施\n工企业每月应对工程项目施工现场安全生产情况至少进行一次检查，\n并应针对检查中发现的倾向性问题、安全生产状况较差的工程项目，\n\n=== 第225页 ===\n组织（\n）。\nA.巡查\nB.专项检查\nC.服务指导\nD.不定期检查", "options": {"A": "巡查", "B": "专项检查", "C": "服务指导", "D": "不定期检查"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 660, "question": "据《施工企业安全生产管理规范》GB50656-2011 的内容，企业\n各管理层的主要负责人应组织对本管理层各职能部门、下级管理层的\n（\n）进行考核和奖惩。\nA.安全行为\nB.安全业绩\nC.生产责任\nD.安全生产责任", "options": {"A": "安全行为", "B": "安全业绩", "C": "生产责任", "D": "安全生产责任"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 661, "question": "职业健康安全管理体系指导的范围包括（\n）。\nA.使组织能够防止与工作相关的伤害与健康损害\nB.使组织能完全地消除所有的伤害与健康损害的可能性\nC.所指导的只包含企业，不适用于公益组织、机构等\nD.保障人民群众财产安全", "options": {"A": "使组织能够防止与工作相关的伤害与健康损害", "B": "使组织能完全地消除所有的伤害与健康损害的可能性", "C": "所指导的只包含企业，不适用于公益组织、机构等", "D": "保障人民群众财产安全"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 662, "question": "职业健康安全管理体系的目的是（\n）。\nA.消除危险源\n\n=== 第226页 ===\nB.提升组织的绩效、荣誉\nC.防止对工作人员的伤害和健康损害，以及提供健康安全的工作场所\nD.保持有效沟通", "options": {"A": "消除危险源 === 第226页 ===", "B": "提升组织的绩效、荣誉", "C": "防止对工作人员的伤害和健康损害，以及提供健康安全的工作场所", "D": "保持有效沟通"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 663, "question": "《中华人民共和国安全生产法》明确了安全生产三大目标，即\n（\n），保障人民群众生命和财产安全，促进经济社会持续健康发展。\nA.保护环境卫生\nB.防止和减少生产安全事故\nC.保证产品质量\nD.健全安全生产体系", "options": {"A": "保护环境卫生", "B": "防止和减少生产安全事故", "C": "保证产品质量", "D": "健全安全生产体系"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 664, "question": "依据《中华人民共和国安全生产法》规定生产经营单位应当建立\n安全生产教育和培训档案，如实记录安全生产教育和培训的时间、内\n容、参加人员以及（\n）等情况。\nA.授课人\nB.培训学校\nC.培训计划\nD.考核结果", "options": {"A": "授课人", "B": "培训学校", "C": "培训计划", "D": "考核结果"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 665, "question": "《中华人民共和国消防法》规定，进行（\n）等具有火灾危险\n的作业的人员和自动消防系统的操作人员，必须持证上岗，并严格遵\n守消防安全操作规程。\n\n=== 第227页 ===\nA.木工\nB.电焊、气焊\nC.油漆\nD.防水", "options": {"A": "木工", "B": "电焊、气焊", "C": "油漆", "D": "防水"}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 666, "question": "依据《中华人民共和国安全生产法》的规定，从业人员不服从管\n理，违反安全生产规章制度、操作规程的，由生产经营单位给予批评\n教育，依照（\n）给予处分。\nA.治安管理处罚条例\nB.有关规章制度\nC.行政处罚法\nD.民法通则", "options": {"A": "治安管理处罚条例", "B": "有关规章制度", "C": "行政处罚法", "D": "民法通则"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 667, "question": "《中华人民共和国特种设备安全法》规定，施工单位使用特种设\n备行为错误的是（\n）。\nA.办理使用登记的\nB.制定特种设备事故应急专项预案的\nC.建立特种设备安全技术档案\nD.未及时申报并接受检验的", "options": {"A": "办理使用登记的", "B": "制定特种设备事故应急专项预案的", "C": "建立特种设备安全技术档案", "D": "未及时申报并接受检验的"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 668, "question": "根据《施工企业安全生产管理规范》GB50656-2011，待岗、转岗、\n换岗的职工，在重新上岗前，必须接受一次时间不得少于（\n）的\n\n=== 第228页 ===\n安全培训。\nA.20 学时\nB.30 学时\nC.40 学时\nD.50 学时", "options": {"A": "20 学时", "B": "30 学时", "C": "40 学时", "D": "50 学时"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 669, "question": "《建筑施工安全技术统一规范》将施工危险等级划分为Ⅰ、Ⅱ、\nⅢ级，其中Ⅰ级危险等级对应的事故后果是（\n）。\nA.不严重\nB.严重\nC.很严重\nD.特别严重", "options": {"A": "不严重", "B": "严重", "C": "很严重", "D": "特别严重"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 670, "question": "根据《建筑施工安全技术统一规范》，应急救援预案演练的方式\n按照场所可分为室内演练和（\n）。\nA.单项演练\nB.多项演练\nC.综合演练\nD.现场演练", "options": {"A": "单项演练", "B": "多项演练", "C": "综合演练", "D": "现场演练"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 671, "question": "根据《企业职工伤亡事故分类标准》，死亡事故是指事故发生后\n当即死亡（含急性中毒死亡）或负伤后在（\n）天内死亡的事故。\n\n=== 第229页 ===\nA.100\nB.60\nC.30\nD.40", "options": {"A": "100", "B": "60", "C": "30", "D": "40"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 672, "question": "国家对严重危及生产安全的工艺、设备实行（\n）制度。\nA.改进\nB.淘汰\nC.评估\nD.革新", "options": {"A": "改进", "B": "淘汰", "C": "评估", "D": "革新"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 673, "question": "生产经营单位应当按照有关规定将本单位重大危险源及有关安\n全措施、应急措施报（\n）和有关部门备案。\nA.建设单位\nB.监理单位\nC.有关地方人民政府主管的负有安全生产监督管理职责的部门和有\n关部门备案，并按要求提供有关信息\nD.设计单位", "options": {"A": "建设单位", "B": "监理单位", "C": "有关地方人民政府主管的负有安全生产监督管理职责的部门和有 关部门备案，并按要求提供有关信息", "D": "设计单位"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 674, "question": "某施工现场按照《建筑施工安全检查标准》评分，各分项检查表\n在汇总表中所占的分值应分别为：安全管理10 分，文明施工15 分，\n脚手架9.5 分，基坑工程10 分，模板工程10 分，高处作业9 分，施\n\n=== 第230页 ===\n工用电10 分，塔式起重机与起重吊装10 分，施工机具5 分；存在物\n料提升机与施工升降机项目缺项，该部分分值为10 分，检查评分汇\n总表中总实得分值为（\n）分。\nA.98.33\nB.87.5\nC.92\nD.93", "options": {"A": "98.33", "B": "87.5", "C": "92", "D": "93"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 675, "question": "根据《建筑施工安全检查标准》，在检查评分中，当保证项目中\n有一项不得分或保证项目小计得分不足（\n）分时，此检查评分表\n不应得分。\nA.40\nB.25\nC.30\nD.50", "options": {"A": "40", "B": "25", "C": "30", "D": "50"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 676, "question": "《建筑施工安全检查标准》中，下列不属于施工用电检查评定的\n保证项目的是（\n）。\nA.接地与接零保护系统\nB.配电线路\nC.配电箱与开关箱\nD.现场照明\n\n=== 第231页 ===", "options": {"A": "接地与接零保护系统", "B": "配电线路", "C": "配电箱与开关箱", "D": "现场照明 === 第231页 ==="}, "answer": "D", "type": "single", "category": "用电安全"}, {"id": 677, "question": "根据《安全生产事故隐患排查治理暂行规定》，下列不属于隐患\n排查治理报告应包含内容的是（\n）。\nA.隐患的现状及其产生原因\nB.隐患的危害程度和整改难易程度分析\nC.隐患的治理方案\nD.检查人员的相关信息", "options": {"A": "隐患的现状及其产生原因", "B": "隐患的危害程度和整改难易程度分析", "C": "隐患的治理方案", "D": "检查人员的相关信息"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 678, "question": "企业应急预案内部评审由（\n）组织有关部门和人员进行。\nA.企业主要负责人\nB.企业技术负责人\nC.企业技术管理部门负责人\nD.企业安全管理部门负责人", "options": {"A": "企业主要负责人", "B": "企业技术负责人", "C": "企业技术管理部门负责人", "D": "企业安全管理部门负责人"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 679, "question": "根据《企业职工伤亡事故分类标准》，轻伤事故是指损失工作日\n低于（\n）日的失能伤害的事故。\nA.60\nB.90\nC.100\nD.105", "options": {"A": "60", "B": "90", "C": "100", "D": "105"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 680, "question": "根据《施工企业安全生产评价标准》，建筑施工企业应进行年度\n\n=== 第232页 ===\n安全生产自我考评，评价人员不应少于（\n）。\nA.3 人\nB.4 人\nC.5 人\nD.6 人", "options": {"A": "3 人", "B": "4 人", "C": "5 人", "D": "6 人"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 681, "question": "根据《施工企业安全生产评价标准》，施工企业安全生产条件的\n量化评价中，抽查一级资质企业在建工程施工现场数量不应少于\n（\n）个。\nA.3\nB.4\nC.5\nD.6", "options": {"A": "3", "B": "4", "C": "5", "D": "6"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 682, "question": "建筑施工企业在办理（\n）时，应向建设主管部门提交企业自\n评材料。\nA.三类人员安全生产资格证书延期\nB.安全生产许可证延期\nC.特种作业人员操作资格证书延期\nD.其他三项均不正确", "options": {"A": "三类人员安全生产资格证书延期", "B": "安全生产许可证延期", "C": "特种作业人员操作资格证书延期", "D": "其他三项均不正确"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 683, "question": "下列不符合施工平面布置原则的是（\n）。\n\n=== 第233页 ===\nA.必须考虑绿化用地\nB.确保场内道路畅通，运输方便\nC.现场布置紧凑，减少施工用地\nD.临时设施布置，应便于工人生产和生活", "options": {"A": "必须考虑绿化用地", "B": "确保场内道路畅通，运输方便", "C": "现场布置紧凑，减少施工用地", "D": "临时设施布置，应便于工人生产和生活"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 684, "question": "下列关于施工现场功能区域划分的叙述，不正确的是（\n）。\nA.施工现场的办公区、生活区应当与作业区分开设置\nB.办公生活区应当设置于在建建筑物坠落半径之外，不允许设置在在\n建建筑物坠落半径范围内\nC.办公区、生活区与施工区间应采取相应的防护隔离措施，设置明显\n的指示标识\nD.功能区的规划设置时应考虑交通、水电、消防和环保等因素", "options": {"A": "施工现场的办公区、生活区应当与作业区分开设置", "B": "办公生活区应当设置于在建建筑物坠落半径之外，不允许设置在在 建建筑物坠落半径范围内", "C": "办公区、生活区与施工区间应采取相应的防护隔离措施，设置明显 的指示标识", "D": "功能区的规划设置时应考虑交通、水电、消防和环保等因素"}, "answer": "B", "type": "single", "category": "高处作业"}, {"id": 685, "question": "施工现场“五牌一图”中的“一图”是指（\n）。\nA.施工现场总平面图\nB.建筑工程立面效果图\nC.施工现场安全标志平面图\nD.施工现场排水平面图", "options": {"A": "施工现场总平面图", "B": "建筑工程立面效果图", "C": "施工现场安全标志平面图", "D": "施工现场排水平面图"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 686, "question": "下列关于施工现场主要材料半成品的堆放的叙述，不正确的是\n（\n）。\nA.钢筋应当堆放整齐，用方木垫起，不宜放在潮湿和暴露在外受雨水\n\n=== 第234页 ===\n冲淋\nB.砂应堆成方，石子应当按不同粒径规格分别堆放成方\nC.模板应当按规格分类堆放整齐，叠放高度一般不宜超过3m\nD.混凝土构件堆放场地应坚实、平整", "options": {"A": "钢筋应当堆放整齐，用方木垫起，不宜放在潮湿和暴露在外受雨水 === 第234页 === 冲淋", "B": "砂应堆成方，石子应当按不同粒径规格分别堆放成方", "C": "模板应当按规格分类堆放整齐，叠放高度一般不宜超过3m", "D": "混凝土构件堆放场地应坚实、平整"}, "answer": "C", "type": "single", "category": "脚手架与模板工程"}, {"id": 687, "question": "下列关于建筑施工现场食堂的叙述，不正确的是（\n）。\nA.食堂应当选择在通风、干燥、清洁的位置，离厕所、垃圾站等场所\n等污染源25m 以外\nB.食堂应配备必要的排风设施和冷藏设施\nC.食堂应设置独立的制作间、储藏间\nD.食堂的燃气罐应单独设置存放间，存放间应通风良好并严禁存放其\n他物品", "options": {"A": "食堂应当选择在通风、干燥、清洁的位置，离厕所、垃圾站等场所 等污染源25m 以外", "B": "食堂应配备必要的排风设施和冷藏设施", "C": "食堂应设置独立的制作间、储藏间", "D": "食堂的燃气罐应单独设置存放间，存放间应通风良好并严禁存放其 他物品"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 688, "question": "下列关于建筑行业用人单位职业健康监护说法不正确的是（\n）。\nA.组织接触职业危害的作业人员进行上岗前职业健康体检\nB.禁止有职业禁忌症的劳动者从事其所禁忌的职业活动\nC.职业健康监护档案应符合要求，并妥善保管\nD.及时辞退有职业健康损害的作业人员", "options": {"A": "组织接触职业危害的作业人员进行上岗前职业健康体检", "B": "禁止有职业禁忌症的劳动者从事其所禁忌的职业活动", "C": "职业健康监护档案应符合要求，并妥善保管", "D": "及时辞退有职业健康损害的作业人员"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 689, "question": "根据《建筑行业职业病危害预防控制规范》，施工现场应配备受\n过专业训练的急救员，超过（\n）人的工程项目应配备急救室。\nA.100\n\n=== 第235页 ===\nB.200\nC.300\nD.400", "options": {"A": "100 === 第235页 ===", "B": "200", "C": "300", "D": "400"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 690, "question": "为了防止施工扬尘，施工现场裸露的场地和堆放的土方应采取的\n措施，不包括（\n）。\nA.覆盖\nB.固化\nC.绿化\nD.亮化", "options": {"A": "覆盖", "B": "固化", "C": "绿化", "D": "亮化"}, "answer": "D", "type": "single", "category": "文明施工"}, {"id": 691, "question": "人的不安全行为与物的不安全状态是造成事故的（\n）原因。\nA.直接\nB.间接\nC.根本\nD.深层次", "options": {"A": "直接", "B": "间接", "C": "根本", "D": "深层次"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 692, "question": "如果由于某种原因能量失去了控制，超越了人们设置的约束或限\n制而意外地逸出或释放，则称发生了事故，这种对事故发生机理的解\n释被称作（\n）。\nA.事故频发倾向\nB.心理动力\n\n=== 第236页 ===\nC.能量释放论\nD.社会环境", "options": {"A": "事故频发倾向", "B": "心理动力 === 第236页 ===", "C": "能量释放论", "D": "社会环境"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 693, "question": "消防安全重点单位的防火巡查的频率为（\n）一次。\nA.每天\nB.每隔一天\nC.每周\nD.每隔一周", "options": {"A": "每天", "B": "每隔一天", "C": "每周", "D": "每隔一周"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 694, "question": "《中华人民共和国安全生产法》规定，生产、经营、储存、使用\n危险物品的车间、商店、仓库不得与（\n）在同一座建筑物内，并\n应与员工宿舍保持安全距离。\nA.职工食堂\nB.员工宿舍\nC.职工俱乐部\nD.卫生保健室", "options": {"A": "职工食堂", "B": "员工宿舍", "C": "职工俱乐部", "D": "卫生保健室"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 695, "question": "生产经营单位在生产经营活动中应当建立健全全员安全生产责\n任制度，法定代表人和实际控制人同为安全生产第一责任人，下列选\n项中不属于生产经营单位主要负责人法定职责的是（\n）。\nA.组织制定并实施本单位安全生产教育和培训计划\nB.组织制定并实施本单位的生产安全事故应急救援预案\n\n=== 第237页 ===\nC.及时、如实报告生产安全事故\nD.督促落实本单位重大危险源的安全管理措施", "options": {"A": "组织制定并实施本单位安全生产教育和培训计划", "B": "组织制定并实施本单位的生产安全事故应急救援预案 === 第237页 ===", "C": "及时、如实报告生产安全事故", "D": "督促落实本单位重大危险源的安全管理措施"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 696, "question": "依据《中华人民共和国突发事件应对法》的规定，国家将自然灾\n害、事故灾难和公共卫生事件的预警级别，按照突发事件发生的紧急\n程度、发展势态和可能造成的危害程度分为一级、二级、三级和四级，\n标示的颜色分别是（\n）。\nA.红色、黄色、蓝色和绿色\nB.红色、橙色、黄色和绿色\nC.红色、紫色、橙色和黄色\nD.红色、橙色、黄色和蓝色", "options": {"A": "红色、黄色、蓝色和绿色", "B": "红色、橙色、黄色和绿色", "C": "红色、紫色、橙色和黄色", "D": "红色、橙色、黄色和蓝色"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 697, "question": "某建筑公司的安全生产条件不符合国家规定，导致施工现场发生\n了重大伤亡事故。根据《中华人民共和国刑法》及相关司法解释，该\n单位相关负责人涉嫌构成（\n）。\nA.重大责任事故罪\nB.玩忽职守罪\nC.重大劳动安全事故罪\nD.强令违章冒险作业罪", "options": {"A": "重大责任事故罪", "B": "玩忽职守罪", "C": "重大劳动安全事故罪", "D": "强令违章冒险作业罪"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 698, "question": "两家公司在同一作业区域内进行生产经营活动，为避免危及对方\n生产安全，两家公司签订了安全生产管理协议，明确了各自安全职责\n\n=== 第238页 ===\n和应当采取的安全措施。根据《中华人民共和国安全生产法》，两家\n公司应当（\n）进行安全检查与协调。\nA.指定专职或者兼职安全生产管理人员\nB.指定专职安全生产管理人员\nC.指定兼职安全生产管理人员\nD.指定专职、兼职安全管理人员或者委托具有国家规定专业技术资格\n的工程技术人员", "options": {"A": "指定专职或者兼职安全生产管理人员", "B": "指定专职安全生产管理人员", "C": "指定兼职安全生产管理人员", "D": "指定专职、兼职安全管理人员或者委托具有国家规定专业技术资格 的工程技术人员"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 699, "question": "某金属冶炼厂发生一起火灾事故，当场造成2 人死亡、1 人重伤、\n3 人轻伤，事故发生3 天后，重伤者因救治无效死亡。根据《生产安\n全事故报告和调查处理条例》，该厂应自事故发生之日起（\n）日内\n补报该事故伤亡情况。\nA.45\nB.30\nC.15\nD.7", "options": {"A": "45", "B": "30", "C": "15", "D": "7"}, "answer": "D", "type": "single", "category": "消防安全"}, {"id": 700, "question": "某化工企业生产车间发生火灾事故，造成1 人死亡、2 人受伤。\n根据《中华人民共和国安全生产法》关于该企业事故报告和抢救的说\n法，正确的是（\n）。\nA.接到事故报告后，立即向当地有关部门报告并等待抢救\nB.立即采取措施组织抢救，防止事故扩大\n\n=== 第239页 ===\nC.向当地有关部门报告死亡1 人，未报2 人受伤\nD.立即清理事故现场，防止产生负面影响", "options": {"A": "接到事故报告后，立即向当地有关部门报告并等待抢救", "B": "立即采取措施组织抢救，防止事故扩大 === 第239页 ===", "C": "向当地有关部门报告死亡1 人，未报2 人受伤", "D": "立即清理事故现场，防止产生负面影响"}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 701, "question": "根据《广东省安全生产条例》，生产经营单位的主要负责人每年\n至少组织和参与（\n）事故应急救援演练。\nA.一次\nB.二次\nC.三次\nD.四次", "options": {"A": "一次", "B": "二次", "C": "三次", "D": "四次"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 702, "question": "进行维修作业时需要进行动火作业和临时用电作业。依据《中华\n人民共和国安全生产法》的规定，下列关于该动火作业和临时用电作\n业安全管理的说法，正确的是（\n）。\nA.动火作业前，应报告应急管理部门并实施现场监控\nB.动火作业时，应安排专门人员进行现场安全管理\nC.临时用电作业前，应将临时用电方案报电力主管部门备案\nD.临时用电作业时，应报告应急管理部门并实施现场监控", "options": {"A": "动火作业前，应报告应急管理部门并实施现场监控", "B": "动火作业时，应安排专门人员进行现场安全管理", "C": "临时用电作业前，应将临时用电方案报电力主管部门备案", "D": "临时用电作业时，应报告应急管理部门并实施现场监控"}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 703, "question": "根据《中华人民共和国安全生产法》，关于生产安全事故应急救\n援与调查处理的说法，正确的是（\n）。\nA.除尚未查清伤亡人数、财产损失等原因外，必须立即将事故报告当\n地安全监管部门\n\n=== 第240页 ===\nB.生产经营单位发生生产安全事故后，事故现场有关人员应当立即报\n告本单位负责人\nC.除尚未核实事故起因和伤亡人数等原因外，不得迟报事故\nD.除确有必要并经有关部门批准，不得故意破坏事故现场和毁灭有关\n证据", "options": {"A": "除尚未查清伤亡人数、财产损失等原因外，必须立即将事故报告当 地安全监管部门 === 第240页 ===", "B": "生产经营单位发生生产安全事故后，事故现场有关人员应当立即报 告本单位负责人", "C": "除尚未核实事故起因和伤亡人数等原因外，不得迟报事故", "D": "除确有必要并经有关部门批准，不得故意破坏事故现场和毁灭有关 证据"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 704, "question": "职业病病人依法享受国家规定的职业病待遇。依据《中华人民共\n和国职业病防治法》的规定，下列关于职业病病人保障的说法中，不\n正确的是（\n）。\nA.医疗卫生机构发现疑似职业病病人时，应当告知劳动者本人并及时\n通知用人单位\nB.疑似职业病病人在诊断、医学观察期间的费用，由用人单位承担\nC.用人单位对从事接触职业病危害的作业的劳动者，应当给予适当岗\n位津贴\nD.用人单位对不适宜继续从事原工作的职业病病人，应当给予适当岗\n位津贴", "options": {"A": "医疗卫生机构发现疑似职业病病人时，应当告知劳动者本人并及时 通知用人单位", "B": "疑似职业病病人在诊断、医学观察期间的费用，由用人单位承担", "C": "用人单位对从事接触职业病危害的作业的劳动者，应当给予适当岗 位津贴", "D": "用人单位对不适宜继续从事原工作的职业病病人，应当给予适当岗 位津贴"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 705, "question": "甲建筑施工企业承揽了“大型建筑工程且结构复杂的建筑工程”。\n由于甲建筑施工企业近期资金短缺，将承包的部分建筑工程转包给乙\n施工企业，乙施工企业将此全部建筑工程肢解后，以分包的名义分别\n转包给他人。依据《中华人民共和国建筑法》的规定，请指出该建筑\n施工企业正确的做法是（\n）。\n\n=== 第241页 ===\nA.甲施工企业必须自行完成建筑工程主体结构的施工\nB.乙企业可以用其他建筑施工企业的名义承揽建设工程\nC.乙施工企业可以将其承包的全部建筑工程肢解以后以分包的名义\n分别转包给他人\nD.可以由两个以上的承包单位联合共同承包，应当按照资质等级高的\n单位的业务许可范围承揽工程", "options": {"A": "甲施工企业必须自行完成建筑工程主体结构的施工", "B": "乙企业可以用其他建筑施工企业的名义承揽建设工程", "C": "乙施工企业可以将其承包的全部建筑工程肢解以后以分包的名义 分别转包给他人", "D": "可以由两个以上的承包单位联合共同承包，应当按照资质等级高的 单位的业务许可范围承揽工程"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 706, "question": "木工加工场地、钢筋加工场地等上方有可能坠落物件或处于起重\n机臂回转范围之内，应搭设（\n）。\nA.安全网\nB.双层防护棚\nC.单层防护棚\nD.防护棚", "options": {"A": "安全网", "B": "双层防护棚", "C": "单层防护棚", "D": "防护棚"}, "answer": "B", "type": "single", "category": "高处作业"}, {"id": 707, "question": "塑料安全帽的使用期限不应超过（\n）年。\nA.3\nB.4\nC.5\nD.6", "options": {"A": "3", "B": "4", "C": "5", "D": "6"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 708, "question": "垂直、交叉作业时，应设置（\n）防护措施。\nA.警戒区\n\n=== 第242页 ===\nB.安全隔离\nC.应急疏散\nD.安全通行", "options": {"A": "警戒区 === 第242页 ===", "B": "安全隔离", "C": "应急疏散", "D": "安全通行"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 709, "question": "基坑周边建（构）筑物的结构部分出现危害结构的变形裂缝或较\n严重的突发裂缝，周边地面出现较严重的裂缝，应如何处理（\n）。\nA.不监测\nB.正常监测\nC.提高监测频率\nD.进行危险报警，采取应急措施", "options": {"A": "不监测", "B": "正常监测", "C": "提高监测频率", "D": "进行危险报警，采取应急措施"}, "answer": "D", "type": "single", "category": "基坑工程"}, {"id": 710, "question": "发电机房、变配电房、厨房操作间、锅炉房、可燃材料库以及易\n燃易爆危险品库房的建筑构件的燃烧性能等级必须为（\n）级。\nA.A\nB.B\nC.C\nD.D", "options": {"A": "A", "B": "B", "C": "C", "D": "D"}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 711, "question": "施工现场必须制订消防预案，建立健全消防防火责任制和管理制\n度，配备消防器材及（\n）消防人员。\nA.专职\nB.兼职\n\n=== 第243页 ===\nC.义务\nD.专业", "options": {"A": "专职", "B": "兼职 === 第243页 ===", "C": "义务", "D": "专业"}, "answer": "C", "type": "single", "category": "消防安全"}, {"id": 712, "question": "对有可能造成二次污染的废弃物应（\n）储存，并设置醒目标\n识。\nA.密闭\nB.单独\nC.分类\nD.合并", "options": {"A": "密闭", "B": "单独", "C": "分类", "D": "合并"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 713, "question": "有毒有害废弃物的分类率应达到（\n）。\nA.100%\nB.95%\nC.90%\nD.80%", "options": {"A": "100%", "B": "95%", "C": "90%", "D": "80%"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 714, "question": "施工场界环境噪声排放标准夜间不应超过（\n）dB（A）。\nA.50\nB.55\nC.60\nD.65", "options": {"A": "50", "B": "55", "C": "60", "D": "65"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 715, "question": "施工场界环境噪声排放标准不应超过（\n）dB（A）。\nA.60\nB.65\nC.70\nD.75", "options": {"A": "60", "B": "65", "C": "70", "D": "75"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 716, "question": "在城市市区噪声敏感建筑物集中区域内，应严格控制昼间噪声，\n禁止夜间（\n）进行产生环境噪声污染的建筑施工作业。\nA.20 时至7 时\nB.21 时至8 时\nC.21 时至7 时\nD.22 时至6 时", "options": {"A": "20 时至7 时", "B": "21 时至8 时", "C": "21 时至7 时", "D": "22 时至6 时"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 717, "question": "在进行混凝土凿毛、清理杯口以及破除等易产生扬尘的工序时应\n采取（\n）措施降尘。\nA.湿水\nB.绿化\nC.覆盖\nD.封闭", "options": {"A": "湿水", "B": "绿化", "C": "覆盖", "D": "封闭"}, "answer": "A", "type": "single", "category": "文明施工"}, {"id": 718, "question": "施工现场的主通道宽度应在（\n）m 以上。\nA.3\n\n=== 第245页 ===\nB.4\nC.5\nD.6", "options": {"A": "3 === 第245页 ===", "B": "4", "C": "5", "D": "6"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 719, "question": "市区主要路段的工地围挡高度不得小于（\n）m。\nA.1.8\nB.2\nC.2.5\nD.3", "options": {"A": "1.8", "B": "2", "C": "2.5", "D": "3"}, "answer": "C", "type": "single", "category": "文明施工"}, {"id": 720, "question": "对未落实法律法规规定的安全生产主体责任，发生较大以上生产\n安全责任事故和一年内发生（\n）次以上（含）死亡事故并负主要\n责任的企业，由安监部门按规定列入“黑名单”。\nA.1\nB.2\nC.3\nD.5", "options": {"A": "1", "B": "2", "C": "3", "D": "5"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 721, "question": "吊篮内作业人员不应超过（\n）。\nA.1 人\nB.2 人\nC.3 人\n\n=== 第246页 ===\nD.4 人", "options": {"A": "1 人", "B": "2 人", "C": "3 人 === 第246页 ===", "D": "4 人"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 722, "question": "高处作业吊篮安全锁必须在有效标定期内使用，有效标定期不应\n大于（\n）。\nA.四年\nB.三年\nC.二年\nD.一年", "options": {"A": "四年", "B": "三年", "C": "二年", "D": "一年"}, "answer": "D", "type": "single", "category": "高处作业"}, {"id": 723, "question": "重大事故隐患，是指在房屋建筑和市政基础设施工程（以下简称\n房屋市政工程）施工过程中，存在的危害程度较大、可能导致（\n）\n或造成重大经济损失的生产安全事故隐患。\nA.群死群伤\nB.死亡\nC.重大失误\nD.最大死亡", "options": {"A": "群死群伤", "B": "死亡", "C": "重大失误", "D": "最大死亡"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 724, "question": "进入施工现场必须戴好安全帽。关于安全帽的说法错误的是\n（\n）。\nA.安全帽由帽衬和帽壳两部分组成，帽衬与帽壳应紧贴\nB.当有物料坠落到安全帽壳上时，帽衬可起到缓冲作用，不使颈椎受\n到伤害\n\n=== 第247页 ===\nC.必须系紧下颌带\nD.必须有产品合格证等标识", "options": {"A": "安全帽由帽衬和帽壳两部分组成，帽衬与帽壳应紧贴", "B": "当有物料坠落到安全帽壳上时，帽衬可起到缓冲作用，不使颈椎受 到伤害 === 第247页 ===", "C": "必须系紧下颌带", "D": "必须有产品合格证等标识"}, "answer": "A", "type": "single", "category": "高处作业"}, {"id": 725, "question": "吊篮正常作业时，人员进入吊篮的方式正确的是（\n）。\nA.从建筑物其他孔洞处进入吊篮内\nB.从建筑物窗口进入吊篮内\nC.从建筑物顶部进入吊篮内\nD.应从地面进入吊篮内", "options": {"A": "从建筑物其他孔洞处进入吊篮内", "B": "从建筑物窗口进入吊篮内", "C": "从建筑物顶部进入吊篮内", "D": "应从地面进入吊篮内"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 726, "question": "吊篮连续停用（\n）日以上重新使用前，应对吊篮实行专项检\n查并有检查记录。\nA.2\nB.3\nC.4\nD.5", "options": {"A": "2", "B": "3", "C": "4", "D": "5"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 727, "question": "下列关于吊篮重新进行验收叙述正确的是（\n）。\nA.在同一施工现场进行三次以上移位安装后才应重新进行验收\nB.在同一施工现场进行二次移位安装后应重新进行验收\nC.在同一施工现场进行多次移位安装，并不需重新进行验收\nD.在同一施工现场不允许进行移位安装", "options": {"A": "在同一施工现场进行三次以上移位安装后才应重新进行验收", "B": "在同一施工现场进行二次移位安装后应重新进行验收", "C": "在同一施工现场进行多次移位安装，并不需重新进行验收", "D": "在同一施工现场不允许进行移位安装"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 728, "question": "下列关于高处作业吊篮悬挂机构叙述正确的一项是（\n）。\nA.可以安装在外架上，但不宜安装在钢管扣件搭设的架子上\nB.应安装在砼混结构、型钢承重平台等上方\nC.应安装在砼混结构、型钢承重平台等下方\nD.宜采用柔性联接方式进行拉接固定", "options": {"A": "可以安装在外架上，但不宜安装在钢管扣件搭设的架子上", "B": "应安装在砼混结构、型钢承重平台等上方", "C": "应安装在砼混结构、型钢承重平台等下方", "D": "宜采用柔性联接方式进行拉接固定"}, "answer": "B", "type": "single", "category": "高处作业"}, {"id": 729, "question": "每个月应对施工升降机的防坠安全器检查（\n）次。\nA.1\nB.2\nC.3\nD.4", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 730, "question": "施工升降机防坠安全器的使用寿命为（\n）年。\nA.2\nB.3\nC.4\nD.5", "options": {"A": "2", "B": "3", "C": "4", "D": "5"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 731, "question": "根据住房和城乡建设部有关规定，建筑施工企业项目负责人每月\n带班生产时间不得少于本月施工时间的（\n）。\nA.25%\nB.30%\n\n=== 第249页 ===\nC.35%\nD.80%", "options": {"A": "25%", "B": "30% === 第249页 ===", "C": "35%", "D": "80%"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 732, "question": "根据住房和城乡建设部有关规定，建筑施工企业负责人每月定期\n带班检查时间不少于其工作日的（\n）。\nA.25%\nB.30%\nC.35%\nD.40%", "options": {"A": "25%", "B": "30%", "C": "35%", "D": "40%"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 733, "question": "建筑施工企业安全生产许可证暂扣期满前（\n）个工作日，需\n向颁发管理机关提出发还安全生产许可证申请。\nA.10\nB.12\nC.14\nD.6", "options": {"A": "10", "B": "12", "C": "14", "D": "6"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 734, "question": "同一建筑施工企业在12 个月内连续发生（\n）次生产安全事故，\n将吊销安全生产许可证。\nA.4\nB.3\nC.5\n\n=== 第250页 ===\nD.6", "options": {"A": "4", "B": "3", "C": "5 === 第250页 ===", "D": "6"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 735, "question": "建筑施工企业在12 个月内同一项目被责令停止施工（\n）次时，\n将根据情节轻重依法给予暂扣安全生产许可证30 日至60 日的处罚。\nA.1\nB.2\nC.3\nD.4", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 736, "question": "建筑施工特种作业人员操作证每（\n）复核一次，需要延期的\n应于期满前（\n）内向原考核发证机关申请办理延期复核手续。\nA.半年；六个月\nB.一年；一个月\nC.两年；三个月\nD.两年；六个月", "options": {"A": "半年；六个月", "B": "一年；一个月", "C": "两年；三个月", "D": "两年；六个月"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 737, "question": "首次取得建筑施工特种作业资格证书的人员，在其正式上岗前，\n应当由用人单位安排不少于（\n）的实习操作。\nA.3 个月\nB.4 个月\nC.6 个月\nD.1 年\n\n=== 第251页 ===", "options": {"A": "3 个月", "B": "4 个月", "C": "6 个月", "D": "1 年 === 第251页 ==="}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 738, "question": "根据《建筑施工企业安全生产管理规范》，建筑施工企业新进场\n的工人必须接受不少于（\n）的公司级安全教育培训。\nA.20 学时\nB.30 学时\nC.15 学时\nD.50 学时", "options": {"A": "20 学时", "B": "30 学时", "C": "15 学时", "D": "50 学时"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 739, "question": "根据《建筑施工企业安全生产管理规范》，建筑施工企业新进场\n的工人必须接受不少于（\n）的班组级安全教育培训。\nA.20 学时\nB.30 学时\nC.15 学时\nD.50 学时", "options": {"A": "20 学时", "B": "30 学时", "C": "15 学时", "D": "50 学时"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 740, "question": "房屋建筑项目专项施工方案需专家论证时，专家组成员应当由\n（\n）名及以上符合相关专业要求的专家组成。\nA.3\nB.4\nC.5\nD.6", "options": {"A": "3", "B": "4", "C": "5", "D": "6"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 741, "question": "下列不属于安全技术措施的编制原则的是（\n）。\nA.规范性\nB.针对性\nC.可操作性\nD.同步性", "options": {"A": "规范性", "B": "针对性", "C": "可操作性", "D": "同步性"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 742, "question": "安装单位应当在建筑起重机械安装或拆卸前（\n）个工作日内\n告知工程所在地建设主管部门。\nA.3\nB.4\nC.5\nD.2", "options": {"A": "3", "B": "4", "C": "5", "D": "2"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 743, "question": "建筑起重机械安装完毕经自检合格后，（\n）应在验收前委托有\n相应资质的检验检测机构监督检验。\nA.出租单位\nB.安装单位\nC.使用单位\nD.建设单位", "options": {"A": "出租单位", "B": "安装单位", "C": "使用单位", "D": "建设单位"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 744, "question": "施工现场使用的塔式起重机应（\n）检验一次。\nA.3 个月\n\n=== 第253页 ===\nB.6 个月\nC.12 个月\nD.2 年", "options": {"A": "3 个月 === 第253页 ===", "B": "6 个月", "C": "12 个月", "D": "2 年"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 745, "question": "劳动防护用品根据防护性能分为（\n）和（\n）。\nA.特种劳动防护用品；一般劳动防护用品\nB.特种劳动防护用品；普通劳动防护用品\nC.特别劳动防护用品；一般劳动防护用品\nD.特别劳动防护用品；普通劳动防护用品", "options": {"A": "特种劳动防护用品；一般劳动防护用品", "B": "特种劳动防护用品；普通劳动防护用品", "C": "特别劳动防护用品；一般劳动防护用品", "D": "特别劳动防护用品；普通劳动防护用品"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 746, "question": "施工现场从事机械作业的木工，应配备紧口工作服，（\n）和防\n尘口罩，宜配备防护眼镜。\nA.防噪声耳罩\nB.绝缘胶鞋\nC.手套\nD.耐酸碱胶鞋", "options": {"A": "防噪声耳罩", "B": "绝缘胶鞋", "C": "手套", "D": "耐酸碱胶鞋"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 747, "question": "下列有关建筑施工劳动防护用品管理说法不正确的是（\n）。\nA.建筑施工企业应确保配备劳动防护用品专项经费的投入\nB.建筑施工企业应建立完善劳动保护用品的采购、验收、保管、发放、\n使用、更换、报废等规章制度\nC.劳动防护用品在发放使用前，建筑施工企业应组织相关人员按标准\n\n=== 第254页 ===\n进行验收\nD.劳动防护用品在发放使用后，建筑施工企业不用对施工作业人员劳\n动保护用品使用情况进行检查", "options": {"A": "建筑施工企业应确保配备劳动防护用品专项经费的投入", "B": "建筑施工企业应建立完善劳动保护用品的采购、验收、保管、发放、 使用、更换、报废等规章制度", "C": "劳动防护用品在发放使用前，建筑施工企业应组织相关人员按标准 === 第254页 === 进行验收", "D": "劳动防护用品在发放使用后，建筑施工企业不用对施工作业人员劳 动保护用品使用情况进行检查"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 748, "question": "职工所在单位应当自事故伤害发生之日或者被诊断、鉴定为职业\n病之日起（\n）内，向统筹地区社会保险行政部门提出工伤认定申\n请。\nA.7 日\nB.15 日\nC.30 日\nD.60 日", "options": {"A": "7 日", "B": "15 日", "C": "30 日", "D": "60 日"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 749, "question": "伤情严重或者情况特殊，经设区的市级劳动能力鉴定委员会确认，\n可以适当延长，但延长不得超过（\n）月。\nA.3 个\nB.6 个\nC.9 个\nD.12 个", "options": {"A": "3 个", "B": "6 个", "C": "9 个", "D": "12 个"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 750, "question": "按工程项目参加工伤保险的，在项目开工前由（\n）一次性缴\n纳本项目工伤保险费。\nA.建设单位\n\n=== 第255页 ===\nB.总承包单位\nC.劳务分包单位\nD.专业承包", "options": {"A": "建设单位 === 第255页 ===", "B": "总承包单位", "C": "劳务分包单位", "D": "专业承包"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 751, "question": "下列不属于建筑施工企业安全检查内容的是（\n）。\nA.安全目标的实现程度\nB.安全生产职责的落实情况\nC.各项安全管理制度的执行情况\nD.农民工工资发放情况", "options": {"A": "安全目标的实现程度", "B": "安全生产职责的落实情况", "C": "各项安全管理制度的执行情况", "D": "农民工工资发放情况"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 752, "question": "总承包单位工程项目部应组织各分包单位（\n）进行安全检查。\nA.每天\nB.每周\nC.每月\nD.每季度", "options": {"A": "每天", "B": "每周", "C": "每月", "D": "每季度"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 753, "question": "针对某个专项问题或在施工中存在的某个突出性安全问题进行\n的单项或定向检查是（\n）。\nA.专项检查\nB.定期检查\nC.季节性检查\nD.不定期检查\n\n=== 第256页 ===", "options": {"A": "专项检查", "B": "定期检查", "C": "季节性检查", "D": "不定期检查 === 第256页 ==="}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 754, "question": "某幕墙专业分包工程施工过程中，发生了一起安全事故。造成2\n人死亡，根据《建设工程安全生产管理条例》，此次事故应由（\n）\n上报有关主管部门。\nA.幕墙分包企业\nB.施工总承包企业\nC.监理单位\nD.建设单位", "options": {"A": "幕墙分包企业", "B": "施工总承包企业", "C": "监理单位", "D": "建设单位"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 755, "question": "关于建设单位安全责任的说法，正确的是（\n）。\nA.建设单位根据自身情况提出低于强制性规定的要求\nB.建设单位有权压缩合同约定的工期\nC.建设单位可将拆除工程发包给任何施工企业\nD.建设单位应当向施工企业提供施工现场相邻建筑物的相关资料", "options": {"A": "建设单位根据自身情况提出低于强制性规定的要求", "B": "建设单位有权压缩合同约定的工期", "C": "建设单位可将拆除工程发包给任何施工企业", "D": "建设单位应当向施工企业提供施工现场相邻建筑物的相关资料"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 756, "question": "危险是指系统中存在导致发生不期望后果的可能性超过了人们\n的承受程度，一般用（\n）表示危险的程度。\nA.可能性\nB.风险度\nC.损害度\nD.严重性", "options": {"A": "可能性", "B": "风险度", "C": "损害度", "D": "严重性"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 757, "question": "在生产经营活动中存在可能导致事故发生的物的危险状态、人的\n不安全行为和管理上的缺陷是指（\n）。\nA.危险\nB.事故隐患\nC.危险因素\nD.重大危险源", "options": {"A": "危险", "B": "事故隐患", "C": "危险因素", "D": "重大危险源"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 758, "question": "安全生产方针的核心和具体体现是（\n）。\nA.安全第一\nB.预防为主\nC.综合治理\nD.科技兴安", "options": {"A": "安全第一", "B": "预防为主", "C": "综合治理", "D": "科技兴安"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 759, "question": "当前，从全国建筑施工生产安全事故统计看，所占比例最高的是\n（\n）。\nA.高处坠落事故\nB.各类坍塌事故\nC.物体打击事故\nD.起重伤害事故", "options": {"A": "高处坠落事故", "B": "各类坍塌事故", "C": "物体打击事故", "D": "起重伤害事故"}, "answer": "A", "type": "single", "category": "高处作业"}, {"id": 760, "question": "监理单位在实施监理过程中，发现存在严重安全事故隐患的，应\n要求暂时停止施工，并及时报告（\n）。\n\n=== 第258页 ===\nA.建设单位\nB.施工单位\nC.总承包单位\nD.分包单位", "options": {"A": "建设单位", "B": "施工单位", "C": "总承包单位", "D": "分包单位"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 761, "question": "下列有关监理单位安全监督检查内容叙述不正确的是（\n）。\nA.检查施工现场安全管理机构的建立及专职安全生产管理人员配备\n情况\nB.监督施工单位落实安全技术措施，及时制止违规施工作业\nC.监督施工单位落实成本控制、工程进度措施情况\nD.巡视检查危险性较大的分部分项工程专项施工方案实施情况", "options": {"A": "检查施工现场安全管理机构的建立及专职安全生产管理人员配备 情况", "B": "监督施工单位落实安全技术措施，及时制止违规施工作业", "C": "监督施工单位落实成本控制、工程进度措施情况", "D": "巡视检查危险性较大的分部分项工程专项施工方案实施情况"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 762, "question": "企业安全目标管理体系由目标体系和（\n）组成。\nA.措施体系\nB.责任体系\nC.组织体系\nD.保障体系", "options": {"A": "措施体系", "B": "责任体系", "C": "组织体系", "D": "保障体系"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 763, "question": "某劳务分包单位向某工程项目派遣了165 名劳务作业人员，则该\n劳务分包单位在该项目至少应配备（\n）名专职安全生产管理人员。\nA.1\nB.2\n\n=== 第259页 ===\nC.3\nD.无需配备", "options": {"A": "1", "B": "2 === 第259页 ===", "C": "3", "D": "无需配备"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 764, "question": "某项目设备安装合同造价为6000 万，则承担该工程的总承包单\n位应至少配备（\n）名专职安全生产管理人员。\nA.1\nB.2\nC.3\nD.4", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 765, "question": "建筑施工企业的分公司、区域公司等较大的分支机构应依据实际\n生产情况配备不少于（\n）名的专职安全生产管理人员。\nA.1\nB.2\nC.3\nD.4", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 766, "question": "下列不属于建筑施工企业工会组织安全职责的是（\n）。\nA.依法组织职工参加本单位安全生产工作的民主管理和民主监督，维\n护职工在安全生产方面的合法权益\nB.积极反映职工对安全生产工作的意见和要求\nC.参与组织开展安全生产宣传教育\n\n=== 第260页 ===\nD.参与制定消防安全管理制度并监督执行", "options": {"A": "依法组织职工参加本单位安全生产工作的民主管理和民主监督，维 护职工在安全生产方面的合法权益", "B": "积极反映职工对安全生产工作的意见和要求", "C": "参与组织开展安全生产宣传教育 === 第260页 ===", "D": "参与制定消防安全管理制度并监督执行"}, "answer": "D", "type": "single", "category": "消防安全"}, {"id": 767, "question": "下列关于企业分管安全生产负责人安全职责叙述不正确的是\n（\n）。\nA.组织实施安全工作规划、目标及实施计划\nB.领导、组织安全生产宣传教育工作\nC.确定安全生产考核指标；领导、组织安全生产检查\nD.建立、健全安全生产保证体系，保证安全生产投入", "options": {"A": "组织实施安全工作规划、目标及实施计划", "B": "领导、组织安全生产宣传教育工作", "C": "确定安全生产考核指标；领导、组织安全生产检查", "D": "建立、健全安全生产保证体系，保证安全生产投入"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 768, "question": "建筑施工单位在工程项目的安全生产第一责任人是（\n）。\nA.项目负责人\nB.项目技术负责人\nC.项目专职安全生产管理人员\nD.技术总工", "options": {"A": "项目负责人", "B": "项目技术负责人", "C": "项目专职安全生产管理人员", "D": "技术总工"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 769, "question": "（\n）对施工现场安全生产负有日常检查并做好记录的职责。\nA.项目负责人\nB.项目技术负责人\nC.项目专职安全生产管理人员\nD.企业安全管理人员", "options": {"A": "项目负责人", "B": "项目技术负责人", "C": "项目专职安全生产管理人员", "D": "企业安全管理人员"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 770, "question": "下列关于工程项目施工班组长的安全职责叙述不正确的是（\n）。\n\n=== 第261页 ===\nA.具体负责本班组在施工过程中的安全管理工作\nB.向本工种作业人员进行安全技术措施交底\nC.组织本班组的班前安全活动\nD.组织对施工现场易发生重大事故的部位和环节进行监控", "options": {"A": "具体负责本班组在施工过程中的安全管理工作", "B": "向本工种作业人员进行安全技术措施交底", "C": "组织本班组的班前安全活动", "D": "组织对施工现场易发生重大事故的部位和环节进行监控"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 771, "question": "下列关于工程项目作业人员的安全职责叙述不正确的是（\n）。\nA.严格执行安全技术操作规程\nB.严格按照安全技术交底进行作业\nC.对作业人员违规违章行为有权予以纠正或查处\nD.正确佩戴和使用劳动防护用品", "options": {"A": "严格执行安全技术操作规程", "B": "严格按照安全技术交底进行作业", "C": "对作业人员违规违章行为有权予以纠正或查处", "D": "正确佩戴和使用劳动防护用品"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 772, "question": "根据住房和城乡建设部有关规定，落实带班制度的第一责任人，\n对落实带班制度全面负责的是（\n）。\nA.项目负责人\nB.项目技术负责人\nC.专职安全生产管理人员\nD.企业法定代表人", "options": {"A": "项目负责人", "B": "项目技术负责人", "C": "专职安全生产管理人员", "D": "企业法定代表人"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 773, "question": "施工单位承包工程后违反法律法规规定或者施工合同关于工程\n分包的约定，把单位工程或分部分项工程分包给其他单位或个人施工\n的行为是（\n）。\nA.违法发包\n\n=== 第262页 ===\nB.违法分包\nC.转包\nD.挂靠", "options": {"A": "违法发包 === 第262页 ===", "B": "违法分包", "C": "转包", "D": "挂靠"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 774, "question": "单位或个人以其他有资质的施工单位的名义，承揽工程的行为是\n（\n）。\nA.违法发包\nB.违法分包\nC.转包\nD.挂靠", "options": {"A": "违法发包", "B": "违法分包", "C": "转包", "D": "挂靠"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 775, "question": "建筑施工企业管理人员安全生产考核内容包括安全生产知识和\n（\n）。\nA.安全生产技术水平\nB.安全生产管理能力\nC.安全生产操作能力\nD.以上均不正确", "options": {"A": "安全生产技术水平", "B": "安全生产管理能力", "C": "安全生产操作能力", "D": "以上均不正确"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 776, "question": "根据《建筑施工企业安全生产管理规范》，作业人员离开原作业\n岗位六个月以上，又回到原作业岗位，需要进行哪一类型的安全教育\n培训（\n）。\nA.转岗安全教育培训\n\n=== 第263页 ===\nB.复岗安全教育培训\nC.节假日教育培训\nD.转场安全教育培训", "options": {"A": "转岗安全教育培训 === 第263页 ===", "B": "复岗安全教育培训", "C": "节假日教育培训", "D": "转场安全教育培训"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 777, "question": "企业安全投入管理的第一责任人是（\n）。\nA.企业财务部门负责人\nB.企业分管财务副总经理\nC.企业法定代表人\nD.企业分管安全生产副总经理", "options": {"A": "企业财务部门负责人", "B": "企业分管财务副总经理", "C": "企业法定代表人", "D": "企业分管安全生产副总经理"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 778, "question": "下列关于建筑施工安全技术交底叙述不正确的是（\n）。\nA.建筑施工中，安全技术措施是以保障职工安全、防止伤亡事故为目\n的\nB.施工单位应建立分级、分层次的安全技术交底制度\nC.安全技术交底必须具体、明确、针对性强\nD.安全技术交底的内容不包括发现事故隐患后应采取的措施", "options": {"A": "建筑施工中，安全技术措施是以保障职工安全、防止伤亡事故为目 的", "B": "施工单位应建立分级、分层次的安全技术交底制度", "C": "安全技术交底必须具体、明确、针对性强", "D": "安全技术交底的内容不包括发现事故隐患后应采取的措施"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 779, "question": "施工单位的安全生产专项措施资料应遵循（\n）的原则。\nA.先实施、后报审\nB.先报审、后实施\nC.报审、实施同时进行\nD.不遵循任何原则\n\n=== 第264页 ===", "options": {"A": "先实施、后报审", "B": "先报审、后实施", "C": "报审、实施同时进行", "D": "不遵循任何原则 === 第264页 ==="}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 780, "question": "建筑起重机械产权单位变更时，（\n）应当持建筑起重机械备案\n证明到设备备案机关办理备案注销手续。\nA.安装单位\nB.现产权单位\nC.使用单位\nD.原产权单位", "options": {"A": "安装单位", "B": "现产权单位", "C": "使用单位", "D": "原产权单位"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 781, "question": "下列哪项不属于建筑起重机械安装、拆卸告知时，须提供的资料\n是（\n）。\nA.安装单位资质证书、安全生产许可证\nB.安装单位特种作业人员证书\nC.建筑起重机械安装（拆卸）工程专项施工方案\nD.建筑起重机械产品合格证", "options": {"A": "安装单位资质证书、安全生产许可证", "B": "安装单位特种作业人员证书", "C": "建筑起重机械安装（拆卸）工程专项施工方案", "D": "建筑起重机械产品合格证"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 782, "question": "下列不属于建筑起重机械使用单位安全职责的是（\n）。\nA.制定建筑起重机械生产安全事故应急救援预案\nB.在建筑起重机械活动范围内设置明显的安全警示标志，对集中作业\n区做好安全防护\nC.设置相应的设备管理机构或者配备专职的设备管理人员，负责起重\n机械的安全管理工作\nD.制定建筑起重机械安装、拆卸工程生产安全事故应急救援预案\n\n=== 第265页 ===", "options": {"A": "制定建筑起重机械生产安全事故应急救援预案", "B": "在建筑起重机械活动范围内设置明显的安全警示标志，对集中作业 区做好安全防护", "C": "设置相应的设备管理机构或者配备专职的设备管理人员，负责起重 机械的安全管理工作", "D": "制定建筑起重机械安装、拆卸工程生产安全事故应急救援预案 === 第265页 ==="}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 783, "question": "施工升降设施安装完毕后，（\n）应当自检，出具自检合格证明。\nA.使用单位\nB.安装单位\nC.建设单位\nD.监理单位", "options": {"A": "使用单位", "B": "安装单位", "C": "建设单位", "D": "监理单位"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 784, "question": "劳动防护用品主要是指劳动者在生产过程中为免遭或者减轻\n（\n）和职业危害所配备的个人防护装备。\nA.物体打击\nB.高处坠落\nC.触电事故\nD.事故伤害", "options": {"A": "物体打击", "B": "高处坠落", "C": "触电事故", "D": "事故伤害"}, "answer": "D", "type": "single", "category": "高处作业"}, {"id": 785, "question": "下列哪项不是申请工伤认定所需要提交的材料（\n）。\nA.工伤认定申请表\nB.与用人单位存在劳动关系的证明材料\nC.医疗诊断证明或者职业病诊断证明书\nD.职工户籍证明", "options": {"A": "工伤认定申请表", "B": "与用人单位存在劳动关系的证明材料", "C": "医疗诊断证明或者职业病诊断证明书", "D": "职工户籍证明"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 786, "question": "夜间检查是预防夜间发生大火的有效措施，重点是检查（\n）\n以及其他异常情况，及时堵塞漏洞，消除隐患。\n\n=== 第266页 ===\nA.办公室\nB.员工宿舍\nC.仓库\nD.火源、电源", "options": {"A": "办公室", "B": "员工宿舍", "C": "仓库", "D": "火源、电源"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 787, "question": "公众聚集场所在营业期间的防火巡查应当至少（\n）一次。\nA.每4 小时\nB.每5 小时\nC.每2 小时\nD.每3 小时", "options": {"A": "每4 小时", "B": "每5 小时", "C": "每2 小时", "D": "每3 小时"}, "answer": "C", "type": "single", "category": "消防安全"}, {"id": 788, "question": "除规范有特殊规定外，人员密集场所一般要求每一个防火分区的\n安全疏散出口不应少于（\n）个。\nA.1\nB.2\nC.3\nD.4", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 789, "question": "建筑内部装修（\n）遮挡消防设施和疏散指示标志及其出口，\n并不得妨碍消防设施和疏散走道的正常使用。\nA.可以\nB.不得\n\n=== 第267页 ===\nC.不宜\nD.可临时", "options": {"A": "可以", "B": "不得 === 第267页 ===", "C": "不宜", "D": "可临时"}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 790, "question": "人员密集场所的疏散通道、安全出口必须按规定配置（\n）。\nA.防火门和闭门器\nB.应急照明和疏散指示标志\nC.阻燃地毯和防滑地砖\nD.报警按钮和消防广播", "options": {"A": "防火门和闭门器", "B": "应急照明和疏散指示标志", "C": "阻燃地毯和防滑地砖", "D": "报警按钮和消防广播"}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 791, "question": "消防控制室值班人员做交接班工作时，要认真填写（\n）及系\n统运行登记表和控制器日检登记表。\nA.值班记录\nB.检查记录\nC.故障记录\nD.人员登记表", "options": {"A": "值班记录", "B": "检查记录", "C": "故障记录", "D": "人员登记表"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 792, "question": "架空线路的下方（\n）堆放物品。\nA.可以\nB.不得\nC.经批准后可以\nD.必须", "options": {"A": "可以", "B": "不得", "C": "经批准后可以", "D": "必须"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 793, "question": "高层建筑发生火灾时，通常不允许人员利用建筑物中的（\n）\n进行安全疏散。\nA.防烟楼梯\nB.室外楼梯\nC.普通电梯\nD.悬挂式逃生梯", "options": {"A": "防烟楼梯", "B": "室外楼梯", "C": "普通电梯", "D": "悬挂式逃生梯"}, "answer": "C", "type": "single", "category": "消防安全"}, {"id": 794, "question": "人员密集场所应制订安全疏散计划，以下说法不正确的是（\n）。\nA.按人员的分布情况，制订在火灾等紧急情况下的安全疏散路线，并\n绘制平面图，用醒目的箭头标示出出入口和疏散路线\nB.路线要尽量简捷，安全出口的利用率要平均\nC.对工作人员要明确分工，平时要进行训练，以便火灾时按疏散计划\n组织人流有秩序地进行疏散\nD.发生火灾时，要按照单位领导的要求进行疏散", "options": {"A": "按人员的分布情况，制订在火灾等紧急情况下的安全疏散路线，并 绘制平面图，用醒目的箭头标示出出入口和疏散路线", "B": "路线要尽量简捷，安全出口的利用率要平均", "C": "对工作人员要明确分工，平时要进行训练，以便火灾时按疏散计划 组织人流有秩序地进行疏散", "D": "发生火灾时，要按照单位领导的要求进行疏散"}, "answer": "D", "type": "single", "category": "消防安全"}, {"id": 795, "question": "机械保养质量的检验必须坚持自检、互检和（\n）相结合的检\n验制度。\nA.抽检\nB.专职检验\nC.巡检\nD.定期检验", "options": {"A": "抽检", "B": "专职检验", "C": "巡检", "D": "定期检验"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 796, "question": "下列关于钢丝绳夹用途的说法，错误的是（\n）。\nA.钢丝绳的连接\nB.钢丝绳穿绕滑车组时绳端的固定\nC.缆风绳绳头的固定时绳端的固定\nD.钢丝绳的展开", "options": {"A": "钢丝绳的连接", "B": "钢丝绳穿绕滑车组时绳端的固定", "C": "缆风绳绳头的固定时绳端的固定", "D": "钢丝绳的展开"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 797, "question": "高处安装中的电、气焊作业，应严格采取安全防火措施，在作业\n处下面周围（\n）m 范围内不得有人。\nA.8\nB.10\nC.12\nD.15", "options": {"A": "8", "B": "10", "C": "12", "D": "15"}, "answer": "B", "type": "single", "category": "高处作业"}, {"id": 798, "question": "下列关于平地机安全使用要求的陈述，错误的是（\n）。\nA.平地机作业区不得有树根、大石块等障碍物\nB.平地机可用于拖拉其他机械\nC.土质坚实的地面应先用齿耙翻松，翻松时应缓慢下齿\nD.平地机在转弯或掉头时，应使用低速挡", "options": {"A": "平地机作业区不得有树根、大石块等障碍物", "B": "平地机可用于拖拉其他机械", "C": "土质坚实的地面应先用齿耙翻松，翻松时应缓慢下齿", "D": "平地机在转弯或掉头时，应使用低速挡"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 799, "question": "下列关于建筑起重机械的说法，正确的是（\n）。\nA.产权备案证明可以在设备使用后办理\nB.购入的旧塔机应有半年内完整运行记录及维修、改造资料\n\n=== 第270页 ===\nC.塔机的各种安全装置必须齐全、灵敏可靠，但有的仪器仪表可以没\n有\nD.塔机生产厂必须持有国家颁发的特种设备制造许可证", "options": {"A": "产权备案证明可以在设备使用后办理", "B": "购入的旧塔机应有半年内完整运行记录及维修、改造资料 === 第270页 ===", "C": "塔机的各种安全装置必须齐全、灵敏可靠，但有的仪器仪表可以没 有", "D": "塔机生产厂必须持有国家颁发的特种设备制造许可证"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 800, "question": "（\n）能够防止塔机超载，避免由于严重超载而引起塔机倾覆\n或折臂等事故。\nA.力矩限制器\nB.吊钩保险\nC.行程限制器\nD.幅度限制器", "options": {"A": "力矩限制器", "B": "吊钩保险", "C": "行程限制器", "D": "幅度限制器"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 801, "question": "下列哪项不属于安全生产治本攻坚三年行动的重点任务？（\n）\nA.开展安全科技支撑和工程治理行动\nB.开展重大事故隐患动态清零行动\nC.提升员工福利待遇\nD.开展重大事故隐患判定标准体系提升行动", "options": {"A": "开展安全科技支撑和工程治理行动", "B": "开展重大事故隐患动态清零行动", "C": "提升员工福利待遇", "D": "开展重大事故隐患判定标准体系提升行动"}, "answer": "C", "type": "single", "category": "脚手架与模板工程"}, {"id": 802, "question": "安全生产治本攻坚三年行动中，关于隐患排查治理的说法正确的\n是（\n）。\nA.每年至少进行一次全面隐患排查\nB.每季度带队对本单位重大事故隐患排查整治情况至少开展1 次检\n查\n\n=== 第271页 ===\nC.隐患排查结果无需公示\nD.隐患排查仅由安全管理部门负责", "options": {"A": "每年至少进行一次全面隐患排查", "B": "每季度带队对本单位重大事故隐患排查整治情况至少开展1 次检 查 === 第271页 ===", "C": "隐患排查结果无需公示", "D": "隐患排查仅由安全管理部门负责"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 803, "question": "以下哪项不属于《安全生产治本攻坚三年行动方案（2024-2026\n年）》中提出的“八大行动”？（\n）\nA.生产经营单位主要负责人安全教育培训行动\nB.重大事故隐患动态清零行动\nC.安全生产文化推广普及行动\nD.全民身体素质提升行动", "options": {"A": "生产经营单位主要负责人安全教育培训行动", "B": "重大事故隐患动态清零行动", "C": "安全生产文化推广普及行动", "D": "全民身体素质提升行动"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 804, "question": "根据《安全生产治本攻坚三年行动方案（2024-2026 年）》，以下\n关于安全教育培训行动的说法中，哪一项是正确的？（\n）\nA.覆盖全国所有行业生产经营单位\nB.每年安全教育培训内容都相同\nC.针对不同行业领域制定分年度培训计划\nD.生产经营单位主要负责人可以不参加", "options": {"A": "覆盖全国所有行业生产经营单位", "B": "每年安全教育培训内容都相同", "C": "针对不同行业领域制定分年度培训计划", "D": "生产经营单位主要负责人可以不参加"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 805, "question": "我国安全生产方针中的综合治理强调的是（\n）。\nA.抓住重点，遏制重特大事故\nB.强化责任，落实企业自主管理\nC.重在执法，完善法规标准建设\nD.标本兼治，重在治本\n\n=== 第272页 ===", "options": {"A": "抓住重点，遏制重特大事故", "B": "强化责任，落实企业自主管理", "C": "重在执法，完善法规标准建设", "D": "标本兼治，重在治本 === 第272页 ==="}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 806, "question": "根据《中华人民共和国安全生产法》规定，关于事故隐患排查治\n理制度，以下表述错误的是（\n）。\nA.生产经营单位应当采取技术、管理措施，及时发现并消除事故隐患\nB.事故隐患应当报告主管的负有安全生产监督管理职责的部门\nC.县级以上地方各级人民政府负有安全生产监督管理职责的部门应\n当建立健全重大事故隐患治理督办制度\nD.事故隐患排查治理情况应当如实记录，并向从业人员通报", "options": {"A": "生产经营单位应当采取技术、管理措施，及时发现并消除事故隐患", "B": "事故隐患应当报告主管的负有安全生产监督管理职责的部门", "C": "县级以上地方各级人民政府负有安全生产监督管理职责的部门应 当建立健全重大事故隐患治理督办制度", "D": "事故隐患排查治理情况应当如实记录，并向从业人员通报"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 807, "question": "安全风险评估是在危险源辨识的基础上，通过确定事故发生的可\n能性和事故后果严重程度，从而确定安全风险大小和等级的过程。以\n下关于安全风险评估的说法错误的是（\n）。\nA.风险评估是主要决策工具，强调风险量化的确定性。不应依靠主观\n判断\nB.企业可根据自身实际情况，选择适用的定性或定量风险评估方法，\n依据统一标准对本单位的安全风险进行有效的分级\nC.LEC 法是一种简单易行的、评价员工在具有潜在危险性作业时危险\n性的半定量评价方法\nD.在风险评估过程中，应紧扣遏制重特大事故目标，把事故可能造成\n的后果摆在突出位置，高度关注事故影响和覆盖人群", "options": {"A": "风险评估是主要决策工具，强调风险量化的确定性。不应依靠主观 判断", "B": "企业可根据自身实际情况，选择适用的定性或定量风险评估方法， 依据统一标准对本单位的安全风险进行有效的分级", "C": "LEC 法是一种简单易行的、评价员工在具有潜在危险性作业时危险 性的半定量评价方法", "D": "在风险评估过程中，应紧扣遏制重特大事故目标，把事故可能造成 的后果摆在突出位置，高度关注事故影响和覆盖人群"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 808, "question": "（\n）是事故隐患排查、治理和防控的责任主体。\n\n=== 第273页 ===\nA.生产经营单位\nB.生产经营单位直接负责人\nC.事故直接负责人\nD.生产经营单位主要负责人", "options": {"A": "生产经营单位", "B": "生产经营单位直接负责人", "C": "事故直接负责人", "D": "生产经营单位主要负责人"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 809, "question": "根据系统安全工程观点，危险是指系统中存在导致发生不期望后\n果的可能性超过了人们的（\n）。\nA.承受程度\nB.认知能力\nC.预计范围\nD.实践水平", "options": {"A": "承受程度", "B": "认知能力", "C": "预计范围", "D": "实践水平"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 810, "question": "在房屋市政工程施工过程中，以下哪种情况应判定为重大事故隐\n患？（\n）\nA.一般事故隐患未得到及时处理\nB.施工人员未佩戴安全帽\nC.建筑施工企业未取得安全生产许可证擅自从事建筑施工活动\nD.施工现场存在少量建筑垃圾未及时清理", "options": {"A": "一般事故隐患未得到及时处理", "B": "施工人员未佩戴安全帽", "C": "建筑施工企业未取得安全生产许可证擅自从事建筑施工活动", "D": "施工现场存在少量建筑垃圾未及时清理"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 811, "question": "关于安全生产责任制，下列说法错误的是：（\n）。\nA.工程项目部应建立以项目安全总监为第一责任人的各级管理人员\n安全生产责任制\n\n=== 第274页 ===\nB.安全生产责任制应经责任人签字确认\nC.工程项目部应有各工种安全技术操作规程\nD.工程项目部应按规定配备专职安全员", "options": {"A": "工程项目部应建立以项目安全总监为第一责任人的各级管理人员 安全生产责任制 === 第274页 ===", "B": "安全生产责任制应经责任人签字确认", "C": "工程项目部应有各工种安全技术操作规程", "D": "工程项目部应按规定配备专职安全员"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 812, "question": "关于施工组织设计及专项施工方案，下列说法错误的是：（\n）。\nA.工程项目部在施工前应编制施工组织设计，施工组织设计应针对工\n程特点、施工工艺制定安全技术措施\nB.危险性较大的分部分项工程应按规定编制安全专项施工方案，专项\n施工方案应有针对性，并按有关规定进行设计计算\nC.超过一定规模危险性较大的分部分项工程，建设单位应组织专家对\n专项施工方案进行论证\nD.施工组织设计、安全专项施工方案，应由有关部门审核，施工单位\n技术负责人、监理单位项目总监批准", "options": {"A": "工程项目部在施工前应编制施工组织设计，施工组织设计应针对工 程特点、施工工艺制定安全技术措施", "B": "危险性较大的分部分项工程应按规定编制安全专项施工方案，专项 施工方案应有针对性，并按有关规定进行设计计算", "C": "超过一定规模危险性较大的分部分项工程，建设单位应组织专家对 专项施工方案进行论证", "D": "施工组织设计、安全专项施工方案，应由有关部门审核，施工单位 技术负责人、监理单位项目总监批准"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 813, "question": "关于安全技术交底，下列说法错误的是：（\n）。\nA.施工负责人在分派生产任务时，应对相关管理人员、施工作业人员\n进行书面安全技术交底\nB.安全技术交底应按施工工序、施工部位、施工栋号分部分项进行\nC.安全技术交底应结合施工作业场所状况、特点、工序，对危险因素、\n施工方案、规范标准、操作规程和应急措施进行交底\nD.安全技术交底应由专职安全员向被交底人进行交底", "options": {"A": "施工负责人在分派生产任务时，应对相关管理人员、施工作业人员 进行书面安全技术交底", "B": "安全技术交底应按施工工序、施工部位、施工栋号分部分项进行", "C": "安全技术交底应结合施工作业场所状况、特点、工序，对危险因素、 施工方案、规范标准、操作规程和应急措施进行交底", "D": "安全技术交底应由专职安全员向被交底人进行交底"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 814, "question": "关于安全教育，下列说法错误的是：（\n）。\nA.工程项目部应建立安全教育培训制度\nB.当施工人员入场时，工程项目部应组织进行以国家安全法律法规、\n企业安全制度、施工现场安全管理规定及各工种安全技术操作规程为\n主要内容的三级安全教育培训和考核\nC.当施工人员变换工种或采用新技术、新工艺、新设备、新材料施工\n时，应进行安全教育培训\nD.施工管理人员、专职安全员每季度应进行安全教育培训和考核", "options": {"A": "工程项目部应建立安全教育培训制度", "B": "当施工人员入场时，工程项目部应组织进行以国家安全法律法规、 企业安全制度、施工现场安全管理规定及各工种安全技术操作规程为 主要内容的三级安全教育培训和考核", "C": "当施工人员变换工种或采用新技术、新工艺、新设备、新材料施工 时，应进行安全教育培训", "D": "施工管理人员、专职安全员每季度应进行安全教育培训和考核"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 815, "question": "当施工人员变换工种或采用新技术、新工艺、新设备、新材料施\n工时，应进行（\n）。\nA.安全考核\nB.应急演练\nC.安全教育培训\nD.安全检查", "options": {"A": "安全考核", "B": "应急演练", "C": "安全教育培训", "D": "安全检查"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 816, "question": "应急救援工作要求，工程项目部应针对工程特点，进行（\n）。\nA.安全技术交底\nB.隐患的排查\nC.重大危险源的辨识\nD.安全教育培训", "options": {"A": "安全技术交底", "B": "隐患的排查", "C": "重大危险源的辨识", "D": "安全教育培训"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 817, "question": "施工现场应建立应急救援组织，培训、配备应急救援人员，定期\n组织员工进行（\n）。\nA.应急救援交底\nB.应急救援演练\nC.应急隐患排查\nD.应急物资检查", "options": {"A": "应急救援交底", "B": "应急救援演练", "C": "应急隐患排查", "D": "应急物资检查"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 818, "question": "关于生产安全事故处理，下列说法错误的是（\n）。\nA.当施工现场发生生产安全事故时，施工单位应按规定及时报告\nB.事故调查应遵循“三不放过”原则\nC.施工单位应按规定对生产安全事故进行调查分析，制定防范措施\nD.应依法为施工作业人员办理保险", "options": {"A": "当施工现场发生生产安全事故时，施工单位应按规定及时报告", "B": "事故调查应遵循“三不放过”原则", "C": "施工单位应按规定对生产安全事故进行调查分析，制定防范措施", "D": "应依法为施工作业人员办理保险"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 819, "question": "关于安全标志，下列说法错误的是（\n）。\nA.施工现场入口处及主要施工区域、危险部位应设置相应的安全警示\n标志牌\nB.施工现场应绘制安全标志布置图\nC.应根据工程部位和现场设施的变化，调整安全标志牌设置\nD.施工现场应设置一般危险源公示牌", "options": {"A": "施工现场入口处及主要施工区域、危险部位应设置相应的安全警示 标志牌", "B": "施工现场应绘制安全标志布置图", "C": "应根据工程部位和现场设施的变化，调整安全标志牌设置", "D": "施工现场应设置一般危险源公示牌"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 820, "question": "安全检查管理规定项目经理应执行（\n），并应有记录。\nA.交接班制度\n\n=== 第277页 ===\nB.样板制度\nC.轮休制度\nD.带班检查制度", "options": {"A": "交接班制度 === 第277页 ===", "B": "样板制度", "C": "轮休制度", "D": "带班检查制度"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 821, "question": "关于建筑施工企业安全生产责任体系，下列说法错误的是：（\n）。\nA.企业主要负责人应领导企业安全管理工作\nB.各管理层主要负责人应明确并组织落实本管理层各职能部门和岗\n位的安全生产职责，实现本管理层的安全管理目标\nC.各管理层的职能部门及岗位应承担职能范围内与安全生产相关的\n职责，互相配合，实现相关安全管理目标\nD.企业安全总监应组织制订企业中长期安全管理目标和制度，审议、\n决策重大安全事项", "options": {"A": "企业主要负责人应领导企业安全管理工作", "B": "各管理层主要负责人应明确并组织落实本管理层各职能部门和岗 位的安全生产职责，实现本管理层的安全管理目标", "C": "各管理层的职能部门及岗位应承担职能范围内与安全生产相关的 职责，互相配合，实现相关安全管理目标", "D": "企业安全总监应组织制订企业中长期安全管理目标和制度，审议、 决策重大安全事项"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 822, "question": "企业人员上岗前考核说法错误的是（\n）。\nA.企业主要负责人、项目负责人必须经安全生产知识和管理能力考核\n合格，依法取得安全生产考核合格证书\nB.企业的各类管理人员必须具备与岗位相适应的安全管理知识和能\n力，无需取得岗位资格证书\nC.特种作业人员必须经安全技术理论和操作技能考核合格，依法取得\n建筑施工特种作业人员操作资格证书\nD.专职安全生产管理人员必须经安全生产知识和管理能力考核合格，\n依法取得安全生产考核合格证书\n\n=== 第278页 ===", "options": {"A": "企业主要负责人、项目负责人必须经安全生产知识和管理能力考核 合格，依法取得安全生产考核合格证书", "B": "企业的各类管理人员必须具备与岗位相适应的安全管理知识和能 力，无需取得岗位资格证书", "C": "特种作业人员必须经安全技术理论和操作技能考核合格，依法取得 建筑施工特种作业人员操作资格证书", "D": "专职安全生产管理人员必须经安全生产知识和管理能力考核合格， 依法取得安全生产考核合格证书 === 第278页 ==="}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 823, "question": "关于安全生产费用管理，下列说法错误的是（\n）。\nA.安全生产费用管理应包括资金的储备、申请、审核审批、支付、使\n用、统计、分析、审计检查等工作内容\nB.施工企业应按规定储备安全生产所需的费用\nC.施工企业各管理层应根据安全生产管理的需要，编制相应的安全生\n产费用使用计划\nD.安全生产费用管理可以挪作他用", "options": {"A": "安全生产费用管理应包括资金的储备、申请、审核审批、支付、使 用、统计、分析、审计检查等工作内容", "B": "施工企业应按规定储备安全生产所需的费用", "C": "施工企业各管理层应根据安全生产管理的需要，编制相应的安全生 产费用使用计划", "D": "安全生产费用管理可以挪作他用"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 824, "question": "关于建筑施工企业施工设施、设备和劳动防护用品的安全管理，\n下列说法错误的是（\n）。\nA.施工企业施工设施、设备和劳动防护用品的安全管理应包括购置、\n租赁、装拆、验收，检测、使用、保养、维修、改造和报废等内容\nB.施工企业应根据安全管理目标，生产经营特点、规模、环境等，配\n备符合安全生产要求的施工设施、设备、劳动防护用品及相关的安全\n检测器具\nC.生产经营活动内容可能包含机械设备的施工企业，应按规定设置相\n应的设备管理机构或者配备专职的人员进行设备管理\nD.施工企业施工设施、设备和劳动防护用品应由分包单位管理", "options": {"A": "施工企业施工设施、设备和劳动防护用品的安全管理应包括购置、 租赁、装拆、验收，检测、使用、保养、维修、改造和报废等内容", "B": "施工企业应根据安全管理目标，生产经营特点、规模、环境等，配 备符合安全生产要求的施工设施、设备、劳动防护用品及相关的安全 检测器具", "C": "生产经营活动内容可能包含机械设备的施工企业，应按规定设置相 应的设备管理机构或者配备专职的人员进行设备管理", "D": "施工企业施工设施、设备和劳动防护用品应由分包单位管理"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 825, "question": "关于施工设施、设备、劳动防护用品及相关的安全检测器具安全\n管理档案，下列说法错误的是（\n）。\n\n=== 第279页 ===\nA.应记录来源、类型、数量、技术性能、使用年限等静态管理信息\nB.应记录目前使用地点、使用状态、使用责任人、检测、日常维修保\n养等动态管理信息\nC.应记录采购、租赁、改造计划及实施情况\nD.不需记录报废计划及实施情况", "options": {"A": "应记录来源、类型、数量、技术性能、使用年限等静态管理信息", "B": "应记录目前使用地点、使用状态、使用责任人、检测、日常维修保 养等动态管理信息", "C": "应记录采购、租赁、改造计划及实施情况", "D": "不需记录报废计划及实施情况"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 826, "question": "关于安全技术管理，下列说法错误的是（\n）。\nA.施工企业安全技术管理应包括对安全生产技术措施的制定、实施、\n改进等管理\nB.施工企业各管理层的安全总监应对管理范围的安全技术管理负责\nC.施工企业应定期进行技术分析，改造、淘汰落后的施工工艺、技术\n和设备\nD.施工企业应明确施工组织设计、专项施工方案（措施）的编制、审\n核和审批的内容、权限、程序及时限", "options": {"A": "施工企业安全技术管理应包括对安全生产技术措施的制定、实施、 改进等管理", "B": "施工企业各管理层的安全总监应对管理范围的安全技术管理负责", "C": "施工企业应定期进行技术分析，改造、淘汰落后的施工工艺、技术 和设备", "D": "施工企业应明确施工组织设计、专项施工方案（措施）的编制、审 核和审批的内容、权限、程序及时限"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 827, "question": "施工企业对分包（供）单位安全检查和考核，不包括（\n）。\nA.分包单位安全生产管理机构的设置、人员配备及资格情况\nB.分包单位安全生产绩效\nC.分包（供）单位违约、违章情况\nD.分包单位产值完成情况", "options": {"A": "分包单位安全生产管理机构的设置、人员配备及资格情况", "B": "分包单位安全生产绩效", "C": "分包（供）单位违约、违章情况", "D": "分包单位产值完成情况"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 828, "question": "工程项目部应建立健全安全生产责任体系，说法错误的是（\n）。\n\n=== 第280页 ===\nA.企业法定代表人应为工程项目安全生产第一责任人\nB.工程项目总承包单位、专业承包和劳务分包单位的项目经理、技术\n负责人和专职安全生产管理人员应组成安全管理组织\nC.总承包单位、专业承包和劳务分包单位应按规定配备项目专职安全\n生产管理人员\nD.工程项目部其他管理人员应承担本岗位管理范围内的安全生产职\n责", "options": {"A": "企业法定代表人应为工程项目安全生产第一责任人", "B": "工程项目总承包单位、专业承包和劳务分包单位的项目经理、技术 负责人和专职安全生产管理人员应组成安全管理组织", "C": "总承包单位、专业承包和劳务分包单位应按规定配备项目专职安全 生产管理人员", "D": "工程项目部其他管理人员应承担本岗位管理范围内的安全生产职 责"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 829, "question": "关于生产安全事故管理，下列说法错误的是（\n）。\nA.生产安全事故发生后，施工企业应按规定及时上报，不得越级上报\nB.生产安全事故报告后出现新情况时，应及时补报\nC.生产安全事故调查和处理应做到“四不放过”\nD.施工企业应建立生产安全事故档案", "options": {"A": "生产安全事故发生后，施工企业应按规定及时上报，不得越级上报", "B": "生产安全事故报告后出现新情况时，应及时补报", "C": "生产安全事故调查和处理应做到“四不放过”", "D": "施工企业应建立生产安全事故档案"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 830, "question": "施工企业安全考核的对象不包括（\n）。\nA.监理工程师\nB.施工企业各管理层的主要负责人\nC.相关职能部门及岗位\nD.施工企业参建人员", "options": {"A": "监理工程师", "B": "施工企业各管理层的主要负责人", "C": "相关职能部门及岗位", "D": "施工企业参建人员"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 831, "question": "某厂氧化铝焙烧车间的一名电工调整至磨碎车间综合班的电工\n岗位，负责该电工调整后的安全教育培训工作的是（\n）。\n\n=== 第281页 ===\nA.磨碎车间\nB.厂安全生产管理部门\nC.综合班\nD.特种作业培训机构", "options": {"A": "磨碎车间", "B": "厂安全生产管理部门", "C": "综合班", "D": "特种作业培训机构"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 832, "question": "某公司一名员工驾驶叉车工作12 年，未发生过事故，经原考核\n发证机关同意，该名员工特种作业证复审最长时间是（\n）。\nA.1 年1 次\nB.2 年1 次\nC.6 年1 次\nD.8 年1 次", "options": {"A": "1 年1 次", "B": "2 年1 次", "C": "6 年1 次", "D": "8 年1 次"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 833, "question": "甲省乙市丙县的某化工企业，位于本省丁市戊县的分公司发生危\n险化学品爆炸事故，造成2 人死亡，10 人重伤，直接经济损失200\n余万元，负责组织此次事故调查的是（\n）。\nA.丁市人民政府\nB.丙县人民政府\nC.乙市人民政府\nD.戊县人民政府", "options": {"A": "丁市人民政府", "B": "丙县人民政府", "C": "乙市人民政府", "D": "戊县人民政府"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 834, "question": "某制冷企业使用的设备进行风险辨识和危险归类，根据第一类，\n第二类危险源的定义，属于第二类危险源的是（\n）。\n\n=== 第282页 ===\nA.高速旋转的压缩机\nB.15t 液氨储罐\nC.水压0.6Mpa 的高压管\nD.腐蚀受损的安全阀", "options": {"A": "高速旋转的压缩机", "B": "15t 液氨储罐", "C": "水压0.6Mpa 的高压管", "D": "腐蚀受损的安全阀"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 835, "question": "根据《企业安全生产标准化基本规范》(GB/T33000)，二级要素\n预测预警属于一级要素是（\n）。\nA.安全风险管控\nB.目标职责\nC.应急管理\nD.现场管理", "options": {"A": "安全风险管控", "B": "目标职责", "C": "应急管理", "D": "现场管理"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 836, "question": "甲某是一家企业的电焊工，劳动过程中需要进行个体防护，下列\n个体防护用品中，甲某无需佩戴的是（\n）。\nA.耳塞\nB.护目镜\nC.绝缘鞋\nD.防毒口罩", "options": {"A": "耳塞", "B": "护目镜", "C": "绝缘鞋", "D": "防毒口罩"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 837, "question": "某企业开展安全生产标准化建设，根据《企业安全生产标准化基\n本规范》(GB/T33
