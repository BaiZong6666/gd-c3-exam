000)，关于现场管理—级要素内容的说法，错误的\n是（\n）。\n\n=== 第283页 ===\nA.安全设施和职业病防护设施不应随意拆除，挪用或弃置不用\nB.检维修过程中应执行安全控制措施，检维修后应进行安全确认\nC.同一作业区域内进行作业活动的两支队伍只需与业主方签订安全\n管理协议\nD.企业应建立合格承包商、供应商等相关方的名录和档案", "options": {"A": "安全设施和职业病防护设施不应随意拆除，挪用或弃置不用", "B": "检维修过程中应执行安全控制措施，检维修后应进行安全确认", "C": "同一作业区域内进行作业活动的两支队伍只需与业主方签订安全 管理协议", "D": "企业应建立合格承包商、供应商等相关方的名录和档案"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 838, "question": "使用3 台额定起重能力为50t 的起重机，共同吊运一重物时，每\n台起重机所承受的最大载荷为（\n）。\nA.40t\nB.15t\nC.25t\nD.50t", "options": {"A": "40t", "B": "15t", "C": "25t", "D": "50t"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 839, "question": "某露天矿运输车在弯道行驶过程中，装载的矿石突然滑落，根据\n《企业职工伤亡事故分类》（GB6441）该事故类型属于（\n）。\nA.车辆伤害\nB.物体打击\nC.机械伤害\nD.高处坠落", "options": {"A": "车辆伤害", "B": "物体打击", "C": "机械伤害", "D": "高处坠落"}, "answer": "A", "type": "single", "category": "高处作业"}, {"id": 840, "question": "某水电站地处偏远地区，根据有关法规要求编制了事故应急预案，\n明确了应急保障内容，关于应急保障内容的说法，错误的是（\n）。\n\n=== 第284页 ===\nA.配备卫星电话属于通信与信息保障\nB.购置冲锋舟属于物资装备保障\nC.与当地派出所签订应急协议属于应急队伍保障\nD.与当地医院签订协议属于其他保障", "options": {"A": "配备卫星电话属于通信与信息保障", "B": "购置冲锋舟属于物资装备保障", "C": "与当地派出所签订应急协议属于应急队伍保障", "D": "与当地医院签订协议属于其他保障"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 841, "question": "小王负责整理单位的特种设备安全技术档案，档案包含了特种设\n备的设计文件产品质量合格证明，安装及使用维护保养说明，定期检\n查和定期自行检查记录；监督校验证明等；日常使用状况记录；维护\n保养记录等，还应纳入特种设备安全技术档案存档的是（\n）。\nA.特种设备的运行故障和事故记录\nB.管理人员和作业人员资质证书\nC.特种设备安全教育培训记录\nD.特种设备事故专项应急预案", "options": {"A": "特种设备的运行故障和事故记录", "B": "管理人员和作业人员资质证书", "C": "特种设备安全教育培训记录", "D": "特种设备事故专项应急预案"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 842, "question": "建立健全安全生产规章制度是生产经营单位的法定职责之一，关\n于安全生产规章制度编制程序的说法，错误的是（\n）。\nA.新修订的安全规章制度应组织相关人员进行培训，对安全操作规程\n类制度，还应进行考试\nB.根据生产经营单位安全生产责任制的编制规则，由负有安全生产管\n理职能的部门负责起草\nC.责任部门起草的规章制度草案，应通过正式渠道征求有关部门或员\n工的意见和建议\n\n=== 第285页 ===\nD.涉及全局性的综合管理类安全规章制度应由生产经营单位主管安\n全生产的领导签发", "options": {"A": "新修订的安全规章制度应组织相关人员进行培训，对安全操作规程 类制度，还应进行考试", "B": "根据生产经营单位安全生产责任制的编制规则，由负有安全生产管 理职能的部门负责起草", "C": "责任部门起草的规章制度草案，应通过正式渠道征求有关部门或员 工的意见和建议 === 第285页 ===", "D": "涉及全局性的综合管理类安全规章制度应由生产经营单位主管安 全生产的领导签发"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 843, "question": "某高处动火作业引发火灾，经调查，导致事故发生的直接原因是\n无证人员违规施焊。未采取可靠的灭火措施，该动火作业可靠的灭火\n措施是（\n）。\nA.铺设篷布\nB.铺设绝缘电木\nC.铺设灭火毯\nD.铺设聚氨酯保温板", "options": {"A": "铺设篷布", "B": "铺设绝缘电木", "C": "铺设灭火毯", "D": "铺设聚氨酯保温板"}, "answer": "C", "type": "single", "category": "高处作业"}, {"id": 844, "question": "某大型建筑施工企业在安全生产月期间组织了桌面演练，按照应\n急注入信息，提出问题，分析决策、表达结果四个环节完成应急处置\n演练，关于桌面演练环节的说法，错误的是（\n）。\nA.灭火行动组组长根据演练方案提出灭火设备能力是否充足属于提\n出问题\nB.安全防护组防护员对演练情况进行简要汇总并进行点评属于注入\n信息\nC.疏散引导组引导员讨论警戒和交通管制的范围和区域问题属于分\n析决策\nD.医疗救护组代表讲解并演示胸外按压和人工呼吸操作要领属于表\n达结果\n\n=== 第286页 ===", "options": {"A": "灭火行动组组长根据演练方案提出灭火设备能力是否充足属于提 出问题", "B": "安全防护组防护员对演练情况进行简要汇总并进行点评属于注入 信息", "C": "疏散引导组引导员讨论警戒和交通管制的范围和区域问题属于分 析决策", "D": "医疗救护组代表讲解并演示胸外按压和人工呼吸操作要领属于表 达结果 === 第286页 ==="}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 845, "question": "王某是一家铜矿开采企业安全生产管理人员，李某是—家建筑施\n工企业安全生产，刘某是—家电力企业安全生产管理人员，陈某是一\n家机械制造企业的主要负责人，关于安全教育培训学时的说法，正确\n的是（\n）。\nA.王某初次安全培训时间不得少于32 小时\nB.刘某每年再培训时间不得少于12 小时\nC.陈某初次安全培训时间不得少于24 小时\nD.李某每年再培训时间不得少于16 小时", "options": {"A": "王某初次安全培训时间不得少于32 小时", "B": "刘某每年再培训时间不得少于12 小时", "C": "陈某初次安全培训时间不得少于24 小时", "D": "李某每年再培训时间不得少于16 小时"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 846, "question": "某市经济开发区创新产业园项目在作业区域进行塔式起重机安\n全工作，起重机安装单位严重违章作业，业主方安全员张某当即责令\n作业人员停止作业，但起重机安装单位负责人王某告知因顶升作业已\n经开始，临时停止风险更高，完成正在顶升的标准节后才能停止作业。\n随后，安全员张某在起重机附近等待，但王某等人在安装完该标准节\n后并未停止作业。张某再次叫停王某，立即通知监理人员，并向单位\n领导汇报之后，起重机突然坍塌，造成5 人死亡。关于安全员张某履\n行安全职责情况的说法，错误的是（\n）。\nA.对王某等现场作业人员安全教育培训不到位，履职不到位\nB.按照要求到起重机安装现场进行了安全管理，履职到位\nC.明确告知起重机安装单位严重违章作业，责令停止作业，履职到位\nD.违章制止未果后，通知监理人员，向单位领导汇报，履职到位\n\n=== 第287页 ===", "options": {"A": "对王某等现场作业人员安全教育培训不到位，履职不到位", "B": "按照要求到起重机安装现场进行了安全管理，履职到位", "C": "明确告知起重机安装单位严重违章作业，责令停止作业，履职到位", "D": "违章制止未果后，通知监理人员，向单位领导汇报，履职到位 === 第287页 ==="}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 847, "question": "某建筑施工企业发生—起火灾事故，造成2 人死亡，4 人重伤，\n厂房，设备设施烧毁，善后共发生死者丧葬费用240 万元，伤者医疗\n费用40 万元，停产损失60 万元，固定资产价值损失700 万元，处理\n环境污染费用10 万元，该企业事故直接经济损失是（\n）。\nA.280 万元\nB.340 万元\nC.1050 万元\nD.980 万元", "options": {"A": "280 万元", "B": "340 万元", "C": "1050 万元", "D": "980 万元"}, "answer": "D", "type": "single", "category": "消防安全"}, {"id": 848, "question": "用人单位应在劳动防护用品入库前进行验收，确定产品是否符合\n国家和行业标准，关于坠落悬挂用安全带性能要求的说法，错误的是\n（\n）。\nA.安全带伸展长度不应小于永久标识中明示的数值\nB.连接器不应打开，零部件不应断裂\nC.安全带使用的金属环类零件使用焊接件\nD.系带不应出现明显不对称或滑移", "options": {"A": "安全带伸展长度不应小于永久标识中明示的数值", "B": "连接器不应打开，零部件不应断裂", "C": "安全带使用的金属环类零件使用焊接件", "D": "系带不应出现明显不对称或滑移"}, "answer": "C", "type": "single", "category": "高处作业"}, {"id": 849, "question": "为落实国务院安全生产工作“十五条硬措施”。某县应急管理局\n对辖区内企业开展安全生产检查，检查发现未落实“十五条硬措施”\n的问题是（\n）。\nA.液化石油气罐装公司记录了安全生产教育培训情况\n\n=== 第288页 ===\nB.食醋加工企业建立了安全风险分级管理制度\nC.使用燃气的餐饮企业安装了可燃气体报警装置\nD.建设项目安全总监组织制定并实施了本单位安全生产管理制度", "options": {"A": "液化石油气罐装公司记录了安全生产教育培训情况 === 第288页 ===", "B": "食醋加工企业建立了安全风险分级管理制度", "C": "使用燃气的餐饮企业安装了可燃气体报警装置", "D": "建设项目安全总监组织制定并实施了本单位安全生产管理制度"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 850, "question": "根据年度检查计划，某建筑工地项目经理李某组织安全部、工程\n部、物资部等相关人员进行劳动防护用品专项检查，对检查中发现的\n问题限期整改，下面错误的是（\n）。\nA.焊工佩戴焊接防护用具作业，应缩短作业时间\nB.卫生清扫人员佩戴超过有效使用期的安全帽，应立即更换\nC.公用的便携式煤气报警仪由班组统—保管\nD.由于工程组绝缘手套已到有效使用期，应强制报废", "options": {"A": "焊工佩戴焊接防护用具作业，应缩短作业时间", "B": "卫生清扫人员佩戴超过有效使用期的安全帽，应立即更换", "C": "公用的便携式煤气报警仪由班组统—保管", "D": "由于工程组绝缘手套已到有效使用期，应强制报废"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 851, "question": "乙公司是甲集团公司下属的建筑安装股份公司，关于乙公司的安\n全生产费用提取使用的说法，错误的是（\n）。\nA.乙公司编制了年度安全生产费用提取和使用计划，并纳入财务预算\nB.甲集团公司可以对乙公司提取的企业安全生产费用按照一定比例\n集中管理统筹使用\nC.乙公司终止经营，结余的安全生产费用应按股东的出资比例返还\nD.乙公司从业人员发现报告事故隐患的奖励从企业安全生产费用里\n支出", "options": {"A": "乙公司编制了年度安全生产费用提取和使用计划，并纳入财务预算", "B": "甲集团公司可以对乙公司提取的企业安全生产费用按照一定比例 集中管理统筹使用", "C": "乙公司终止经营，结余的安全生产费用应按股东的出资比例返还", "D": "乙公司从业人员发现报告事故隐患的奖励从企业安全生产费用里 支出"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 852, "question": "某建设项目在设备装置安装工程阶段，具有32 台静设备需要吊\n\n=== 第289页 ===\n装，设备重量分布情况：100t 以上的设备5 台，50t—100t 的设备10\n台，40t—50t 的设备7 台，30t—40t 的设备5 台，30t 以下的设备5\n台，关于该吊装作业许可要求的说法，正确的是（\n）。\nA.有5 台设备的吊装为三级吊装作业\nB.遇有四级风力时，禁止室外吊装作业\nC.32 台设备的吊装均应制定吊装方案\nD.吊装50t～100t 的设备需要业主设备管理部门审批", "options": {"A": "有5 台设备的吊装为三级吊装作业", "B": "遇有四级风力时，禁止室外吊装作业", "C": "32 台设备的吊装均应制定吊装方案", "D": "吊装50t～100t 的设备需要业主设备管理部门审批"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 853, "question": "某集团公司年底在组织安全技术措施计划审核工作中，对下属单\n位上报的\"反事故\"措施计划进行审核，属于安全技术措施计划内容的\n是（\n）。\nA.落实《中华人民共和国安全生产法》要求，制定完善全员安全生产\n责任制\nB.根据现场作业环境特点，确定职业病危害的强度标准\nC.根据企业事故专项预案，制定突发事件应对现场处置卡\nD.针对不同岗位，制定安全员危险辨识及风险控制卡", "options": {"A": "落实《中华人民共和国安全生产法》要求，制定完善全员安全生产 责任制", "B": "根据现场作业环境特点，确定职业病危害的强度标准", "C": "根据企业事故专项预案，制定突发事件应对现场处置卡", "D": "针对不同岗位，制定安全员危险辨识及风险控制卡"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 854, "question": "某新成立的工程机械制造公司在取得相关手续后，当年开工建设，\n两年后投入使用。关于该企业安全设施“三同时”竣工验收的说法，\n正确的是（\n）。\nA.该公司组织对安全设施进行竣工验收，并形成书面报告备查\nB.该公司组织对安全设施进行竣工验收，应将验收报告提交县应急管\n\n=== 第290页 ===\n理部门审查\nC.该公司组织对安全设施进行竣工验收，应将验收报告提交市应急管\n理部门审查\nD.所在地应急管理部门组织第三方进行竣工验收，并组织专家审查", "options": {"A": "该公司组织对安全设施进行竣工验收，并形成书面报告备查", "B": "该公司组织对安全设施进行竣工验收，应将验收报告提交县应急管 === 第290页 === 理部门审查", "C": "该公司组织对安全设施进行竣工验收，应将验收报告提交市应急管 理部门审查", "D": "所在地应急管理部门组织第三方进行竣工验收，并组织专家审查"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 855, "question": "在工业生产中，保障工人的安全是至关重要的。关于预防工业生\n产中事故的安全要求，错误的是（\n）。\nA.在开始作业前，应对作业人员进行安全教育和培训\nB.所有机械设备的紧急停止按钮应清晰可见，并确保工人知晓其位置\nC.操作重型机械前，应检查安全防护装置是否完好，未经检查不得启\n动设备\nD.进行高处作业时，作业人员应佩戴三点式安全带，并确保安全带固\n定在稳固的锚点上", "options": {"A": "在开始作业前，应对作业人员进行安全教育和培训", "B": "所有机械设备的紧急停止按钮应清晰可见，并确保工人知晓其位置", "C": "操作重型机械前，应检查安全防护装置是否完好，未经检查不得启 动设备", "D": "进行高处作业时，作业人员应佩戴三点式安全带，并确保安全带固 定在稳固的锚点上"}, "answer": "D", "type": "single", "category": "高处作业"}, {"id": 856, "question": "依据《生产安全事故应急预案管理办法》的规定，生产经营单位\n应结合本单位组织管理体系、生产规模和可能发生的事故特点，确立\n本单位的应急预案体系，编制相应的应急预案。下列关于应急预案编\n制的说法，正确的是（\n）。\nA.编制的应急预案充分体现协同联动和社会救助等特点\nB.对于危险性较大的某一类风险，应当制定现场处置方案\nC.编制的应急预案应当与所涉及的其他单位的应急预案相互衔接\nD.应急预案编制完成后不需要组织专家评审\n\n=== 第291页 ===", "options": {"A": "编制的应急预案充分体现协同联动和社会救助等特点", "B": "对于危险性较大的某一类风险，应当制定现场处置方案", "C": "编制的应急预案应当与所涉及的其他单位的应急预案相互衔接", "D": "应急预案编制完成后不需要组织专家评审 === 第291页 ==="}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 857, "question": "李某是一家特种设备检验检测单位的检验检测人员，依据《中华\n人民共和国特种设备安全法》的规定，下列关于李某从事特种设备检\n验检测的说法，正确的是（\n）。\nA.李某需要经单位培训考核，取得上岗资格证，即可从事检验检测工\n作\nB.李某最多可以在两个特种设备检验检测单位中从事检验检测工作\nC.李某在检验检测中发现特种设备存在严重事故隐患，告知使用单位，\n并立即向特种设备安全监管部门进行报告\nD.李某得知其服务单位需更新一台压力容器，根据经验主动向该单位\n推荐另外品牌的压力容器", "options": {"A": "李某需要经单位培训考核，取得上岗资格证，即可从事检验检测工 作", "B": "李某最多可以在两个特种设备检验检测单位中从事检验检测工作", "C": "李某在检验检测中发现特种设备存在严重事故隐患，告知使用单位， 并立即向特种设备安全监管部门进行报告", "D": "李某得知其服务单位需更新一台压力容器，根据经验主动向该单位 推荐另外品牌的压力容器"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 858, "question": "依据《中华人民共和国职业病防治法》，发生或者可能发生急性\n职业病危害事故时，用人应当及时向（\n）报告。\nA.医疗卫生机构负责人\nB.所在地安全生产监督管理部门和有关部门\nC.用人单位负责人\nD.用人单位的上级主管部门", "options": {"A": "医疗卫生机构负责人", "B": "所在地安全生产监督管理部门和有关部门", "C": "用人单位负责人", "D": "用人单位的上级主管部门"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 859, "question": "依据《特种设备安全监察条例》，按照安全技术规范的要求，应\n当进行型式试验的特种设备产品、部件或者试制特种设备新产品、新\n部件、新材料，必须进行型式试验和（\n）。\n\n=== 第292页 ===\nA.安全测试\nB.能效测试\nC.型式测试\nD.产品试制", "options": {"A": "安全测试", "B": "能效测试", "C": "型式测试", "D": "产品试制"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 860, "question": "依据《中华人民共和国职业病防治法》，用人单位应当按照国务\n院安全生产监督管理部门的规定，定期对工作场所进行职业病危害因\n素（\n）。\nA.监测、评价\nB.检测、评价\nC.检测、评估\nD.监测、评估", "options": {"A": "监测、评价", "B": "检测、评价", "C": "检测、评估", "D": "监测、评估"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 861, "question": "刘某因公致残，经劳动能力鉴定委员会鉴定为四级伤残，根据《工\n伤保险条例》，关于刘某伤残待遇的说法，正确的是（\n）。\nA.从工伤保险基金中，按伤残等级支付一次性补助金，标准为刘某\n21 个月工资\nB.从工伤保险基金中，按伤残等级支付一次性补助金，标准为刘某\n23 个月工资\nC.从工伤保险基金中，按月支付伤残津贴，标准为刘某工资的85%\nD.从工伤保险基金中，按月支付伤残津贴，标准为刘某工资的80%", "options": {"A": "从工伤保险基金中，按伤残等级支付一次性补助金，标准为刘某 21 个月工资", "B": "从工伤保险基金中，按伤残等级支付一次性补助金，标准为刘某 23 个月工资", "C": "从工伤保险基金中，按月支付伤残津贴，标准为刘某工资的85%", "D": "从工伤保险基金中，按月支付伤残津贴，标准为刘某工资的80%"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 862, "question": "某大型建筑施工企业有职工1500 人，其中管理人员160 人，根\n据《中华人民共和国安全生产法》，关于该企业应急救援的说法，正\n确的是（\n）。\nA.可以不建立应急救援组织，但必须配备必要的应急救援器材、设备\nB.应当指定兼职的应急救援人员，并配备必要的应急救援器材、设备\nC.可以不建立应急救援组织，但应当委托外部应急救援机构开展应急\n管理工作\nD.应当建立应急救援组织，并配备必要的应急救援器材、设备", "options": {"A": "可以不建立应急救援组织，但必须配备必要的应急救援器材、设备", "B": "应当指定兼职的应急救援人员，并配备必要的应急救援器材、设备", "C": "可以不建立应急救援组织，但应当委托外部应急救援机构开展应急 管理工作", "D": "应当建立应急救援组织，并配备必要的应急救援器材、设备"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 863, "question": "甲公司在50m 高立脚仓现场施工作业中，委托乙公司承担仓顶防\n水材料吊装作业；委托丙公司承担仓内设备安装作业；委托丁监理公\n司负责施工监理。三家公司同时开展相关作业，根据《中华人民共和\n国安全生产法》，对上述作业活动进行相应安全管理的做法中，正确\n的是（\n）。\nA.甲公司与乙公司、丙公司签订安全生产管理协议，约定各自的安全\n生产管理职责\nB.甲公司与乙公司、丙公司签订安全生产管理协议，约定由乙公司、\n丙公司承担安全生产管理职责\nC.甲公司与丁公司签订安全生产管理协议，约定由丁公司承担安全生\n产管理职责\nD.甲公司指定丁公司监理人员对乙公司、丙公司的安全生产工作进行\n统一协调管理\n\n=== 第294页 ===", "options": {"A": "甲公司与乙公司、丙公司签订安全生产管理协议，约定各自的安全 生产管理职责", "B": "甲公司与乙公司、丙公司签订安全生产管理协议，约定由乙公司、 丙公司承担安全生产管理职责", "C": "甲公司与丁公司签订安全生产管理协议，约定由丁公司承担安全生 产管理职责", "D": "甲公司指定丁公司监理人员对乙公司、丙公司的安全生产工作进行 统一协调管理 === 第294页 ==="}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 864, "question": "依据《中华人民共和国职业病防治法》的规定，对遭受急性职业\n病危害的劳动者，用人单位应当及时组织救治、进行健康检查和医学\n观察，所需费用由（\n）承担。\nA.用人单位\nB.当地政府\nC.该劳动者\nD.社会保险部门", "options": {"A": "用人单位", "B": "当地政府", "C": "该劳动者", "D": "社会保险部门"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 865, "question": "某住宅楼施工项目生产经理安排施工人员张某等3 人将钢管、木\n方等材料从4 层搬运至该层悬挑钢平台，3 人在平台上对钢管进行绑\n扎过程中，因堆料超载导致平台倾覆。3 人及材料一同坠至地面。坠\n落的钢管砸中1 名地面作业人员，事故共造成4 人死亡，关于该事故\n调查与分析的说法，正确的是（\n）。\nA.张某3 人违章操作是造成事故的直接原因\nB.事故调查组应由所在地县级人民政府负责组织\nC.项目生产经理应负事故的直接责任\nD.事故调查组应聘请项目建设单位技术总监参与调查处理", "options": {"A": "张某3 人违章操作是造成事故的直接原因", "B": "事故调查组应由所在地县级人民政府负责组织", "C": "项目生产经理应负事故的直接责任", "D": "事故调查组应聘请项目建设单位技术总监参与调查处理"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 866, "question": "某建筑施工企业发生基坑坍塌事故，造成25 人死亡、6 人重伤，\n根据《生产安全事故报告和调查处理条例》（国务院令第493 号），本\n次事故调查应由（\n）组织进行。\n\n=== 第295页 ===\nA.国务院\nB.省级人民政府\nC.市级人民政府\nD.县级人民政府", "options": {"A": "国务院", "B": "省级人民政府", "C": "市级人民政府", "D": "县级人民政府"}, "answer": "B", "type": "single", "category": "基坑工程"}, {"id": 867, "question": "应急预案分为综合应急预案、专项应急预案和现场处置方案。下\n列关于应急预案的编制中，说法错误的是（\n）。\nA.生产经营单位应当每年至少组织一次综合应急预案演练或者专项\n应急预案演练\nB.风险因素单一的小微型生产经营单位可只编写专项应急预案，并定\n期演练\nC.每半年至少组织一次现场处置方案演练\nD.矿山企业应当每三年进行一次应急预案评估", "options": {"A": "生产经营单位应当每年至少组织一次综合应急预案演练或者专项 应急预案演练", "B": "风险因素单一的小微型生产经营单位可只编写专项应急预案，并定 期演练", "C": "每半年至少组织一次现场处置方案演练", "D": "矿山企业应当每三年进行一次应急预案评估"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 868, "question": "下列不属于事故调查处理“四不放过”原则的是（\n）。\nA.事故原因不查清不放过\nB.防范措施不落实不放过\nC.事故发生单位未受到罚款不放过\nD.事故责任者未受到处理不放过", "options": {"A": "事故原因不查清不放过", "B": "防范措施不落实不放过", "C": "事故发生单位未受到罚款不放过", "D": "事故责任者未受到处理不放过"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 869, "question": "某生产经营单位组织急救知识专题培训，培训教师模拟事故现场\n有伤人员小腿动脉出血，采用止血带止血时，止血带应扎在（\n）。\n\n=== 第296页 ===\nA.大腿中下1/3 处\nB.大腿根部处\nC.大腿上1/3 处\nD.出血部位处", "options": {"A": "大腿中下1/3 处", "B": "大腿根部处", "C": "大腿上1/3 处", "D": "出血部位处"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 870, "question": "现在生产企业为了集中精力做好生产经营业务，将房屋修缮，污\n水处理设施运行、园林绿化等工作，均交给承包商来完成。为了对承\n包商作业现场进行有效风险管控，下列说法正确是（\n）。\nA.承包商应根据服务作业行为，定期识别服务行为风险，并要求发包\n单位采取控制措施\nB.在同一区域作业承包商，用口头相互告知作业场所存在危险因素\nC.发包单位应对重点承包商负责人进行作业安全风险交底\nD.发包单位应对承包商作业过程进行有效监督", "options": {"A": "承包商应根据服务作业行为，定期识别服务行为风险，并要求发包 单位采取控制措施", "B": "在同一区域作业承包商，用口头相互告知作业场所存在危险因素", "C": "发包单位应对重点承包商负责人进行作业安全风险交底", "D": "发包单位应对承包商作业过程进行有效监督"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 871, "question": "应急管理工作内容概括起来叫作“一案三制”，“一案”是指应急\n预案，就是根据发生和可能发生的突发事件，事先研究制定应对计划\n和方案，各级应急预案编制应避免出现“上下一般粗”情况。下列对\n于“上下一般粗”理解，正确是（\n）。\nA.各级政府和基层单位都要制定应急预案，不可断层\nB.各级预案一路照抄，层层转发，不深入实际没有创造性\nC.相关预案之间要做到互相衔接\nD.预案层级越低，各项规定就要越明确、越具体\n\n=== 第297页 ===", "options": {"A": "各级政府和基层单位都要制定应急预案，不可断层", "B": "各级预案一路照抄，层层转发，不深入实际没有创造性", "C": "相关预案之间要做到互相衔接", "D": "预案层级越低，各项规定就要越明确、越具体 === 第297页 ==="}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 872, "question": "某建筑工地管理混乱，员工安全意识淡薄，在施工过程中1 名员\n工被倒塌的超高砖垛砸伤，一周后有1 名员工被塔吊吊运的水泥块砸\n伤。根据《企业职工伤亡事故分类》(GB6441-1986)，对发生的两起\n事故分类认定，正确的是（\n）。\nA.前一起事故属于物体打击，后一起事故属于机械伤害\nB.前一起事故属于物体打击，后一起事故属于起重伤害\nC.前一起事故属于坍塌，后一起事故属于起重伤害\nD.前一起事故属于坍塌，后一起事故属于机械伤害", "options": {"A": "前一起事故属于物体打击，后一起事故属于机械伤害", "B": "前一起事故属于物体打击，后一起事故属于起重伤害", "C": "前一起事故属于坍塌，后一起事故属于起重伤害", "D": "前一起事故属于坍塌，后一起事故属于机械伤害"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 873, "question": "以下属于物体打击伤害的选项是（\n）。\nA.建筑物坍塌，员工被水泥板砸伤\nB.员工不慎坠落，撞击到脚手架导致死亡\nC.起吊的重物脱落，将员工击伤\nD.脚手架上坠落的钢筋打击员工头部，导致其死亡", "options": {"A": "建筑物坍塌，员工被水泥板砸伤", "B": "员工不慎坠落，撞击到脚手架导致死亡", "C": "起吊的重物脱落，将员工击伤", "D": "脚手架上坠落的钢筋打击员工头部，导致其死亡"}, "answer": "D", "type": "single", "category": "脚手架与模板工程"}, {"id": 874, "question": "某企业每半年更新一次应急人员联系电话，这体现了事故应急预\n案编制中关于（\n）基本要求。\nA.应急组织和人员分工明确，并有具体落实措施\nB.结合本单位分析危险性\nC.有明确事故预防措施和应急程序，与应急能力相适应\nD.预案要素齐全完整，信息准确\n\n=== 第298页 ===", "options": {"A": "应急组织和人员分工明确，并有具体落实措施", "B": "结合本单位分析危险性", "C": "有明确事故预防措施和应急程序，与应急能力相适应", "D": "预案要素齐全完整，信息准确 === 第298页 ==="}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 875, "question": "根据《企业职工伤亡事故分类》（GB6441）规定，下列事故诱因\n或致害物与事故类别对应关系，正确是（\n）。\nA.起重机械引发打击伤害——物体打击\nB.火灾引起烧伤——灼烫\nC.矿井下透水引发淹溺伤害——淹溺\nD.静止机械边缘毛刺伤眼——机械伤害", "options": {"A": "起重机械引发打击伤害——物体打击", "B": "火灾引起烧伤——灼烫", "C": "矿井下透水引发淹溺伤害——淹溺", "D": "静止机械边缘毛刺伤眼——机械伤害"}, "answer": "D", "type": "single", "category": "消防安全"}, {"id": 876, "question": "安全文化由安全物质文化、安全行为文化、安全制度文化、安全\n精神文化组成。安全文化建设是通过创造一种良好安全人文氛围和协\n调人机环境，引导员工主动遵章守纪，养成良好安全行为习惯。安全\n文化建设目标是（\n）。\nA.全员参与\nB.以人为本\nC.持续改进\nD.综合治理", "options": {"A": "全员参与", "B": "以人为本", "C": "持续改进", "D": "综合治理"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 877, "question": "安全评价按照实施阶段不同分为三类：安全预评价、安全验收评\n价、安全现状评价。下列属于安全现状评价内容的是（\n）。\nA.明确评价对象建成或实施后能否安全运行的结论\nB.明确给出评价对象是否具备安全验收的条件\nC.符合性评价和危险危害程度的评价\n\n=== 第299页 ===\nD.对于辨识出的事故隐患，根据其事故的危险性，确定整改的优先顺\n序", "options": {"A": "明确评价对象建成或实施后能否安全运行的结论", "B": "明确给出评价对象是否具备安全验收的条件", "C": "符合性评价和危险危害程度的评价 === 第299页 ===", "D": "对于辨识出的事故隐患，根据其事故的危险性，确定整改的优先顺 序"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 878, "question": "职业病危害因素按照来源可分为生产过程、劳动过程和生产环境\n中产生有害因素三类。生产过程中产生职业病危害因素，按其性质可\n分为（\n）。\nA.接触因素、辐射因素、传染因素\nB.物理因素、化学因素、生物因素\nC.物理因素、化学因素、有毒因素\nD.浓度因素、强度因素、生物因素", "options": {"A": "接触因素、辐射因素、传染因素", "B": "物理因素、化学因素、生物因素", "C": "物理因素、化学因素、有毒因素", "D": "浓度因素、强度因素、生物因素"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 879, "question": "厂内机动车辆使用单位应按有关规定定期向检验机构申请在用\n厂内机动车辆的安全技术检验，同时使用单位还应进行每日检查、每\n月检查和年度检查。下列检查项目中，应每日检查的是（\n）。\nA.动力系统和控制器\nB.电气系统工作性\nC.紧急报警装置状况\nD.动力系统的可靠性", "options": {"A": "动力系统和控制器", "B": "电气系统工作性", "C": "紧急报警装置状况", "D": "动力系统的可靠性"}, "answer": "C", "type": "single", "category": "用电安全"}, {"id": 880, "question": "根据《企业安全生产标准化基本规范》(GB/T33000-2016)，外来\n人员进入作业现场前，应由作业现场所在单位对其进行安全教育培训，\n并保存记录。主要内容不包括（\n）。\n\n=== 第300页 ===\nA.可能接触到的危害因素\nB.作业安全风险分析及安全控制措施\nC.职业病危害防护措施\nD.安全生产管理目标", "options": {"A": "可能接触到的危害因素", "B": "作业安全风险分析及安全控制措施", "C": "职业病危害防护措施", "D": "安全生产管理目标"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 881, "question": "企业安全文化建设操作步骤正确的是（\n）。\nA.制定计划→建立机构→宣传教育→培训骨干→努力实践\nB.建立机构→制定计划→宣传教育→培训骨干→努力实践\nC.制定计划→建立机构→培训骨干→宣传教育→努力实践\nD.建立机构→制定计划→培训骨干→宣传教育→努力实践", "options": {"A": "制定计划→建立机构→宣传教育→培训骨干→努力实践", "B": "建立机构→制定计划→宣传教育→培训骨干→努力实践", "C": "制定计划→建立机构→培训骨干→宣传教育→努力实践", "D": "建立机构→制定计划→培训骨干→宣传教育→努力实践"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 882, "question": "依据《安全生产事故隐患排查治理暂行规定》，下列内容中，不\n属于重大事故隐患报告的是（\n）。\nA.隐患管理的缺陷\nB.隐患的现状及其产生的原因\nC.隐患的危害程度和改进难易程度分析\nD.隐患的治理方案", "options": {"A": "隐患管理的缺陷", "B": "隐患的现状及其产生的原因", "C": "隐患的危害程度和改进难易程度分析", "D": "隐患的治理方案"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 883, "question": "依据《生产经营单位安全培训规定》，下列选项中不属于生产经\n营单位安全生产管理人员初次培训内容的是（\n）。\nA.职业危害及其预防措施\nB.典型事故和应急救援案例分析\n\n=== 第301页 ===\nC.安全生产管理、安全生产技术、职业卫生等知识\nD.应急管理、应急预案编制以及应急处置的内容和要求", "options": {"A": "职业危害及其预防措施", "B": "典型事故和应急救援案例分析 === 第301页 ===", "C": "安全生产管理、安全生产技术、职业卫生等知识", "D": "应急管理、应急预案编制以及应急处置的内容和要求"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 884, "question": "某企业在安全文化建设过程中提出“四不伤害”原则，即不伤害\n自己、不伤害他人、不被他人伤害、保护他人不被伤害。这主要发挥\n了企业安全文化功能中的（\n）。\nA.辐射功能\nB.凝聚功能\nC.激励功能\nD.同化功能", "options": {"A": "辐射功能", "B": "凝聚功能", "C": "激励功能", "D": "同化功能"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 885, "question": "机械设备安全包括机械产品安全和机械使用安全应通过直接、间\n接、提示性安全技术措施等途径实现，改变机器设计或优化性能属于\n（\n）。\nA.直接安全技术措施\nB.其他安全防护措施\nC.提示性安全技术措施\nD.间接安全技术措施", "options": {"A": "直接安全技术措施", "B": "其他安全防护措施", "C": "提示性安全技术措施", "D": "间接安全技术措施"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 886, "question": "安全人机工程是应用人机工程学的理论和方法研究“人－机－环\n境”系统，并使二者在安全的基础上达到最优匹配，下列人与机器的\n功能中，机器优于人的是（\n）。\n\n=== 第302页 ===\nA.高度的灵活性\nB.高度的可塑性\nC.同时完成多种操作\nD.突发事件应对能力", "options": {"A": "高度的灵活性", "B": "高度的可塑性", "C": "同时完成多种操作", "D": "突发事件应对能力"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 887, "question": "为了保证起重机械的安全吊起，吊运前必须进行充分的准备工作，\n关于起吊前准备工作的说法，错误的是（\n）。\nA.应对使用的吊具及附件进行安全检查\nB.使用流动式起重机要将地面垫实垫平\nC.尺寸、形状不同的物品不得混合捆绑\nD.应检查起重机的支脚是否牢固可靠", "options": {"A": "应对使用的吊具及附件进行安全检查", "B": "使用流动式起重机要将地面垫实垫平", "C": "尺寸、形状不同的物品不得混合捆绑", "D": "应检查起重机的支脚是否牢固可靠"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 888, "question": "气瓶在贮存过程中经常发生事故，贮存场所必须符合相关的安全\n规范，同时还应加强管理。下列气瓶贮存的安全要求中，错误的是\n（\n）。\nA.贮存过程中应遵循先入库先发出原则，并应设立明显的警示标签\nB.空、实瓶应分开存放，可燃气体的气瓶不得与还原性气瓶同存\nC.气瓶库屋顶应为轻型结构，应有足够的泄压面积，透明玻璃上应涂\n白漆\nD.瓶库内部不得有地沟、暗道，严禁用电热器、煤炉取暖", "options": {"A": "贮存过程中应遵循先入库先发出原则，并应设立明显的警示标签", "B": "空、实瓶应分开存放，可燃气体的气瓶不得与还原性气瓶同存", "C": "气瓶库屋顶应为轻型结构，应有足够的泄压面积，透明玻璃上应涂 白漆", "D": "瓶库内部不得有地沟、暗道，严禁用电热器、煤炉取暖"}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 889, "question": "起重机械的日常运行、维护、检查和管理是起重机械安全运行的\n\n=== 第303页 ===\n重要保障，国家相关部门对起重机械的检验和使用实行监督管理。关\n于起重机械检查的说法，正确的是（\n）。\nA.露天作业的起重机械经受8 级以上的风力后重新使用前应做全面\n检查\nB.起重机械轨道的安全状况和钢丝绳的安全状况都属于每月检查的\n内容\nC.制动器和各类安全装置不仅属于每月检查内容也属于每日检查的\n内容\nD.起重机液压系统及其部件的泄漏情况及工作性能属于每日检查的\n内容", "options": {"A": "露天作业的起重机械经受8 级以上的风力后重新使用前应做全面 检查", "B": "起重机械轨道的安全状况和钢丝绳的安全状况都属于每月检查的 内容", "C": "制动器和各类安全装置不仅属于每月检查内容也属于每日检查的 内容", "D": "起重机液压系统及其部件的泄漏情况及工作性能属于每日检查的 内容"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 890, "question": "安全阀的作用是为了防止设备容器内压力过高而引起爆炸，包括\n防止物理爆炸和化学爆炸，因此，安全阀的安装位置有很多注意事项，\n根据《安全阀安全监察规程》（TSGZF001），下列安全阀的安装位置\n及方式不符合要求的是（\n）。\nA.在设备或者管路上的安全阀水平安装\nB.液体安全阀装在正常液面的下面\nC.蒸汽安全阀装在锅炉的蒸汽集箱的最高位置\nD.蒸汽安全阀装在锅炉的锅筒气相空间", "options": {"A": "在设备或者管路上的安全阀水平安装", "B": "液体安全阀装在正常液面的下面", "C": "蒸汽安全阀装在锅炉的蒸汽集箱的最高位置", "D": "蒸汽安全阀装在锅炉的锅筒气相空间"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 891, "question": "气瓶的吊装运输应严格执行相关规定和要求，避免在吊运过程中\n发生事故。下列气瓶吊运方式中，符合安全要求的是（\n）。\n\n=== 第304页 ===\nA.使用起重设备吊运气瓶\nB.使用金属链绳捆绑吊运气瓶\nC.利用气瓶瓶帽吊运气瓶\nD.使用专用翻斗车搬运气瓶", "options": {"A": "使用起重设备吊运气瓶", "B": "使用金属链绳捆绑吊运气瓶", "C": "利用气瓶瓶帽吊运气瓶", "D": "使用专用翻斗车搬运气瓶"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 892, "question": "司索工主要从事起重作业的地面工作，例如准备吊具、捆绑挂钩、\n摘钩卸载等，多数情况还担任指挥任务。关于司索工安全操作的说法，\n正确的是（\n）。\nA.场地为斜面时，站在斜面下方作业\nB.作业时可以多人同时吊挂同一吊物\nC.摘钩时可利用起重机进行抽索作业\nD.吊运大而重的物体时，不加诱导绳", "options": {"A": "场地为斜面时，站在斜面下方作业", "B": "作业时可以多人同时吊挂同一吊物", "C": "摘钩时可利用起重机进行抽索作业", "D": "吊运大而重的物体时，不加诱导绳"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 893, "question": "起重机安全装置是指防止起重机在意外情况下损坏的装置，起重\n机上除常用的电气保护装置、声音信号外，还有多种其他安全装置。\n其中，不需要装防倾斜装置的起重设备是（\n）。\nA.流动式起重机\nB.塔式起重机\nC.门式起重机\nD.悬臂起重机", "options": {"A": "流动式起重机", "B": "塔式起重机", "C": "门式起重机", "D": "悬臂起重机"}, "answer": "C", "type": "single", "category": "用电安全"}, {"id": 894, "question": "叉车，蓄电瓶车及非公路用旅游观光车是常见的厂内专用机动车\n\n=== 第305页 ===\n辆，近年来，因违反厂内机动车辆安全操作流程发生的事故较多，下\n列叉车及观光车安全操作的要求中，正确的是（\n）。\nA.当物件重量不明物体时，应将其叉起离地面150mm 确认无超载后\n方可作业\nB.不得单叉作业和使用叉车顶货或拉货，严禁两辆叉车同时对一辆货\n车装载货物\nC.观光车靠近高站台行驶时，车身与站台的间隙至少为观光车轮胎的\n宽度\nD.驾驶观光车在坡道上面要掉头时，应注意双向来车，并由专人指挥", "options": {"A": "当物件重量不明物体时，应将其叉起离地面150mm 确认无超载后 方可作业", "B": "不得单叉作业和使用叉车顶货或拉货，严禁两辆叉车同时对一辆货 车装载货物", "C": "观光车靠近高站台行驶时，车身与站台的间隙至少为观光车轮胎的 宽度", "D": "驾驶观光车在坡道上面要掉头时，应注意双向来车，并由专人指挥"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 895, "question": "安全防护措施是指从人的安全需求出发，采用特定的技术手段防\n止或限制各种危险的安全措施，包含的防护装置，保护装置及其他补\n充措施，其中防护装置有固定式，运动式，联锁式，栅栏式等，关于\n防护装置特性的说法正确的是（\n）。\nA.固定式防护装置位置固定，不能打开或拆除\nB.联锁式防护装置的开闭状态与防护对象的危险状态相联锁\nC.活动式防护装置与机器的构架相连接，使用工具才能打开\nD.栅栏式防护装置用于防护传输距离不大的传动装置", "options": {"A": "固定式防护装置位置固定，不能打开或拆除", "B": "联锁式防护装置的开闭状态与防护对象的危险状态相联锁", "C": "活动式防护装置与机器的构架相连接，使用工具才能打开", "D": "栅栏式防护装置用于防护传输距离不大的传动装置"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 896, "question": "气瓶安全液压装置能够在气瓶超压时迅速自动释放气体，降低压\n力，以保护气瓶不会因超压而发生爆炸，但有些气瓶不得或不宜装设\n安全液压装置，根据《气瓶安全技术规程》，下列不同用途的气瓶中，\n\n=== 第306页 ===\n不应装设安全液压装置的是（\n）。\nA.工业用非重复充装焊接气瓶\nB.车用液化石油气钢瓶\nC.盛装剧毒气的气瓶\nD.盛装液氮的低温绝燃气瓶", "options": {"A": "工业用非重复充装焊接气瓶", "B": "车用液化石油气钢瓶", "C": "盛装剧毒气的气瓶", "D": "盛装液氮的低温绝燃气瓶"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 897, "question": "酸碱灭火器是一种内部装有65%的工业硫酸和碳酸氢钠的水溶\n液作灭火剂的灭火器，使用时，两种药液混合发生化学反应，产生二\n氧化碳压力气体，灭火剂在二氧化碳气体压力下喷出进行灭火。下列\n火灾中，适用酸碱灭火器扑救的是（\n）。\nA.天然气火灾\nB.金属钠火灾\nC.配电柜火灾\nD.纺织物火灾", "options": {"A": "天然气火灾", "B": "金属钠火灾", "C": "配电柜火灾", "D": "纺织物火灾"}, "answer": "D", "type": "single", "category": "用电安全"}, {"id": 898, "question": "司索工不仅从事准备吊具，捆绑挂钩及摘钩卸载等工作。多数情\n况还承担指挥工作。其工作质量与整个搬运工作安全关系极大。关于\n司索工安全作业要求的说法，正确的是（\n）。\nA.对吊物进行目测估算时，应按照目测结果的110%选择吊具资格\nB.对形状或尺寸不同的物品，不经特殊捆绑不得进行混吊工作\nC.吊钩与被吊物品中心连接与垂直方向的夹角应小于20°\nD.等所有吊索完全松弛方可摘钩，摘钩后可利用起重机抽索\n\n=== 第307页 ===", "options": {"A": "对吊物进行目测估算时，应按照目测结果的110%选择吊具资格", "B": "对形状或尺寸不同的物品，不经特殊捆绑不得进行混吊工作", "C": "吊钩与被吊物品中心连接与垂直方向的夹角应小于20°", "D": "等所有吊索完全松弛方可摘钩，摘钩后可利用起重机抽索 === 第307页 ==="}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 899, "question": "气瓶的装卸、运输、储存、保管和发送等环节都必须建立安全制\n度，气瓶装运人员都应掌握气体的基础知识以及相应消防器材和防护\n器材的用法。关于气瓶装卸及运输环节安全要求的说法，错误的是\n（\n）。\nA.运输前应检查气瓶是否配有瓶嘴、防震圈\nB.运送过程中严禁肩扛、背驮、怀抱等，需要升高或降低气瓶时应二\n人同时操作\nC.气瓶吊运时，不得用金属链绳捆绑氧气瓶\nD.使用叉车、翻斗车和铲车搬运气瓶时，必须严格执行双人监督、单\n人指挥制度", "options": {"A": "运输前应检查气瓶是否配有瓶嘴、防震圈", "B": "运送过程中严禁肩扛、背驮、怀抱等，需要升高或降低气瓶时应二 人同时操作", "C": "气瓶吊运时，不得用金属链绳捆绑氧气瓶", "D": "使用叉车、翻斗车和铲车搬运气瓶时，必须严格执行双人监督、单 人指挥制度"}, "answer": "D", "type": "single", "category": "消防安全"}, {"id": 900, "question": "起重机械作为涉及生命安全，危险性较大的特种设备之一，其生\n产、检验和使用受到国家有关部门的监管，关于起重机械使用安全管\n理的说法，正确的是（\n）。\nA.露天作业的起重机械经受7 级以上风力后，重新使用前应做安全检\n查\nB.钢丝绳滑轮组有无损伤，是否应报废，属于每日检查的内容\nC.液压系统及其部件的泄漏情况及工作性能，属于每日检查的内容\nD.安全装置、制动器、操纵控制装置属于每日检查的内容", "options": {"A": "露天作业的起重机械经受7 级以上风力后，重新使用前应做安全检 查", "B": "钢丝绳滑轮组有无损伤，是否应报废，属于每日检查的内容", "C": "液压系统及其部件的泄漏情况及工作性能，属于每日检查的内容", "D": "安全装置、制动器、操纵控制装置属于每日检查的内容"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 901, "question": "根据住建《重大事故隐患判定标准（2024 版）》规定，以下（\n）\n\n=== 第308页 ===\n冒险作业情形不属于重大事故隐患。\nA.使用混凝土泵车、打桩设备、汽车起重机、履带起重机等大型机械\n设备，未校核其运行路线及作业位置承载能力\nB.在雷雨、大雪、浓雾或大风等恶劣天气条件下违规进行吊装作业、\n设备安装、拆卸和高处作业\nC.施工现场使用塔式起重机、汽车起重机、履带起重机或轮胎起重机\n等非载人设备吊运人员\nD.进行动火作业时未配备灭火器", "options": {"A": "使用混凝土泵车、打桩设备、汽车起重机、履带起重机等大型机械 设备，未校核其运行路线及作业位置承载能力", "B": "在雷雨、大雪、浓雾或大风等恶劣天气条件下违规进行吊装作业、 设备安装、拆卸和高处作业", "C": "施工现场使用塔式起重机、汽车起重机、履带起重机或轮胎起重机 等非载人设备吊运人员", "D": "进行动火作业时未配备灭火器"}, "answer": "D", "type": "single", "category": "高处作业"}, {"id": 902, "question": "根据《广东省住房和城乡建设厅关于房屋市政工程建设单位落实\n质量安全首要责任的管理规定（试行）》规定，（\n）负责牵头房屋\n市政工程建设各方落实质量安全管理的主体责任。\nA.建设单位\nB.总承包单位\nC.监理单位\nD.分包单位", "options": {"A": "建设单位", "B": "总承包单位", "C": "监理单位", "D": "分包单位"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 903, "question": "根据《广东省住房和城乡建设厅关于房屋市政工程建设单位落实\n质量安全首要责任的管理规定（试行）》规定，建设单位应科学确定\n工程建设工期，不得随意压缩勘察、设计周期和施工工期，确保施工\n工期不少于施工标准工期的（\n）。\nA.0.9\n\n=== 第309页 ===\nB.0.85\nC.0.8\nD.0.75", "options": {"A": "0.9 === 第309页 ===", "B": "0.85", "C": "0.8", "D": "0.75"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 904, "question": "根据《广东省住房和城乡建设厅关于房屋市政工程建设单位落实\n质量安全首要责任的管理规定（试行）》规定，现浇混凝土主体结构\n施工周期不得低于规范标准要求，不宜少于（\n）/层。\nA.8 天\nB.7 天\nC.6 天\nD.5 天", "options": {"A": "8 天", "B": "7 天", "C": "6 天", "D": "5 天"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 905, "question": "安全管理目标应分解到各管理层及相关职能部门和岗位，并定期\n进行（\n）。\nA.宣贯\nB.培训\nC.考核\nD.交底", "options": {"A": "宣贯", "B": "培训", "C": "考核", "D": "交底"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 906, "question": "建筑施工企业的各项安全管理制度不包括（\n）。\nA.工作内容\nB.职责与权限\n\n=== 第310页 ===\nC.基本工作程序及标准\nD.工作目标", "options": {"A": "工作内容", "B": "职责与权限 === 第310页 ===", "C": "基本工作程序及标准", "D": "工作目标"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 907, "question": "下列不属于《建筑施工安全检查标准》JGJ 59-2011 文明施工一\n般项目中公示标牌的内容是（\n）。\nA.施工现场出入口应有企业名称或企业标志\nB.标牌应规范、整齐、统一\nC.施工现场应有安全标语\nD.应有宣传栏、读报栏、黑板报", "options": {"A": "施工现场出入口应有企业名称或企业标志", "B": "标牌应规范、整齐、统一", "C": "施工现场应有安全标语", "D": "应有宣传栏、读报栏、黑板报"}, "answer": "A", "type": "single", "category": "文明施工"}, {"id": 908, "question": "按《建设工程施工现场环境与卫生标准》（JGJ146－2013）建设\n工程（\n）应对施工现场的环境与卫生负总责。\nA.监理单位\nB.施工分包单位\nC.施工总承包单位\nD.建设单位", "options": {"A": "监理单位", "B": "施工分包单位", "C": "施工总承包单位", "D": "建设单位"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 909, "question": "按《建设工程施工现场环境与卫生标准》\n（JGJ146－2013）\n（4.2.10）\n施工现场的机械设备、车辆的尾气排放应符合国家环保（\n）。\nA.节能标准\nB.排放标准\nC.噪声标准\n\n=== 第311页 ===\nD.安全标准", "options": {"A": "节能标准", "B": "排放标准", "C": "噪声标准 === 第311页 ===", "D": "安全标准"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 910, "question": "依照建筑法规定被吊销资质证书的，由（\n）吊销其营业执照。\nA.工商行政管理部门\nB.建设行政主管部门\nC.中国建筑业协会\nD.各地人民政府", "options": {"A": "工商行政管理部门", "B": "建设行政主管部门", "C": "中国建筑业协会", "D": "各地人民政府"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 911, "question": "作业人员有权对影响人身健康的作业程序和作业条件提出改进\n意见，有权获得安全生产所需的（\n）。\nA.资金\nB.信息\nC.防护用品\nD.文件", "options": {"A": "资金", "B": "信息", "C": "防护用品", "D": "文件"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 912, "question": "作业人员有权对影响人身健康的作业程序和作业条件提出改进\n意见，（\n）获得安全生产所需的防护用品。\nA.有权\nB.可以\nC.不可以\nD.无权", "options": {"A": "有权", "B": "可以", "C": "不可以", "D": "无权"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 913, "question": "作业人员应当遵守安全施工的（\n）、规章制度和操作规程，正\n确使用安全防护用具、机械设备等。\nA.行业标准\nB.国家标准\nC.强制性标准\nD.技术标准", "options": {"A": "行业标准", "B": "国家标准", "C": "强制性标准", "D": "技术标准"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 914, "question": "作业人员进入新的岗位或者新的施工现场前，应当接受安全生产\n教育培训。（\n）的人员，不得上岗作业。\nA.未颁发教育培训证书\nB.已经教育培训\nC.从前岗位发生过责任事故\nD.未经教育培训或教育培训考核不合格", "options": {"A": "未颁发教育培训证书", "B": "已经教育培训", "C": "从前岗位发生过责任事故", "D": "未经教育培训或教育培训考核不合格"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 915, "question": "作业人员对危及生命安全和人身健康的行为有权提出（\n）、\n（\n）和（\n）。\nA.抗议；检举；控诉\nB.批评；检举；控告\nC.意见；批评；检举\nD.意见；检举；控告", "options": {"A": "抗议；检举；控诉", "B": "批评；检举；控告", "C": "意见；批评；检举", "D": "意见；检举；控告"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 916, "question": "作业人员（\n）对施工现场的作业条件、作业程序和作业方式\n\n=== 第313页 ===\n中存在的安全问题提出批评、检举和控告，有权拒绝违章指挥和强令\n冒险作业。\nA.可以\nB.不可以\nC.不得\nD.有权", "options": {"A": "可以", "B": "不可以", "C": "不得", "D": "有权"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 917, "question": "专职安全生产管理人员未按规定履行安全生产管理职责的，由县\n级以上地方人民政府住房城乡建设主管部门责令限期改正，并处\n（\n）的罚款。\nA.500 元以上1000 元以下\nB.1000 元以上3000 元以下\nC.1000 元以上5000 元以下\nD.3000 元以上8000 元以下", "options": {"A": "500 元以上1000 元以下", "B": "1000 元以上3000 元以下", "C": "1000 元以上5000 元以下", "D": "3000 元以上8000 元以下"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 918, "question": "专项施工方案应当由（\n）技术负责人审核签字、加盖单位公\n章，并由总监理工程师审查签字、加盖执业印章后方可实施。\nA.建设单位\nB.施工单位\nC.分包单位\nD.监理单位", "options": {"A": "建设单位", "B": "施工单位", "C": "分包单位", "D": "监理单位"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 919, "question": "主要负责人应当与项目负责人签订（\n），确定项目安全生产考\n核目标、奖惩措施，以及企业为项目提供的安全管理和技术保障措施。\nA.责任状\nB.安全生产责任书\nC.安全生产协议\nD.安全管理责任书", "options": {"A": "责任状", "B": "安全生产责任书", "C": "安全生产协议", "D": "安全管理责任书"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 920, "question": "主要负责人、项目负责人未按规定履行安全生产管理职责的，由\n（\n）以上人民政府住房城乡建设主管部门责令限期改正。\nA.乡镇级\nB.县级\nC.市级\nD.省级", "options": {"A": "乡镇级", "B": "县级", "C": "市级", "D": "省级"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 921, "question": "在工程发包与承包中索贿、受贿、行贿，构成犯罪的，依法追究\n刑事责任；不构成犯罪的，分别处以罚款，没收贿赂的财物，对（\n）\n的主管人员和其他人员给予处分。\nA.直接负责\nB.间接负责\nC.幕后主使\nD.旁观", "options": {"A": "直接负责", "B": "间接负责", "C": "幕后主使", "D": "旁观"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 922, "question": "根据《建设工程安全生产管理条例》，施工起重机械和整体提升\n脚手架、模板等自升式架设设施安装完毕后，安装单位应当（\n），\n并向施工单位进行安全使用说明。\nA.他检、出具他检合格证明\nB.自检、出具检验合格证明\nC.自检、出具自检合格证明\nD.他检、出具检验合格证明", "options": {"A": "他检、出具他检合格证明", "B": "自检、出具检验合格证明", "C": "自检、出具自检合格证明", "D": "他检、出具检验合格证明"}, "answer": "C", "type": "single", "category": "脚手架与模板工程"}, {"id": 923, "question": "根据《建设工程安全生产管理条例》，施工单位应当制定本单位\n生产安全事故应急预案，建立应急救援组织或者配备应急救援人员，\n配备必要的应急救援器材、设备，并定期（\n）。\nA.组织人员培训\nB.进行重要设施检查\nC.采购应急物资\nD.组织演练", "options": {"A": "组织人员培训", "B": "进行重要设施检查", "C": "采购应急物资", "D": "组织演练"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 924, "question": "根据《建设工程安全生产管理条例》，施工单位应当为下列人员\n办理意外伤害保险的是（\n）。\nA.施工现场从事危险作业的人员\nB.本单位职工\nC.施工现场管理人员\nD.施工现场临时作业人员\n\n=== 第316页 ===", "options": {"A": "施工现场从事危险作业的人员", "B": "本单位职工", "C": "施工现场管理人员", "D": "施工现场临时作业人员 === 第316页 ==="}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 925, "question": "根据《建设工程安全生产管理条例》，施工单位应当将施工现场\n的办公、生活区与作业区（\n）。\nA.保持适当距离\nB.随意设置，并保持安全距离\nC.保持安全距离\nD.分开设置，并保持安全距离", "options": {"A": "保持适当距离", "B": "随意设置，并保持安全距离", "C": "保持安全距离", "D": "分开设置，并保持安全距离"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 926, "question": "根据《建设工程安全生产管理条例》，施工单位应当对管理人员\n和作业人员（\n）安全生产教育培训，其教育培训情况记入个人工\n作档案。\nA.每季至少进行一次\nB.每月至少进行一次\nC.每年至少进行一次\nD.每年至少进行二次", "options": {"A": "每季至少进行一次", "B": "每月至少进行一次", "C": "每年至少进行一次", "D": "每年至少进行二次"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 927, "question": "根据《建设工程安全生产管理条例》，安全生产教育培训考核不\n合格的作业人员，（\n）。\nA.不得上岗作业\nB.应在考核合格人员的带领下工作\nC.可发放临时操作证，不得超过三个月\nD.只能在合格人员的监督下工作\n\n=== 第317页 ===", "options": {"A": "不得上岗作业", "B": "应在考核合格人员的带领下工作", "C": "可发放临时操作证，不得超过三个月", "D": "只能在合格人员的监督下工作 === 第317页 ==="}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 928, "question": "根据《防暑降温措施管理办法》的规定，日最高气温达到40℃以\n上，应当停止当日（\n）作业。\nA.室外露天\nB.室内高温环境\nC.室外\nD.室内", "options": {"A": "室外露天", "B": "室内高温环境", "C": "室外", "D": "室内"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 929, "question": "高温天气是指地市级以上气象主管部门所属气象台站向公众发\n布的日最高气温（\n）℃以上的天气。\nA.30\nB.33\nC.35\nD.37", "options": {"A": "30", "B": "33", "C": "35", "D": "37"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 930, "question": "分包单位应当服从总承包单位的安全生产管理，分包单位不服从\n管理导致生产安全事故的，由分包单位承担（\n）。\nA.全部责任\nB.合同中约定的责任\nC.一般责任\nD.主要责任", "options": {"A": "全部责任", "B": "合同中约定的责任", "C": "一般责任", "D": "主要责任"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 931, "question": "分包单位使用承租的机械设备和施工机具及配件的，进行验收时，\n可不参加的是（\n）。\nA.总承包单位\nB.分包单位\nC.业主单位\nD.出租单位", "options": {"A": "总承包单位", "B": "分包单位", "C": "业主单位", "D": "出租单位"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 932, "question": "房屋市政工程生产安全事故的报告，应当（\n）、（\n）、（\n），\n任何单位和个人对事故不得迟报、漏报、谎报或者瞒报。\nA.及时；准确；完整\nB.快速；准确；全面\nC.及时；精准；完整\nD.快速；准确；完整", "options": {"A": "及时；准确；完整", "B": "快速；准确；全面", "C": "及时；精准；完整", "D": "快速；准确；完整"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 933, "question": "房屋拆除应当由具备保证安全条件的建筑施工单位承担，由建筑\n（\n）对安全负责。\nA.项目经理\nB.项目负责人\nC.安全负责人\nD.施工单位负责人", "options": {"A": "项目经理", "B": "项目负责人", "C": "安全负责人", "D": "施工单位负责人"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 934, "question": "房屋拆除应当由（\n）的建筑施工单位承担，由建筑施工单位\n\n=== 第319页 ===\n负责人对安全负责。\nA.具备技术保证条件\nB.有特种工程资质\nC.有设计资质\nD.具备保证安全条件", "options": {"A": "具备技术保证条件", "B": "有特种工程资质", "C": "有设计资质", "D": "具备保证安全条件"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 935, "question": "发包单位应当按照（\n）的约定，及时拨付工程款项。\nA.经济效益\nB.政策\nC.合同\nD.销售情况", "options": {"A": "经济效益", "B": "政策", "C": "合同", "D": "销售情况"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 936, "question": "发包单位将工程发包给（\n）的承包单位的，或者违反本法规\n定将建筑工程肢解发包的，责令改正，处以罚款。\nA.不具有相应信誉条件\nB.不具有相应技术条件\nC.不具有相应资金条件\nD.不具有相应资质条件", "options": {"A": "不具有相应信誉条件", "B": "不具有相应技术条件", "C": "不具有相应资金条件", "D": "不具有相应资质条件"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 937, "question": "对于超过一定规模的危大工程，（\n）应当组织召开专家论证会\n对专项施工方案进行论证。\nA.建设单位\n\n=== 第320页 ===\nB.施工单位\nC.监理单位\nD.分包单位", "options": {"A": "建设单位 === 第320页 ===", "B": "施工单位", "C": "监理单位", "D": "分包单位"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 938, "question": "对于按照规定需要验收的危大工程，（\n）应当组织相关人员进\n行验收。\nA.施工单位、设计单位\nB.建设单位、监理单位\nC.建设单位、施工单位\nD.施工单位、监理单位", "options": {"A": "施工单位、设计单位", "B": "建设单位、监理单位", "C": "建设单位、施工单位", "D": "施工单位、监理单位"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 939, "question": "对于按照规定需要进行第三方监测的危大工程，（\n）应当委托\n具有相应勘察资质的单位进行监测。\nA.施工单位\nB.监理单位\nC.建设单位\nD.设计单位", "options": {"A": "施工单位", "B": "监理单位", "C": "建设单位", "D": "设计单位"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 940, "question": "对怀孕七个月以上的女职工，不得安排其延长工作时间和（\n）\n劳动。\nA.早班\nB.夜班\n\n=== 第321页 ===\nC.站立作业\nD.户外作业", "options": {"A": "早班", "B": "夜班 === 第321页 ===", "C": "站立作业", "D": "户外作业"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 941, "question": "单位负责人接到事故报告后，应当迅速采取有效措施，组织抢救，\n防止事故扩大，减少人员伤亡和财产损失，并按照国家有关规定（\n）\n当地负有安全生产监督管理职责的部门，不得隐瞒不报、谎报或者迟\n报，不得故意破坏事故现场、毁灭有关证据。\nA.立即如实报告\nB.处理完成后报告\nC.调查完成后\nD.到达现场后报告", "options": {"A": "立即如实报告", "B": "处理完成后报告", "C": "调查完成后", "D": "到达现场后报告"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 942, "question": "从业人员在作业过程中，应当严格遵守本单位的安全生产规章制\n度和操作规程，服从管理，正确佩戴和使用劳动防护用品。属于从业\n人员的（\n）。\nA.权利\nB.自由\nC.职责\nD.义务", "options": {"A": "权利", "B": "自由", "C": "职责", "D": "义务"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 943, "question": "从业人员有权对本单位安全生产工作中存在的问题提出批评、检\n举、控告；有权拒绝（\n）。\n\n=== 第322页 ===\nA.违章指挥\nB.夜间作业\nC.露天作业\nD.危险作业", "options": {"A": "违章指挥", "B": "夜间作业", "C": "露天作业", "D": "危险作业"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 944, "question": "从事建筑活动应当遵守法律、法规，不得损害社会公共利益和他\n人的（\n）。任何单位和个人都不得妨碍和阻挠依法进行的建筑活动。\nA.合法要求\nB.合法诉求\nC.合法权益\nD.经济利益", "options": {"A": "合法要求", "B": "合法诉求", "C": "合法权益", "D": "经济利益"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 945, "question": "垂直运输机械作业人员、安装拆卸工、爆破作业人员、起重信号\n工、登高架设作业人员等特种作业人员。必须按照国家有关规定经过\n（\n）培训，并取得特种作业操作资格证书后，方可上岗作业。\nA.安全系统知识\nB.该工程特定需要的\nC.该工程实际操作\nD.专门的安全作业", "options": {"A": "安全系统知识", "B": "该工程特定需要的", "C": "该工程实际操作", "D": "专门的安全作业"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 946, "question": "储备可燃的重要物资的大型仓库、基地应当（\n），承担本单位\n的火灾扑救工作。\n\n=== 第323页 ===\nA.安全专职消防人员\nB.建立兼职消防队\nC.与专业消防队伍签订协议\nD.建立专职消防队", "options": {"A": "安全专职消防人员", "B": "建立兼职消防队", "C": "与专业消防队伍签订协议", "D": "建立专职消防队"}, "answer": "D", "type": "single", "category": "消防安全"}, {"id": 947, "question": "除总承包合同中约定的分包外，必须经建设单位认可。施工总承\n包的，（\n）的施工必须由总承包单位自行完成。\nA.临时设施\nB.钢结构\nC.建筑工程主体结构\nD.玻璃幕墙", "options": {"A": "临时设施", "B": "钢结构", "C": "建筑工程主体结构", "D": "玻璃幕墙"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 948, "question": "超过一定规模的危大工程施工期间，施工单位项目负责人每月带\n班检查不少于（\n）次，专职安全员每天开展巡查。\nA.5\nB.4\nC.6\nD.8", "options": {"A": "5", "B": "4", "C": "6", "D": "8"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 949, "question": "产生含挥发性有机物废气的生产和服务活动，应当在（\n）或\n者设备中进行，并按照规定安装、使用污染防治设施。\nA.密闭空间\n\n=== 第324页 ===\nB.室内\nC.户外\nD.露天", "options": {"A": "密闭空间 === 第324页 ===", "B": "室内", "C": "户外", "D": "露天"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 950, "question": "采用新结构、新材料、新工艺的建设工程和特殊结构的建设工程，\n设计单位应当在设计中提出保障施工作业人员安全和预防生产安全\n事故的（\n）。\nA.措施建议\nB.指导性意见\nC.具体方案\nD.具体规划", "options": {"A": "措施建议", "B": "指导性意见", "C": "具体方案", "D": "具体规划"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 951, "question": "安全生产考核合格证书有效期届满需要延续的，“安管人员”应\n当在有效期届满前3 个月内，由（\n）通过受聘企业向原考核机关\n申请证书延续。\nA.同事\nB.本人\nC.考核机构人员\nD.企业负责人", "options": {"A": "同事", "B": "本人", "C": "考核机构人员", "D": "企业负责人"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 952, "question": "安全生产费用在（\n）中据实列支。\nA.造价\n\n=== 第325页 ===\nB.成本\nC.投资\nD.收入", "options": {"A": "造价 === 第325页 ===", "B": "成本", "C": "投资", "D": "收入"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 953, "question": "（\n）应当针对本单位可能发生的生产安全事故的特点和危害，\n进行风险辨识和评估，制定相应的生产安全事故应急救援预案。\nA.经营单位\nB.生产经营单位\nC.施工企业\nD.建筑企业", "options": {"A": "经营单位", "B": "生产经营单位", "C": "施工企业", "D": "建筑企业"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 954, "question": "（\n）应当在施工现场建立消防安全责任制度，确定消防安全\n责任人，制定用火、用电、使用易燃易爆材料等各项消防安全管理制\n度和操作规程，设置消防通道、消防水源，配备消防设施和灭火器材，\n并在施工现场入口处设置明显标志。\nA.建设单位\nB.监理单位\nC.设计单位\nD.施工单位", "options": {"A": "建设单位", "B": "监理单位", "C": "设计单位", "D": "施工单位"}, "answer": "D", "type": "single", "category": "用电安全"}, {"id": 955, "question": "（\n）应当向作业人员提供安全防护用具和安全防护服装，并\n书面告知危险岗位的操作规程和违章操作的危害。\n\n=== 第326页 ===\nA.建设单位\nB.施工单位\nC.分包单位\nD.监理单位", "options": {"A": "建设单位", "B": "施工单位", "C": "分包单位", "D": "监理单位"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 956, "question": "（\n）应当建立健全安全生产责任制度和安全生产教育培训制\n度，制定安全生产规章制度和操作规程，保证本单位安全生产条件所\n需资金的投入，对所承担的建设工程进行定期和专项安全检查，并做\n好安全检查记录。\nA.建设单位\nB.监理单位\nC.施工单位\nD.总承包单位", "options": {"A": "建设单位", "B": "监理单位", "C": "施工单位", "D": "总承包单位"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 957, "question": "（\n）应当加强生产安全事故应急工作，建立、健全生产安全\n事故应急工作责任制。\nA.生产经营单位\nB.施工企业\nC.建筑企业\nD.建筑施工行业", "options": {"A": "生产经营单位", "B": "施工企业", "C": "建筑企业", "D": "建筑施工行业"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 958, "question": "（\n）应当对在用的建筑起重机械及其安全保护装置、吊具、\n\n=== 第327页 ===\n索具等进行经常性和定期的检查、维护和保养，并做好记录。\nA.使用单位\nB.租赁单位\nC.出租单位\nD.安装单位", "options": {"A": "使用单位", "B": "租赁单位", "C": "出租单位", "D": "安装单位"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 959, "question": "专职安全生产管理人员负责对安全生产进行现场监督检查。发现\n安全事故隐患，应当及时向（\n）和安全生产管理机构报告；对违\n章指挥、违章操作的，应当立即制止。\nA.安全负责人\nB.施工负责人\nC.项目负责人\nD.项目经理", "options": {"A": "安全负责人", "B": "施工负责人", "C": "项目负责人", "D": "项目经理"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 960, "question": "专家论证会后，应当形成（\n），对专项施工方案提出通过、修\n改后通过或者不通过的一致意见。专家对论证报告负责并签字确认。\nA.咨询意见\nB.论证报告\nC.口头意见\nD.书面结论", "options": {"A": "咨询意见", "B": "论证报告", "C": "口头意见", "D": "书面结论"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 961, "question": "主要负责人应当按规定检查企业所承担的工程项目，考核（\n）\n\n=== 第328页 ===\n安全生产管理能力。\nA.项目经理\nB.项目负责人\nC.施工负责人\nD.安全负责人", "options": {"A": "项目经理", "B": "项目负责人", "C": "施工负责人", "D": "安全负责人"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 962, "question": "职工发生事故伤害或者按照职业病防治法规定被诊断、鉴定为职\n业病，所在单位应当自事故伤害发生之日或者被诊断、鉴定为职业病\n之日起30 日内，向统筹地区（\n）提出工伤认定申请。\nA.建设行政主管部门\nB.公安机关\nC.社会保险行政部门\nD.劳动监察部门", "options": {"A": "建设行政主管部门", "B": "公安机关", "C": "社会保险行政部门", "D": "劳动监察部门"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 963, "question": "在勘察作业时，（\n）应当严格执行操作规程，采取措施保证各\n类管线、设施和周边建筑物、构筑物的安全。\nA.建设单位\nB.工程监理单位\nC.施工单位\nD.勘察单位", "options": {"A": "建设单位", "B": "工程监理单位", "C": "施工单位", "D": "勘察单位"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 964, "question": "在建筑物的合理使用寿命内，因建筑工程质量不合格受到损害的，\n\n=== 第329页 ===\n有权向（\n）要求赔偿。\nA.责任者\nB.总承包单位\nC.分包单位\nD.监理单位", "options": {"A": "责任者", "B": "总承包单位", "C": "分包单位", "D": "监理单位"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 965, "question": "用人单位必须为劳动者提供符合国家规定的劳动安全卫生条件\n和必要的劳动防护用品，对从事有职业危害作业的劳动者应当定期进\n行（\n）。\nA.治疗\nB.换岗\nC.体检检查\nD.职业健康检查", "options": {"A": "治疗", "B": "换岗", "C": "体检检查", "D": "职业健康检查"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 966, "question": "依法发包给两个及两个以上施工单位的工程，不同施工单位在同\n一施工现场使用多台塔式起重机作业时，（\n）应当协调组织制定防\n止塔式起重机相互碰撞的安全措施。\nA.施工单位\nB.监理单位\nC.建设单位\nD.出租单位", "options": {"A": "施工单位", "B": "监理单位", "C": "建设单位", "D": "出租单位"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 967, "question": "需要临时占用规划批准范围以外场地的，（\n）应当按照国家有\n关规定办理申请批准手续。\nA.建设单位\nB.监理单位\nC.建筑施工企业\nD.设计单位", "options": {"A": "建设单位", "B": "监理单位", "C": "建筑施工企业", "D": "设计单位"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 968, "question": "行政机关及其工作人员对实施行政处罚过程中知悉的国家秘密、\n商业秘密或者个人隐私，应当依法予以（\n）。\nA.销毁\nB.删除\nC.保存\nD.保密", "options": {"A": "销毁", "B": "删除", "C": "保存", "D": "保密"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 969, "question": "小型企业或者微型企业等规模较小的生产经营单位，可以不建立\n应急救援队伍，但应当（\n）。\nA.指定兼职的应急救援人员\nB.安排专职的应急救援人员\nC.编制应急救援预案\nD.建立应急救援体系", "options": {"A": "指定兼职的应急救援人员", "B": "安排专职的应急救援人员", "C": "编制应急救援预案", "D": "建立应急救援体系"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 970, "question": "项目（\n）应当每天在施工现场开展安全检查，现场监督危险\n\n=== 第331页 ===\n性较大的分部分项工程安全专项施工方案实施。\nA.安全负责人\nB.栋号长\nC.施工员\nD.专职安全生产管理人员", "options": {"A": "安全负责人", "B": "栋号长", "C": "施工员", "D": "专职安全生产管理人员"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 971, "question": "危大工程验收合格后，（\n）应当在施工现场明显位置设置验收\n标识牌，公示验收时间及责任人员。\nA.建设单位\nB.监理单位\nC.施工单位\nD.分包单位", "options": {"A": "建设单位", "B": "监理单位", "C": "施工单位", "D": "分包单位"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 972, "question": "事故调查组成员在事故调查工作中应当（\n），遵守事故调查组\n的纪律，保守事故调查的秘密。\nA.公平公正、实事求是\nB.诚信公正、恪尽职守\nC.实事求是、尊重科学\nD.恪尽职守、公平公正", "options": {"A": "公平公正、实事求是", "B": "诚信公正、恪尽职守", "C": "实事求是、尊重科学", "D": "恪尽职守、公平公正"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 973, "question": "施工中发生事故时，（\n）应当采取紧急措施减少人员伤亡和事\n故损失，并按照国家有关规定及时向有关部门报告。\n\n=== 第332页 ===\nA.建设单位\nB.监理单位\nC.建筑施工企业\nD.物业公司", "options": {"A": "建设单位", "B": "监理单位", "C": "建筑施工企业", "D": "物业公司"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 974, "question": "施工起重机械和整体提升脚手架、模板等自升式架设设施的使用\n达到国家规定的检验检测期限的，必须经（\n）的检验检测机构检\n测。经检测不合格的，不得继续使用。\nA.国家权威认证\nB.拥有专业检测工程师\nC.具有专业资质\nD.注册监理工程师指定", "options": {"A": "国家权威认证", "B": "拥有专业检测工程师", "C": "具有专业资质", "D": "注册监理工程师指定"}, "answer": "C", "type": "single", "category": "脚手架与模板工程"}, {"id": 975, "question": "施工单位主要负责人和（\n）有《建设工程安全生产管理条例》\n规定的违法行为，尚不够刑事处罚的，处2 万元以上20 万元以下的\n罚款或者按照管理权限给予撤职处分。\nA.兼职安全生产管理人员\nB.专职安全生产管理人员\nC.项目负责人\nD.总负责人", "options": {"A": "兼职安全生产管理人员", "B": "专职安全生产管理人员", "C": "项目负责人", "D": "总负责人"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 976, "question": "施工单位在采用新技术、新工艺、新设备、新材料时，应当对作\n\n=== 第333页 ===\n业人员进行相应的（\n）。\nA.专业培训\nB.操作规程培训\nC.安全生产教育培训\nD.技能培训", "options": {"A": "专业培训", "B": "操作规程培训", "C": "安全生产教育培训", "D": "技能培训"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 977, "question": "施工单位应当自使用施工起重机械和整体提升脚手架、模板等自\n升式架设设施验收合格后，向建设行政主管部门或者其他有关部门登\n记后，取得的标志应当（\n）。\nA.保存在档案室内\nB.置于或者附着于该设备的显著位置\nC.由操作人员保管\nD.由项目机管员保管", "options": {"A": "保存在档案室内", "B": "置于或者附着于该设备的显著位置", "C": "由操作人员保管", "D": "由项目机管员保管"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 978, "question": "施工单位应当自施工起重机械和整体提升脚手架、模板等自升式\n架设设施验收合格之日起（\n）日内，向建设行政主管部门或者其\n他有关部门登记。登记标志应当置于或者附着于该设备的显著位置。\nA.7\nB.15\nC.30\nD.45", "options": {"A": "7", "B": "15", "C": "30", "D": "45"}, "answer": "C", "type": "single", "category": "脚手架与模板工程"}, {"id": 979, "question": "施工单位应当在危险性较大的分部分项工程在施工前编制专项\n方案，下列选项中属于施工安全保证措施是（\n）。\nA.工艺流程\nB.应急预案\nC.材料与设备计划\nD.施工进度计划", "options": {"A": "工艺流程", "B": "应急预案", "C": "材料与设备计划", "D": "施工进度计划"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 980, "question": "施工单位应当向作业人员提供安全防护用具和安全防护服装，并\n（\n）告知危险岗位的（\n）和违章操作的危害。\nA.书面；风险源\nB.口头；风险源\nC.书面；操作规程\nD.口头；操作规程", "options": {"A": "书面；风险源", "B": "口头；风险源", "C": "书面；操作规程", "D": "口头；操作规程"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 981, "question": "施工单位应当设立安全生产管理机构，配备（\n）安全生产管\n理人员。\nA.专职\nB.兼职\nC.业余\nD.代理", "options": {"A": "专职", "B": "兼职", "C": "业余", "D": "代理"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 982, "question": "施工单位应当将施工现场的办公、生活区与作业区分开设置，并\n\n=== 第335页 ===\n保持安全距离，办公、生活区的选址应当符合（\n）。\nA.安全性要求\nB.强制性标准\nC.建设单位要求\nD.安全标准", "options": {"A": "安全性要求", "B": "强制性标准", "C": "建设单位要求", "D": "安全标准"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 983, "question": "施工单位应当根据建设工程施工的特点、范围，对施工现场易发\n生重大事故的部位、环节进行监控，制定施工现场（\n）。\nA.应急救援措施\nB.生产安全事故应急救援预案\nC.应急救援程序\nD.安全管理", "options": {"A": "应急救援措施", "B": "生产安全事故应急救援预案", "C": "应急救援程序", "D": "安全管理"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 984, "question": "施工单位应当根据不同施工阶段和周围环境及季节、气候的变化、\n在施工现场采取相应的安全施工措施。施工现场暂时停止施工的，施\n工单位应当做好现场保护，所需费用（\n）。\nA.由建设单位承担\nB.由施工单位承担\nC.双方共同承担\nD.由责任方承担或者按照合同约定执行", "options": {"A": "由建设单位承担", "B": "由施工单位承担", "C": "双方共同承担", "D": "由责任方承担或者按照合同约定执行"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 985, "question": "施工单位应当对危大工程施工作业人员进行登记，（\n）应当在\n\n=== 第336页 ===\n施工现场履职。\nA.项目经理\nB.项目负责人\nC.施工负责人\nD.安全负责人", "options": {"A": "项目经理", "B": "项目负责人", "C": "施工负责人", "D": "安全负责人"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 986, "question": "施工单位应当对管理人员和作业人员每年至少进行（\n）安全\n生产教育培训，其教育培训情况记入个人工作档案。\nA.1 次\nB.2 次\nC.3 次\nD.4 次", "options": {"A": "1 次", "B": "2 次", "C": "3 次", "D": "4 次"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 987, "question": "施工单位应当对管理人员和作业人员（\n）至少进行一次安全\n生产教育培训，其教育培训情况记入个人工作档案。\nA.每月\nB.每季度\nC.每半年\nD.每年", "options": {"A": "每月", "B": "每季度", "C": "每半年", "D": "每年"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 988, "question": "施工单位对因建设工程施工可能造成损害的毗邻建筑物、构筑物\n和地下管线等，应当（\n）。\n\n=== 第337页 ===\nA.采取专项保护措施\nB.采取安全加固措施\nC.编制安全技术措施\nD.编制专项施工方案", "options": {"A": "采取专项保护措施", "B": "采取安全加固措施", "C": "编制安全技术措施", "D": "编制专项施工方案"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 989, "question": "施工单位对列入建设工程概算的安全作业环境及安全施工措施\n所需费用，应当用于施工安全防护用具及设施的采购和更新、安全施\n工措施的落实、安全生产条件的改善，（\n）。\nA.如有结余可作为其他施工费用\nB.购买意外伤害险\nC.发放专职安全管理人员的岗位津贴\nD.不得挪作他用", "options": {"A": "如有结余可作为其他施工费用", "B": "购买意外伤害险", "C": "发放专职安全管理人员的岗位津贴", "D": "不得挪作他用"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 990, "question": "生产经营单位应当针对本单位可能发生的生产安全事故的特点\n和危害，进行风险辨识和评估，制定相应的生产安全事故应急救援预\n案，并向（\n）公布。\nA.本单位从业人员\nB.社会\nC.行业主管部门\nD.县级以上安全生产监督管理部门", "options": {"A": "本单位从业人员", "B": "社会", "C": "行业主管部门", "D": "县级以上安全生产监督管理部门"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 991, "question": "生产经营单位应当具备的（\n）所必需的资金投入，由生产经\n\n=== 第338页 ===\n营单位的决策机构、主要负责人或者个人经营的投资人予以保证，并\n对由于安全生产所必需的资金投入不足导致的后果承担责任。\nA.安全生产条件\nB.安全生产物资\nC.安全生产设备\nD.安全生产人员", "options": {"A": "安全生产条件", "B": "安全生产物资", "C": "安全生产设备", "D": "安全生产人员"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 992, "question": "生产经营单位应当教育和督促从业人员严格执行本单位的安全\n生产规章制度和安全操作规程；并向从业人员如实告知作业场所和工\n作岗位存在的危险因素、防范措施以及（\n）。\nA.劳动纪律\nB.事故应急措施\nC.事故处置程序\nD.事故责任", "options": {"A": "劳动纪律", "B": "事故应急措施", "C": "事故处置程序", "D": "事故责任"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 993, "question": "生产经营单位应当建立相应的机制，加强对全员（\n）落实情\n况的监督考核，保证全员安全生产责任制的落实。\nA.安全生产责任制\nB.安全绩效制度\nC.安全先进评比制度\nD.安全奖罚制度", "options": {"A": "安全生产责任制", "B": "安全绩效制度", "C": "安全先进评比制度", "D": "安全奖罚制度"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 994, "question": "生产经营单位应当建立健全生产安全事故隐患排查治理制度，采\n取技术、管理措施，及时发现并消除事故隐患。事故隐患排查治理情\n况（\n），并向从业人员通报。\nA.应当如实记录\nB.应定期公布\nC.应记入企业档案\nD.上报监管部门", "options": {"A": "应当如实记录", "B": "应定期公布", "C": "应记入企业档案", "D": "上报监管部门"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 995, "question": "生产经营单位应当加强生产安全事故应急工作，建立、健全生产\n安全事故应急工作责任制，其（\n）对本单位的生产安全事故应急\n工作全面负责。\nA.企业安全总监\nB.主要负责人\nC.分管生产副总\nD.工会主席", "options": {"A": "企业安全总监", "B": "主要负责人", "C": "分管生产副总", "D": "工会主席"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 996, "question": "生产经营单位应当根据本行业、领域的特点，建立健全并落实全\n员安全生产责任制，加强从业人员（\n）教育和培训。\nA.专业知识\nB.生产纪律\nC.社会知识\nD.安全生产\n\n=== 第340页 ===", "options": {"A": "专业知识", "B": "生产纪律", "C": "社会知识", "D": "安全生产 === 第340页 ==="}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 997, "question": "生产经营单位应当（\n）生产安全事故隐患排查治理制度，采\n取技术、管理措施，及时发现并消除事故隐患。事故隐患排查治理情\n况应当如实记录，并向从业人员通报。\nA.建立健全\nB.推进执行\nC.建立执行\nD.落实", "options": {"A": "建立健全", "B": "推进执行", "C": "建立执行", "D": "落实"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 998, "question": "生产经营单位新建、改建、扩建工程项目的安全设施，下列哪项\n不是三同时的要求？（\n）\nA.同时设计\nB.同时施工\nC.同时竣工\nD.同时投入生产和使用", "options": {"A": "同时设计", "B": "同时施工", "C": "同时竣工", "D": "同时投入生产和使用"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 999, "question": "生产经营单位新建、改建、扩建工程项目的（\n），必须与主体\n工程同时设计、同时施工、同时投入生产和使用。\nA.环保设施\nB.安全设施\nC.生活设施\nD.安全评价\n\n=== 第341页 ===", "options": {"A": "环保设施", "B": "安全设施", "C": "生活设施", "D": "安全评价 === 第341页 ==="}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1000, "question": "生产经营单位进行爆破、吊装以及国务院安全生产监督管理部\n门会同国务院有关部门规定的其他危险作业，应当安排专门人员进行\n现场安全管理，确保（\n）和安全措施的落实。\nA.杜绝违章指挥\nB.杜绝违章操作\nC.操作规程的遵守\nD.杜绝违反劳动纪律", "options": {"A": "杜绝违章指挥", "B": "杜绝违章操作", "C": "操作规程的遵守", "D": "杜绝违反劳动纪律"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 1001, "question": "生产经营单位发生生产安全事故时，单位的主要负责人应当\n（\n），并不得在事故调查处理期间擅离职守。\nA.回避\nB.隐匿行踪\nC.立即组织抢救\nD.安排驻守", "options": {"A": "回避", "B": "隐匿行踪", "C": "立即组织抢救", "D": "安排驻守"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 1002, "question": "生产经营单位发生生产安全事故后，事故现场有关人员应当立\n即报告（\n）。\nA.报警\nB.本单位负责人\nC.项目经理\nD.安全负责人\n\n=== 第342页 ===", "options": {"A": "报警", "B": "本单位负责人", "C": "项目经理", "D": "安全负责人 === 第342页 ==="}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 1003, "question": "生产经营单位的主要负责人是本单位安全生产（\n），对本单\n位的安全生产工作全面负责。其他负责人对职责范围内的安全生产工\n作负责。\nA.主要责任人\nB.业务负责人\nC.第一责任人\nD.监督责任人", "options": {"A": "主要责任人", "B": "业务负责人", "C": "第一责任人", "D": "监督责任人"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1004, "question": "生产经营单位的主要负责人和安全生产管理人员必须（\n）与\n本单位所从事的生产经营活动相应的安全生产知识和管理能力。\nA.培训\nB.专研\nC.学习\nD.具备", "options": {"A": "培训", "B": "专研", "C": "学习", "D": "具备"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1005, "question": "生产经营单位的特种作业人员必须按照国家有关规定经专门的\n安全作业培训，（\n），方可上岗作业。\nA.取得相应资格\nB.大专院校毕业\nC.学徒期满\nD.培训合格\n\n=== 第343页 ===", "options": {"A": "取得相应资格", "B": "大专院校毕业", "C": "学徒期满", "D": "培训合格 === 第343页 ==="}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 1006, "question": "生产经营单位的从业人员有权了解其作业场所和工作岗位存在\n的危险因素、防范措施及事故应急措施，（\n）。\nA.对本单位的安全人事任免工作提出建议\nB.有权对本单位的安全生产工作提出建议\nC.有义务对本单位的安全生产工作提出质疑\nD.有义务对本单位的安全生产工作进行举报", "options": {"A": "对本单位的安全人事任免工作提出建议", "B": "有权对本单位的安全生产工作提出建议", "C": "有义务对本单位的安全生产工作提出质疑", "D": "有义务对本单位的安全生产工作进行举报"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 1007, "question": "生产经营单位的安全生产管理人员应当根据本单位的生产经营\n特点，对安全生产状况进行经常性检查；对检查中发现的安全问题，\n应当立即处理；不能处理的，应当及时报告（\n）。\nA.安全管理部门\nB.生产管理部门\nC.本单位有关负责人\nD.监管部门", "options": {"A": "安全管理部门", "B": "生产管理部门", "C": "本单位有关负责人", "D": "监管部门"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1008, "question": "生产经营单位的安全生产管理人员应当对安全生产状况进行经\n常性检查；对检查中发现的安全问题，应当立即处理；不能处理的，\n应当及时报告本单位有关负责人，有关负责人应当及时处理。检查及\n处理情况应当（\n）。\nA.如实记录在案\nB.简要记录\n\n=== 第344页 ===\nC.及时汇报\nD.备案登记", "options": {"A": "如实记录在案", "B": "简要记录 === 第344页 ===", "C": "及时汇报", "D": "备案登记"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1009, "question": "生产经营单位的安全生产管理机构以及安全生产管理人员应当\n恪尽职守，（\n）。\nA.依法履行职责\nB.全面负责安全生产\nC.协助安全生产\nD.履行管理职责", "options": {"A": "依法履行职责", "B": "全面负责安全生产", "C": "协助安全生产", "D": "履行管理职责"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1010, "question": "生产经营单位的（\n）有依法获得安全生产保障的权利，并应\n当依法履行安全生产方面的义务。\nA.管理人员\nB.工人\nC.从业人员\nD.安全员", "options": {"A": "管理人员", "B": "工人", "C": "从业人员", "D": "安全员"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1011, "question": "生产经营单位的（\n）应当明确各岗位的责任人员、责任范围\n和考核标准等内容。\nA.全员安全生产责任制\nB.安全管理职责\nC.安全绩效考核\n\n=== 第345页 ===\nD.安全先进评比", "options": {"A": "全员安全生产责任制", "B": "安全管理职责", "C": "安全绩效考核 === 第345页 ===", "D": "安全先进评比"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1012, "question": "生产经营单位的（\n）是本单位安全生产第一责任人，对本单\n位的安全生产工作全面负责。其他负责人对职责范围内的安全生产工\n作负责。\nA.安全经理\nB.主要负责人\nC.安全员\nD.董事长", "options": {"A": "安全经理", "B": "主要负责人", "C": "安全员", "D": "董事长"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1013, "question": "生产经营单位不得因从业人员在《中华人民共和国安全生产法》\n规定的紧急情况下（\n）或者采取紧急撤离措施而降低其工资、福\n利等待遇或者解除与其订立的劳动合同。\nA.殴打他人\nB.停止作业\nC.哄抢应急物资\nD.违规作业", "options": {"A": "殴打他人", "B": "停止作业", "C": "哄抢应急物资", "D": "违规作业"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 1014, "question": "生产经营单位必须遵守本法和其他有关安全生产的法律、法规，\n加强安全生产管理，建立健全（\n）和安全生产规章制度。\nA.总经理负责制\nB.全员安全生产责任制\n\n=== 第346页 ===\nC.安全总监负责制\nD.生产经理负责制", "options": {"A": "总经理负责制", "B": "全员安全生产责任制 === 第346页 ===", "C": "安全总监负责制", "D": "生产经理负责制"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 1015, "question": "生产经营单位必须为从业人员提供符合国家标准或者行业标准\n的劳动防护用品，并（\n）、教育从业人员按照使用规则佩戴、使用。\nA.督促\nB.监督\nC.确保\nD.招呼", "options": {"A": "督促", "B": "监督", "C": "确保", "D": "招呼"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 1016, "question": "生产经营单位必须为从业人员提供符合国家标准或者行业标准\n的（\n），并监督、教育从业人员按照使用规则佩戴、使用。\nA.生产原料\nB.劳动防护用品\nC.检测工具\nD.劳动用具", "options": {"A": "生产原料", "B": "劳动防护用品", "C": "检测工具", "D": "劳动用具"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 1017, "question": "生产经营单位必须为从业人员提供符合（\n）标准的劳动防护\n用品，并监督、教育从业人员按照使用规则佩戴、使用。\nA.国家\nB.国际\nC.企业\n\n=== 第347页 ===\nD.发达国家", "options": {"A": "国家", "B": "国际", "C": "企业 === 第347页 ===", "D": "发达国家"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 1018, "question": "生产经营单位必须建立健全全员安全生产责任制和安全生产规\n章制度，加大对安全生产资金、物资、技术、人员的投入保障力度，\n改善（\n），加强安全生产标准化、信息化建设。\nA.安全生产条件\nB.生产保障\nC.安全管理\nD.安全监督", "options": {"A": "安全生产条件", "B": "生产保障", "C": "安全管理", "D": "安全监督"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1019, "question": "生产经营单位必须构建安全风险分级管控和隐患排查治理双重\n预防机制，健全风险防范化解机制，提高安全生产水平，（\n）安全\n生产。\nA.监督\nB.确保\nC.提高\nD.管理", "options": {"A": "监督", "B": "确保", "C": "提高", "D": "管理"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1020, "question": "生产经营单位（\n）应当淘汰的危及生产安全的工艺、设备。\nA.可以试用\nB.不得使用\nC.改造后使用\n\n=== 第348页 ===\nD.报告后使用", "options": {"A": "可以试用", "B": "不得使用", "C": "改造后使用 === 第348页 ===", "D": "报告后使用"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1021, "question": "生产经营场所和员工宿舍应当设有符合紧急疏散要求、标志明\n显、保持畅通的出口。（\n）锁闭、封堵生产经营场所或者员工宿舍\n的出口。\nA.适当\nB.可以\nC.不宜\nD.禁止", "options": {"A": "适当", "B": "可以", "C": "不宜", "D": "禁止"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1022, "question": "生产经营场所和员工宿舍应当设有（\n）、标志明显、保持畅\n通的出口。\nA.小汽车能通过\nB.符合紧急疏散要求\nC.防盗\nD.方便开启锁闭", "options": {"A": "小汽车能通过", "B": "符合紧急疏散要求", "C": "防盗", "D": "方便开启锁闭"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1023, "question": "生产、经营、储存、使用危险物品的车间、商店、仓库不得与\n（\n）在同一座建筑物内。\nA.员工宿舍\nB.员工食堂\nC.员工卫生间\n\n=== 第349页 ===\nD.员工娱乐室", "options": {"A": "员工宿舍", "B": "员工食堂", "C": "员工卫生间 === 第349页 ===", "D": "员工娱乐室"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1024, "question": "生产、储存、经营其他物品的场所与居住场所设置在同一建筑\n物内，不符合消防技术标准的，责令停产停业，并处（\n）罚款。\nA.5 千元以上5 万元以下\nB.1 万元以上5 万元以下\nC.3 万元以上8 万元以下\nD.3 万元以上10 万元以下", "options": {"A": "5 千元以上5 万元以下", "B": "1 万元以上5 万元以下", "C": "3 万元以上8 万元以下", "D": "3 万元以上10 万元以下"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 1025, "question": "生产、储存、经营（\n）的场所不得与居住场所设置在同一建\n筑物内，并应当与居住场所保持安全距离。\nA.食品\nB.玩具\nC.服装\nD.易燃易爆危险品", "options": {"A": "食品", "B": "玩具", "C": "服装", "D": "易燃易爆危险品"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1026, "question": "申请参加安全生产考核的“安管人员”，应当具备相应文化程度、\n专业技术职称和一定安全生产工作经历，与企业确立劳动关系，并经\n企业（\n）。\nA.季度安全生产教育培训合格\nB.年度安全生产教育培训合格\nC.年度考试合格\n\n=== 第350页 ===\nD.季度考试合格", "options": {"A": "季度安全生产教育培训合格", "B": "年度安全生产教育培训合格", "C": "年度考试合格 === 第350页 ===", "D": "季度考试合格"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1027, "question": "社会保险行政部门应当自受理工伤认定申请之日起（\n）日内\n作出工伤认定的决定，并书面通知申请工伤认定的职工或者其近亲属\n和该职工所在单位。\nA.15\nB.30\nC.60\nD.90", "options": {"A": "15", "B": "30", "C": "60", "D": "90"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1028, "question": "建筑施工企业转让、出借资质证书或者以其他方式允许他人以\n本企业的名义承揽工程的，对因该项承揽工程不符合规定的质量标准\n造成的损失，建筑施工企业与使用本企业名义的单位或者个人承担\n（\n）。\nA.各自承担责任\nB.承担对半责任\nC.罚款责任\nD.连带赔偿责任", "options": {"A": "各自承担责任", "B": "承担对半责任", "C": "罚款责任", "D": "连带赔偿责任"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 1029, "question": "建筑施工企业在编制施工组织设计时，应当根据建筑工程的特\n点制定相应的（\n）。\nA.安全技术措施\n\n=== 第351页 ===\nB.安全标语\nC.安全控制要点\nD.安全制度", "options": {"A": "安全技术措施 === 第351页 ===", "B": "安全标语", "C": "安全控制要点", "D": "安全制度"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1030, "question": "建筑施工企业应当遵守有关环境保护和安全生产的法律、法规\n的规定，采取控制和处理施工现场的各种（\n）、废气、废水、固体\n废物以及（\n）、振动对环境的污染和危害的措施。\nA.有害物质；建筑垃圾\nB.建筑垃圾；粉尘\nC.粉尘；噪音\nD.有害物质；噪音", "options": {"A": "有害物质；建筑垃圾", "B": "建筑垃圾；粉尘", "C": "粉尘；噪音", "D": "有害物质；噪音"}, "answer": "C", "type": "single", "category": "文明施工"}, {"id": 1031, "question": "建筑施工企业应当依法为职工参加（\n）缴纳（\n）。鼓励企\n业为从事危险作业的职工办理意外伤害保险，支付保险费。\nA.社会保险；社会保险费\nB.失业保险；失业保险费\nC.商业保险；商业保险费\nD.工伤保险；工伤保险费", "options": {"A": "社会保险；社会保险费", "B": "失业保险；失业保险费", "C": "商业保险；商业保险费", "D": "工伤保险；工伤保险费"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1032, "question": "建筑施工企业应当建立健全劳动安全生产教育培训制度，加强\n对职工安全生产的教育培训；未经安全生产教育培训的人员，（\n）。\nA.不得进入现场\n\n=== 第352页 ===\nB.不得上岗作业\nC.不得旁站学习\nD.不得录用", "options": {"A": "不得进入现场 === 第352页 ===", "B": "不得上岗作业", "C": "不得旁站学习", "D": "不得录用"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1033, "question": "建筑施工企业应当建立安全生产教育培训制度，制定年度培训\n计划，（\n）对“安管人员”进行培训和考核，考核不合格的，不得\n上岗。培训情况应当记入企业安全生产教育培训档案。\nA.每月\nB.每季度\nC.每半年\nD.每年", "options": {"A": "每月", "B": "每季度", "C": "每半年", "D": "每年"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1034, "question": "建筑施工企业隐瞒有关情况或者提供虚假材料申请安全生产许\n可证的，不予受理或者不予颁发安全生产许可证，并给予警告，（\n）\n年内不得申请安全生产许可证。\nA.1\nB.3\nC.5\nD.7", "options": {"A": "1", "B": "3", "C": "5", "D": "7"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1035, "question": "建筑施工企业以欺骗、贿赂等不正当手段取得安全生产许可证\n的，撤销安全生产许可证，（\n）内不得再次申请安全生产许可证。\n\n=== 第353页 ===\nA.半年\nB.1 年\nC.2 年\nD.3 年", "options": {"A": "半年", "B": "1 年", "C": "2 年", "D": "3 年"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1036, "question": "建筑施工企业遗失安全生产许可证，应当（\n）向原安全生产\n许可证颁发管理机关报告，并在公众媒体上声明作废后，方可申请补\n办。\nA.立即\nB.3 日内\nC.7 日内\nD.10 日内", "options": {"A": "立即", "B": "3 日内", "C": "7 日内", "D": "10 日内"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1037, "question": "建筑施工企业未取得（\n）的，不得从事建筑施工活动。\nA.餐饮许可证\nB.消防审批许可证\nC.环评许可证\nD.安全生产许可证", "options": {"A": "餐饮许可证", "B": "消防审批许可证", "C": "环评许可证", "D": "安全生产许可证"}, "answer": "D", "type": "single", "category": "消防安全"}, {"id": 1038, "question": "建筑施工企业未按规定如实将“安管人员”考核情况记入安全\n生产教育培训档案的，由县级以上地方人民政府住房城乡建设主管部\n门责令限期改正，并处（\n）的罚款。\n\n=== 第354页 ===\nA.2 万元以下\nB.5 万元以下\nC.10 万元以下\nD.15 万元以下", "options": {"A": "2 万元以下", "B": "5 万元以下", "C": "10 万元以下", "D": "15 万元以下"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 1039, "question": "建筑施工企业违反本法规定，对建筑安全事故隐患（\n），责\n令改正，可以处以罚款；情节严重的，责令停业整顿，降低资质等级\n或者吊销资质证书；构成犯罪的，依法追究刑事责任。\nA.不采取措施予以消除的\nB.未落实安全文明措施费\nC.未配置安全员\nD.未配置安全装置", "options": {"A": "不采取措施予以消除的", "B": "未落实安全文明措施费", "C": "未配置安全员", "D": "未配置安全装置"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 1040, "question": "建筑施工企业申请安全生产许可证时，以下选项中哪项不属于\n应当向建设主管部门提供的材料：（\n）。\nA.企业法人营业执照\nB.建筑施工企业安全生产许可证申请表\nC.特种作业人员经有关业务主管部门考核合格，取得特种作业操作资\n格证书\nD.工资发放表", "options": {"A": "企业法人营业执照", "B": "建筑施工企业安全生产许可证申请表", "C": "特种作业人员经有关业务主管部门考核合格，取得特种作业操作资 格证书", "D": "工资发放表"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1041, "question": "建筑施工企业取得安全生产许可证，有（\n）措施，并为作业\n\n=== 第355页 ===\n人员配备符合国家标准或者行业标准的安全防护用具和安全防护服\n装。\nA.职业危害防治\nB.生物防治\nC.生化防治\nD.作业保障", "options": {"A": "职业危害防治", "B": "生物防治", "C": "生化防治", "D": "作业保障"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 1042, "question": "建筑施工企业取得安全生产许可证，以下选项中哪项不属于必\n须具备的安全生产条件：（\n）。\nA.建立、健全安全生产责任制，制定完备的安全生产规章制度和操作\n规程\nB.保证本单位安全生产条件所需资金的投入\nC.特种作业人员经有关业务主管部门考核合格，取得特种作业操作资\n格证书\nD.无需缴纳工伤保险", "options": {"A": "建立、健全安全生产责任制，制定完备的安全生产规章制度和操作 规程", "B": "保证本单位安全生产条件所需资金的投入", "C": "特种作业人员经有关业务主管部门考核合格，取得特种作业操作资 格证书", "D": "无需缴纳工伤保险"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1043, "question": "建筑施工企业取得安全生产许可证，需依法参加工伤保险，依\n法为施工现场从事危险作业的人员办理（\n），为从业人员缴纳保险\n费。\nA.重疾险\nB.意外伤害险\nC.医疗互助险\n\n=== 第356页 ===\nD.出行保障险", "options": {"A": "重疾险", "B": "意外伤害险", "C": "医疗互助险 === 第356页 ===", "D": "出行保障险"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1044, "question": "建筑施工企业破产、倒闭、撤销的，应当将安全生产许可证交\n回（\n）安全生产许可证颁发管理机关予以注销。\nA.工程所在地\nB.现\nC.企业所在行政区域\nD.原", "options": {"A": "工程所在地", "B": "现", "C": "企业所在行政区域", "D": "原"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1045, "question": "建筑施工企业必须按照工程设计要求、施工技术标准和合同的\n约定，对建筑材料、建筑构配件和设备进行检验，不合格的（\n）。\nA.不得使用\nB.降级使用\nC.维修使用\nD.作出标识", "options": {"A": "不得使用", "B": "降级使用", "C": "维修使用", "D": "作出标识"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 1046, "question": "建筑施工企业必须按照工程设计图纸和施工技术标准施工，不\n得偷工减料。工程设计的修改由（\n）负责，建筑施工企业不得擅\n自修改工程设计。\nA.建设单位\nB.监理单位\nC.建筑施工企业\n\n=== 第357页 ===\nD.原设计单位", "options": {"A": "建设单位", "B": "监理单位", "C": "建筑施工企业 === 第357页 ===", "D": "原设计单位"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 1047, "question": "建筑活动应当确保建筑工程质量和安全，符合国家的建筑工程\n（\n）标准。\nA.安全\nB.使用\nC.维修\nD.经济", "options": {"A": "安全", "B": "使用", "C": "维修", "D": "经济"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 1048, "question": "建筑工程总承包单位可以将承包工程中的部分工程发包给具有\n（\n）的分包单位。\nA.相应资质条件\nB.相应业绩\nC.相应管理人员\nD.相应施工能力", "options": {"A": "相应资质条件", "B": "相应业绩", "C": "相应管理人员", "D": "相应施工能力"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1049, "question": "建筑工程总承包单位按照总承包合同的约定对（\n）负责；分\n包单位按照分包合同的约定对（\n）负责。总承包单位和分包单位\n就分包工程对建设单位承担连带责任。\nA.建设单位；建设单位\nB.监理单位；建设单位\nC.监理单位；总承包单位\n\n=== 第358页 ===\nD.建设单位；总承包单位", "options": {"A": "建设单位；建设单位", "B": "监理单位；建设单位", "C": "监理单位；总承包单位 === 第358页 ===", "D": "建设单位；总承包单位"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1050, "question": "建筑工程造价应当按照国家有关规定，由发包单位与承包单位\n在（\n）中约定。公开招标发包的，其造价的约定，须遵守招标投\n标法律的规定。\nA.合同\nB.中标文件\nC.招标文件\nD.函件", "options": {"A": "合同", "B": "中标文件", "C": "招标文件", "D": "函件"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 1051, "question": "建筑工程实行总承包的，总承包单位将建筑工程分包给其他单\n位的，应当对分包工程的质量与分包单位（\n）。分包单位应当接受\n总承包单位的质量管理。\nA.承担各自责任\nB.承担连带责任\nC.承担独立责任\nD.承担对半责任", "options": {"A": "承担各自责任", "B": "承担连带责任", "C": "承担独立责任", "D": "承担对半责任"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1052, "question": "建筑工程竣工经验收合格后，方可交付使用；未经验收或者验\n收不合格的，（\n）。\nA.可以作为办公使用\nB.可以临时居住\n\n=== 第359页 ===\nC.不得交付使用\nD.可以存放文件资料", "options": {"A": "可以作为办公使用", "B": "可以临时居住 === 第359页 ===", "C": "不得交付使用", "D": "可以存放文件资料"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1053, "question": "建筑工程的发包单位与承包单位应当依法（\n），明确双方的\n权利和义务。\nA.依法订立标准合同\nB.按照惯例订立合同\nC.依法订立书面合同\nD.验收后签订合同", "options": {"A": "依法订立标准合同", "B": "按照惯例订立合同", "C": "依法订立书面合同", "D": "验收后签订合同"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 1054, "question": "建筑安全监督机构在检查施工现场时，发现某施工单位在没有\n竣工的建筑物内设置员工集体宿舍，下列表述正确的是（\n）。\nA.经工程所在地建设安全监督机构同意，可以继续使用\nB.经工程所在地建设行政主管部门同意，可以继续使用\nC.必须将宿舍迁出\nD.经工程所在地质量监督机构同意，可以继续使用", "options": {"A": "经工程所在地建设安全监督机构同意，可以继续使用", "B": "经工程所在地建设行政主管部门同意，可以继续使用", "C": "必须将宿舍迁出", "D": "经工程所在地质量监督机构同意，可以继续使用"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1055, "question": "建设项目可能产生环境噪声污染的，建设单位必须提出（\n），\n规定环境噪声污染的防治措施，并按照国家规定的程序报生态环境主\n管部门批准。\nA.规划报告\nB.环境影响报告书\n\n=== 第360页 ===\nC.噪声污染防治措施\nD.安全评价", "options": {"A": "规划报告", "B": "环境影响报告书 === 第360页 ===", "C": "噪声污染防治措施", "D": "安全评价"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 1056, "question": "建设工程实行总承包的，（\n）。\nA.由建设单位对施工现场的安全生产负总责\nB.由总承包单位对施工现场的安全生产负总责\nC.由总承包单位与分包单位对全施工现场的安全生产负连带责任\nD.由总承包单位和分包单位各自对自己的施工现场的安全生产负责", "options": {"A": "由建设单位对施工现场的安全生产负总责", "B": "由总承包单位对施工现场的安全生产负总责", "C": "由总承包单位与分包单位对全施工现场的安全生产负连带责任", "D": "由总承包单位和分包单位各自对自己的施工现场的安全生产负责"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1057, "question": "建设工程施工前，施工单位负责该项目管理的技术人员应当对\n有关安全施工的技术要求向施工作业班组、作业人员做出详细说明，\n并由（\n）签字确认。\nA.作业人员\nB.项目技术人员\nC.双方\nD.项目负责人", "options": {"A": "作业人员", "B": "项目技术人员", "C": "双方", "D": "项目负责人"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1058, "question": "建设工程施工前，施工单位负责该项目管理的（\n）应当对有\n关安全施工的技术要求向施工作业班组、作业人员做出详细说明，并\n由双方签字确认。\nA.项目经理\nB.技术人员\n\n=== 第361页 ===\nC.施工员\nD.专职安全生产管理人员", "options": {"A": "项目经理", "B": "技术人员 === 第361页 ===", "C": "施工员", "D": "专职安全生产管理人员"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1059, "question": "建设单位在申请领取施工许可证时，应当提供建设工程有关\n（\n）的资料。\nA.施工组织设计\nB.工程造价\nC.安全施工措施\nD.承包合同", "options": {"A": "施工组织设计", "B": "工程造价", "C": "安全施工措施", "D": "承包合同"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1060, "question": "建设单位在申请领取（\n）时，应当提供建设工程有关安全施\n工措施的资料。\nA.建设用地规划许可证\nB.建设工程规划许可证\nC.建设工程施工许可证\nD.房屋销售许可证", "options": {"A": "建设用地规划许可证", "B": "建设工程规划许可证", "C": "建设工程施工许可证", "D": "房屋销售许可证"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1061, "question": "建设单位在编制工程概算时，应当确定建设工程（\n）。\nA.安全生产和文明施工标准\nB.安全作业环境及安全施工措施所需费用\nC.安全防护用具和安全防护设施单价\nD.安全技术措施和专项施工方案计划\n\n=== 第362页 ===", "options": {"A": "安全生产和文明施工标准", "B": "安全作业环境及安全施工措施所需费用", "C": "安全防护用具和安全防护设施单价", "D": "安全技术措施和专项施工方案计划 === 第362页 ==="}, "answer": "B", "type": "single", "category": "文明施工"}, {"id": 1062, "question": "建设单位与其委托的工程监理单位应当订立（\n）监理合同。\nA.通用惯例\nB.口头协议\nC.书面委托\nD.行业规则", "options": {"A": "通用惯例", "B": "口头协议", "C": "书面委托", "D": "行业规则"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1063, "question": "工程建设单位对工程建设期间的安全生产承担（\n）责任，工\n程总承包单位对总承包范围内的安全生产承担全面管理责任，建筑企\n业和其他有关单位对本单位安全生产和职业健康工作负全面责任。\nA.首要\nB.全面\nC.部分\nD.次要", "options": {"A": "首要", "B": "全面", "C": "部分", "D": "次要"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1064, "question": "工程监理单位在实施监理过程中，发现存在安全事故隐患的，\n应当要求施工单位整改；情况严重的，应当要求施工单位暂时停止施\n工，并及时报告建设单位。施工单位拒不整改或者不停止施工的，工\n程监理单位应当及时向（\n）报告。\nA.建设单位\nB.有关主管部门\nC.建设行政部门\n\n=== 第363页 ===\nD.当地人民政府", "options": {"A": "建设单位", "B": "有关主管部门", "C": "建设行政部门 === 第363页 ===", "D": "当地人民政府"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 1065, "question": "工程监理单位在实施监理过程中，发现存在安全事故隐患的，\n应当要求施工单位整改；情况严重的，应当要求施工单位（\n）。\nA.暂时停止施工，并及时报告建设单位\nB.终止施工\nC.与建设单位协商\nD.与建设单位解除承包合同", "options": {"A": "暂时停止施工，并及时报告建设单位", "B": "终止施工", "C": "与建设单位协商", "D": "与建设单位解除承包合同"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 1066, "question": "工程监理单位与承包单位串通，为承包单位谋取非法利益，给\n建设单位造成损失的，应当（\n）。\nA.与承包单位约定赔偿责任\nB.与承包单位承担连带赔偿责任\nC.责令承包单位承担责任\nD.接受罚款", "options": {"A": "与承包单位约定赔偿责任", "B": "与承包单位承担连带赔偿责任", "C": "责令承包单位承担责任", "D": "接受罚款"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1067, "question": "工程监理单位不按照委托监理合同的约定履行监理义务，对应\n当监督检查的项目不检查或者不按照规定检查，给建设单位造成损失\n的，应当（\n）。\nA.承担相应的赔偿责任\nB.赔礼道歉\nC.不收监理费用\n\n=== 第364页 ===\nD.接受罚款", "options": {"A": "承担相应的赔偿责任", "B": "赔礼道歉", "C": "不收监理费用 === 第364页 ===", "D": "接受罚款"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 1068, "question": "根据规定，（\n）应当按规定实施项目安全生产管理，监控危\n险性较大分部分项工程，及时排查处理施工现场安全事故隐患。\nA.安全负责人\nB.项目负责人\nC.分管项目副总\nD.总经理", "options": {"A": "安全负责人", "B": "项目负责人", "C": "分管项目副总", "D": "总经理"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 1069, "question": "根据《危险性较大的分部分项工程安全管理规定》，专项施工方\n案实施前，编制人员或者（\n）应当向施工现场管理人员进行方案\n交底。\nA.项目技术负责人\nB.施工单位技术负责人\nC.项目安全总监\nD.施工单位安全总监", "options": {"A": "项目技术负责人", "B": "施工单位技术负责人", "C": "项目安全总监", "D": "施工单位安全总监"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1070, "question": "根据《危险性较大的分部分项工程安全管理规定》，专项施工方\n案经论证（\n）的，施工单位修改后应当按照本规定的要求重新组\n织专家论证。\nA.通过\nB.修改后通过\n\n=== 第365页 ===\nC.不通过\nD.部分通过", "options": {"A": "通过", "B": "修改后通过 === 第365页 ===", "C": "不通过", "D": "部分通过"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1071, "question": "根据《危险性较大的分部分项工程安全管理规定》，监理单位发\n现施工单位未按照专项施工方案施工的，情节严重的，（\n）要求其\n暂停施工，并及时报告建设单位。\nA.应该\nB.可以\nC.允许\nD.不可以", "options": {"A": "应该", "B": "可以", "C": "允许", "D": "不可以"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1072, "question": "根据《危险性较大的分部分项工程安全管理规定》，对于超过一\n定规模的危大工程，（\n）应当组织召开专家论证会对专项施工方案\n进行论证。\nA.建设单位\nB.施工单位\nC.设计单位\nD.勘察单位", "options": {"A": "建设单位", "B": "施工单位", "C": "设计单位", "D": "勘察单位"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1073, "question": "根据《危险性较大的分部分项工程安全管理规定》，对于按照规\n定需要进行第三方监测的危大工程，（\n）应当委托具有相应勘察资\n质的单位进行监测。\n\n=== 第366页 ===\nA.勘察单位\nB.设计单位\nC.施工单位\nD.建设单位", "options": {"A": "勘察单位", "B": "设计单位", "C": "施工单位", "D": "建设单位"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1074, "question": "根据《危险性较大的分部分项工程安全管理规定》，（\n）应当\n组织勘察、设计等单位在施工招标文件中列出危大工程清单。\nA.建设单位\nB.施工单位\nC.设计单位\nD.勘察单位", "options": {"A": "建设单位", "B": "施工单位", "C": "设计单位", "D": "勘察单位"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1075, "question": "根据《危险性较大的分部分项工程安全管理规定》，（\n）应当\n根据工程实际及工程周边环境资料，在勘察文件中说明地质条件可能\n造成的工程风险。\nA.建设单位\nB.施工单位\nC.设计单位\nD.勘察单位", "options": {"A": "建设单位", "B": "施工单位", "C": "设计单位", "D": "勘察单位"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1076, "question": "根据《危险性较大的分部分项工程安全管理规定》，（\n）应当\n对专项施工方案实施情况进行现场监督，对未按照专项施工方案施工\n\n=== 第367页 ===\n的，应当要求立即整改，并及时报告项目负责人，项目负责人应当及\n时组织限期整改。\nA.项目专职安全生产管理人员\nB.施工单位专职安全生产管理人员\nC.项目技术负责人\nD.施工单位技术负责人", "options": {"A": "项目专职安全生产管理人员", "B": "施工单位专职安全生产管理人员", "C": "项目技术负责人", "D": "施工单位技术负责人"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1077, "question": "根据《建筑起重机械安全监督管理规定》，（\n）应当对在用的\n建筑起重机械及其安全保护装置、吊具、索具等进行经常性和定期的\n检查、维护和保养，并做好记录。\nA.生产单位\nB.安装单位\nC.使用单位\nD.监理单位", "options": {"A": "生产单位", "B": "安装单位", "C": "使用单位", "D": "监理单位"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 1078, "question": "根据《建筑起重机械安全监督管理规定》，（\n）应当按照建筑\n起重机械安装、拆卸工程专项施工方案及安全操作规程组织安装、拆\n卸作业。\nA.生产单位\nB.安装单位\nC.使用单位\nD.监理单位\n\n=== 第368页 ===", "options": {"A": "生产单位", "B": "安装单位", "C": "使用单位", "D": "监理单位 === 第368页 ==="}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 1079, "question": "根据《建设工程安全生产管理条例》规定，施工中发生危及人\n身安全的紧急情况时，作业人员有权立即停止作业或者在采取必要的\n应急措施后撤离（\n）。\nA.作业场所\nB.危险区域\nC.施工场地\nD.办公地点", "options": {"A": "作业场所", "B": "危险区域", "C": "施工场地", "D": "办公地点"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 1080, "question": "根据《建设工程安全生产管理条例》规定，施工现场及毗邻区\n域内供水、排水、供电、供气、供热、通信、广播电视等地下管线资\n料，气象和水文观测资料，相邻建筑物和构筑物、地下工程的有关资\n料，应由（\n）提供并保证其真实、准确、完整。\nA.建设单位\nB.设计单位\nC.监理单位\nD.施工单位", "options": {"A": "建设单位", "B": "设计单位", "C": "监理单位", "D": "施工单位"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 1081, "question": "根据《建设工程安全生产管理条例》规定，施工起重机械和整\n体提升脚手架、模板等自升式架设设施安装完毕后，（\n）应当自检，\n出具自检合格证明。\nA.建设单位\n\n=== 第369页 ===\nB.施工单位\nC.安装单位\nD.出租单位", "options": {"A": "建设单位 === 第369页 ===", "B": "施工单位", "C": "安装单位", "D": "出租单位"}, "answer": "C", "type": "single", "category": "脚手架与模板工程"}, {"id": 1082, "question": "根据《建设工程安全生产管理条例》规定，施工单位应当在施\n工现场建立消防安全责任制度，确定（\n）。\nA.安全责任人\nB.保卫责任人\nC.义务消防队\nD.消防安全责任人", "options": {"A": "安全责任人", "B": "保卫责任人", "C": "义务消防队", "D": "消防安全责任人"}, "answer": "D", "type": "single", "category": "消防安全"}, {"id": 1083, "question": "根据《建设工程安全生产管理条例》规定，安装、拆卸施工起\n重机械和整体提升脚手架、模板等自升式架设设施，应当编制拆装方\n案、制定（\n）措施，并由专业技术人员现场监督。\nA.安全施工\nB.质量保证\nC.安拆安全\nD.人员安全", "options": {"A": "安全施工", "B": "质量保证", "C": "安拆安全", "D": "人员安全"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 1084, "question": "对于拆除工程，建设单位应当将拆除工程发包给具有相应资质\n等级的施工单位，并将施工单位资质等级证明等资料报送建设工程所\n在地的县级以上地方人民政府建设行政主管部门（\n）。\n\n=== 第370页 ===\nA.审查\nB.登记\nC.备案\nD.批准", "options": {"A": "审查", "B": "登记", "C": "备案", "D": "批准"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1085, "question": "达到一定规模的危险性较大的分部分项工程编制专项施工方案，\n并附具安全验算结果，经施工单位技术负责人、总监理工程师签字后\n实施，由（\n）进行现场监督。\nA.施工员\nB.栋号长\nC.安全负责人\nD.专职安全生产管理人员", "options": {"A": "施工员", "B": "栋号长", "C": "安全负责人", "D": "专职安全生产管理人员"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1086, "question": "从业人员应当接受（\n），掌握本职工作所需的安全生产知识，\n提高安全生产技能，增强事故预防和应急处理能力。\nA.安全生产教育和培训\nB.缴纳安全生产押金\nC.自费安全生产教育和培训\nD.安全教育自费脱产培训", "options": {"A": "安全生产教育和培训", "B": "缴纳安全生产押金", "C": "自费安全生产教育和培训", "D": "安全教育自费脱产培训"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 1087, "question": "从业人员发现事故隐患或者其他不安全因素，（\n）现场安全\n生产管理人员或者本单位负责人报告；接到报告的人员应当及时予以\n\n=== 第371页 ===\n处理。\nA.不可以向\nB.先自行处理后再向\nC.应当立即向\nD.先应急处置后再向", "options": {"A": "不可以向", "B": "先自行处理后再向", "C": "应当立即向", "D": "先应急处置后再向"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 1088, "question": "采用新结构、新材料、新工艺的建设工程和特殊结构的建设工\n程，设计单位应当在设计中提出（\n）。\nA.新结构、新材料的应用和优点\nB.新工艺的具体操作流程\nC.保障施工作业人员安全的措施建议和预防生产安全事故的措施建\n议\nD.重点部位和环节的施工说明", "options": {"A": "新结构、新材料的应用和优点", "B": "新工艺的具体操作流程", "C": "保障施工作业人员安全的措施建议和预防生产安全事故的措施建 议", "D": "重点部位和环节的施工说明"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 1089, "question": "《建设工程安全生产管理条例》规定，在（\n）的建设工程，\n施工单位应当对施工现场实行封闭围挡。\nA.国家重点项目\nB.城市市区内\nC.人口密集地区\nD.人口稀少地区", "options": {"A": "国家重点项目", "B": "城市市区内", "C": "人口密集地区", "D": "人口稀少地区"}, "answer": "B", "type": "single", "category": "文明施工"}, {"id": 1090, "question": "（\n）应当建立安全生产教育和培训档案，如实记录安全生产\n\n=== 第372页 ===\n教育和培训的时间、内容、参加人员以及考核结果等情况。\nA.生产车间\nB.安全教育培训机构\nC.生产经营单位\nD.安全生产监督管理局", "options": {"A": "生产车间", "B": "安全教育培训机构", "C": "生产经营单位", "D": "安全生产监督管理局"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1091, "question": "拆除工程施工作业中，应根据（\n）及时调整安全防护措施，\n随时检查作业机具状况及物料堆放情况。\nA.天气变化\nB.作业环境变化\nC.高度变化\nD.工作量变化", "options": {"A": "天气变化", "B": "作业环境变化", "C": "高度变化", "D": "工作量变化"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1092, "question": "拆除工程施工作业后，应对场地的（\n）措施进行检查。\nA.进度控制及质量控制\nB.质量控制及环境保护\nC.安全状况及进度控制\nD.安全状况及环境保护", "options": {"A": "进度控制及质量控制", "B": "质量控制及环境保护", "C": "安全状况及进度控制", "D": "安全状况及环境保护"}, "answer": "D", "type": "single", "category": "文明施工"}, {"id": 1093, "question": "关于拆除工程，下列说法正确的是（\n）。\nA.应先拆除设备管线设施及主体结构，再切断电源、水源和气源\nB.应先拆除设备管线设施，再切断电源、水源和气源、拆除及主体结\n\n=== 第373页 ===\n构\nC.主体结构拆除宜先拆除承重结构及附属设施，再拆除非承重结构\nD.主体结构拆除宜先拆除非承重结构及附属设施，再拆除承重结构", "options": {"A": "应先拆除设备管线设施及主体结构，再切断电源、水源和气源", "B": "应先拆除设备管线设施，再切断电源、水源和气源、拆除及主体结 === 第373页 === 构", "C": "主体结构拆除宜先拆除承重结构及附属设施，再拆除非承重结构", "D": "主体结构拆除宜先拆除非承重结构及附属设施，再拆除承重结构"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1094, "question": "关于拆除工程，下列说法错误的是（\n）。\nA.拆除工程施工不得立体交叉作业\nB.拆除工程施工中，应对拟拆除物的稳定状态进行监测\nC.当发现事故隐患时，必须停止作业\nD.对局部拆除影响结构安全的，应先拆除后加固", "options": {"A": "拆除工程施工不得立体交叉作业", "B": "拆除工程施工中，应对拟拆除物的稳定状态进行监测", "C": "当发现事故隐患时，必须停止作业", "D": "对局部拆除影响结构安全的，应先拆除后加固"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 1095, "question": "人工拆除施工应（\n）逐层拆除。\nA.从上至下\nB.从中间向两侧\nC.从两侧向中间\nD.从外向内", "options": {"A": "从上至下", "B": "从中间向两侧", "C": "从两侧向中间", "D": "从外向内"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1096, "question": "当框架结构采用人工拆除施工时，应按（\n）的顺序依次进行。\nA.结构柱、楼板、次梁、主梁\nB.主梁、次梁、楼板、结构柱\nC.楼板、次梁、主梁、结构柱\nD.楼板、主梁、次梁、结构柱", "options": {"A": "结构柱、楼板、次梁、主梁", "B": "主梁、次梁、楼板、结构柱", "C": "楼板、次梁、主梁、结构柱", "D": "楼板、主梁、次梁、结构柱"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1097, "question": "关于人工拆除工程，下列说法错误的是（\n）。\nA.当进行人工拆除作业时，水平构件上严禁人员聚集或集中堆放物料\nB.作业人员应在稳定的结构或脚手架上操作\nC.当人工拆除建筑墙体时，严禁采用底部掏掘或推倒的方法\nD.当拆除建筑的栏杆、楼梯、楼板等构件时，可先行拆除建筑结构", "options": {"A": "当进行人工拆除作业时，水平构件上严禁人员聚集或集中堆放物料", "B": "作业人员应在稳定的结构或脚手架上操作", "C": "当人工拆除建筑墙体时，严禁采用底部掏掘或推倒的方法", "D": "当拆除建筑的栏杆、楼梯、楼板等构件时，可先行拆除建筑结构"}, "answer": "D", "type": "single", "category": "脚手架与模板工程"}, {"id": 1098, "question": "关于机械拆除工程，下列说法错误的是（\n）。\nA.当采用机械拆除建筑时，机械设备前端工作装置的作业高度应超过\n拟拆除物的高度\nB.对拆除作业中较大尺寸的构件或沉重物料，应采用起重机具及时吊\n运\nC.拆除作业的起重机司机，必须执行吊装操作规程\nD.当拆除作业采用双机同时起吊同一构件时，每台起重机载荷不得超\n过允许载荷的90%", "options": {"A": "当采用机械拆除建筑时，机械设备前端工作装置的作业高度应超过 拟拆除物的高度", "B": "对拆除作业中较大尺寸的构件或沉重物料，应采用起重机具及时吊 运", "C": "拆除作业的起重机司机，必须执行吊装操作规程", "D": "当拆除作业采用双机同时起吊同一构件时，每台起重机载荷不得超 过允许载荷的90%"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 1099, "question": "关于拆除工程的安全管理，下列说法错误的是（\n）。\nA.拆除工程施工组织设计和安全专项施工方案，应经审批后实施\nB.当施工过程中发生变更情况时，应履行相应的审批和论证程序\nC.拆除工程施工前，应对作业人员进行岗前安全教育和培训，考核合\n格后方可上岗作业\nD.拆除工程施工后，必须对施工作业人员进行书面安全技术交底，且\n应有记录并签字确认\n\n=== 第375页 ===", "options": {"A": "拆除工程施工组织设计和安全专项施工方案，应经审批后实施", "B": "当施工过程中发生变更情况时，应履行相应的审批和论证程序", "C": "拆除工程施工前，应对作业人员进行岗前安全教育和培训，考核合 格后方可上岗作业", "D": "拆除工程施工后，必须对施工作业人员进行书面安全技术交底，且 应有记录并签字确认 === 第375页 ==="}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 1100, "question": "某工地所在地遭遇7 级大风天气，施工现场可以进行（\n）。\nA.屋面单梯作业\nB.吊篮作业\nC.悬挑脚手架作业\nD.室内安装作业", "options": {"A": "屋面单梯作业", "B": "吊篮作业", "C": "悬挑脚手架作业", "D": "室内安装作业"}, "answer": "D", "type": "single", "category": "脚手架与模板工程"}, {"id": 1101, "question": "在坡度大于25°的屋面上作业，当无外脚手架时，应在屋檐边\n设置不低于（\n）m 高的防护栏杆，并应采用密目式安全立网全封\n闭。\nA.1.2\nB.1.5\nC.1.8\nD.2.2", "options": {"A": "1.2", "B": "1.5", "C": "1.8", "D": "2.2"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 1102, "question": "攀登作业设施和用具应牢固可靠，当采用梯子攀爬作用时，踏\n面荷载不应大于（\n）kN。\nA.1.1\nB.1.2\nC.1.5\nD.2.0", "options": {"A": "1.1", "B": "1.2", "C": "1.5", "D": "2.0"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1103, "question": "登高作业使用梯子时，同一梯子不得超过（\n）同时作业。\nA.一人\nB.两人\nC.三人\nD.四人", "options": {"A": "一人", "B": "两人", "C": "三人", "D": "四人"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1104, "question": "工人在脚手架操作层上作业时严禁（\n）。\nA.使用安全带\nB.架设梯子作业\nC.多人作业\nD.聊天", "options": {"A": "使用安全带", "B": "架设梯子作业", "C": "多人作业", "D": "聊天"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 1105, "question": "使用固定式直梯攀登作业时，当攀登高度超过（\n）m 时，宜\n加设护笼；当攀登高度超过（\n）m 时，应设置梯间平台。\nA.2；6\nB.3；8\nC.4；8\nD.5；10", "options": {"A": "2；6", "B": "3；8", "C": "4；8", "D": "5；10"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 1106, "question": "固定式直梯可以采用（\n）材料组成。\nA.金属\nB.高分子\n\n=== 第377页 ===\nC.木结构\nD.塑性", "options": {"A": "金属", "B": "高分子 === 第377页 ===", "C": "木结构", "D": "塑性"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1107, "question": "在高空安装大模板、吊装第一块预制构件或单独的大中型预制\n构件时，应站在（\n）操作。\nA.作业平台上\nB.钢管上\nC.木方上\nD.跳板上", "options": {"A": "作业平台上", "B": "钢管上", "C": "木方上", "D": "跳板上"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 1108, "question": "正在使用移动式操作平台时，行走轮或导向轮的制动器应（\n）。\nA.对角的两个保持制动\nB.只要稳固，一个制动即可\nC.均应保持制动\nD.超过半数制动", "options": {"A": "对角的两个保持制动", "B": "只要稳固，一个制动即可", "C": "均应保持制动", "D": "超过半数制动"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 1109, "question": "移动式行走轮承载力不应小于（\n）kN。\nA.5\nB.8\nC.10\nD.15", "options": {"A": "5", "B": "8", "C": "10", "D": "15"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1110, "question": "移动式行走轮制动力矩不应小于（\n）N·m。\nA.2.5\nB.5\nC.7.5\nD.10", "options": {"A": "2.5", "B": "5", "C": "7.5", "D": "10"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 1111, "question": "移动式操作平台移动时，操作平台（\n）。\nA.不得站人\nB.高度超过1m 的不得站人\nC.高度超过2m 的不得站人\nD.高度不超过2m 的系好安全带可以站人", "options": {"A": "不得站人", "B": "高度超过1m 的不得站人", "C": "高度超过2m 的不得站人", "D": "高度不超过2m 的系好安全带可以站人"}, "answer": "A", "type": "single", "category": "高处作业"}, {"id": 1112, "question": "李某今日要在吊篮上高处作业，他的安全
