"C": "批准", "D": "审核"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 275, "question": "证据必须经查证（\n），方可作为认定案件事实的根据。\nA.完整\nB.清晰\nC.有序\nD.属实", "options": {"A": "完整", "B": "清晰", "C": "有序", "D": "属实"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 276, "question": "暂时不能开工的建设用地，超过（\n）个月的，应当进行绿化、\n铺装或者遮盖。\nA.一\n\n=== 第94页 ===\nB.二\nC.三\nD.四", "options": {"A": "一 === 第94页 ===", "B": "二", "C": "三", "D": "四"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 277, "question": "暂扣、吊销安全生产许可证的行政处罚，由（\n）决定。\nA.颁发管理机关\nB.建设主管部门\nC.行业主管部门\nD.行政审批部门", "options": {"A": "颁发管理机关", "B": "建设主管部门", "C": "行业主管部门", "D": "行政审批部门"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 278, "question": "根据《建设工程安全生产管理条例》，施工单位取得资质证书后\n（\n），责令限期整改；经整改仍未达到要求的，责令停业整顿，降\n低其资质等级直至吊销资质证书。\nA.挪用安全施工措施费的\nB.在尚未竣工的建筑物内设置员工宿舍的\nC.施工现场临时搭建的建筑物不符合安全使用要求的\nD.降低安全生产条件的", "options": {"A": "挪用安全施工措施费的", "B": "在尚未竣工的建筑物内设置员工宿舍的", "C": "施工现场临时搭建的建筑物不符合安全使用要求的", "D": "降低安全生产条件的"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 279, "question": "在生产安全事故报告和调查处理过程中，有关地方人民政府或者\n有关部门故意拖延或者拒绝落实经批复的对事故责任人的处理意见\n的，由（\n）对有关责任人依法给予处分。\nA.公安机关\n\n=== 第95页 ===\nB.安全生产监督管理部门\nC.司法机关\nD.监察机关", "options": {"A": "公安机关 === 第95页 ===", "B": "安全生产监督管理部门", "C": "司法机关", "D": "监察机关"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 280, "question": "在工程发包与承包中索贿、受贿、行贿，构成犯罪的，依法追究\n（\n）。\nA.行政责任\nB.刑事责任\nC.社会责任\nD.道德谴责", "options": {"A": "行政责任", "B": "刑事责任", "C": "社会责任", "D": "道德谴责"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 281, "question": "在发生或者可能发生突发环境事件时，企业事业单位应当立即采\n取措施处理，及时通报可能受到危害的单位和居民，并向（\n）和\n有关部门报告。\nA.环境保护主管部门\nB.公司\nC.市政府\nD.应急管理局", "options": {"A": "环境保护主管部门", "B": "公司", "C": "市政府", "D": "应急管理局"}, "answer": "A", "type": "single", "category": "文明施工"}, {"id": 282, "question": "在编制工程概算时，（\n）应当确定建设工程安全作业环境及安\n全施工措施所需费用。\nA.建设单位\n\n=== 第96页 ===\nB.监理单位\nC.设计单位\nD.工程项目部", "options": {"A": "建设单位 === 第96页 ===", "B": "监理单位", "C": "设计单位", "D": "工程项目部"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 283, "question": "有关协会组织依照法律、行政法规和（\n），为生产经营单位提\n供安全生产方面的信息、培训等服务，发挥自律作用，促进生产经营\n单位加强安全生产管理。\nA.合同\nB.章程\nC.协议\nD.道德准则", "options": {"A": "合同", "B": "章程", "C": "协议", "D": "道德准则"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 284, "question": "有关生产经营单位应当按照规定提取和使用安全生产费用，\n（\n）改善安全生产条件。\nA.专门用于\nB.监督用于\nC.财务负责\nD.安全部监督", "options": {"A": "专门用于", "B": "监督用于", "C": "财务负责", "D": "安全部监督"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 285, "question": "有关地方人民政府和负有安全生产监督管理职责的部门的（\n）\n接到生产安全事故报告后，应当立即赶到事故现场，组织事故抢救。\nA.分管负责人\n\n=== 第97页 ===\nB.监督员\nC.监察员\nD.负责人", "options": {"A": "分管负责人 === 第97页 ===", "B": "监督员", "C": "监察员", "D": "负责人"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 286, "question": "用人单位招用尚未解除劳动合同的劳动者，对原用人单位造成经\n济损失的，该用人单位应当（\n）赔偿责任。\nA.承担连带\nB.依法规避\nC.合同声明\nD.承担全部", "options": {"A": "承担连带", "B": "依法规避", "C": "合同声明", "D": "承担全部"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 287, "question": "用人单位在节日期间应当依法安排劳动者休假，其中不包括\n（\n）。\nA.元旦\nB.劳动节\nC.重阳节\nD.国庆节", "options": {"A": "元旦", "B": "劳动节", "C": "重阳节", "D": "国庆节"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 288, "question": "用人单位无故不缴纳社会保险费的，由劳动行政部门责令其限期\n缴纳；逾期不缴的，（\n）。\nA.通过财务部门执行\nB.通过银行扣除\n\n=== 第98页 ===\nC.可以加收滞纳金\nD.申请法院执行", "options": {"A": "通过财务部门执行", "B": "通过银行扣除 === 第98页 ===", "C": "可以加收滞纳金", "D": "申请法院执行"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 289, "question": "用人单位未在《工伤保险条例》规定的时限内提交工伤认定申请，\n在此期间发生符合本条例规定的工伤待遇等有关费用由（\n）负担。\nA.该用人单位\nB.本人\nC.单位集资解决\nD.劳动部门", "options": {"A": "该用人单位", "B": "本人", "C": "单位集资解决", "D": "劳动部门"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 290, "question": "施工升降机最外侧边缘与外面架空输电线路的边线之间，应保持\n安全操作距离。当外电线电路电压220kV，最小安全操作距离（\n）\nm。\nA.4\nB.6\nC.8\nD.10", "options": {"A": "4", "B": "6", "C": "8", "D": "10"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 291, "question": "施工升降机最外侧边缘与外面架空输电线路的边线之间，应保持\n安全操作距离。当外电线电路电压330～500kV，最小安全操作距离\n（\n）m。\nA.5\n\n=== 第99页 ===\nB.10\nC.15\nD.20", "options": {"A": "5 === 第99页 ===", "B": "10", "C": "15", "D": "20"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 292, "question": "根据中华人民共和国建设部令第166 号《建筑起重机械安全监督\n管理规定》第十七条的规定：使用单位应当自建筑起重机械安装验收\n合格之日起（\n）日内向工程所在地县级以上地方人民政府建设主\n管部门办理建筑起重机械使用登记。\nA.10\nB.20\nC.30\nD.40", "options": {"A": "10", "B": "20", "C": "30", "D": "40"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 293, "question": "对SC 型施工升降机进行坠落试验时，通过操作按钮盒驱动吊笼\n以额定提升速度上升约（\n）m。\nA.1m～3\nB.3m～5\nC.5m～10\nD.3m～10", "options": {"A": "1m～3", "B": "3m～5", "C": "5m～10", "D": "3m～10"}, "answer": "D", "type": "single", "category": "高处作业"}, {"id": 294, "question": "对SS 型施工升降机进行坠落试验时，将吊笼上升约（\n）m 后\n停住，作模拟断绳试验（应是突然断绳，不能以松绳代替断绳），试\n\n=== 第100页 ===\n验防坠安全装置的可靠性。\nA.1\nB.3\nC.6\nD.9", "options": {"A": "1", "B": "3", "C": "6", "D": "9"}, "answer": "B", "type": "single", "category": "高处作业"}, {"id": 295, "question": "对钢丝绳式施工升降机，垂直度偏差应≤（\n）/1000。\nA.1\nB.1.5\nC.2\nD.2.5", "options": {"A": "1", "B": "1.5", "C": "2", "D": "2.5"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 296, "question": "施工升降机上限位和上极限开关之间的越程距离应≥（\n）m。\nA.0.1\nB.0.15\nC.0.2\nD.0.25", "options": {"A": "0.1", "B": "0.15", "C": "0.2", "D": "0.25"}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 297, "question": "对30m 以下物料提升机的基础，当设计无要求时，基础土层的承\n载力，不应小于（\n）kPa。\nA.70\nB.80\n\n=== 第101页 ===\nC.90\nD.100", "options": {"A": "70", "B": "80 === 第101页 ===", "C": "90", "D": "100"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 298, "question": "物料提升机超载试验应取额定荷载的（\n）%（按5%逐级加载），\n荷载在吊笼内均匀布置，做上升、下降、变速、制动（不做坠落试验）\n等动作。\nA.110\nB.115\nC.120\nD.125", "options": {"A": "110", "B": "115", "C": "120", "D": "125"}, "answer": "D", "type": "single", "category": "高处作业"}, {"id": 299, "question": "吊篮平台可采用（\n）组装。\nA.焊接\nB.螺栓连接\nC.钢管扣件连接\nD.铆接", "options": {"A": "焊接", "B": "螺栓连接", "C": "钢管扣件连接", "D": "铆接"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 300, "question": "引导企业自主购买个性化安全生产管理和技术服务，支持有条件\n的服务机构开展安全生产和（\n）一体化技术服务。\nA.技术管理\nB.风险管控\nC.职业健康\n\n=== 第102页 ===\nD.隐患排查", "options": {"A": "技术管理", "B": "风险管控", "C": "职业健康 === 第102页 ===", "D": "隐患排查"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 301, "question": "因逃避、抗拒安全监管，造成事故或重大社会不良影响的，清出\n当地建筑市场，同时对企业资质、（\n）和从业人员资格进行查处。\nA.安全生产许可证\nB.施工许可证\nC.建设用地规划许可证\nD.建设工程规划许可证", "options": {"A": "安全生产许可证", "B": "施工许可证", "C": "建设用地规划许可证", "D": "建设工程规划许可证"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 302, "question": "因生产安全事故受到损害的从业人员，除依法享有工伤保险外，\n依照有关民事法律尚有获得赔偿的权利的，（\n）向本单位提出赔偿\n要求。\nA.通过诉讼可以\nB.团体\nC.有权\nD.由工会", "options": {"A": "通过诉讼可以", "B": "团体", "C": "有权", "D": "由工会"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 303, "question": "有下列情形的建筑起重机械，使用登记机关不予使用登记并有权\n责令使用单位立即停止使用或者拆除（\n）。\nA.属国家和地方明令淘汰或者禁止使用的\nB.未经检验检测或者经检验检测不合格的\nC.未经安装验收或者经安装验收不合格的\n\n=== 第103页 ===\nD.以上答案都正确", "options": {"A": "属国家和地方明令淘汰或者禁止使用的", "B": "未经检验检测或者经检验检测不合格的", "C": "未经安装验收或者经安装验收不合格的 === 第103页 ===", "D": "以上答案都正确"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 304, "question": "以欺骗手段取得资质证书的，吊销资质证书，处以罚款；构成犯\n罪的，依法（\n）。\nA.追究行政责任\nB.追究刑事责任\nC.追究社会责任\nD.追究道德责任", "options": {"A": "追究行政责任", "B": "追究刑事责任", "C": "追究社会责任", "D": "追究道德责任"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 305, "question": "以欺骗手段取得资质证书的，（\n），处以罚款；构成犯罪的，\n依法追究刑事责任。\nA.吊销资质证书\nB.暂扣资质证书\nC.清除出行业\nD.不得再次申请资质证书", "options": {"A": "吊销资质证书", "B": "暂扣资质证书", "C": "清除出行业", "D": "不得再次申请资质证书"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 306, "question": "已满（\n）周岁不满十八周岁的未成年人有违法行为的，应当\n从轻或者减轻行政处罚。\nA.十二\nB.十四\nC.十五\nD.十六\n\n=== 第104页 ===", "options": {"A": "十二", "B": "十四", "C": "十五", "D": "十六 === 第104页 ==="}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 307, "question": "依照工伤保险条例规定应当参加工伤保险而未参加工伤保险的\n用人单位职工发生工伤的，由该（\n）按照本条例规定的工伤保险\n待遇项目和标准支付费用。\nA.用人单位\nB.工伤保险基金\nC.用人单位和工伤保险基金\nD.用人单位和职工本人", "options": {"A": "用人单位", "B": "工伤保险基金", "C": "用人单位和工伤保险基金", "D": "用人单位和职工本人"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 308, "question": "依照《中华人民共和国建筑法》规定被吊销资质证书的，由（\n）\n吊销其营业执照。\nA.质量行政管理部门\nB.工商行政管理部门\nC.颁发资质证书的机关\nD.公安机关", "options": {"A": "质量行政管理部门", "B": "工商行政管理部门", "C": "颁发资质证书的机关", "D": "公安机关"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 309, "question": "依据城市管理执法体制改革的要求，健全完善城市管理综合行政\n执法部门承担（\n）的职责。\nA.安全生产管理\nB.安全生产执法\nC.安全生产教育\nD.安全生产监督\n\n=== 第105页 ===", "options": {"A": "安全生产管理", "B": "安全生产执法", "C": "安全生产教育", "D": "安全生产监督 === 第105页 ==="}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 310, "question": "依据《工伤保险条例》的规定，职工再次发生工伤，应当享受伤\n残津贴的，按照（\n）伤残等级享受伤残津贴待遇。\nA.原先认定的\nB.新认定的\nC.较高的\nD.较低的", "options": {"A": "原先认定的", "B": "新认定的", "C": "较高的", "D": "较低的"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 311, "question": "依据《工伤保险条例》的规定，职工被借调期间受到工伤事故伤\n害的，由（\n）承担工伤保险责任。\nA.借调单位\nB.职工本人\nC.原用人单位\nD.原用人单位和借调单位", "options": {"A": "借调单位", "B": "职工本人", "C": "原用人单位", "D": "原用人单位和借调单位"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 312, "question": "依法实行强制性产品认证的消防产品，由具有法定资质的认证机\n构按照（\n）、行业标准的强制性要求认证合格后，方可生产、销售、\n使用。\nA.国家标准\nB.企业标准\nC.市场标准\nD.地方标准\n\n=== 第106页 ===", "options": {"A": "国家标准", "B": "企业标准", "C": "市场标准", "D": "地方标准 === 第106页 ==="}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 313, "question": "依法设立的为安全生产提供技术、管理服务的机构，依照法律、\n行政法规和执业准则，接受生产经营单位的委托为其安全生产工作提\n供技术、管理（\n）。\nA.服务\nB.监督\nC.担保\nD.保证", "options": {"A": "服务", "B": "监督", "C": "担保", "D": "保证"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 314, "question": "一次性工亡补助金的标准是（\n）。\nA.上年度全国城镇居民人均可支配收入的20 倍\nB.上年度全国城镇居民人均可支配收入的15 倍\nC.48 个月至60 个月的统筹地区上年度职工月平均工资\nD.24 个月至48 个月的统筹地区上年度职工月平均工资", "options": {"A": "上年度全国城镇居民人均可支配收入的20 倍", "B": "上年度全国城镇居民人均可支配收入的15 倍", "C": "48 个月至60 个月的统筹地区上年度职工月平均工资", "D": "24 个月至48 个月的统筹地区上年度职工月平均工资"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 315, "question": "一般事故，是指造成（\n）人以下死亡，或者10 人以下重伤，\n或者1000 万元以下直接经济损失的事故。\nA.7\nB.10\nC.5\nD.3", "options": {"A": "7", "B": "10", "C": "5", "D": "3"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 316, "question": "一般情况，违法行为在（\n）内未被发现的，不再给予行政处\n罚。\nA.半年\nB.一年\nC.一年半\nD.两年", "options": {"A": "半年", "B": "一年", "C": "一年半", "D": "两年"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 317, "question": "严格执行建设项目安全设施和职业病防护设施“三同时”制度，\n建立健全重大事故责任人员职业和（\n）制度。\nA.规范作业\nB.行业禁入\nC.安全生产\nD.人员管控", "options": {"A": "规范作业", "B": "行业禁入", "C": "安全生产", "D": "人员管控"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 318, "question": "行政机关中（\n）从事行政处罚决定法制审核的人员，应当通\n过国家统一法律职业资格考试取得法律职业资格。\nA.初次\nB.全部\nC.部分\nD.最后一次", "options": {"A": "初次", "B": "全部", "C": "部分", "D": "最后一次"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 319, "question": "行政机关使用或者损毁查封、扣押的财物，对当事人造成损失的，\n\n=== 第108页 ===\n（\n）依法予以赔偿。\nA.应当\nB.不用\nC.必须\nD.酌情", "options": {"A": "应当", "B": "不用", "C": "必须", "D": "酌情"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 320, "question": "行政机关实施行政处罚时，应当责令当事人改正或者（\n）违\n法行为。\nA.限期改正\nB.停止\nC.限期停止\nD.撤销", "options": {"A": "限期改正", "B": "停止", "C": "限期停止", "D": "撤销"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 321, "question": "行政机关实施行政处罚（\n）接受社会监督。\nA.可以\nB.应该\nC.应当\nD.必须", "options": {"A": "可以", "B": "应该", "C": "应当", "D": "必须"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 322, "question": "根据《建设工程安全生产管理条例》，对全国建设工程安全生产\n实施监督管理的部门是（\n）。\nA.国务院劳动行政主管部门\n\n=== 第109页 ===\nB.国务院建设行政主管部门\nC.技术监督部门\nD.国家劳动和社会保障部门", "options": {"A": "国务院劳动行政主管部门 === 第109页 ===", "B": "国务院建设行政主管部门", "C": "技术监督部门", "D": "国家劳动和社会保障部门"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 323, "question": "行政机关拟作出下列（\n）行政处罚决定，应当告知当事人有\n要求听证的权利。\nA.罚款500 元\nB.责令停产停业\nC.警告\nD.没收2000 元违法所得", "options": {"A": "罚款500 元", "B": "责令停产停业", "C": "警告", "D": "没收2000 元违法所得"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 324, "question": "行政机关及其执法人员当场收缴罚款的，必须向当事人出具国务\n院财政部门或者省、自治区、直辖市人民政府财政部门统一制发的\n（\n）。\nA.票据\nB.收据\nC.专用票据\nD.专用收据", "options": {"A": "票据", "B": "收据", "C": "专用票据", "D": "专用收据"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 325, "question": "行政机关不得因当事人陈述申辩而给予（\n）的处罚。\nA.更轻\nB.更重\n\n=== 第110页 ===\nC.加重\nD.减轻", "options": {"A": "更轻", "B": "更重 === 第110页 ===", "C": "加重", "D": "减轻"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 326, "question": "行政法规为实施法律，可以补充设定行政处罚。拟补充设定行政\n处罚的，应当通过听证会、（\n）等形式广泛听取意见。\nA.电视广播\nB.发布问卷调查\nC.论证会\nD.张贴公示", "options": {"A": "电视广播", "B": "发布问卷调查", "C": "论证会", "D": "张贴公示"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 327, "question": "行政处罚由违法行为发生地的（\n）以上人民政府具有行政处\n罚权的行政机关管辖。\nA.省级\nB.地市级\nC.县级\nD.乡镇级", "options": {"A": "省级", "B": "地市级", "C": "县级", "D": "乡镇级"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 328, "question": "行政处罚由两个以上行政机关享有管辖权的，由（\n）行政机\n关管辖。\nA.级别高的\nB.先受理的\nC.级别低的\n\n=== 第111页 ===\nD.最先立案的", "options": {"A": "级别高的", "B": "先受理的", "C": "级别低的 === 第111页 ===", "D": "最先立案的"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 329, "question": "行政处罚实施机关与（\n）机关之间应当加强协调配合，建立\n健全案件移送制度。\nA.公安\nB.检察\nC.司法\nD.上级", "options": {"A": "公安", "B": "检察", "C": "司法", "D": "上级"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 330, "question": "行政处罚实施过程中执法人员不得少于（\n）人，法律另有规\n定的除外。\nA.1\nB.2\nC.3\nD.4", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 331, "question": "行政处罚决定应当在宣告后当场交付当事人，当事人不在场的，\n应当在（\n）日内依法送达当事人。\nA.十\nB.七\nC.五\nD.三\n\n=== 第112页 ===", "options": {"A": "十", "B": "七", "C": "五", "D": "三 === 第112页 ==="}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 332, "question": "行政处罚的种类有（\n）大类。\nA.三\nB.四\nC.五\nD.六", "options": {"A": "三", "B": "四", "C": "五", "D": "六"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 333, "question": "行政处罚裁量基准（\n）向社会公布。\nA.不得\nB.应当\nC.可以\nD.必须", "options": {"A": "不得", "B": "应当", "C": "可以", "D": "必须"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 334, "question": "新修订的《工伤保险条例》正式实施日期为（\n）。\nA.2010 年12 月8 日\nB.2010 年10 月8 日\nC.2011 年1 月1 日\nD.2011 年10 月8 日", "options": {"A": "2010 年12 月8 日", "B": "2010 年10 月8 日", "C": "2011 年1 月1 日", "D": "2011 年10 月8 日"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 335, "question": "新闻媒体应当开展环境保护法律法规和环境保护知识的宣传，对\n（\n）进行舆论监督。\nA.环境破坏行为\n\n=== 第113页 ===\nB.环境违法行为\nC.环境污染现象\nD.环境保护行为", "options": {"A": "环境破坏行为 === 第113页 ===", "B": "环境违法行为", "C": "环境污染现象", "D": "环境保护行为"}, "answer": "B", "type": "single", "category": "文明施工"}, {"id": 336, "question": "消防产品必须符合国家标准；没有国家标准的，必须符合（\n）。\nA.行业标准\nB.企业标准\nC.市场标准\nD.地方标准", "options": {"A": "行业标准", "B": "企业标准", "C": "市场标准", "D": "地方标准"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 337, "question": "消防安全重点单位除应当履行一般消防安全职责外，还应当履行\n的消防安全职责有（\n）。\nA.实行每日防火巡查，并建立巡查记录\nB.制定本单位的消防安全制度、消防安全操作规程\nC.对建筑消防设施每年至少进行一次全面检测\nD.保障疏散通道、安全出口、消防车通道畅通", "options": {"A": "实行每日防火巡查，并建立巡查记录", "B": "制定本单位的消防安全制度、消防安全操作规程", "C": "对建筑消防设施每年至少进行一次全面检测", "D": "保障疏散通道、安全出口、消防车通道畅通"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 338, "question": "县级以上人民政府负有安全生产监督管理职责的部门应当将其\n制定的生产安全事故应急救援预案报送（\n）备案。\nA.上级安全生产监督管理部门\nB.国务院\nC.上级人民政府\n\n=== 第114页 ===\nD.本级人民政府", "options": {"A": "上级安全生产监督管理部门", "B": "国务院", "C": "上级人民政府 === 第114页 ===", "D": "本级人民政府"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 339, "question": "县级以上建设主管部门在实施监督检查时，应当有（\n）以上\n监督检查人员参加。\nA.1 名\nB.2 名\nC.3 名\nD.4 名", "options": {"A": "1 名", "B": "2 名", "C": "3 名", "D": "4 名"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 340, "question": "根据《建设工程安全生产管理条例》，（\n）级以上地方人民政\n府建设行政主管部门对本行政区域内建设工程安全生产工作实施监\n督管理。\nA.乡\nB.县\nC.市\nD.省", "options": {"A": "乡", "B": "县", "C": "市", "D": "省"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 341, "question": "县级以上地方人民政府应当按照国家规定建立国家综合性（\n）、\n专职消防队。\nA.消防救援队\nB.消防站\nC.志愿消防队\n\n=== 第115页 ===\nD.消防宣传机构", "options": {"A": "消防救援队", "B": "消防站", "C": "志愿消防队 === 第115页 ===", "D": "消防宣传机构"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 342, "question": "县级以上地方人民政府以及县级以上人民政府负有安全生产监\n督管理职责的部门，乡、镇人民政府以及街道办事处等地方人民政府\n派出机关，应当至少每（\n）组织1 次生产安全事故应急救援预案\n演练。\nA.半年\nB.1 年\nC.2 年\nD.3 年", "options": {"A": "半年", "B": "1 年", "C": "2 年", "D": "3 年"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 343, "question": "县级以上地方人民政府建设行政主管部门应当根据本级人民政\n府的要求，制定本行政区域内建设工程（\n）应急救援预案。\nA.一般及以上生产安全事故\nB.重大及以上生产安全事故\nC.特大生产安全事故\nD.安全生产事故", "options": {"A": "一般及以上生产安全事故", "B": "重大及以上生产安全事故", "C": "特大生产安全事故", "D": "安全生产事故"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 344, "question": "县级以上地方各级人民政府安全生产监督管理部门依照本法，对\n本级（\n）内安全生产工作实施综合监督管理。\nA.地理范围\nB.邻近范围\n\n=== 第116页 ===\nC.行政区域\nD.陆地区域", "options": {"A": "地理范围", "B": "邻近范围 === 第116页 ===", "C": "行政区域", "D": "陆地区域"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 345, "question": "下列哪个情形不需要建设单位应当按照国家有关规定办理申请\n批准手续（\n）。\nA.需要临时占用规划批准范围以外场地的\nB.可能损坏道路、管线、电力、邮电通信等公共设施的\nC.简单挖土作业\nD.需要临时停水、停电、中断道路交通的", "options": {"A": "需要临时占用规划批准范围以外场地的", "B": "可能损坏道路、管线、电力、邮电通信等公共设施的", "C": "简单挖土作业", "D": "需要临时停水、停电、中断道路交通的"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 346, "question": "下列关于生产安全事故调查的说法正确的是（\n）。\nA.事故调查组有权向有关单位和个人了解与事故有关的情况，并要求\n其提供相关文件、资料，任何单位和个人不得拒绝\nB.事故发生单位的负责人和有关人员在事故调查期间可以自行把握\n暂时离开岗位\nC.事故调查中发现涉嫌犯罪的，事故调查组应当及时将有关材料或其\n复印件移交人民政府处理\nD.未造成人员伤亡的一般事故，县级人民政府不可委托事故发生单位\n组织事故调查组进行调查", "options": {"A": "事故调查组有权向有关单位和个人了解与事故有关的情况，并要求 其提供相关文件、资料，任何单位和个人不得拒绝", "B": "事故发生单位的负责人和有关人员在事故调查期间可以自行把握 暂时离开岗位", "C": "事故调查中发现涉嫌犯罪的，事故调查组应当及时将有关材料或其 复印件移交人民政府处理", "D": "未造成人员伤亡的一般事故，县级人民政府不可委托事故发生单位 组织事故调查组进行调查"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 347, "question": "下列不属于依法应当进行保密听证程序的是（\n）。\nA.国家秘密\n\n=== 第117页 ===\nB.商业秘密\nC.个人隐私\nD.上市公司", "options": {"A": "国家秘密 === 第117页 ===", "B": "商业秘密", "C": "个人隐私", "D": "上市公司"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 348, "question": "下列不属于特种设备安全法的情况有（\n）。\nA.特种设备的生产（包括设计、制造、安装、改造、修理）\nB.特种设备的经营\nC.特种设备的使用\nD.特种设备的运输", "options": {"A": "特种设备的生产（包括设计、制造、安装、改造、修理）", "B": "特种设备的经营", "C": "特种设备的使用", "D": "特种设备的运输"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 349, "question": "下列不属于企业取得安全生产许可证必须具备的安全生产条件\n的是（\n）。\nA.建立健全安全生产责任制\nB.制定完备的安全生产规章制度和操作流程\nC.企业负责人学历要求为本科\nD.安全投入复核安全生产要求", "options": {"A": "建立健全安全生产责任制", "B": "制定完备的安全生产规章制度和操作流程", "C": "企业负责人学历要求为本科", "D": "安全投入复核安全生产要求"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 350, "question": "根据《工伤保险条例》规定：生活自理障碍分为三个等级（\n）。\nA.生活完全不能自理、生活大部分不能自理、生活少部分不能自理\nB.生活完全不能自理、生活大部分不能自理、生活部分不能自理\nC.生活完全不能自理、生活部分不能自理、生活不能自理\nD.生活完全大部分不能自理、生活少部分不能自理、生活不能自理\n\n=== 第118页 ===", "options": {"A": "生活完全不能自理、生活大部分不能自理、生活少部分不能自理", "B": "生活完全不能自理、生活大部分不能自理、生活部分不能自理", "C": "生活完全不能自理、生活部分不能自理、生活不能自理", "D": "生活完全大部分不能自理、生活少部分不能自理、生活不能自理 === 第118页 ==="}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 351, "question": "未成年工是指（\n）的劳动者。\nA.年满十四周岁未满十八周岁\nB.年满十六周岁未满十八周岁\nC.年满十六周岁未满二十周岁\nD.年满十八周岁未满二十周岁", "options": {"A": "年满十四周岁未满十八周岁", "B": "年满十六周岁未满十八周岁", "C": "年满十六周岁未满二十周岁", "D": "年满十八周岁未满二十周岁"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 352, "question": "违反消防安全管理规定的行为，由（\n）依法处罚。\nA.建设行政主管部门\nB.安全生产监督管理部门\nC.公安消防机构\nD.县级以上人民政府", "options": {"A": "建设行政主管部门", "B": "安全生产监督管理部门", "C": "公安消防机构", "D": "县级以上人民政府"}, "answer": "C", "type": "single", "category": "消防安全"}, {"id": 353, "question": "违反相关规定，建筑施工企业隐瞒有关情况申请安全生产许可证\n的，（\n）内不得申请安全生产许可证。\nA.半年\nB.1 年\nC.2 年\nD.3 年", "options": {"A": "半年", "B": "1 年", "C": "2 年", "D": "3 年"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 354, "question": "违反建设工程安全生产管理条例的规定，（\n）未提供建设工程\n安全生产作业环境及安全施工措施所需费用的，责令限期改正；逾期\n\n=== 第119页 ===\n未改正的，责令该建设工程停止施工。\nA.建设单位\nB.施工单位\nC.发包单位\nD.承包单位", "options": {"A": "建设单位", "B": "施工单位", "C": "发包单位", "D": "承包单位"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 355, "question": "违反《中华人民共和国建筑法》规定，未取得施工许可证或者开\n工报告未经批准擅自施工的，（\n），对不符合开工条件的责令停止\n施工，可以处以罚款。\nA.责令改正\nB.经济处罚\nC.停止施工\nD.停止施工并处经济处罚", "options": {"A": "责令改正", "B": "经济处罚", "C": "停止施工", "D": "停止施工并处经济处罚"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 356, "question": "违反《中华人民共和国建筑法》规定，未取得（\n）或者开工\n报告未经批准擅自施工的，责令改正，对不符合开工条件的责令停止\n施工，可以处以罚款。\nA.污水排放许可证\nB.施工许可证\nC.夜间施工许可证\nD.通行许可证", "options": {"A": "污水排放许可证", "B": "施工许可证", "C": "夜间施工许可证", "D": "通行许可证"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 357, "question": "违反《中华人民共和国大气污染防治法》规定，在接受监督检查\n时弄虚作假的，由县级以上人民政府（\n）主管部门或者其他负有\n大气环境保护监督管理职责的部门责令改正并处罚款。\nA.应急管理\nB.生态环境\nC.住房和城乡建设\nD.公安机关", "options": {"A": "应急管理", "B": "生态环境", "C": "住房和城乡建设", "D": "公安机关"}, "answer": "B", "type": "single", "category": "文明施工"}, {"id": 358, "question": "违法行为涉及公民生命健康安全、金融安全且有危害后果的，行\n政处罚期限延长至（\n）。\nA.两年\nB.三年\nC.四年\nD.五年", "options": {"A": "两年", "B": "三年", "C": "四年", "D": "五年"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 359, "question": "违法行为轻微并及时改正，没有造成危害后果的，（\n）行政处\n罚。\nA.从重\nB.免除\nC.不予\nD.从轻", "options": {"A": "从重", "B": "免除", "C": "不予", "D": "从轻"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 360, "question": "违法事实确凿并有法定依据，对公民处以（\n）元以下可以当\n场作出行政处罚决定。法律另有规定的，从其规定。\nA.五百\nB.二百\nC.一百\nD.五十", "options": {"A": "五百", "B": "二百", "C": "一百", "D": "五十"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 361, "question": "违法事实确凿并有法定依据，对法人组织处以（\n）元以下罚\n款或者警告的行政处罚的，可以当场作出行政处罚决定。\nA.五千\nB.三千\nC.两千\nD.一千", "options": {"A": "五千", "B": "三千", "C": "两千", "D": "一千"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 362, "question": "危险性较大的行业及人员密集场所经营单位，应当至少每（\n）\n组织1 次生产安全事故应急救援预案演练。\nA.半年\nB.1 年\nC.2 年\nD.3 年", "options": {"A": "半年", "B": "1 年", "C": "2 年", "D": "3 年"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 363, "question": "危险性较大的行业及人员密集场所经营单位，应当将其制定的生\n\n=== 第122页 ===\n产安全事故应急救援预案报送（\n）备案，并依法向社会公布。\nA.县级以上人民政府\nB.国务院\nC.县级以上人民政府负有安全生产监督管理职责的部门\nD.公安机关", "options": {"A": "县级以上人民政府", "B": "国务院", "C": "县级以上人民政府负有安全生产监督管理职责的部门", "D": "公安机关"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 364, "question": "危险物品的生产、经营、储存单位以及矿山、金属冶炼、（\n）、\n道路运输单位的主要负责人和安全生产管理人员，应当由主管的负有\n安全生产监督管理职责的部门对其安全生产知识和管理能力考核合\n格。考核不得收费。\nA.汽车生产\nB.建设单位\nC.建筑施工\nD.监理单位", "options": {"A": "汽车生产", "B": "建设单位", "C": "建筑施工", "D": "监理单位"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 365, "question": "提出仲裁要求的一方应当自劳动争议发生之日起（\n）向劳动\n争议仲裁委员会提出书面申请。\nA.三十日内\nB.四十日内\nC.六十日内\nD.九十日内", "options": {"A": "三十日内", "B": "四十日内", "C": "六十日内", "D": "九十日内"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 366, "question": "特种作业人员转借、转让、冒用特种作业操作证的，给予警告，\n并处（\n）的罚款。\nA.1 千元以上5 千元以下\nB.3 千元以上5 千元以下\nC.3 千元以上8 千元以下\nD.2 千元以上1 万元以下", "options": {"A": "1 千元以上5 千元以下", "B": "3 千元以上5 千元以下", "C": "3 千元以上8 千元以下", "D": "2 千元以上1 万元以下"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 367, "question": "特种作业人员在特种作业操作证有效期内，连续从事本工种10\n年以上，严格遵守有关安全生产法律法规的，经原考核发证机关或者\n从业所在地考核发证机关同意，特种作业操作证的复审时间可以延长\n至每（\n）年1 次。\nA.4\nB.5\nC.6\nD.7", "options": {"A": "4", "B": "5", "C": "6", "D": "7"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 368, "question": "特种作业人员在劳动合同期满后变动工作单位的，（\n）不得以\n任何理由扣押其特种作业操作证。\nA.考核机关\nB.原工作单位\nC.现工作单位\nD.培训机构\n\n=== 第124页 ===", "options": {"A": "考核机关", "B": "原工作单位", "C": "现工作单位", "D": "培训机构 === 第124页 ==="}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 369, "question": "特种作业人员应当接受与其所从事的特种作业相应的安全技术\n理论培训和（\n）培训。\nA.数学知识\nB.语言知识\nC.实际操作\nD.逻辑思维", "options": {"A": "数学知识", "B": "语言知识", "C": "实际操作", "D": "逻辑思维"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 370, "question": "特种作业人员以欺骗、贿赂等不正当手段取得特种作业操作证的，\n（\n）年内不得再次申请特种作业操作证。\nA.1\nB.2\nC.3\nD.4", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 371, "question": "特种作业人员伪造、涂改特种作业操作证或者使用伪造的特种作\n业操作证的，给予警告，并处（\n）的罚款。\nA.5 百元以上1 千元以下\nB.1 千元以上5 千元以下\nC.3 千元以上5 千元以下\nD.3 千元以上8 千元以下", "options": {"A": "5 百元以上1 千元以下", "B": "1 千元以上5 千元以下", "C": "3 千元以上5 千元以下", "D": "3 千元以上8 千元以下"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 372, "question": "特种作业人员申请复审的，考核发证机关应当在收到申请之日起\n（\n）个工作日内完成复审工作。\nA.7\nB.10\nC.15\nD.20", "options": {"A": "7", "B": "10", "C": "15", "D": "20"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 373, "question": "特种作业人员的特种作业操作资格证书由（\n）建设主管部门\n规定统一的样式。\nA.国务院\nB.省级\nC.市级\nD.县级", "options": {"A": "国务院", "B": "省级", "C": "市级", "D": "县级"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 374, "question": "特种作业人员的特种作业操作证记载虚假信息的，（\n）年内不\n得再次申请特种作业操作证。\nA.1\nB.2\nC.3\nD.4", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 375, "question": "根据《防暑降温措施管理办法》的规定，用人单位应当在高温工\n\n=== 第126页 ===\n作环境设立（\n）。\nA.休闲娱乐场所\nB.休息场所\nC.健身场所\nD.饮食场所", "options": {"A": "休闲娱乐场所", "B": "休息场所", "C": "健身场所", "D": "饮食场所"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 376, "question": "特种作业操作资格考试包括安全技术理论考试和实际操作考试\n两部分。考试不及格的，允许补考（\n）次。\nA.1\nB.2\nC.3\nD.4", "options": {"A": "1", "B": "2", "C": "3", "D": "4"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 377, "question": "特种作业操作证需要复审的，应当在期满前（\n）日内，由申\n请人或者申请人的用人单位向原考核发证机关或者从业所在地考核\n发证机关提出申请。\nA.15\nB.20\nC.30\nD.60", "options": {"A": "15", "B": "20", "C": "30", "D": "60"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 378, "question": "特种作业操作证申请复审或者延期复审前，特种作业人员应当参\n\n=== 第127页 ===\n加必要的安全培训并考试合格。安全培训时间不少于（\n）个学时。\nA.8\nB.16\nC.24\nD.48", "options": {"A": "8", "B": "16", "C": "24", "D": "48"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 379, "question": "特种设备检验、检测机构的检验、检测人员不得同时在两个以上\n检验、检测机构中执业；变更执业机构的，应当依法办理（\n）。\nA.注册手续\nB.变更手续\nC.登记手续\nD.注销手续", "options": {"A": "注册手续", "B": "变更手续", "C": "登记手续", "D": "注销手续"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 380, "question": "特别重大事故，是指造成（\n）人以上死亡，或者（\n）人以\n上重伤（包括急性工业中毒），或者（\n）元以上直接经济损失的事\n故。\nA.30；100；1 亿\nB.50；100；1 亿\nC.20；100；5000 万\nD.30；100；5000 万", "options": {"A": "30；100；1 亿", "B": "50；100；1 亿", "C": "20；100；5000 万", "D": "30；100；5000 万"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 381, "question": "事故发生后，事故现场有关人员应当立即向本单位负责人报告；\n\n=== 第128页 ===\n本单位负责人接到报告后，应当于（\n）小时内向事故发生地县级\n以上人民政府安全生产监督管理部门和负有安全生产监督管理职责\n的有关部门报告。\nA.1\nB.3\nC.12\nD.24", "options": {"A": "1", "B": "3", "C": "12", "D": "24"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 382, "question": "事故发生后，事故现场有关人员应当立即向（\n）报告。\nA.事故发生地县级以上人民政府安全生产监管部门\nB.本单位负责人\nC.负有安全生产监督管理职责的有关部门\nD.建设单位负责人", "options": {"A": "事故发生地县级以上人民政府安全生产监管部门", "B": "本单位负责人", "C": "负有安全生产监督管理职责的有关部门", "D": "建设单位负责人"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 383, "question": "事故发生地有关地方人民政府、安全生产监督管理部门和负有安\n全生产监督管理职责的有关部门接到事故报告后，其负责人应当\n（\n）。\nA.咨询有关专家，制定应急预案\nB.向上级领导报告，请求指示\nC.立即赶赴现场，组织事故救援\nD.处罚相关责任人", "options": {"A": "咨询有关专家，制定应急预案", "B": "向上级领导报告，请求指示", "C": "立即赶赴现场，组织事故救援", "D": "处罚相关责任人"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 384, "question": "生产经营单位的主要负责人未履行《安全生产法》规定的安全生\n产管理职责，导致发生一般事故的，由应急管理部门处上一年年收入\n（\n）的罚款。\nA.20%\nB.30%\nC.40%\nD.60%", "options": {"A": "20%", "B": "30%", "C": "40%", "D": "60%"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 385, "question": "生产经营单位的主要负责人未履行《安全生产法》规定的安全生\n产管理职责，导致发生较大事故的，由应急管理部门处上一年年收入\n（\n）的罚款。\nA.40%\nB.60%\nC.70%\nD.80%", "options": {"A": "40%", "B": "60%", "C": "70%", "D": "80%"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 386, "question": "根据《防暑降温措施管理办法》的规定，用人单位应当优先采用\n有利于控制高温的新技术、新工艺、新材料、（\n）。\nA.新产品\nB.新制造\nC.新设备\nD.新能源\n\n=== 第130页 ===", "options": {"A": "新产品", "B": "新制造", "C": "新设备", "D": "新能源 === 第130页 ==="}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 387, "question": "生产经营单位的主要负责人未履行《安全生产法》规定的安全生\n产管理职责，导致发生重大事故的，由应急管理部门处上一年年收入\n（\n）的罚款。\nA.40%\nB.60%\nC.70%\nD.80%", "options": {"A": "40%", "B": "60%", "C": "70%", "D": "80%"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 388, "question": "生产经营单位的主要负责人未履行《安全生产法》规定的安全生\n产管理职责，导致发生特别重大事故的，由应急管理部门处上一年年\n收入（\n）的罚款。\nA.60%\nB.80%\nC.100%\nD.120%", "options": {"A": "60%", "B": "80%", "C": "100%", "D": "120%"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 389, "question": "事故发生单位主要负责人受到刑事处罚或者撤职处分的，自刑罚\n执行完毕或者受处分之日起，（\n）年内不得担任任何生产经营单位\n的主要负责人。\nA.3\nB.5\n\n=== 第131页 ===\nC.7\nD.10", "options": {"A": "3", "B": "5 === 第131页 ===", "C": "7", "D": "10"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 390, "question": "事故发生单位应当认真吸取事故教训，落实防范和整改措施，防\n止事故再次发生。防范和整改措施的落实情况应当接受（\n）的监\n督。\nA.公安机关和人民法院\nB.工会和职工\nC.人民法院和人民检察院\nD.安全生产监督管理部门和负有安全生产监督管理职责的有关部门", "options": {"A": "公安机关和人民法院", "B": "工会和职工", "C": "人民法院和人民检察院", "D": "安全生产监督管理部门和负有安全生产监督管理职责的有关部门"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 391, "question": "根据《中华人民共和国消防法》规定，单位的（\n）是本单位\n的消防安全责任人。\nA.主要负责人\nB.法人代表\nC.消防安全员\nD.总经理", "options": {"A": "主要负责人", "B": "法人代表", "C": "消防安全员", "D": "总经理"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 392, "question": "根据《中华人民共和国消防法》规定，本行政区域内的消防安全\n重点单位，应由（\n）报本级人民政府备案。\nA.消防救援机构\nB.应急管理部门\n\n=== 第132页 ===\nC.公安机关部门\nD.住房和城乡建设部门", "options": {"A": "消防救援机构", "B": "应急管理部门 === 第132页 ===", "C": "公安机关部门", "D": "住房和城乡建设部门"}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 393, "question": "根据《中华人民共和国消防法》的规定，单位的（\n）是本单\n位的消防安全责任人。\nA.分管生产负责人\nB.安全总监\nC.主要负责人\nD.工会主席", "options": {"A": "分管生产负责人", "B": "安全总监", "C": "主要负责人", "D": "工会主席"}, "answer": "C", "type": "single", "category": "消防安全"}, {"id": 394, "question": "根据《中华人民共和国消防法》的规定，（\n）应当组织开展经\n常性的消防宣传教育，提高公民的消防安全意识。\nA.生产经营单位\nB.救援组织\nC.消防救援队\nD.各级人民政府", "options": {"A": "生产经营单位", "B": "救援组织", "C": "消防救援队", "D": "各级人民政府"}, "answer": "D", "type": "single", "category": "消防安全"}, {"id": 395, "question": "根据《中华人民共和国特种设备安全法》规定国家对特种设备实\n行（\n）。\nA.目录管理\nB.安全管理\nC.实名制管理\n\n=== 第133页 ===\nD.跟踪管理", "options": {"A": "目录管理", "B": "安全管理", "C": "实名制管理 === 第133页 ===", "D": "跟踪管理"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 396, "question": "根据《中华人民共和国特种设备安全法》规定，移动式压力容器、\n气瓶充装单位对不符合安全技术规范要求的移动式压力容器和气瓶\n进行充装的，责令改正，处二万元以上二十万元以下罚款；情节严重\n的，（\n）。\nA.吊销安全生产许可证\nB.吊销生产许可证\nC.吊销营业执照\nD.吊销充装许可证", "options": {"A": "吊销安全生产许可证", "B": "吊销生产许可证", "C": "吊销营业执照", "D": "吊销充装许可证"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 397, "question": "根据《中华人民共和国特种设备安全法》规定，未经许可，擅自\n从事移动式压力容器或者气瓶充装活动的，予以取缔，没收（\n），\n处十万元以上五十万元以下罚款。\nA.违法充装的气瓶\nB.违法所得\nC.违法财产\nD.吊销充装许可证", "options": {"A": "违法充装的气瓶", "B": "违法所得", "C": "违法财产", "D": "吊销充装许可证"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 398, "question": "根据《中华人民共和国特种设备安全法》规定，违反本法规定，\n未进行型式试验的，责令限期改正；逾期未改正的，处（\n）罚款。\nA.处十万元以上五十万元以下\n\n=== 第134页 ===\nB.处五万元以上五十万元以下\nC.三万元以上三十万元以下\nD.二万元以上二十万元以下", "options": {"A": "处十万元以上五十万元以下 === 第134页 ===", "B": "处五万元以上五十万元以下", "C": "三万元以上三十万元以下", "D": "二万元以上二十万元以下"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 399, "question": "根据《中华人民共和国特种设备安全法》规定，违反本法规定\n（\n），责令改正，没收违法制造的特种设备，处五万元以上五十万\n元以下罚款。\nA.未经许可\nB.特种设备的设计文件未经鉴定，擅自用于制造的\nC.未进行型式试验的，责令限期改正且逾期未改正的\nD.特种设备出厂时，未按照安全技术规范的要求随附相关技术资料和\n文件的，责令限期改正；逾期未改正的", "options": {"A": "未经许可", "B": "特种设备的设计文件未经鉴定，擅自用于制造的", "C": "未进行型式试验的，责令限期改正且逾期未改正的", "D": "特种设备出厂时，未按照安全技术规范的要求随附相关技术资料和 文件的，责令限期改正；逾期未改正的"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 400, "question": "根据《中华人民共和国特种设备安全法》规定，特种设备在（\n）\n的使用管理和维护保养义务由特种设备出租单位承担，法律另有规定\n或者当事人另有约定的除外。\nA.生产期间\nB.维保期间\nC.出租期间\nD.使用期间", "options": {"A": "生产期间", "B": "维保期间", "C": "出租期间", "D": "使用期间"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 401, "question": "根据《中华人民共和国特种设备安全法》规定，特种设备销售单\n\n=== 第135页 ===\n位应当建立（\n）。\nA.特种设备维保制度\nB.特种设备检查验收和销售记录制度\nC.特种设备安装制度\nD.特种设备使用制度", "options": {"A": "特种设备维保制度", "B": "特种设备检查验收和销售记录制度", "C": "特种设备安装制度", "D": "特种设备使用制度"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 402, "question": "根据《中华人民共和国特种设备安全法》规定，特种设备销售单\n位未建立检查验收和销售记录制度，或者进口特种设备未履行提前告\n知义务的，责令改正，处（\n）罚款。\nA.一万元以上十万元以下\nB.二万元以上二十万元以下\nC.三万元以上三十万元以下\nD.五万元以上五十万元以下", "options": {"A": "一万元以上十万元以下", "B": "二万元以上二十万元以下", "C": "三万元以上三十万元以下", "D": "五万元以上五十万元以下"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 403, "question": "根据《中华人民共和国特种设备安全法》规定，特种设备销售单\n位可以销售（\n）的特种设备。\nA.未取得许可生产的特种设备\nB.未经检验的特种设备\nC.未达到报废标准的特种设备\nD.国家明令淘汰的特种设备", "options": {"A": "未取得许可生产的特种设备", "B": "未经检验的特种设备", "C": "未达到报废标准的特种设备", "D": "国家明令淘汰的特种设备"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 404, "question": "根据《中华人民共和国特种设备安全法》规定，特种设备使用单\n\n=== 第136页 ===\n位有下列情况之一的（\n），责令限期改正；逾期未改正的，责令停\n止使用有关特种设备，处一万元以上十万元以下罚款。\nA.使用特种设备未按照规定办理使用登记的\nB.已建立特种设备符合要求的安全技术档案\nC.对其使用的特种设备进行了经常性维护保养和定期自行检查\nD.制定了制定特种设备事故应急专项预案的", "options": {"A": "使用特种设备未按照规定办理使用登记的", "B": "已建立特种设备符合要求的安全技术档案", "C": "对其使用的特种设备进行了经常性维护保养和定期自行检查", "D": "制定了制定特种设备事故应急专项预案的"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 405, "question": "根据《中华人民共和国特种设备安全法》规定，特种设备生产、\n经营、使用单位应当按照安全技术规范的要求向特种设备检验、检测\n机构及其检验、检测人员提供特种设备相关资料和必要的检验、检测\n条件，并对资料的（\n）负责。\nA.公正性\nB.程序性\nC.真实性\nD.专业性", "options": {"A": "公正性", "B": "程序性", "C": "真实性", "D": "专业性"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 406, "question": "根据《中华人民共和国特种设备安全法》规定，特种设备进行改\n造、修理，按照规定需要变更使用登记的，应当办理（\n），方可继\n续使用。\nA.使用登记\nB.变更登记\nC.注销登记\n\n=== 第137页 ===\nD.注册登记", "options": {"A": "使用登记", "B": "变更登记", "C": "注销登记 === 第137页 ===", "D": "注册登记"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 407, "question": "根据《中华人民共和国特种设备安全法》规定，特种设备检验、\n检测机构及其检验、检测人员在检验、检测中发现特种设备存在严重\n事故隐患时，应当及时告知相关单位，并立即向（\n）报告。\nA.维保单位有关负责人\nB.监理单位有关负责人\nC.使用有关负责人\nD.负责特种设备安全监督管理的部门", "options": {"A": "维保单位有关负责人", "B": "监理单位有关负责人", "C": "使用有关负责人", "D": "负责特种设备安全监督管理的部门"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 408, "question": "根据《中华人民共和国特种设备安全法》规定，特种设备检验、\n检测机构及其检验、检测人员应当客观、公正、及时地出具检验、检\n测报告，并对检验、检测（\n）负责。\nA.过程和鉴定结论\nB.结果和鉴定过程\nC.结果或鉴定结论\nD.结果和鉴定结论", "options": {"A": "过程和鉴定结论", "B": "结果和鉴定过程", "C": "结果或鉴定结论", "D": "结果和鉴定结论"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 409, "question": "根据《中华人民共和国特种设备安全法》规定，特种设备发生\n（\n），由国务院或者国务院授权有关部门组织事故调查组进行调查。\nA.一般事故\nB.较大事故\n\n=== 第138页 ===\nC.重大事故\nD.特别重大事故", "options": {"A": "一般事故", "B": "较大事故 === 第138页 ===", "C": "重大事故", "D": "特别重大事故"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 410, "question": "根据《中华人民共和国特种设备安全法》规定，特种设备的设计\n文件未经鉴定，擅自用于制造的，责令改正，没收违法制造的特种设\n备，处（\n）罚款。\nA.处十万元以上五十万元以下\nB.处五万元以上五十万元以下\nC.三万元以上三十万元以下\nD.二万元以上二十万元以下", "options": {"A": "处十万元以上五十万元以下", "B": "处五万元以上五十万元以下", "C": "三万元以上三十万元以下", "D": "二万元以上二十万元以下"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 411, "question": "根据《中华人民共和国特种设备安全法》规定，特种设备存在严\n重事故隐患，无改造、修理价值，或者达到安全技术规范规定的其他\n报废条件的，特种设备使用单位应当依法履行（\n），采取必要措施\n消除该特种设备的使用功能，并向原登记的负责特种设备安全监督管\n理的部门办理使用登记证书注销手续。\nA.告知义务\nB.注销义务\nC.登记义务\nD.报废义务", "options": {"A": "告知义务", "B": "注销义务", "C": "登记义务", "D": "报废义务"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 412, "question": "根据《中华人民共和国特种设备安全法》规定，特种设备出租单\n\n=== 第139页 ===\n位可以出租（\n）。\nA.未取得许可生产的特种设备\nB.未经检验的特种设备\nC.检验合格的特种设备\nD.国家明令淘汰的特种设备", "options": {"A": "未取得许可生产的特种设备", "B": "未经检验的特种设备", "C": "检验合格的特种设备", "D": "国家明令淘汰的特种设备"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 413, "question": "根据《中华人民共和国特种设备安全法》规定，特种设备出现故\n障或者发生异常情况，特种设备（\n）应当对其进行全面检查，消\n除事故隐患，方可继续使用。\nA.安装单位\nB.使用单位\nC.租赁单位\nD.特种设备检验机构", "options": {"A": "安装单位", "B": "使用单位", "C": "租赁单位", "D": "特种设备检验机构"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 414, "question": "根据《中华人民共和国特种设备安全法》规定，特种设备出厂时，\n未按照安全技术规范的要求随附相关技术资料和文件的，责令限期改\n正；逾期未改正的，责令停止制造、销售，处（\n）罚款；有违法\n所得的，没收违法所得。\nA.处十万元以上五十万元以下\nB.处五万元以上五十万元以下\nC.三万元以上三十万元以下\nD.二万元以上二十万元以下\n\n=== 第140页 ===", "options": {"A": "处十万元以上五十万元以下", "B": "处五万元以上五十万元以下", "C": "三万元以上三十万元以下", "D": "二万元以上二十万元以下 === 第140页 ==="}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 415, "question": "根据《中华人民共和国特种设备安全法》规定，特种设备安装、\n改造、修理竣工后，安装、改造、修理的施工单位应当在验收后三十\n日内将相关技术资料和文件移交特种设备（\n）。\nA.施工单位\nB.监理单位\nC.使用单位\nD.安全监督管理的部门", "options": {"A": "施工单位", "B": "监理单位", "C": "使用单位", "D": "安全监督管理的部门"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 416, "question": "根据《中华人民共和国特种设备安全法》规定，特种设备安全技\n术规范由（\n）负责特种设备安全监督管理的部门制定。\nA.市级人民政府负责特种设备安全监督管理的部门\nB.省级人民政府负责特种设备安全监督管理的部门\nC.国务院\nD.省人大", "options": {"A": "市级人民政府负责特种设备安全监督管理的部门", "B": "省级人民政府负责特种设备安全监督管理的部门", "C": "国务院", "D": "省人大"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 417, "question": "根据《中华人民共和国特种设备安全法》规定，特种设备安全管\n理人员应当对特种设备使用状况进行经常性检查，发现问题应当立即\n处理；情况紧急时，可以决定停止使用特种设备并及时报告（\n）。\nA.维保单位有关负责人\nB.监理单位有关负责人\nC.本单位有关负责人\n\n=== 第141页 ===\nD.负责特种设备安全监督管理的部门有关负责人", "options": {"A": "维保单位有关负责人", "B": "监理单位有关负责人", "C": "本单位有关负责人 === 第141页 ===", "D": "负责特种设备安全监督管理的部门有关负责人"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 418, "question": "根据《中华人民共和国特种设备安全法》规定，电梯制造单位有\n下列情形之一的，责令限期改正；逾期未改正的，处一万元以上十万\n元以下罚款（\n）。\nA.对电梯的安全运行情况进行跟踪调查和了解时，发现存在一般事故\n隐患\nB.对电梯的安全运行情况进行跟踪调查和了解时，发现存在严重事故\n隐患\nC.对电梯的安全运行情况进行跟踪调查和了解时，发现存在严重事故\n隐患，未及时告知电梯使用单位并向负责特种设备安全监督管理的部\n门报告的\nD.对电梯的安全运行情况进行跟踪调查和了解时，发现存在严重事故\n隐患，及时告知电梯使用单位并向负责特种设备安全监督管理的部门\n报告", "options": {"A": "对电梯的安全运行情况进行跟踪调查和了解时，发现存在一般事故 隐患", "B": "对电梯的安全运行情况进行跟踪调查和了解时，发现存在严重事故 隐患", "C": "对电梯的安全运行情况进行跟踪调查和了解时，发现存在严重事故 隐患，未及时告知电梯使用单位并向负责特种设备安全监督管理的部 门报告的", "D": "对电梯的安全运行情况进行跟踪调查和了解时，发现存在严重事故 隐患，及时告知电梯使用单位并向负责特种设备安全监督管理的部门 报告"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 419, "question": "《生产安全事故报告和调查处理条例》规定，工会依法参加事故\n（\n），有权向有关部门提出处理意见。\nA.善后处理\nB.调查处理\nC.人员处理\nD.现场处理\n\n=== 第142页 ===", "options": {"A": "善后处理", "B": "调查处理", "C": "人员处理", "D": "现场处理 === 第142页 ==="}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 420, "question": "（\n）必须按照国家有关规定经过专门的安全作业培训，并取\n得特种作业操作资格证书后，方可上岗作业。\nA.混凝土工\nB.电气焊作业人员\nC.抹灰工\nD.木工", "options": {"A": "混凝土工", "B": "电气焊作业人员", "C": "抹灰工", "D": "木工"}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 421, "question": "（\n）负责施工现场标牌、警示标识的保护和实施落实工作。\nA.设计单位\nB.施工单位\nC.监理单位\nD.建设单位", "options": {"A": "设计单位", "B": "施工单位", "C": "监理单位", "D": "建设单位"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 422, "question": "（\n）是一项具有方针政策性、专业技术性和广泛群众性的工\n作，是一项综合性的安全生产管理措施，是建立良好的安全生产环境、\n做好安全生产工作的重要手段之一。\nA.安全技术措施计划的制定\nB.安全评价\nC.安全检查\nD.安全生产监督", "options": {"A": "安全技术措施计划的制定", "B": "安全评价", "C": "安全检查", "D": "安全生产监督"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 423, "question": "（\n）为黄绿双色线。\nA.工作零线\nB.保护零线\nC.一般相线\nD.火线", "options": {"A": "工作零线", "B": "保护零线", "C": "一般相线", "D": "火线"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 424, "question": "安全生产第三方评价前，施工企业应先完成自我评价工作，并向\n委托的评价机构提供（\n）。\nA.政府评估报告\nB.第二方评价报告\nC.第三方评价报告\nD.自我评价报告", "options": {"A": "政府评估报告", "B": "第二方评价报告", "C": "第三方评价报告", "D": "自我评价报告"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 425, "question": "按照不同作业条件，合理配备灭火器材。如电气设备附件应设置\n（\n）的灭火器材。\nA.干粉类不导电\nB.卤代烷\nC.水型\nD.泡沫灭火器", "options": {"A": "干粉类不导电", "B": "卤代烷", "C": "水型", "D": "泡沫灭火器"}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 426, "question": "第二方评价由政府建设行政主管部门对（\n）实施的安全生产\n评价。\n\n=== 第144页 ===\nA.建设单位\nB.施工企业\nC.监理单位\nD.设计单位", "options": {"A": "建设单位", "B": "施工企业", "C": "监理单位", "D": "设计单位"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 427, "question": "对搭设高度在5m 及以上的混凝土模板支撑工程需编制（\n）。\nA.专项组织设计\nB.专项施工设计\nC.安全专项施工方案\nD.安全施工措施", "options": {"A": "专项组织设计", "B": "专项施工设计", "C": "安全专项施工方案", "D": "安全施工措施"}, "answer": "C", "type": "single", "category": "脚手架与模板工程"}, {"id": 428, "question": "对于按照规定需要验收的危险性较大的分部分项工程，施工单位、\n监理单位应当组织相关人员进行验收。验收合格的，经施工单位项目\n（\n）及总监理工程师签字确认后，方可进入下一道工序。\nA.技术负责人\nB.管理人员\nC.项目负责人\nD.施工人员", "options": {"A": "技术负责人", "B": "管理人员", "C": "项目负责人", "D": "施工人员"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 429, "question": "各行业的管理部门根据（\n）的原则，在各自的工作职责范围\n内，行使行业管理的职能，贯彻执行国家安全生产方针、政策、法律\n法规及规范规章。\n\n=== 第145页 ===\nA.管行业必须管安全\nB.安全第一\nC.生产安全两手抓\nD.预防为主；综合治理", "options": {"A": "管行业必须管安全", "B": "安全第一", "C": "生产安全两手抓", "D": "预防为主；综合治理"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 430, "question": "根据（\n）原则，分包单位在施工期间发生各类事故，应及时\n组织抢救伤员、保护现场，并立即向总包方和自己的上级单位以及有\n关部门汇报。\nA.“谁施工谁负责安全、防火”\nB.施工总承包负全责\nC.管生产必管安全\nD.分包单位有限责任", "options": {"A": "“谁施工谁负责安全、防火”", "B": "施工总承包负全责", "C": "管生产必管安全", "D": "分包单位有限责任"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 431, "question": "工程项目开工前，由施工组织设计编制人、审批人向参加施工的\n（\n）、班组长进行施工组织设计及安全技术措施交底。\nA.安全管理人员\nB.施工管理人员\nC.技术负责人\nD.项目负责人", "options": {"A": "安全管理人员", "B": "施工管理人员", "C": "技术负责人", "D": "项目负责人"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 432, "question": "工伤保险制度应规范和简化工伤认定和（\n）程序。\nA.生活能力鉴定\n\n=== 第146页 ===\nB.劳动能力鉴定\nC.劳动技能鉴定\nD.劳动体力鉴定", "options": {"A": "生活能力鉴定 === 第146页 ===", "B": "劳动能力鉴定", "C": "劳动技能鉴定", "D": "劳动体力鉴定"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 433, "question": "国家标准《安全色》GB2893 中规定，红色代表的含义是（\n）。\nA.禁止\nB.警告\nC.注意\nD.提示安全", "options": {"A": "禁止", "B": "警告", "C": "注意", "D": "提示安全"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 434, "question": "机械设备在安装、使用、拆除前，应由（\n）对机械设备操作\n人员进行安全技术交底，形成安全技术交底记录，经双方签字确认后\n方可实施，并及时存档。\nA.项目施工技术人员\nB.安全员\nC.监理人员\nD.项目负责人", "options": {"A": "项目施工技术人员", "B": "安全员", "C": "监理人员", "D": "项目负责人"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 435, "question": "建筑工程安全生产信用监督和失信惩戒制度。将建筑工程安全生\n产各方责任主体和从业人员安全生产不良行为记录在案，并利用网络、\n媒体等向全社会公示，加大安全生产社会（\n）力度。\nA.监察\n\n=== 第147页 ===\nB.管理\nC.监督\nD.治理", "options": {"A": "监察 === 第147页 ===", "B": "管理", "C": "监督", "D": "治理"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 436, "question": "禁止标志的几何图形是带斜杠的圆环，其中圆环与斜杠相连，用\n红色；图形符号用（\n）色，背景用白色。\nA.黑\nB.红\nC.蓝\nD.灰", "options": {"A": "黑", "B": "红", "C": "蓝", "D": "灰"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 437, "question": "危大工程专项施工方案实施前，编制人员或者（\n）应当向施\n工现场管理人员进行方案交底。施工现场管理人员应当向作业人员进\n行安全技术交底，并由双方和项目专职安全生产管理人员共同签字确\n认。\nA.项目副经理\nB.项目技术负责人\nC.班组长\nD.项目经理", "options": {"A": "项目副经理", "B": "项目技术负责人", "C": "班组长", "D": "项目经理"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 438, "question": "起重吊装及安装拆除工程，采用非常规起重设备、方法的，且\n（\n），需要编制安全专项施工方案。\n\n=== 第148页 ===\nA.遇到雨雪天气\nB.单件起吊重量在10kN 及以上的起重吊装工程\nC.脚手架的安拆\nD.基坑开挖、支护及降水工程", "options": {"A": "遇到雨雪天气", "B": "单件起吊重量在10kN 及以上的起重吊装工程", "C": "脚手架的安拆", "D": "基坑开挖、支护及降水工程"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 439, "question": "为保证施工现场交叉作业安全，下层作业位置应处于上层作业的\n坠落半径之外。在高度24m 的楼层作业面施工时，其坠落半径是（\n）。\nA.3m\nB.4m\nC.5m\nD.6m", "options": {"A": "3m", "B": "4m", "C": "5m", "D": "6m"}, "answer": "C", "type": "single", "category": "高处作业"}, {"id": 440, "question": "施工现场灭火器的配置数量应按照《建筑灭火器配置设计规范》\n（GB50140）经计算确定，且每个场所的灭火器数量不应少于（\n）\n具。\nA.2\nB.3\nC.4\nD.5", "options": {"A": "2", "B": "3", "C": "4", "D": "5"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 441, "question": "根据《建设工程施工现场环境与卫生标准》(JGJ146-2013)，施工\n现场的宿舍应实行单人单床，每房间居住人数不得超过（\n）人，\n\n=== 第149页 ===\n严禁睡通铺。\nA.12\nB.14\nC.16\nD.18", "options": {"A": "12", "B": "14", "C": "16", "D": "18"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 442, "question": "施工现场食堂必须有（\n）。\nA.营业执照\nB.卫生许可证\nC.环保合格证\nD.税务登记证", "options": {"A": "营业执照", "B": "卫生许可证", "C": "环保合格证", "D": "税务登记证"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 443, "question": "为保证有效投入安全资金，企业应编制（\n）。\nA.资金使用计划\nB.安全技术措施计划\nC.施工组织计划\nD.资金审查计划", "options": {"A": "资金使用计划", "B": "安全技术措施计划", "C": "施工组织计划", "D": "资金审查计划"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 444, "question": "下列不需要组织专家论证的是（\n）。\nA.开挖深度超过5m（含5m）的基坑（槽）的土方开挖、支护、降水\n工程\nB.开挖深度虽未超过5m；但地质条件、周围环境和地下管线复杂的\n\n=== 第150页 ===\n基坑（槽）的土方开挖、支护、降水工程\nC.开挖深度虽未超过5m；但影响毗邻建筑（构筑）物安全的基坑（槽）\n的土方开挖、支护、降水工程\nD.采用非常规起重设备、方法；且单件起吊重量在10KN 及以上的起\n重吊装工程", "options": {"A": "开挖深度超过5m（含5m）的基坑（槽）的土方开挖、支护、降水 工程", "B": "开挖深度虽未超过5m；但地质条件、周围环境和地下管线复杂的 === 第150页 === 基坑（槽）的土方开挖、支护、降水工程", "C": "开挖深度虽未超过5m；但影响毗邻建筑（构筑）物安全的基坑（槽） 的土方开挖、支护、降水工程", "D": "采用非常规起重设备、方法；且单件起吊重量在10KN 及以上的起 重吊装工程"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 445, "question": "下列关于安全施工技术交底说法正确的是（\n）。\nA.施工单位负责项目管理的技术人员向专职安全生产管理人员交底\nB.专职安全生产管理人员向施工作业人员交底\nC.施工单位负责项目管理的技术人员向施工作业人员的交底\nD.施工作业人员向施工单位负责人交底", "options": {"A": "施工单位负责项目管理的技术人员向专职安全生产管理人员交底", "B": "专职安全生产管理人员向施工作业人员交底", "C": "施工单位负责项目管理的技术人员向施工作业人员的交底", "D": "施工作业人员向施工单位负责人交底"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 446, "question": "下列哪个选项不是燃烧的基本条件（\n）。\nA.火源\nB.风力\nC.可燃物\nD.助燃物", "options": {"A": "火源", "B": "风力", "C": "可燃物", "D": "助燃物"}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 447, "question": "下列哪一个是施工现场水污染防治措施的内容（\n）。\nA.路面及其余场地地面要硬化\nB.禁止将有毒有害废弃物用作土方回填\nC.施工现场办公室、仓库等；保持清洁卫生；建立卫生区域经常打扫\n\n=== 第151页 ===\nD.严禁在工程室内用有机溶剂清洗施工用具", "options": {"A": "路面及其余场地地面要硬化", "B": "禁止将有毒有害废弃物用作土方回填", "C": "施工现场办公室、仓库等；保持清洁卫生；建立卫生区域经常打扫 === 第151页 ===", "D": "严禁在工程室内用有机溶剂清洗施工用具"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 448, "question": "下列施工平面布置原则说法错误的是（\n）。\nA.现场布置全面；增加施工用地\nB.材料尽量靠近使用地点；减少二次搬运\nC.临时设施的布置；应便于工人生产和生活；办公用房靠近施工现场；\n福利设施应在生活区范围之内\nD.平面图布置应符合安全、消防、环境保护的要求", "options": {"A": "现场布置全面；增加施工用地", "B": "材料尽量靠近使用地点；减少二次搬运", "C": "临时设施的布置；应便于工人生产和生活；办公用房靠近施工现场； 福利设施应在生活区范围之内", "D": "平面图布置应符合安全、消防、环境保护的要求"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 449, "question": "下面关于“十不吊”原则说法错误的是（\n）。\nA.信号指挥不明不准吊\nB.斜牵斜挂不准吊\nC.埋在地下物不准吊\nD.五级以上强风不准吊", "options": {"A": "信号指挥不明不准吊", "B": "斜牵斜挂不准吊", "C": "埋在地下物不准吊", "D": "五级以上强风不准吊"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 450, "question": "由政府建设行政主管部门对施工企业实施的安全生产评价，称为\n（\n）。\nA.第一方评价\nB.第二方评价\nC.第三方评价\nD.上级督查", "options": {"A": "第一方评价", "B": "第二方评价", "C": "第三方评价", "D": "上级督查"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 451, "question": "生产经营项目、场所发包或者出租给其他单位的，生产经营单位\n应当与承包单位、承租单位签订专门的（\n），或者在承包合同、租\n赁合同中约定各自的安全生产管理职责。\nA.责任分工协议\nB.现场管理协议\nC.安全生产管理协议\nD.安全生产分工协议", "options": {"A": "责任分工协议", "B": "现场管理协议", "C": "安全生产管理协议", "D": "安全生产分工协议"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 452, "question": "重大危险源是指长期地或临时地生产、加工、搬运、使用或贮存\n危险物质，且危险物质的（\n）等于或超过临界量的单元。\nA.重量\nB.数量\nC.质量\nD.数目", "options": {"A": "重量", "B": "数量", "C": "质量", "D": "数目"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 453, "question": "根据《施工企业安全生产评价标准》（JGJ/T77-2010），施工企业\n安全生产考核评定分为（\n）个等级。\nA.一\nB.二\nC.三\nD.四", "options": {"A": "一", "B": "二", "C": "三", "D": "四"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 454, "question": "下列（\n）不属于特种作业人员。\nA.锅炉司炉工\nB.厂内机车驾驶人员\nC.钳工\nD.起重司索作业人员", "options": {"A": "锅炉司炉工", "B": "厂内机车驾驶人员", "C": "钳工", "D": "起重司索作业人员"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 455, "question": "下列关于建设工程分包的说法，正确的是（\n）。\nA.总承包单位可以将全部建设工程拆分成若干部分后全部分包给其\n他施工企业\nB.总承包单位可以按照合同约定将建设工程部分非主体、非关键性工\n作分包给其他企业\nC.总承包单位可以将建设工程主体结构中技术较为复杂的部分分包\n给其他企业\nD.总承包单位经建设单位同意后，可以将建设工程的关键性工作分包\n给其他企业", "options": {"A": "总承包单位可以将全部建设工程拆分成若干部分后全部分包给其 他施工企业", "B": "总承包单位可以按照合同约定将建设工程部分非主体、非关键性工 作分包给其他企业", "C": "总承包单位可以将建设工程主体结构中技术较为复杂的部分分包 给其他企业", "D": "总承包单位经建设单位同意后，可以将建设工程的关键性工作分包 给其他企业"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 456, "question": "气瓶的瓶体有肉眼可见的突起（鼓包）缺陷的，应如何处理？\n（\n）\nA.维修处理\nB.送有资质的单位进行检测维修\nC.报废处理\nD.改造使用\n\n=== 第154页 ===", "options": {"A": "维修处理", "B": "送有资质的单位进行检测维修", "C": "报废处理", "D": "改造使用 === 第154页 ==="}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 457, "question": "安全“3E 原则”指的是利用（\n）防止事故的发生。\nA.技术对策、教育对策、管理对策\nB.技术对策、教育对策、预防对策\nC.管理对策、预防对策、技术对策\nD.管理对策、预防对策、教育对策", "options": {"A": "技术对策、教育对策、管理对策", "B": "技术对策、教育对策、预防对策", "C": "管理对策、预防对策、技术对策", "D": "管理对策、预防对策、教育对策"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 458, "question": "安全生产“四不伤害”是指（\n）。\nA.不伤害自己，不伤害他人，不被他人伤害，保护他人不受伤害\nB.不伤害自己，不伤害他人，不伤害公共财产，保护他人不受伤害\nC.不伤害他人，不被他人伤害，不被物体伤害，保护他人不受伤害\nD.不伤害自己，不伤害他人，不被物体伤害，保护他人不受伤害", "options": {"A": "不伤害自己，不伤害他人，不被他人伤害，保护他人不受伤害", "B": "不伤害自己，不伤害他人，不伤害公共财产，保护他人不受伤害", "C": "不伤害他人，不被他人伤害，不被物体伤害，保护他人不受伤害", "D": "不伤害自己，不伤害他人，不被物体伤害，保护他人不受伤害"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 459, "question": "施工现场发生生产安全事故后，以下哪项处理措施是错误的\n（\n）。\nA.事故现场有关人员应当立即报告本单位负责人\nB.单位负责人接到事故报告后，应当首先向当地负有安全生产监督管\n理职责的部门报告，根据负有安全生产监督管理职责的部门的指令组\n织抢救\nC.单位负责人接到事故报告后，应当迅速采取有效措施，组织抢救。\n防止事故扩大，减少人员伤亡和财产损失\nD.单位负责人应当按照国家有关规定立即如实报告当地负有安全生\n\n=== 第155页 ===\n产监督管理职责的", "options": {"A": "事故现场有关人员应当立即报告本单位负责人", "B": "单位负责人接到事故报告后，应当首先向当地负有安全生产监督管 理职责的部门报告，根据负有安全生产监督管理职责的部门的指令组 织抢救", "C": "单位负责人接到事故报告后，应当迅速采取有效措施，组织抢救。 防止事故扩大，减少人员伤亡和财产损失", "D": "单位负责人应当按照国家有关规定立即如实报告当地负有安全生 === 第155页 === 产监督管理职责的"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 460, "question": "施工单位在组织施工现场高处坠落事故应急演练活动前，编制了\n《高处坠落事故应急演练工作方案》。根据《生产安全事故应急演练\n基本规范》（AQ/T 9007-2019），不属于应急演练工作方案内容的是\n（\n）。\nA.建筑施工现场高处坠落事故情景设计\nB.参加演练单位和人员主要任务及职责\nC.应急演练中止条件和程序\nD.应急演练技术支撑及保障条件", "options": {"A": "建筑施工现场高处坠落事故情景设计", "B": "参加演练单位和人员主要任务及职责", "C": "应急演练中止条件和程序", "D": "应急演练技术支撑及保障条件"}, "answer": "C", "type": "single", "category": "脚手架与模板工程"}, {"id": 461, "question": "习近平总书记在中国共产党第十九次全国代表大会报告中指出，\n健全公共安全体系，完善安全生产责任制，坚决遏制重特大安全事故，\n提升防灾减灾救灾能力，打造共建共治共享的社会治理格局。关于习\n近平总书记安全发展观的思想，正确的是（\n）。\nA.树立安全发展理念，弘扬安全第一、以人为本的思想\nB.树立以人为本理念，弘扬预防为主、安全第一的思想\nC.树立安全发展理念，弘扬生命至上、安全第一的思想\nD.树立以人为本理念，弘扬安全第一、协调发展的思想", "options": {"A": "树立安全发展理念，弘扬安全第一、以人为本的思想", "B": "树立以人为本理念，弘扬预防为主、安全第一的思想", "C": "树立安全发展理念，弘扬生命至上、安全第一的思想", "D": "树立以人为本理念，弘扬安全第一、协调发展的思想"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 462, "question": "某交通运输股份有限公司的组织机构包括董事会，监事会、工会、\n总工办、调度室、安全处、财务处等。公司设总经理、安全总监等管\n\n=== 第156页 ===\n理岗位。根据有关规定，该公司安全生产投入资金予以决策的是（\n）。\nA.董事会\nB.董事长\nC.总经理\nD.安全总监", "options": {"A": "董事会", "B": "董事长", "C": "总经理", "D": "安全总监"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 463, "question": "甲公司拟投资建设一大型商业综合体项目，由乙公司总承包，乙\n公司将土石方工程发包给丙公司，结构和给排水机电工程发包给丁公\n司。施工过程中，实施该建设项目的安全生产工作统一协调、管理的\n单位是（\n）。\nA.乙\nB.甲\nC.丙\nD.丁", "options": {"A": "乙", "B": "甲", "C": "丙", "D": "丁"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 464, "question": "甲公司实施一项大型技改项目，拟将与该项目配套的办公楼、工\n艺楼建设项目等发包给乙公司。按照相关要求，甲公司安全管理部门\n对乙公司进行了安全资质审查。下列乙公司提供的安全资质审查资料\n中，符合要求的是（\n）。\nA.法定代表人证明书、安全生产许可证、主要负责人安全生产考核合\n格证书、近两年的安全业绩\nB.法定代表人证明书、安全生产许可证、安全管理体系程序文件及有\n\n=== 第157页 ===\n效评审报告、近两年的安全业绩\nC.特种作业证书、安全生产许可证、主要负责人安全生产考核合格证\n书、近两年的安全业绩\nD.安全生产许可证、主要负责人安全资格证书、安全管理体系有效评\n审报告、近两年的安全业绩", "options": {"A": "法定代表人证明书、安全生产许可证、主要负责人安全生产考核合 格证书、近两年的安全业绩", "B": "法定代表人证明书、安全生产许可证、安全管理体系程序文件及有 === 第157页 === 效评审报告、近两年的安全业绩", "C": "特种作业证书、安全生产许可证、主要负责人安全生产考核合格证 书、近两年的安全业绩", "D": "安全生产许可证、主要负责人安全资格证书、安全管理体系有效评 审报告、近两年的安全业绩"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 465, "question": "某企业在推动安全文化建设过程中，首先从人员的行为规范入手，\n在厂区内实行人车分流管理模式，指定人车行走轨迹路线，倡导员工\n\"两人成行，三人成列\"。按照指定的人行路线出入厂区，形成了浓厚\n的安全文化氛围。2024 年9 月，企业从学校和社会分别招聘了5 名\n员工。一周后，这10 名员工也按照指定行走路线，自觉做到出入厂\n区时\"两人成行，三人成列\"。新员工的这种行为，体现了安全文化功\n能中的（\n）。\nA.导向功能\nB.激励功能\nC.辐射和同化功能\nD.凝聚功能", "options": {"A": "导向功能", "B": "激励功能", "C": "辐射和同化功能", "D": "凝聚功能"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 466, "question": "（\n）的含义是强制人们必须做出某种动作或采用防范措施的\n图形标志。\nA.指令标志\nB.辅助标志\n\n=== 第158页 ===\nC.说明标志\nD.警告标志", "options": {"A": "指令标志", "B": "辅助标志 === 第158页 ===", "C": "说明标志", "D": "警告标志"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 467, "question": "（\n）应当在施工现场采取维护安全、防范危险、预防火灾等\n措施，有条件的，应当对施工现场实行封闭管理。\nA.各级人民政府\nB.监理单位\nC.建筑施工企业\nD.建设单位", "options": {"A": "各级人民政府", "B": "监理单位", "C": "建筑施工企业", "D": "建设单位"}, "answer": "C", "type": "single", "category": "消防安全"}, {"id": 468, "question": "安全标志按其用途可分为（\n）、警告标志、指令标志和提示标\n志四大类型。\nA.禁令标志\nB.危险标志\nC.提醒标志\nD.禁止标志", "options": {"A": "禁令标志", "B": "危险标志", "C": "提醒标志", "D": "禁止标志"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 469, "question": "安全带在使用（\n）后应抽验一次，使用频繁的绳要经常进行\n外观检查，发现异常必须立即更换。\nA.一年\nB.两年\nC.三年\n\n=== 第159页 ===\nD.四年", "options": {"A": "一年", "B": "两年", "C": "三年 === 第159页 ===", "D": "四年"}, "answer": "B", "type": "single", "category": "高处作业"}, {"id": 470, "question": "安全生产监督管理部门和负有安全生产监督管理职责的有关部\n门逐级上报事故情况，每级上报的时间不得超过（\n）。\nA.1 小时\nB.2 小时\nC.3 小时\nD.4 小时", "options": {"A": "1 小时", "B": "2 小时", "C": "3 小时", "D": "4 小时"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 471, "question": "安装单位、使用单位拒不整改生产安全事故隐患的，（\n）接到\n监理单位报告后，应当责令安装单位、使用单位立即停工整改。\nA.建设单位\nB.安装单位\nC.监理单位\nD.总承包单位", "options": {"A": "建设单位", "B": "安装单位", "C": "监理单位", "D": "总承包单位"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 472, "question": "超过一定规模的危险性较大的分部分项工程专项方案应当由\n（\n）组织召开专家论证会。\nA.建设单位\nB.监理单位\nC.施工单位\nD.施工总承包单位\n\n=== 第160页 ===", "options": {"A": "建设单位", "B": "监理单位", "C": "施工单位", "D": "施工总承包单位 === 第160页 ==="}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 473, "question": "对于建筑施工企业的分公司、区域公司等较大的分支机构应依据\n实际生产情况配置不少于（\n）的专职安全生产管理人员。\nA.5 人\nB.4 人\nC.3 人\nD.2 人", "options": {"A": "5 人", "B": "4 人", "C": "3 人", "D": "2 人"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 474, "question": "根据《特种作业人员安全技术培训考核管理规定》，特种作业是\n指容易发生事故，对操作者本人、（\n）及设备、设施的安全可能造\n成重大危害的作业。\nA.劳动者的安全\nB.其他劳动者\nC.项目安全\nD.他人的安全健康", "options": {"A": "劳动者的安全", "B": "其他劳动者", "C": "项目安全", "D": "他人的安全健康"}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 475, "question": "工程项目安全技术交底必须实行（\n）交底制度。\nA.二级\nB.三级\nC.四级\nD.五级", "options": {"A": "二级", "B": "三级", "C": "四级", "D": "五级"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 476, "question": "海因里希法则指出了事故与伤害结果之间存在着偶然性的（\n）\n原则。\nA.概率\nB.随机\nC.因果关系\nD.本质化", "options": {"A": "概率", "B": "随机", "C": "因果关系", "D": "本质化"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 477, "question": "国务院《生产安全事故应急条例》的有关规定，建筑施工单位应\n当有针对性地经常组织开展应急演练，每年至少组织（\n），视情况\n可加大演练频次。\nA.一次\nB.两次\nC.三次\nD.四次", "options": {"A": "一次", "B": "两次", "C": "三次", "D": "四次"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 478, "question": "临时消防车道，其宽度不得小于（\n）。\nA.4m\nB.6m\nC.8m\nD.10m", "options": {"A": "4m", "B": "6m", "C": "8m", "D": "10m"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 479, "question": "生产经营单位的（\n）、主要负责人或者个人经营的投资人不依\n\n=== 第162页 ===\n照本法规定保证安全生产所必需的资金投入，致使生产经营单位不具\n备安全生产条件的，责令限期改正，提供必需的资金。\nA.控制机构\nB.执行机构\nC.决策机构\nD.行政机构", "options": {"A": "控制机构", "B": "执行机构", "C": "决策机构", "D": "行政机构"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 480, "question": "生产经营单位对重大危险源应当登记建档，进行（\n）、评估、\n监控，并制定应急预案，告知从业人员和相关人员在紧急情况下应当\n采取的应急措施。\nA.定期检查\nB.定期检验\nC.定期检测\nD.定期收集", "options": {"A": "定期检查", "B": "定期检验", "C": "定期检测", "D": "定期收集"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 481, "question": "生产经营单位进行爆破、吊装等危险作业，应当安排（\n）进\n行现场安全管理，确保操作规程的遵守和安全措施的落实。\nA.专门人员\nB.领导\nC.技术工人\nD.负责人", "options": {"A": "专门人员", "B": "领导", "C": "技术工人", "D": "负责人"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 482, "question": "施工单位应当在（\n）处、施工起重机械、临时用电设施、脚\n手架、出入通道口、楼梯口、电梯井口、孔洞口、桥梁口、隧道口、\n基坑边沿、爆破物及有害危险气体和液体存放处等危险部位，设置明\n显的安全警示标志。\nA.模板堆场\nB.围档\nC.施工现场入口\nD.临时建筑", "options": {"A": "模板堆场", "B": "围档", "C": "施工现场入口", "D": "临时建筑"}, "answer": "C", "type": "single", "category": "脚手架与模板工程"}, {"id": 483, "question": "施工企业安全生产考核评价中，各评分表得（\n）时，为合格\n等级。\nA.不小于60 分\nB.不小于70 分\nC.不小于80 分\nD.不小于90 分", "options": {"A": "不小于60 分", "B": "不小于70 分", "C": "不小于80 分", "D": "不小于90 分"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 484, "question": "施工现场堆有大量可燃和易燃物质的场所，属于（\n）动火区\n域。\nA.一级\nB.二级\nC.三级\nD.四级\n\n=== 第164页 ===", "options": {"A": "一级", "B": "二级", "C": "三级", "D": "四级 === 第164页 ==="}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 485, "question": "危险源由三个要素构成：潜在危险性、（\n）和触发因素。\nA.必要条件\nB.存在基础\nC.存在条件\nD.必要基础", "options": {"A": "必要条件", "B": "存在基础", "C": "存在条件", "D": "必要基础"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 486, "question": "物料提升机进料口必须加装（\n），并按高处作业规范搭设防护\n棚，并设安全通道，防止从棚外进入架体中。\nA.操作平台\nB.防护栏杆\nC.安全防护门\nD.安全网", "options": {"A": "操作平台", "B": "防护栏杆", "C": "安全防护门", "D": "安全网"}, "answer": "C", "type": "single", "category": "高处作业"}, {"id": 487, "question": "下列哪项不属于消除物的不安全状态，实现作业条件安全化的主\n要措施（\n）。\nA.采取新工艺、新技术、新设备，改善劳动条件\nB.加强安全技术研究，采用安全防护装置，隔离危险部位\nC.推行安全知识岗位培训，提高职工的安全技术素质\nD.采用安全适用的个人防护用具", "options": {"A": "采取新工艺、新技术、新设备，改善劳动条件", "B": "加强安全技术研究，采用安全防护装置，隔离危险部位", "C": "推行安全知识岗位培训，提高职工的安全技术素质", "D": "采用安全适用的个人防护用具"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 488, "question": "下面不属于安全生产管理“四不放过”原则的是（\n）。\n\n=== 第165页 ===\nA.事故原因分析不清不放过\nB.事故不处理不放过\nC.事故责任者和群众没受到教育不放过\nD.事故隐患不整改不放过", "options": {"A": "事故原因分析不清不放过", "B": "事故不处理不放过", "C": "事故责任者和群众没受到教育不放过", "D": "事故隐患不整改不放过"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 489, "question": "下面关于安全技术措施交底说法正确的是（\n）。\nA.专职安全生产管理人员向施工作业人员交底\nB.施工作业人员向施工单位负责人交底\nC.施工班组长向专职安全生产管理人员交底\nD.施工班组长向施工作业人员的交底", "options": {"A": "专职安全生产管理人员向施工作业人员交底", "B": "施工作业人员向施工单位负责人交底", "C": "施工班组长向专职安全生产管理人员交底", "D": "施工班组长向施工作业人员的交底"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 490, "question": "县级以上人民政府在履行安全监督检查职责时，对于发现的重大\n安全事故隐患在排除前或者排除过程中无法保证安全的，（\n）。\nA.继续施工\nB.更换施工队伍\nC.责令从危险区域内撤出作业人员或者暂时停止施工\nD.责令施工单位主要负责人作出检查", "options": {"A": "继续施工", "B": "更换施工队伍", "C": "责令从危险区域内撤出作业人员或者暂时停止施工", "D": "责令施工单位主要负责人作出检查"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 491, "question": "项目经理部对危险源安全风险的控制主要包括识别、评价、（\n）\n三个基本环节。\nA.控制调节\nB.风险规避\n\n=== 第166页 ===\nC.控制策划\nD.风险应对", "options": {"A": "控制调节", "B": "风险规避 === 第166页 ===", "C": "控制策划", "D": "风险应对"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 492, "question": "依据《中华人民共和国建筑法》，（\n）负责建筑安全生产的管\n理，并依法接受劳动行政主管部门对建筑安全生产的指导和监督。\nA.建筑业协会\nB.建设行政主管部门\nC.劳动行政主管部门\nD.国务院", "options": {"A": "建筑业协会", "B": "建设行政主管部门", "C": "劳动行政主管部门", "D": "国务院"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 493, "question": "专职安全生产管理人员分为（\n）、土建、综合三类。\nA.道路\nB.桥梁\nC.机器\nD.机械", "options": {"A": "道路", "B": "桥梁", "C": "机器", "D": "机械"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 494, "question": "（\n）应当签署工程质量终身责任承诺书。\nA.项目负责人\nB.法人代表\nC.技术负责人\nD.总监理工程师", "options": {"A": "项目负责人", "B": "法人代表", "C": "技术负责人", "D": "总监理工程师"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 495, "question": "建筑施工单位新从业人员安全教育培训时间不得少于（\n）学\n时。\nA.12\nB.24\nC.36\nD.48", "options": {"A": "12", "B": "24", "C": "36", "D": "48"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 496, "question": "特种设备使用单位应当按照安全技术规范的要求，在检验合格有\n效期届满前（\n）向特种设备检验机构提出定期检验的要求，并将\n定期检验标志置于该特种设备的显著位置。\nA.一个月\nB.三个月\nC.15 天\nD.45 天", "options": {"A": "一个月", "B": "三个月", "C": "15 天", "D": "45 天"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 497, "question": "较大事故的事故调查报告由负责事故调查的有关（\n）批复。\nA.国务院\nB.省级人民政府\nC.设区的市级人民政府\nD.县级人民政府", "options": {"A": "国务院", "B": "省级人民政府", "C": "设区的市级人民政府", "D": "县级人民政府"}, "answer": "C", "type": "single", "category": "事故处理"}, {"id": 498, "question": "下列属于超过一定规模的危险性较大的分部分项工程的是（\n）。\n\n=== 第168页 ===\nA.开挖深度超过3m（含3m）的基坑（槽）的土方开挖、支护、降水\n工程\nB.搭设高度24m 及以上的落地式钢管脚手架工程（包括采光井、电\n梯井脚手架）\nC.悬挑式脚手架工程\nD.开挖深度超过16m 的人工挖孔桩工程", "options": {"A": "开挖深度超过3m（含3m）的基坑（槽）的土方开挖、支护、降水 工程", "B": "搭设高度24m 及以上的落地式钢管脚手架工程（包括采光井、电 梯井脚手架）", "C": "悬挑式脚手架工程", "D": "开挖深度超过16m 的人工挖孔桩工程"}, "answer": "D", "type": "single", "category": "脚手架与模板工程"}, {"id": 499, "question": "某企业针对重大安全隐患编制了安全技术措施计划，在下达前由\n企业有关领导召集，按规定程序对安全技术措施计划进行了审查、核\n定。下列人员中，负责审查、核定安全技术措施计划的召集人是（\n）。\nA.总工程师\nB.主管安全生产领导\nC.单位主要负责人\nD.主管财务领导", "options": {"A": "总工程师", "B": "主管安全生产领导", "C": "单位主要负责人", "D": "主管财务领导"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 500, "question": "某住宅工程基坑开挖深度6m，工程项目部在施工前编制了专项\n施工方案。下列专项施工方案的内容中，错误的是（\n）。\nA.土石方机械、运输车辆行走坡道坡度为1∶5\nB.采用钢板网喷射混凝土护坡，面层厚度为50mm\nC.基坑周边的施工用水应有排放系统，不得渗入土体内\nD.基坑周边设立防护栏杆，且在危险处设置红色警示灯和悬挂警告标\n志\n\n=== 第169页 ===", "options": {"A": "土石方机械、运输车辆行走坡道坡度为1∶5", "B": "采用钢板网喷射混凝土护坡，面层厚度为50mm", "C": "基坑周边的施工用水应有排放系统，不得渗入土体内", "D": "基坑周边设立防护栏杆，且在危险处设置红色警示灯和悬挂警告标 志 === 第169页 ==="}, "answer": "A", "type": "single", "category": "基坑工程"}, {"id": 501, "question": "某住宅小区工程、基坑开挖深度10m，采用预应力锚杆组合支护\n结构，在雨季施工阶段，基坑坍塌事故风险增大。下列保证基坑安全\n的做法中，错误的是（\n）。\nA.雨季施工期间，在坑顶、坑底采取有效的截排水措施\nB.发生暴雨、台风等灾害天气后，及时对基坑安全进行现场检查\nC.基坑周边原有建筑物设置监测点，安排专人负责监测\nD.基坑支护结构构件强度达到设计要求的70%，开挖下层土方", "options": {"A": "雨季施工期间，在坑顶、坑底采取有效的截排水措施", "B": "发生暴雨、台风等灾害天气后，及时对基坑安全进行现场检查", "C": "基坑周边原有建筑物设置监测点，安排专人负责监测", "D": "基坑支护结构构件强度达到设计要求的70%，开挖下层土方"}, "answer": "D", "type": "single", "category": "基坑工程"}, {"id": 502, "question": "某房屋建筑工程主体结构封顶后，需对扣件式钢管双排脚手架进\n行拆除。下列脚手架拆除作业的做法中，正确的是（\n）。\nA.拆除连墙件时，一次性拆除两层\nB.划出拆除警戒区设专人看护后，上下同时进行拆除作业\nC.按照“先内后外”的顺序拆除同层杆件和构件\nD.按照“后装先拆、先装后拆”的原则，进行拆除作业", "options": {"A": "拆除连墙件时，一次性拆除两层", "B": "划出拆除警戒区设专人看护后，上下同时进行拆除作业", "C": "按照“先内后外”的顺序拆除同层杆件和构件", "D": "按照“后装先拆、先装后拆”的原则，进行拆除作业"}, "answer": "D", "type": "single", "category": "脚手架与模板工程"}, {"id": 503, "question": "塔式起重机安全管理是建筑施工现场安全管理的重要内容。关于\n塔式起重机安全管理的说法，正确的是（\n）。\nA.塔式起重机可以和其他用电设备共用一台开关箱\nB.塔式起重机的使用单位应当对使用中的吊具、索具进行定期检验\nC.塔式起重机按照专项施工方案完成顶升、附着后，即可投入使用\nD.塔式起重机停止作业时应收起吊钩，将起重臂锁死并切断电源\n\n=== 第170页 ===", "options": {"A": "塔式起重机可以和其他用电设备共用一台开关箱", "B": "塔式起重机的使用单位应当对使用中的吊具、索具进行定期检验", "C": "塔式起重机按照专项施工方案完成顶升、附着后，即可投入使用", "D": "塔式起重机停止作业时应收起吊钩，将起重臂锁死并切断电源 === 第170页 ==="}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 504, "question": "发生生产安全事故，对负有责任的生产经营单位除要求其依法承\n担相应的赔偿等责任外，由应急管理部门依照下列规定处以罚款：发\n生（\n）的，处二百万元以上一千万元以下的罚款。\nA.一般事故\nB.较大事故\nC.重大事故\nD.特别重大事故", "options": {"A": "一般事故", "B": "较大事故", "C": "重大事故", "D": "特别重大事故"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 505, "question": "某大厦玻璃幕墙清洗过程中发生一起吊篮坠落事故，造成两名工\n作人员死亡。事故调查组发现吊篮坠落的原因是钢丝绳断裂。为查清\n钢丝绳断裂的原因，调查组将钢丝绳送省起重研究所进行鉴定。该起\n事故的调查技术方法是（\n）。\nA.综合原因分析法\nB.系统安全分析法\nC.对照案例分析法\nD.个别案例技术分析法", "options": {"A": "综合原因分析法", "B": "系统安全分析法", "C": "对照案例分析法", "D": "个别案例技术分析法"}, "answer": "D", "type": "single", "category": "高处作业"}, {"id": 506, "question": "某面粉厂发生爆炸事故，造成3 人死亡，机器、厂房损毁。事故\n善后发生费用40 万元，支付丧葬费30 万元，抚恤金360 万元，机器、\n厂房原值280 万元。保险公司赔付人身意外伤害保险360 万元，赔付\n机器、厂房原值280 万元。事故调查结束后，地方政府有关部门对企\n\n=== 第171页 ===\n业总经理处罚2 万元，对企业处罚50 万元。该事故直接经济损失是\n（\n）。\nA.70 万元\nB.760 万元\nC.140 万元\nD.708 万元", "options": {"A": "70 万元", "B": "760 万元", "C": "140 万元", "D": "708 万元"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 507, "question": "某施工项目部采购了一批劳动防护用品，下发给作业人员使用，\n下列关于该项目部劳动防护用品管理的做法，错误的是（\n）。\nA.检查劳动防护用品的生产日期\nB.检查劳动防护用品的合格证\nC.检查劳动防护用品的检验标志\nD.将采购物品清单作为发放台账", "options": {"A": "检查劳动防护用品的生产日期", "B": "检查劳动防护用品的合格证", "C": "检查劳动防护用品的检验标志", "D": "将采购物品清单作为发放台账"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 508, "question": "某市一建筑施工企业为了能够按工期要求完工，向施工项目部增\n派劳动力。其中，刘某和李某为临时招用人员，未经培训立即上岗。\n现场塔吊吊装大型模板时，刘某指挥塔吊作业，李某在高处搭设脚手\n架且未系安全带，现场无安全管理人员巡查。由于塔吊运行起升高度\n不够且运行速度较快，运行过程中吊物撞击脚手架，导致李某坠落死\n亡。关于此次事故原因的说法，错误的是（\n）。\nA.刘某和李某未经培训直接上岗为间接原因\nB.李某未系安全带为间接原因\n\n=== 第172页 ===\nC.刘某违章指挥为直接原因\nD.项目部安全管理人员未进行现场检查为间接原因", "options": {"A": "刘某和李某未经培训直接上岗为间接原因", "B": "李某未系安全带为间接原因 === 第172页 ===", "C": "刘某违章指挥为直接原因", "D": "项目部安全管理人员未进行现场检查为间接原因"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 509, "question": "某在建体育场工程，准备进行跨度40m 的钢结构屋顶安装，施工\n单位编制了钢结构安装工程专项施工方案，组织了专家论证。下列做\n法中，正确的是（\n）。\nA.施工单位组织了5 名以上具有中级技术职称、专业经验丰富的专家\n进行论证\nB.专家论证结论为“修改后通过”的，施工单位按照专家意见修改后\n实施\nC.专家论证结论为“通过”的，施工单位参考专家意见自行修改完善\n后实施\nD.专家论证的内容包括计算书、验算依据，是否符合规范标准，是否\n造价合理", "options": {"A": "施工单位组织了5 名以上具有中级技术职称、专业经验丰富的专家 进行论证", "B": "专家论证结论为“修改后通过”的，施工单位按照专家意见修改后 实施", "C": "专家论证结论为“通过”的，施工单位参考专家意见自行修改完善 后实施", "D": "专家论证的内容包括计算书、验算依据，是否符合规范标准，是否 造价合理"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 510, "question": "某工程在装修阶段选用了ZLP630 型高处作业吊篮，吊篮安装完\n成后，施工单位按规定组织验收。下列高处作业吊篮安装的做法中，\n错误的是（\n）。\nA.悬挂机构前支架支撑在女儿墙上，安放平稳\nB.悬挂机构前支架与支撑面保持垂直，脚轮不受力\nC.配重件稳定可靠地安放在配重架上，并有防止随意移动的措施\nD.安全钢丝绳、工作钢丝绳分别独立悬挂，无松散、断股、打结\n\n=== 第173页 ===", "options": {"A": "悬挂机构前支架支撑在女儿墙上，安放平稳", "B": "悬挂机构前支架与支撑面保持垂直，脚轮不受力", "C": "配重件稳定可靠地安放在配重架上，并有防止随意移动的措施", "D": "安全钢丝绳、工作钢丝绳分别独立悬挂，无松散、断股、打结 === 第173页 ==="}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 511, "question": "矿山、金属冶炼、建筑施工、运输单位和危险物品的生产、经营、\n储存、装卸单位，应当设置安全生产管理机构或者配备专职安全生产\n管理人员。上述规定以外的其他生产经营单位，从业人员超过（\n）\n人的，应当设置安全生产管理机构或者配备专职安全生产管理人员。\nA.100\nB.200\nC.300\nD.1000", "options": {"A": "100", "B": "200", "C": "300", "D": "1000"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 512, "question": "生产经营单位委托有关服务机构提供安全生产技术、管理服务的，\n保证安全生产的责任由（\n）。\nA.有关服务机构负责\nB.本单位负责\nC.监理单位负责\nD.委托单位与被委托单位共同承担", "options": {"A": "有关服务机构负责", "B": "本单位负责", "C": "监理单位负责", "D": "委托单位与被委托单位共同承担"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 513, "question": "《中华人民共和国安全生产法》规定，事故调查和处理的具体办\n法由（\n）制定。\nA.国务院\nB.住建部\nC.国务院建设行政主管部门\n\n=== 第174页 ===\nD.地方各级人民政府", "options": {"A": "国务院", "B": "住建部", "C": "国务院建设行政主管部门 === 第174页 ===", "D": "地方各级人民政府"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 514, "question": "当有人员烧伤时，应用干净纱布或被单覆盖和包裹烧伤创面做简\n单包扎，避免（\n）。\nA.身体着凉\nB.扩大影响\nC.创面污染\nD.加重伤者疼痛", "options": {"A": "身体着凉", "B": "扩大影响", "C": "创面污染", "D": "加重伤者疼痛"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 515, "question": "施工现场食堂炊事人员应按规定体检，取得（\n）后方可上岗，\n工作时应穿戴工作服、工作帽。\nA.健康证\nB.考试合格证\nC.技术合格证\nD.卫生合格证", "options": {"A": "健康证", "B": "考试合格证", "C": "技术合格证", "D": "卫生合格证"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 516, "question": "生产经营单位的（\n）负责组织制定并实施本单位安全培训计\n划。\nA.主要负责人\nB.法人代表\nC.董事\nD.部门经理\n\n=== 第175页 ===", "options": {"A": "主要负责人", "B": "法人代表", "C": "董事", "D": "部门经理 === 第175页 ==="}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 517, "question": "坠落高度基准面2m 及以上进行临边作业时，应在临空一侧设置\n（\n），并应采用密目式安全立网或工具式栏板封闭。\nA.警戒线\nB.防护栏杆\nC.警示标志\nD.安全挡板", "options": {"A": "警戒线", "B": "防护栏杆", "C": "警示标志", "D": "安全挡板"}, "answer": "B", "type": "single", "category": "高处作业"}, {"id": 518, "question": "（\n）是指任何安全管理系统的正常运转，不仅要受到系统自\n身的条件和因素的制约，而且还要受到其他有关系统的影响。\nA.整分合原则\nB.动态相关性原则\nC.封闭原则\nD.能级原则", "options": {"A": "整分合原则", "B": "动态相关性原则", "C": "封闭原则", "D": "能级原则"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 519, "question": "施工企业安全生产文明施工动态管理行为的考核评价应符合下\n列哪个选项（\n）。\nA.企业资质因安全生产、文明施工受到降级处罚的，则该项不应得分\nB.未建立安全检查检验仪器、仪表及工具配备制度的，则该项不应得\n分\nC.安全质量标准化年度达标合格率低于国家或地方规定的，应根据具\n体情况评定折减分数\n\n=== 第176页 ===\nD.实行分包的，总承包单位未制定对分包单位资质和人员资格管理制\n度并监督落实的，则该项不应得分", "options": {"A": "企业资质因安全生产、文明施工受到降级处罚的，则该项不应得分", "B": "未建立安全检查检验仪器、仪表及工具配备制度的，则该项不应得 分", "C": "安全质量标准化年度达标合格率低于国家或地方规定的，应根据具 体情况评定折减分数 === 第176页 ===", "D": "实行分包的，总承包单位未制定对分包单位资质和人员资格管理制 度并监督落实的，则该项不应得分"}, "answer": "A", "type": "single", "category": "文明施工"}, {"id": 520, "question": "生产经营单位的安全生产管理机构是专门负责（\n）的内设机\n构，其工作人员是专职安全生产管理人员。\nA.安全生产管理\nB.安全生产技术\nC.安全生产教育培训\nD.安全生产监督与管理", "options": {"A": "安全生产管理", "B": "安全生产技术", "C": "安全生产教育培训", "D": "安全生产监督与管理"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 521, "question": "企业为职工提供的劳动防护用品费在（\n）中列支。\nA.职业病防治费用\nB.安全费用\nC.工伤保险费用\nD.意外伤害保险费用", "options": {"A": "职业病防治费用", "B": "安全费用", "C": "工伤保险费用", "D": "意外伤害保险费用"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 522, "question": "根据《广东省住房和城乡建设厅关于建筑施工安全生产标准化评\n定工作实施细则》，建设单位依法直接发包的专业工程项目，（\n）\n应当分别设立项目安全生产标准化自评机构。\nA.建设单位、施工单位\nB.各分包单位\nC.各专业承包的施工单位\n\n=== 第177页 ===\nD.总承包单位、各分包单位", "options": {"A": "建设单位、施工单位", "B": "各分包单位", "C": "各专业承包的施工单位 === 第177页 ===", "D": "总承包单位、各分包单位"}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 523, "question": "建设工程安全防护、文明施工措施费项目清单包括（\n）。\nA.办公桌椅\nB.交通工具\nC.安全警示标志牌\nD.工地食堂冰箱", "options": {"A": "办公桌椅", "B": "交通工具", "C": "安全警示标志牌", "D": "工地食堂冰箱"}, "answer": "C", "type": "single", "category": "文明施工"}, {"id": 524, "question": "不属于国际标准草案中的安全色的为（\n）。\nA.红\nB.黑\nC.蓝\nD.黄", "options": {"A": "红", "B": "黑", "C": "蓝", "D": "黄"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 525, "question": "安全生产的验收必须坚持（\n）原则。\nA.“验收合格才能使用”\nB.“预验收与验收相结合”\nC.“谁施工，谁验收”\nD.“管生产必须管安全”", "options": {"A": "“验收合格才能使用”", "B": "“预验收与验收相结合”", "C": "“谁施工，谁验收”", "D": "“管生产必须管安全”"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 526, "question": "施工企业安全生产评价方法中，应按规定的时限进行评价取证，\n则施工企业的安全生产情况应依据自评价之月起前（\n）以来的情\n\n=== 第178页 ===\n况。\nA.10 个月\nB.12 个月\nC.18 个月\nD.24 个月", "options": {"A": "10 个月", "B": "12 个月", "C": "18 个月", "D": "24 个月"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 527, "question": "动力原则是指推动管理活动的基本力量是人，管理必须有能激发\n人的工作能力的动力。动力的产生来自于物质、精神和（\n）。\nA.集体\nB.信息\nC.生产\nD.经济", "options": {"A": "集体", "B": "信息", "C": "生产", "D": "经济"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 528, "question": "（\n）就是对各级负责人、各职能部门以及各类施工人员在管\n理和施工过程中，应当承担的责任作出明确的规定。\nA.安全评价责任制度\nB.安全管理责任制度\nC.安全生产责任制度\nD.安全施工责任制度", "options": {"A": "安全评价责任制度", "B": "安全管理责任制度", "C": "安全生产责任制度", "D": "安全施工责任制度"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 529, "question": "施工单位应当在施工组织设计中编制安全技术措施和施工现场\n临时用电方案，对基坑支护与降水工程等一些达到一定规模的危险性\n\n=== 第179页 ===\n较大的分部分项工程编制专项施工方案，并附具安全验算结果，经施\n工单位技术负责人、总监理工程师签字后实施，由（\n）进行现场\n监督。\nA.专职安全生产管理人员\nB.技术人员\nC.监理工程师\nD.安全员", "options": {"A": "专职安全生产管理人员", "B": "技术人员", "C": "监理工程师", "D": "安全员"}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 530, "question": "建筑施工企业应当将（\n）工作列入日常的安全生产检查中，\n定期检查，发现问题及时处理。\nA.安全交底\nB.安全培训\nC.文明施工\nD.安全教育", "options": {"A": "安全交底", "B": "安全培训", "C": "文明施工", "D": "安全教育"}, "answer": "C", "type": "single", "category": "文明施工"}, {"id": 531, "question": "根据《建筑施工安全生产标准化考评暂行办法》，（\n）地方人\n民政府住房城乡建设主管部门负责本行政区域内建筑施工安全生产\n标准化考评工作。\nA.市级以上\nB.省级以上\nC.县级以上\nD.乡级以上\n\n=== 第180页 ===", "options": {"A": "市级以上", "B": "省级以上", "C": "县级以上", "D": "乡级以上 === 第180页 ==="}, "answer": "C", "type": "single", "category": "法律法规"}, {"id": 532, "question": "用人单位终止生产经营活动的，应当自生产经营活动终止之日起\n（\n）日内向原申报机关报告并办理注销手续。\nA.5\nB.15\nC.20\nD.30", "options": {"A": "5", "B": "15", "C": "20", "D": "30"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 533, "question": "在建筑生产中最基本的安全管理制度是（\n）。\nA.安全生产责任制度\nB.群防群治制度\nC.安全生产教育培训制度\nD.安全生产检查制度", "options": {"A": "安全生产责任制度", "B": "群防群治制度", "C": "安全生产教育培训制度", "D": "安全生产检查制度"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 534, "question": "特种作业操作资格考试包括安全技术理论考试和实际操作考试\n两部分，考试不及格的，（\n）。\nA.重新参加相应的安全技术培训\nB.允许补考一次，经补考不及格的，重新参加相应的安全技术培训\nC.允许补考两次，经补考不及格的，重新参加相应的安全技术培训\nD.允许补考三次，经补考不及格的，重新参加相应的安全技术培训", "options": {"A": "重新参加相应的安全技术培训", "B": "允许补考一次，经补考不及格的，重新参加相应的安全技术培训", "C": "允许补考两次，经补考不及格的，重新参加相应的安全技术培训", "D": "允许补考三次，经补考不及格的，重新参加相应的安全技术培训"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 535, "question": "根据《建设工程安全生产管理条例》规定，作业人员（\n）拒\n\n=== 第181页 ===\n绝违章指挥和强令冒险作业。\nA.有权\nB.无权\nC.不得\nD.不应", "options": {"A": "有权", "B": "无权", "C": "不得", "D": "不应"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 536, "question": "生产经营单位应当具备的安全生产条件所必需的资金投入，由生\n产经营单位的决策机构、（\n），并对由于安全生产所必需的资金投\n入不足导致的后果承担责任。\nA.主要负责人或者个人经营的投资人予以保证\nB.相关负责人或者集体经营的投资人予以保证\nC.相关负责人或者个人经营的投资人予以保证\nD.主要负责人或者集体经营的投资人予以保证", "options": {"A": "主要负责人或者个人经营的投资人予以保证", "B": "相关负责人或者集体经营的投资人予以保证", "C": "相关负责人或者个人经营的投资人予以保证", "D": "主要负责人或者集体经营的投资人予以保证"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 537, "question": "建筑施工安全生产检查评分汇总表得分值不足（\n）时，评定\n的等级为不合格。\nA.80 分\nB.70 分\nC.60 分\nD.50 分", "options": {"A": "80 分", "B": "70 分", "C": "60 分", "D": "50 分"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 538, "question": "根据《建筑施工企业主要负责人、项目负责人和专职安全生产管\n\n=== 第182页 ===\n理人员安全生产管理规定》规定，工程项目实行总承包的，总承包企\n业应当与分包企业签订（\n），明确双方的安全生产责任。\nA.安全管理协议\nB.安全管理合同\nC.安全生产协议\nD.责任分担协议", "options": {"A": "安全管理协议", "B": "安全管理合同", "C": "安全生产协议", "D": "责任分担协议"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 539, "question": "海因里希认为，企业安全工作的中心就是要（\n）防止人的不\n安全行为或消除物的不安全状态，从而中断事故联锁的进程，避免伤\n害的发生。\nA.调换骨牌顺序\nB.移去中间的骨牌\nC.增加一块骨牌\nD.减少一块骨牌", "options": {"A": "调换骨牌顺序", "B": "移去中间的骨牌", "C": "增加一块骨牌", "D": "减少一块骨牌"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 540, "question": "施工企业在将建筑施工项目安全生产标准化评定申请表等安全\n生产标准化自评材料送达项目评定主体之前应先送（\n）签署审核\n意见。\nA.监理单位\nB.建设单位\nC.监督机构\nD.建设单位和监理单位\n\n=== 第183页 ===", "options": {"A": "监理单位", "B": "建设单位", "C": "监督机构", "D": "建设单位和监理单位 === 第183页 ==="}, "answer": "D", "type": "single", "category": "法律法规"}, {"id": 541, "question": "在应用3E 原则时，要针对人的不安全行为和物的不安全状态的\n四种原因，综合地灵活地运用这三种对策，首先考虑的是哪种对策\n（\n）。\nA.环境对策\nB.工程技术对策\nC.教育对策\nD.法制对策", "options": {"A": "环境对策", "B": "工程技术对策", "C": "教育对策", "D": "法制对策"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 542, "question": "安全管理中的本质化原则是指从一开始从本质上实现安全化，从\n根本上消除事故发生的（\n）。\nA.严重性\nB.可能性\nC.危害性\nD.概率性", "options": {"A": "严重性", "B": "可能性", "C": "危害性", "D": "概率性"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 543, "question": "准予安全生产考核合格证书延续的，证书有效期延续（\n）。\nA.半年\nB.一年\nC.两年\nD.三年", "options": {"A": "半年", "B": "一年", "C": "两年", "D": "三年"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 544, "question": "某施工企业于2015 年3 月1 日取得安全生产许可证，该许可证\n至（\n）届满。\nA.2015 年3 月1 日\nB.2017 年3 月1 日\nC.2016 年3 月1 日\nD.2018 年3 月1 日", "options": {"A": "2015 年3 月1 日", "B": "2017 年3 月1 日", "C": "2016 年3 月1 日", "D": "2018 年3 月1 日"}, "answer": "D", "type": "single", "category": "安全管理"}, {"id": 545, "question": "从业人员发现事故隐患或者其他不安全因素，应当立即向（\n）\n或者本单位负责人报告；接到报告的人员应当及时予以处理。\nA.现场安全生产管理人员\nB.建设单位人员\nC.设计人员\nD.监理人员", "options": {"A": "现场安全生产管理人员", "B": "建设单位人员", "C": "设计人员", "D": "监理人员"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 546, "question": "党的十八大以来，习近平总书记作出一系列重要指示，深刻阐述\n了安全生产的重要意义、思想理念、方针政策和工作要求，强调必须\n坚守发展决不能以（\n）为代价这条不可逾越的红线，明确要求“党\n政同责、一岗双责、齐抓共管、失职追责”。\nA.牺牲安全\nB.牺牲质量\nC.牺牲生命财产\nD.牺牲环境\n\n=== 第185页 ===", "options": {"A": "牺牲安全", "B": "牺牲质量", "C": "牺牲生命财产", "D": "牺牲环境 === 第185页 ==="}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 547, "question": "《中华人民共和国安全生产法》规定，（\n）应当加强对安全生\n产工作的领导，支持、督促各有关部门依法履行安全生产监督管理职\n责，建立健全安全生产工作协调机制，及时协调、解决安全生产监督\n管理中存在的重大问题。\nA.国务院建设主管部门\nB.国务院和县级以上地方各级人民政府\nC.国务院和地方各级人民法院\nD.国务院和地方各级人民执法部门", "options": {"A": "国务院建设主管部门", "B": "国务院和县级以上地方各级人民政府", "C": "国务院和地方各级人民法院", "D": "国务院和地方各级人民执法部门"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 548, "question": "根据国家有关标准，安全标志应当由图形符号、（\n）、几何形\n状（边框）或文字构成。\nA.警示标志\nB.安全色\nC.安全符号\nD.安全标志", "options": {"A": "警示标志", "B": "安全色", "C": "安全符号", "D": "安全标志"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 549, "question": "（\n）机构是指建筑施工企业设置的负责安全生产管理工作的\n独立职能部门。\nA.安全生产管理\nB.安全生产技术\nC.安全生产教育培训\n\n=== 第186页 ===\nD.安全生产监督", "options": {"A": "安全生产管理", "B": "安全生产技术", "C": "安全生产教育培训 === 第186页 ===", "D": "安全生产监督"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 550, "question": "脚手架作业层脚手板应铺满、铺稳、铺实，并使用安全网兜底。\n下列安全网兜底的做法中，正确的是（\n）。\nA.用安全平网单层兜底\nB.用安全平网双层兜底\nC.用密目式安全立网单层兜底\nD.用密目式安全立网双层兜底", "options": {"A": "用安全平网单层兜底", "B": "用安全平网双层兜底", "C": "用密目式安全立网单层兜底", "D": "用密目式安全立网双层兜底"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 551, "question": "有限空间由于自然通风不良存在氧含量不足、有毒有害和易燃易\n爆气体积聚等危险有害因素。关于有限空间危险有害因素及其危害的\n说法，错误的是（\n）。\nA.一氧化碳极易与血红蛋白结合，使血红蛋自丧失携氧的能力和作用，\n造成组织窒息，严重时死亡\nB.二氧化碳是无色剧毒气体，吸入高浓度二氧化碳会出现昏迷、四肢\n抽搐、大小便失禁，重者可窒息死亡\nC.甲烷易燃，爆炸极限为5%～15%，与空气混合能形成爆炸性混合\n物，遇热源和明火有燃烧爆炸的危险\nD.氧含量（体积百分比浓度）10%～12%时，对人体产生的影响是呼\n吸加深加快，几乎丧失判断能力，嘴唇发紫", "options": {"A": "一氧化碳极易与血红蛋白结合，使血红蛋自丧失携氧的能力和作用， 造成组织窒息，严重时死亡", "B": "二氧化碳是无色剧毒气体，吸入高浓度二氧化碳会出现昏迷、四肢 抽搐、大小便失禁，重者可窒息死亡", "C": "甲烷易燃，爆炸极限为5%～15%，与空气混合能形成爆炸性混合 物，遇热源和明火有燃烧爆炸的危险", "D": "氧含量（体积百分比浓度）10%～12%时，对人体产生的影响是呼 吸加深加快，几乎丧失判断能力，嘴唇发紫"}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 552, "question": "施工总承包单位组织土方坍塌应急演练活动前，编制了《土方坍\n\n=== 第187页 ===\n塌应急演练工作方案》。根据《生产安全事故应急演练基本规范》\n（AQ/T 9007-2019），下列编制项目中，不属于应急演练工作方案内\n容的是（\n）。\nA.土方坍塌事故情景设计\nB.应急演练效果评估总结\nC.应急演练技术支撑及保障条件\nD.参演单位和人员主要任务及职责", "options": {"A": "土方坍塌事故情景设计", "B": "应急演练效果评估总结", "C": "应急演练技术支撑及保障条件", "D": "参演单位和人员主要任务及职责"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 553, "question": "起重司索工的工作质量与整个起重作业安全关系很大。下列司索\n工安全作业的要求中，正确的是（\n）。\nA.不允许多人同时吊挂同一重物\nB.不允许司索工用诱导绳控制所吊运的既大又重的物体\nC.吊钩要位于被吊物重心的正上方，不得斜拉吊钩硬挂\nD.重物与吊绳之间必须加衬垫", "options": {"A": "不允许多人同时吊挂同一重物", "B": "不允许司索工用诱导绳控制所吊运的既大又重的物体", "C": "吊钩要位于被吊物重心的正上方，不得斜拉吊钩硬挂", "D": "重物与吊绳之间必须加衬垫"}, "answer": "C", "type": "single", "category": "特种设备"}, {"id": 554, "question": "干粉灭火器以液态二氧化碳或氮气作为动力，将灭火器内干粉灭\n火剂喷出进行灭火，干粉灭火器按适用范围可分为普通干粉（BC 干\n粉）灭火器和多用干粉（ABC 干粉）灭火器两大类。其中，ABC 干\n粉灭火器不能扑救（\n）。\nA.镁粉火灾\nB.柴油火灾\nC.甲烷火灾\n\n=== 第188页 ===\nD.电缆火灾", "options": {"A": "镁粉火灾", "B": "柴油火灾", "C": "甲烷火灾 === 第188页 ===", "D": "电缆火灾"}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 555, "question": "依据《特种设备安全监察条例》特种设备应进行定期检验，由使\n用单位向特种设备检验检测机构提出检验申请。压力容器的定期检验\n应在检验有效期届满前（\n）提出申请。\nA.三个月\nB.两个月\nC.一周\nD.一个月", "options": {"A": "三个月", "B": "两个月", "C": "一周", "D": "一个月"}, "answer": "D", "type": "single", "category": "特种设备"}, {"id": 556, "question": "国家对特种作业人员实行分类管理，根据《特种作业人员安全技\n术培训考核管理规定》，关于电工类特种作业的分类，正确的是（\n）。\nA.低压电工作业、高压电工作业、超高压电工作业\nB.低压电工作业、高压电工作业、防爆电气作业\nC.低压电工作业、高压电工作业、特高压电工作业\nD.低压电工作业、中压电工作业、高压电工作业", "options": {"A": "低压电工作业、高压电工作业、超高压电工作业", "B": "低压电工作业、高压电工作业、防爆电气作业", "C": "低压电工作业、高压电工作业、特高压电工作业", "D": "低压电工作业、中压电工作业、高压电工作业"}, "answer": "B", "type": "single", "category": "用电安全"}, {"id": 557, "question": "施工单位在进行地下消防水池防水作业时，相关人员应遵守有限\n空间作业的安全要求。关于有限空间安全作业的说法，错误的是（\n）。\nA.作业负责人发现有限空间作业不符合安全要求时应终止作业\nB.监护人员在确认有限空间内的空气符合要求后方可离开作业现场\nC.作业人员应正确使用有限空间作业的安全设施与个人防护用品\n\n=== 第189页 ===\nD.应急救援人员应掌握有限空间事故处置程序，严禁盲目施救", "options": {"A": "作业负责人发现有限空间作业不符合安全要求时应终止作业", "B": "监护人员在确认有限空间内的空气符合要求后方可离开作业现场", "C": "作业人员应正确使用有限空间作业的安全设施与个人防护用品 === 第189页 ===", "D": "应急救援人员应掌握有限空间事故处置程序，严禁盲目施救"}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 558, "question": "施工单位在土方开挖前，编制了基坑工程土方开挖方案，制定了\n土方开挖的安全技术措施。关于土方开挖安全技术措施的说法，错误\n的是（\n）。\nA.开挖基坑土体含水量大而不稳定时，应采用临时性支撑加固\nB.相邻基坑开挖时，应遵循先浅后深或同时进行的施工顺序\nC.基坑放坡开挖时，应对坡顶、坡面、坡脚采取降水措施\nD.开挖至坑底时，应避免扰动基底持力土层的原状结构", "options": {"A": "开挖基坑土体含水量大而不稳定时，应采用临时性支撑加固", "B": "相邻基坑开挖时，应遵循先浅后深或同时进行的施工顺序", "C": "基坑放坡开挖时，应对坡顶、坡面、坡脚采取降水措施", "D": "开挖至坑底时，应避免扰动基底持力土层的原状结构"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 559, "question": "生产经营企业是安全生产的主体，对本单位安全生产负全面责任。\n根据安全生产相关法律法规的要求，下列某公司安全生产主体责任的\n说法中，错误的是（\n）。\nA.法定代表人和实际控制人同为安全生产第一责任人\nB.重大事故隐患治理实行监管部门和工会“双报告”制度\nC.强化部门安全生产职责，落实“一岗双责”\nD.企业实行全员安全生产责任制度", "options": {"A": "法定代表人和实际控制人同为安全生产第一责任人", "B": "重大事故隐患治理实行监管部门和工会“双报告”制度", "C": "强化部门安全生产职责，落实“一岗双责”", "D": "企业实行全员安全生产责任制度"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 560, "question": "吊篮安全技术措施正确的是（\n）。\nA.可以2 人同时作业\nB.安全钢丝绳设置在吊篮上\nC.从建筑物顶部进入吊篮\n\n=== 第190页 ===\nD.用吊篮运送物料", "options": {"A": "可以2 人同时作业", "B": "安全钢丝绳设置在吊篮上", "C": "从建筑物顶部进入吊篮 === 第190页 ===", "D": "用吊篮运送物料"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 561, "question": "甲省乙市某金矿在施工过程中发生爆炸事故。经全力救援，11 人\n获救，10 人死亡，1 人失踪。关于该事故调查组织的说法，正确的是\n（\n）。\nA.应由乙市人民政府组织事故调查特邀甲省应急管理厅参加\nB.应由甲省应急管理厅组织事故调查，特邀乙市人民政府参加\nC.应由甲省自然资源厅组织事故调查，特邀乙市人民政府参加\nD.应由甲省人民政府组织事故调查，并指定事故调查组组长", "options": {"A": "应由乙市人民政府组织事故调查特邀甲省应急管理厅参加", "B": "应由甲省应急管理厅组织事故调查，特邀乙市人民政府参加", "C": "应由甲省自然资源厅组织事故调查，特邀乙市人民政府参加", "D": "应由甲省人民政府组织事故调查，并指定事故调查组组长"}, "answer": "D", "type": "single", "category": "事故处理"}, {"id": 562, "question": "对已经依法取得批准的单位，负责行政审批的部门发现其不再具\n备安全生产条件的，应当（\n）。\nA.吊销《安全生产许可证》\nB.责令限期整改\nC.撤销原批准\nD.负责行政审批的部门无权干涉", "options": {"A": "吊销《安全生产许可证》", "B": "责令限期整改", "C": "撤销原批准", "D": "负责行政审批的部门无权干涉"}, "answer": "C", "type": "single", "category": "安全管理"}, {"id": 563, "question": "下列选项中，生产经营单位不得对从业人员进行处罚的是（\n）。\nA.拒绝违章指挥\nB.不按规定佩戴劳动保护用品\nC.拒绝接受安全生产培训\nD.经常性迟到早退\n\n=== 第191页 ===", "options": {"A": "拒绝违章指挥", "B": "不按规定佩戴劳动保护用品", "C": "拒绝接受安全生产培训", "D": "经常性迟到早退 === 第191页 ==="}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 564, "question": "发生生产安全事故的生产经营单位负责人接到事故报告后，应当\n迅速采取有效措施，组织抢救，防止事故扩大，减少人员伤亡和财产\n损失，并按照国家有关规定（\n）如实报告当地负有安全生产监督\n管理职责的部门。\nA.待救援结束后\nB.立即\nC.待事故情况调查清楚后\nD.在24 小时内", "options": {"A": "待救援结束后", "B": "立即", "C": "待事故情况调查清楚后", "D": "在24 小时内"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 565, "question": "生产经营单位进行爆破、吊装、（\n）、临时用电以及国务院应\n急管理部门会同国务院有关部门规定的其他危险作业，应当安排专门\n人员进行现场安全管理，确保操作规程的遵守和安全措施的落实。\nA.动火\nB.登高\nC.有限空间\nD.检维修", "options": {"A": "动火", "B": "登高", "C": "有限空间", "D": "检维修"}, "answer": "A", "type": "single", "category": "用电安全"}, {"id": 566, "question": "生产经营单位的从业人员有依法获得（\n）的权利，并应当依\n法履行安全生产方面的义务。\nA.劳动保护\nB.安全生产保障\n\n=== 第192页 ===\nC.职业危害知识\nD.工伤保险", "options": {"A": "劳动保护", "B":
