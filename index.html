pe": "multi", "category": "法律法规"}, {"id": 2334, "question": "以下（\n）属于压力容器。\nA.乙炔发生器\nB.乙炔气瓶\nC.液化石油气\nD.氧气瓶\nE.纯净水桶", "options": {"A": "乙炔发生器", "B": "乙炔气瓶", "C": "液化石油气", "D": "氧气瓶", "E": "纯净水桶"}, "answer": "ABCD", "type": "multi", "category": "安全管理"}, {"id": 2335, "question": "防止振动危害的技术措施有（\n）。\nA.应加强施工工艺、设备和工具的更新、改造\nB.风动工具的金属部件改用塑料或橡胶，减少因撞击而产生的振动\n\n=== 第820页 ===\nC.手持振动工具应安装防振手柄，劳动者应戴防振手套\nD.手持振动工具的重量，改善手持工具的作业体位，防止强迫体位，\n以减轻肌肉负荷和静力紧张；避免手臂上举姿势的确振动作业\nE.采取轮流作业方式，减少劳动者接触振动的时间，增加工间休息次\n数和休息时间", "options": {"A": "应加强施工工艺、设备和工具的更新、改造", "B": "风动工具的金属部件改用塑料或橡胶，减少因撞击而产生的振动 === 第820页 ===", "C": "手持振动工具应安装防振手柄，劳动者应戴防振手套", "D": "手持振动工具的重量，改善手持工具的作业体位，防止强迫体位， 以减轻肌肉负荷和静力紧张；避免手臂上举姿势的确振动作业", "E": "采取轮流作业方式，减少劳动者接触振动的时间，增加工间休息次 数和休息时间"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 2336, "question": "焊接方法可分为（\n）三大类。\nA.熔焊\nB.压焊\nC.钎焊\nD.点焊\nE.电焊", "options": {"A": "熔焊", "B": "压焊", "C": "钎焊", "D": "点焊", "E": "电焊"}, "answer": "ABC", "type": "multi", "category": "安全管理"}, {"id": 2337, "question": "通常以触电危险程度来考虑，施工现场的环境条件危险场所指\n（\n）。\nA.相对湿度长期处于75%以上的潮湿场所\nB.露天并且能遭受雨、雪侵袭的场所\nC.气温高于30℃的炎热场所\nD.有导电粉尘场所，有导电泥、混凝土或金属结构地板场所\nE.施工中常处于水湿润的场所等均属于危险场所", "options": {"A": "相对湿度长期处于75%以上的潮湿场所", "B": "露天并且能遭受雨、雪侵袭的场所", "C": "气温高于30℃的炎热场所", "D": "有导电粉尘场所，有导电泥、混凝土或金属结构地板场所", "E": "施工中常处于水湿润的场所等均属于危险场所"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 2338, "question": "II 类手持电动工具适用的场所为（\n）。\n\n=== 第821页 ===\nA.潮湿场所\nB.金属构件上\nC.锅炉内\nD.地沟内\nE.管道内", "options": {"A": "潮湿场所", "B": "金属构件上", "C": "锅炉内", "D": "地沟内", "E": "管道内"}, "answer": "AB", "type": "multi", "category": "安全管理"}, {"id": 2339, "question": "行灯的电源电压可以是（\n）。\nA.220V\nB.110V\nC.36V\nD.24V\nE.12V", "options": {"A": "220V", "B": "110V", "C": "36V", "D": "24V", "E": "12V"}, "answer": "CDE", "type": "multi", "category": "安全管理"}, {"id": 2340, "question": "施工现场电工的职责是承担用电工程的（\n）。\nA.安装\nB.巡检\nC.维修\nD.拆除\nE.用电组织设计", "options": {"A": "安装", "B": "巡检", "C": "维修", "D": "拆除", "E": "用电组织设计"}, "answer": "ABCD", "type": "multi", "category": "用电安全"}, {"id": 2341, "question": "开关箱中的漏电断路器在正常情况下可用于（\n）。\nA.电源隔离\n\n=== 第822页 ===\nB.频繁通、断电路\nC.电路的过载保护\nD.电路的短路保护\nE.电路的漏电保护", "options": {"A": "电源隔离 === 第822页 ===", "B": "频繁通、断电路", "C": "电路的过载保护", "D": "电路的短路保护", "E": "电路的漏电保护"}, "answer": "CDE", "type": "multi", "category": "用电安全"}, {"id": 2342, "question": "自然接地体可利用的地下设施有（\n）。\nA.钢筋结构体\nB.金属井管\nC.金属水管\nD.金属燃气管\nE.铠装电缆的钢铠", "options": {"A": "钢筋结构体", "B": "金属井管", "C": "金属水管", "D": "金属燃气管", "E": "铠装电缆的钢铠"}, "answer": "ABCE", "type": "multi", "category": "用电安全"}, {"id": 2343, "question": "人工接地体材料可采用（\n）。\nA.圆钢\nB.角钢\nC.螺纹钢\nD.钢管\nE.铝板", "options": {"A": "圆钢", "B": "角钢", "C": "螺纹钢", "D": "钢管", "E": "铝板"}, "answer": "ABD", "type": "multi", "category": "安全管理"}, {"id": 2344, "question": "配电系统中漏电保护器的设置位置至少应是（\n）。\nA.总配电箱总路、分配电箱总路\nB.分配电箱总路、开关箱\n\n=== 第823页 ===\nC.总配电箱总路、开关箱\nD.总配电箱各分路、开关箱\nE.分配电箱各分路、开关箱", "options": {"A": "总配电箱总路、分配电箱总路", "B": "分配电箱总路、开关箱 === 第823页 ===", "C": "总配电箱总路、开关箱", "D": "总配电箱各分路、开关箱", "E": "分配电箱各分路、开关箱"}, "answer": "CD", "type": "multi", "category": "用电安全"}, {"id": 2345, "question": "建筑施工现场专用临时用电的三项基本原则，是必须采用（\n）。\nA.TN-S 保护系统\nB.TN-C 保护系统\nC.三级配电系统\nD.二级漏电保护系统\nE.过载、短路保护系统", "options": {"A": "TN-S 保护系统", "B": "TN-C 保护系统", "C": "三级配电系统", "D": "二级漏电保护系统", "E": "过载、短路保护系统"}, "answer": "ACD", "type": "multi", "category": "用电安全"}, {"id": 2346, "question": "产品出厂前，生产厂家应当对吊篮进行逐台的检验项目包括\n（\n）。\nA.额定载重量运行试验\nB.超载运行试验\nC.手动滑降速度试验\nD.滑移距离\nE.制动距离", "options": {"A": "额定载重量运行试验", "B": "超载运行试验", "C": "手动滑降速度试验", "D": "滑移距离", "E": "制动距离"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 2347, "question": "用电系统的基本保护系统有（\n）。\nA.TN-S 保护系统\nB.TN-C 保护系统\n\n=== 第824页 ===\nC.三级配电系统\nD.二级漏电保护系统\nE.过载、短路保护系统", "options": {"A": "TN-S 保护系统", "B": "TN-C 保护系统 === 第824页 ===", "C": "三级配电系统", "D": "二级漏电保护系统", "E": "过载、短路保护系统"}, "answer": "ADE", "type": "multi", "category": "用电安全"}, {"id": 2348, "question": "在TN 接零保护系统中，PE 线的引出位置可以是（\n）。\nA.电力变压器中性点接地处\nB.总配电箱三相四线时，与N 线相连接的PE 端子板\nC.总配电箱三相四线时，总漏电保护器的N 线进线端\nD.总配电箱三相四线时，总漏电保护器的N 线出线端\nE.总配电箱三相四线时，与PE 端子板电气连接的金属箱体", "options": {"A": "电力变压器中性点接地处", "B": "总配电箱三相四线时，与N 线相连接的PE 端子板", "C": "总配电箱三相四线时，总漏电保护器的N 线进线端", "D": "总配电箱三相四线时，总漏电保护器的N 线出线端", "E": "总配电箱三相四线时，与PE 端子板电气连接的金属箱体"}, "answer": "ABCE", "type": "multi", "category": "用电安全"}, {"id": 2349, "question": "采用TN-S 系统时，PE 线的重复接地设置部位可为（\n）。\nA.总配电箱（配电柜）处\nB.各分路分配电箱处\nC.各分路最远端用电设备开关箱处\nD.大型施工机械设备开关箱处\nE.总漏电保护器的进出线端", "options": {"A": "总配电箱（配电柜）处", "B": "各分路分配电箱处", "C": "各分路最远端用电设备开关箱处", "D": "大型施工机械设备开关箱处", "E": "总漏电保护器的进出线端"}, "answer": "ABCD", "type": "multi", "category": "用电安全"}, {"id": 2350, "question": "施工现场需要编制用电组织设计的基准条件是（\n）。\nA.用电设备5 台及以上\nB.用电设备总容量100kW 及以上\nC.用电设备总容量50kW 及以上\n\n=== 第825页 ===\nD.用电设备10 台及以上\nE.用电设备5 台及以上，且用电设备总容量100kW 及以上", "options": {"A": "用电设备5 台及以上", "B": "用电设备总容量100kW 及以上", "C": "用电设备总容量50kW 及以上 === 第825页 ===", "D": "用电设备10 台及以上", "E": "用电设备5 台及以上，且用电设备总容量100kW 及以上"}, "answer": "AC", "type": "multi", "category": "用电安全"}, {"id": 2351, "question": "施工现场的外电防护的技术措施有（\n）。\nA.绝缘\nB.屏护\nC.安全距离\nD.限制放电能量\nE.24V 及以下安全特低电压", "options": {"A": "绝缘", "B": "屏护", "C": "安全距离", "D": "限制放电能量", "E": "24V 及以下安全特低电压"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 2352, "question": "关于配电室的位置要求，（\n）说法是正确的。\nA.靠近电源\nB.远离负荷中心\nC.周边道路畅通\nD.周围环境灰尘少、潮气少、振动小、无腐蚀介质、无易燃易爆物\nE.避开污染源的上风侧和易积水场所的正上方", "options": {"A": "靠近电源", "B": "远离负荷中心", "C": "周边道路畅通", "D": "周围环境灰尘少、潮气少、振动小、无腐蚀介质、无易燃易爆物", "E": "避开污染源的上风侧和易积水场所的正上方"}, "answer": "ACD", "type": "multi", "category": "用电安全"}, {"id": 2353, "question": "塔式起重机最基本的工作机构包括（\n）？\nA.起升机构\nB.限位机构\nC.回转机构\nD.行走机构\n\n=== 第826页 ===\nE.变幅机构", "options": {"A": "起升机构", "B": "限位机构", "C": "回转机构", "D": "行走机构 === 第826页 ===", "E": "变幅机构"}, "answer": "ACDE", "type": "multi", "category": "特种设备"}, {"id": 2354, "question": "选择技术性和经济性合适的推土机，主要从（\n）方面考虑。\nA.土方工程量\nB.土的性质\nC.施工条件\nD.作业条件\nE.天气条件", "options": {"A": "土方工程量", "B": "土的性质", "C": "施工条件", "D": "作业条件", "E": "天气条件"}, "answer": "ABCD", "type": "multi", "category": "安全管理"}, {"id": 2355, "question": "施工起重机械和整体提升脚手架、模板等自升式架设设施安装\n完毕后（\n）。\nA.安装单位应该自检\nB.安装单位应出具自检合格证明\nC.安装单位应向施工单位进行安全说明\nD.安装单位应向建设单位进行安全说明\nE.安装单位应该办理验收手续并签字", "options": {"A": "安装单位应该自检", "B": "安装单位应出具自检合格证明", "C": "安装单位应向施工单位进行安全说明", "D": "安装单位应向建设单位进行安全说明", "E": "安装单位应该办理验收手续并签字"}, "answer": "ABCE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2356, "question": "吊运散装模板时，应做到（\n）。\nA.指挥必须到场\nB.码放整齐\nC.由木工吊运\nD.待捆绑牢固后方可起吊\n\n=== 第827页 ===\nE.有防吊运过程中散落的措施", "options": {"A": "指挥必须到场", "B": "码放整齐", "C": "由木工吊运", "D": "待捆绑牢固后方可起吊 === 第827页 ===", "E": "有防吊运过程中散落的措施"}, "answer": "ABDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2357, "question": "现场配电箱的漏电保护开关出现下列（\n）之一时，应采用漏\n电保护开关专用检验仪重新检验。\nA.漏电保护开关停用1 个月以上\nB.漏电保护开关停用2 个月以上\nC.漏电保护开关停用3 个月以上\nD.转换现场\nE.大电流短路跳闸", "options": {"A": "漏电保护开关停用1 个月以上", "B": "漏电保护开关停用2 个月以上", "C": "漏电保护开关停用3 个月以上", "D": "转换现场", "E": "大电流短路跳闸"}, "answer": "CDE", "type": "multi", "category": "用电安全"}, {"id": 2358, "question": "气瓶用于有可能产生回流倒灌的场合，必须有防止倒灌的装置，\n比如（\n）。\nA.单向阀\nB.止回阀\nC.缓冲罐\nD.闸阀\nE.球阀", "options": {"A": "单向阀", "B": "止回阀", "C": "缓冲罐", "D": "闸阀", "E": "球阀"}, "answer": "ABC", "type": "multi", "category": "安全管理"}, {"id": 2359, "question": "压力容器在使用中应执行的规章制度包括（\n）。\nA.压力容器的清洗制度\nB.压力容器的运行、维修制度\nC.压力容器的事故报告制度\n\n=== 第828页 ===\nD.操作人员的岗位责任制\nE.压力容器的定期检查制度", "options": {"A": "压力容器的清洗制度", "B": "压力容器的运行、维修制度", "C": "压力容器的事故报告制度 === 第828页 ===", "D": "操作人员的岗位责任制", "E": "压力容器的定期检查制度"}, "answer": "BCDE", "type": "multi", "category": "事故处理"}, {"id": 2360, "question": "气瓶防震圈的主要作用是（\n）。\nA.气瓶受到冲击时，吸收能量\nB.气瓶受到冲击时，释放能量\nC.气瓶受到冲击时，减轻震动\nD.气瓶受到冲击时，增加震动\nE.保护气瓶标志和漆色不被磨损", "options": {"A": "气瓶受到冲击时，吸收能量", "B": "气瓶受到冲击时，释放能量", "C": "气瓶受到冲击时，减轻震动", "D": "气瓶受到冲击时，增加震动", "E": "保护气瓶标志和漆色不被磨损"}, "answer": "ACE", "type": "multi", "category": "安全管理"}, {"id": 2361, "question": "安全泄压装置的类型有（\n）等。\nA.安全阀\nB.止回阀\nC.防爆片\nD.防爆帽\nE.易熔塞", "options": {"A": "安全阀", "B": "止回阀", "C": "防爆片", "D": "防爆帽", "E": "易熔塞"}, "answer": "ACDE", "type": "multi", "category": "安全管理"}, {"id": 2362, "question": "为了防止气瓶受热，在使用中应注意（\n）。\nA.不得放在烈日下暴晒\nB.不得靠近火源及高温区，距明火不应小于5m\nC.不得用高压蒸气直接炊气瓶\nD.禁止用热水解冻及明火烘烤\n\n=== 第829页 ===\nE.严禁用温度超过40℃的热源对气瓶加热", "options": {"A": "不得放在烈日下暴晒", "B": "不得靠近火源及高温区，距明火不应小于5m", "C": "不得用高压蒸气直接炊气瓶", "D": "禁止用热水解冻及明火烘烤 === 第829页 ===", "E": "严禁用温度超过40℃的热源对气瓶加热"}, "answer": "ACDE", "type": "multi", "category": "安全管理"}, {"id": 2363, "question": "泡沫灭火器所适应扑灭的火灾类型（\n）。\nA.A 类火灾\nB.一般B 类火灾\nC.B 类中的水溶性可燃、易燃液体的火灾\nD.C 类火灾\nE.D 类火灾", "options": {"A": "A 类火灾", "B": "一般B 类火灾", "C": "B 类中的水溶性可燃、易燃液体的火灾", "D": "C 类火灾", "E": "D 类火灾"}, "answer": "AB", "type": "multi", "category": "消防安全"}, {"id": 2364, "question": "一般临时设施的（\n）为重点防火部位，应当配备两个10L 的\n灭火器。\nA.配电室\nB.食堂\nC.澡堂\nD.宿舍\nE.动火处", "options": {"A": "配电室", "B": "食堂", "C": "澡堂", "D": "宿舍", "E": "动火处"}, "answer": "ABDE", "type": "multi", "category": "用电安全"}, {"id": 2365, "question": "在施工现场用气规定中，气瓶运输、存放、使用时，应符合（\n）。\nA.气瓶应保持直立状态，并采取防倾倒措施，乙炔瓶严禁横躺卧放\nB.严禁碰撞、敲打、抛掷、滚动气瓶\nC.气瓶应远离火源，与火源的距离不应小于10m，并应采取避免高温\n和防止暴晒的措施\n\n=== 第830页 ===\nD.燃气储装瓶罐应设置防静电装置\nE.空瓶与实瓶可以一起存放", "options": {"A": "气瓶应保持直立状态，并采取防倾倒措施，乙炔瓶严禁横躺卧放", "B": "严禁碰撞、敲打、抛掷、滚动气瓶", "C": "气瓶应远离火源，与火源的距离不应小于10m，并应采取避免高温 和防止暴晒的措施 === 第830页 ===", "D": "燃气储装瓶罐应设置防静电装置", "E": "空瓶与实瓶可以一起存放"}, "answer": "ABCD", "type": "multi", "category": "法律法规"}, {"id": 2366, "question": "施工现场二级动火区域包括（\n）。\nA.在禁火区域周围的动火作业区\nB.登高焊接或者气割作业区\nC.砖木结构临时食堂炉灶处\nD.无易燃易爆危险物品处的动火作业区\nE.施工现场燃煤茶炉处", "options": {"A": "在禁火区域周围的动火作业区", "B": "登高焊接或者气割作业区", "C": "砖木结构临时食堂炉灶处", "D": "无易燃易爆危险物品处的动火作业区", "E": "施工现场燃煤茶炉处"}, "answer": "ABC", "type": "multi", "category": "安全管理"}, {"id": 2367, "question": "酸碱灭火器适应扑救（\n）类的火灾。\nA.木材燃烧\nB.织物、纸张燃烧\nC.B 类物质燃烧\nD.C 类可燃性气体或D 类轻金属\nE.带电物体", "options": {"A": "木材燃烧", "B": "织物、纸张燃烧", "C": "B 类物质燃烧", "D": "C 类可燃性气体或D 类轻金属", "E": "带电物体"}, "answer": "AB", "type": "multi", "category": "消防安全"}, {"id": 2368, "question": "吊篮提升机应（\n）。\nA.有产品合格证书\nB.说明书\nC.在投入使用前应逐台进行动作检查\nD.按批量做荷载试验\n\n=== 第831页 ===\nE.做破坏性试验", "options": {"A": "有产品合格证书", "B": "说明书", "C": "在投入使用前应逐台进行动作检查", "D": "按批量做荷载试验 === 第831页 ===", "E": "做破坏性试验"}, "answer": "ABCD", "type": "multi", "category": "安全管理"}, {"id": 2369, "question": "吊篮在现场安装后，（\n）。\nA.进行空载安全运行试验\nB.无需进行空载安全运行试验\nC.对安全装置的灵敏可靠性进行检验\nD.可直接投入使用\nE.班长验收即可使用", "options": {"A": "进行空载安全运行试验", "B": "无需进行空载安全运行试验", "C": "对安全装置的灵敏可靠性进行检验", "D": "可直接投入使用", "E": "班长验收即可使用"}, "answer": "AC", "type": "multi", "category": "安全管理"}, {"id": 2370, "question": "塔式起重机的下列哪些项目（\n）应符合使用说明书要求。\nA.附着间距\nB.独立高度\nC.悬臂高度\nD.基础设计\nE.桩基承台的桩中心距", "options": {"A": "附着间距", "B": "独立高度", "C": "悬臂高度", "D": "基础设计", "E": "桩基承台的桩中心距"}, "answer": "ABCD", "type": "multi", "category": "特种设备"}, {"id": 2371, "question": "以下关于施工升降机的安装事项，说法正确的为（\n）。\nA.当安装吊杆上有悬挂物时，严禁开动施工升降机\nB.传递工具不得采用抛掷的方式\nC.层站必须和施工升降机连为一体，以确保稳定性\nD.普通标准节和加厚标准节可以相互换用\nE.使用安全带后，吊笼顶部护栏可以局部拆除\n\n=== 第832页 ===", "options": {"A": "当安装吊杆上有悬挂物时，严禁开动施工升降机", "B": "传递工具不得采用抛掷的方式", "C": "层站必须和施工升降机连为一体，以确保稳定性", "D": "普通标准节和加厚标准节可以相互换用", "E": "使用安全带后，吊笼顶部护栏可以局部拆除 === 第832页 ==="}, "answer": "AB", "type": "multi", "category": "高处作业"}, {"id": 2372, "question": "所有物料提升机应有下列安全装置（\n）。\nA.安全停靠装置\nB.断绳保护装置\nC.上极限限位器\nD.下极限限位器\nE.缓冲器", "options": {"A": "安全停靠装置", "B": "断绳保护装置", "C": "上极限限位器", "D": "下极限限位器", "E": "缓冲器"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 2373, "question": "建筑材料、设备器材、现场制品、半成品、成品、构配件等应\n严格按现场平面布置图指定位置堆放并挂上标牌，注明（\n）。\nA.尺寸\nB.名称\nC.品种\nD.规格\nE.颜色", "options": {"A": "尺寸", "B": "名称", "C": "品种", "D": "规格", "E": "颜色"}, "answer": "BCD", "type": "multi", "category": "安全管理"}, {"id": 2374, "question": "下列属于物料提升机的安全保护装置的是（\n）。\nA.安全停靠装置\nB.断绳保护装置\nC.载重量限制装置\nD.吊笼安全门\nE.缆风绳\n\n=== 第833页 ===", "options": {"A": "安全停靠装置", "B": "断绳保护装置", "C": "载重量限制装置", "D": "吊笼安全门", "E": "缆风绳 === 第833页 ==="}, "answer": "ABCD", "type": "multi", "category": "安全管理"}, {"id": 2375, "question": "附着式升降脚手架的安全装置包括（\n）。\nA.防倾装置\nB.防坠装置\nC.同步装置\nD.密目式围网\nE.自锁装置", "options": {"A": "防倾装置", "B": "防坠装置", "C": "同步装置", "D": "密目式围网", "E": "自锁装置"}, "answer": "ABC", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2376, "question": "推土机在坡道上停机时，应（\n）。\nA.将变速杆挂低速挡\nB.接合主离合器\nC.操纵人员不得离开\nD.锁住制动踏板\nE.将履带或轮胎楔住", "options": {"A": "将变速杆挂低速挡", "B": "接合主离合器", "C": "操纵人员不得离开", "D": "锁住制动踏板", "E": "将履带或轮胎楔住"}, "answer": "ABDE", "type": "multi", "category": "安全管理"}, {"id": 2377, "question": "火灾发生一般必须具备（\n）等几个条件。\nA.可燃物\nB.引火源\nC.助燃物\nD.水\nE.大风天气", "options": {"A": "可燃物", "B": "引火源", "C": "助燃物", "D": "水", "E": "大风天气"}, "answer": "ABC", "type": "multi", "category": "消防安全"}, {"id": 2378, "question": "防爆原则的基本要求有（\n）。\nA.防止爆炸混合物的形成\nB.严格控制着火源\nC.燃爆开始时及时泄出压力\nD.切断爆炸传播途径\nE.减弱爆炸压力和冲击波对人员、设备和建筑物的损坏", "options": {"A": "防止爆炸混合物的形成", "B": "严格控制着火源", "C": "燃爆开始时及时泄出压力", "D": "切断爆炸传播途径", "E": "减弱爆炸压力和冲击波对人员、设备和建筑物的损坏"}, "answer": "ABCDE", "type": "multi", "category": "安全管理"}, {"id": 2379, "question": "吊篮的安全装置有（\n）。\nA.安全锁、保险卡\nB.行程限位器\nC.制动器\nD.保险绳\nE.防冲顶装置", "options": {"A": "安全锁、保险卡", "B": "行程限位器", "C": "制动器", "D": "保险绳", "E": "防冲顶装置"}, "answer": "ABCD", "type": "multi", "category": "安全管理"}, {"id": 2380, "question": "附着升降脚手架防坠装置的设置要求（\n）。\nA.每一主框架处有一个\nB.隔一主框架有一个\nC.防坠与提升设在两套不同附着支承结构\nD.防坠与提升设在一套附着支承结构上\nE.防坠装置与提升装置的设置没有相互关系", "options": {"A": "每一主框架处有一个", "B": "隔一主框架有一个", "C": "防坠与提升设在两套不同附着支承结构", "D": "防坠与提升设在一套附着支承结构上", "E": "防坠装置与提升装置的设置没有相互关系"}, "answer": "AC", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2381, "question": "插入式振动器电动机电源开关箱中，应（\n）。\n\n=== 第835页 ===\nA.安装漏电保护器\nB.熔断器选配应符合要求\nC.保护零线应接装到位\nD.加防护罩\nE.加紧急断电按钮", "options": {"A": "安装漏电保护器", "B": "熔断器选配应符合要求", "C": "保护零线应接装到位", "D": "加防护罩", "E": "加紧急断电按钮"}, "answer": "ABC", "type": "multi", "category": "用电安全"}, {"id": 2382, "question": "在起重作业中常用的起重机械主要有（\n）。\nA.手拉葫芦\nB.履带式起重机\nC.轮胎式起重机\nD.汽车式起重机\nE.塔式起重机", "options": {"A": "手拉葫芦", "B": "履带式起重机", "C": "轮胎式起重机", "D": "汽车式起重机", "E": "塔式起重机"}, "answer": "BCDE", "type": "multi", "category": "特种设备"}, {"id": 2383, "question": "没有采取相应安全措施，在（\n）情况下不允许焊割作业。\nA.制作、加工和贮存易燃易爆危险品的房间内\nB.贮存易燃易爆危险品的储罐和容器\nC.设备带电\nD.刚涂刷过油漆的建筑构件和设备\nE.盛过易燃液体进行彻底清洗处理过的容器", "options": {"A": "制作、加工和贮存易燃易爆危险品的房间内", "B": "贮存易燃易爆危险品的储罐和容器", "C": "设备带电", "D": "刚涂刷过油漆的建筑构件和设备", "E": "盛过易燃液体进行彻底清洗处理过的容器"}, "answer": "ABCD", "type": "multi", "category": "安全管理"}, {"id": 2384, "question": "下列什么火灾不能用水扑救？（\n）\nA.碱金属\n\n=== 第836页 ===\nB.高压电气装置\nC.硫酸\nD.油毡\nE.熔化的钢水", "options": {"A": "碱金属 === 第836页 ===", "B": "高压电气装置", "C": "硫酸", "D": "油毡", "E": "熔化的钢水"}, "answer": "ABCDE", "type": "multi", "category": "用电安全"}, {"id": 2385, "question": "地下建筑的火灾的特点是（\n）。\nA.发烟量大\nB.温度高\nC.泄爆能力强\nD.人员疏散困难\nE.扑救困难", "options": {"A": "发烟量大", "B": "温度高", "C": "泄爆能力强", "D": "人员疏散困难", "E": "扑救困难"}, "answer": "ABDE", "type": "multi", "category": "消防安全"}, {"id": 2386, "question": "建筑工地常备的消防器材有（\n）。\nA.砂子\nB.水桶\nC.铁锨\nD.灭火器\nE.水池", "options": {"A": "砂子", "B": "水桶", "C": "铁锨", "D": "灭火器", "E": "水池"}, "answer": "ABCD", "type": "multi", "category": "消防安全"}, {"id": 2387, "question": "雨期施工的用电，（\n）的说法是正确的。\nA.各种露天使用的电气设备雨季不得使用\nB.电气设备应选择较高的干燥处\n\n=== 第837页 ===\nC.电闸箱要有防雨盖，电焊机应加防护雨罩\nD.雨季要检查现场电气设备的接零、接地保护措施是否可靠\nE.电线绝缘有损坏的要及时更换或包好", "options": {"A": "各种露天使用的电气设备雨季不得使用", "B": "电气设备应选择较高的干燥处 === 第837页 ===", "C": "电闸箱要有防雨盖，电焊机应加防护雨罩", "D": "雨季要检查现场电气设备的接零、接地保护措施是否可靠", "E": "电线绝缘有损坏的要及时更换或包好"}, "answer": "BCDE", "type": "multi", "category": "用电安全"}, {"id": 2388, "question": "作业人员应当遵守安全施工的（\n），正确使用安全防护用具、\n机械设备等。\nA.规章制度\nB.操作规程\nC.不成熟经验\nD.劳动纪律\nE.强制性标准", "options": {"A": "规章制度", "B": "操作规程", "C": "不成熟经验", "D": "劳动纪律", "E": "强制性标准"}, "answer": "ABDE", "type": "multi", "category": "法律法规"}, {"id": 2389, "question": "根据压力容器的破坏特点，可将压力容器的破裂形式分为（\n）\n等几种。\nA.延性破裂\nB.脆性破裂\nC.疲劳破裂\nD.腐蚀破裂\nE.压裂", "options": {"A": "延性破裂", "B": "脆性破裂", "C": "疲劳破裂", "D": "腐蚀破裂", "E": "压裂"}, "answer": "ABCD", "type": "multi", "category": "安全管理"}, {"id": 2390, "question": "动火作业前必须申请办理动火证，动火证必须注明（\n）等详\n细内容。\n\n=== 第838页 ===\nA.动火地点\nB.动火时间\nC.动火人\nD.防火措施\nE.动火区域等级", "options": {"A": "动火地点", "B": "动火时间", "C": "动火人", "D": "防火措施", "E": "动火区域等级"}, "answer": "ABCD", "type": "multi", "category": "消防安全"}, {"id": 2391, "question": "室内绝缘导线配电线路可采用（\n）敷设。\nA.嵌绝缘槽\nB.穿塑料管\nC.沿钢索\nD.直埋墙\nE.直埋地", "options": {"A": "嵌绝缘槽", "B": "穿塑料管", "C": "沿钢索", "D": "直埋墙", "E": "直埋地"}, "answer": "ABC", "type": "multi", "category": "用电安全"}, {"id": 2392, "question": "照明开关箱中电器配置组合可以是（\n）。\nA.刀开关、熔断器、漏电保护器\nB.刀开关、断路器、漏电保护器\nC.刀开关、漏电断路器\nD.断路器、漏电保护器\nE.刀开关、熔断器", "options": {"A": "刀开关、熔断器、漏电保护器", "B": "刀开关、断路器、漏电保护器", "C": "刀开关、漏电断路器", "D": "断路器、漏电保护器", "E": "刀开关、熔断器"}, "answer": "ABC", "type": "multi", "category": "用电安全"}, {"id": 2393, "question": "总配电箱电器设置种类的组合应是（\n）。\nA.隔离开关、断路器、漏电保护器\n\n=== 第839页 ===\nB.隔离开关、熔断器、漏电保护器\nC.断路器、漏电断路器\nD.隔离开关、断路器\nE.具有可见分断点的断路器、漏电保护器", "options": {"A": "隔离开关、断路器、漏电保护器 === 第839页 ===", "B": "隔离开关、熔断器、漏电保护器", "C": "断路器、漏电断路器", "D": "隔离开关、断路器", "E": "具有可见分断点的断路器、漏电保护器"}, "answer": "ABE", "type": "multi", "category": "用电安全"}, {"id": 2394, "question": "总配电箱的电器应具备（\n）功能。\nA.电源隔离\nB.正常接通与分断电路\nC.过载保护\nD.短路保护\nE.漏电保护", "options": {"A": "电源隔离", "B": "正常接通与分断电路", "C": "过载保护", "D": "短路保护", "E": "漏电保护"}, "answer": "ABCDE", "type": "multi", "category": "用电安全"}, {"id": 2395, "question": "电缆线路可以（\n）敷设。\nA.沿地面\nB.埋地\nC.沿围墙\nD.沿电杆或支架\nE.沿脚手架", "options": {"A": "沿地面", "B": "埋地", "C": "沿围墙", "D": "沿电杆或支架", "E": "沿脚手架"}, "answer": "BCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2396, "question": "锻铸铁扣件的形式有（\n）三种。\nA.直角扣件\nB.旋转扣件\n\n=== 第840页 ===\nC.对接扣件\nD.方形扣件\nE.圆形扣件", "options": {"A": "直角扣件", "B": "旋转扣件 === 第840页 ===", "C": "对接扣件", "D": "方形扣件", "E": "圆形扣件"}, "answer": "ABC", "type": "multi", "category": "安全管理"}, {"id": 2397, "question": "附着式支撑是附着式升降脚手架的主要承载传力装置，其作用\n主要有（\n）。\nA.传递荷载\nB.保证架体稳定性\nC.满足提升、防倾覆、防坠落装置的要求\nD.提高工程结构稳定性\nE.提高工程结构抗倾覆能力", "options": {"A": "传递荷载", "B": "保证架体稳定性", "C": "满足提升、防倾覆、防坠落装置的要求", "D": "提高工程结构稳定性", "E": "提高工程结构抗倾覆能力"}, "answer": "ABC", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2398, "question": "钢筋调直机在（\n）前不得送料。\nA.工作\nB.润滑保养\nC.调直块未固定\nD.防护罩未盖好\nE.戴防护手套", "options": {"A": "工作", "B": "润滑保养", "C": "调直块未固定", "D": "防护罩未盖好", "E": "戴防护手套"}, "answer": "CD", "type": "multi", "category": "安全管理"}, {"id": 2399, "question": "塔式起重机金属结构基础部件包括（\n）等。\nA.底架\nB.塔身\n\n=== 第841页 ===\nC.起重臂、平衡臂\nD.卷扬机\nE.转台", "options": {"A": "底架", "B": "塔身 === 第841页 ===", "C": "起重臂、平衡臂", "D": "卷扬机", "E": "转台"}, "answer": "ABCE", "type": "multi", "category": "特种设备"}, {"id": 2400, "question": "简述瓦斯隧道照明与电气信号设备应符合（\n）规定。\nA.低瓦斯隧道不应大于220V，高瓦斯隧道和瓦斯突出隧道不应大于\n110V 输电线路不得使用裸线和绝缘不良的导线\nB.高瓦斯隧道和煤与瓦斯突出隧道，照明电器应使用防爆型，开关应\n设在进风道或洞口\nC.矿灯充电房应离洞口50m 以外瓦斯隧道内的电气信号，除信号集\n中闭塞外，应能同时发声和发光\nD.竖井、斜井主要井口绞车的信号装置应直接接在供电线路上，不应\n分接其他负荷\nE.隧道内的电话线路严禁利用大地作回路", "options": {"A": "低瓦斯隧道不应大于220V，高瓦斯隧道和瓦斯突出隧道不应大于 110V 输电线路不得使用裸线和绝缘不良的导线", "B": "高瓦斯隧道和煤与瓦斯突出隧道，照明电器应使用防爆型，开关应 设在进风道或洞口", "C": "矿灯充电房应离洞口50m 以外瓦斯隧道内的电气信号，除信号集 中闭塞外，应能同时发声和发光", "D": "竖井、斜井主要井口绞车的信号装置应直接接在供电线路上，不应 分接其他负荷", "E": "隧道内的电话线路严禁利用大地作回路"}, "answer": "ABCDE", "type": "multi", "category": "用电安全"}, {"id": 2401, "question": "简述瓦斯隧道防火应符合（\n）规定。\nA.洞口20m 范围内严禁火源洞内严禁产生高温和发生火花的作业，\n洞内不得进行电焊、气焊、喷灯焊等作业，确需用焊时必须有相应的\n安全措施\nB.洞内严禁使用可燃性材料搭设临时操作间和休息室，暖风道、压入\n式通风的风洞必须用不燃性材料砌筑，并应至少装设2 道防火门在有\n自燃倾向的煤层中施工时，必须事先制订专项的安全措施，预防煤层\n\n=== 第842页 ===\n自燃\nC.瓦斯工区必须在洞外设置消防水池和消防用砂，水池中应经常保持\n不少于200m³储水量，并保持一定的水压瓦斯工区内必须设置消防管\n路系统，并每隔100m 设置一个阀门，作业区内设置灭火器及消防设\n施，并保持良好状态\nD.洞内发生火灾时，应根据火灾的性质、灾区通风和瓦斯状况，立即\n采用一切可能的方法直接灭火当洞内火灾不能直接扑灭时，必须封闭\n火区，直到经过取样分析，确认火灾已经熄灭后方可启封启封火区应\n逐段恢复通风当测出风流中含一氧化碳或有其他复燃征兆时，必须立\n即停止向火区送风，并重新封闭火区\nE.启封火区和火区初期恢复通风的工作必须由专业的救护队负责进\n行，火区内风流所经过的巷道内的人员必须全部撤出启封火区完毕后\n3d 内，每班由救护队检查通风工作，并测定水温、气温和空气成分，\n确认火灾完全熄灭，通风等情况良好，方可恢复施工", "options": {"A": "洞口20m 范围内严禁火源洞内严禁产生高温和发生火花的作业， 洞内不得进行电焊、气焊、喷灯焊等作业，确需用焊时必须有相应的 安全措施", "B": "洞内严禁使用可燃性材料搭设临时操作间和休息室，暖风道、压入 式通风的风洞必须用不燃性材料砌筑，并应至少装设2 道防火门在有 自燃倾向的煤层中施工时，必须事先制订专项的安全措施，预防煤层 === 第842页 === 自燃", "C": "瓦斯工区必须在洞外设置消防水池和消防用砂，水池中应经常保持 不少于200m³储水量，并保持一定的水压瓦斯工区内必须设置消防管 路系统，并每隔100m 设置一个阀门，作业区内设置灭火器及消防设 施，并保持良好状态", "D": "洞内发生火灾时，应根据火灾的性质、灾区通风和瓦斯状况，立即 采用一切可能的方法直接灭火当洞内火灾不能直接扑灭时，必须封闭 火区，直到经过取样分析，确认火灾已经熄灭后方可启封启封火区应 逐段恢复通风当测出风流中含一氧化碳或有其他复燃征兆时，必须立 即停止向火区送风，并重新封闭火区", "E": "启封火区和火区初期恢复通风的工作必须由专业的救护队负责进 行，火区内风流所经过的巷道内的人员必须全部撤出启封火区完毕后 3d 内，每班由救护队检查通风工作，并测定水温、气温和空气成分， 确认火灾完全熄灭，通风等情况良好，方可恢复施工"}, "answer": "ABCDE", "type": "multi", "category": "消防安全"}, {"id": 2402, "question": "铲运机主要用于大土方量的（\n）作业。\nA.填挖\nB.压实\nC.运输\nD.推土\nE.转移", "options": {"A": "填挖", "B": "压实", "C": "运输", "D": "推土", "E": "转移"}, "answer": "AC", "type": "multi", "category": "安全管理"}, {"id": 2403, "question": "起重机司机在操作中应做到以下几点（\n）。\nA.安全检查\nB.信号确认\nC.状态判断\nD.精心操作\nE.分心", "options": {"A": "安全检查", "B": "信号确认", "C": "状态判断", "D": "精心操作", "E": "分心"}, "answer": "ABCD", "type": "multi", "category": "特种设备"}, {"id": 2404, "question": "在使用移动式梯子时，对梯子的安全要求正确的是（\n）。\nA.踏板上下间距以300mm 为宜\nB.直梯的工作角度以75°±5°为宜\nC.梯角底部不得垫高使用\nD.梯子如需接长，接头最多不得超过两处\nE.折叠梯使用时上部夹角以30°-50°为宜", "options": {"A": "踏板上下间距以300mm 为宜", "B": "直梯的工作角度以75°±5°为宜", "C": "梯角底部不得垫高使用", "D": "梯子如需接长，接头最多不得超过两处", "E": "折叠梯使用时上部夹角以30°-50°为宜"}, "answer": "ABC", "type": "multi", "category": "安全管理"}, {"id": 2405, "question": "关于电石的储存，下列说法正确的是（\n）。\nA.严禁雨天进行运输\nB.电石本身不会燃烧，但遇水会迅速分解出乙炔气体\nC.未经处理的空电石桶，可以接触明火\nD.电石不要和易燃易爆物质混合存放在一个库内\nE.严禁用铁工具开启电石桶", "options": {"A": "严禁雨天进行运输", "B": "电石本身不会燃烧，但遇水会迅速分解出乙炔气体", "C": "未经处理的空电石桶，可以接触明火", "D": "电石不要和易燃易爆物质混合存放在一个库内", "E": "严禁用铁工具开启电石桶"}, "answer": "ABDE", "type": "multi", "category": "消防安全"}, {"id": 2406, "question": "（\n）等每25 ㎡可配备一只种类合适的灭火器，油库危险品\n\n=== 第844页 ===\n仓库应配备足够数量、种类合适的灭火器。\nA.临时木工间\nB.油漆间\nC.木、机具间\nD.钢筋加工间\nE.设备间", "options": {"A": "临时木工间", "B": "油漆间", "C": "木、机具间", "D": "钢筋加工间", "E": "设备间"}, "answer": "ABC", "type": "multi", "category": "消防安全"}, {"id": 2407, "question": "附着式升降脚手架的设计计算项目包括（\n）。\nA.脚手架的稳定性验算，变形和抗倾覆\nB.附着支撑装置变形的验算\nC.连接杆变形验算\nD.杆件节点连接强度验算\nE.吊具、索具验算", "options": {"A": "脚手架的稳定性验算，变形和抗倾覆", "B": "附着支撑装置变形的验算", "C": "连接杆变形验算", "D": "杆件节点连接强度验算", "E": "吊具、索具验算"}, "answer": "ABCDE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2408, "question": "压力容器的压力表出现（\n）情形之一时，压力表应停止使用。\nA.封印损坏\nB.超过校验有效期\nC.表盘封面玻璃破裂\nD.表盘刻度模糊不清\nE.无压力时，指针距零位的数值没有超过压力表的允许误差", "options": {"A": "封印损坏", "B": "超过校验有效期", "C": "表盘封面玻璃破裂", "D": "表盘刻度模糊不清", "E": "无压力时，指针距零位的数值没有超过压力表的允许误差"}, "answer": "ABCD", "type": "multi", "category": "安全管理"}, {"id": 2409, "question": "三级动火区域包括（\n）。\n\n=== 第845页 ===\nA.无易燃易爆危险物品处的动火作业\nB.施工现场燃煤茶炉处\nC.冬季燃煤取暖的办公室、宿舍等生活设施\nD.施工现场木工半成品加工区\nE.在禁火区域周围动火作业", "options": {"A": "无易燃易爆危险物品处的动火作业", "B": "施工现场燃煤茶炉处", "C": "冬季燃煤取暖的办公室、宿舍等生活设施", "D": "施工现场木工半成品加工区", "E": "在禁火区域周围动火作业"}, "answer": "ABC", "type": "multi", "category": "安全管理"}, {"id": 2410, "question": "起重吊装作业准备的内容为（\n）。\nA.检查起吊用具\nB.准备防护设施\nC.处理安全隐患\nD.准备辅助用具\nE.确定并清理落物地点", "options": {"A": "检查起吊用具", "B": "准备防护设施", "C": "处理安全隐患", "D": "准备辅助用具", "E": "确定并清理落物地点"}, "answer": "ABDE", "type": "multi", "category": "特种设备"}, {"id": 2411, "question": "施工升降机主要哪几部分组成（\n）。\nA.金属结构\nB.驱动机构\nC.安全保护装置\nD.电气控制系统\nE.钢管", "options": {"A": "金属结构", "B": "驱动机构", "C": "安全保护装置", "D": "电气控制系统", "E": "钢管"}, "answer": "ABCD", "type": "multi", "category": "用电安全"}, {"id": 2412, "question": "施工升降机金属结构主要由（\n）等部分组成。\nA.吊笼\n\n=== 第846页 ===\nB.底笼\nC.导轨架\nD.附墙架\nE.安全保护装置", "options": {"A": "吊笼 === 第846页 ===", "B": "底笼", "C": "导轨架", "D": "附墙架", "E": "安全保护装置"}, "answer": "ABCD", "type": "multi", "category": "特种设备"}, {"id": 2413, "question": "搭设外电防护设施的主要材料是（\n）。\nA.木材\nB.竹材\nC.钢管\nD.钢筋\nE.安全网", "options": {"A": "木材", "B": "竹材", "C": "钢管", "D": "钢筋", "E": "安全网"}, "answer": "AB", "type": "multi", "category": "高处作业"}, {"id": 2414, "question": "按照防火要求，施工现场应当明确划分（\n）区域。\nA.禁火区\nB.仓库区\nC.办公区\nD.生活区\nE.生产区", "options": {"A": "禁火区", "B": "仓库区", "C": "办公区", "D": "生活区", "E": "生产区"}, "answer": "ABD", "type": "multi", "category": "消防安全"}, {"id": 2415, "question": "固定式塔机的安全装置主要有哪些？（\n）\nA.起重力矩限制器\nB.起重量限制器\n\n=== 第847页 ===\nC.限速器\nD.起升高度限位器\nE.小车变幅限位器", "options": {"A": "起重力矩限制器", "B": "起重量限制器 === 第847页 ===", "C": "限速器", "D": "起升高度限位器", "E": "小车变幅限位器"}, "answer": "ABDE", "type": "multi", "category": "特种设备"}, {"id": 2416, "question": "下列哪些是塔式起重机拆装工艺编制的主要依据？（\n）\nA.国家有关塔式起重机的技术标准和规范、规程\nB.随机的使用、拆装说明书\nC.随机的整机、部件的装配图、电气原理及接线图\nD.已有的拆装工艺及过去拆装作业中积累的技术资料\nE.其他单位的拆装工艺或有关资料", "options": {"A": "国家有关塔式起重机的技术标准和规范、规程", "B": "随机的使用、拆装说明书", "C": "随机的整机、部件的装配图、电气原理及接线图", "D": "已有的拆装工艺及过去拆装作业中积累的技术资料", "E": "其他单位的拆装工艺或有关资料"}, "answer": "ABCD", "type": "multi", "category": "用电安全"}, {"id": 2417, "question": "塔机日常检查和使用前的检查的主要内容包括哪些？（\n）\nA.基础\nB.主要部位的连接螺栓\nC.金属结构和外观结构\nD.油漆\nE.配电箱和电源开关", "options": {"A": "基础", "B": "主要部位的连接螺栓", "C": "金属结构和外观结构", "D": "油漆", "E": "配电箱和电源开关"}, "answer": "ABCE", "type": "multi", "category": "用电安全"}, {"id": 2418, "question": "对小车变幅的塔式起重机，设置幅度限制器时，应设置什么装\n置？（\n）\nA.力矩限制器\nB.小车行程限位开关\n\n=== 第848页 ===\nC.终端缓冲装置\nD.防止小车出轨装置\nE.防止臂架反弹后倾装置", "options": {"A": "力矩限制器", "B": "小车行程限位开关 === 第848页 ===", "C": "终端缓冲装置", "D": "防止小车出轨装置", "E": "防止臂架反弹后倾装置"}, "answer": "BC", "type": "multi", "category": "用电安全"}, {"id": 2419, "question": "施工升降机在（\n）等时必须停止运行并将梯笼隆到底层切断\n电源。\nA.大雨\nB.大雾\nC.五级及以上大风\nD.导轨架结冰\nE.电缆结冰", "options": {"A": "大雨", "B": "大雾", "C": "五级及以上大风", "D": "导轨架结冰", "E": "电缆结冰"}, "answer": "ABDE", "type": "multi", "category": "用电安全"}, {"id": 2420, "question": "物料提升机的吊篮停靠装置应能可靠的承担：（\n）。\nA.吊篮自重\nB.额定荷载\nC.运料人员\nD.装卸物料时的工作荷载\nE.重物冲击荷载", "options": {"A": "吊篮自重", "B": "额定荷载", "C": "运料人员", "D": "装卸物料时的工作荷载", "E": "重物冲击荷载"}, "answer": "ABCD", "type": "multi", "category": "安全管理"}, {"id": 2421, "question": "石油气瓶在使用中需要注意的问题有（\n）。\nA.运输和储存时，环境温度不得超过60℃\nB.严禁受日光暴晒\n\n=== 第849页 ===\nC.与明火距离不小于10m\nD.气瓶只许正立使用\nE.气瓶可以卧倒使用", "options": {"A": "运输和储存时，环境温度不得超过60℃", "B": "严禁受日光暴晒 === 第849页 ===", "C": "与明火距离不小于10m", "D": "气瓶只许正立使用", "E": "气瓶可以卧倒使用"}, "answer": "ABCD", "type": "multi", "category": "安全管理"}, {"id": 2422, "question": "塔式起重机力矩限制器起作用时，允许下列哪些运行？（\n）\nA.载荷向臂尖方向运行\nB.载荷向臂根方向运行\nC.吊钩上升\nD.吊钩下降\nE.载荷自由下降", "options": {"A": "载荷向臂尖方向运行", "B": "载荷向臂根方向运行", "C": "吊钩上升", "D": "吊钩下降", "E": "载荷自由下降"}, "answer": "BD", "type": "multi", "category": "特种设备"}, {"id": 2423, "question": "白棕绳编接绳头绳套时，编接后绳套搭接长度不能小于白棕绳\n直径（\n）倍，绳头搭接长度不小于其直径的（\n）倍。\nA.10\nB.15\nC.20\nD.30\nE.50", "options": {"A": "10", "B": "15", "C": "20", "D": "30", "E": "50"}, "answer": "BD", "type": "multi", "category": "安全管理"}, {"id": 2424, "question": "工程项目机械安全资料包括（\n）等。\nA.机械租赁合同，出租、承租双方安全管理协议书\nB.物料提升机、外用电梯、电动吊篮拆装方案\n\n=== 第850页 ===\nC.施工机械检查验收表\nD.起重机械运行记录\nE.对起重吊装人员安全技术交底记录", "options": {"A": "机械租赁合同，出租、承租双方安全管理协议书", "B": "物料提升机、外用电梯、电动吊篮拆装方案 === 第850页 ===", "C": "施工机械检查验收表", "D": "起重机械运行记录", "E": "对起重吊装人员安全技术交底记录"}, "answer": "ABCD", "type": "multi", "category": "用电安全"}, {"id": 2425, "question": "关于乙炔瓶的使用，正确选项包括（\n）。\nA.不得靠近热源\nB.不得在阳光下暴晒\nC.瓶内气体可以用尽\nD.必须配备减压器方可使用\nE.瓶阀应戴安全帽储运", "options": {"A": "不得靠近热源", "B": "不得在阳光下暴晒", "C": "瓶内气体可以用尽", "D": "必须配备减压器方可使用", "E": "瓶阀应戴安全帽储运"}, "answer": "ABDE", "type": "multi", "category": "安全管理"}, {"id": 2426, "question": "结构吊装用的起重机类型，主要根据（\n）来确定。\nA.厂房的跨度\nB.构件的重量\nC.吊装高度\nD.施工现场条件\nE.厂房的结构类别", "options": {"A": "厂房的跨度", "B": "构件的重量", "C": "吊装高度", "D": "施工现场条件", "E": "厂房的结构类别"}, "answer": "ABCD", "type": "multi", "category": "特种设备"}, {"id": 2427, "question": "需要附着的塔吊，使用单位必须按说明书要求编制附墙方案，\n含以下书面材料（\n）。\nA.各道附着装置的距离\nB.与建筑物水平附着的距离\n\n=== 第851页 ===\nC.与建筑物的联结形式\nD.各种特殊要求\nE.安装用材料的品牌", "options": {"A": "各道附着装置的距离", "B": "与建筑物水平附着的距离 === 第851页 ===", "C": "与建筑物的联结形式", "D": "各种特殊要求", "E": "安装用材料的品牌"}, "answer": "ABCD", "type": "multi", "category": "特种设备"}, {"id": 2428, "question": "物料提升机限位装置应符合下列规定（\n）。\nA.当吊笼上升至上限位限定位置时，触发限位开关，吊笼被制停，上\n部越程距离不应小于3m\nB.当吊笼上升至上限位限定位置时，触发限位开关，吊笼被制停，上\n部越程距离不应小于2m\nC.当吊笼下降至下限位限定位置时，触发限位开关，吊笼被制停。下\n部越程距离不应小于2m\nD.当吊笼下降至下限位限定位置时，触发限位开关，吊笼被制停\nE.以上选项均是", "options": {"A": "当吊笼上升至上限位限定位置时，触发限位开关，吊笼被制停，上 部越程距离不应小于3m", "B": "当吊笼上升至上限位限定位置时，触发限位开关，吊笼被制停，上 部越程距离不应小于2m", "C": "当吊笼下降至下限位限定位置时，触发限位开关，吊笼被制停。下 部越程距离不应小于2m", "D": "当吊笼下降至下限位限定位置时，触发限位开关，吊笼被制停", "E": "以上选项均是"}, "answer": "AD", "type": "multi", "category": "用电安全"}, {"id": 2429, "question": "下列关于物料提升机防护围栏的表述错误的是（\n）。\nA.物料提升机地面进料口应设置防护围栏\nB.围栏高度不应小于1.5m，围栏立面可采用网板结构\nC.进料口门的开启高度不应小于1.6m\nD.吊笼应在进料口门关闭后才能启动\nE.以上选项均是", "options": {"A": "物料提升机地面进料口应设置防护围栏", "B": "围栏高度不应小于1.5m，围栏立面可采用网板结构", "C": "进料口门的开启高度不应小于1.6m", "D": "吊笼应在进料口门关闭后才能启动", "E": "以上选项均是"}, "answer": "BC", "type": "multi", "category": "安全管理"}, {"id": 2430, "question": "物料提升机起重量限制器的说法正确的说法有（\n）。\n\n=== 第852页 ===\nA.当荷载达到额定起重量的90%时，起重量限制器应发出警示信号\nB.当荷载达到额定起重量的100%时，起重量限制器应发出警示信号\nC.当荷载达到额定起重量的110%时，起重量限制器应切断上升主电\n路电源\nD.当荷载达到额定起重量的125%时，起重量限制器应切断上升主电\n路电源\nE.以上选项均是", "options": {"A": "当荷载达到额定起重量的90%时，起重量限制器应发出警示信号", "B": "当荷载达到额定起重量的100%时，起重量限制器应发出警示信号", "C": "当荷载达到额定起重量的110%时，起重量限制器应切断上升主电 路电源", "D": "当荷载达到额定起重量的125%时，起重量限制器应切断上升主电 路电源", "E": "以上选项均是"}, "answer": "AC", "type": "multi", "category": "特种设备"}, {"id": 2431, "question": "关于物料提升机安全装置说法正确的是（\n）。\nA.当吊笼提升钢丝绳断绳时，防坠安全器应制停带有额定起重量的吊\n笼，且不应造成结构损坏\nB.当吊笼提升钢丝绳断绳时，防坠安全器应制停带有超额定起重量的\n吊笼，且不应造成结构损坏\nC.自升平台应采用瞬时防坠安全器\nD.自升平台应采用渐进式防坠安全器\nE.以上选项均是", "options": {"A": "当吊笼提升钢丝绳断绳时，防坠安全器应制停带有额定起重量的吊 笼，且不应造成结构损坏", "B": "当吊笼提升钢丝绳断绳时，防坠安全器应制停带有超额定起重量的 吊笼，且不应造成结构损坏", "C": "自升平台应采用瞬时防坠安全器", "D": "自升平台应采用渐进式防坠安全器", "E": "以上选项均是"}, "answer": "AD", "type": "multi", "category": "特种设备"}, {"id": 2432, "question": "物料提升机安全停层装置有以下要求（\n）。\nA.应为刚性机构\nB.应为柔性机构\nC.应能可靠承担吊笼自重、额定荷载及运料人员等全部工作荷载\nD.吊笼停层后底板与停层平台的垂直偏差不应大于200mm\n\n=== 第853页 ===\nE.以上选项均是", "options": {"A": "应为刚性机构", "B": "应为柔性机构", "C": "应能可靠承担吊笼自重、额定荷载及运料人员等全部工作荷载", "D": "吊笼停层后底板与停层平台的垂直偏差不应大于200mm === 第853页 ===", "E": "以上选项均是"}, "answer": "AC", "type": "multi", "category": "安全管理"}, {"id": 2433, "question": "物料提升机承重构件的截面尺寸应经计算确定，并应符合下列\n规定（\n）。\nA.钢管壁厚不应小于3.0mm\nB.角钢截面不应小于50mm×5mm\nC.钢板厚度不应小于6mm\nD.型钢不得使用A3 钢\nE.以上选项均是", "options": {"A": "钢管壁厚不应小于3.0mm", "B": "角钢截面不应小于50mm×5mm", "C": "钢板厚度不应小于6mm", "D": "型钢不得使用A3 钢", "E": "以上选项均是"}, "answer": "BC", "type": "multi", "category": "法律法规"}, {"id": 2434, "question": "在选择导线截面时，有按机械强度选择、按允许电流选择、按\n允许电压降选择三项基本要求，须遵循下列（\n）来确定导线截面。\nA.现场所选用的导线截面仅需满足三项要求之一\nB.现场所选用的导线截面应至少按其中两项要求，并以求得的截面最\n大者为准\nC.现场所选用的导线截面应同时满足三项要求\nD.以按三种方法求得的截面中最大者为准以按三种方法求得的截面\n中最小者为准\nE.以按三种方法求得的截面中最小者为准", "options": {"A": "现场所选用的导线截面仅需满足三项要求之一", "B": "现场所选用的导线截面应至少按其中两项要求，并以求得的截面最 大者为准", "C": "现场所选用的导线截面应同时满足三项要求", "D": "以按三种方法求得的截面中最大者为准以按三种方法求得的截面 中最小者为准", "E": "以按三种方法求得的截面中最小者为准"}, "answer": "CD", "type": "multi", "category": "安全管理"}, {"id": 2435, "question": "物料提升机承重构件除应满足强度要求，尚应符合下列规定\n（\n）。\n\n=== 第854页 ===\nA.物料提升机导轨架的长细比不应大于150\nB.井架结构的长细比不应大于180\nC.附墙架的长细比不应大于180\nD.受压构件长细比不小于150\nE.以上选项均是", "options": {"A": "物料提升机导轨架的长细比不应大于150", "B": "井架结构的长细比不应大于180", "C": "附墙架的长细比不应大于180", "D": "受压构件长细比不小于150", "E": "以上选项均是"}, "answer": "ABC", "type": "multi", "category": "法律法规"}, {"id": 2436, "question": "关于物料提升机钢丝绳说法正确的是（\n）。\nA.自升平台钢丝绳直径不应小于8mm，安全系数不应小于9\nB.提升吊笼钢丝绳直径不应小于12mm，安全系数不应小于8\nC.安装吊杆钢丝绳直径不应小于6mm，安全系数不应小于8\nD.当钢丝绳端部固定采用绳夹时，绳夹规格应与绳径匹配，数量不应\n少于3 个，间距不应小于绳径的25 倍\nE.以上选项均是", "options": {"A": "自升平台钢丝绳直径不应小于8mm，安全系数不应小于9", "B": "提升吊笼钢丝绳直径不应小于12mm，安全系数不应小于8", "C": "安装吊杆钢丝绳直径不应小于6mm，安全系数不应小于8", "D": "当钢丝绳端部固定采用绳夹时，绳夹规格应与绳径匹配，数量不应 少于3 个，间距不应小于绳径的25 倍", "E": "以上选项均是"}, "answer": "BC", "type": "multi", "category": "安全管理"}, {"id": 2437, "question": "铲运机的施工方法有（\n）。\nA.并列推土\nB.下坡铲土\nC.跨铲法\nD.助铲法\nE.多刀送土", "options": {"A": "并列推土", "B": "下坡铲土", "C": "跨铲法", "D": "助铲法", "E": "多刀送土"}, "answer": "BCD", "type": "multi", "category": "安全管理"}, {"id": 2438, "question": "物料提升机在下列条件下应能正常作业（\n）。\n\n=== 第855页 ===\nA.环境温度为－20℃～＋50℃\nB.导轨架顶部风速不大于20m/s\nC.电源电压值与额定电压值偏差为±15%\nD.供电总功率不小于产品使用说明书的规定值\nE.恶劣天气", "options": {"A": "环境温度为－20℃～＋50℃", "B": "导轨架顶部风速不大于20m/s", "C": "电源电压值与额定电压值偏差为±15%", "D": "供电总功率不小于产品使用说明书的规定值", "E": "恶劣天气"}, "answer": "BD", "type": "multi", "category": "法律法规"}, {"id": 2439, "question": "钢筋强化机械包括（\n）等。\nA.钢筋冷拉机\nB.钢筋冷拔机\nC.钢筋轧扭机\nD.钢筋调直机\nE.钢筋弯曲机", "options": {"A": "钢筋冷拉机", "B": "钢筋冷拔机", "C": "钢筋轧扭机", "D": "钢筋调直机", "E": "钢筋弯曲机"}, "answer": "ABC", "type": "multi", "category": "安全管理"}, {"id": 2440, "question": "物料提升机的（\n）及使用，除应符合本规范外，尚应符合国\n家现行有关标准的规定。\nA.操作\nB.制作\nC.安装\nD.设计\nE.拆除", "options": {"A": "操作", "B": "制作", "C": "安装", "D": "设计", "E": "拆除"}, "answer": "BCDE", "type": "multi", "category": "法律法规"}, {"id": 2441, "question": "对起吊物进行（\n）停止时的全过程应用旗语或通用手势信号\n\n=== 第856页 ===\n进行指挥，信号不明不得启动，上下相互协调联系应采用对讲机。\nA.移动\nB.吊升\nC.绑扎\nD.安装\nE.检查", "options": {"A": "移动", "B": "吊升", "C": "绑扎", "D": "安装", "E": "检查"}, "answer": "ABD", "type": "multi", "category": "安全管理"}, {"id": 2442, "question": "起重机（\n）或（\n）时，必须与架空输电线始终保持不小\n于国家现行标准《施工现场临时用电安全技术规范》（JGJ46）规定的\n安全距离。\nA.在靠近架空输电线路作业\nB.在无线电发射塔附近行走\nC.在架空输电线路下作业\nD.在架空输电线路下行走\nE.其它", "options": {"A": "在靠近架空输电线路作业", "B": "在无线电发射塔附近行走", "C": "在架空输电线路下作业", "D": "在架空输电线路下行走", "E": "其它"}, "answer": "AD", "type": "multi", "category": "用电安全"}, {"id": 2443, "question": "起吊过程中，汽车式起重机在（\n）等动作前，起重司机应鸣\n声示意。一次只宜进行一个动作，待前一动作结束后，再进行下一动\n作。\nA.伸缩臂\nB.回转\nC.俯仰吊臂\n\n=== 第857页 ===\nD.起落吊钩\nE.行走", "options": {"A": "伸缩臂", "B": "回转", "C": "俯仰吊臂 === 第857页 ===", "D": "起落吊钩", "E": "行走"}, "answer": "BCDE", "type": "multi", "category": "特种设备"}, {"id": 2444, "question": "吊装作业开始起吊时，应先将构件吊离地面200～300mm 后停\n止起吊，并检查起重机（\n）等，待确认无误后，方可继续起吊。\nA.起重机的灵活性\nB.制动装置的可靠性\nC.构件的平衡性\nD.绑扎的牢固性\nE.以上选项均是", "options": {"A": "起重机的灵活性", "B": "制动装置的可靠性", "C": "构件的平衡性", "D": "绑扎的牢固性", "E": "以上选项均是"}, "answer": "BCD", "type": "multi", "category": "特种设备"}, {"id": 2445, "question": "吊起的构件应确保在起重机吊杆顶的正下方，严禁（\n）。\nA.超额定起重量80%\nB.斜拉\nC.斜吊\nD.严禁起吊埋于地下或粘结在地面上的构件\nE.以上选项均是", "options": {"A": "超额定起重量80%", "B": "斜拉", "C": "斜吊", "D": "严禁起吊埋于地下或粘结在地面上的构件", "E": "以上选项均是"}, "answer": "BCD", "type": "multi", "category": "特种设备"}, {"id": 2446, "question": "高空吊装（\n）时，应于构件两端绑扎溜绳，由操作人员控制\n构件的平衡和稳定。\nA.屋架\nB.檩条\n\n=== 第858页 ===\nC.斜吊法吊装柱\nD.梁\nE.钢筋", "options": {"A": "屋架", "B": "檩条 === 第858页 ===", "C": "斜吊法吊装柱", "D": "梁", "E": "钢筋"}, "answer": "ACD", "type": "multi", "category": "高处作业"}, {"id": 2447, "question": "关于盾构机导向装置的说法正确的有（\n）。\nA.定期用人工测量方法对导向系统的数据进行复核\nB.系统的测站点和后视点安装在隧道管片的固定支架上\nC.支架应稳固，不应晃动\nD.及时向规划部门提交测量成果\nE.以上选项均是", "options": {"A": "定期用人工测量方法对导向系统的数据进行复核", "B": "系统的测站点和后视点安装在隧道管片的固定支架上", "C": "支架应稳固，不应晃动", "D": "及时向规划部门提交测量成果", "E": "以上选项均是"}, "answer": "ABC", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2448, "question": "盾构机后续台车应符合下列要求（\n）。\nA.轨距根据工程需要确定\nB.台车专用轨道铺设应牢固\nC.各台车运转应平稳\nD.制动应良好\nE.以上选项均是", "options": {"A": "轨距根据工程需要确定", "B": "台车专用轨道铺设应牢固", "C": "各台车运转应平稳", "D": "制动应良好", "E": "以上选项均是"}, "answer": "BCD", "type": "multi", "category": "安全管理"}, {"id": 2449, "question": "盾构机的开挖系统应符合下列规定（\n）。\nA.刀盘密封油脂不能密封\nB.刀座与刀盘焊缝不应有缺陷\nC.驱动系统正转、反转、速度调节等功能应正常\n\n=== 第859页 ===\nD.超挖装置应能准确控制超挖量、超挖范围\nE.以上选项均是", "options": {"A": "刀盘密封油脂不能密封", "B": "刀座与刀盘焊缝不应有缺陷", "C": "驱动系统正转、反转、速度调节等功能应正常 === 第859页 ===", "D": "超挖装置应能准确控制超挖量、超挖范围", "E": "以上选项均是"}, "answer": "BCD", "type": "multi", "category": "基坑工程"}, {"id": 2450, "question": "关于盾构机推进系统说法错误的是（\n）。\nA.各推进油缸推进速度、行程、压力应高于说明书要求\nB.铰接系统伸出、缩回动作应符合说明书规定，行程显示应正确\nC.主轴承润滑油脂系统工作应正常\nD.轴承止水带安装应牢固但不应密封\nE.以上选项均是", "options": {"A": "各推进油缸推进速度、行程、压力应高于说明书要求", "B": "铰接系统伸出、缩回动作应符合说明书规定，行程显示应正确", "C": "主轴承润滑油脂系统工作应正常", "D": "轴承止水带安装应牢固但不应密封", "E": "以上选项均是"}, "answer": "AD", "type": "multi", "category": "法律法规"}, {"id": 2451, "question": "对盾构施工中，管片安装机构说法正确的是（\n）。\nA.管片安装机构前后运动、回旋、伸缩等动作应灵敏\nB.推压力、旋转速度、前后滑动距离应根据施工进度确定\nC.真圆保持器工作应正常\nD.管片贮运装置运转应完好\nE.以上选项均是", "options": {"A": "管片安装机构前后运动、回旋、伸缩等动作应灵敏", "B": "推压力、旋转速度、前后滑动距离应根据施工进度确定", "C": "真圆保持器工作应正常", "D": "管片贮运装置运转应完好", "E": "以上选项均是"}, "answer": "ACD", "type": "multi", "category": "安全管理"}, {"id": 2452, "question": "配电箱中的刀型开关在正常情况下可用于（\n）。\nA.接通空载线路\nB.分断空载线路\nC.电源隔离\nD.接通负载线路\n\n=== 第860页 ===\nE.以上选项均是", "options": {"A": "接通空载线路", "B": "分断空载线路", "C": "电源隔离", "D": "接通负载线路 === 第860页 ===", "E": "以上选项均是"}, "answer": "ABC", "type": "multi", "category": "用电安全"}, {"id": 2453, "question": "隧道施工应加强电气的绝缘，选用特殊绝缘构造的电器，如\n（\n）。\nA.加强型电器\nB.选用额定电压低一级的电器\nC.在有瓦斯的隧道中应对电器设置防护措施\nD.高海拔地区应选用高原电器设备\nE.以上选项均是", "options": {"A": "加强型电器", "B": "选用额定电压低一级的电器", "C": "在有瓦斯的隧道中应对电器设置防护措施", "D": "高海拔地区应选用高原电器设备", "E": "以上选项均是"}, "answer": "ACD", "type": "multi", "category": "用电安全"}, {"id": 2454, "question": "安装、拆卸施工起重机械和整体提升脚手架、模板等自升式架\n设设施时（\n）。\nA.应当编制装拆方案\nB.制定安全施工措施\nC.由专业技术人员现场监督\nD.必须由具有相应资质的单位承担\nE.可以由非专业人员进行", "options": {"A": "应当编制装拆方案", "B": "制定安全施工措施", "C": "由专业技术人员现场监督", "D": "必须由具有相应资质的单位承担", "E": "可以由非专业人员进行"}, "answer": "ABCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2455, "question": "下列关于盾构机的开挖系统的说法正确的有（\n）。\nA.螺旋输送机运转应正常\nB.伸缩机构工作应完好\nC.观测窗口不应有堵塞\n\n=== 第861页 ===\nD.卸土门在动力失去时应能开启\nE.土压力传感器显示应准确", "options": {"A": "螺旋输送机运转应正常", "B": "伸缩机构工作应完好", "C": "观测窗口不应有堵塞 === 第861页 ===", "D": "卸土门在动力失去时应能开启", "E": "土压力传感器显示应准确"}, "answer": "ABCE", "type": "multi", "category": "基坑工程"}, {"id": 2456, "question": "钢筋切断机的传动及切断系统应符合下列规定（\n）。\nA.传动机构应运转平稳\nB.开式传动齿轮磨损量不应超过齿厚的25%\nC.滑块与导轨纵向游动间隙应小于0.5mm\nD.滑块与导轨的横向间隙应大于0.2mm\nE.开式传动齿轮磨损量不应超过齿厚的35%", "options": {"A": "传动机构应运转平稳", "B": "开式传动齿轮磨损量不应超过齿厚的25%", "C": "滑块与导轨纵向游动间隙应小于0.5mm", "D": "滑块与导轨的横向间隙应大于0.2mm", "E": "开式传动齿轮磨损量不应超过齿厚的35%"}, "answer": "ABC", "type": "multi", "category": "法律法规"}, {"id": 2457, "question": "钢筋弯曲机的传动系统及工作机构应符合下列规定（\n）。\nA.传动齿轮啮合应良好\nB.芯轴和成型轴、挡铁轴、轴套应完整\nC.芯轴和成型轴、挡铁轴的规格与加工钢筋的直径和弯曲半径应相适\n应\nD.芯轴直径应为钢筋直径的5 倍\nE.挡铁轴应有轴套", "options": {"A": "传动齿轮啮合应良好", "B": "芯轴和成型轴、挡铁轴、轴套应完整", "C": "芯轴和成型轴、挡铁轴的规格与加工钢筋的直径和弯曲半径应相适 应", "D": "芯轴直径应为钢筋直径的5 倍", "E": "挡铁轴应有轴套"}, "answer": "ABCE", "type": "multi", "category": "法律法规"}, {"id": 2458, "question": "减压器是保证氧气瓶安全作用的安全装置；当氧气瓶因高温等\n原因导致瓶内（\n）、（\n），此时，减压阀将自动开启，释放出瓶\n内膨胀气体，降低瓶内压力，以防止氧气瓶爆炸。\nA.气体膨胀\n\n=== 第862页 ===\nB.温度上升\nC.体积缩小\nD.压力增高\nE.其它", "options": {"A": "气体膨胀 === 第862页 ===", "B": "温度上升", "C": "体积缩小", "D": "压力增高", "E": "其它"}, "answer": "AD", "type": "multi", "category": "安全管理"}, {"id": 2459, "question": "竖向钢筋电渣压力焊机焊接机头应符合下列规定（\n）。\nA.上夹头升降不应有卡滞\nB.电极钳口、夹具不应有磨损\nC.电极钳口、夹具可有少量变形\nD.夹头定位应准确，对中应迅速\nE.以上选项均是", "options": {"A": "上夹头升降不应有卡滞", "B": "电极钳口、夹具不应有磨损", "C": "电极钳口、夹具可有少量变形", "D": "夹头定位应准确，对中应迅速", "E": "以上选项均是"}, "answer": "ABD", "type": "multi", "category": "法律法规"}, {"id": 2460, "question": "根据《建设工程安全生产管理条例》规定，安装、拆卸施工起\n重机械和整体提升脚手架、模板等自升式架设设施，应当（\n），并\n由专业技术人员现场监督。\nA.编制用工计划\nB.编制装拆方案\nC.制定安全施工措施\nD.制定卫生防疫\nE.制定用电用水计划", "options": {"A": "编制用工计划", "B": "编制装拆方案", "C": "制定安全施工措施", "D": "制定卫生防疫", "E": "制定用电用水计划"}, "answer": "BC", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2461, "question": "根据《建设工程安全生产管理条例》规定，（\n）等自升式架\n\n=== 第863页 ===\n设设施的使用达到国家规定的检验检测期限的，必须经具有专业资质\n的检验检测机构检测。经检测不合格的，不得继续使用。\nA.施工起重机械\nB.施工电气设备\nC.悬挑脚手架\nD.整体提升脚手架\nE.模板", "options": {"A": "施工起重机械", "B": "施工电气设备", "C": "悬挑脚手架", "D": "整体提升脚手架", "E": "模板"}, "answer": "ADE", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2462, "question": "钢筋冷拉机作业前，应对（\n）进行检查。\nA.设备各连接部位\nB.钢筋\nC.冷拉夹具\nD.钢丝绳\nE.电气装置", "options": {"A": "设备各连接部位", "B": "钢筋", "C": "冷拉夹具", "D": "钢丝绳", "E": "电气装置"}, "answer": "ACDE", "type": "multi", "category": "用电安全"}, {"id": 2463, "question": "施工现场用气应符合下列（\n）规定。\nA.严禁使用减压器及其他附件缺损的氧气瓶\nB.气瓶应保持直立状态，并采取防倾倒措施，乙炔瓶严禁横躺卧放\nC.气瓶应远离火源，与火源的距离不应小于10m，并应采取避免高温\n和防止暴晒的措施\nD.燃气储装瓶罐应设置防静电装置\nE.空瓶和实瓶同库存放时，应分开放置，空瓶和实瓶的间距不应小于\n\n=== 第864页 ===\n1．5m", "options": {"A": "严禁使用减压器及其他附件缺损的氧气瓶", "B": "气瓶应保持直立状态，并采取防倾倒措施，乙炔瓶严禁横躺卧放", "C": "气瓶应远离火源，与火源的距离不应小于10m，并应采取避免高温 和防止暴晒的措施", "D": "燃气储装瓶罐应设置防静电装置", "E": "空瓶和实瓶同库存放时，应分开放置，空瓶和实瓶的间距不应小于 === 第864页 === 1．5m"}, "answer": "ABCDE", "type": "multi", "category": "法律法规"}, {"id": 2464, "question": "塔身（\n）m 的塔式起重机，应在塔顶和臂架端部设红色信号\n灯。\nA.20\nB.25\nC.35\nD.40\nE.45", "options": {"A": "20", "B": "25", "C": "35", "D": "40", "E": "45"}, "answer": "CDE", "type": "multi", "category": "特种设备"}, {"id": 2465, "question": "开关箱中的隔离开关只可直接控制照明电路和容量为（\n）\nkW 的动力电路，但不应频繁操作。\nA.1\nB.2\nC.3\nD.4\nE.5", "options": {"A": "1", "B": "2", "C": "3", "D": "4", "E": "5"}, "answer": "ABC", "type": "multi", "category": "用电安全"}, {"id": 2466, "question": "移动式配电箱、开关箱应装设在坚固、稳定的支架上。其中心\n点与地面的垂直距离可以为（\n）m。\nA.0.5\nB.0.8\n\n=== 第865页 ===\nC.1\nD.1.5\nE.2", "options": {"A": "0.5", "B": "0.8 === 第865页 ===", "C": "1", "D": "1.5", "E": "2"}, "answer": "BCD", "type": "multi", "category": "脚手架与模板工程"}, {"id": 2467, "question": "每台用电设备必须有各自专用的开关箱，用同一个开关箱直接\n控制（\n）台用电设备（含插座）是不允许的。\nA.1\nB.2\nC.3\nD.4\nE.5", "options": {"A": "1", "B": "2", "C": "3", "D": "4", "E": "5"}, "answer": "BCDE", "type": "multi", "category": "用电安全"}, {"id": 2468, "question": "电工在安装配电箱时，分配电箱与开关箱的距离可以相距（\n）\nm。\nA.10\nB.20\nC.30\nD.40\nE.50", "options": {"A": "10", "B": "20", "C": "30", "D": "40", "E": "50"}, "answer": "ABC", "type": "multi", "category": "用电安全"}, {"id": 2469, "question": "《广东省安全生产条例》规定，生产经营单位的主要负责人和\n其他责任人不得以任何形式转移安全生产责任。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 2470, "question": "《广东省安全生产条例》规定，鼓励生产经营单位设置安全技\n术负责人或者其他专职安全生产分管负责人。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 2471, "question": "《广东省安全生产条例》规定，生产经营单位制定或者修改有\n关安全生产的规章制度，应当听取工会的意见。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 2472, "question": "《广东省安全生产条例》规定，生产经营单位的班组每月至少\n开展一次安全生产检查，从业人员在每班工作前应当进行本岗位安全\n检查，确认安全后方可进行操作。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 2473, "question": "《广东省安全生产条例》规定，生产经营单位应当具备的安全\n生产条件所必需的资金投入，由生产经营单位的决策机构、主要负责\n人或者个人经营的投资人予以保证。\nA.正确\nB.错误\n\n=== 第867页 ===", "options": {"A": "正确", "B": "错误 === 第867页 ==="}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 2474, "question": "《广东省安全生产条例》规定，任何单位或者个人对事故隐患\n和安全生产违法行为，有权向负有安全生产监督管理职责的部门和其\n他监管部门举报。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 2475, "question": "《广东省安全生产条例》规定，生产经营单位对离岗六个月以\n上的从业人员未进行专门安全生产教育和培训的，责令限期改正，可\n以处五万元以下的罚款。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 2476, "question": "《建设工程安全生产管理条例》适用于抢险救灾和农民自建低\n层住宅的安全生产管理。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 2477, "question": "《建设工程高大模板支撑系统施工安全监督管理导则》所称高\n大模板支撑系统是指建设工程施工现场混凝土构件模板支撑高度超\n过8m，或搭设跨度超过18m，或施工总荷载大于15kN/㎡，或集中\n线荷载大于20kN/m 的模板支撑系统。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 2478, "question": "《中华人民共和国安全生产法》规定，生产经营单位发生生产\n\n=== 第868页 ===\n安全事故后，事故现场有关人员应当采取相应的处理措施后，向本单\n位负责人报告。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 2479, "question": "《中华人民共和国特种设备安全法》规定，发生重大事故，由\n当地政府负责特种设备安全监督管理的部门会同有关部门组织事故\n调查组进行调查。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 2480, "question": "12 个月内同一企业连续发生2 次生产安全事故的，吊销安全生\n产许可证。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 2481, "question": "1 万平方米以下的建筑工程，总承包单位配备项目专职安全生产\n管理人员不少于1 人。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2482, "question": "负有安全生产监督管理的有关政府部门应当建立事故隐患排查\n治理监督检查制度，定期组织对生产经营单位事故隐患排查治理情况\n开展监督检查。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 2483, "question": "不具备安全培训条件的生产经营单位，应当委托具有安全培训\n条件的机构对从业人员进行安全培训。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2484, "question": "出租单位应当对出租的机械设备和施工机具及配件的安全性能\n进行检测，在签订租赁协议时，不必出具检测合格证明。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2485, "question": "从业人员发现直接危及人身安全的紧急情况时，有权停止作业\n或者在采取可能的应急措施后撤离作业场所。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 2486, "question": "对于发现的重大安全隐患，项目专职安全生产管理人员有权向\n企业安全生产管理机构报告。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2487, "question": "高大模板支撑系统应优先选用高新技术的定型化、工具式支撑\n体系。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 2488, "question": "根据《中华人民共和国安全生产法》规定，建设项目安全设施\n的设计人、设计单位应当对安全设施设计负责。\n\n=== 第870页 ===\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 2489, "question": "根据《建筑起重机械安全监督管理规定》，使用单位可以在建筑\n起重机械上安装非原制造厂制造的标准节和附着装置。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 2490, "question": "根据《建筑起重机械安全监督管理规定》，特种作业人员的特种\n作业操作资格证书由国务院建设主管部门规定统一样式。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 2491, "question": "公民、法人或者其他组织因违法受到行政处罚，其违法行为对\n他人造成损害的，应当依法承担刑事责任。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2492, "question": "核设施事故适用《生产安全事故报告和调查处理条例》。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 2493, "question": "建设单位未按《广东省建设厅建筑工程安全防护、文明施工措\n施费用管理办法》规定及时审批支付安全措施费的，责令限期改正；\n逾期未改正的，依照有关法律、法规给予处罚。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "文明施工"}, {"id": 2494, "question": "建设行政主管部门应当自收到申请之日起十五日内，对符合条\n件的申请颁发施工许可证。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2495, "question": "建筑施工企业安全生产许可证被吊销后，自吊销决定作出之日\n起两年内不得重新申请。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2496, "question": "建筑施工企业应当依法为职工参加工伤保险，缴纳工伤保险费。\n鼓励企业为从事危险作业的职工办理意外伤害保险，支付保险费。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2497, "question": "建筑施工企业应当在建设工程项目组建安全生产领导小组。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2498, "question": "建筑施工企业应当在施工现场采取维护安全、防范危险、预防\n火灾等措施；有条件的，应当对施工现场实行封闭管理。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 2499, "question": "建筑施工企业应依法为职工参加工伤保险缴纳工伤保险费。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2500, "question": "建筑施工企业主要负责人、项目负责人和专职安全生产管理人\n员应当在安全生产考核合格证书有效期届满前3 个月内，经所在企业\n向原考核机关申请证书延续。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2501, "question": "建筑施工特种作业人员的资格证书可以转让。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2502, "question": "建筑施工项目实行施工总承包的，施工总承包单位对项目安全\n生产标准化工作负总责。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 2503, "question": "建筑业企业资质证书分为正本和副本，由国务院住房城乡建设\n主管部门统一印制，正、副本具备同等法律效力。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 2504, "question": "高大模板支撑系统浇筑过程，项目专职安全生产管理人员应当\n对专项施工方案实施情况进行现场监督。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 2505, "question": "其他无关人员对违反工程建设强制性标准的行为无权向建设行\n政主管部门或者有关部门检举、控告、投诉。\n\n=== 第873页 ===\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 2506, "question": "企业未取得安全生产许可证的，特殊情况下可以从事生产活动。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2507, "question": "生产经营单位必须依法参加工伤保险，为从业人员缴纳保险费。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2508, "question": "生产经营单位的主要负责人未履行《中华人民共和国安全生产\n法》规定的安全生产管理职责，导致发生一般生产安全事故的，由应\n急管理部门依照规定处以上一年收入百分之四十的罚款。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 2509, "question": "生产经营单位进行爆破、吊装等危险作业，应当安排人员进行\n现场安全管理，确保操作规程的遵守和安全措施的落实。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 2510, "question": "施工单位的主要负责人、项目负责人、专职安全生产管理人员\n应当经工商管理部门考核合格后方可任职。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2511, "question": "施工单位应当按照规定对危大工程进行施工监测和安全巡视，\n\n=== 第874页 ===\n发现危及人身安全的紧急情况，应当立即组织作业人员撤离危险区域。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 2512, "question": "施工单位应当设立安全生产管理机构，配备专职安全生产管理\n人员。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2513, "question": "施工单位在使用施工起重机械和整体提升脚手架、模板等自升\n式架设设施前，应当组织有关单位进行验收，也可以委托具有相应资\n质的检验检测机构进行验收。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 2514, "question": "施工单位专职安全生产管理人员依法对本单位的安全生产工作\n全面负责。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2515, "question": "使用单位在建筑起重机械租期结束后，应当将定期检查、维护\n和保养记录移交出租单位。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 2516, "question": "事故调查组成员在事故调查工作中应当诚信公正、恪尽职守，\n遵守事故调查组的纪律，保守事故调查的秘密。\n\n=== 第875页 ===\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 2517, "question": "首次取得《建筑施工特种作业操作资格证》的人员实习操作不\n得少于3 个月。实习操作期间，用人单位应当指定专人指导和监督作\n业。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2518, "question": "特种设备检验、检测机构的检验、检测人员可以在两个以上检\n验、检测机构中执业。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 2519, "question": "危险物品的生产、经营、储存、装卸单位以及矿山、金属冶炼、\n建筑施工、运输单位的主要负责人和安全生产管理人员，应当由主管\n的负有安全生产监督管理职责的部门对其安全生产知识和管理能力\n考核合格。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2520, "question": "县级以上地方人民政府住房城乡建设主管部门负责对本行政区\n域内“安管人员”安全生产工作进行监督管理。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2521, "question": "依据《建设工程安全生产管理条例》规定，监理单位必须为施\n\n=== 第876页 ===\n工现场从事危险作业的人员办理意外伤害保险。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 2522, "question": "用人单位应当按时缴纳工伤保险费，职工个人不缴纳工伤保险\n费。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2523, "question": "建筑施工企业应当投保安全生产责任保险。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2524, "question": "建筑施工企业应当设置安全生产管理机构或者配备专职安全生\n产管理人员。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2525, "question": "《建筑施工企业负责人及项目负责人施工现场带班暂行办法》\n所称的施工现场，是指进行房屋建筑、市政工程施工作业活动的场所。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2526, "question": "出租的机械设备和施工机具及配件，必须持有生产（制造）许\n可证、产品合格证。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2527, "question": "搭设高度20m 及以上的落地式钢管脚手架工程属于危险性较大\n的分部分项工程。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 2528, "question": "根据《建筑施工企业安全生产许可证管理规定》，违反本规定，\n建筑施工企业未取得安全生产许可证擅自从事建筑施工活动的，责令\n其在建项目停止施工，没收违法所得，并处20 万元以上50 万元以下\n的罚款。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 2529, "question": "根据《危险性较大的分部分项工程安全管理办法》规定，建筑\n工程实行施工总承包的，专项方案应当由施工总承包单位组织编制。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2530, "question": "建设、设计、施工单位不得擅自修改已经依法备案的建设工程\n消防设计。确需修改的，建设单位应当重新申报消防设计备案。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 2531, "question": "建设单位领取施工许可证之后，既不开工又不申请延期或者超\n过延期时限的，施工许可证自行废止。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2532, "question": "建筑构件、建筑材料和室内装修、装饰材料的防火性能必须符\n合国家标准；没有国家标准的，无需标准，自行解决。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 2533, "question": "企业不可以申请多项建筑业企业资质。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2534, "question": "施工单位主要负责人依法对本单位的安全生产工作全面负责。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2535, "question": "施工现场临时搭建的建筑物应当符合安全使用要求。施工现场\n使用的装配式活动房屋应当具有产品合格证。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2536, "question": "施工总承包单位或专业承包单位将其承包的全部工程肢解以后，\n以发包的名义分别转给其他单位或个人施工的，属于转包。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2537, "question": "实行施工总承包的，施工总承包单位应当与分包单位签订建筑\n起重机械安装、拆卸工程安全协议。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 2538, "question": "总包单位应当将安全费用按比例直接支付分包单位并监督使用，\n分包单位不再重复提取。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2539, "question": "按照《危险性较大的分部分项工程安全管理规定》第十二条，\n对于超过一定规模的危大工程，施工单位应当组织召开专家论证会对\n专项施工方案进行论证。专家论证前专项施工方案应当通过施工单位\n审核和总监理工程师审查。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2540, "question": "危大工程实行分包并由分包单位编制专项施工方案的，专项施\n工方案应当由总承包单位技术负责人及分包单位技术负责人共同审\n核签字并加盖单位公章，报总监理工程师审批签字加盖执业印章。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2541, "question": "故意或过失传播突发传染病病原体，危害公共安全的，可以依\n照《中华人民共和国刑法》规定，以故意或过失危险方法危害公共安\n全罪依法追究刑事责任。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 2542, "question": "广东省台风预警信号分五级，分别以白色、蓝色、黄色、橙色\n和红色表示。\n\n=== 第880页 ===\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2543, "question": "不是每个人都有参加有组织的灭火工作的义务。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 2544, "question": "实行施工总承包的建设工程，由分包单位负责上报事故。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 2545, "question": "施工升降机安装完毕且调试后，安装单位应对安装质量进行自\n检，并应向使用单位进行安全使用说明。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 2546, "question": "施工单位应当在工程开工前制定专项的安全措施费使用计划，\n经监理单位和建设单位审查批准后实施。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2547, "question": "施工单位在采用新技术、新工艺、新设备、新材料时，应当对\n作业人员进行相应的安全生产教育培训。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2548, "question": "起重机用钢丝绳保养、维护、安装、检验和报废不用满足现行\n国家标准《起重机钢丝绳保养、维护、检验和报废》G B/T5972\n的\n\n=== 第881页 ===\n规定。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 2549, "question": "建设单位在申请领取施工许可证或办理安全监督手续时，应当\n提供危险性较大的分部分项工程清单和安全管理措施。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2550, "question": "建筑工程实行施工总承包的，专项方案应当由施工总承包单位\n组织编制。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2551, "question": "根据建筑施工特种作业人员管理的规定，建筑施工特种作业人\n员是指在房屋建筑和市政工程施工活动中，从事可能对本人、他人及\n周围设备设施的安全造成重大危害作业的人员。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 2552, "question": "建设单位未将保证安全施工的措施或者拆除工程的有关资料报\n送有关部门备案的，责令限期改正，并给予警告并开罚单。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2553, "question": "单位可以将工伤保险基金用于投资运营、兴建或者改建办公场\n所、发放奖金，或者挪作其他用途。\n\n=== 第882页 ===\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2554, "question": "安全生产行政法规的法律地位和法律效力高于有关安全生产的\n法律和地方性安全生产法规、地方政府安全生产规章。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 2555, "question": "违反《建设工程安全生产管理条例》规定，施工单位挪用列入\n建设工程概算的安全生产作业环境及安全施工措施所需费用的，责令\n限期改正，处挪用费用10%以上50%以下的罚款；造成损失的，依法\n承担赔偿责任。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 2556, "question": "特种作业操作证每4 年复审1 次。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2557, "question": "依据《建筑施工企业安全生产管理机构设置及专职安全生产管\n理人员配备办法》的规定，200 人及以上的劳务分包应当配备3 名及\n以上专职安全生产管理人员，并根据所承担的分部分项工程施工危险\n实际情况增加，不得少于工程施工人员总人数的5‰。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 2558, "question": "安全检查中的“一看”是指主要查看管理记录、持证上岗、现\n\n=== 第883页 ===\n场标识、交接验收资料、“三保”使用情况、“洞口”、“临边”防护情\n况、设备防护装置等。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2559, "question": "安全交底是指生产负责人在生产作业前对直接生产作业人员进\n行的该作业的安全操作规程和注意事项的培训，并通过书面文件方式\n予以确认。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2560, "question": "安全帽使用者可以根据头型调整内衬圆周大小，使佩戴舒适，\n牢固。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2561, "question": "安全色是传递安全信息含义的颜色，包括红、蓝、黄、绿四种\n颜色。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2562, "question": "安全生产管理的“六个坚持”原则是指坚持管生产同时管安全，\n坚持目标管理，坚持预防为主，坚持全员管理，坚持过程控制，坚持\n持续改进。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2563, "question": "安全生产管理的文明施工目标中“一创建”是指创建安全文明\n示范工地文明施工检查合格率。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "文明施工"}, {"id": 2564, "question": "安全生产管理要贯彻落实国家的法律法规，落实“预防为主，\n治理为辅，统筹兼顾”的安全生产方针。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 2565, "question": "导致能量或危险物质约束或限制措施破坏或失效的各种因素称\n作第一轮危险源。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2566, "question": "对使用易产生噪声的机具应采取封闭作业，装卸材料应轻卸轻\n放；未经审批，晚11：00～早9：00，中、高考期间晚8：00～早9：\n00 禁止施工。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2567, "question": "辅助标志是为了对某一种标志加以强调而增设辅助标志。提示\n标志的辅助标志为方向辅助标志。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2568, "question": "跟踪评价是在评价时无在建工程项目的企业，在企业有在建工\n\n=== 第885页 ===\n程项目时，再次进行的评价。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2569, "question": "混凝土搅拌机长期固定使用时，应在机座上铺设木枕或撑架找\n平牢固位置。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2570, "question": "建设单位应当将拆除工程发包给具有相应资质等级的施工单位。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2571, "question": "建筑企业安全生产工作的目标归根结底就是避免伤亡事故和经\n济损失。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 2572, "question": "建筑施工安全检查评分汇总表中的高处作业是指坠落高度基准\n面3 米及3 米以上有可能坠落的高处进行的作业。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "高处作业"}, {"id": 2573, "question": "建筑施工企业应当定期对兼职安全员进行安全教育培训。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2574, "question": "平（立）网的网目形状应为菱形或方形。\n\n=== 第886页 ===\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2575, "question": "生产经营单位应当安排用于配备劳动防护用品、进行安全生产\n培训的经费。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2576, "question": "生产经营单位应当在有较大危险因素的生产经营场所和有关设\n施、设备上，设置明显的安全警示标志。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2577, "question": "施工单位视情况决定是否设立安全生产管理机构，配备专职安\n全生产管理人员。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2578, "question": "施工单位应当结合危大工程专项施工方案编制监理实施细则，\n并对危大工程施工实施专项巡视检查。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2579, "question": "施工单位在承建工程项目签订的“工程合同”中，必须有防火\n安全的内容，会同建设单位做好防火工作。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 2580, "question": "电梯井口必须设置防护栏杆，电梯井内应每隔15m 设一道安全\n平网。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 2581, "question": "施工现场洞口的防护是指通道口、门窗口、楼梯口、电梯口的\n防护。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "特种设备"}, {"id": 2582, "question": "施工项目必须根据项目的特点，建立以技术负责人为首的安全\n生产领导小组。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2583, "question": "事故调查报告提交后，事故调查工作即告结束。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 2584, "question": "四级风力及其以上应停止一切吊运作业。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2585, "question": "特种作业操作证有效期为5 年，在全国范围内有效。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2586, "question": "体外心脏按压法操作方法中，抢救者以一手掌根部置于伤员胸\n\n=== 第888页 ===\n骨下2/3 段，即中指对准其颈部凹陷的下缘，另一手掌交叉重叠于该\n手背上，肘关节伸直，依靠体重和臂、肩部肌肉的力量，垂直用力，\n向脊柱方向冲击性地用力施压胸骨下段，使胸骨下段与其相连的肋骨\n下陷3～4cm，间接压迫心脏，使心脏内血液搏出。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2587, "question": "通过安全检查，可以相互学习、取长补短、交流经验、吸取教\n训，进一步促进安全生产工作。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2588, "question": "为使安全色更加醒目，使用对比色为其反衬色。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2589, "question": "五牌是工程概况牌、管理人员名单及监督电话牌、消防保卫牌、\n安全生产牌、文明施工牌，一图是施工现场总平面图。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 2590, "question": "现场处置方案应当规定应急工作职责、应急处置措施和注意事\n项等内容。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 2591, "question": "项目经理部应根据现场施工进度及内外环境因素的变化，及时\n\n=== 第889页 ===\n辨识新出现的危险源，并及时对项目部危险源识别清单进行更新。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2592, "question": "要加大生产安全事故问责力度，严格按照“四不放过”原则，\n对责任单位和责任人员资质资格实施处罚，并对查处情况予以公开曝\n光。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 2593, "question": "专项安全技术方案实施过程中的危险性较大的作业行为必须列\n入危险作业管理范围，作业前，必须办理作业申请，明确安全监控人\n员实施监控，并有监控记录。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2594, "question": "《建设工程安全生产管理条例》中规定，县级以上地方人民政\n府建设行政主管部门对本行政区域内的建设工程安全生产实施监督\n管理。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 2595, "question": "安全带不够长时，可以自行接长使用。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "高处作业"}, {"id": 2596, "question": "安全色标是特定的表达安全信息含义的颜色和标志。\n\n=== 第890页 ===\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2597, "question": "安全生产资料档案是安全管理基础工作之一，是检查考核落实\n安全责任制及各项规章制度的资料依据，也是现代化安全管理的基础。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2598, "question": "安全网按功能分为安全平网、安全立网、密目式安全立网。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "高处作业"}, {"id": 2599, "question": "城市轨道交通工程质量安全风险发生较大变化时，应急预案编\n制单位应当修订预案，修订情况应有记录并归档。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 2600, "question": "除非现场停工，不然凡是进入施工现场的所有人员都必须佩戴\n安全帽。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2601, "question": "从业人员因生产安全事故伤亡应由生产经营单位依法承担其应\n当承担的责任，但双方另有协议的除外。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 2602, "question": "搭设高度为50m 落地式钢管脚手架工程不属于超过一定规模的\n\n=== 第891页 ===\n危险性较大的分部分项工程范围。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 2603, "question": "电动冲击夯操作人员必须戴绝缘手套，穿绝缘鞋。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2604, "question": "施工电梯使用应有明确联络信号，禁止用敲打、呼叫等联络。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 2605, "question": "对认定为工伤的建筑业职工，各级社会保险经办机构和用人单\n位应依法按时足额支付各项工伤保险待遇。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2606, "question": "根据《建筑业企业职工安全培训教育暂行规定》要求专职管理\n和技术人员每年不多于40 学时。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2607, "question": "工会无权依法参加事故调查，向有关部门提出处理意见。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "事故处理"}, {"id": 2608, "question": "古建筑和重要文物单位等场所作业，按三级动火手续上报审批。\nA.正确\nB.错误\n\n=== 第892页 ===", "options": {"A": "正确", "B": "错误 === 第892页 ==="}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2609, "question": "建设单位在申请领取施工许可证时，不需要提供建设工程有关\n安全施工措施的资料。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2610, "question": "建筑施工企业应当建立健全劳动安全教育培训制度，加强对企\n业安全生产的教育培训；但因客观条件限制未经安全生产教育培训的\n人员，也可以上岗作业。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2611, "question": "建筑施工现场的电工、电焊工属于特种作业工种，只要按国家\n规定经专门安全作业培训后，就可上岗作业。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 2612, "question": "禁止标志的含义是强制人们必须做出某种动作或采取防范措施\n的图形标注。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2613, "question": "安全帽在经受严重冲击后，没有明显损坏，可以再次使用。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2614, "question": "劳务分包人员进入施工现场不必接受安全生产教育培训。\n\n=== 第893页 ===\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2615, "question": "群塔作业时，应绘制群塔作业平面布置图。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2616, "question": "生产经营单位不得因安全生产管理人员依法履行职责而降低其\n工资、福利等待遇或者解除与其订立的劳动合同。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2617, "question": "施工单位的主要负责人、项目负责人、专职安全生产管理人员\n应当经建设行政主管部门或者其他有关部门考核合格后方可任职。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2618, "question": "施工单位应当对危大工程施工作业人员进行实名制登记，项目\n负责人及相关管理人员应当在施工现场履职。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2619, "question": "施工单位应当根据建设工程施工的特点、范围，对施工现场易\n发生重大事故的部位、环节进行监控，制定施工现场生产安全事故应\n急预案。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 2620, "question": "施工机械进场前必须经过验收，合格后方能使用。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2621, "question": "施工现场食堂应设上、下水设施，排水、排气口应采用金属网\n封闭。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2622, "question": "施工现场易产生扬尘污染的作业区不应进行封闭作业。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "文明施工"}, {"id": 2623, "question": "为节省临建费用，可允许少量工人住宿在在建工程的地下室。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2624, "question": "项目负责人是施工项目安全生产的第一责任者，也必须持证上\n岗，加强对队伍的培训，使安全管理规范化。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2625, "question": "一个好的安全专项施工方案的编制必须有充分的资料作支撑，\n否则方案编制显得头重脚轻，空洞无物。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 2626, "question": "由施工企业或政府建设行政主管部门委托具备规定的建筑施工\n\n=== 第895页 ===\n安全生产评价资质的社会中介服务机构对施工企业实施的安全生产\n评价，也称第三方评价。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 2627, "question": "专职安全生产管理人员对违章指挥、违章操作的，应当立即报\n告，但无权制止其违章行为。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2628, "question": "作业人员不服管理，违反规章制度和操作规程冒险作业造成重\n大伤亡事故或其他严重后果，构成犯罪的，依照刑法有关规定追究刑\n事责任。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 2629, "question": "塔式起重机在使用过程中需要附着的，应制定相应的附着专项\n施工方案。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 2630, "question": "对应当给予行政处罚的行为，如企业认错态度良好可以不予处\n罚。（\n）\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2631, "question": "县级以上各级人民政府及其有关部门对报告重大事故隐患或者\n\n=== 第896页 ===\n举报安全生产违法行为的有功人员，给予奖励。（\n）\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 2632, "question": "生产经营单位经停产停业整顿，仍不具备法律、行政法规和国\n家标准或者行业标准规定的安全生产条件的，负有安全生产监督管理\n职责的部门应当予以关闭，有关部门应当依法吊销其有关证照。\n（\n）\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 2633, "question": "在郊区施工，现场四周不必设置围挡。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "文明施工"}, {"id": 2634, "question": "特种作业操作证的复审时间可以延长至每10 年1 次。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2635, "question": "施工现场夜间应有照明设备，无需安排人员巡逻。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2636, "question": "住建部、各省、自治区、直辖市建设行政主管部门规定专职人\n员要进行培训考核，具体由省级建设行政主管部门经办。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 2637, "question": "根据《施工企业安全生产评价标准》JGJ/T77—2010，外部评价\n\n=== 第897页 ===\n小组成员应具备企业安全管理及相关专业能力，评价小组成员不应少\n于7 人。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2638, "question": "专职安全生产管理人员负责对安全生产进行现场监督检查。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2639, "question": "密目安全网应当用金属丝绑扎在脚手架内侧。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "脚手架与模板工程"}, {"id": 2640, "question": "企业待岗、转岗、换岗的职工，在重新上岗前，必须接受一次\n安全生产培训，时间可以为10 学时。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2641, "question": "当采用新技术、新工艺、新设备施工和调换工作岗位时，要对\n操作人员进行新技术操作和新岗位的安全教育，未经教育不得上岗操\n作。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2642, "question": "三级安全教育考试不及格者可以上岗工作。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2643, "question": "安全带的标识由永久标识和产品说明组成。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "高处作业"}, {"id": 2644, "question": "建筑施工现场的电工、电焊工属于特种作业工种，必须按国家\n规定经专门安全作业培训，取得特种作业操作资格证书，方可上岗作\n业。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 2645, "question": "劳动防护用品的配备，应按照“谁用工、谁负责”的原则。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2646, "question": "生产经营单位依照规定委托工程技术人员提供安全生产管理服\n务的，则保证安全生产的责任由工程技术人员负责。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 2647, "question": "对从事有尘毒危害作业的工人，要进行尘毒危害和防治知识教\n育，也应有安全教育内容。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2648, "question": "垂直运输机械作业人员、安装拆卸工、爆破作业人员、起重信\n号工、登高架设作业人员等特种作业人员，必须按照国家有关规定经\n过专门的安全作业培训，并取得特种作业操作资格证书后，方可上岗\n\n=== 第899页 ===\n作业。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "特种设备"}, {"id": 2649, "question": "为规范安全生产文明施工，保证职工身体健康，施工区域和生\n活区域应有明确划分，并建立相应责任制，责任落实到人。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "文明施工"}, {"id": 2650, "question": "当临街的被拆除建筑与交通道路的安全距离不能满足要求时，\n必须采取相应的安全隔离措施。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2651, "question": "项目经理必须组织对施工现场作业人员进行岗前质量安全教育，\n组织审核建筑施工特种作业人员操作资格证书。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2652, "question": "实行施工总承包单位的，不应该由总承包单位支付意外伤害保\n险。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2653, "question": "由监理单位对施工企业实施的安全生产评价，也称为第二方评\n价。\nA.正确\nB.错误\n\n=== 第900页 ===", "options": {"A": "正确", "B": "错误 === 第900页 ==="}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2654, "question": "安全绳（包括未展开的缓冲器）有效长度不应大于2m。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2655, "question": "危险源的安全风险控制策划应按照标本兼治、治本为主的原则。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2656, "question": "安全生产责任制度就是对各级负责人、各职能部门以及各类施\n工人员在管理和施工过程中，应当承担的责任做出明确的规定。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 2657, "question": "施工单位应当指定专人对专项方案实施情况进行现场监督和按\n规定进行监测，发现有危及人身安全紧急情况的，应当立即组织作业\n人员撤离危险区域。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "法律法规"}, {"id": 2658, "question": "施工单位应当在施工现场入口处、施工起重机械、临时用电设\n施、脚手架、出入通道口、楼梯口、电梯井口、孔洞口、桥梁口、隧\n道口、基坑边沿、爆破物及有害危险气体和液体存放处等危险部位，\n设置明显的安全警示标志。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "脚手架与模板工程"}, {"id": 2659, "question": "生产经营单位应当建立健全并落实生产安全事故隐患排查治理\n制度，采取技术、管理措施，及时发现并消除事故隐患。（\n）\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 2660, "question": "现场动用明火必须办理动火批准手续，配备动火监护人员和灭\n火器材，动火过程有专人监护。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2661, "question": "施工现场氧气瓶、乙炔瓶应使用专用工具车搬运。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2662, "question": "业场所应设置明显的疏散指示标志，其指示方向应指向最近的\n临时疏散通道入口。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2663, "question": "在建工程作业场所的临时疏散通道应采用不燃、难燃材料建造，\n并应与在建工程结构施工分步设置，也可以利用在建工程施工完毕的\n水平结构、楼梯。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2664, "question": "施工现场建筑垃圾、生活垃圾以及其他产生有毒有害气体的物\n质可以焚烧处理。\n\n=== 第902页 ===\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2665, "question": "施工现场无需办理排污许可手续。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2666, "question": "施工污水经沉淀后方可排入市政雨水管网或河流。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2667, "question": "施工过程宜使用低噪声、低振动的施工机械设备，对噪声控制\n要求较高的区域应采取隔声措施。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2668, "question": "临时建筑场地应设有消防车道，宽度不应小于3.5m。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 2669, "question": "易燃易爆物品可和其它材料一起储藏在库房内，但应制定防火\n措施。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "消防安全"}, {"id": 2670, "question": "现场出入口应设专人管理，根据需要可设门卫值班室。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2671, "question": "施工现场在条件许可的情况下，允许采取开放式管理。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2672, "question": "施工现场工程项目部的专职安全生产管理人员配备要求：房屋\n建筑工程建筑面积10 万平方米及以上的工程不少于4 人，每增加1\n万平方米增加配备1 人。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2673, "question": "施工企业应建立健全安全生产管理体系，明确各类岗位人员的\n安全生产责任。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2674, "question": "全面开展安全生产标准化建设，强制企业开展安全生产标准化\n活动。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "法律法规"}, {"id": 2675, "question": "在当地气象部门发布强对流（台风）天气预报后，在以塔机高\n度为半径的地面范围内的临时设施内的人员必须全部撤出。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2676, "question": "焊接烟尘是造成焊工尘肺的直接原因，因此，在狭小的密闭空\n间内实施焊接作业时，应有良好的通风措施。\n\n=== 第904页 ===\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2677, "question": "焊割作业人员使用人字梯登高作业时，同一梯子上的作业人员\n可为2 人。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2678, "question": "施工现场对承压状态的压力容器和装有剧毒、易燃、易爆物品\n的容器，进行焊接与切割作业时，应安排专人进行监护。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2679, "question": "高度超过24m 的交叉作业，应设单层防护棚。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2680, "question": "悬挑式操作平台的人员和物料总重量，不能超过设计的容许载\n荷，可以不悬挂限载标志。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2681, "question": "作业者应遵守地下有限空间作业安全操作规程，正确使用安全\n防护设备与个体防护装备，并与监护者进行有效的信息沟通。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2682, "question": "有限空间作业可采用自然通风，必要时可再采取强制通风的方\n\n=== 第905页 ===\n法，也可直接向有限空间内输入氧气。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2683, "question": "有限空间作业现场要配备一定数量符合规定的应急救护器具和\n灭火器材。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "消防安全"}, {"id": 2684, "question": "有限空间作业前，责任单位应指定专人对监护人和作业人员进\n行安全教育，包括作业空间的结构和相关介质等方面的知识，作业中\n可能遇到的意外和处理、救护方法等。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2685, "question": "在清理设备容器内的可燃物料残渣、沉淀物时，必须使用不产\n生火花的工具，严禁使用铁器敲击碰撞，可以穿戴化纤织物。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "安全管理"}, {"id": 2686, "question": "建筑施工企业安全生产教育培训应贯穿于生产经营的全过程。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2687, "question": "企业用于施工现场防雷、防台风的费用可以从安全生产费用中\n列支。\nA.正确\nB.错误\n\n=== 第906页 ===", "options": {"A": "正确", "B": "错误 === 第906页 ==="}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2688, "question": "安全检查是消除事故隐患、落实整改措施、防止伤亡事故发生、\n改善劳动条件的重要手段。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "安全管理"}, {"id": 2689, "question": "某施工现场塔式起重机司机上下驾驶室时，发生的坠落伤害应\n属于起重伤害事故。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "B", "type": "single", "category": "高处作业"}, {"id": 2690, "question": "发生生产安全事故后，实行施工总承包的建设工程，由总承包\n单位负责上报事故。\nA.正确\nB.错误", "options": {"A": "正确", "B": "错误"}, "answer": "A", "type": "single", "category": "事故处理"}, {"id": 2691, "quest
